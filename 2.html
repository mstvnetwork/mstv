<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Pro HLS Player - Proxy Integrated</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/hls.js/1.5.7/hls.min.js"></script>
<style>
    body { background: #0a0a0f; color: #e8e8f0; font-family: sans-serif; display: flex; flex-direction: column; align-items: center; padding: 20px; }
    .player-card { width: 100%; max-width: 800px; background: #12121a; border-radius: 12px; border: 1px solid #2a2a3d; overflow: hidden; }
    .url-input-area { padding: 15px; display: flex; gap: 10px; border-bottom: 1px solid #2a2a3d; }
    input { flex: 1; background: #1a1a26; border: 1px solid #2a2a3d; color: #fff; padding: 10px; border-radius: 6px; outline: none; }
    button { background: #00e5ff; color: #000; border: none; padding: 10px 20px; border-radius: 6px; font-weight: bold; cursor: pointer; }
    video { width: 100%; aspect-ratio: 16/9; display: block; background: #000; }
    #status { padding: 10px; font-size: 12px; color: #6b6b88; font-family: monospace; }
</style>
</head>
<body>

<div class="player-card">
    <div class="url-input-area">
        <input type="text" id="urlInput" placeholder="Enter M3U8 URL..." value="https://si.videoapne.to/hls/,bdohxe7v7bboxuzvta2p4bax3sgu3s5mjbudft4e7xljpesm6bm4d2l2lk3a,.urlset/master.m3u8">
        <button onclick="loadStream()">PLAY</button>
    </div>
    <video id="video" controls playsinline></video>
    <div id="status">Ready</div>
</div>

<script>
// Configuration: List your working proxies here
const PROXIES = [
    "https://corsproxy.io/?",
    "https://api.allorigins.win/raw?url=",
    "" // Direct
];

class CustomLoader {
    constructor(config) {
        this.config = config;
        this.retryCount = 0;
        this.stats = { trequest: 0, tfirst: 0, tload: 0, loaded: 0, total: 0 };
    }

    load(context, config, callbacks) {
        this.context = context;
        this.config = config;
        this.callbacks = callbacks;
        this.execute();
    }

    execute() {
        const proxy = PROXIES[this.retryCount];
        const requestUrl = (proxy && this.context.url.startsWith('http')) 
            ? proxy + encodeURIComponent(this.context.url) 
            : this.context.url;

        const xhr = new XMLHttpRequest();
        this.xhr = xhr;
        xhr.open('GET', requestUrl, true);
        
        // Match HLS.js expectations for response type
        if (this.context.responseType) xhr.responseType = this.context.responseType;
        
        xhr.onload = () => {
            if (xhr.status >= 200 && xhr.status < 300) {
                this.stats.tload = performance.now();
                this.stats.loaded = xhr.response.byteLength || xhr.responseText.length;
                
                const response = {
                    url: xhr.responseURL,
                    data: xhr.response,
                    code: xhr.status
                };
                this.callbacks.onSuccess(response, this.stats, this.context);
            } else {
                this.handleRetry();
            }
        };

        xhr.onerror = () => this.handleRetry();
        xhr.ontimeout = () => this.handleRetry();

        this.stats.trequest = performance.now();
        xhr.send();
    }

    handleRetry() {
        if (this.retryCount < PROXIES.length - 1) {
            this.retryCount++;
            console.log(`Switching to proxy index ${this.retryCount}`);
            this.execute();
        } else {
            this.callbacks.onError({ code: this.xhr.status, text: this.xhr.statusText }, this.context);
        }
    }

    abort() { if (this.xhr) this.xhr.abort(); }
    destroy() { this.abort(); }
}

const video = document.getElementById('video');
let hls = null;

function loadStream() {
    const url = document.getElementById('urlInput').value.trim();
    const status = document.getElementById('status');
    
    if (hls) hls.destroy();
    status.textContent = "Status: Connecting...";

    if (Hls.isSupported()) {
        hls = new Hls({
            // Force the loader for EVERYTHING (Manifests + Segments)
            pLoader: CustomLoader,
            fLoader: CustomLoader,
            // Optimization for third-party latency
            fragLoadingTimeOut: 30000,
            manifestLoadingTimeOut: 30000,
            enableWorker: false // Disabled worker to prevent the 'undefined' controller crash
        });

        hls.loadSource(url);
        hls.attachMedia(video);

        hls.on(Hls.Events.MANIFEST_PARSED, () => {
            status.textContent = "Status: Playing";
            video.play().catch(e => {
                status.textContent = "Status: Click Play to start (Autoplay blocked)";
            });
        });

        hls.on(Hls.Events.ERROR, (event, data) => {
            if (data.fatal) {
                console.error("Fatal Error:", data);
                status.textContent = `Fatal Error: ${data.details}`;
            }
        });
    }
}
</script>
</body>
</html>
