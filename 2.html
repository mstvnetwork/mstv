<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>M3U8 Player — Fixed Loader</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono&family=Syne:wght@400;700&display=swap" rel="stylesheet"/>
<script src="https://cdnjs.cloudflare.com/ajax/libs/hls.js/1.5.7/hls.min.js"></script>
<style>
  :root { --bg: #0a0a0f; --surface: #12121a; --border: #2a2a3d; --accent: #00e5ff; --text: #e8e8f0; --radius: 10px; }
  body { font-family: 'Syne', sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 20px; display: flex; flex-direction: column; align-items: center; }
  .container { max-width: 900px; width: 100%; display: flex; flex-direction: column; gap: 20px; }
  .url-bar { display: flex; gap: 10px; background: var(--surface); padding: 10px; border-radius: var(--radius); border: 1px solid var(--border); }
  input { flex: 1; background: transparent; border: none; color: #fff; outline: none; font-family: 'Space Mono', monospace; }
  .video-wrap { width: 100%; aspect-ratio: 16/9; background: #000; border-radius: var(--radius); overflow: hidden; position: relative; border: 1px solid var(--border); }
  video { width: 100%; height: 100%; }
  .btn { padding: 10px 20px; border-radius: 6px; border: none; cursor: pointer; font-weight: 700; background: var(--accent); color: #000; }
  .status { font-family: 'Space Mono', monospace; font-size: 0.8rem; color: #6b6b88; }
</style>
</head>
<body>

<div class="container">
  <div class="url-bar">
    <input type="text" id="urlInput" placeholder="Paste M3U8 URL..." value="https://test-streams.mux.dev/x36xhzz/x36xhzz.m3u8"/>
    <button class="btn" onclick="loadUrl()">PLAY</button>
  </div>

  <div class="video-wrap">
    <video id="video" controls crossorigin="anonymous"></video>
  </div>
  
  <div class="status" id="statusText">Status: Ready</div>
</div>

<script>
// The proxy list. Empty string "" means "Try direct connection".
const PROXY_LIST = [
    "", // TRY DIRECT FIRST (This fixes your Mux link issue)
    "https://corsproxy.io/?", 
    "https://api.allorigins.win/raw?url="
];

class InterceptLoader {
    constructor(config) {
        this.config = config;
        this.retryCount = 0;
        // Use the internal HLS default loader as the engine
        this.defaultLoader = new Hls.DefaultConfig.loader(config);
    }

    load(context, config, callbacks) {
        this.context = context;
        this.config = config;
        this.callbacks = callbacks;
        this.tryLoad();
    }

    tryLoad() {
        const proxy = PROXY_LIST[this.retryCount];
        const finalUrl = (proxy && this.context.url.startsWith('http')) 
            ? proxy + encodeURIComponent(this.context.url) 
            : this.context.url;

        console.log(`Attempting load (Try ${this.retryCount}): ${finalUrl}`);

        const internalCallbacks = {
            onSuccess: (response, stats, context) => {
                this.retryCount = 0; // Reset on success
                this.callbacks.onSuccess(response, stats, context);
            },
            onError: (error, context, networkDetails) => {
                // If this attempt failed and we have more proxies to try
                if (this.retryCount < PROXY_LIST.length - 1) {
                    console.warn("Request failed. Switching to next proxy...");
                    this.retryCount++;
                    this.tryLoad();
                } else {
                    // All attempts failed
                    this.callbacks.onError(error, context, networkDetails);
                }
            },
            onTimeout: (stats, context) => this.callbacks.onTimeout(stats, context),
            onProgress: (stats, context, data) => {
                if (this.callbacks.onProgress) this.callbacks.onProgress(stats, context, data);
            }
        };

        this.defaultLoader.load({ ...this.context, url: finalUrl }, this.config, internalCallbacks);
    }

    abort() { this.defaultLoader.abort(); }
    destroy() { this.defaultLoader.destroy(); }
}

const video = document.getElementById('video');
let hls = null;

function loadUrl() {
    const url = document.getElementById('urlInput').value.trim();
    if (!url) return;
    
    document.getElementById('statusText').textContent = "Status: Initializing...";

    if (hls) {
        hls.destroy();
    }

    if (Hls.isSupported()) {
        hls = new Hls({
            pLoader: InterceptLoader,
            fLoader: InterceptLoader,
            // Allow more time for proxy latency
            fragLoadingTimeOut: 20000,
            manifestLoadingTimeOut: 20000,
            enableWorker: true
        });

        hls.loadSource(url);
        hls.attachMedia(video);

        hls.on(Hls.Events.MANIFEST_PARSED, () => {
            document.getElementById('statusText').textContent = "Status: Playing";
            video.play().catch(e => console.log("Autoplay blocked"));
        });

        hls.on(Hls.Events.ERROR, (event, data) => {
            if (data.fatal) {
                document.getElementById('statusText').textContent = "Status: Fatal Error " + data.details;
                console.error("HLS Fatal Error:", data);
            }
        });
    } else if (video.canPlayType('application/vnd.apple.mpegurl')) {
        // Fallback for Safari/iOS
        video.src = url;
        document.getElementById('statusText').textContent = "Status: Native Playback";
    }
}

// Start with the default test link on load
window.onload = loadUrl;
</script>

</body>
</html>
