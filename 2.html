<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>MP4 URL Tester</title>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; display: flex; justify-content: center; padding: 40px; background: #f0f2f5; }
        .card { background: white; padding: 30px; border-radius: 12px; box-shadow: 0 4px 20px rgba(0,0,0,0.08); width: 100%; max-width: 500px; }
        h2 { margin-top: 0; color: #1c1e21; font-size: 1.5rem; }
        input { width: 100%; padding: 12px; margin: 15px 0; border: 2px solid #ddd; border-radius: 8px; box-sizing: border-box; font-size: 1rem; }
        input:focus { border-color: #007bff; outline: none; }
        button { background: #007bff; color: white; border: none; padding: 12px; border-radius: 8px; cursor: pointer; width: 100%; font-size: 1rem; font-weight: 600; transition: background 0.2s; }
        button:hover { background: #0056b3; }
        .video-container { margin-top: 25px; border-radius: 8px; overflow: hidden; background: #000; display: none; line-height: 0; }
        video { width: 100%; }
        .error { color: #d93025; background: #fce8e6; padding: 10px; border-radius: 6px; margin-top: 15px; display: none; font-size: 0.9rem; }
    </style>
</head>
<body>
    <div class="card">
        <h2>MP4 Video Tester</h2>
        <p style="color: #606770; font-size: 0.9rem;">Paste a direct link to an .mp4 file to test playback.</p>
        <input type="text" id="urlInput" placeholder="https://sto.vkcdn5.com/olaxlug7whuiolyobgj2hwjwghxa2gptu7ek2nribykzyyfirtvbbi4wakya/v.mp4">
        <button onclick="checkVideo()">Test Link</button>
        
        <div id="errorBox" class="error">Unable to load video. Check the URL or CORS settings.</div>
        
        <div id="playerWrap" class="video-container">
            <video id="myPlayer" controls></video>
        </div>
    </div>

    <script>
        function checkVideo() {
            const url = document.getElementById('urlInput').value.trim();
            const video = document.getElementById('myPlayer');
            const wrapper = document.getElementById('playerWrap');
            const error = document.getElementById('errorBox');

            if (!url) return;

            error.style.display = 'none';
            wrapper.style.display = 'none';

            video.src = url;
            video.load();

            video.oncanplay = function() {
                wrapper.style.display = 'block';
                video.play();
            };

            video.onerror = function() {
                error.style.display = 'block';
            };
        }
    </script>
</body>
</html>
