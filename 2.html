<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>M3U8 Ultra Player</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/hls.js/1.5.7/hls.min.js"></script>
    <style>
        body { background: #050508; color: #00e5ff; font-family: 'Courier New', monospace; display: flex; flex-direction: column; align-items: center; padding: 20px; }
        .box { width: 100%; max-width: 800px; background: #0f0f1a; border: 1px solid #1a1a2e; border-radius: 8px; padding: 20px; box-shadow: 0 0 20px rgba(0,229,255,0.1); }
        input { width: 70%; background: #000; border: 1px solid #00e5ff; color: #fff; padding: 10px; border-radius: 4px; outline: none; }
        button { background: #00e5ff; color: #000; border: none; padding: 10px 20px; border-radius: 4px; font-weight: bold; cursor: pointer; }
        .video-container { margin-top: 20px; background: #000; border-radius: 4px; overflow: hidden; position: relative; border: 1px solid #1a1a2e; }
        video { width: 100%; display: block; aspect-ratio: 16/9; }
        #console { margin-top: 15px; font-size: 10px; color: #555; background: #000; padding: 10px; height: 100px; overflow-y: auto; border-radius: 4px; }
    </style>
</head>
<body>

<div class="box">
    <div style="display:flex; gap:10px; justify-content:center;">
        <input type="text" id="urlInput" placeholder="Paste .m3u8 link..." value="https://test-streams.mux.dev/x36xhzz/x36xhzz.m3u8">
        <button onclick="bootPlayer()">BOOT STREAM</button>
    </div>

    <div class="video-container">
        <video id="mainVideo" controls crossorigin="anonymous"></video>
    </div>

    <div id="console">System Ready. Waiting for Boot Command...</div>
</div>

<script>
const cons = document.getElementById('console');
const video = document.getElementById('mainVideo');
let hlsInstance = null;

function log(msg) {
    cons.innerHTML += `<div>> ${msg}</div>`;
    cons.scrollTop = cons.scrollHeight;
}

const PROXY_CHAIN = [
    "", // Direct
    "https://m3u8-player.lzw.me/get?url=",
    "https://corsproxy.io/?",
    "https://api.allorigins.win/raw?url="
];

class UltraLoader {
    constructor(config) {
        this.config = config;
        this.retryIndex = 0;
    }

    load(context, config, callbacks) {
        this.context = context;
        this.config = config;
        this.callbacks = callbacks;
        this.fetchData();
    }

    fetchData() {
        const proxy = PROXY_CHAIN[this.retryIndex];
        const finalUrl = proxy ? proxy + encodeURIComponent(this.context.url) : this.context.url;

        const xhr = new XMLHttpRequest();
        this.loader = xhr;
        xhr.open('GET', finalUrl, true);
        
        // This is the "Magic" — Force the browser to treat data as arraybuffer
        // which bypasses some proxy text-encoding errors
        if (this.context.responseType) {
            xhr.responseType = this.context.responseType;
        } else if (this.context.url.indexOf('.ts') > -1) {
            xhr.responseType = 'arraybuffer';
        }

        const tStart = performance.now();

        xhr.onload = () => {
            if (xhr.status >= 200 && xhr.status < 300) {
                const tEnd = performance.now();
                const data = xhr.response;
                
                // Manually construct the stats HLS.js needs to stop the spinner
                const stats = {
                    trequest: tStart,
                    tfirst: tStart + 5,
                    tload: tEnd,
                    loaded: data.byteLength || data.length || 0,
                    total: data.byteLength || data.length || 0
                };

                this.callbacks.onSuccess({ url: xhr.responseURL, data: data, code: xhr.status }, stats, this.context);
            } else {
                this.next();
            }
        };

        xhr.onerror = () => this.next();
        xhr.ontimeout = () => this.next();
        xhr.send();
    }

    next() {
        if (this.retryIndex < PROXY_CHAIN.length - 1) {
            this.retryIndex++;
            log(`Attempt ${this.retryIndex-1} Fail. Trying Fallback ${this.retryIndex}...`);
            this.fetchData();
        } else {
            this.callbacks.onError({ code: 0, text: 'Chain Exhausted' }, this.context);
        }
    }

    abort() { if (this.loader) this.loader.abort(); }
    destroy() { this.abort(); }
}

function bootPlayer() {
    const targetUrl = document.getElementById('urlInput').value.trim();
    if (!targetUrl) return;

    if (hlsInstance) {
        hlsInstance.destroy();
        log("Engine Reset.");
    }

    log("Kernel Initializing...");

    hlsInstance = new Hls({
        pLoader: UltraLoader,
        fLoader: UltraLoader,
        enableWorker: false, // Critical for custom loaders
        fragLoadingTimeOut: 60000, // Long timeout for slow proxies
        levelLoadingTimeOut: 60000,
        manifestLoadingTimeOut: 60000,
        // Force HLS.js to be less picky about segment start times
        maxBufferLength: 30,
        maxMaxBufferLength: 600
    });

    hlsInstance.on(Hls.Events.MEDIA_ATTACHED, () => {
        log("Media Link Established.");
        hlsInstance.loadSource(targetUrl);
    });

    hlsInstance.on(Hls.Events.MANIFEST_PARSED, (e, data) => {
        log(`Manifest Parsed: ${data.levels.length} streams detected.`);
        video.muted = true; 
        video.play().then(() => log("Playback Active.")).catch(() => log("Waiting for User Interaction..."));
    });

    hlsInstance.on(Hls.Events.ERROR, (e, data) => {
        if (data.fatal) {
            if (data.type === Hls.ErrorTypes.NETWORK_ERROR) {
                log("Network Dropout. Retrying...");
                hlsInstance.startLoad();
            } else if (data.type === Hls.ErrorTypes.MEDIA_ERROR) {
                log("Media Stall. Recovering...");
                hlsInstance.recoverMediaError();
            } else {
                log("Fatal System Crash.");
                hlsInstance.destroy();
            }
        }
    });

    hlsInstance.attachMedia(video);
}
</script>
</body>
</html>
