<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>M3U8 Pro Player</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/hls.js/1.5.7/hls.min.js"></script>
    <style>
        body { background: #0a0a0f; color: #fff; font-family: sans-serif; display: flex; justify-content: center; padding: 20px; }
        .player-container { width: 100%; max-width: 850px; background: #12121a; border-radius: 12px; border: 1px solid #2a2a3d; padding: 20px; }
        .input-group { display: flex; gap: 10px; margin-bottom: 15px; }
        input { flex: 1; background: #1a1a26; border: 1px solid #333; color: #fff; padding: 12px; border-radius: 8px; }
        button { background: #00e5ff; color: #000; border: none; padding: 10px 25px; border-radius: 8px; font-weight: bold; cursor: pointer; }
        video { width: 100%; aspect-ratio: 16/9; background: #000; border-radius: 8px; }
        #log { margin-top: 15px; font-size: 11px; color: #888; font-family: monospace; max-height: 100px; overflow-y: auto; background: #000; padding: 10px; }
    </style>
</head>
<body>

<div class="player-container">
    <div class="input-group">
        <input type="text" id="urlInput" value="https://test-streams.mux.dev/x36xhzz/x36xhzz.m3u8">
        <button onclick="initPlayer()">PLAY</button>
    </div>
    <video id="video" controls playsinline crossorigin="anonymous"></video>
    <div id="log">Status: Waiting for input...</div>
</div>

<script>
const logEl = document.getElementById('log');
function logger(msg) { logEl.innerHTML += `<div>> ${msg}</div>`; logEl.scrollTop = logEl.scrollHeight; }

// --- Proxy List ---
const PROXIES = [
    "", // Try Direct First
    
    "https://corsproxy.io/?",
    "https://api.allorigins.win/raw?url="
];

class ProxyLoader {
    constructor(config) {
        this.config = config;
        this.retryCount = 0;
    }

    load(context, config, callbacks) {
        this.context = context;
        this.config = config;
        this.callbacks = callbacks;
        this.tryRequest();
    }

    tryRequest() {
        const proxy = PROXIES[this.retryCount];
        const finalUrl = (proxy && this.context.url.startsWith('http')) 
                         ? proxy + encodeURIComponent(this.context.url) 
                         : this.context.url;

        logger(`Attempt ${this.retryCount}: ${proxy ? 'Using Proxy' : 'Direct'}`);

        const xhr = new XMLHttpRequest();
        this.loader = xhr; // CRITICAL: HLS.js checks this for the 'loading' state
        
        xhr.open('GET', finalUrl, true);
        if (this.context.responseType) xhr.responseType = this.context.responseType;

        xhr.onload = () => {
            if (xhr.status >= 200 && xhr.status < 300) {
                logger(`Success via ${proxy || 'Direct'}`);
                this.callbacks.onSuccess({
                    url: xhr.responseURL,
                    data: xhr.response,
                    code: xhr.status
                }, { trequest: performance.now(), tfirst: performance.now(), tload: performance.now(), loaded: xhr.response.length || 0 }, this.context);
            } else {
                this.handleFail();
            }
        };

        xhr.onerror = () => this.handleFail();
        xhr.ontimeout = () => this.handleFail();
        xhr.send();
    }

    handleFail() {
        if (this.retryCount < PROXIES.length - 1) {
            this.retryCount++;
            this.tryRequest();
        } else {
            this.callbacks.onError({ code: 0, text: 'All proxies failed' }, this.context);
        }
    }

    abort() { if (this.loader) this.loader.abort(); }
    destroy() { this.abort(); }
}

let hls = null;
const video = document.getElementById('video');

function initPlayer() {
    const url = document.getElementById('urlInput').value.trim();
    if (hls) hls.destroy();

    logger("Initializing HLS.js...");
    
    hls = new Hls({
        pLoader: ProxyLoader,
        fLoader: ProxyLoader,
        enableWorker: false, // Prevents threading issues with custom loaders
        fragLoadingMaxRetry: 3,
        manifestLoadingMaxRetry: 3
    });

    hls.loadSource(url);
    hls.attachMedia(video);

    hls.on(Hls.Events.MANIFEST_PARSED, () => {
        logger("Manifest Parsed. Playing...");
        video.play().catch(() => logger("User interaction required for play."));
    });

    hls.on(Hls.Events.ERROR, (event, data) => {
        if (data.fatal) {
            logger(`FATAL ERROR: ${data.details}`);
            hls.destroy();
        }
    });
}
</script>
</body>
</html>
