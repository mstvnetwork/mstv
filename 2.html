<!DOCTYPE html>
<html>
<head>
    <title>Video Seek Blocker Test</title>
    <style>
        .player-wrapper {
            max-width: 800px;
            margin: 20px auto;
            background: #000;
            padding: 10px;
            border-radius: 8px;
        }

        /* 1. HIDE THE SEEK BAR (Works in Chrome, Safari, Edge) */
        video::-webkit-media-controls-timeline,
        video::-webkit-media-controls-current-time-display,
        video::-webkit-media-controls-time-remaining-display {
            display: none !important;
        }

        /* 2. OPTIONAL: Hide the whole control bar and use custom buttons if needed */
        /* video::-webkit-media-controls-enclosure { display: none !important; } */

        video {
            width: 100%;
            display: block;
        }
    </style>
</head>
<body>

<div class="player-wrapper">
    <video id="lockVideo" controls disablePictureInPicture controlsList="nodownload">
        <source src="https://sto.vkcdn5.com/olaxkuzhx3uiolyobgk2hxzrng4uknkkvp2kweer4odxkcq46c6lythqvutq/v.mp4" type="video/mp4">
        Your browser does not support the video tag.
    </video>
</div>

<script>
    const video = document.getElementById('lockVideo');
    let lastTime = 0;

    // 3. JUMP PREVENTION: Snaps video back if user skips forward
    video.addEventListener('timeupdate', () => {
        if (!video.seeking) {
            lastTime = video.currentTime;
        }
    });

    video.addEventListener('seeking', () => {
        const delta = video.currentTime - lastTime;
        if (delta > 0.01) { // Detects any forward skip
            video.currentTime = lastTime;
        }
    });

    // 4. DISABLE RIGHT-CLICK: Prevents users from opening 'Show Controls' manually
    video.addEventListener('contextmenu', (e) => e.preventDefault());
</script>

</body>
</html>
