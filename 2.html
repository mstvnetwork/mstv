<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>M3U8 Player — HLS Stream Player</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@400;600;800&display=swap" rel="stylesheet"/>
<script src="https://cdnjs.cloudflare.com/ajax/libs/hls.js/1.5.7/hls.min.js"></script>
<style>
  :root {
    --bg: #0a0a0f;
    --surface: #12121a;
    --surface2: #1a1a26;
    --border: #2a2a3d;
    --accent: #00e5ff;
    --accent2: #7c4dff;
    --text: #e8e8f0;
    --muted: #6b6b88;
    --error: #ff4d6d;
    --success: #00e676;
    --radius: 10px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Syne', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    overflow-x: hidden;
  }

  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(rgba(0,229,255,.04) 1px, transparent 1px),
      linear-gradient(90deg, rgba(0,229,255,.04) 1px, transparent 1px);
    background-size: 40px 40px;
    pointer-events: none;
    z-index: 0;
  }

  header {
    position: relative;
    z-index: 10;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 18px 32px;
    border-bottom: 1px solid var(--border);
    background: rgba(10,10,15,.85);
    backdrop-filter: blur(12px);
  }

  .logo { display: flex; align-items: center; gap: 12px; }
  .logo-icon {
    width: 36px; height: 36px;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    border-radius: 8px;
    display: flex; align-items: center; justify-content: center;
    font-size: 18px;
  }

  .logo-text {
    font-size: 1.25rem;
    font-weight: 800;
    letter-spacing: -0.02em;
    background: linear-gradient(90deg, var(--accent), var(--accent2));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
  }

  .logo-sub {
    font-family: 'Space Mono', monospace;
    font-size: .65rem;
    color: var(--muted);
    margin-top: 2px;
  }

  .header-badge {
    font-family: 'Space Mono', monospace;
    font-size: .7rem;
    color: var(--accent);
    border: 1px solid var(--accent);
    padding: 4px 10px;
    border-radius: 20px;
    letter-spacing: .05em;
  }

  main {
    position: relative;
    z-index: 1;
    flex: 1;
    display: grid;
    grid-template-columns: 1fr 320px;
    max-width: 1400px;
    width: 100%;
    margin: 0 auto;
    padding: 28px 24px;
    gap: 24px;
  }

  @media (max-width: 900px) {
    main { grid-template-columns: 1fr; }
  }

  .player-col { display: flex; flex-direction: column; gap: 16px; }

  .url-bar {
    display: flex;
    gap: 8px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 8px 8px 8px 16px;
    align-items: center;
    transition: border-color .2s;
  }
  .url-bar:focus-within { border-color: var(--accent); box-shadow: 0 0 0 3px rgba(0,229,255,.1); }

  .url-bar input {
    flex: 1;
    background: transparent;
    border: none;
    outline: none;
    font-family: 'Space Mono', monospace;
    font-size: .8rem;
    color: var(--text);
    min-width: 0;
  }

  .btn {
    display: inline-flex; align-items: center; gap: 6px;
    padding: 9px 18px;
    border-radius: 6px;
    border: none;
    cursor: pointer;
    font-family: 'Syne', sans-serif;
    font-weight: 600;
    font-size: .85rem;
    transition: all .18s;
  }

  .btn-primary { background: linear-gradient(135deg, var(--accent), var(--accent2)); color: #000; }
  .btn-outline { background: transparent; color: var(--muted); border: 1px solid var(--border); }
  .btn-ghost { background: transparent; color: var(--muted); padding: 9px 12px; }

  .video-wrap {
    position: relative;
    background: #000;
    border-radius: var(--radius);
    overflow: hidden;
    aspect-ratio: 16/9;
    border: 1px solid var(--border);
  }

  video { width: 100%; height: 100%; object-fit: contain; }

  .placeholder {
    position: absolute; inset: 0;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    gap: 16px; pointer-events: none; transition: opacity .3s;
  }
  .placeholder.hidden { opacity: 0; }

  .status-bar {
    display: flex; align-items: center; gap: 10px;
    font-family: 'Space Mono', monospace; font-size: .72rem; color: var(--muted);
  }

  .status-dot { width: 7px; height: 7px; border-radius: 50%; background: var(--muted); }
  .status-dot.live { background: var(--error); animation: blink 1s infinite; }
  .status-dot.ready { background: var(--success); }

  @keyframes blink { 0%,100%{opacity:1} 50%{opacity:.3} }

  .controls-row { display: flex; gap: 8px; flex-wrap: wrap; align-items: center; }
  .sep { width: 1px; height: 28px; background: var(--border); margin: 0 4px; }

  .panel { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); overflow: hidden; }
  .tabs { display: flex; border-bottom: 1px solid var(--border); }
  .tab { padding: 10px 18px; font-size: .82rem; font-weight: 600; color: var(--muted); cursor: pointer; border-bottom: 2px solid transparent; }
  .tab.active { color: var(--accent); border-bottom-color: var(--accent); }
  .panel-body { padding: 16px; }

  .info-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
  .info-item { background: var(--surface2); border-radius: 6px; padding: 10px 12px; }
  .info-label { font-family: 'Space Mono', monospace; font-size: .65rem; color: var(--muted); text-transform: uppercase; margin-bottom: 4px; }
  .info-value { font-size: .85rem; font-weight: 600; color: var(--text); word-break: break-all; }

  .quality-item { display: flex; align-items: center; justify-content: space-between; padding: 8px 12px; background: var(--surface2); border-radius: 6px; cursor: pointer; margin-bottom: 4px; border: 1px solid transparent; }
  .quality-item.active { border-color: var(--accent); color: var(--accent); }

  .sidebar { display: flex; flex-direction: column; gap: 16px; }
  .section-title { font-size: .75rem; font-weight: 800; text-transform: uppercase; color: var(--muted); padding: 14px 16px 10px; border-bottom: 1px solid var(--border); }
  .entry-list { display: flex; flex-direction: column; max-height: 220px; overflow-y: auto; }
  .entry-item { display: flex; align-items: center; gap: 10px; padding: 10px 14px; border-bottom: 1px solid var(--border); cursor: pointer; }
  .entry-item:hover { background: var(--surface2); }

  .spinner { position: absolute; inset: 0; display: flex; align-items: center; justify-content: center; background: rgba(0,0,0,.5); display: none; }
  .spinner.active { display: flex; }
  .spin { width: 40px; height: 40px; border: 3px solid rgba(0,229,255,.2); border-top-color: var(--accent); border-radius: 50%; animation: spin .7s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }

  #toast { position: fixed; bottom: 28px; right: 28px; background: var(--surface); border: 1px solid var(--border); border-left: 3px solid var(--accent); padding: 12px 18px; border-radius: 8px; font-size: .82rem; z-index: 1000; transform: translateY(80px); opacity: 0; transition: all .3s; }
  #toast.show { transform: translateY(0); opacity: 1; }

  .fav-modal, .shortcuts-modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,.7); backdrop-filter: blur(8px); z-index: 200; align-items: center; justify-content: center; }
  .fav-modal.open, .shortcuts-modal.open { display: flex; }
  .box { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 28px; width: 400px; max-width: 95vw; }
</style>
</head>
<body>

<header>
  <div class="logo">
    <div class="logo-icon">▶</div>
    <div>
      <div class="logo-text">M3U8 Player</div>
      <div class="logo-sub">HLS Stream Player · Enhanced Proxy Fallback</div>
    </div>
  </div>
  <div class="header-badge">HLS.JS POWERED</div>
</header>

<main>
  <div class="player-col">
    <div class="url-bar">
      <span style="font-size:16px;flex-shrink:0">🔗</span>
      <input type="text" id="urlInput" placeholder="Paste M3U8 / HLS URL here..." value="https://si.videoapne.to/hls/,bdohxe7v7bboxuzvta2p4bax3sgu3s5mjbudft4e7xljpesm6bm4d2l2lk3a,.urlset/master.m3u8"/>
      <button class="btn btn-outline" onclick="clearUrl()">✕</button>
      <button class="btn btn-primary" onclick="loadUrl()">▶ Play</button>
    </div>

    <div class="video-wrap" id="videoWrap">
      <video id="video" controls crossorigin="anonymous"></video>
      <div class="placeholder" id="placeholder">
        <div class="placeholder-icon" style="font-size:40px">📺</div>
        <p>Ready to stream with proxy fallbacks</p>
      </div>
      <div class="spinner" id="spinner"><div class="spin"></div></div>
    </div>

    <div class="status-bar">
      <div class="status-dot" id="statusDot"></div>
      <span id="statusText">Ready</span>
      <span style="flex:1"></span>
      <span id="hlsVersion" style="color:var(--border)"></span>
    </div>

    <div class="controls-row">
      <button class="btn btn-outline" onclick="openFavModal()">⭐ Favourite</button>
      <button class="btn btn-outline" onclick="screenshot()">📷 Screenshot</button>
      <div class="sep"></div>
      <button class="btn btn-ghost" onclick="document.getElementById('shortcutsModal').classList.add('open')">⌨ Shortcuts</button>
      <button class="btn btn-ghost" id="loopBtn" onclick="toggleLoop()">🔁 Loop: Off</button>
    </div>

    <div class="panel" id="infoPanel" style="display:none">
      <div class="tabs">
        <div class="tab active" onclick="switchTab('info')">Stream Info</div>
        <div class="tab" onclick="switchTab('quality')">Quality Levels</div>
      </div>
      <div class="panel-body" id="tabInfo"><div class="info-grid" id="infoGrid"></div></div>
      <div class="panel-body" id="tabQuality" style="display:none"><div class="quality-list" id="qualityList"></div></div>
    </div>
  </div>

  <div class="sidebar">
    <div class="panel">
      <div class="section-title">🎬 Demo Streams</div>
      <div class="demo-list" id="demoList"></div>
    </div>
    <div class="panel">
      <div class="section-title">⭐ Favourites</div>
      <div class="entry-list" id="favList"></div>
    </div>
    <div class="panel">
      <div class="section-title">🕑 History</div>
      <div class="entry-list" id="historyList"></div>
    </div>
  </div>
</main>

<div id="toast"></div>

<div class="shortcuts-modal" id="shortcutsModal">
  <div class="box">
    <h3>⌨ Keyboard Shortcuts</h3>
    <button class="btn btn-outline" style="width:100%; margin-top:20px" onclick="document.getElementById('shortcutsModal').classList.remove('open')">Close</button>
  </div>
</div>

<div class="fav-modal" id="favModal">
  <div class="box">
    <h3>⭐ Add to Favourites</h3>
    <input type="text" id="favName" style="width:100%; margin-bottom:10px; padding:8px" placeholder="Name"/>
    <input type="text" id="favUrl" style="width:100%; margin-bottom:10px; padding:8px" readonly/>
    <div style="display:flex; gap:10px; justify-content:flex-end">
      <button class="btn btn-outline" onclick="closeFavModal()">Cancel</button>
      <button class="btn btn-primary" onclick="saveFavourite()">Save</button>
    </div>
  </div>
</div>

<script>
// --- Proxy Configuration ---
const PROXY_LIST = [
    "https://m3u8-player.lzw.me/get?url=", // Primary Proxy
    "https://corsproxy.io/?",               // Fallback 1
    "https://api.allorigins.win/raw?url=",   // Fallback 2
    ""                                      // Final try: Direct
];

// --- Custom HLS Loader Logic ---
class InterceptLoader {
    constructor(config) {
        this.config = config;
        this.retryCount = 0;
        this.defaultLoader = new Hls.DefaultConfig.loader(config);
    }

    load(context, config, callbacks) {
        this.context = context;
        this.config = config;
        this.callbacks = callbacks;
        this.tryRequest();
    }

    tryRequest() {
        const proxy = PROXY_LIST[this.retryCount];
        const targetUrl = proxy ? proxy + encodeURIComponent(this.context.url) : this.context.url;
        
        const internalContext = { ...this.context, url: targetUrl };
        const internalCallbacks = {
            onSuccess: (response, stats, context) => this.callbacks.onSuccess(response, stats, context),
            onError: (error, context) => {
                this.retryCount++;
                if (this.retryCount < PROXY_LIST.length) {
                    console.warn(`Request failed with proxy ${this.retryCount - 1}. Trying next fallback...`);
                    this.tryRequest();
                } else {
                    this.callbacks.onError(error, context);
                }
            },
            onTimeout: (stats, context) => this.callbacks.onTimeout(stats, context)
        };
        this.defaultLoader.load(internalContext, this.config, internalCallbacks);
    }

    abort() { this.defaultLoader.abort(); }
    destroy() { this.defaultLoader.destroy(); }
}

let hls = null;
const video = document.getElementById('video');

function loadUrl() {
    const url = document.getElementById('urlInput').value.trim();
    if (url) startPlayback(url, url);
}

function clearUrl() { document.getElementById('urlInput').value = ''; }

function startPlayback(url, label) {
    showSpinner(true);
    document.getElementById('placeholder').classList.add('hidden');
    if (hls) hls.destroy();

    if (Hls.isSupported()) {
        hls = new Hls({
            pLoader: InterceptLoader,
            fLoader: InterceptLoader,
            fragLoadingTimeOut: 30000,
            manifestLoadingTimeOut: 30000
        });

        hls.loadSource(url);
        hls.attachMedia(video);

        hls.on(Hls.Events.MANIFEST_PARSED, (e, data) => {
            showSpinner(false);
            document.getElementById('infoPanel').style.display = 'block';
            video.play().catch(() => {});
            setStatus('ready', 'Streaming: ' + label);
            renderInfo(url, data);
            renderQuality(data.levels);
            addHistory(label, url);
        });

        hls.on(Hls.Events.ERROR, (e, data) => {
            if (data.fatal) {
                showSpinner(false);
                toast("Stream Error: " + data.details, true);
            }
        });
    } else if (video.canPlayType('application/vnd.apple.mpegurl')) {
        video.src = url;
        video.play();
        setStatus('ready', 'Native Playback');
    }
}

// UI Helpers
function setStatus(type, msg) {
    const dot = document.getElementById('statusDot');
    dot.className = 'status-dot ' + type;
    document.getElementById('statusText').textContent = msg;
}

function showSpinner(show) { document.getElementById('spinner').classList.toggle('active', show); }

function toast(msg, isError) {
    const el = document.getElementById('toast');
    el.textContent = msg;
    el.className = 'show' + (isError ? ' error' : '');
    setTimeout(() => el.className = '', 3000);
}

// Info & Quality Rendering (Same as your original logic)
function renderInfo(url, data) {
    const grid = document.getElementById('infoGrid');
    grid.innerHTML = `
        <div class="info-item"><div class="info-label">Type</div><div class="info-value">HLS / M3U8</div></div>
        <div class="info-item"><div class="info-label">Levels</div><div class="info-value">${data ? data.levels.length : 'N/A'}</div></div>
        <div class="info-item" style="grid-column:1/-1"><div class="info-label">URL</div><div class="info-value">${url}</div></div>
    `;
}

function renderQuality(levels) {
    const list = document.getElementById('qualityList');
    list.innerHTML = levels.map((l, i) => `<div class="quality-item" onclick="hls.currentLevel=${i}">${l.height}p</div>`).join('');
}

function switchTab(tab) {
    document.getElementById('tabInfo').style.display = tab === 'info' ? 'block' : 'none';
    document.getElementById('tabQuality').style.display = tab === 'quality' ? 'block' : 'none';
}

function screenshot() {
    const canvas = document.createElement('canvas');
    canvas.width = video.videoWidth; canvas.height = video.videoHeight;
    canvas.getContext('2d').drawImage(video, 0, 0);
    const a = document.createElement('a'); a.download = 'capture.png'; a.href = canvas.toDataURL(); a.click();
}

// Local Storage for History/Favs
function addHistory(name, url) {
    let hist = JSON.parse(localStorage.getItem('m3u8_history') || '[]');
    hist = [{name, url}, ...hist.filter(h => h.url !== url)].slice(0, 10);
    localStorage.setItem('m3u8_history', JSON.stringify(hist));
    renderHistory();
}

function renderHistory() {
    const list = document.getElementById('historyList');
    const hist = JSON.parse(localStorage.getItem('m3u8_history') || '[]');
    list.innerHTML = hist.map(h => `<div class="entry-item" onclick="startPlayback('${h.url}','${h.name}')">${h.name}</div>`).join('');
}

function openFavModal() {
    document.getElementById('favUrl').value = document.getElementById('urlInput').value;
    document.getElementById('favModal').classList.add('open');
}

function closeFavModal() { document.getElementById('favModal').classList.remove('open'); }

function saveFavourite() {
    let favs = JSON.parse(localStorage.getItem('m3u8_favs') || '[]');
    favs.push({name: document.getElementById('favName').value, url: document.getElementById('favUrl').value});
    localStorage.setItem('m3u8_favs', JSON.stringify(favs));
    renderFavs(); closeFavModal();
}

function renderFavs() {
    const list = document.getElementById('favList');
    const favs = JSON.parse(localStorage.getItem('m3u8_favs') || '[]');
    list.innerHTML = favs.map(f => `<div class="entry-item" onclick="startPlayback('${f.url}','${f.name}')">${f.name}</div>`).join('');
}

window.onload = () => {
    renderHistory();
    renderFavs();
    if(typeof Hls !== 'undefined') document.getElementById('hlsVersion').textContent = 'hls.js v' + Hls.version;
};
</script>
</body>
</html>
