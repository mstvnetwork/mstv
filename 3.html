<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<title>Apna TV 24/7 - Cinema Mode</title>

<style>
    * { margin:0; padding:0; box-sizing:border-box; }
    body { margin: 0; background: #000; font-family: 'Segoe UI', sans-serif; color: #fff; }

    #main-content {
        display: flex;
        flex-direction: column;
        align-items: center;
        background: radial-gradient(circle at top, #111, #000);
        min-height: 100vh;
    }

    header { text-align:center; margin: 20px 10px 10px; }
    header h1 {
        font-size: 2.4rem; font-weight: 800;
        background: linear-gradient(90deg, #ff2d55, #ff8c00);
        -webkit-background-clip: text; -webkit-text-fill-color: transparent;
        text-shadow: 0 0 20px rgba(255,45,85,0.4);
    }
    header h2 { font-size: 1rem; color: #ccc; margin-top: 5px; }

    .player-wrapper {
        width: 100%; max-width: 1200px; aspect-ratio: 16 / 9;
        background: #000; border-radius: 12px; overflow: hidden;
        box-shadow: 0 0 40px rgba(255,0,0,0.25); margin: 15px; position: relative;
    }

    iframe { width: 100%; height: 100%; border: none; display: block; }

    /* Ticker Styling */
    #ticker {
        position: absolute; bottom: 0; left: 0;
        width: 100%; background: rgba(0, 0, 0, 0.6); 
        backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px);
        overflow: hidden; white-space: nowrap; z-index: 10000; padding: 10px 0;
        border-top: 1px solid rgba(255, 255, 255, 0.1);
    }
    #ticker span {
        display: inline-block; padding-left: 100%;
        animation: scroll 20s linear infinite;
        color: #ff3b3b; font-weight: 600; font-size: 15px;
    }
    @keyframes scroll {
        0% { transform: translateX(0); }
        100% { transform: translateX(-200%); }
    }

    .epg-section { width: 100%; max-width: 1200px; padding: 0 15px 10px; display: flex; gap: 14px; flex-wrap: wrap; }
    .epg-card { flex: 1; min-width: 240px; background: #1a1a1a; border: 1px solid #2a2a2a; border-radius: 12px; padding: 14px 16px; display: flex; align-items: center; gap: 14px; }
    .epg-card.live { border-color: #ff2d55; box-shadow: 0 0 14px rgba(255,45,85,0.2); }
    .epg-logo { width: 54px; height: 54px; border-radius: 10px; background: #111; flex-shrink: 0; display: flex; align-items: center; justify-content: center; overflow: hidden; }
    .epg-logo img { width: 100%; height: 100%; object-fit: cover; }
    .epg-info { flex: 1; min-width: 0; }
    .epg-badge { display: inline-flex; align-items: center; gap: 5px; font-size: 11px; font-weight: 600; padding: 3px 9px; border-radius: 20px; margin-bottom: 6px; text-transform: uppercase; }
    .epg-badge.live { background: rgba(255,45,85,0.15); color: #ff2d55; border: 1px solid rgba(255,45,85,0.3); }
    .epg-badge.next { background: rgba(255,255,255,0.08); color: #aaa; border: 1px solid rgba(255,255,255,0.12); }
    .live-dot { width: 7px; height: 7px; border-radius: 50%; background: #ff2d55; animation: blink 1.2s infinite; }
    @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }
    .epg-title { font-size: 0.95rem; font-weight: 600; color: #fff; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .epg-time { font-size: 0.8rem; color: #888; }

    .instructions { text-align:center; font-size: 0.85rem; color:#aaa; margin: 10px; }
    footer { width:100%; text-align:center; padding:20px; font-size:0.8rem; color:#555; border-top:1px solid #222; }
</style>
</head>
<body>

<div id="main-content">
    <header>
        <h1>Apna TV 24/7</h1>
        <h2>Premium Live Streaming Experience</h2>
    </header>

    <div class="player-wrapper">
        <div id="ticker"><span id="ticker-text">Loading EPG Schedule...</span></div>
        <iframe id="videoPlayer" sandbox="allow-scripts allow-same-origin allow-forms allow-presentation" allowfullscreen></iframe>
    </div>

    <div class="epg-section">
        <div class="epg-card live">
            <div class="epg-logo" id="logoNow">TV</div>
            <div class="epg-info">
                <div class="epg-badge live"><div class="live-dot"></div> Live now</div>
                <div class="epg-title" id="titleNow">Loading...</div>
                <div class="epg-time">Finishing At: <strong id="timeNow">--:--</strong></div>
            </div>
        </div>
        <div class="epg-card">
            <div class="epg-logo" id="logoNext">TV</div>
            <div class="epg-info">
                <div class="epg-badge next">Coming Up Next</div>
                <div class="epg-title" id="titleNext">Loading...</div>
                <div class="epg-time">Starts At: <strong id="timeNext">--:--</strong></div>
            </div>
        </div>
    </div>

    <div class="instructions">
        <p>If video doesn't load, please <strong>Refresh</strong> the page.</p>
    </div>
    <footer>© 2026 Apna TV. All Rights Reserved.</footer>
</div>

<script>
    const EPG_URL = "epg.json";
    const videoPlayer = document.getElementById("videoPlayer");
    const tickerText = document.getElementById("ticker-text");
    
    // Card Elements
    const titleNow = document.getElementById("titleNow");
    const timeNow  = document.getElementById("timeNow");
    const logoNow  = document.getElementById("logoNow");
    const titleNext = document.getElementById("titleNext");
    const timeNext  = document.getElementById("timeNext");
    const logoNext  = document.getElementById("logoNext");

    function getSeconds(timeStr) {
        const p = timeStr.split(':');
        return parseInt(p[0]) * 3600 + parseInt(p[1]) * 60 + parseInt(p[2] || 0);
    }

    function getCurrentISTSeconds() {
        const now = new Date().toLocaleTimeString('en-GB', { timeZone: 'Asia/Kolkata', hour12: false });
        return getSeconds(now);
    }

    function formatTime(timeStr) {
        return timeStr.substring(0, 5); 
    }

    function updateLogo(el, src) {
        el.innerHTML = src ? `<img src="${src}">` : 'TV';
    }

    async function syncEPG() {
        try {
            const response = await fetch(EPG_URL + "?t=" + Date.now());
            const data = await response.json();
            const schedule = data.schedule;
            const now = getCurrentISTSeconds();

            let currentShow = null;
            let nextShow = null;

            for (let i = 0; i < schedule.length; i++) {
                let start = getSeconds(schedule[i].start);
                let end = getSeconds(schedule[i].end);
                
                // Handle midnight crossover
                let isLive = (end < start) ? (now >= start || now < end) : (now >= start && now < end);

                if (isLive) {
                    currentShow = schedule[i];
                    nextShow = schedule[i + 1] || schedule[0];
                    break;
                }
            }

            if (currentShow) {
                // Update Player URL
                if (videoPlayer.src !== currentShow.url) {
                    videoPlayer.src = currentShow.url;
                }

                // Update UI Cards
                titleNow.innerText = currentShow.title;
                timeNow.innerText = formatTime(currentShow.end);
                updateLogo(logoNow, currentShow.logo);

                titleNext.innerText = nextShow.title;
                timeNext.innerText = formatTime(nextShow.start);
                updateLogo(logoNext, nextShow.logo);

                // Update Ticker
                const tickerContent = `Playing now - ${currentShow.title} | Coming next - ${nextShow.title} - Starting Time - ${formatTime(nextShow.start)}`;
                if (tickerText.innerText !== tickerContent) {
                    tickerText.innerText = tickerContent;
                }
            }
        } catch (e) {
            console.error("Sync Error:", e);
        }
    }

    // Run immediately and every 20 seconds
    syncEPG();
    setInterval(syncEPG, 20000);
</script>
</body>
</html>
