<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>24/7 Pseudo-Live Channel</title>
    <!-- Use HLS.js to play .m3u8 files in all browsers -->
    <script src="https://jsdelivr.net"></script>
    <style>
        body { margin: 0; background: #000; color: #fff; font-family: sans-serif; display: flex; flex-direction: column; align-items: center; height: 100vh; justify-content: center; }
        video { width: 90%; max-width: 900px; border: 2px solid #333; background: #000; }
        #status { margin-top: 10px; font-size: 14px; color: #888; }
    </style>
</head>
<body>

    <video id="video" controls autoplay muted playsinline></video>
    <div id="status">Syncing to live edge...</div>

    <script>
        // 1. YOUR CLOUDFLARE WORKER PROXY URL
        const proxy = "https://zee5.mchoudhry482.workers.dev/";

        // 2. PLAYLIST WITH MANUAL DURATIONS (in seconds)
        const playlist = [
            { url: 'https://s2.videoapne.to/hls/,bdohxegk7bboxuzvta2p4fids6ofv3evxlw2n7timwdcteyh6pzossoe24xa,.urlset/master.m3u8', duration: 15 },
            { url: 'https://videoapne.to', duration: 15 },
            { url: 'https://videoapne.to', duration: 15 }
        ];

        const video = document.getElementById('video');
        const status = document.getElementById('status');
        const totalLoopDuration = playlist.reduce((acc, vid) => acc + vid.duration, 0);
        let hls = null;
        let currentVideoIndex = -1;

        function syncAndPlay() {
            const now = Math.floor(Date.now() / 1000); // Current Unix Time
            let timeInLoop = now % totalLoopDuration;
            
            let cumulative = 0;
            let targetIndex = 0;
            let seekTo = 0;

            // Determine which video should be playing right now
            for (let i = 0; i < playlist.length; i++) {
                if (timeInLoop < cumulative + playlist[i].duration) {
                    targetIndex = i;
                    seekTo = timeInLoop - cumulative;
                    break;
                }
                cumulative += playlist[i].duration;
            }

            // Only reload HLS if the video has changed in the rotation
            if (targetIndex !== currentVideoIndex) {
                currentVideoIndex = targetIndex;
                const proxiedUrl = proxy + encodeURIComponent(playlist[targetIndex].url);
                loadHlsSource(proxiedUrl, seekTo);
            }
        }

        function loadHlsSource(url, startTime) {
            if (hls) hls.destroy();

            if (Hls.isSupported()) {
                hls = new Hls();
                hls.loadSource(url);
                hls.attachMedia(video);
                hls.on(Hls.Events.MANIFEST_PARSED, () => {
                    video.currentTime = startTime; // The "Magic" Sync Step
                    video.play();
                    status.innerText = "Playing Video " + (currentVideoIndex + 1) + " (Synced)";
                });
            } else if (video.canPlayType('application/vnd.apple.mpegurl')) {
                // Native support (Safari/iOS)
                video.src = url;
                video.addEventListener('loadedmetadata', () => {
                    video.currentTime = startTime;
                    video.play();
                });
            }
        }

        // Check for video rotation every 2 seconds
        setInterval(syncAndPlay, 2000);
        syncAndPlay();
    </script>
</body>
</html>
