<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<title>Apna TV 24/7 - Cinema Mode</title>

<style>
    * { margin:0; padding:0; box-sizing:border-box; }
    body { margin: 0; background: #000; font-family: 'Segoe UI', sans-serif; }

    /* --- Fallback Screen --- */
    #not-chrome {
        display: flex; flex-direction: column; align-items: center; justify-content: center;
        min-height: 100vh; background: radial-gradient(circle at top, #111, #000);
        color: #fff; text-align: center; padding: 40px 20px;
    }
    #not-chrome h1 { color: #ff3b3b; margin-bottom: 12px; }
    .download-btn {
        margin-top: 22px; display: inline-block; padding: 12px 30px;
        background: linear-gradient(90deg, #4285f4, #34a853); color: #fff;
        border-radius: 40px; text-decoration: none; font-weight: 600;
    }

    /* --- Main Content --- */
    #main-content {
        display: none; /* Hidden by default, shown via JS if Chrome */
        flex-direction: column; align-items: center;
        background: radial-gradient(circle at top, #111, #000);
        min-height: 100vh; color: #fff;
    }

    header { text-align:center; margin: 20px 10px 10px; }
    header h1 {
        font-size: 2.4rem; font-weight: 800;
        background: linear-gradient(90deg, #ff2d55, #ff8c00);
        -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    }

    .player-wrapper {
        width: 100%; max-width: 1200px; aspect-ratio: 16 / 9;
        background: #000; border-radius: 12px; overflow: hidden;
        box-shadow: 0 0 40px rgba(255,0,0,0.25); margin: 15px; position: relative;
    }

    iframe { width: 100%; height: 100%; border: none; display: block; }

    /* --- Seamless Ticker --- */
    #ticker {
        position: absolute; bottom: 0; left: 0;
        width: 100%; background: rgba(0, 0, 0, 0.7); 
        backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px);
        overflow: hidden; white-space: nowrap; z-index: 10000; padding: 12px 0;
    }
    #ticker span {
        display: inline-block;
        padding-left: 100%;
        animation: scroll 25s linear infinite; /* Higher seconds = Slower speed */
        color: #ff3b3b; font-weight: 600; font-size: 15px;
    }
    @keyframes scroll {
        0% { transform: translateX(0); }
        100% { transform: translateX(-100%); } /* Fixed: Moves exactly to end of text */
    }

    .epg-section { width: 100%; max-width: 1200px; padding: 0 15px 10px; display: flex; gap: 14px; flex-wrap: wrap; }
    .epg-card { flex: 1; min-width: 240px; background: #1a1a1a; border: 1px solid #2a2a2a; border-radius: 12px; padding: 14px 16px; display: flex; align-items: center; gap: 14px; }
    .epg-card.live { border-color: #ff2d55; }
    .epg-logo { width: 54px; height: 54px; border-radius: 10px; background: #111; display: flex; align-items: center; justify-content: center; overflow: hidden; }
    .epg-logo img { width: 100%; height: 100%; object-fit: cover; }
    .epg-info { flex: 1; min-width: 0; }
    .epg-badge { font-size: 11px; font-weight: 600; padding: 3px 9px; border-radius: 20px; margin-bottom: 6px; text-transform: uppercase; display: inline-flex; align-items: center; gap: 5px;}
    .epg-badge.live { background: rgba(255,45,85,0.15); color: #ff2d55; border: 1px solid rgba(255,45,85,0.3); }
    .epg-badge.next { background: rgba(255,255,255,0.08); color: #aaa; }
    .live-dot { width: 7px; height: 7px; border-radius: 50%; background: #ff2d55; animation: blink 1.2s infinite; }
    @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }
    .epg-title { font-size: 0.95rem; font-weight: 600; color: #fff; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .epg-time { font-size: 0.8rem; color: #888; }
    footer { width:100%; text-align:center; padding:20px; font-size:0.8rem; color:#555; }
</style>
</head>
<body>

<!-- FALLBACK -->
<div id="not-chrome">
    <h1>Google Chrome Required</h1>
    <p>Apna TV is optimised exclusively for Google Chrome.</p>
    <a class="download-btn" href="https://google.com" target="_blank">Download Chrome</a>
</div>

<!-- MAIN CONTENT -->
<div id="main-content">
    <header>
        <h1>Apna TV 24/7</h1>
    </header>

    <div class="player-wrapper">
        <div id="ticker"><span id="ticker-text">Loading Schedule...</span></div>
        <iframe id="videoPlayer" sandbox="allow-scripts allow-same-origin allow-forms allow-presentation" allowfullscreen></iframe>
    </div>

    <div class="epg-section">
        <div class="epg-card live">
            <div class="epg-logo" id="logoNow">TV</div>
            <div class="epg-info">
                <div class="epg-badge live"><div class="live-dot"></div> Live now</div>
                <div class="epg-title" id="titleNow">Loading...</div>
                <div class="epg-time">Finishing At: <strong id="timeNow">--:--</strong></div>
            </div>
        </div>
        <div class="epg-card">
            <div class="epg-logo" id="logoNext">TV</div>
            <div class="epg-info">
                <div class="epg-badge next">Coming Up Next</div>
                <div class="epg-title" id="titleNext">Loading...</div>
                <div class="epg-time">Starts At: <strong id="timeNext">--:--</strong></div>
            </div>
        </div>
    </div>
    <footer>© 2026 Apna TV. All Rights Reserved.</footer>
</div>

<script>
/* 1. CHROME DETECTION LOGIC */
function isGoogleChrome() {
    const ua = navigator.userAgent;
    const isChrome = /Chrome\//.test(ua);
    const isEdge = /Edg\//.test(ua);
    const isOpera = /OPR\//.test(ua);
    const isBrave = (navigator.brave !== undefined);
    // Returns true only if it's Chrome and not Edge, Opera, or Brave
    return isChrome && !isEdge && !isOpera && !isBrave;
}

if (isGoogleChrome()) {
    document.getElementById("not-chrome").style.display = "none";
    document.getElementById("main-content").style.display = "flex";
    initPlayer();
}

/* 2. EPG & TICKER LOGIC */
function initPlayer() {
    const EPG_URL = "epg.json";
    const videoPlayer = document.getElementById("videoPlayer");
    const tickerText = document.getElementById("ticker-text");
    
    function getSeconds(t) {
        const p = t.split(':');
        return (+p[0]) * 3600 + (+p[1]) * 60 + (+p[2] || 0);
    }

    function getCurrentISTSeconds() {
        const now = new Date().toLocaleTimeString('en-GB', { timeZone: 'Asia/Kolkata', hour12: false });
        return getSeconds(now);
    }

    async function syncEPG() {
        try {
            const res = await fetch(EPG_URL + "?v=" + Date.now());
            const data = await res.json();
            const schedule = data.schedule;
            const now = getCurrentISTSeconds();

            let current = null, next = null;

            for (let i = 0; i < schedule.length; i++) {
                let start = getSeconds(schedule[i].start);
                let end = getSeconds(schedule[i].end);
                let isLive = (end < start) ? (now >= start || now < end) : (now >= start && now < end);

                if (isLive) {
                    current = schedule[i];
                    next = schedule[i + 1] || schedule[0];
                    break;
                }
            }

            if (current) {
                if (videoPlayer.src !== current.url) videoPlayer.src = current.url;

                document.getElementById("titleNow").innerText = current.title;
                document.getElementById("timeNow").innerText = current.end.substring(0,5);
                document.getElementById("logoNow").innerHTML = `<img src="${current.logo}">`;

                document.getElementById("titleNext").innerText = next.title;
                document.getElementById("timeNext").innerText = next.start.substring(0,5);
                document.getElementById("logoNext").innerHTML = `<img src="${next.logo}">`;

                const newTicker = `Playing now - ${current.title} | Coming next - ${next.title} - Starting Time - ${next.start.substring(0,5)}`;
                if (tickerText.innerText !== newTicker) {
                    tickerText.innerText = newTicker;
                }
            }
        } catch (e) { console.error(e); }
    }

    syncEPG();
    setInterval(syncEPG, 30000);
}
</script>
</body>
</html>
