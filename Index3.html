<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MSTV Network | Live TV</title>
    <style>
        :root {
            --bg-dark: #0F1115;
            --accent: #90EE90;
            --header-h: 70px;
            --player-y: 70px;
            --text-dim: #555;
        }

        html { 
            scroll-padding-top: 380px; 
            scroll-behavior: smooth;
        }

        body {
            background-color: #E8E4C9 !important;
            margin: 0; padding: 0;
            font-family: Arial, sans-serif;
            font-display: swap; /* Fixes text-shift */
        }

        /* 1. STICKY HEADER */
        header {
            position: sticky;
            top: 0;
            z-index: 1000;
            background: #111419;
            height: var(--header-h);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 5%;
            border-bottom: 1px solid #222;
        }

        .logo-section { display: flex; flex-direction: column; }
        .brand-name {
            font-size: 1.4rem;
            font-weight: bold;
            background: linear-gradient(90deg, #90EE90, #00FFA3);
            -webkit-background-clip: text;
            color: transparent;
            line-height: 1;
        }
        .slogan { font-size: 0.7rem; color: yellow; margin-top: 4px; }

        .search-container { flex-grow: 0.4; max-width: 350px; }
        .search-container input {
            width: 100%;
            padding: 10px 15px;
            border-radius: 25px;
            border: 1px solid #333;
            background: #1A1D20;
            color: white;
            outline: none;
        }

        /* 2. STICKY PLAYER - Fixed Min-Height to stop CLS */
        .sticky-player-wrapper {
            position: sticky;
            top: var(--player-y);
            z-index: 900;
            background: #E8E4C9;
            padding: 15px 0;
            width: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            border-bottom: 1px solid #ccc;
            min-height: 280px; 
        }

        .player-container {
            position: relative;
            width: 92%;
            max-width: 600px;
            aspect-ratio: 16/9;
            background: black;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
        }

        video, iframe { position: absolute; top: 0; left: 0; width: 100%; height: 100%; border: none; display: none; }
        #placeholder { height: 100%; display: flex; align-items: center; justify-content: center; font-size: 5rem; color: var(--accent); }
        
        #loading {
            position: absolute; top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            z-index: 100;
            background: rgba(0, 0, 0, 0.8);
            padding: 12px 24px;
            border-radius: 30px;
            border: 1px solid var(--accent);
            color: var(--accent);
            font-weight: bold;
            display: none;
        }

        #live-stamp { position: absolute; top: 10px; left: 10px; background: #E50914; color: white; padding: 5px 12px; border-radius: 5px; font-size: 0.75rem; font-weight: bold; z-index: 50; display: none; }

        /* 3. CHANNEL GRID - Fixed sizes to stop CLS */
        .channel-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(95px, 1fr));
            gap: 12px;
            padding: 20px 5%;
        }

        .channel-card {
            background: #E8E4C9;
            border-radius: 10px;
            padding: 8px 6px;
            text-align: center;
            cursor: pointer;
            border: 1px solid #d6d6d6;
            transition: all .18s ease;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 110px; 
        }

        .channel-card:hover {
            transform: translateY(-4px);
            border-color: #90EE90;
            box-shadow: 0 6px 14px rgba(0,0,0,.08);
        }

        .channel-card.active { border: 2px solid #90EE90; }

        .card-logo {
            width: 100%;
            height: 64px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 6px;
            background: rgba(0,0,0,0.02); /* Placeholder look while loading */
            border-radius: 6px;
        }

        .card-logo img {
            width: 95px;
            height: 64px;
            object-fit: contain;
            display: block;
            filter: drop-shadow(0px 2px 3px rgba(0,0,0,0.1)); 
        }

        .channel-name {
            font-size: 11px;
            font-weight: 600;
            color: #334155;
            line-height: 1.2;
            height: 2.4em;
            overflow: hidden;
        }

        .site-footer { padding: 40px 5%; text-align: center; font-size: 0.9rem; color: #444; border-top: 1px solid #ccc; }
    </style>
</head>
<body style="background-color: #E8E4C9;">

<header>
    <div class="logo-section">
        <div class="brand-name">MSTV NETWORK</div>
        <div class="slogan">LIVE INDIAN PAKISTANI & ENGLISH CHANNELS</div>
    </div>
    <div class="search-container">
        <input type="text" id="channel-search" placeholder="Search channels...">
    </div>
</header>

<div class="sticky-player-wrapper">
    <div class="player-container">
        <div id="loading">🌀 Buffering...</div>
        <div id="live-stamp">Mstv Network</div>
        <div id="placeholder">📺</div>
        <video id="video-player" autoplay playsinline controls></video>
        <iframe id="iframe-player" sandbox="allow-scripts allow-same-origin allow-presentation" allow="autoplay; encrypted-media"></iframe>
    </div>
</div>

<main>
    <select id="channel-select" style="display:none;"></select>
    <div class="channel-grid" id="channel-list-container"></div>
</main>

<footer class="site-footer">
    <div class="seo-content">
        <h2>MSTV Network: Premium Live Media Hub</h2>
        <p>Experience the best in digital broadcasting with <strong>MSTV Network</strong>.</p>
        <div style="margin-top: 25px; padding: 15px; border: 1px solid #333; border-radius: 8px; background: rgba(255,255,255,0.05);">
            <p style="font-size: 0.85rem; color: #aaa; margin: 0;"><strong>Disclaimer:</strong> Content property of original owners.</p>
        </div>
    </div>
    <div class="footer-bottom"><p>© 2026 MSTV Network. All Rights Reserved.</p></div>
</footer>

<script>
const select = document.getElementById('channel-select');
const video = document.getElementById('video-player');
const iframe = document.getElementById('iframe-player');
const placeholder = document.getElementById('placeholder');
const loader = document.getElementById('loading');
const liveStamp = document.getElementById('live-stamp');
const gridContainer = document.getElementById('channel-list-container');
const searchInput = document.getElementById('channel-search');
const JSON_URL = './channels.json';

let channels = [];
let hls = null;
let shakaPlayer = null;

function updateLiveSchema(data) {
    const oldSchema = document.getElementById('mstv-dynamic-schema');
    if (oldSchema) oldSchema.remove();
    try {
        const fullSchema = {
          "@context": "https://schema.org",
          "@type": "ItemList",
          "name": "MSTV Network Live Channels",
          "itemListElement": data.map((ch, i) => ({
            "@type": "ListItem",
            "position": i + 1,
            "item": {
                "@type": "VideoObject",
                "name": ch.name,
                "thumbnailUrl": [ch.logo || "https://mstvnet.netlify.app"],
                "uploadDate": "2024-01-01T08:00:00+00:00",
                "embedUrl": `https://mstvnet.netlify.app{encodeURIComponent(ch.name)}`,
                "publication": { "@type": "BroadcastEvent", "isLiveBroadcast": true, "startDate": new Date().toISOString() }
            }
          }))
        };
        const script = document.createElement('script');
        script.id = 'mstv-dynamic-schema';
        script.type = 'application/ld+json';
        script.text = JSON.stringify(fullSchema);
        document.head.appendChild(script);
    } catch (e) { console.error(e); }
}

function updateMetaTags(channel) {
    const siteTitle = `${channel.name} Live | MSTV Network`;
    document.title = siteTitle;
    const url = `https://mstvnet.netlify.app{encodeURIComponent(channel.name)}`;
    document.querySelector('link[rel="canonical"]')?.setAttribute("href", url);
}

async function stopAll() {
  if(loader) loader.style.display = 'none';
  if(liveStamp) liveStamp.style.display = 'none';
  if(hls){ hls.destroy(); hls = null; }
  if(shakaPlayer){ await shakaPlayer.destroy(); shakaPlayer = null; }
  video.pause(); video.removeAttribute('src'); video.load();
  iframe.removeAttribute('src'); iframe.src = 'about:blank';
  video.style.display = 'none'; iframe.style.display = 'none';
  placeholder.style.display = 'flex';
}

function renderUI(data) {
  channels = data;
  if(gridContainer) gridContainer.innerHTML = ''; 
  updateLiveSchema(data);

  data.forEach((ch, i) => {
    const card = document.createElement('div');
    card.className = 'channel-card';
    card.setAttribute('data-name', ch.name.toLowerCase());
    
    const logoSrc = ch.logo || "https://mstvnet.netlify.app";
    card.innerHTML = `
      <div class="card-logo">
        <img src="${logoSrc}" alt="${ch.name}" width="95" height="64" loading="lazy" 
        onerror="this.src='https://mstvnet.netlify.app';">
      </div>
      <div class="channel-name">${ch.name}</div>
    `;
    
    card.onclick = () => { playChannel(i); window.scrollTo({top: 0, behavior: 'smooth'}); };
    gridContainer.appendChild(card);
  });

  const hash = decodeURIComponent(window.location.hash.substring(1));
  if (hash) {
      const index = data.findIndex(ch => ch.name === hash);
      if (index !== -1) playChannel(index);
  }
}

// SEARCH FILTER LOGIC
searchInput.addEventListener('input', (e) => {
    const term = e.target.value.toLowerCase();
    const cards = document.querySelectorAll('.channel-card');
    cards.forEach(card => {
        const name = card.getAttribute('data-name');
        card.style.display = name.includes(term) ? 'flex' : 'none';
    });
});

async function playChannel(index){
  const channel = channels[index];
  if(!channel) return;
  updateMetaTags(channel);
  window.location.hash = encodeURIComponent(channel.name);
  await stopAll();
  if(loader) loader.style.display = 'block';
  placeholder.style.display = 'none';
  if(liveStamp) liveStamp.style.display = channel.isLive ? 'block' : 'none';

  if(channel.type === 'iframe'){
    iframe.style.display = 'block'; iframe.src = channel.url;
    return;
  }

  video.style.display = 'block';
  const isHls = channel.type === 'hls' || (channel.url && channel.url.includes('.m3u8'));
  if(isHls){
    if(window.Hls && Hls.isSupported()){
      hls = new Hls({ enableWorker:true, lowLatencyMode:true });
      hls.loadSource(channel.url); hls.attachMedia(video);
      hls.on(Hls.Events.MANIFEST_PARSED, ()=> video.play());
    } else if(video.canPlayType('application/vnd.apple.mpegurl')){
      video.src = channel.url; video.play();
    }
  } else if(window.shaka && shaka.Player.isBrowserSupported()){
    shakaPlayer = new shaka.Player(video);
    try{ await shakaPlayer.load(channel.url); video.play(); } catch(e){ console.error(e); }
  }
}

video.onplaying = () => { if(loader) loader.style.display = 'none'; };
iframe.onload = () => { if(loader) loader.style.display = 'none'; };

async function loadChannels(){
  try {
    const res = await fetch(JSON_URL, { cache: 'no-cache' });
    const data = await res.json();
    renderUI(data);
  } catch(e){ console.error('Load fail', e); }
}
loadChannels();
</script>
<script data-goatcounter="https://mstv.goatcounter.com" async src="//gc.zgo.at/count.js"></script>
</body>
</html>
