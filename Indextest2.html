

<style>
*{margin:0;padding:0;box-sizing:border-box}

:root{
--bg-dark:#111419;
--accent:#2ECC71;
--header-h:70px;
--ticker-h:30px;
}

body{
font-family:system-ui,-apple-system,sans-serif;
background:#F8F9FA;
color:#212529;
overflow-x:hidden;
}

/* HEADER */
header{
height:var(--header-h);
background:var(--bg-dark);
display:flex;
align-items:center;
justify-content:space-between;
padding:0 15px;
position:sticky;
top:0;
z-index:1000;
}

.brand-name{
font-size:1.25rem;
font-weight:800;
color:var(--accent);
}

.search-container{flex:0.6;max-width:200px}

#searchInput{
width:100%;
padding:12px 15px;
border-radius:20px;
border:1px solid #444;
background:#1A1D20;
color:#fff;
font-size:16px;
}

/* PLAYER */
.sticky-player-wrapper{
position:sticky;
top:var(--header-h);
background:#000;
width:100%;
z-index:900;
}

.player-container{
width:100%;
aspect-ratio:16/9;
background:#000;
position:relative;
contain:none;
}

/* PERFECT CENTER PLACEHOLDER */
#placeholder{
position:absolute;
inset:0;
display:flex;
align-items:center;
justify-content:center;
font-size:3rem;
background:#000;
}

/* MEDIA */
#video,#iframePlayer{
position:absolute;
top:0;
left:0;
width:100%;
height:100%;
display:none;
object-fit:cover;
}

/* TICKER (no animation delay at paint) */
.ticker{
width:100%;
height:var(--ticker-h);
background:#D00000;
color:#fff;
display:flex;
align-items:center;
overflow:hidden;
font-size:0.8rem;
}

.ticker-track{
display:flex;
white-space:nowrap;
animation:ticker-loop 15s linear infinite;
}

@keyframes ticker-loop{
0%{transform:translateX(0)}
100%{transform:translateX(-50%)}
}

/* TITLE (FORCED EARLY PAINT) */
.title-area{
padding:20px;
text-align:center;
contain:none;
}

#current-title{
font-size:1.2rem;
font-weight:700;
content-visibility:visible !important;
contain:none !important;
}

/* GRID (below fold only optimization) */
.channel-grid{
display:grid;
grid-template-columns:repeat(auto-fill,minmax(130px,1fr));
grid-auto-rows:95px;
gap:20px;
padding:0 20px 60px;
content-visibility:auto;
contain-intrinsic-size:400px;
}

.channel-card{
background:#fff;
border:1px solid #ddd;
border-radius:12px;
display:flex;
align-items:center;
justify-content:center;
padding:15px;
cursor:pointer;
}

.channel-name{
font-size:0.95rem;
font-weight:700;
text-align:center;
}
  @media (max-width: 900px) and (orientation: landscape) {
  header, .sticky-player-wrapper { position: relative; top: 0; }
 }
</style>
</head>

<body>

<header>
<h1 class="brand-name">MSTV NETWORK</h1>
<div class="search-container">
<input type="text" id="searchInput" placeholder="Search channels...">
</div>
</header>

<div class="sticky-player-wrapper">
<section class="player-container">

<!-- CENTERED PLACEHOLDER -->
<div id="placeholder">📺</div>

<video id="video" playsinline controls></video>
<iframe id="iframePlayer" allow="autoplay; fullscreen;"></iframe>

</section>

<div class="ticker">
<div class="ticker-track">
<div>Use VPN with Australia server for blocked channels.</div>
<div>Use VPN with Australia server for blocked channels.</div>
</div>
</div>
</div>

<main>
<div class="title-area">
<h2 id="current-title">Select Channel & Play</h2>
</div>

<div class="channel-grid" id="channelList"></div>
</main>

<script>
let allCh=[],hlsE=null,scP=null;

const v=document.getElementById('video'),
f=document.getElementById('iframePlayer'),
l=document.getElementById('channelList'),
t=document.getElementById('current-title'),
ph=document.getElementById('placeholder');

/* LOAD PLAYERS */
function loadS(){
if(scP)return scP;
scP=new Promise(res=>{
let c=0;
const done=()=>{if(++c===2)res();};

const s1=document.createElement('script');
s1.src="https://cdn.jsdelivr.net/npm/hls.js@1.4.12/dist/hls.min.js";
s1.async=true;
s1.onload=done;

const s2=document.createElement('script');
s2.src="https://cdnjs.cloudflare.com/ajax/libs/shaka-player/4.3.5/shaka-player.compiled.js";
s2.async=true;
s2.onload=()=>{window.shaka.polyfill.installAll();done();};

document.head.append(s1,s2);
});
return scP;
}

/* PLAY */
async function play(ch){
if(!ch||!ch.url)return;

if(hlsE){hlsE.destroy();hlsE=null;}

v.pause();
v.removeAttribute("src");
v.load();

ph.style.display='none';
t.textContent=ch.name;

v.style.display='none';
f.style.display='none';
f.src="";

if(ch.type==='iframe'||(!ch.url.includes('.m3u8')&&!ch.url.includes('.mpd'))){
f.style.display='block';
f.src=ch.url;
return;
}

await loadS();

if(ch.url.includes('.mpd')){
const p=new shaka.Player(v);
try{
await p.load(ch.url);
v.style.display='block';
}catch(e){}
}
else if(window.Hls&&Hls.isSupported()){
hlsE=new Hls({lowLatencyMode:true});
hlsE.loadSource(ch.url);
hlsE.attachMedia(v);
hlsE.on(Hls.Events.MANIFEST_PARSED,()=>{
v.play().catch(()=>{});
v.style.display='block';
});
}
}

/* FETCH IMMEDIATELY */
fetch('channels2.json')
.then(r=>r.json())
.then(data=>{
allCh=data;
render(allCh);
});

/* RENDER */
function render(data){
const fr=document.createDocumentFragment();
data.forEach(ch=>{
const b=document.createElement('div');
b.className='channel-card';
b.innerHTML=`<span class="channel-name">${ch.name}</span>`;
b.onclick=()=>play(ch);
fr.appendChild(b);
});
l.innerHTML='';
l.appendChild(fr);
}

/* SEARCH */
document.getElementById('searchInput').oninput=e=>{
render(allCh.filter(c=>c.name.toLowerCase().includes(e.target.value.toLowerCase())));
};
</script>

</body>
</html>
