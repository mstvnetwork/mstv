<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MSTV | PLAYER</title>
    <style>
        :root { --accent: #22c55e; }
        body { margin: 0; background: #000; color: #fff; font-family: sans-serif; overflow-x: hidden; }

        /* THE SCREEN (Fixed/Sticky at the top) */
        #screen-area { 
            position: sticky; top: 0; width: 100%; 
            height: 56.25vw; background: #000; z-index: 1000; 
            border-bottom: 2px solid #222;
        }
        #broadcastFrame { width: 100%; height: 100%; border: none; overflow: hidden; }

        /* THE CATALOG (Manual Grid) */
        #catalog { padding: 20px; display: grid; grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 10px; }
        
        .card { 
            background: #111; border: 1px solid #333; border-radius: 8px; 
            padding: 25px 10px; text-align: center; cursor: pointer; 
            font-weight: 800; text-transform: uppercase; font-size: 11px;
            transition: 0.2s; color: #777;
        }
        
        .card:hover, .card:active { border-color: var(--accent); color: #fff; transform: scale(0.95); }
    </style>
</head>
<body>

    <div id="screen-area">
        <iframe id="broadcastFrame" src="player.html#1" allow="autoplay; fullscreen"></iframe>
    </div>

    <div id="catalog">
        <div class="card" onclick="tune(1)">Star Plus</div>
        <div class="card" onclick="tune(2)">9x Jalwa</div>
        <div class="card" onclick="tune(3)">Star Movies</div>
        <div class="card" onclick="tune(4)">Sony Pal</div>
    </div>

    <script>
        function tune(id) {
            const frame = document.getElementById('broadcastFrame');
            // Tells the broadcaster to switch to this ID
            frame.src = `/shaka/player.html#${id}`;
            // Smooth scroll back to the player
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }
    </script>
</body>
</html>
