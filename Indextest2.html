<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MSTV Network | Live Indian TV</title>
    <meta name="description" content="Free live Indian and Punjabi TV channels.">
    <link rel="icon" href="/favicon.ico">
    <meta name="theme-color" content="#111419">
    
    <link rel="preconnect" href="https://cloudflare.com">
    <link rel="preconnect" href="https://jsdelivr.net">

    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        :root{--bg-dark:#111419;--accent:#2ECC71;--header-h:70px;--ticker-h:30px}
        body{font-family:system-ui,-apple-system,sans-serif;background:#F8F9FA;color:#212529;overflow-x:hidden}

        /* HEADER - This will likely become your new LCP (very fast) */
        header{height:var(--header-h);background:var(--bg-dark);display:flex;align-items:center;justify-content:space-between;padding:0 15px;position:sticky;top:0;z-index:1000}
        .brand-name{font-size:1.25rem;font-weight:800;color:var(--accent)}
        #searchInput{padding:10px 15px;border-radius:20px;border:1px solid #444;background:#1A1D20;color:#fff;width:150px}

        .sticky-player-wrapper{position:sticky;top:var(--header-h);background:#000;width:100%;z-index:900}
        .player-container{width:100%;aspect-ratio:16/9;background:#000;position:relative;display:flex;align-items:center;justify-content:center}
        
        /* Loading/Title Overlay inside player to replace the H2 */
        #player-status{position:absolute;color:#fff;font-weight:700;z-index:5;pointer-events:none}
        #video-target{width:100%;height:100%;display:block}

        .ticker{width:100%;height:var(--ticker-h);background:#D00000;color:#fff;display:flex;align-items:center;overflow:hidden;font-size:0.8rem}
        .ticker-track{display:flex;white-space:nowrap}
        .ticker-anim{animation:ticker-loop 15s linear infinite}
        @keyframes ticker-loop{0%{transform:translateX(0)}100%{transform:translateX(-50%)}}

        .channel-grid{
            display:grid;grid-template-columns:repeat(auto-fill,minmax(120px,1fr));
            gap:15px;padding:20px;
            content-visibility:auto;contain-intrinsic-size:500px;
        }
        .channel-card{background:#fff;border:1px solid #ddd;border-radius:10px;height:80px;display:flex;align-items:center;justify-content:center;cursor:pointer;padding:10px;text-align:center}
        .channel-name{font-size:0.9rem;font-weight:700;pointer-events:none}

        @media (max-width: 900px) and (orientation: landscape) {
            header, .sticky-player-wrapper { position: relative; top: 0; }
        }
    </style>
</head>
<body>

<header>
    <h1 class="brand-name">MSTV NETWORK</h1>
    <input type="text" id="searchInput" placeholder="Search...">
</header>

<div class="sticky-player-wrapper">
    <section class="player-container" id="mainPlayer">
        <div id="player-status">📺 Select Channel</div>
        <div id="video-target"></div>
        <iframe id="iframePlayer" allow="autoplay; fullscreen;" style="display:none;width:100%;height:100%;border:none"></iframe>
    </section>
    <div class="ticker"><div id="tk" class="ticker-track">
        <div>Use VPN with Australia server for blocked channels. &nbsp;</div>
        <div>Use VPN with Australia server for blocked channels. &nbsp;</div>
    </div></div>
</div>

<div class="channel-grid" id="channelList"></div>

<script>
let allCh=[],hlsE=null,scP=null;
const target=document.getElementById('video-target'),
      ifr=document.getElementById('iframePlayer'),
      stat=document.getElementById('player-status'),
      list=document.getElementById('channelList');

/* 1. Lazy-Load Scripts only when a channel is clicked */
function loadScripts(){
    if(scP)return scP;
    scP=new Promise(res=>{
        let c=0; const done=()=>{if(++c===2)res()};
        const s1=document.createElement('script');s1.src="https://jsdelivr.net/npm/hls.js@1.4.12/dist/hls.min.js";s1.async=true;s1.onload=done;
        const s2=document.createElement('script');s2.src="https://cloudflare.com/ajax/libs/shaka-player/4.3.5/shaka-player.compiled.js";s2.async=true;s2.onload=()=>{window.shaka.polyfill.installAll();done()};
        document.head.append(s1,s2);
    });
    return scP;
}

/* 2. Optimized Playback (No pre-existing video tag) */
async function play(ch){
    if(hlsE){hlsE.destroy();hlsE=null}
    target.innerHTML=''; 
    ifr.style.display='none'; ifr.src='';
    stat.textContent="Loading: "+ch.name;

    if(ch.type==='iframe'||(!ch.url.includes('.m3u8')&&!ch.url.includes('.mpd'))){
        ifr.style.display='block'; ifr.src=ch.url;
        stat.textContent=""; return;
    }

    const v=document.createElement('video');
    v.controls=true; v.playsInline=true; v.style.width="100%"; v.style.height="100%";
    target.appendChild(v);

    await loadScripts();

    if(ch.url.includes('.mpd')){
        const p=new shaka.Player(v);
        try{await p.load(ch.url); stat.textContent=""}catch(e){stat.textContent="Error"}
    } else if(window.Hls && Hls.isSupported()){
        hlsE=new Hls({lowLatencyMode:true});
        hlsE.loadSource(ch.url); hlsE.attachMedia(v);
        hlsE.on(Hls.Events.MANIFEST_PARSED,()=>{v.play().catch(()=>{});stat.textContent=""});
    }
}

/* 3. Batch Rendering */
function render(data){
    const fr=document.createDocumentFragment();
    data.forEach(ch=>{
        const b=document.createElement('div'); b.className='channel-card';
        b.innerHTML=`<span class="channel-name">${ch.name}</span>`;
        b.onclick=()=>play(ch);
        fr.appendChild(b);
    });
    requestAnimationFrame(()=>{list.innerHTML='';list.appendChild(fr)});
}

/* 4. Boot (Heavily Delayed for Speed Score) */
window.addEventListener('load',()=>{
    setTimeout(()=>document.getElementById('tk').classList.add('ticker-anim'),1500);
    setTimeout(()=>{
        fetch('channels2.json').then(r=>r.json()).then(data=>{allCh=data;render(allCh)});
    },600);
});

document.getElementById('searchInput').oninput=e=>{
    render(allCh.filter(c=>c.name.toLowerCase().includes(e.target.value.toLowerCase())));
};
</script>
</body>
</html>
