<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MSTV OFFICIAL</title>
    <style>
        body { margin: 0; background: #000; color: #fff; font-family: sans-serif; }
        #stage { position: sticky; top: 0; width: 100%; height: 56.25vw; background: #000; z-index: 1000; }
        iframe { width: 100%; height: 100%; border: none; }
        #catalog { padding: 15px; display: grid; grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 10px; }
        .card { background: #111; border: 1px solid #333; padding: 15px; text-align: center; border-radius: 8px; cursor: pointer; }
        .card:active { border-color: #22c55e; }
    </style>
</head>
<body>
    <div id="stage"><iframe id="player" src="player.html#1"></iframe></div>
    <div id="catalog"></div>
    <script>
        const catalog = document.getElementById('catalog');
        const player = document.getElementById('player');
        async function init() {
            const res = await fetch('channels2.json');
            const data = await res.json();
            data.forEach((ch, i) => {
                const div = document.createElement('div');
                div.className = 'card';
                div.textContent = ch.name;
                div.onclick = () => {
                    player.src = `player.html#${i + 1}`;
                    window.scrollTo({ top: 0, behavior: 'smooth' });
                };
                catalog.appendChild(div);
            });
        }
        init();
    </script>
</body>
</html>
