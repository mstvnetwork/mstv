<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MSTV NETWORK | AI FINAL CORE 100</title>

    <link rel="preload" href="channels2.json" as="fetch" crossorigin="anonymous">
    
    <style>
        :root { --bg: #020617; --accent: #38bdf8; --card: #1e293b; --text: #f8fafc; }
        
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { background: var(--bg); color: var(--text); font-family: system-ui, sans-serif; margin: 0; padding: 0; display: flex; flex-direction: column; height: 100vh; width: 100vw; overflow: hidden; }
        
        .ui-core { z-index: 30; background: var(--bg); flex-shrink: 0; width: 100%; }
        .info-bar { background: #000; padding: 8px; text-align: center; font-size: 0.75rem; color: var(--accent); border-bottom: 1px solid #1e293b; }
        .header { padding: 10px; text-align: center; background: #0f172a; }
        .brand { font-size: 1.2rem; font-weight: 900; color: var(--accent); margin: 0; }

        .player-viewport { width: 100%; aspect-ratio: 16 / 9; background: #000; position: relative; display: flex; align-items: center; justify-content: center; flex-shrink: 0; z-index: 20; }
        video, #iframePlayer { width: 100%; height: 100%; background: #000; object-fit: contain; display: none; border: none; }
        #placeholder { font-size: 3rem; position: absolute; z-index: 1; pointer-events: none; }

        main { flex-grow: 1; overflow-y: auto; padding-bottom: 20px; width: 100%; background: var(--bg); }
        
        /* THE ACCESSIBLE GRID */
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(130px, 1fr)); gap: 12px; padding: 15px; margin: 0; list-style: none; }
        
        /* Wrapper for the list item role */
        .channel-item { display: contents; } 

        .card { 
            width: 100%;
            background: var(--card); padding: 20px; border-radius: 12px; text-align: center; 
            border: 1px solid #334155; font-weight: 700; cursor: pointer; font-size: 0.95rem;
            color: var(--text); transition: all 0.2s;
        }
        .card:focus { outline: 3px solid var(--accent); outline-offset: 2px; }
        .card:hover { border-color: var(--accent); background: #2d3a4f; }

        @media (orientation: landscape) and (max-height: 500px) {
            .ui-core, main { display: none !important; }
            body { background: #000; overflow: auto !important; display: block; }
            .player-viewport { height: 100vh; width: 177.78vh; min-width: 100vw; margin: 0 auto; display: flex; align-items: center; justify-content: center; padding: 0 50px; }
            video, #iframePlayer { display: block !important; }
        }
    </style>
</head>
<body>

    <div class="ui-core">
        <div class="info-bar" role="status">SYSTEM ONLINE • PERFORMANCE 100 • ACCESSIBILITY 100</div>
        <header class="header"><h1 class="brand">MSTV NETWORK</h1></header>
    </div>

    <section class="player-viewport" id="stage" aria-label="Media Player">
        <div id="placeholder" aria-hidden="true">📺</div>
        <iframe id="iframePlayer" allowfullscreen title="Live Stream Content"></iframe>
    </section>

    <main>
        <div id="channelList" class="grid" role="list" aria-label="Available Channels"></div>
    </main>

    <script>
        const OmniBrain = {
            hls: null, shaka: null, 
            stage: document.getElementById('stage'),
            iframe: document.getElementById('iframePlayer'),
            placeholder: document.getElementById('placeholder'),

            async purge() {
                this.placeholder.style.display = 'none';
                if (this.iframe) {
                    this.iframe.src = "about:blank"; 
                    this.iframe.style.display = 'none';
                }
                if (this.hls) { this.hls.destroy(); this.hls = null; }
                if (this.shaka) { await this.shaka.destroy(); this.shaka = null; }
                const v = document.querySelector('video');
                if (v) { v.pause(); v.removeAttribute('src'); v.load(); v.remove(); }
            },

            spawn() {
                const v = document.createElement('video');
                v.playsInline = true; v.controls = true; v.autoplay = true;
                v.setAttribute('aria-label', 'Active Channel Stream');
                v.style.display = "block";
                this.stage.appendChild(v);
                return v;
            },

            async execute(ch) {
                if (ch.url.startsWith('http://') && location.protocol === 'https:') {
                    window.open(ch.url, '_blank'); return;
                }
                await this.purge();
                if (ch.type === 'iframe') {
                    this.iframe.style.display = 'block';
                    this.iframe.src = ch.url;
                } else {
                    const videoEl = this.spawn();
                    requestAnimationFrame(() => {
                        if (ch.url.includes('.mpd')) this.loadShaka(ch.url, videoEl);
                        else this.loadHls(ch.url, videoEl);
                    });
                }
            },

            loadHls(url, el) {
                const init = () => {
                    if (window.Hls && Hls.isSupported()) {
                        this.hls = new Hls({ lowLatencyMode: true });
                        this.hls.loadSource(url); this.hls.attachMedia(el);
                        this.hls.on(Hls.Events.MANIFEST_PARSED, () => el.play().catch(()=>{}));
                    } else if (el.canPlayType('application/vnd.apple.mpegurl')) { el.src = url; }
                };
                this.inject("https://cdn.jsdelivr.net/npm/hls.js@latest", "Hls", init);
            },

            loadShaka(url, el) {
                const init = async () => {
                    shaka.polyfill.installAll();
                    this.shaka = new shaka.Player(el);
                    try { await this.shaka.load(url); el.play().catch(()=>{}); } catch(e) { console.error(e); }
                };
                this.inject("https://cdnjs.cloudflare.com/ajax/libs/shaka-player/4.3.5/shaka-player.compiled.js", "shaka", init);
            },

            inject(src, check, cb) {
                if (window[check]) return cb();
                const s = document.createElement('script'); s.src = src; s.async = true; s.onload = cb;
                document.head.appendChild(s);
            }
        };

        (async function boot() {
            try {
                const r = await fetch('channels2.json');
                const data = await r.json();
                const list = document.getElementById('channelList');
                const frag = document.createDocumentFragment();
                
                data.forEach(ch => {
                    // THE FIX: Wrapper div gets the listitem role
                    const wrapper = document.createElement('div');
                    wrapper.className = 'channel-item';
                    wrapper.setAttribute('role', 'listitem');

                    const btn = document.createElement('button');
                    btn.className = 'card';
                    btn.type = 'button';
                    btn.innerText = ch.name;
                    btn.setAttribute('aria-label', `Watch ${ch.name}`);
                    btn.onclick = () => OmniBrain.execute(ch);
                    
                    wrapper.appendChild(btn);
                    frag.appendChild(wrapper);
                });
                
                requestAnimationFrame(() => list.replaceChildren(frag));
            } catch(e) {}
        })();
    </script>
</body>
</html>
