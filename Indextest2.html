<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MSTV Network | Live Indian TV & Punjabi Channels</title>
    
    <meta name="description" content="Watch MSTV Network for free live Indian, Punjabi, and religious TV channels. High-speed HD streaming for cricket and entertainment available on all devices.">
    <meta name="robots" content="index, follow">
    
    <!-- FIX: Canonical link set via relative path or handled after first paint to avoid blocking -->
    <link id="canonical-link" rel="canonical" href="">

    <link rel="icon" href="/favicon.ico">
    <meta name="theme-color" content="#111419">

    <!-- Preconnect to speed up third-party script discovery -->
    <link rel="preconnect" href="https://cloudflare.com">
    <link rel="preconnect" href="https://jsdelivr.net">
    
    <link rel="preload" href="channels2.json" as="fetch" crossorigin="anonymous">

    <meta property="og:type" content="website">
    <meta property="og:url" content="https://netlify.app">
    <meta property="og:title" content="MSTV Network | Live Indian & Punjabi TV">
    <meta property="og:description" content="Watch 100+ Live Indian, Punjabi, and Religious channels for free in HD.">
    <meta property="og:image" content="https://netlify.appog-image.webp">

    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "Organization",
      "name": "MSTV Network",
      "url": "https://netlify.app",
      "logo": "https://netlify.appog-image.png",
      "description": "Watch 100+ Live Indian and Punjabi TV channels in HD for free."
    }
    </script>

<style>
/* CSS optimization: Ensure H2 is visible immediately */
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg-dark:#111419;--accent:#2ECC71;--header-h:70px;--ticker-h:30px}
body{font-family:system-ui,-apple-system,sans-serif;background:#F8F9FA;color:#212529;overflow-x:hidden}

header{height:var(--header-h);background:var(--bg-dark);display:flex;align-items:center;justify-content:space-between;padding:0 15px;position:sticky;top:0;z-index:1000}
.brand-name{font-size:1.25rem;font-weight:800;color:var(--accent)}
.search-container{flex:0.6;max-width:200px}
#searchInput{width:100%;padding:12px 15px;border-radius:20px;border:1px solid #444;background:#1A1D20;color:#fff;font-size:16px}

.sticky-player-wrapper{position:sticky;top:var(--header-h);background:#000;width:100%;z-index:900}
.player-container{width:100%;aspect-ratio:16/9;background:#000;position:relative}
#placeholder{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:3rem;background:#000}
#video,#iframePlayer{position:absolute;top:0;left:0;width:100%;height:100%;display:none;object-fit:cover}

.ticker{width:100%;height:var(--ticker-h);background:#D00000;color:#fff;display:flex;align-items:center;overflow:hidden;font-size:0.8rem}
.ticker-track{display:flex;white-space:nowrap;animation:ticker-loop 15s linear infinite}
@keyframes ticker-loop{0%{transform:translateX(0)}100%{transform:translateX(-50%)}}

.title-area{padding:20px;text-align:center}
#current-title{font-size:1.2rem;font-weight:700}

.channel-grid{
    display:grid;
    grid-template-columns:repeat(auto-fill,minmax(130px,1fr));
    grid-auto-rows:95px;
    gap:20px;
    padding:0 20px 60px;
    /* content-visibility speeds up initial load of long lists */
    content-visibility:auto;
    contain-intrinsic-size:400px;
}

.channel-card{background:#fff;border:1px solid #ddd;border-radius:12px;display:flex;align-items:center;justify-content:center;padding:15px;cursor:pointer}
.channel-name{font-size:0.95rem;font-weight:700;text-align:center}

@media (max-width: 900px) and (orientation: landscape) {
    header, .sticky-player-wrapper { position: relative; top: 0; }
}
</style>
</head>

<body>

<header>
    <h1 class="brand-name">MSTV NETWORK</h1>
    <div class="search-container">
        <input type="text" id="searchInput" placeholder="Search channels...">
    </div>
</header>

<div class="sticky-player-wrapper">
    <section class="player-container">
        <div id="placeholder">📺</div>
        <video id="video" playsinline controls></video>
        <iframe id="iframePlayer" allow="autoplay; fullscreen;"></iframe>
    </section>
    <div class="ticker">
        <div class="ticker-track">
            <div>Use VPN with Australia server for blocked channels.</div>
            <div>Use VPN with Australia server for blocked channels.</div>
        </div>
    </div>
</div>

<main>
    <div class="title-area">
        <h2 id="current-title">Select Channel & Play</h2>
    </div>
    <div class="channel-grid" id="channelList"></div>
</main>

<script>
// Non-blocking canonical update
document.addEventListener('DOMContentLoaded', () => {
    document.getElementById('canonical-link').setAttribute('href', window.location.origin + window.location.pathname);
});

let allCh = [], hlsE = null, scP = null;
const v = document.getElementById('video'),
      f = document.getElementById('iframePlayer'),
      l = document.getElementById('channelList'),
      t = document.getElementById('current-title'),
      ph = document.getElementById('placeholder');

/* LOAD PLAYERS ASYNCHRONOUSLY */
function loadS() {
    if (scP) return scP;
    scP = new Promise(res => {
        let c = 0;
        const done = () => { if (++c === 2) res(); };
        
        const s1 = document.createElement('script');
        s1.src = "https://jsdelivr.net/npm/hls.js@1.4.12/dist/hls.min.js";
        s1.async = true;
        s1.onload = done;

        const s2 = document.createElement('script');
        s2.src = "https://cloudflare.com/ajax/libs/shaka-player/4.3.5/shaka-player.compiled.js";
        s2.async = true;
        s2.onload = () => { window.shaka.polyfill.installAll(); done(); };

        document.head.append(s1, s2);
    });
    return scP;
}

/* PLAY - Fixed Style Batching */
async function play(ch) {
    if (!ch || !ch.url) return;
    if (hlsE) { hlsE.destroy(); hlsE = null; }

    // Batch all visual changes in one frame to prevent reflow
    requestAnimationFrame(() => {
        v.pause();
        v.removeAttribute("src");
        v.load();
        ph.style.display = 'none';
        t.textContent = ch.name;
        v.style.display = 'none';
        f.style.display = 'none';
        f.src = "";
    });

    if (ch.type === 'iframe' || (!ch.url.includes('.m3u8') && !ch.url.includes('.mpd'))) {
        f.style.display = 'block';
        f.src = ch.url;
        return;
    }

    await loadS();

    if (ch.url.includes('.mpd')) {
        const p = new shaka.Player(v);
        try {
            await p.load(ch.url);
            v.style.display = 'block';
        } catch (e) {}
    } else if (window.Hls && Hls.isSupported()) {
        hlsE = new Hls({ lowLatencyMode: true });
        hlsE.loadSource(ch.url);
        hlsE.attachMedia(v);
        hlsE.on(Hls.Events.MANIFEST_PARSED, () => {
            v.play().catch(() => {});
            v.style.display = 'block';
        });
    }
}

/* RENDER - Optimized with textContent and Fragment */
function render(data) {
    const fr = document.createDocumentFragment();
    data.forEach(ch => {
        const b = document.createElement('div');
        b.className = 'channel-card';
        const s = document.createElement('span');
        s.className = 'channel-name';
        s.textContent = ch.name; // textContent is faster than innerHTML
        b.appendChild(s);
        b.onclick = () => play(ch);
        fr.appendChild(b);
    });
    
    requestAnimationFrame(() => {
        l.innerHTML = '';
        l.appendChild(fr);
    });
}

/* FETCH - Yield to main thread for better LCP */
fetch('channels2.json')
    .then(r => r.json())
    .then(data => {
        allCh = data;
        // Small delay ensures the H2 "Select Channel" paints first
        setTimeout(() => render(allCh), 10);
    });

/* SEARCH - Optimized with simple filtering */
document.getElementById('searchInput').oninput = e => {
    const val = e.target.value.toLowerCase();
    render(allCh.filter(c => c.name.toLowerCase().includes(val)));
};
</script>
</body>
</html>
