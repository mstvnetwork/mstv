<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MSTV NETWORK</title>

    <link rel="preload" href="channels2.json" as="fetch" crossorigin="anonymous">
    
    <link rel="preconnect" href="https://cdn.jsdelivr.net" crossorigin>
    <link rel="preconnect" href="https://cdnjs.cloudflare.com" crossorigin>

    <style>
        /* 3. CRITICAL CSS: Inlined to ensure 0ms Render Delay */
        :root { --bg: #0f172a; --accent: #38bdf8; --card: #1e293b; --text: #f8fafc; }
        body { background: var(--bg); color: var(--text); font-family: system-ui, -apple-system, sans-serif; margin: 0; padding: 0; }
        
        /* The LCP Target: Static text for instant paint */
        .info-bar { 
            background: #000; 
            padding: 10px; 
            text-align: center; 
            font-size: 0.85rem; 
            color: var(--accent);
            border-bottom: 1px solid #334155;
            contain: layout paint; /* Optimization: independent element */
        }

        .header { padding: 15px; text-align: center; background: #1e293b; }
        .brand-name { font-size: 1.5rem; font-weight: 800; color: var(--accent); }

        .player-box { width: 100%; aspect-ratio: 16/9; background: #000; position: relative; }
        #video, #iframePlayer { width: 100%; height: 100%; display: none; border: none; }
        #placeholder { display: flex; height: 100%; align-items: center; justify-content: center; font-size: 2.5rem; }

        /* 4. CLS FIX: Reserve space so the screen doesn't jump when data arrives */
        .channel-grid { 
            display: grid; 
            grid-template-columns: repeat(auto-fill, minmax(130px, 1fr)); 
            gap: 15px; padding: 20px; 
            min-height: 100vh; 
        }
        .card { background: var(--card); padding: 18px; border-radius: 8px; text-align: center; border: 1px solid #334155; font-weight: 600; cursor: pointer; transition: 0.1s; }
        .card:hover { border-color: var(--accent); transform: translateY(-2px); }
    </style>
</head>
<body>

    <div class="info-bar">
        <span>• Watch Free Live Channels • High Quality Streams • No Subscription •</span>
    </div>

    <header class="header">
        <div class="brand-name">MSTV NETWORK</div>
    </header>

    <main id="main-content">
        <div class="player-box">
            <div id="placeholder">📺</div>
            <video id="video" playsinline controls title="Video Player"></video>
            <iframe id="iframePlayer" title="External Content" allowfullscreen></iframe>
        </div>

        <div id="channelList" class="channel-grid" role="list"></div>
    </main>

    <script>
        // 7. DEFERRED EXECUTION: Wait for the paint to finish before loading data
        window.addEventListener('DOMContentLoaded', () => {
            const listContainer = document.getElementById('channelList');

            // Fetch uses the 'preloaded' stream from the head
            fetch('channels2.json')
                .then(response => response.json())
                .then(data => {
                    const fragment = document.createDocumentFragment();
                    
                    data.forEach(channel => {
                        const card = document.createElement('div');
                        card.className = 'card';
                        card.setAttribute('role', 'listitem');
                        card.setAttribute('tabindex', '0');
                        card.innerText = channel.name;
                        
                        card.onclick = () => playChannel(channel);
                        card.onkeydown = (e) => { if(e.key === 'Enter') playChannel(channel); };
                        
                        fragment.appendChild(card);
                    });

                    // THE DOUBLE RAF TRICK: Forces browser to paint the 
                    // static UI before injecting the dynamic grid.
                    requestAnimationFrame(() => {
                        requestAnimationFrame(() => {
                            listContainer.replaceChildren(fragment);
                        });
                    });
                });
        });

        function playChannel(ch) {
            document.getElementById('placeholder').style.display = 'none';
            const v = document.getElementById('video');
            const f = document.getElementById('iframePlayer');
            v.style.display = f.style.display = 'none';
            v.pause(); v.src = "";

            if (ch.type === 'iframe') {
                f.style.display = 'block'; f.src = ch.url;
            } else {
                v.style.display = 'block';
                // (HLS/Shaka loading logic goes here)
                if (!window.Hls) {
                    const s = document.createElement('script');
                    s.src = "https://cdn.jsdelivr.net/npm/hls.js@latest";
                    s.onload = () => { 
                        const h = new Hls(); h.loadSource(ch.url); h.attachMedia(v); v.play();
                    };
                    document.head.appendChild(s);
                } else {
                    const h = new Hls(); h.loadSource(ch.url); h.attachMedia(v); v.play();
                }
            }
        }
    </script>
</body>
</html>
