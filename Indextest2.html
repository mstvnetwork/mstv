<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MSTV | OFFICIAL</title>
    <style>
        body { margin: 0; background: #000; color: #fff; font-family: sans-serif; }
        
        /* THE STAGE: The "TV Screen" at the top */
        #stage { 
            position: sticky; top: 0; width: 100%; 
            height: 56.25vw; background: #000; z-index: 1000;
        }
        iframe { width: 100%; height: 100%; border: none; }

        /* THE GRID: The "Remote Control" below */
        #catalog { padding: 20px; display: grid; grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 10px; }
        .card { 
            background: #111; border: 1px solid #333; padding: 20px; 
            text-align: center; border-radius: 8px; cursor: pointer; font-weight: bold;
        }
        .card:active { border-color: #22c55e; color: #22c55e; }
    </style>
</head>
<body>

    <div id="stage">
        <iframe id="mainPlayer" src="player.html#1"></iframe>
    </div>

    <div id="catalog">
        </div>

<script>
    const player = document.getElementById('mainPlayer');
    const catalog = document.getElementById('catalog');

    async function buildUI() {
        const res = await fetch('channels2.json');
        const data = await res.json();
        
        data.forEach((ch, i) => {
            const btn = document.createElement('div');
            btn.className = 'card';
            btn.textContent = ch.name;
            btn.onclick = () => {
                player.src = `player.html#${i + 1}`;
                window.scrollTo({ top: 0, behavior: 'smooth' });
            };
            catalog.appendChild(btn);
        });
    }
    window.onload = buildUI;
</script>
</body>
</html>
