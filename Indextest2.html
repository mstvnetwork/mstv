<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MSTV NETWORK</title>

    <link rel="preload" href="channels2.json" as="fetch" crossorigin="anonymous">

    <style>
        /* 2. CRITICAL CSS: Keep it minimal for the first paint */
        :root { --bg: #0f172a; --accent: #38bdf8; --card: #1e293b; }
        body { background: var(--bg); color: #fff; font-family: system-ui, sans-serif; margin: 0; }
        
        .header { padding: 15px; text-align: center; background: #1e293b; border-bottom: 2px solid var(--accent); }
        .brand-name { font-size: 1.6rem; font-weight: 800; color: var(--accent); }

        /* THE FIX: Static bar with 'contain: paint' to tell the browser it's independent */
        .info-bar { 
            background: #000; 
            padding: 12px; 
            text-align: center; 
            font-size: 0.9rem; 
            color: var(--accent);
            border-bottom: 1px solid #334155;
            contain: paint; 
            content-visibility: visible;
        }

        .player-box { width: 100%; aspect-ratio: 16/9; background: #000; position: relative; }
        #placeholder { display: flex; height: 100%; align-items: center; justify-content: center; font-size: 2.5rem; }
        #video, #iframePlayer { width: 100%; height: 100%; display: none; }

        /* 3. CLS FIX: Reserve vertical space */
        .channel-grid { 
            display: grid; 
            grid-template-columns: repeat(auto-fill, minmax(130px, 1fr)); 
            gap: 15px; padding: 20px; 
            min-height: 100vh; 
        }
        .card { background: var(--card); padding: 20px; border-radius: 8px; text-align: center; border: 1px solid #334155; }
    </style>
</head>
<body>

    <header class="header">
        <div class="brand-name">MSTV NETWORK</div>
    </header>

    <main id="main-content">
        <div class="player-box">
            <div id="placeholder">📺</div>
            <video id="video" playsinline controls title="Video Player"></video>
            <iframe id="iframePlayer" title="External Player" allowfullscreen></iframe>
        </div>

        <div class="info-bar">
            <span>• Watch Free Live Channels • High Quality Streams • No Subscription •</span>
        </div>

        <div id="channelList" class="channel-grid" role="list"></div>
    </main>

    <script>
        // 4. DEFERRED EXECUTION: Don't let the script block the initial paint
        window.addEventListener('DOMContentLoaded', () => {
            const l = document.getElementById('channelList');

            // Use 'fetch' but wrap the render in a secondary check
            fetch('channels2.json')
                .then(r => r.json())
                .then(data => {
                    const fr = document.createDocumentFragment();
                    data.forEach(ch => {
                        const b = document.createElement('div');
                        b.className = 'card';
                        b.setAttribute('role', 'listitem');
                        b.setAttribute('tabindex', '0');
                        b.innerText = ch.name;
                        b.onclick = () => play(ch);
                        fr.appendChild(b);
                    });
                    
                    // The 'Double-RAF' trick to ensure the browser has finished 
                    // painting the info-bar before we inject the grid.
                    requestAnimationFrame(() => {
                        requestAnimationFrame(() => {
                            l.replaceChildren(fr);
                        });
                    });
                });
        });

        // 5. HELPER FUNCTIONS
        function play(ch) {
            document.getElementById('placeholder').style.display = 'none';
            const v = document.getElementById('video');
            const f = document.getElementById('iframePlayer');
            v.style.display = f.style.display = 'none';
            if (ch.type === 'iframe') {
                f.style.display = 'block'; f.src = ch.url;
            } else {
                v.style.display = 'block';
                // (HLS logic here as before)
            }
        }
    </script>
</body>
</html>
