<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MSTV NETWORK</title>

    <link rel="preload" href="channels2.json" as="fetch" crossorigin="anonymous">

    <style>
        :root { --bg: #0f172a; --accent: #38bdf8; --card: #1e293b; --text: #f8fafc; }
        body { background: var(--bg); color: var(--text); font-family: sans-serif; margin: 0; }
        
        .header { padding: 15px; text-align: center; background: #1e293b; border-bottom: 2px solid var(--accent); }
        .brand-name { font-size: 1.6rem; font-weight: 800; color: var(--accent); }

        /* STATIC NOTE: No animation = 0ms Render Delay */
        .info-bar { 
            background: #000; 
            padding: 12px; 
            text-align: center; 
            font-size: 0.9rem; 
            font-weight: 500; 
            color: var(--accent);
            border-bottom: 1px solid #334155;
            letter-spacing: 0.5px;
        }

        .player-box { width: 100%; aspect-ratio: 16/9; background: #000; position: relative; }
        #video, #iframePlayer { width: 100%; height: 100%; display: none; border: none; }
        #placeholder { display: flex; height: 100%; align-items: center; justify-content: center; font-size: 2.5rem; }

        /* CLS FIX: Reserve space for the grid */
        .channel-grid { 
            display: grid; 
            grid-template-columns: repeat(auto-fill, minmax(130px, 1fr)); 
            gap: 15px; padding: 20px; 
            min-height: 80vh; 
        }
        .card { background: var(--card); padding: 20px; border-radius: 8px; text-align: center; cursor: pointer; border: 1px solid #334155; font-weight: 600; transition: transform 0.1s; }
        .card:active { transform: scale(0.95); }
    </style>
</head>
<body>

    <header class="header">
        <div class="brand-name">MSTV NETWORK</div>
    </header>

    <main id="main-content">
        <div class="player-box">
            <div id="placeholder">📺</div>
            <video id="video" playsinline controls title="Video Player"></video>
            <iframe id="iframePlayer" title="External Player" allowfullscreen></iframe>
        </div>

        <div class="info-bar">
            <span>• Watch Free Live Channels • High Quality Streams • No Subscription •</span>
        </div>

        <div id="channelList" class="channel-grid" role="list"></div>
    </main>

    <script>
        const v = document.getElementById('video'), 
              f = document.getElementById('iframePlayer'), 
              l = document.getElementById('channelList');
        let allCh = [];

        // ATOMIC DATA FETCH
        fetch('channels2.json')
            .then(r => r.json())
            .then(data => {
                allCh = data;
                const fr = document.createDocumentFragment();
                data.forEach(ch => {
                    const b = document.createElement('div');
                    b.className = 'card';
                    b.setAttribute('role', 'listitem');
                    b.setAttribute('tabindex', '0');
                    b.innerText = ch.name;
                    b.onclick = () => play(ch);
                    fr.appendChild(b);
                });
                requestAnimationFrame(() => l.replaceChildren(fr));
            });

        async function play(ch) {
            document.getElementById('placeholder').style.display = 'none';
            v.style.display = f.style.display = 'none';
            v.pause(); v.src = "";
            
            if (ch.type === 'iframe') {
                f.style.display = 'block'; f.src = ch.url; f.title = ch.name;
            } else {
                if (!window.Hls) {
                    const s = document.createElement('script');
                    s.src = "https://cdn.jsdelivr.net/npm/hls.js@latest";
                    s.onload = () => startHls(ch.url);
                    document.head.appendChild(s);
                } else { startHls(ch.url); }
            }
        }

        function startHls(url) {
            const h = new Hls(); h.loadSource(url); h.attachMedia(v);
            v.style.display = 'block'; v.play();
        }
    </script>
</body>
</html>
