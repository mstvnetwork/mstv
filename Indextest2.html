<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MSTV | V29 CLEAN SYNC</title>
    <style>
        :root { --accent: #22c55e; --bg: #000; }
        body { margin: 0; background: var(--bg); color: #fff; font-family: sans-serif; -webkit-tap-highlight-color: transparent; }

        /* HEADER / PLAYER AREA */
        #stage-container { 
            position: fixed; top: 0; width: 100%; 
            height: 56.25vw; /* Strict 16:9 */
            background: #000; z-index: 2000;
            box-shadow: 0 4px 20px rgba(0,0,0,0.8);
        }
        #iframePlayer { width: 100%; height: 100%; border: none; }

        /* THE CATALOG AREA */
        #catalog-wrapper { 
            margin-top: calc(56.25vw + 10px); 
            padding: 10px;
        }

        .grid { 
            display: grid; 
            grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); 
            gap: 12px; 
        }

        /* DYNAMIC CARD STYLE */
        .card { 
            background: #111; border: 1px solid #222; border-radius: 8px; 
            aspect-ratio: 16/9; display: flex; align-items: center; justify-content: center;
            cursor: pointer; transition: all 0.2s ease;
            text-align: center; padding: 12px; font-weight: 800; font-size: 11px;
            text-transform: uppercase; letter-spacing: 1px; color: #aaa;
        }
        
        .card:active { 
            transform: scale(0.95); border-color: var(--accent); color: #fff; background: #050505;
        }

        /* Status Text */
        .status { text-align: center; color: #444; font-size: 10px; margin-top: 40px; text-transform: uppercase; letter-spacing: 3px; }
    </style>
</head>
<body>

    <div id="stage-container">
        <iframe id="iframePlayer" src="player.html#1" allow="autoplay; fullscreen"></iframe>
    </div>

    <div id="catalog-wrapper">
        <div id="channelList" class="grid"></div>
        <div id="loadingMsg" class="status">Initializing Quantum Link...</div>
    </div>

<script>
    const list = document.getElementById('channelList');
    const player = document.getElementById('iframePlayer');
    const loader = document.getElementById('loadingMsg');

    async function ignite() {
        try {
            // Fetch from your source of truth
            const response = await fetch('channels2.json');
            const data = await response.json();
            
            // Hide loading message
            loader.style.display = 'none';
            
            const fragment = document.createDocumentFragment();
            
            data.forEach((ch, i) => {
                const card = document.createElement('div');
                card.className = 'card';
                card.textContent = ch.name;
                
                // THE BRAIN HANDSHAKE
                card.onclick = () => {
                    player.src = `player.html#${i + 1}`;
                    // Scroll to top so player is visible
                    window.scrollTo({ top: 0, behavior: 'smooth' });
                };
                
                fragment.appendChild(card);
            });
            
            requestAnimationFrame(() => list.appendChild(fragment));

        } catch (err) {
            loader.textContent = "Sync Failed. Check channels2.json";
        }
    }

    window.onload = ignite;
</script>
</body>
</html>
