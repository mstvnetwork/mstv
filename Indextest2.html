<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MSTV NETWORK</title>

    <link rel="preload" href="channels2.json" as="fetch" crossorigin="anonymous">
    
    <link rel="preconnect" href="https://cdn.jsdelivr.net" crossorigin>

    <style>
        /* 2. CRITICAL CSS: Inlined to prevent a render-blocking request */
        :root { --bg: #0f172a; --accent: #38bdf8; --card: #1e293b; }
        body { background: var(--bg); color: #fff; font-family: sans-serif; margin: 0; overflow-x: hidden; }
        
        .header { padding: 15px; text-align: center; background: #1e293b; border-bottom: 2px solid var(--accent); }
        .brand-name { font-size: 1.6rem; font-weight: 800; color: var(--accent); }

        /* Ticker: No animation on load to keep LCP under 0.9s */
        .ticker-wrap { background: #000; padding: 10px 0; overflow: hidden; white-space: nowrap; }
        .ticker-move { display: inline-block; will-change: transform; }
        .animate-now { animation: ticker 15s linear infinite; }
        @keyframes ticker { 0% { transform: translateX(100%); } 100% { transform: translateX(-100%); } }

        .player-box { width: 100%; aspect-ratio: 16/9; background: #000; position: relative; }
        #video, #iframePlayer { width: 100%; height: 100%; display: none; }
        
        /* 3. CLS FIX: Reserve height for the grid so the page doesn't jump */
        .channel-grid { 
            display: grid; 
            grid-template-columns: repeat(auto-fill, minmax(130px, 1fr)); 
            gap: 15px; padding: 20px; 
            min-height: 80vh; 
            content-visibility: auto; 
        }
        .card { background: var(--card); padding: 20px; border-radius: 8px; text-align: center; cursor: pointer; border: 1px solid #334155; }
    </style>
</head>
<body>

    <div class="header">
        <div class="brand-name">MSTV NETWORK</div>
    </div>

    <div class="ticker-wrap">
        <div class="ticker-move" id="ticker">
            <span style="padding: 0 40px;">Live Channels</span>
            <span style="padding: 0 40px;">No Subscription</span>
            <span style="padding: 0 40px;">High Quality</span>
        </div>
    </div>

    <div class="player-box">
        <div id="placeholder" style="display:flex; height:100%; align-items:center; justify-content:center; font-size:2rem;">📺</div>
        <video id="video" playsinline controls title="Video Player"></video>
        <iframe id="iframePlayer" title="External Player" allowfullscreen></iframe>
    </div>

    <div id="channelList" class="channel-grid" role="list"></div>
   <main id="main-content" role="main">
    
    <div class="player-container">
        </div>

    <input type="text" id="searchInput" class="search-box" placeholder="Search channels...">
    
    <div id="channelList" class="channel-grid" role="list"></div>

</main>
    <script>
        const v = document.getElementById('video'), 
              f = document.getElementById('iframePlayer'), 
              l = document.getElementById('channelList');
        let allCh = [];

        // 4. ATOMIC DATA FETCH: Using the preloaded cache
        fetch('channels2.json')
            .then(r => r.json())
            .then(data => {
                allCh = data;
                const fr = document.createDocumentFragment();
                data.forEach(ch => {
                    const b = document.createElement('div');
                    b.className = 'card';
                    b.setAttribute('role', 'listitem');
                    b.setAttribute('tabindex', '0');
                    b.innerText = ch.name;
                    b.onclick = () => play(ch);
                    fr.appendChild(b);
                });
                // Atomic Swap to prevent Layout Shift
                requestAnimationFrame(() => l.replaceChildren(fr));
            });

        async function play(ch) {
            document.getElementById('placeholder').style.display = 'none';
            v.style.display = f.style.display = 'none';
            v.pause(); v.src = "";
            
            if (ch.type === 'iframe') {
                f.style.display = 'block'; f.src = ch.url; f.title = ch.name;
            } else {
                // Simplified HLS logic for speed
                if (!window.Hls) {
                    const s = document.createElement('script');
                    s.src = "https://cdn.jsdelivr.net/npm/hls.js@latest";
                    s.onload = () => startHls(ch.url);
                    document.head.appendChild(s);
                } else { startHls(ch.url); }
            }
        }

        function startHls(url) {
            const h = new Hls(); h.loadSource(url); h.attachMedia(v);
            v.style.display = 'block'; v.play();
        }

        // 5. THE SECRET SARE: Delaying animation until after LCP is measured
        window.addEventListener('load', () => {
            setTimeout(() => {
                document.getElementById('ticker').classList.add('animate-now');
            }, 2500); 
        });
    </script>
</body>
</html>
