<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MSTV NETWORK</title>

    <style>
        /* CRITICAL CSS: Inlined to ensure 0ms Render Delay */
        :root { --bg: #0f172a; --accent: #38bdf8; --card: #1e293b; }
        body { background: var(--bg); color: #fff; font-family: system-ui, sans-serif; margin: 0; padding: 0; }
        
        .header { padding: 10px; text-align: center; background: #1e293b; }
        .brand-name { font-size: 1.4rem; font-weight: 800; color: var(--accent); }

        /* THE SPEED FIX: This is now the FIRST element in the body */
        .info-bar { 
            background: #000; 
            padding: 8px; 
            text-align: center; 
            font-size: 0.85rem; 
            color: var(--accent);
            border-bottom: 1px solid #334155;
            /* Tells the browser this element is ready to paint NOW */
            content-visibility: visible;
        }

        .player-box { width: 100%; aspect-ratio: 16/9; background: #000; position: relative; }
        #video, #iframePlayer { width: 100%; height: 100%; display: none; }
        
        .channel-grid { 
            display: grid; 
            grid-template-columns: repeat(auto-fill, minmax(130px, 1fr)); 
            gap: 15px; padding: 20px; 
            min-height: 100vh; /* Prevents Footer Jump (CLS) */
        }
        .card { background: var(--card); padding: 18px; border-radius: 8px; text-align: center; border: 1px solid #334155; }
    </style>
</head>
<body>

    <div class="info-bar">
        <span>Watch Free Live Channels • High Quality Streams</span>
    </div>

    <header class="header">
        <div class="brand-name">MSTV NETWORK</div>
    </header>

    <main id="main-content">
        <div class="player-box">
            <div id="placeholder" style="display:flex; height:100%; align-items:center; justify-content:center; font-size:2rem;">📺</div>
            <video id="video" playsinline controls></video>
            <iframe id="iframePlayer" allowfullscreen></iframe>
        </div>

        <div id="channelList" class="channel-grid" role="list"></div>
    </main>

    <script>
        // 2. THE DISCOVERY FIX: Wait for the browser to finish painting before fetching
        window.addEventListener('load', () => {
            // Delay the heavy work by 500ms to let the UI settle
            setTimeout(() => {
                fetch('channels2.json')
                    .then(r => r.json())
                    .then(data => {
                        const l = document.getElementById('channelList');
                        const fr = document.createDocumentFragment();
                        data.forEach(ch => {
                            const b = document.createElement('div');
                            b.className = 'card';
                            b.setAttribute('role', 'listitem');
                            b.innerText = ch.name;
                            b.onclick = () => play(ch);
                            fr.appendChild(b);
                        });
                        // Use Double RAF to ensure a smooth injection
                        requestAnimationFrame(() => {
                            requestAnimationFrame(() => {
                                l.replaceChildren(fr);
                            });
                        });
                    });
            }, 500); 
        });

        function play(ch) {
            document.getElementById('placeholder').style.display = 'none';
            const v = document.getElementById('video');
            const f = document.getElementById('iframePlayer');
            v.style.display = f.style.display = 'none';
            if (ch.type === 'iframe') {
                f.style.display = 'block'; f.src = ch.url;
            } else {
                v.style.display = 'block';
                // (HLS Logic...)
            }
        }
    </script>
</body>
</html>
