<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MSTV | AUTOMATED CORE</title>
    <style>
        :root { --accent: #22c55e; --bg: #000; --card-bg: #111; }
        body { margin: 0; background: var(--bg); color: #fff; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; overflow-x: hidden; }

        /* THE PLAYER STAGE (Sticky 16:9) */
        #stage { 
            position: sticky; top: 0; width: 100%; height: 56.25vw; 
            max-height: 70vh; background: #000; z-index: 1000; 
            border-bottom: 1px solid #222;
        }
        #iframePlayer { width: 100%; height: 100%; border: none; display: block; }

        /* THE GRID CATALOG */
        #catalog { padding: 15px; display: grid; grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); gap: 12px; }
        
        .card { 
            background: var(--card-bg); aspect-ratio: 16/9; border-radius: 8px; 
            display: flex; align-items: center; justify-content: center;
            cursor: pointer; border: 1px solid #222; transition: 0.2s;
            text-align: center; padding: 10px; font-weight: 600; font-size: 13px;
        }
        .card:active { transform: scale(0.96); border-color: var(--accent); color: var(--accent); }

        /* Loading Skeleton Animation */
        .loading { opacity: 0.5; font-size: 10px; text-transform: uppercase; letter-spacing: 2px; text-align: center; margin-top: 50px; }
    </style>
</head>
<body>

    <div id="stage">
        <iframe id="iframePlayer" src="player.html#1" allow="autoplay; fullscreen"></iframe>
    </div>

    <div id="catalog">
        <div class="loading">Synchronizing with Brain...</div>
    </div>

<script>
    const catalog = document.getElementById('catalog');
    const player = document.getElementById('iframePlayer');

    // --- THE BRAIN: FETCH & SYNC ---
    async function initSystem() {
        try {
            // 1. Fetch your source-of-truth JSON
            const response = await fetch('channels2.json');
            const data = await response.json();
            
            // 2. Clear the "Loading" text
            catalog.innerHTML = '';
            
            // 3. Build the UI
            const fragment = document.createDocumentFragment();
            data.forEach((ch, i) => {
                const card = document.createElement('div');
                card.className = 'card';
                card.textContent = ch.name;
                
                // THE BRIDGE: Clicking sends index to player.html
                card.onclick = () => {
                    player.src = `player.html#${i + 1}`;
                    window.scrollTo({ top: 0, behavior: 'smooth' });
                };
                
                fragment.appendChild(card);
            });
            
            requestAnimationFrame(() => catalog.appendChild(fragment));

        } catch (error) {
            catalog.innerHTML = '<div class="loading">Sync Error. Check JSON path.</div>';
            console.error("Master Sync Failed:", error);
        }
    }

    // Start on load
    window.onload = initSystem;
</script>
</body>
</html>
