<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MSTV NETWORK</title>

    <link rel="preload" href="channels2.json" as="fetch" crossorigin="anonymous">
    <link rel="preconnect" href="https://cdn.jsdelivr.net" crossorigin>

    <style>
        :root { --bg: #0f172a; --accent: #38bdf8; --card: #1e293b; --text: #f8fafc; }
        
        body { 
            background: var(--bg); color: var(--text); font-family: system-ui, sans-serif; 
            margin: 0; padding: 0; display: flex; flex-direction: column; height: 100vh; overflow: hidden; 
        }

        /* STICKY TOP SECTION */
        .top-section { z-index: 100; background: var(--bg); flex-shrink: 0; box-shadow: 0 4px 15px rgba(0,0,0,0.5); }
        
        .info-bar { 
            background: #000; padding: 10px; text-align: center; font-size: 0.85rem; 
            color: var(--accent); border-bottom: 1px solid #334155; 
        }
        
        .header { padding: 12px; text-align: center; background: #1e293b; }
        .brand-name { font-size: 1.4rem; font-weight: 800; color: var(--accent); }

        /* PLAYER BOX */
        .player-box { width: 100%; aspect-ratio: 16/9; background: #000; position: relative; overflow: hidden; }
        #video, #iframePlayer { width: 100%; height: 100%; display: none; border: none; }
        #placeholder { display: flex; height: 100%; align-items: center; justify-content: center; font-size: 2.5rem; }

        /* SCROLLABLE GRID */
        main { flex-grow: 1; overflow-y: auto; -webkit-overflow-scrolling: touch; padding-bottom: 30px; }
        .channel-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(130px, 1fr)); gap: 15px; padding: 20px; }
        .card { 
            background: var(--card); padding: 20px; border-radius: 10px; text-align: center; 
            border: 1px solid #334155; font-weight: 600; cursor: pointer; transition: 0.2s; 
        }
        .card:hover { border-color: var(--accent); background: #2d3a4f; transform: translateY(-2px); }

        /* MOBILE LANDSCAPE MODE: Forced Full-Screen Video */
        @media (orientation: landscape) and (max-height: 500px) {
            .info-bar, .header, main { display: none !important; }
            .top-section, .player-box, #video, #iframePlayer {
                height: 100vh !important;
                width: 100vw !important;
                position: fixed;
                top: 0;
                left: 0;
                z-index: 9999;
            }
        }
    </style>
</head>
<body>

    <div class="top-section">
        <div class="info-bar">
            <span>• Watch Free Live Channels • High Quality Streams • No Subscription •</span>
        </div>
        <header class="header">
            <div class="brand-name">MSTV NETWORK</div>
        </header>
        <div class="player-box" id="playerContainer">
            <div id="placeholder">📺</div>
            <video id="video" playsinline controls></video>
            <iframe id="iframePlayer" allowfullscreen title="External Player"></iframe>
        </div>
    </div>

    <main>
        <div id="channelList" class="channel-grid" role="list"></div>
    </main>

    <script>
        let hlsInst = null, shakaInst = null;
        const listEl = document.getElementById('channelList');
        const iframe = document.getElementById('iframePlayer');

        // 1. ATOMIC LOAD: Get channels from preloaded JSON
        fetch('channels2.json').then(r => r.json()).then(data => {
            const frag = document.createDocumentFragment();
            data.forEach(ch => {
                const b = document.createElement('div');
                b.className = 'card'; b.innerText = ch.name; b.onclick = () => playChannel(ch);
                frag.appendChild(b);
            });
            requestAnimationFrame(() => listEl.replaceChildren(frag));
        });

        // 2. THE NUCLEAR RESET: Deletes and recreates video element to kill ghost audio
        function resetHardwarePlayer() {
            const container = document.getElementById('playerContainer');
            const oldVideo = document.getElementById('video');
            
            // Cleanup engine instances
            if (hlsInst) { hlsInst.destroy(); hlsInst = null; }
            if (shakaInst) { shakaInst.destroy(); shakaInst = null; }

            // Create a fresh video tag
            const newVideo = document.createElement('video');
            newVideo.id = 'video';
            newVideo.playsInline = true;
            newVideo.controls = true;
            newVideo.style.display = 'block';
            
            // Cleanly remove the old one
            if (oldVideo) {
                oldVideo.pause();
                oldVideo.src = "";
                oldVideo.load();
                oldVideo.remove();
            }
            
            container.appendChild(newVideo);
            return newVideo;
        }

        async function playChannel(ch) {
            document.getElementById('placeholder').style.display = 'none';
            iframe.style.display = 'none';
            iframe.src = "";

            if (ch.type === 'iframe') {
                const v = document.getElementById('video');
                if (v) v.style.display = 'none';
                iframe.style.display = 'block';
                iframe.src = ch.url;
            } else {
                // Recreate the player to ensure NO background audio
                const v = resetHardwarePlayer();
                
                if (ch.url.includes('.mpd')) {
                    loadEngine('shaka', ch.url, v);
                } else {
                    loadEngine('hls', ch.url, v);
                }
            }
        }

        // 3. DYNAMIC ENGINE LOADER
        function loadEngine(type, url, videoEl) {
            const scripts = {
                hls: "https://cdn.jsdelivr.net/npm/hls.js@latest",
                shaka: "https://cdnjs.cloudflare.com/ajax/libs/shaka-player/4.3.5/shaka-player.compiled.js"
            };

            const libName = type === 'hls' ? 'Hls' : 'shaka';

            if (!window[libName]) {
                const s = document.createElement('script');
                s.src = scripts[type];
                s.onload = () => initEngine(type, url, videoEl);
                document.head.appendChild(s);
            } else {
                initEngine(type, url, videoEl);
            }
        }

        function initEngine(type, url, videoEl) {
            if (type === 'hls') {
                hlsInst = new Hls();
                hlsInst.loadSource(url);
                hlsInst.attachMedia(videoEl);
                hlsInst.on(Hls.Events.MANIFEST_PARSED, () => videoEl.play());
            } else {
                shakaInst = new shaka.Player(videoEl);
                shakaInst.load(url).then(() => videoEl.play()).catch(console.error);
            }
        }
    </script>
</body>
</html>
