<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MSTV | V28 UNIFIED</title>
    <style>
        :root { --accent: #22c55e; --bg: #000; }
        body { margin: 0; background: var(--bg); color: #fff; font-family: sans-serif; }

        /* THE PLAYER (Fixed at top - 16:9 Ratio) */
        #stage-container { 
            position: fixed; top: 0; width: 100%; height: 56.25vw; 
            max-height: 50vh; background: #000; z-index: 2000;
            border-bottom: 2px solid #111;
        }
        #iframePlayer { width: 100%; height: 100%; border: none; display: block; }

        /* THE SCROLLABLE CATALOG (Starts below the player) */
        #catalog-wrapper { 
            margin-top: 56.25vw; /* Same as player height to prevent overlap */
            padding: 15px;
            min-height: 100vh;
        }
        
        .grid { 
            display: grid; 
            grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); 
            gap: 10px; 
        }

        /* FUNCTIONAL CARDS */
        .card { 
            background: #0a0a0a; border: 1px solid #222; border-radius: 6px; 
            aspect-ratio: 16/9; display: flex; align-items: center; justify-content: center;
            cursor: pointer; transition: 0.2s cubic-bezier(0.4, 0, 0.2, 1);
            text-align: center; padding: 10px; font-weight: 700; font-size: 12px;
            text-transform: uppercase; letter-spacing: 1px; color: #888;
        }
        
        /* Interactive State */
        .card:hover, .card:active { 
            border-color: var(--accent); color: #fff; background: #111;
            transform: translateY(-2px); box-shadow: 0 4px 15px rgba(34, 197, 94, 0.2);
        }

        .loading-status { text-align: center; color: var(--accent); font-size: 10px; margin-top: 20px; }
    </style>
</head>
<body>

    <div id="stage-container">
        <iframe id="iframePlayer" src="player.html#1" allow="autoplay; fullscreen"></iframe>
    </div>

    <div id="catalog-wrapper">
        <div id="channelList" class="grid">
            <div class="loading-status">SYNCING WITH CHANNELS2.JSON...</div>
        </div>
    </div>

<script>
    const list = document.getElementById('channelList');
    const player = document.getElementById('iframePlayer');

    async function syncAndBuild() {
        try {
            // 1. Fetch data from your real-time JSON
            const response = await fetch('channels2.json');
            const CHANNELS = await response.json();
            
            // 2. Wipe the "loading" text
            list.innerHTML = '';
            
            // 3. Build the ONLY functional grid
            const frag = document.createDocumentFragment();
            CHANNELS.forEach((ch, i) => {
                const card = document.createElement('div');
                card.className = 'card';
                card.textContent = ch.name;
                
                // THE BRAIN HANDSHAKE
                card.onclick = () => {
                    player.src = `player.html#${i + 1}`;
                    window.scrollTo({ top: 0, behavior: 'smooth' });
                };
                
                frag.appendChild(card);
            });
            
            requestAnimationFrame(() => list.appendChild(frag));

        } catch (err) {
            list.innerHTML = '<div class="loading-status">ERROR: CHECK CHANNELS2.JSON</div>';
        }
    }

    // Initialize on load
    window.onload = syncAndBuild;
</script>
</body>
</html>
