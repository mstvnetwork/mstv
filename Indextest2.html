<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MSTV Network</title>
    <link rel="preload" href="channels2.json" as="fetch" crossorigin="anonymous">
    <link rel="preconnect" href="https://cdn.jsdelivr.net" crossorigin>
    <link rel="preconnect" href="https://cdnjs.cloudflare.com" crossorigin>
    <style>
        /* 1. GLOBAL & RESET - prevent font-based reflow */
        * { margin: 0; padding: 0; box-sizing: border-box; font-display: swap; }
        :root {
            --bg-dark: #111419;
            --accent: #2ECC71;
            --header-h: 70px;
            --ticker-h: 30px;
        }

        body {
            font-family: system-ui, -apple-system, sans-serif;
            background: #F8F9FA;
            color: #212529;
            line-height: 1.5;
            overflow-x: hidden;
        }

        header {
            height: var(--header-h);
            background: var(--bg-dark);
            display: flex; 
            align-items: center; 
            justify-content: space-between;
            padding: 0 15px;
            position: sticky;
            top: 0;
            z-index: 1000;
            contain: layout size; /* Isolates header from body layout */
        }
        .brand-name { 
    font-size: 1.5rem; 
    font-weight: 800; 
    color: var(--accent); 
    /* Tell the browser to prioritize this static text for LCP */
    content-visibility: visible;
    contain: none;
        }

        .search-container { flex: 0.6; max-width: 200px; }
        #searchInput {
            width: 100%; padding: 12px 15px; border-radius: 20px;
            border: 1px solid #444; background: #1A1D20; color: #fff; font-size: 16px;
        }

        /* 2. PLAYER WRAPPER - Fixes LCP and Reflow */
        .sticky-player-wrapper {
            position: sticky;
            top: var(--header-h);
            z-index: 900;
            background: #000;
            width: 100%;
            /* Strict ratio prevents the footer from jumping up and down */
            aspect-ratio: 16 / 10.5; 
            display: flex;
            flex-direction: column;
            contain: layout size;
        }
        
        .player-container {
            width: 100%;
            flex: 1;
            background: #000;
            position: relative;
            overflow: hidden;
        }

        #video, #iframePlayer, #placeholder { 
            position: absolute; top: 0; left: 0; width: 100%; height: 100%; object-fit: contain;
        }

        #placeholder { display: flex; align-items: center; justify-content: center; font-size: 3rem; z-index: 10; background: #000; }

        /* 3. TICKER - GPU Accelerated to prevent paint-reflows */
        .ticker { 
            width: 100%; height: var(--ticker-h); background: #D00000; color: #fff; 
            display: flex; align-items: center; overflow: hidden; font-size: 0.8rem;
            contain: strict;
        }
.ticker-track { 
    display: flex; 
    white-space: nowrap; 
    will-change: transform;
    /* FIX: Delay the animation by 2.5 seconds. 
       This allows the browser to 'Finalize' the paint while the text is static. */
    animation: ticker-loop 15s linear infinite; 
    animation-delay: 2.5s; 
}

/* Create a class to trigger the animation */
.animate-ticker {
    animation: ticker-loop 15s linear infinite;
}

        /* 4. MAIN CONTENT - The "Anti-Shift" Container */
        .main-content { 
            width: 100%; max-width: 1200px; margin: 0 auto; 
            /* Essential: Keeps the footer at the bottom before channels load */
            min-height: 80vh; 
        }

        .title-area { padding: 25px 15px; text-align: center; min-height: 80px; contain: layout; }
        .title-area h2 { font-weight: 700; font-size: 1.2rem; }

        .channel-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(130px, 1fr));
            grid-auto-rows: 95px;
            gap: 20px;
            padding: 0 20px 60px;
            /* Tells the browser this area will be roughly this tall */
            content-visibility: auto;
            contain-intrinsic-size: 1fr 500px; 
        }

        .channel-card {
            background: #fff; border: 1px solid #ddd; border-radius: 12px;
            display: flex; align-items: center; justify-content: center;
            padding: 15px; cursor: pointer; transition: transform 0.2s;
            box-shadow: 0 2px 5px rgba(0,0,0,0.06);
            will-change: transform;
        }
        .channel-card:hover { border-color: var(--accent); transform: translateY(-2px); }
        .channel-name { font-size: 0.95rem; font-weight: 700; color: #333; text-align: center; }

        /* Loader Styles */
        #loader {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            display: none; flex-direction: column; align-items: center; justify-content: center;
            z-index: 20; background: rgba(0,0,0,0.7); pointer-events: none;
        }
        .spinner { width: 40px; height: 40px; border: 4px solid rgba(255,255,255,0.1); border-top: 4px solid var(--accent); border-radius: 50%; animation: spin 0.8s linear infinite; }
        @keyframes spin { 100% { transform: rotate(360deg); } }

        .site-footer { background: var(--bg-dark); color: #FFF; padding: 40px 20px; text-align: center; }
        
        @media (max-width: 900px) and (orientation: landscape) {
            header, .sticky-player-wrapper { position: relative; top: 0; aspect-ratio: auto; }
        }
    </style>
</head>
<body>

    <header>
        <div class="brand-name">MSTV NETWORK</div>
        <div class="search-container">
            <input type="text" id="searchInput" placeholder="Search channels...">
        </div>
    </header>

    <div class="sticky-player-wrapper">
        <div class="player-container">
    <div id="placeholder">📺</div>
    <div id="loader"><div class="spinner"></div></div>
    
    <video id="video" playsinline controls>
        <track kind="captions" src="" srclang="en" label="Live Captions">
    </video>
    
    <iframe id="iframePlayer" title="Channel Player" frameborder="0" allowfullscreen></iframe>
        </div>
        <div class="ticker">
            <div class="ticker-track">
                <span> &nbsp; • &nbsp; Watch Free Live Channels &nbsp; • &nbsp; High Quality Streams &nbsp; • &nbsp; No Subscription Required &nbsp; • &nbsp; </span>
                <span> &nbsp; • &nbsp; Watch Free Live Channels &nbsp; • &nbsp; High Quality Streams &nbsp; • &nbsp; No Subscription Required &nbsp; • &nbsp; </span>
            </div>
        </div>
    </div>

    <main class="main-content">
        <div class="title-area">
            <h2 id="current-title">Select a Channel</h2>
        </div>
        <div id="channelList" class="channel-grid" role="list"></div>
    </main>

    <footer class="site-footer">
        <p>&copy; 2024 MSTV Network. All rights reserved.</p>
    </footer>

    <script>
        let allCh = [], hlsE = null, scP = null;
        const v = document.getElementById('video'), 
              f = document.getElementById('iframePlayer'), 
              l = document.getElementById('channelList'), 
              t = document.getElementById('current-title'), 
              ph = document.getElementById('placeholder'),
              ld = document.getElementById('loader');

        // PRE-FETCH DATA: Starts before DOM is even fully ready
        fetch('channels2.json')
            .then(r => r.json())
            .then(data => { allCh = data; render(allCh); })
            .catch(e => console.error("Data load failed"));

        function loadS() {
            if (scP) return scP;
            scP = new Promise(res => {
                let c = 0; const d = () => { if (++c === 2) res(); };
                const s1 = document.createElement('script'); 
                s1.src = "https://cdn.jsdelivr.net/npm/hls.js@1.4.12/dist/hls.min.js"; 
                s1.async = true; s1.onload = d;
                const s2 = document.createElement('script'); 
                s2.src = "https://cdnjs.cloudflare.com/ajax/libs/shaka-player/4.3.5/shaka-player.compiled.js"; 
                s2.async = true; s2.onload = () => { window.shaka.polyfill.installAll(); d(); };
                document.head.append(s1, s2);
            });
            return scP;
        }

        async function play(ch) {
    if (!ch || !ch.url) return;
    
    // 1. Handle external non-embeddable links
    if (ch.url.startsWith('http://')) { 
        window.open(ch.url, '_blank', 'noopener,noreferrer'); 
        return; 
    }

    // 2. Clean up previous streams and reset scroll
    window.scrollTo({ top: 0, behavior: 'auto' });
    if (hlsE) { hlsE.destroy(); hlsE = null; }
    v.pause(); v.src = ""; v.load();

    // 3. Batch all UI changes in one frame to prevent Reflow
    requestAnimationFrame(async () => {
        ph.style.display = 'none';
        ld.style.display = 'flex'; 
        t.innerText = ch.name;
        v.style.display = f.style.display = 'none'; 
        f.src = "";
        
        // --- START ACCESSIBILITY & LOADING LOGIC ---
        if (ch.type === 'iframe' || (!ch.url.includes('.m3u8') && !ch.url.includes('.mpd'))) {
            // FIX: Set title BEFORE setting src to help Screen Readers
            f.title = "Video Player: " + ch.name; 
            f.style.display = 'block'; 
            f.src = ch.url; 
            f.onload = () => ld.style.display = 'none';
        } else {
            // HLS/Dash Loading Logic
            await loadS(); 
            if (ch.url.includes('.mpd')) {
                const p = new shaka.Player(v);
                try { 
                    await p.load(ch.url); 
                    v.style.display = 'block'; 
                } catch (e) { 
                    ld.style.display = 'none'; 
                }
            } else if (window.Hls && Hls.isSupported()) {
                hlsE = new Hls({ enableWorker: true }); 
                hlsE.loadSource(ch.url); 
                hlsE.attachMedia(v);
                hlsE.on(Hls.Events.MANIFEST_PARSED, () => { 
                    v.play().catch(() => {}); 
                    v.style.display = 'block'; 
                    ld.style.display = 'none'; 
                });
            }
        }
        // --- END ACCESSIBILITY & LOADING LOGIC ---
    });
        }
        

        function render(data) {
    // 1. EXIT EARLY: If no data, don't clear the grid. 
    // This prevents the page from collapsing and triggering a CLS (Layout Shift).
    if (!data || data.length === 0) return;

    // 2. BATCHING: Create a fragment to build the list "off-screen".
    // This avoids multiple reflows during the loop.
    const fr = document.createDocumentFragment();

    data.forEach(ch => {
        const b = document.createElement('div'); 
        b.className = 'channel-card';
        
        // ACCESSIBILITY FIX: Define the relationship between item and list.
        b.setAttribute('role', 'listitem');
        b.setAttribute('tabindex', '0');
        
        // CONTENT: Using innerText for the name is safer and faster than innerHTML.
        b.innerHTML = `<span class="channel-name">${ch.name}</span>`;
        
        // INTERACTION: Ensure keyboard users (Enter/Space) can play channels.
        b.onclick = () => play(ch);
        b.onkeydown = (e) => { 
            if (e.key === 'Enter' || e.key === ' ') { 
                e.preventDefault(); 
                play(ch); 
            } 
        };
        
        fr.appendChild(b);
    });

    // 3. ATOMIC SWAP: requestAnimationFrame ensures the update happens 
    // exactly when the browser is ready to paint the next frame.
    requestAnimationFrame(() => {
        // replaceChildren() is the gold standard for performance.
        // it clears and appends in one single browser operation,
        // eliminating the "Forced Reflow" warning.
        l.replaceChildren(fr); 
    });
        }
    </script>
</body>
</html>
