<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MSTV OFFICIAL</title>
    <style>
        body { margin: 0; background: #000; color: #fff; font-family: sans-serif; overflow-x: hidden; }
        
        /* The Sticky Player Box */
        #stage { 
            position: sticky; top: 0; width: 100%; 
            height: 56.25vw; background: #111; z-index: 2000; 
            border-bottom: 2px solid #222;
        }
        iframe { width: 100%; height: 100%; border: none; display: block; }

        /* The Grid of Channels */
        #catalog { 
            padding: 20px; 
            display: grid; 
            grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); 
            gap: 15px; 
        }
        
        .card { 
            background: #111; border: 1px solid #333; border-radius: 8px; 
            padding: 20px; text-align: center; cursor: pointer; 
            font-weight: 900; text-transform: uppercase; font-size: 12px;
            transition: 0.2s; color: #888;
        }
        
        .card:active { border-color: #22c55e; color: #fff; transform: scale(0.95); }
    </style>
</head>
<body>

    <div id="stage">
        <iframe id="target" src="player.html#1" allow="autoplay; fullscreen"></iframe>
    </div>

    <div id="catalog">
        </div>

    <script>
        const catalog = document.getElementById('catalog');
        const player = document.getElementById('target');

        async function loadUI() {
            const res = await fetch('channels2.json');
            const data = await res.json();
            
            data.forEach((ch, i) => {
                const card = document.createElement('div');
                card.className = 'card';
                card.textContent = ch.name;
                
                // When clicked, change the URL of the iframe
                card.onclick = () => {
                    player.src = `player.html#${i + 1}`;
                    window.scrollTo({ top: 0, behavior: 'smooth' });
                };
                
                catalog.appendChild(card);
            });
        }
        window.onload = loadUI;
    </script>
</body>
</html>
