<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MSTV Network | Live Indian TV</title>
    
    <meta name="theme-color" content="#111419">
    <link rel="preload" href="channels2.json" as="fetch" crossorigin="anonymous">
    
    <script src="https://cdn.jsdelivr.net/npm/hls.js@1.4.12/dist/hls.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/shaka-player/4.3.5/shaka-player.compiled.js"></script>

    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root { --bg-dark: #111419; --accent: #2ECC71; --header-h: 70px; }

        html, body { 
            font-family: system-ui, -apple-system, sans-serif; 
            background: #F8F9FA; color: #212529; 
            overflow-x: hidden; width: 100%; position: relative;
            -webkit-tap-highlight-color: transparent;
        }

        header {
            height: var(--header-h); background: var(--bg-dark);
            display: flex; align-items: center; justify-content: space-between;
            padding: 0 15px; position: sticky; top: 0; z-index: 1000;
        }

        .brand-name { font-size: 1.2rem; font-weight: 800; color: var(--accent); }
        .search-container { flex: 0.6; max-width: 220px; }
        #searchInput {
            width: 100%; padding: 10px 15px; border-radius: 25px;
            border: none; background: #1A1D20; color: #fff; font-size: 15px; outline: none;
        }

        .sticky-player-wrapper { position: sticky; top: var(--header-h); z-index: 900; background: #000; width: 100%; }
        .player-container { width: 100%; aspect-ratio: 16 / 9; background: #000; position: relative; overflow: hidden; }
        #video, #iframePlayer, #placeholder { position: absolute; top: 0; left: 0; width: 100%; height: 100%; object-fit: contain; }
        
        #placeholder { 
            display: flex; flex-direction: column; align-items: center; justify-content: center; 
            text-align: center; z-index: 10; background: #000; color: #fff; padding: 20px;
        }

        @media (orientation: landscape) and (max-height: 500px) {
            header, .ticker, .scroll-controls, footer { display: none !important; }
            .sticky-player-wrapper { position: relative; top: 0; }
            .player-container { height: 100vh; aspect-ratio: auto; }
        }

        .channel-grid {
            display: flex; flex-wrap: nowrap; overflow-x: auto;
            gap: 18px; padding: 25px 15px 20px;
            scroll-snap-type: x mandatory;
            scrollbar-width: none;
            -webkit-overflow-scrolling: touch;
        }
        .channel-grid::-webkit-scrollbar { display: none; }

        .channel-card {
            flex: 0 0 120px; height: 115px; background: #fff; border: 1px solid #ddd; 
            border-radius: 15px; display: flex; flex-direction: column; 
            align-items: center; justify-content: center; padding: 12px;
            text-align: center; cursor: pointer; scroll-snap-align: start;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
            transition: transform 0.1s;
        }
        .channel-card.active-selection { border: 3px solid var(--accent); background: #eafff0; }

        .channel-logo { width: 52px; height: 52px; object-fit: contain; margin-bottom: 10px; pointer-events: none; }
        .main-name { font-size: 0.8rem; font-weight: 700; color: #333; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; width: 100%; }
        .sub-hint { font-size: 0.6rem; color: #D00000; margin-top: 3px; font-weight: 700; text-transform: uppercase; }

        .scroll-controls { display: flex; align-items: center; justify-content: center; gap: 40px; padding: 10px 0 40px; }
        .scroll-btn { 
            background: var(--bg-dark); color: #fff; border: none; 
            border-radius: 50%; width: 60px; height: 60px;
            cursor: pointer; display: flex; align-items: center; justify-content: center;
            font-size: 1.8rem; box-shadow: 0 4px 10px rgba(0,0,0,0.2);
        }
        .scroll-btn:active { transform: scale(0.85); background: var(--accent); }
        .scroll-note { font-size: 0.85rem; font-weight: 800; color: #444; text-transform: uppercase; letter-spacing: 1.5px; }

        footer { background: var(--bg-dark); color: #888; padding: 40px 20px; text-align: center; font-size: 0.9rem; }
        .ticker { width: 100%; height: 30px; background: #D00000; color: #fff; display: flex; align-items: center; overflow: hidden; font-size: 0.8rem; }
        .ticker-track { display: flex; white-space: nowrap; animation: ticker-loop 20s linear infinite; }
        @keyframes ticker-loop { from { transform: translate3d(0,0,0); } to { transform: translate3d(-50%,0,0); } }

        #loader { position: absolute; top: 0; left: 0; width: 100%; height: 100%; display: none; align-items: center; justify-content: center; z-index: 20; background: rgba(0,0,0,0.8); }
        .spinner { width: 40px; height: 40px; border: 4px solid #333; border-top: 4px solid var(--accent); border-radius: 50%; animation: spin 0.8s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>

    <header>
        <h1 class="brand-name">MSTV NETWORK</h1>
        <div class="search-container"><input type="text" id="searchInput" placeholder="Search channels..."></div>
    </header>

    <div class="sticky-player-wrapper">
        <section class="player-container">
            <div id="loader"><div class="spinner"></div></div>
            <div id="placeholder">
                <div style="font-size: 2rem; font-weight: 800; color: var(--accent);">SELECT CHANNEL</div>
                <div style="font-size: 0.9rem; opacity: 0.8; margin-top: 8px;">HTTP links open in a new window</div>
            </div>
            <video id="video" playsinline controls style="display:none;"></video>
            <iframe id="iframePlayer" style="display:none;" frameborder="0" allow="autoplay; fullscreen"></iframe>
        </section>
        <div class="ticker"><div class="ticker-track"><span>&nbsp; • Use VPN (Australia) for blocked channels • HD Streaming Optimized &nbsp; </span><span>&nbsp; • Use VPN (Australia) for blocked channels • HD Streaming Optimized &nbsp; </span></div></div>
    </div>

    <main>
        <div class="channel-grid" id="channelList"></div>
        <div class="scroll-controls">
            <button class="scroll-btn" onclick="scrollGrid(-250)">🔙</button>
            <div class="scroll-note">Tap Arrows</div>
            <button class="scroll-btn" onclick="scrollGrid(250)">➡️</button>
        </div>
    </main>

    <footer>
        <span style="color:var(--accent); font-weight:800; font-size: 1.2rem; display:block; margin-bottom:10px;">MSTV NETWORK</span>
        <p>© 2026 High Quality Indian Streams</p>
    </footer>

    <script>
        const dataPromise = fetch('channels2.json').then(r => r.json());
        let allCh = [], hlsE = null, dashP = null;

        const v = document.getElementById('video'), f = document.getElementById('iframePlayer'), 
              l = document.getElementById('channelList'), ld = document.getElementById('loader'), 
              ph = document.getElementById('placeholder');

        function scrollGrid(distance) { l.scrollBy({ left: distance, behavior: 'smooth' }); }

        async function killPlayers() {
            if (hlsE) { hlsE.stopLoad(); hlsE.detachMedia(); hlsE.destroy(); hlsE = null; }
            if (dashP) { await dashP.unload(); await dashP.destroy(); dashP = null; }
            v.pause(); v.removeAttribute('src'); v.load(); 
            f.src = "about:blank"; v.style.display = f.style.display = 'none';
        }

        async function play(ch, element) {
            if (!ch || !ch.url) return;
            if (ch.url.startsWith('http://')) { window.open(ch.url, '_blank'); return; }
            document.querySelectorAll('.channel-card').forEach(c => c.classList.remove('active-selection'));
            if (element) element.classList.add('active-selection');
            ld.style.display = 'flex'; ph.style.display = 'none';
            await killPlayers();
            try {
                if (ch.type === 'iframe' || (!ch.url.includes('.m3u8') && !ch.url.includes('.mpd'))) {
                    f.style.display = 'block'; f.src = ch.url; f.onload = () => ld.style.display = 'none';
                } else if (ch.url.includes('.mpd')) {
                    v.style.display = 'block'; dashP = new shaka.Player(v); await dashP.load(ch.url); v.play();
                } else {
                    if (window.Hls.isSupported()) {
                        hlsE = new Hls({ enableWorker: true, lowLatencyMode: true });
                        hlsE.loadSource(ch.url); hlsE.attachMedia(v);
                        hlsE.on(Hls.Events.MANIFEST_PARSED, () => { v.style.display = 'block'; v.play(); });
                    }
                }
            } catch (e) { ld.style.display = 'none'; }
        }

        function render(data) {
            const fr = document.createDocumentFragment();
            data.forEach(ch => {
                const b = document.createElement('div');
                b.className = 'channel-card';
                const logoHtml = ch.logo ? `<img src="${ch.logo}" class="channel-logo" loading="lazy">` : `<div class="channel-logo" style="font-size:30px;">📺</div>`;
                let nameHtml = ch.name && ch.name.includes('|') ? 
                    `<div class="channel-name-wrapper"><span class="main-name">${ch.name.split('|')}</span><span class="sub-hint">${ch.name.split('|')}</span></div>` : 
                    `<div class="channel-name-wrapper"><span class="main-name">${ch.name || 'Unknown'}</span></div>`;
                b.innerHTML = logoHtml + nameHtml;

                // RELIABLE TOUCH PROTECTION
                let isMoving = false;
                let startX, startY;

                b.addEventListener('touchstart', (e) => {
                    isMoving = false;
                    startX = e.touches.pageX;
                    startY = e.touches.pageY;
                    b.style.transform = "scale(0.96)";
                }, {passive: true});

                b.addEventListener('touchmove', (e) => {
                    // Calculate movement
                    let diffX = Math.abs(e.touches.pageX - startX);
                    let diffY = Math.abs(e.touches.pageY - startY);
                    
                    // If finger moves more than 6 pixels, it's a scroll
                    if (diffX > 6 || diffY > 6) {
                        isMoving = true;
                        b.style.transform = "scale(1)";
                    }
                }, {passive: true});

                b.addEventListener('touchend', () => {
                    b.style.transform = "scale(1)";
                    if (!isMoving) {
                        play(ch, b);
                    }
                }, {passive: true});

                // Desktop click
                b.onclick = (e) => { if (e.pointerType === 'mouse') play(ch, b); };
                fr.appendChild(b);
            });
            l.innerHTML = ''; l.appendChild(fr);
        }

        dataPromise.then(data => { allCh = data; render(allCh); });
        v.addEventListener('playing', () => ld.style.display = 'none');
        document.getElementById('searchInput').oninput = (e) => {
            const query = e.target.value.toLowerCase();
            render(allCh.filter(c => c.name.toLowerCase().includes(query)));
        };
    </script>
</body>
    </html>
