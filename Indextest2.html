<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MSTV NETWORK | Master Build</title>

    <link rel="preload" href="channels2.json" as="fetch" crossorigin="anonymous">
    <link rel="preconnect" href="https://cdn.jsdelivr.net" crossorigin>

    <style>
        :root { --bg: #0f172a; --accent: #38bdf8; --card: #1e293b; --text: #f8fafc; }
        
        body { 
            background: var(--bg); color: var(--text); font-family: system-ui, sans-serif; 
            margin: 0; padding: 0; display: flex; flex-direction: column; height: 100vh; overflow: hidden; 
        }

        /* STICKY UI */
        .top-section { z-index: 100; background: var(--bg); flex-shrink: 0; box-shadow: 0 4px 15px rgba(0,0,0,0.5); }
        .info-bar { background: #000; padding: 10px; text-align: center; font-size: 0.85rem; color: var(--accent); border-bottom: 1px solid #334155; }
        .header { padding: 12px; text-align: center; background: #1e293b; }
        .brand-name { font-size: 1.4rem; font-weight: 800; color: var(--accent); }

        /* PLAYER */
        .player-box { width: 100%; aspect-ratio: 16/9; background: #000; position: relative; overflow: hidden; }
        #iframePlayer { width: 100%; height: 100%; display: none; border: none; }
        #placeholder { display: flex; height: 100%; align-items: center; justify-content: center; font-size: 2.5rem; position: absolute; width: 100%; z-index: 1; }
        video { width: 100%; height: 100%; display: block; background: #000; position: relative; z-index: 2; }

        /* SCROLLABLE GRID */
        main { flex-grow: 1; overflow-y: auto; -webkit-overflow-scrolling: touch; padding-bottom: 30px; }
        .channel-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(130px, 1fr)); gap: 15px; padding: 20px; }
        .card { background: var(--card); padding: 20px; border-radius: 10px; text-align: center; border: 1px solid #334155; font-weight: 600; cursor: pointer; transition: 0.2s; }
        .card:hover { border-color: var(--accent); background: #2d3a4f; transform: translateY(-2px); }

        /* LANDSCAPE FIX */
        @media (orientation: landscape) and (max-height: 500px) {
            .info-bar, .header, main { display: none !important; }
            .top-section, .player-box, video, #iframePlayer { height: 100vh !important; width: 100vw !important; position: fixed; top: 0; left: 0; z-index: 9999; }
        }
    </style>
</head>
<body>

    <div class="top-section">
        <div class="info-bar"><span>• Watch Free Live Channels • High Quality Streams •</span></div>
        <header class="header"><div class="brand-name">MSTV NETWORK</div></header>
        <div class="player-box" id="playerContainer">
            <div id="placeholder">📺</div>
            <iframe id="iframePlayer" allowfullscreen title="External Player"></iframe>
        </div>
    </div>

    <main><div id="channelList" class="channel-grid" role="list"></div></main>

    <script>
        /**
         * THE SMART ROBOTIC BRAIN
         * Handles protocol security, hardware resets, and engine switching.
         */
        const PlayerBrain = {
            hls: null,
            shaka: null,
            container: document.getElementById('playerContainer'),
            iframe: document.getElementById('iframePlayer'),
            placeholder: document.getElementById('placeholder'),

            // STEP 1: Full Hardware & Memory Wipe
            async purge() {
                this.placeholder.style.display = 'none';
                this.iframe.style.display = 'none';
                this.iframe.src = "";

                if (this.hls) { this.hls.destroy(); this.hls = null; }
                if (this.shaka) { await this.shaka.destroy(); this.shaka = null; }

                const oldV = document.querySelector('video');
                if (oldV) {
                    oldV.pause();
                    oldV.removeAttribute('src'); 
                    oldV.load(); // Flush Buffer
                    oldV.remove(); // Kill DOM element
                }
            },

            // STEP 2: Create sterile environment
            spawnVideo() {
                const v = document.createElement('video');
                v.playsInline = true;
                v.controls = true;
                v.autoplay = true;
                this.container.appendChild(v);
                return v;
            },

            // STEP 3: Smart Protocol Detection
            async boot(ch) {
                // SONY PAL FIX: If insecure HTTP link on HTTPS site, open in new tab
                if (ch.url.startsWith('http://') && window.location.protocol === 'https:') {
                    window.open(ch.url, '_blank');
                    return;
                }

                await this.purge();

                if (ch.type === 'iframe') {
                    this.iframe.style.display = 'block';
                    this.iframe.src = ch.url;
                } 
                else {
                    const videoEl = this.spawnVideo();
                    
                    // Delay slightly to let DOM register the new element
                    requestAnimationFrame(() => {
                        // STAR PLUS FIX: Default to HLS unless explicitly .mpd
                        if (ch.url.includes('.mpd')) {
                            this.initShaka(ch.url, videoEl);
                        } else {
                            this.initHls(ch.url, videoEl);
                        }
                    });
                }
            },

            // ENGINE: HLS.js (For .m3u8 and Star Plus)
            initHls(url, el) {
                const setup = () => {
                    if (Hls.isSupported()) {
                        this.hls = new Hls();
                        this.hls.loadSource(url);
                        this.hls.attachMedia(el);
                        this.hls.on(Hls.Events.MANIFEST_PARSED, () => el.play().catch(e => console.log("Blocked")));
                    } else if (el.canPlayType('application/vnd.apple.mpegurl')) {
                        el.src = url; // Native iOS support
                    }
                };
                if (!window.Hls) {
                    const s = document.createElement('script');
                    s.src = "https://cdn.jsdelivr.net/npm/hls.js@latest";
                    s.onload = setup;
                    document.head.appendChild(s);
                } else { setup(); }
            },

            // ENGINE: Shaka (For DASH .mpd)
            async initShaka(url, el) {
                const setup = async () => {
                    shaka.polyfill.installAll();
                    this.shaka = new shaka.Player(el);
                    try { await this.shaka.load(url); el.play(); } catch(e) { console.error(e); }
                };
                if (!window.shaka) {
                    const s = document.createElement('script');
                    s.src = "https://cdnjs.cloudflare.com/ajax/libs/shaka-player/4.3.5/shaka-player.compiled.js";
                    s.onload = setup;
                    document.head.appendChild(s);
                } else { await setup(); }
            }
        };

        // LOAD DATA
        fetch('channels2.json').then(r => r.json()).then(data => {
            const list = document.getElementById('channelList');
            const frag = document.createDocumentFragment();
            data.forEach(ch => {
                const card = document.createElement('div');
                card.className = 'card';
                card.innerText = ch.name;
                card.onclick = () => PlayerBrain.boot(ch);
                frag.appendChild(card);
            });
            list.replaceChildren(frag);
        });
    </script>
</body>
</html>
