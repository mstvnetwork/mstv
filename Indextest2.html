<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MSTV Network | Live Indian TV & Punjabi Channels</title>
    <meta name="description" content="Watch MSTV Network for free live Indian, Punjabi, and religious TV channels. High-speed HD streaming available on all devices.">
    
    <link rel="canonical" href="https://mstvnet.netlify.app/">
    <link rel="icon" href="/favicon.ico">
    <meta name="theme-color" content="#111419">

    <link rel="preconnect" href="https://cdnjs.cloudflare.com">
    <link rel="preconnect" href="https://cdn.jsdelivr.net">
    <link rel="preload" href="channels2.json" as="fetch" crossorigin="anonymous">

    <style>
        /* ... Keep your existing CSS variables ... */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root { --bg-dark: #111419; --accent: #2ECC71; --header-h: 70px; --ticker-h: 35px; }
        
        body {
            font-family: system-ui, -apple-system, sans-serif;
            background: #F8F9FA; color: #212529; line-height: 1.5;
            overflow-x: hidden; font-display: swap;
        }

        header {
            height: var(--header-h); background: var(--bg-dark);
            display: flex; align-items: center; justify-content: space-between;
            padding: 0 15px; position: sticky; top: 0; z-index: 1000; contain: layout;
        }

        .brand-name { font-size: 1.2rem; font-weight: 800; color: var(--accent); letter-spacing: 1px; }
        
        #searchInput {
            width: 100%; max-width: 200px; padding: 10px 15px; border-radius: 20px;
            border: 1px solid #555; background: #1A1D20; color: #FFFFFF; font-size: 16px;
        }

        .sticky-player-wrapper {
            position: sticky; top: var(--header-h); z-index: 900;
            background: #000; width: 100%; aspect-ratio: 16 / 10.5;
            display: flex; flex-direction: column; contain: size layout;
        }

        .player-container { width: 100%; aspect-ratio: 16 / 9; background: #000; position: relative; overflow: hidden; }

        #placeholder { 
            display: flex; align-items: center; justify-content: center; 
            z-index: 10; background: #000; height: 100%;
        }

        /* SPEED INDEX FIX: Faster Ticker Reveal */
        .ticker { 
            width: 100%; height: var(--ticker-h); background: #D00000; color: #fff; 
            display: flex; align-items: center; overflow: hidden; font-size: 0.85rem; 
            contain: strict; opacity: 0;
            animation: fadeInTicker 0.1s forwards 0.5s; 
        }

        @keyframes fadeInTicker { to { opacity: 1; } }

        .ticker-track { 
            display: flex; white-space: nowrap; 
            animation: ticker-loop 20s linear infinite; animation-delay: 0.6s; will-change: transform;
        }

        @keyframes ticker-loop { 0% { transform: translate3d(0, 0, 0); } 100% { transform: translate3d(-50%, 0, 0); } }

        .channel-grid {
            display: grid; grid-template-columns: repeat(auto-fill, minmax(130px, 1fr));
            gap: 15px; padding: 20px 15px; min-height: 500px;
            content-visibility: auto; contain-intrinsic-size: 500px;
        }

        .channel-card {
            background: #fff; border: 1px solid #ddd; border-radius: 12px;
            height: 90px; display: flex; align-items: center; justify-content: center;
            padding: 10px; cursor: pointer; box-shadow: 0 2px 5px rgba(0,0,0,0.05);
            font-weight: 600; font-size: 0.9rem;
        }

        .site-footer { background: #0b0d10; color: #FFFFFF; padding: 50px 20px; margin-top: auto; }
    </style>
</head>
<body>

    <header role="banner">
        <h1 class="brand-name">MSTV NETWORK</h1>
        <div class="search-container">
            <input type="text" id="searchInput" placeholder="Search..." aria-label="Search">
        </div>
    </header>

    <div class="sticky-player-wrapper">
        <section class="player-container">
            <div id="loader"><div class="spinner"></div></div>
            <div id="placeholder" fetchpriority="high">
                <h1 style="font-size: 1.2rem; font-weight: 800; color: #ffffff;">📺 MSTV LIVE</h1>
            </div>
            <video id="video" playsinline controls style="display:none;"></video>
            <iframe id="iframePlayer" style="display:none;" sandbox="allow-scripts allow-same-origin" allow="autoplay; fullscreen;"></iframe>
        </section>
        
        <div class="ticker" role="status">
            <div class="ticker-track">
                <div class="ticker-content">Use VPN with Australia server for blocked channels. Optimized for Android/Windows.</div>
                <div class="ticker-content">Use VPN with Australia server for blocked channels. Optimized for Android/Windows.</div>
            </div>
        </div>
    </div>

    <main class="main-content">
        <div class="title-area"><h2 id="current-title">Select Channel</h2></div>
        
        <div class="channel-grid" id="channelList" role="list">
            <div class="channel-card"><span>Loading...</span></div>
            <div class="channel-card"><span>Loading...</span></div>
            <div class="channel-card"><span>Loading...</span></div>
        </div>

        <footer class="site-footer">
            <p>© 2026 MSTV Network. All Rights Reserved.</p>
        </footer>
    </main>
 <script>
        let allCh = [], hlsE = null, shakaP = null, enginesLoaded = false;

        const v = document.getElementById('video'), 
              f = document.getElementById('iframePlayer'), 
              l = document.getElementById('channelList'), 
              t = document.getElementById('current-title'), 
              ph = document.getElementById('placeholder'),
              ld = document.getElementById('loader');

        // Parallel Engine Loader (Lazy)
        async function loadEngines() {
            if (enginesLoaded) return;
            const load = (src) => new Promise(res => {
                const s = document.createElement('script');
                s.src = src; s.async = true; s.onload = res;
                document.head.appendChild(s);
            });
            await Promise.all([
                load("https://cdn.jsdelivr.net/npm/hls.js@1.4.12/dist/hls.min.js"),
                load("https://cdnjs.cloudflare.com/ajax/libs/shaka-player/4.3.5/shaka-player.compiled.js")
            ]);
            window.shaka.polyfill.installAll();
            enginesLoaded = true;
        }

        async function play(ch) {
            if (!ch || !ch.url) return;
            
            // UI Setup
            ld.style.display = 'flex';
            ph.style.display = 'none';
            t.innerText = ch.name;
            v.style.display = f.style.display = 'none';
            f.src = "";

            // Cleanup
            if (hlsE) { hlsE.destroy(); hlsE = null; }
            if (shakaP) { await shakaP.destroy(); shakaP = null; }
            v.pause();

            if (ch.url.startsWith('http://') && !ch.url.includes('m3u8')) {
                window.open(ch.url, '_blank');
                ld.style.display = 'none';
                return;
            }

            if (ch.type === 'iframe' || (!ch.url.includes('.m3u8') && !ch.url.includes('.mpd'))) {
                f.style.display = 'block';
                f.src = ch.url;
                f.onload = () => ld.style.display = 'none';
            } else {
                await loadEngines();
                if (ch.url.includes('.mpd')) {
                    shakaP = new shaka.Player(v);
                    try {
                        await shakaP.load(ch.url);
                        v.style.display = 'block';
                        v.play();
                    } catch (e) { ld.style.display = 'none'; }
                } else if (window.Hls && Hls.isSupported()) {
                    hlsE = new Hls({ capLevelToPlayerSize: true });
                    hlsE.loadSource(ch.url);
                    hlsE.attachMedia(v);
                    hlsE.on(Hls.Events.MANIFEST_PARSED, () => {
                        v.style.display = 'block';
                        v.play();
                    });
                }
            }
            window.scrollTo({ top: 0, behavior: 'smooth' });
                                              }
        document.addEventListener('DOMContentLoaded', () => {
            // Priority fetch
            fetch('channels2.json')
                .then(r => r.json())
                .then(data => { 
                    allCh = data; 
                    render(data); 
                });
        });

        // Use requestIdleCallback for footer reveal to keep Speed Index low
        window.onload = () => {
            if ('requestIdleCallback' in window) {
                requestIdleCallback(() => {
                    document.querySelector('.site-footer').style.contentVisibility = 'visible';
                });
            } else {
                setTimeout(() => {
                    document.querySelector('.site-footer').style.contentVisibility = 'visible';
                }, 1000);
            }
        };
    </script>
</body>
</html>
