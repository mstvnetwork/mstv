<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Live Stream</title>

    <script src="https://unpkg.com/x-frame-bypass"></script>
    <script type="module" src="https://unpkg.com/x-frame-bypass"></script>

    <style>
        :root { --primary: #00ffA0; }

        body, html {
            margin: 0; padding: 0;
            width: 100%; height: 100%;
            background: #000;
            display: flex; align-items: center; justify-content: center;
            overflow: hidden;
        }

        .viewport {
            width: 100vw; max-width: 1000px; aspect-ratio: 16 / 9;
            overflow: hidden; position: relative;
            border: 4px solid var(--primary); border-radius: 12px;
            background: #000;
        }

        /* Your Custom Configuration Applied Here */
        #frameMover {
            position: absolute; width: 100%; height: 600%; top: -180px; left: 0%;
        }

        #captureFrame {
            width: 100%; height: 100%; border: none;
        }

        /* ── Tap-to-unmute overlay ── */
        #unmuteBtn {
            position: absolute;
            /* place it away from player controls — top-right corner */
            top: 12px; right: 12px;
            z-index: 10001;
            background: rgba(0, 0, 0, 0.65);
            border: 1.5px solid var(--primary);
            border-radius: 50px;
            color: var(--primary);
            font-family: sans-serif;
            font-size: 13px;
            font-weight: 600;
            padding: 6px 14px;
            display: flex;
            align-items: center;
            gap: 6px;
            cursor: pointer;
            backdrop-filter: blur(6px);
            transition: opacity 0.4s;
            touch-action: manipulation;
            -webkit-tap-highlight-color: transparent;
            user-select: none;
        }

        #unmuteBtn.hidden { opacity: 0; pointer-events: none; }

        #unmuteBtn svg {
            width: 15px; height: 15px;
            fill: var(--primary); flex-shrink: 0;
        }

        /* Ticker — purely decorative, never blocks touches */
        #ticker {
            position: absolute; top: 0; left: 0;
            width: 100%; background: transparent;
            overflow: hidden; white-space: nowrap;
            z-index: 10000; padding: 11px 0;
            pointer-events: none;
        }

        #ticker span {
            display: inline-block; padding-left: 100%;
            animation: scroll 15s linear infinite;
            color: #ff3b3b; font-family: sans-serif; font-size: 14px;
        }

        @keyframes scroll {
            0% { transform: translateX(0); }
            100% { transform: translateX(-100%); }
        }

        #errorScreen {
            display: none;
            position: absolute; inset: 0;
            background: #000; color: var(--primary);
            font-family: sans-serif; font-size: 15px;
            align-items: center; justify-content: center;
            text-align: center; padding: 20px; z-index: 20000;
            flex-direction: column; gap: 10px;
        }

        #fallback {
            display: none; text-align: center;
            color: #fff; font-family: sans-serif;
        }
    </style>
</head>
<body>

<div class="viewport" id="playerWrapper">

    <div id="ticker"><span>अगर क्लिक न हो तो रिफ्रेश करें।</span></div>

    <!-- Tap-to-unmute button on YOUR page — no cross-origin issues -->
    <button id="unmuteBtn" aria-label="Unmute stream">
        <!-- speaker-with-x icon -->
        <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
            <path d="M3 9v6h4l5 5V4L7 9H3zm13.5 3A4.5 4.5 0 0 0 14 7.97v8.05c1.48-.73 2.5-2.25 2.5-4.02zM14 3.23v2.06c2.89.86 5 3.54 5 6.71s-2.11 5.85-5 6.71v2.06c4.01-.91 7-4.49 7-8.77 0-4.28-2.99-7.86-7-8.77z"/>
        </svg>
        Tap to Unmute
    </button>

    <div id="errorScreen">
        ⚠️ Invalid or missing channel.<br>
        Add <code style="color:#fff">?ch=0</code> for channel 1,<br>
        <code style="color:#fff">?ch=1</code> for channel 2, etc.
    </div>

    <div id="frameMover">
        <iframe id="captureFrame" is="x-frame-bypass" scrolling="no"></iframe>
    </div>
</div>

<div id="fallback">
    <h2>Mobile Device Required</h2>
    <p>Please open this page on Android or iOS to view the stream.</p>
</div>

<script>
// ═══════════════════════════════════════════════════════════════════
//  CHANNEL LIST
//  Each channel gets its own unique embed URL:
//
//    stream-player.html?ch=0  →  CHANNELS[0]
//    stream-player.html?ch=1  →  CHANNELS[1]
//    ... and so on
//
//  Embed on any page with: <iframe src="stream-player.html?ch=0"></iframe>
// ═══════════════════════════════════════════════════════════════════
const CHANNELS = [
    { name: "Sony Pal Hd",      url: "https://tulnit.com/live/sony-pal/" },
    { name: "Shemaroo",         url: "https://www.distro.tv/live/shemaroo-filmigaane/" },
    { name: "Sony Max",         url: "https://tulnit.com/live/sony-max-hd-ind/" },
    { name: "Colors Hd",        url: "https://tulnit.com/live/bollywood-colors/" },
    { name: "Vision Punjab Hd", url: "https://tulnit.com/live/vision-punjab-tv-hd/" },
    { name: "Sony Pix Hd",      url: "https://tulnit.com/live/sony-pix-hd/" }
];
// ═══════════════════════════════════════════════════════════════════

(function () {

    function isMobile() {
        return /iPhone|iPad|iPod|Android/i.test(
            navigator.userAgent || navigator.vendor || window.opera
        );
    }

    if (!isMobile()) {
        document.addEventListener("DOMContentLoaded", function () {
            document.getElementById('playerWrapper').remove();
            document.getElementById('fallback').style.display = 'block';
        });
        return;
    }

    document.addEventListener("DOMContentLoaded", function () {

        const params      = new URLSearchParams(window.location.search);
        const chIndex     = parseInt(params.get('ch'), 10);
        const channel     = CHANNELS[chIndex];

        const iframe      = document.getElementById('captureFrame');
        const errorScreen = document.getElementById('errorScreen');
        const unmuteBtn   = document.getElementById('unmuteBtn');

        if (isNaN(chIndex) || !channel) {
            errorScreen.style.display = 'flex';
            document.getElementById('frameMover').style.display = 'none';
            unmuteBtn.style.display = 'none';
            return;
        }

        document.title = channel.name;
        iframe.src = channel.url;

        // ── Unmute logic ──
        // Browsers block autoplay with sound on cross-origin iframes.
        // The unmute button on THIS page reloads the iframe inside a real
        // user-gesture event, which grants the autoplay-with-sound permission.
        unmuteBtn.addEventListener('click', function () {
            // Reload the iframe — this time the browser grants sound because
            // the src assignment happens directly inside a user gesture handler.
            var currentSrc = iframe.src;
            iframe.src = '';
            iframe.src = currentSrc;

            // Also try postMessage in case the embedded player listens for it
            try {
                iframe.contentWindow.postMessage({ type: 'unmute' }, '*');
                iframe.contentWindow.postMessage({ muted: false }, '*');
            } catch(e) {}

            // Hide the button after tapping
            unmuteBtn.classList.add('hidden');
        });
    });

})();
</script>
</body>
</html>
