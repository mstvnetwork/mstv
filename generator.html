<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>SEO Page Generator with ZIP</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
</head>
<body style="font-family:Arial; padding:20px">

<h2>SEO Page Generator</h2>
<button onclick="generate()">Download All Pages as ZIP</button>

<script>
const jsonFile = 'channels2.json';

function slugify(name) {
  return name.toLowerCase().replace(/[^a-z0-9]+/g, '-').replace(/(^-|-$)/g, '');
}

async function generate() {
  const res = await fetch(jsonFile);
  const channels = await res.json();

  const zip = new JSZip();

  channels.forEach((ch, i) => {
    const slug = slugify(ch.name);

    const html = `<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Watch ${ch.name} Live Stream</title>
<meta name="description" content="Watch ${ch.name} live stream online in HD.">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
body{margin:0;background:#111;color:#fff;font-family:Arial}
iframe{width:100%;height:60vh;border:none}
h1{padding:10px}
p{padding:10px;color:#ccc}
</style>
</head>
<body>

<h1>${ch.name} Live Stream</h1>
<iframe src="../index.html?=${i}" allowfullscreen></iframe>
<p>Watch ${ch.name} live stream online in HD. Enjoy streaming anytime.</p>

</body>
</html>`;

    zip.file(slug + '.html', html);
  });

  zip.generateAsync({ type: 'blob' }).then(function(content) {
    const a = document.createElement('a');
    a.href = URL.createObjectURL(content);
    a.download = 'channels_pages.zip';
    a.click();
  });
}
</script>

</body>
</html>
