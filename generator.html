<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Generate SEO Pages</title>
</head>
<body>
<h2>SEO Page Generator</h2>
<button onclick="generate()">Generate Pages</button>
<pre id="output"></pre>

<script>
const jsonFile = 'channels2.json';

function slugify(name) {
  return name.toLowerCase().replace(/[^a-z0-9]+/g, '-').replace(/(^-|-$)/g, '');
}

async function generate() {
  const res = await fetch(jsonFile);
  const channels = await res.json();

  let output = '';

  channels.forEach((ch, i) => {
    const slug = slugify(ch.name);

    const html = `<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Watch ${ch.name} Live Stream</title>
<meta name="description" content="Watch ${ch.name} live stream online in HD.">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
body{margin:0;background:#000;color:#fff;font-family:Arial}
iframe{width:100%;height:60vh;border:none}
.channels{display:grid;grid-template-columns:repeat(auto-fill,minmax(120px,1fr));gap:10px;padding:10px}
.channel{background:#111;padding:10px;text-align:center;border-radius:8px;cursor:pointer}
.channel img{width:60px;height:60px;object-fit:contain}
</style>
</head>
<body>

<h2 style="padding:10px">${ch.name} Live</h2>

<iframe src="../index.html?=${i}" allowfullscreen></iframe>

<p style="padding:10px">
Watch ${ch.name} live stream online. Enjoy high quality streaming with easy access to all channels.
</p>

</body>
</html>`;

    output += `\n\n===== ${slug}.html =====\n` + html;
  });

  document.getElementById('output').textContent = output;
}
</script>
</body>
</html>
