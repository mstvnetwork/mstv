<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Live Stream Player</title>
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background: #000; position: relative; }
        iframe { width: 100%; height: 100%; border: none; opacity: 0; transition: opacity 0.3s ease; }
        
        /* The Loading Overlay Screen */
        #loader {
            position: absolute;
            inset: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            background: #000;
            color: #fff;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            font-size: 18px;
            font-weight: 500;
            z-index: 10;
            transition: opacity 0.4s ease, visibility 0.4s ease;
        }
        
        /* Class to hide loader and show player */
        .loaded #loader { opacity: 0; visibility: hidden; }
        .loaded iframe { opacity: 1; }
    </style>
</head>
<body>

    <!-- Loading message screen -->
    <div id="loader">Please wait loading...</div>
    <div id="player-target" style="width: 100%; height: 100%;"></div>

    <script>
        // 1. Add all your streaming URLs here. Match the index numbers carefully.
        const channels = {
            "1": "https://stb-air.wasmer.app//play.php?id=LIVETV_LIVETVCHANNEL_STAR_PLUS_HD&uid=999&pass=999",
            "2": "https://stb-air.wasmer.app//play.php?id=LIVETV_LIVETVCHANNEL_STAR_SPORTS_1_HD&uid=999&pass=999",
            "3": "https://example.com",
            "4": "https://example.com"
        };


    
        const urlParams = new URLSearchParams(window.location.search);
        const channelId = urlParams.get('ch');
        const targetDiv = document.getElementById('player-target');

        if (channelId && channels[channelId]) {
            const rawUrl = channels[channelId];
            const separator = rawUrl.includes('?') ? '&' : '?';
            const finalSrc = `${rawUrl}${separator}autoplay=1&mute=1`;

            const iframe = document.createElement('iframe');
            iframe.src = finalSrc;
            iframe.setAttribute('allow', 'autoplay; encrypted-media; picture-in-picture');
            iframe.setAttribute('allowfullscreen', 'true');
            iframe.setAttribute('scrolling', 'no');
            
            // Fires the exact second the iframe receives its backend page layout
            iframe.onload = function() {
                // Triggers the CSS transition to reveal the stream smoothly
                document.body.classList.add('loaded');
            };
            
            targetDiv.appendChild(iframe);
        } else {
            document.getElementById('loader').innerText = "Channel not found or invalid selection.";
        }
    </script>
</body>
</html>
