<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>MSTV Network</title>

<meta name="description" content="MSTV Network offers a variety of live TV channels including music, movies, and more. Watch your favorite channels online for free.">
<meta name="keywords" content="live TV, MSTV Network, free TV, live channels, streaming, music, bollywood, saga music">

<meta property="og:image" content="https://mstvnet.netlify.app/og-image.png">
<meta property="og:url" content="https://mstvnet.netlify.app">
<meta name="twitter:card" content="summary_large_image">
<meta name="twitter:title" content="MSTV Network">
<meta name="twitter:description" content="Stream live TV channels including music, movies, and more on MSTV Network.">
<meta name="twitter:image" content="https://mstvnet.netlify.app/og-image.png">

<script type="application/ld+json">
{
  "@context":"https://schema.org",
  "@type":"WebPage",
  "name":"MSTV Network",
  "description":"Stream live TV channels including music, movies, and more.",
  "url":"https://mstvnet.netlify.app",
  "publisher":{"@type":"Organization","name":"MSTV Network","logo":{"@type":"ImageObject","url":"https://mstvnet.netlify.app/logo.png"}},
  "mainEntityOfPage":"https://mstvnet.netlify.app"
}
</script>

<style>
html, body { margin:0; padding:0; overflow-x:hidden; font-family:Arial,sans-serif; background:#0F1115; color:#E0E0E0; display:flex; flex-direction:column; align-items:center; }
.title { font-size:2.2em; margin:50px 0 25px; font-weight:bold; text-align:center; background:linear-gradient(90deg,#90EE90,#00FFA3); -webkit-background-clip:text; color:transparent; }
.channel-select { margin-bottom:3vh; width:90%; max-width:400px; }
select { width:100%; padding:0.8em; font-size:1.1em; border-radius:12px; border:none; background:linear-gradient(145deg,#1A1D20,#141618); color:#90EE90; appearance:none; cursor:pointer; box-shadow:0 4px 15px rgba(0,255,160,0.2); transition:transform 0.2s ease, box-shadow 0.2s ease; }
select:hover { transform:translateY(-2px); box-shadow:0 6px 20px rgba(0,255,160,0.3); }
.player-container { position:relative; width:90%; max-width:900px; aspect-ratio:16/9; background:linear-gradient(135deg,#141618,#1A1D20); display:flex; align-items:center; justify-content:center; color:#90EE90; font-weight:bold; text-align:center; border-radius:15px; box-shadow:0 8px 25px rgba(0,255,160,0.2); overflow:hidden; margin-bottom:50px; }
video, iframe { position:absolute; top:0; left:0; width:100%; height:100%; border:none; border-radius:15px; display:none; }
#placeholder { width:100%; height:100%; display:flex; align-items:center; justify-content:center; font-size:1.8em; color:#90EE90; text-shadow:0 0 15px rgba(144,238,144,0.6); }
#fullscreen-btn { position:absolute; bottom:15px; right:15px; padding:8px 12px; background:rgba(0,255,160,0.25); border:none; border-radius:8px; color:#0F1115; font-weight:bold; cursor:pointer; backdrop-filter:blur(4px); z-index:20; display:none; transition:all 0.2s ease; }
footer { padding:20px; color:#A0A0A0; background:#1A1D20; border-top:1px solid rgba(255,255,255,0.05); width:100%; text-align:center; font-size:0.9em; }
</style>
</head>
<body>

<div class="title">MSTV NETWORK</div>

<div class="channel-select">
  <select id="channel-select">
    <option value="">Click here for channel list</option>
  </select>
</div>

<div class="player-container">
  <div id="placeholder">Select a channel to start streaming</div>
  <video id="video-player" autoplay playsinline></video>
  <iframe 
    id="iframe-player" 
    sandbox="allow-scripts allow-same-origin allow-presentation" 
    allow="autoplay; fullscreen; encrypted-media; picture-in-picture" 
    allowfullscreen
  ></iframe>
  <button id="fullscreen-btn">⛶ Fullscreen</button>
</div>

<footer>© 2025 MSTV INDIA. All rights reserved.</footer>

<script defer src="https://cdn.jsdelivr.net/npm/hls.js@1.5.1/dist/hls.min.js"></script>
<script defer>
const select = document.getElementById('channel-select');
const video = document.getElementById('video-player');
const iframe = document.getElementById('iframe-player');
const placeholder = document.getElementById('placeholder');
const fullscreenBtn = document.getElementById('fullscreen-btn');

let hls = null;
let channels = [];
let lastJson = null;
const JSON_URL = './channels.json';

function stopPlayback(){
  if(hls){ hls.destroy(); hls = null; }
  video.pause(); video.style.display='none';
  iframe.src=''; iframe.style.display='none';
  fullscreenBtn.style.display='none';
}

async function playChannel(ch){
  stopPlayback();
  placeholder.style.display='none';
  if(!ch){ placeholder.style.display='flex'; return; }

  if(ch.type === 'hls'){
    video.style.display='block';
    video.muted = false; // attempt autoplay unmuted
    fullscreenBtn.style.display = 'block'; // show HLS fullscreen

    if(typeof Hls !== 'undefined' && Hls.isSupported()){
      hls = new Hls({ maxBufferLength: 10, enableWorker: true, lowLatencyMode: true });
      hls.loadSource(ch.url);
      hls.attachMedia(video);
      hls.on(Hls.Events.MANIFEST_PARSED, async () => {
        try { await video.play(); }
        catch(e){ video.muted = true; video.play(); }
      });
    } else if(video.canPlayType('application/vnd.apple.mpegurl')){
      video.src = ch.url;
      try { await video.play(); }
      catch(e){ video.muted = true; video.play(); }
    }

  } else if(ch.type === 'iframe'){
    iframe.src = ch.url;
    iframe.style.display='block';
    fullscreenBtn.style.display='none'; // hide HLS fullscreen
  }
}

// HLS fullscreen button click
fullscreenBtn.addEventListener('click', () => {
  if(video.requestFullscreen){ video.requestFullscreen(); }
  else if(video.webkitRequestFullscreen){ video.webkitRequestFullscreen(); }
  else if(video.msRequestFullscreen){ video.msRequestFullscreen(); }
});

// Fetch channels JSON and populate select
async function fetchChannels(){
  try{
    const resp = await fetch(JSON_URL+'?t='+Date.now());
    if(!resp.ok) throw new Error('Fetch failed');
    const json = await resp.json();
    const str = JSON.stringify(json);
    if(str !== lastJson){
      lastJson = str;
      channels = json;
      select.innerHTML = '<option value="">👉📺 Select Channel</option>';
      channels.forEach((c,i) => {
        const o = document.createElement('option');
        o.value = i; o.textContent = c.name;
        select.appendChild(o);
      });
    }
  } catch(e){ console.error(e); }
}

select.addEventListener('change', () => {
  const i = select.value;
  playChannel(i === '' ? null : channels[i]);
});

fetchChannels();
setInterval(fetchChannels, 15000);
</script>
</body>
</html>
