<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#111419">

    <title>MSTV Network | Free Live Indian, Pakistani & International TV</title>
    <meta name="title" content="MSTV Network | Free Live Indian, Pakistani & International TV">
    <meta name="description" content="Watch MSTV Network for free 24/7 live streaming of Indian, Pakistani, and International TV channels.">
    <meta name="google-site-verification" content="36a9620cce1db39f">
    <link rel="canonical" href="https://mstvnet.netlify.app">

    <!-- Player Libraries -->
    <script defer src="./shaka.js"></script>
    <script src="https://cdn.jsdelivr.net"></script>

    <style>
        :root {
            --bg-dark: #0F1115;
            --accent: #90EE90;
            --header-h: 70px;
            --player-y: 70px;
        }

        body {
            background-color: #E8E4C9 !important;
            margin: 0; padding: 0;
            font-family: Arial, sans-serif;
        }

        header {
            position: sticky; top: 0; z-index: 1000;
            background: #111419; height: var(--header-h);
            display: flex; align-items: center; justify-content: space-between;
            padding: 0 5%; border-bottom: 1px solid #222;
        }

        .brand-name {
            font-size: 1.4rem; font-weight: bold;
            background: linear-gradient(90deg, #90EE90, #00FFA3);
            -webkit-background-clip: text; color: transparent;
        }

        .search-container input {
            width: 100%; padding: 10px 15px; border-radius: 25px;
            border: 1px solid #333; background: #1A1D20; color: white; outline: none;
        }

        .sticky-player-wrapper {
            position: sticky; top: var(--player-y); z-index: 900;
            background: #E8E4C9; padding: 15px 0; width: 100%;
            display: flex; flex-direction: column; align-items: center;
        }

        .player-container {
            position: relative; width: 92%; max-width: 600px; aspect-ratio: 16/9;
            background: black; border-radius: 12px; overflow: hidden;
        }

        video, iframe { position: absolute; top: 0; left: 0; width: 100%; height: 100%; border: none; display: none; }
        #placeholder { height: 100%; display: flex; align-items: center; justify-content: center; font-size: 5rem; color: var(--accent); }

        .channel-grid {
            display: grid; grid-template-columns: repeat(auto-fill, minmax(95px, 1fr));
            gap: 12px; padding: 20px 5%;
        }

        .channel-card {
            background: #E8E4C9; border-radius: 10px; padding: 8px;
            text-align: center; cursor: pointer; border: 1px solid #d6d6d6;
        }

        .card-logo img { width: 100%; height: 64px; object-fit: contain; }
        .channel-name { font-size: 11px; font-weight: 600; color: #334155; }

        .site-footer { padding: 40px 5%; text-align: center; background: #111419; color: #aaa; }
    </style>
</head>
<body>

<header>
    <div class="brand-name">MSTV NETWORK</div>
    <div class="search-container"><input type="text" id="channel-search" placeholder="Search..."></div>
</header>

<div class="sticky-player-wrapper">
    <div class="player-container">
        <div id="loading" style="display:none; color:white; position:absolute; top:50%; left:50%; transform:translate(-50%,-50%); z-index:10;">🌀 Loading...</div>
        <div id="placeholder">📺</div>
        <video id="video-player" autoplay playsinline controls></video>
        <iframe id="iframe-player"></iframe>
    </div>
</div>

<div class="channel-grid" id="channel-list-container"></div>

<footer class="site-footer">
    <p>© 2026 MSTV Network. All Rights Reserved.</p>
</footer>

<script>
let channels = [];
let hls = null;
let shakaPlayer = null;

const video = document.getElementById('video-player');
const iframe = document.getElementById('iframe-player');
const placeholder = document.getElementById('placeholder');
const loader = document.getElementById('loading');
const grid = document.getElementById('channel-list-container');

async function stopAll() {
    if(hls) { hls.destroy(); hls = null; }
    if(shakaPlayer) { await shakaPlayer.destroy(); shakaPlayer = null; }
    video.pause(); video.src = ""; video.style.display = 'none';
    iframe.src = ""; iframe.style.display = 'none';
    placeholder.style.display = 'flex';
}

async function playChannel(index) {
    const ch = channels[index];
    if (!ch) return;

    await stopAll();
    placeholder.style.display = 'none';
    if(loader) loader.style.display = 'block';

    if (ch.type === 'iframe') {
        iframe.style.display = 'block'; iframe.src = ch.url;
        iframe.onload = () => { if(loader) loader.style.display = 'none'; };
    } else {
        video.style.display = 'block';
        if (ch.url.includes('.m3u8')) {
            if (Hls.isSupported()) {
                hls = new Hls(); hls.loadSource(ch.url); hls.attachMedia(video);
                hls.on(Hls.Events.MANIFEST_PARSED, () => video.play());
            }
        } else {
            shaka.polyfill.installAll();
            shakaPlayer = new shaka.Player(video);
            await shakaPlayer.load(ch.url); video.play();
        }
    }
}

async function loadChannels() {
    const res = await fetch('./channels.json');
    channels = await res.json();
    renderUI(channels);
}

function renderUI(data) {
    grid.innerHTML = "";
    data.forEach((ch, i) => {
        const card = document.createElement('div');
        card.className = 'channel-card';
        card.innerHTML = `<div class="card-logo"><img src="${ch.logo}"></div><div class="channel-name">${ch.name}</div>`;
        card.onclick = () => { playChannel(i); window.scrollTo({top: 0, behavior: 'smooth'}); };
        grid.appendChild(card);
    });
}

video.onplaying = () => { if(loader) loader.style.display = 'none'; };
window.onload = loadChannels;
</script>
</body>
</html>
