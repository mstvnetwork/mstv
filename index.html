<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="description" content="MSTV Network offers a variety of live TV channels including music, movies, and more. Watch your favorite channels online for free.">
<meta name="keywords" content="live TV, MSTV Network, free TV, live channels, streaming, music, bollywood, saga music">
<meta name="robots" content="index, follow">

<title>MSTV Network</title>

<style>
html, body {
  margin: 0; padding: 0;
  background: #0F1115;
  font-family: 'Poppins', sans-serif;
  color: #E0E0E0;
  overflow-x: hidden; /* prevent sideways page scroll */
}

.player-container {
  position: relative;
  width: 90%;
  max-width: 1100px;
  aspect-ratio: 16 / 9;
  margin: 40px auto 60px;
  border-radius: 12px;
  overflow: hidden;     /* lock video inside container */
  background: #1A1D20;
  box-shadow: 0 8px 16px rgba(0,0,0,0.5);
  touch-action: none;   /* disables pinch-zoom/drag */
}

#video-player,
#iframe-player {
  position: absolute;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  object-fit: cover;
}

#placeholder {
  position: absolute;
  top:0; left:0;
  width: 100%; height: 100%;
  display: flex;
  align-items: center; justify-content: center;
  background: #1A1D20;
  color: #90EE90;
  font-size: 1.2rem;
}

#live-stamp {
  position: absolute;
  top: 16px;
  left: 16px;
  background: #E50914;
  color: #ffffff;
  font-size: 0.75rem;
  font-weight: 700;
  padding: 6px 14px;
  border-radius: 6px;
  letter-spacing: 1px;
  z-index: 1000;
  display: none;
}

select {
  display: block;
  margin: 20px auto;
  padding: 10px 14px;
  font-size: 1.1rem;
  border-radius: 8px;
  border: 1px solid #90EE90;
  background: #1A1D20;
  color: #90EE90;
  appearance: none;
}
</style>
</head>
<body>

<div class="player-container">
  <div id="placeholder">Select a channel to start streaming</div>
  <video id="video-player" autoplay playsinline controls controlsList="nofullscreen noremoteplayback"></video>
  <iframe id="iframe-player"
          sandbox="allow-scripts allow-same-origin allow-presentation"
          allow="autoplay; encrypted-media; picture-in-picture"
          style="display:none;"></iframe>
  <div id="live-stamp">MSTV NETWORK</div>
</div>

<select id="channel-select">
  <option value="">👉📺 Select Channel</option>
</select>

<script src="https://cdn.jsdelivr.net/npm/hls.js@1.5.1/dist/hls.min.js"></script>
<script>
const select = document.getElementById('channel-select');
const video = document.getElementById('video-player');
const iframe = document.getElementById('iframe-player');
const placeholder = document.getElementById('placeholder');
const liveStamp = document.getElementById('live-stamp');

let hls = null;
let channels = [];
let lastJson = null;
const JSON_URL = './channels.json';

function stopPlayback(){
  if (hls) { hls.destroy(); hls = null; }

  video.pause();
  video.removeAttribute('src');
  video.load();
  video.style.display = 'none';

  iframe.src = '';
  iframe.style.display = 'none';

  liveStamp.style.display = 'none';
}

function playChannel(ch){
  stopPlayback();
  placeholder.style.display = 'none';

  if(!ch){
    placeholder.style.display = 'flex';
    return;
  }

  if(ch.type === 'hls'){
    video.style.display = 'block';
    if(typeof Hls !== 'undefined' && Hls.isSupported()){
      hls = new Hls({
        maxBufferLength: 10,
        enableWorker: true,
        lowLatencyMode: true
      });
      hls.loadSource(ch.url);
      hls.attachMedia(video);
      hls.on(Hls.Events.MANIFEST_PARSED, () => {
        video.play().catch(()=>{});
        liveStamp.style.display = 'block';
      });
    } else if(video.canPlayType('application/vnd.apple.mpegurl')){
      video.src = ch.url;
      video.play().catch(()=>{});
      liveStamp.style.display = 'block';
    }
  } else if(ch.type === 'iframe'){
    iframe.src = ch.url;
    iframe.style.display = 'block';
    liveStamp.style.display = 'block';
  }
}

async function fetchChannels(){
  try{
    const resp = await fetch(JSON_URL+'?t='+Date.now());
    if(!resp.ok) throw new Error('Fetch failed');

    const json = await resp.json();
    const str = JSON.stringify(json);

    if(str !== lastJson){
      lastJson = str;
      channels = json;

      select.innerHTML = '<option value="">👉📺 Select Channel</option>';
      channels.forEach((c,i)=>{
        const o = document.createElement('option');
        o.value = i;
        o.textContent = c.name;
        select.appendChild(o);
      });
    }
  }catch(e){ console.error(e); }
}

select.addEventListener('change', () => {
  const i = select.value;
  playChannel(i === '' ? null : channels[i]);
});

fetchChannels();
setInterval(fetchChannels, 15000);
</script>

</body>
</html>
