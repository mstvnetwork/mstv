<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<meta name="keywords" content="IPTV, Live TV, Indian TV, Web Series, Movies, Free TV Streaming">

<style>
* { margin:0; padding:0; box-sizing:border-box; }

body {
    font-family: 'Segoe UI', sans-serif;
    background: radial-gradient(circle at top, #111, #000);
    color: #fff;
    min-height: 100vh;
    display:flex;
    flex-direction:column;
    align-items:center;
}

header {
    text-align:center;
    margin: 20px 10px 10px;
}
header h1 {
    font-size: 2.4rem;
    font-weight: 800;
    background: linear-gradient(90deg, #ff2d55, #ff8c00);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    text-shadow: 0 0 20px rgba(255,45,85,0.4);
}
header h2 {
    font-size: 1rem;
    color: #ccc;
    margin-top: 5px;
}

.player-wrapper {
    width: 100%;
    max-width: 1200px;
    aspect-ratio: 16 / 9;
    background: #000;
    border-radius: 12px;
    overflow: hidden;
    box-shadow: 0 0 40px rgba(255,0,0,0.25);
    margin: 15px;
}
iframe {
    width:100%;
    height:100%;
    border:none;
    display:block;
}

.instructions {
    max-width: 900px;
    text-align:center;
    font-size: 0.9rem;
    color:#aaa;
    margin: 10px 15px 20px;
    line-height:1.5;
}
.instructions span {
    color:#ff3b3b;

}

footer {
    width:100%;
    text-align:center;
    padding:15px;
    font-size:0.8rem;
    color:#777;
    border-top:1px solid #222;
}

@media(max-width:600px){
    header h1 { font-size:1.8rem; }
}
</style>
</head>

<body>

<header>
    <h1>Apna TV 24/7</h1>
    <h2>Watch Latest TV Serials, Web Series, Movies Etc.</h2>
</header>

<div class="player-wrapper">
    <iframe 
        id="player" 
        src="https://mstvnetwork.github.io/mstv4/index5.html" 
        allowfullscreen>
    </iframe>
</div>

<div class="instructions">
    <p><span>Note:</span> Do not refresh the webpage unless video does not play.</p>
    <p>If refreshed accidentally, the video may restart from beginning until next program starts.</p>
</div>

<footer id="footer"></footer>

<script>
// SEO FOOTER
document.getElementById("footer").innerHTML =
"Apna TV 24/7 provides free access to live TV serials, movies, and web series. Stream anytime anywhere.";

// SCHEMA
const schema = {
    "@context": "https://schema.org",
    "@type": "WebSite",
    "name": "Apna TV 24/7",
    "url": window.location.href,
    "description": "Watch latest TV serials, movies and web series online 24/7."
};

const script = document.createElement('script');
script.type = "application/ld+json";
script.text = JSON.stringify(schema);
document.head.appendChild(script);
</script>

</body>
</html>
