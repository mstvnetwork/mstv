<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<title>Apna TV 24/7 - Cinema Mode</title>

<style>
* { margin:0; padding:0; box-sizing:border-box; }

body {
    font-family: 'Segoe UI', sans-serif;
    background: radial-gradient(circle at top, #111, #000);
    color: #fff;
    min-height: 100vh;
    display:flex;
    flex-direction:column;
    align-items:center;
}

/* --- TITLE --- */
header {
    text-align:center;
    margin: 20px 10px 10px;
}
header h1 {
    font-size: 2.4rem;
    font-weight: 800;
    background: linear-gradient(90deg, #ff2d55, #ff8c00);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    text-shadow: 0 0 20px rgba(255,45,85,0.4);
}
header h2 {
    font-size: 1rem;
    color: #ccc;
    margin-top: 5px;
}

/* --- PLAYER --- */
.player-wrapper {
    width: 100%;
    max-width: 1200px;
    aspect-ratio: 16 / 9;
    background: #000;
    border-radius: 12px;
    overflow: hidden;
    box-shadow: 0 0 40px rgba(255,0,0,0.25);
    margin: 15px;
    position: relative;
}
     
iframe {
    width: 100%;
    height: 100%;
    border: none;
    display: block;
}
    /* --- LOCK SCREEN & NOTIFICATION --- */
#lock-screen {
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: transparent;
    z-index: 10;
    display: none; /* Initially hidden */
}

#lock-status {
    position: absolute;
    top: 10px;
    right: 10px;
    background: rgba(0, 0, 0, 0.7);
    color: #00ff00;
    padding: 5px 12px;
    border-radius: 4px;
    font-size: 0.8rem;
    z-index: 11;
    display: none;
    border: 1px solid #00ff00;
    pointer-events: none;
}

.player-wrapper { position: relative; }

/* --- TICKER BELOW PLAYER --- */
.ticker {
    width: 100%;
    max-width: 1200px;
    background: #111;
    color: yellow;
    font-size: 0.9rem;
    padding: 8px 0;
    overflow: hidden;
    white-space: nowrap;
    border-top: 1px solid #222;
}

.ticker span {
    display: inline-block;
    padding-left: 100%;
    animation: scrollTicker 20s linear infinite;
}

@keyframes scrollTicker {
    from { transform: translateX(0); }
    to { transform: translateX(-100%); }
}

/* --- INSTRUCTIONS --- */
.instructions {
    max-width: 900px;
    text-align:center;
    font-size: 0.9rem;
    color:#aaa;
    margin: 10px 15px 20px;
    line-height:1.5;
}
.instructions span {
    color:#ff3b3b;
    font-weight:600;
}

/* --- FOOTER --- */
footer {
    width:100%;
    text-align:center;
    padding:15px;
    font-size:0.8rem;
    color:muddy grey;
    border-top:1px solid #222;
}

/* --- MOBILE --- */
@media(max-width:600px){
    header h1 { font-size:1.8rem; }
}
</style>
</head>
<body>

<header>
    <h1>Apna TV 24/7</h1>
    <h2>Premium Live Streaming Experience</h2>
</header>

<div class="player-wrapper" id="mainWrapper">
   
    <div id="lock-screen"></div>
    <div id="lock-status">Screen lock</div>
    <iframe id="videoPlayer" sandbox="allow-scripts allow-same-origin allow-forms allow-presentation" playsinline></iframe>
</div>

<div class="ticker" id="ticker">Connecting to schedule...</div>
<div class="instructions">
    <p><span>Note:</span> Do not refresh the webpage unless video does not play.</p>
    <p>If refreshed accidentally, the video may restart from beginning until next program starts.</p>
</div>
<footer id="footer">© 2026 Apna TV. All Rights Reserved.</footer>
<script>
const EPG_URL = "epg.json"; 

const ticker = document.getElementById("ticker");
const videoPlayer = document.getElementById("videoPlayer");
const lockScreen = document.getElementById("lock-screen");
const lockStatus = document.getElementById("lock-status");

let lockTimer = null;

function resetLockTimer() {
    if (lockTimer) clearTimeout(lockTimer);
    lockScreen.style.display = "none";
    lockStatus.innerText = "Apna Tv";
    lockStatus.style.display = "block";
    lockTimer = setTimeout(() => {
        lockScreen.style.display = "block";
        lockStatus.innerText = "Screen lock";
        setTimeout(() => { lockStatus.style.display = "none"; }, 3000);
    }, 30000); 
}

function getSecondsFromTimeString(timeStr) {
    if (!timeStr) return 0;
    const cleanStr = String(timeStr).replace(/,/g, ':');
    const parts = cleanStr.split(':');
    const hrs = parseInt(parts, 10) || 0;
    const mins = parseInt(parts, 10) || 0;
    const secs = parseInt(parts, 10) || 0;
    return (hrs * 3600) + (mins * 60) + secs;
}

function getCurrentISTSeconds() {
    const now = new Date();
    const istStr = now.toLocaleTimeString('en-GB', { timeZone: 'Asia/Kolkata', hour12: false });
    return getSecondsFromTimeString(istStr);
}

// FIXED: Correctly applies padding to strings, not the array
function formatTimeSimple(timeStr) {
    if (!timeStr) return "00:00";
    const cleanStr = String(timeStr).replace(/,/g, ':');
    const parts = cleanStr.split(':');
    if (parts.length >= 2) {
        const hh = parts.padStart(2, '0');
        const mm = parts.padStart(2, '0');
        return `${hh}:${mm}`;
    }
    return "00:00";
}

async function updatePlayerAndTicker() {
    try {
        const res = await fetch(EPG_URL + "?v=" + Date.now(), { cache: "no-store" });
        if (!res.ok) throw new Error("epg.json not found");
        
        const data = await res.json();
        const schedule = data.schedule;

        if (!schedule || schedule.length === 0) throw new Error("Schedule empty");

        const nowSec = getCurrentISTSeconds(); 
        let current = null;
        let next = null;

        for (let i = 0; i < schedule.length; i++) {
            const startSec = getSecondsFromTimeString(schedule[i].start);
            const endSec = getSecondsFromTimeString(schedule[i].end);
            
            let isCurrent = false;
            if (endSec < startSec) { 
                if (nowSec >= startSec || nowSec < endSec) isCurrent = true;
            } else {
                if (nowSec >= startSec && nowSec < endSec) isCurrent = true;
            }

            if (isCurrent) {
                current = schedule[i];
                next = schedule[i + 1] || schedule;
                break;
            }
        }

        // Infinite Loop Fallback
        if (!current) {
            current = schedule;
            next = schedule || schedule;
        }

        if (current) {
            // Video source logic
            if (current.url && !videoPlayer.src.includes(current.url)) {
                videoPlayer.src = current.url;
                resetLockTimer();
            }

            // Ticker display logic
            const cTitle = current.title || "Program";
            const cEnd   = formatTimeSimple(current.end);
            const nTitle = next ? next.title : "Next Show";
            const nStart = next ? formatTimeSimple(next.start) : "00:00";

            const tickerText = `
                🔴 Now: ${cTitle} (Ends ${cEnd})
                &nbsp;&nbsp;&nbsp;➡️ Next: ${nTitle} (Starts ${nStart})
            `;
            
            if (ticker.getAttribute('data-last') !== tickerText) {
                ticker.innerHTML = `<span>${tickerText}</span>`;
                ticker.setAttribute('data-last', tickerText);
            }
        }
    } catch (err) { 
        console.error("Sync Error:", err);
        ticker.innerHTML = `<span>⚠️ Error: ${err.message}</span>`;
    }
}

updatePlayerAndTicker();
setInterval(updatePlayerAndTicker, 10000);
                    </script>




</body>
</html>
