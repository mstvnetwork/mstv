<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<!-- 1. ANTI-CACHE META TAGS: Prevents the browser from caching the HTML page itself -->
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<title>MSNET IPTV Cinema Mode</title>

<title>Apna TV 24/7</title>
<meta name="description" content="Watch latest TV serials, web series, movies and live IPTV channels 24/7. Fast streaming, modern player, no interruptions.">
<meta name="keywords" content="IPTV, Live TV, Indian TV, Web Series, Movies, Free TV Streaming">
<meta name="robots" content="index, follow">

<meta property="og:title" content="Apna TV 24/7">
<meta property="og:description" content="Watch Latest TV Serials, Web Series, Movies & more in one place.">
<meta property="og:type" content="website">

<style>
* { margin:0; padding:0; box-sizing:border-box; }

body {
    font-family: 'Segoe UI', sans-serif;
    background: radial-gradient(circle at top, #111, #000);
    color: #fff;
    min-height: 100vh;
    display:flex;
    flex-direction:column;
    align-items:center;
}

/* --- TITLE --- */
header {
    text-align:center;
    margin: 20px 10px 10px;
}
header h1 {
    font-size: 2.4rem;
    font-weight: 800;
    background: linear-gradient(90deg, #ff2d55, #ff8c00);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    text-shadow: 0 0 20px rgba(255,45,85,0.4);
}
header h2 {
    font-size: 1rem;
    color: #ccc;
    margin-top: 5px;
}

/* --- PLAYER --- */
.player-wrapper {
    width: 100%;
    max-width: 1200px;
    aspect-ratio: 16 / 9;
    background: #000;
    border-radius: 12px;
    overflow: hidden;
    box-shadow: 0 0 40px rgba(255,0,0,0.25);
    margin: 15px;
    position: relative;
}

iframe {
    width: 100%;
    height: 100%;
    border: none;
    display: block;
}

/* --- TICKER BELOW PLAYER --- */
.ticker {
    width: 100%;
    max-width: 1200px;
    background: #111;
    color: yellow;
    font-size: 0.9rem;
    padding: 8px 0;
    overflow: hidden;
    white-space: nowrap;
    border-top: 1px solid #222;
}

.ticker span {
    display: inline-block;
    padding-left: 100%;
    animation: scrollTicker 20s linear infinite;
}

@keyframes scrollTicker {
    from { transform: translateX(0); }
    to { transform: translateX(-100%); }
}

/* --- INSTRUCTIONS --- */
.instructions {
    max-width: 900px;
    text-align:center;
    font-size: 0.9rem;
    color:#aaa;
    margin: 10px 15px 20px;
    line-height:1.5;
}
.instructions span {
    color:#ff3b3b;
    font-weight:600;
}

/* --- FOOTER --- */
footer {
    width:100%;
    text-align:center;
    padding:15px;
    font-size:0.8rem;
    color:muddy grey;
    border-top:1px solid #222;
}

/* --- MOBILE --- */
@media(max-width:600px){
    header h1 { font-size:1.8rem; }
}
</style>
</head>

<body>

<header>
    <h1>Apna TV 24/7</h1>
    <h2>Watch Latest TV Serials, Web Series, Movies</h2>
</header>

<div class="player-wrapper">
<iframe id="videoPlayer" sandbox="allow-scripts allow-same-origin allow-forms allow-presentation" playsinline></iframe>
       
</div>

<!-- Ticker directly below player -->
<div class="ticker" id="ticker">
    Loading schedule...
</div>

<div class="instructions">
    <p><span>Note:</span> Do not refresh the webpage unless video does not play.</p>
    <p>If refreshed accidentally, the video may restart from beginning until next program starts.</p>
</div>

<footer id="footer"></footer>
    <footer>
  <p>&copy; 2026 Apna Tv. All Rights Reserved.</p>
</footer>
<script>
// Base URL for the JSON file
const BASE_JSON_URL = "epg.json";



let silentLockTimer;
const lockOverlay = document.getElementById('silentLockOverlay');

function isStrictChrome() {
    const ua = navigator.userAgent;
    const isChrome = (ua.indexOf("Chrome") > -1 || ua.indexOf("CriOS") > -1);
    const isOther = (ua.indexOf("Edg") > -1 || ua.indexOf("SamsungBrowser") > -1 || ua.indexOf("OPR") > -1);
    return isChrome && !isOther;
}

async function loadEPG() {
    // 1. Keep the dynamic URL for cache-busting
    const freshUrl = BASE_JSON_URL + "?v=" + Date.now();
    
    try {
        // 2. Remove 'headers' and 'cache: no-store' to keep the request "simple"
        // This prevents the browser from sending a CORS pre-flight OPTIONS request.
        const res = await fetch(freshUrl);
        
        if (!res.ok) throw new Error("Network response was not ok");
        
        const data = await res.json();
        const now = new Date();
        let currentProgramTitle = null;

        // Same logic as before...
        for (let i = 0; i < data.schedule.length; i++) {
            const start = new Date(data.schedule[i].start);
            const end = new Date(data.schedule[i].end);
            if (now >= start && now < end) {
                currentProgramTitle = data.schedule[i].title;
                break;
            }
        }

        if(!currentProgramTitle) {
            rotateLocal();
        } else {
            syncVideo(currentProgramTitle);
        }

    } catch(e) {
        console.error("CORS or Fetch error, rotating locally:", e);
        rotateLocal();
    }
}


function rotateLocal() {
    const player = document.getElementById('videoPlayer');
    const currentIndex = playlist.findIndex(v => v.url === player.src);
    const nextIndex = (currentIndex + 1) % playlist.length;
    syncVideo(playlist[nextIndex].title);
}

function syncVideo(liveTitle){
    const player = document.getElementById('videoPlayer');
    let liveVideo = playlist.find(v => v.title === liveTitle);

    if(liveVideo && player.src !== liveVideo.url){
        player.src = liveVideo.url;

        // Reset Interaction Lock for 40 seconds
        clearTimeout(silentLockTimer);
        lockOverlay.style.pointerEvents = 'none'; 

        silentLockTimer = setTimeout(() => {
            lockOverlay.style.pointerEvents = 'auto';
        }, 40000); 
    }
}

window.onload = function(){
    if(isStrictChrome()){
        document.getElementById('chrome-only-content').style.display='block';
        document.getElementById('browser-error').style.display='none';
        loadEPG();
        // Check for latest updates from JSON every 60 seconds
        setInterval(loadEPG, 60000); 
    } else {
        document.getElementById('browser-error').style.display='block';
        document.getElementById('chrome-only-content').style.display='none';
    }
};
</script>
</body>
</html>
