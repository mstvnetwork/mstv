<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<!-- 1. ANTI-CACHE META TAGS: Prevents the browser from caching the HTML page itself -->
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<title>MSNET IPTV Cinema Mode</title>

<title>Apna TV 24/7</title>
<meta name="description" content="Watch latest TV serials, web series, movies and live IPTV channels 24/7. Fast streaming, modern player, no interruptions.">
<meta name="keywords" content="IPTV, Live TV, Indian TV, Web Series, Movies, Free TV Streaming">
<meta name="robots" content="index, follow">

<meta property="og:title" content="Apna TV 24/7">
<meta property="og:description" content="Watch Latest TV Serials, Web Series, Movies & more in one place.">
<meta property="og:type" content="website">

<style>
* { margin:0; padding:0; box-sizing:border-box; }

body {
    font-family: 'Segoe UI', sans-serif;
    background: radial-gradient(circle at top, #111, #000);
    color: #fff;
    min-height: 100vh;
    display:flex;
    flex-direction:column;
    align-items:center;
}

/* --- TITLE --- */
header {
    text-align:center;
    margin: 20px 10px 10px;
}
header h1 {
    font-size: 2.4rem;
    font-weight: 800;
    background: linear-gradient(90deg, #ff2d55, #ff8c00);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    text-shadow: 0 0 20px rgba(255,45,85,0.4);
}
header h2 {
    font-size: 1rem;
    color: #ccc;
    margin-top: 5px;
}

/* --- PLAYER --- */
.player-wrapper {
    width: 100%;
    max-width: 1200px;
    aspect-ratio: 16 / 9;
    background: #000;
    border-radius: 12px;
    overflow: hidden;
    box-shadow: 0 0 40px rgba(255,0,0,0.25);
    margin: 15px;
    position: relative;
}

iframe {
    width: 100%;
    height: 100%;
    border: none;
    display: block;
}
    /* --- LOCK SCREEN LAYER --- */
#lock-screen {
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: transparent;
    z-index: 10; /* Sits above the iframe */
    display: none; /* Hidden by default */
    cursor: default;
}

/* Ensure the player wrapper is the reference for the lock */
.player-wrapper {
    position: relative; 
}

/* --- TICKER BELOW PLAYER --- */
.ticker {
    width: 100%;
    max-width: 1200px;
    background: #111;
    color: yellow;
    font-size: 0.9rem;
    padding: 8px 0;
    overflow: hidden;
    white-space: nowrap;
    border-top: 1px solid #222;
}

.ticker span {
    display: inline-block;
    padding-left: 100%;
    animation: scrollTicker 20s linear infinite;
}

@keyframes scrollTicker {
    from { transform: translateX(0); }
    to { transform: translateX(-100%); }
}

/* --- INSTRUCTIONS --- */
.instructions {
    max-width: 900px;
    text-align:center;
    font-size: 0.9rem;
    color:#aaa;
    margin: 10px 15px 20px;
    line-height:1.5;
}
.instructions span {
    color:#ff3b3b;
    font-weight:600;
}

/* --- FOOTER --- */
footer {
    width:100%;
    text-align:center;
    padding:15px;
    font-size:0.8rem;
    color:muddy grey;
    border-top:1px solid #222;
}

/* --- MOBILE --- */
@media(max-width:600px){
    header h1 { font-size:1.8rem; }
}
</style>
</head>

<body>

<header>
    <h1>Apna TV 24/7</h1>
    <h2>Watch Latest TV Serials, Web Series, Movies</h2>
</header>

<div class="player-wrapper">
    <div id="lock-screen"></div> <iframe id="videoPlayer" sandbox="allow-scripts allow-same-origin allow-forms allow-presentation" playsinline></iframe>
</div>

<!-- Ticker directly below player -->
<div class="ticker" id="ticker">
    Loading schedule...
</div>

<div class="instructions">
    <p><span>Note:</span> Do not refresh the webpage unless video does not play.</p>
    <p>If refreshed accidentally, the video may restart from beginning until next program starts.</p>
</div>

<footer id="footer"></footer>
    <footer>
  <p>&copy; 2026 Apna Tv. All Rights Reserved.</p>
</footer>
<script>
const EPG_URL = "epg.json"; 
const ticker = document.getElementById("ticker");
const videoPlayer = document.getElementById("videoPlayer");
const lockScreen = document.getElementById("lock-screen");

// --- LOCK SCREEN LOGIC ---
// This will enable the transparent overlay 30 seconds after the page loads
setTimeout(() => {
    lockScreen.style.display = "block";
    console.log("Player Interaction Locked (Cinema Mode Active)");
}, 30000); // 30,000 milliseconds = 30 seconds


// --- EPG & ROTATION LOGIC ---
function getSecondsSinceMidnight(input) {
    const d = new Date(input);
    if (isNaN(d.getTime())) return 0;
    return (d.getUTCHours() * 3600) + (d.getUTCMinutes() * 60) + d.getUTCSeconds();
}

function formatTime(isoStr) {
    if (!isoStr) return "N/A";
    const d = new Date(isoStr);
    return d.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
}

async function updatePlayerAndTicker() {
    try {
        // Fetch with Cache Busting for Real-Time Updates
        const res = await fetch(EPG_URL + "?v=" + Date.now(), { cache: "no-store" });
        if (!res.ok) throw new Error("JSON Fetch Failed");
        
        const data = await res.json();
        const schedule = data.schedule;
        if (!schedule || schedule.length === 0) return;

        const now = new Date();
        const nowSec = getSecondsSinceMidnight(now);

        let current = null;
        let next = null;

        // 1. Find Current Show
        for (let i = 0; i < schedule.length; i++) {
            const startSec = getSecondsSinceMidnight(schedule[i].start);
            const endSec = getSecondsSinceMidnight(schedule[i].end);

            if (nowSec >= startSec && nowSec < endSec) {
                current = schedule[i];
                next = schedule[i + 1] || schedule; 
                break;
            }
        }

        // 2. Continuous Loop Fallback
        if (!current) {
            current = schedule;
            next = schedule || schedule;
        }

        if (current) {
            // 3. Auto-Rotate Iframe
            if (current.url && videoPlayer.src !== current.url) {
                videoPlayer.src = current.url;
            }

            // 4. Update Ticker (Only if text changed to preserve scroll)
            const tickerText = `
                🔴 Now: ${current.title} (Ends ${formatTime(current.end)})
                &nbsp;&nbsp;&nbsp;➡️ Next: ${next.title} (Starts ${formatTime(next.start)})
            `;
            
            if (ticker.getAttribute('data-last') !== tickerText) {
                ticker.innerHTML = `<span>${tickerText}</span>`;
                ticker.setAttribute('data-last', tickerText);
            }
        }
    } catch (err) {
        console.error("Sync Error:", err);
    }
}

// Check every 15 seconds
updatePlayerAndTicker();
setInterval(updatePlayerAndTicker, 15000);
    </script>
</body>
</html>
