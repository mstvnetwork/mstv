<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<title>Apna TV 24/7 - Cinema Mode</title>

<style>
/* --- BASE STYLES --- */
* { margin: 0; padding: 0; box-sizing: border-box; }

body {
    font-family: 'Segoe UI', Helvetica, Arial, sans-serif;
    background: radial-gradient(circle at top, #1a1a1a, #000);
    color: #fff;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
}

header { text-align: center; margin: 30px 10px 15px; }
header h1 {
    font-size: 2.6rem;
    font-weight: 800;
    background: linear-gradient(90deg, #ff2d55, #ff8c00);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
}
header h2 { font-size: 1.1rem; color: #aaa; margin-top: 8px; }

/* --- PLAYER CONTAINER --- */
.player-wrapper {
    width: 100%;
    max-width: 1100px;
    aspect-ratio: 16 / 9;
    margin: 20px auto;
    border-radius: 16px;
    position: relative;
    overflow: hidden;
    
    /* THE FIX: Force the background to be visible */
    background-color: #1a1a1a !important; 
    background-image: url('https://mstvnetwork.github.io/mstv4/assets/apna1.webp') !important;
    background-repeat: no-repeat !important;
    background-position: center center !important;
    background-size: contain !important; /* Shows full logo without cropping */
    
    /* Temporary Test Border - Remove this once you see the image */
    border: 2px solid red !important; 
    display: block !important;
}
#videoPlayer {
    position: absolute;
    top: 0; left: 0;
    width: 100%; height: 100%;
    border: none;
    display: none; /* JavaScript will flip this to 'block' when video is found */
    z-index: 1;
}

/* --- LOCK SCREEN & NOTIFICATIONS --- */
#lock-screen {
    position: absolute;
    top: 0; left: 0;
    width: 100%; height: 100%;
    background: transparent;
    z-index: 10;
    display: none;
}

#lock-status {
    position: absolute;
    top: 20px; right: 20px;
    background: rgba(0, 0, 0, 0.85);
    color: #00ff88;
    padding: 8px 16px;
    border-radius: 30px;
    font-size: 0.85rem;
    z-index: 11;
    display: none;
    border: 1px solid #00ff88;
    pointer-events: none;
}

/* --- TICKER --- */
.ticker {
    width: 100%;
    max-width: 1100px;
    background: #111;
    color: #ffcc00;
    font-size: 1rem;
    padding: 12px 0;
    overflow: hidden;
    white-space: nowrap;
    border-top: 1px solid #222;
    margin-bottom: 20px;
}
.ticker span {
    display: inline-block;
    padding-left: 100%;
    animation: scrollTicker 25s linear infinite;
}
@keyframes scrollTicker {
    from { transform: translateX(0); }
    to { transform: translateX(-100%); }
}

footer { padding: 20px; color: #444; font-size: 0.8rem; text-align: center; margin-top: auto; }

@media (max-width: 768px) {
    header h1 { font-size: 1.8rem; }
    .player-wrapper { margin: 10px; border-radius: 8px; }
}
</style>
</head>
<body>

<header>
    <h1>Apna TV 24/7</h1>
    <h2>Premium Live Streaming Experience</h2>
</header>

<div class="player-wrapper" id="mainWrapper">
    <div id="lock-screen"></div>
    <div id="lock-status">Screen lock is on</div>
    <iframe id="videoPlayer" sandbox="allow-scripts allow-same-origin allow-forms allow-presentation" playsinline></iframe>
</div>

<div class="ticker" id="ticker">Connecting to schedule...</div>

<footer id="footer">© 2026 Apna TV. All Rights Reserved.</footer>

<script>
const EPG_URL = "epg.json"; 
const ticker = document.getElementById("ticker");
const videoPlayer = document.getElementById("videoPlayer");
const lockScreen = document.getElementById("lock-screen");
const lockStatus = document.getElementById("lock-status");

let lockTimer = null;

/**
 * Resets the lock: unlocks the screen, shows the message, 
 * and sets a 30s timer to lock it again.
 */
function resetLockTimer() {
    // 1. Clear any existing timer
    if (lockTimer) clearTimeout(lockTimer);

    // 2. Unlock the screen and show status
    lockScreen.style.display = "none";
    lockStatus.innerText = "Screen lock will engage in 30s";
    lockStatus.style.display = "block";

    console.log("New video started. Interaction allowed for 30s.");

    // 3. Set timer to lock after 30s
    lockTimer = setTimeout(() => {
        lockScreen.style.display = "block";
        lockStatus.innerText = "Screen lock is ON";
        
        // Hide the message 3 seconds after lock is engaged to keep screen clean
        setTimeout(() => { lockStatus.style.display = "none"; }, 3000);
        
        console.log("Cinema Mode Active: Interaction Locked");
    }, 30000); 
}

// Time calculation functions
function getSecondsSinceMidnight(input) {
    const d = new Date(input);
    return isNaN(d.getTime()) ? 0 : (d.getUTCHours() * 3600) + (d.getUTCMinutes() * 60) + d.getUTCSeconds();
}

function formatTime(isoStr) {
    if (!isoStr) return "N/A";
    return new Date(isoStr).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
}

async function updatePlayerAndTicker() {
    try {
        const res = await fetch(EPG_URL + "?v=" + Date.now(), { cache: "no-store" });
        const data = await res.json();
        const schedule = data.schedule;

        const nowSec = getSecondsSinceMidnight(new Date());
        let current = null;
        let next = null;

        for (let i = 0; i < schedule.length; i++) {
            const startSec = getSecondsSinceMidnight(schedule[i].start);
            const endSec = getSecondsSinceMidnight(schedule[i].end);
            if (nowSec >= startSec && nowSec < endSec) {
                current = schedule[i];
                next = schedule[i + 1] || schedule;
                break;
            }
        }

        if (!current && schedule.length > 0) {
            current = schedule;
            next = schedule || schedule;
        }

        if (current) {
            // Check if the video has changed
            if (current.url && videoPlayer.src !== current.url) {
                videoPlayer.src = current.url;
                
                // TRIGGER LOCK RESET because a new video started
                resetLockTimer();
            }

            const tickerText = `
                🔴 Now: ${current.title} (Ends ${formatTime(current.end)})
                &nbsp;&nbsp;&nbsp;➡️ Next: ${next.title} (Starts ${formatTime(next.start)})
            `;
            if (ticker.getAttribute('data-last') !== tickerText) {
                ticker.innerHTML = `<span>${tickerText}</span>`;
                ticker.setAttribute('data-last', tickerText);
            }
        }
    } catch (err) { console.error("Sync Error:", err); }
}

// Initial Run
updatePlayerAndTicker();
setInterval(updatePlayerAndTicker, 15000);
</script>

</body>
</html>
