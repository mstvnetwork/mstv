<!DOCTYPE html>
<html lang="en">
<head>

<title>Apna TV 24/7</title>
<meta name="description" content="Watch latest TV serials, web series, movies and live IPTV channels 24/7. Fast streaming, modern player, no interruptions.">
<meta name="keywords" content="IPTV, Live TV, Indian TV, Web Series, Movies, Free TV Streaming">

<meta property="og:title" content="Apna TV 24/7">
<meta property="og:description" content="Watch Latest TV Serials, Web Series, Movies & more in one place.">

<style>
* { margin:0; padding:0; box-sizing:border-box; }

body {
    font-family: 'Segoe UI', sans-serif;
    background: radial-gradient(circle at top, #111, #000);
    color: #fff;
    min-height: 100vh;
    display:flex;
    flex-direction:column;
    align-items:center;
}

/* --- TITLE --- */
header {
    text-align:center;
    margin: 20px 10px 10px;
}
header h1 {
    font-size: 2.4rem;
    font-weight: 800;
    background: linear-gradient(90deg, #ff2d55, #ff8c00);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    text-shadow: 0 0 20px rgba(255,45,85,0.4);
}
header h2 {
    font-size: 1rem;
    color: #ccc;
    margin-top: 5px;
}

/* --- PLAYER --- */
.player-wrapper {
    width: 100%;
    max-width: 1200px;
    aspect-ratio: 16 / 9;
    background: #000;
    border-radius: 12px;
    overflow: hidden;
    box-shadow: 0 0 40px rgba(255,0,0,0.25);
    margin: 15px;
    position: relative;
}

iframe {
    width: 100%;
    height: 100%;
    border: none;
    display: block;
}

/* --- TICKER BELOW PLAYER --- */
.ticker {
    width: 100%;
    max-width: 1200px;
    background: #111;
    color: yellow;
    font-size: 0.9rem;
    padding: 8px 0;
    overflow: hidden;
    white-space: nowrap;
    border-top: 1px solid #222;
}

.ticker span {
    display: inline-block;
    padding-left: 100%;
    animation: scrollTicker 20s linear infinite;
}

@keyframes scrollTicker {
    from { transform: translateX(0); }
    to { transform: translateX(-100%); }
}

/* --- INSTRUCTIONS --- */
.instructions {
    max-width: 900px;
    text-align:center;
    font-size: 0.9rem;
    color:#aaa;
    margin: 10px 15px 20px;
    line-height:1.5;
}
.instructions span {
    color:#ff3b3b;
    font-weight:600;
}

/* --- FOOTER --- */
footer {
    width:100%;
    text-align:center;
    padding:15px;
    font-size:0.8rem;
    color:muddy grey;
    border-top:1px solid #222;
}

/* --- MOBILE --- */
@media(max-width:600px){
    header h1 { font-size:1.8rem; }
}
</style>
</head>

<body>

<header>
    <h1>Apna TV 24/7</h1>
    <h2>Watch Latest TV Serials, Web Series, Movies</h2>
</header>

<div class="player-wrapper">
<iframe id="videoPlayer" sandbox="allow-scripts allow-same-origin allow-forms allow-presentation" playsinline></iframe>
       
</div>

<!-- Ticker directly below player -->
<div class="ticker" id="ticker">
    Loading schedule...
</div>

<div class="instructions">
    <p><span>Note:</span> Do not refresh the webpage unless video does not play.</p>
    <p>If refreshed accidentally, the video may restart from beginning until next program starts.</p>
</div>

<footer id="footer"></footer>
    <footer>
  <p>&copy; 2026 Apna Tv. All Rights Reserved.</p>
</footer>


<script>
// --- EPG TICKER LOGIC ---
const ticker = document.getElementById("ticker");

// Helper: Converts a Date object or ISO string to total seconds since midnight UTC
function getSecondsSinceMidnight(input) {
    const d = new Date(input);
    return (d.getUTCHours() * 3600) + (d.getUTCMinutes() * 60) + d.getUTCSeconds();
}

async function loadEPG() {
    // Cache busting URL
    const freshUrl = "https://raw.githubusercontent.com/mstvnetwork/mstv/main/epg.json?t=" + Date.now();

    try {
        const res = await fetch(freshUrl);
        if (!res.ok) throw new Error(`HTTP error! status: ${res.status}`);
        
        const data = await res.json();
        
        // Current Time in total seconds today
        const now = new Date();
        const nowSec = getSecondsSinceMidnight(now);

        let current = null;
        let next = null;

        for (let i = 0; i < data.schedule.length; i++) {
            const startSec = getSecondsSinceMidnight(data.schedule[i].start);
            const endSec = getSecondsSinceMidnight(data.schedule[i].end);

            // Check if 'now' falls within the time slot (Date ignored)
            if (nowSec >= startSec && nowSec < endSec) {
                current = data.schedule[i];
                next = data.schedule[i + 1] || data.schedule; // Loop back to first show if at end
                break;
            }
        }

        // If no match found (e.g., after the last show of the night), default to first show
        if (!current && data.schedule.length > 0) {
            current = data.schedule;
            next = data.schedule;
        }

        if (current) {
            const formatTime = (isoStr) => {
                const d = new Date(isoStr);
                return d.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
            };

            const text = `
                🔴 Now: ${current.title} (Ends ${formatTime(current.end)})
                &nbsp;&nbsp;&nbsp;➡️ Next: ${next ? next.title : "N/A"} 
                ${next ? `(Starts ${formatTime(next.start)})` : ""}
            `;

            ticker.innerHTML = `<span>${text}</span>`;
            
            // IFRAME UPDATE LOGIC:
            // Assuming your JSON will eventually include a "url" field:
            /*
            const player = document.getElementById("videoPlayer");
            if (player.src !== current.url) {
                player.src = current.url;
            }
            */
        } else {
            ticker.innerHTML = `<span>No program data available</span>`;
        }

    } catch (err) {
        console.error("Ticker Fetch Error:", err);
        ticker.innerHTML = `<span>EPG loading error</span>`;
    }
}

// Initial load
loadEPG();
// Refresh every 30 seconds
setInterval(loadEPG, 30000);
</script>

</body>
</html>
