<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<!-- 1. ANTI-CACHE META TAGS: Prevents the browser from caching the HTML page itself -->
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<title>MSNET IPTV Cinema Mode</title>

<title>Apna TV 24/7</title>
<meta name="description" content="Watch latest TV serials, web series, movies and live IPTV channels 24/7. Fast streaming, modern player, no interruptions.">
<meta name="keywords" content="IPTV, Live TV, Indian TV, Web Series, Movies, Free TV Streaming">
<meta name="robots" content="index, follow">

<meta property="og:title" content="Apna TV 24/7">
<meta property="og:description" content="Watch Latest TV Serials, Web Series, Movies & more in one place.">
<meta property="og:type" content="website">
<style>
/* --- BASE STYLES --- */
* { 
    margin: 0; 
    padding: 0; 
    box-sizing: border-box; 
}

body {
    font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
    background: radial-gradient(circle at top, #1a1a1a, #000);
    color: #fff;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    overflow-x: hidden;
}

/* --- HEADER --- */
header {
    text-align: center;
    margin: 30px 10px 15px;
}
header h1 {
    font-size: 2.6rem;
    font-weight: 800;
    letter-spacing: -1px;
    background: linear-gradient(90deg, #ff2d55, #ff8c00);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    text-shadow: 0 0 30px rgba(255,45,85,0.3);
}
header h2 {
    font-size: 1.1rem;
    color: #aaa;
    margin-top: 8px;
    font-weight: 400;
}

/* --- PLAYER CONTAINER --- */
.player-wrapper {
    width: 100%;
    max-width: 1100px;
    aspect-ratio: 16 / 9;
    background-color: #080808;
    /* PLACEHOLDER IMAGE: Visible when iframe is hidden */
    background-image: url('https://mstvnetwork.github.io/mstv4/assets/apna1.webp'); 
    background-size: cover;
    background-position: center;
    border-radius: 16px;
    overflow: hidden;
    box-shadow: 0 20px 50px rgba(0,0,0,0.5), 0 0 20px rgba(255,45,85,0.1);
    margin: 20px;
    position: relative; /* Essential for the Lock Layer positioning */
    border: 1px solid #222;
}

/* --- THE IFRAME --- */
#videoPlayer {
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    border: none;
    display: none; /* Controlled by JavaScript (block when playing) */
    z-index: 1;
}

/* --- SILENT LOCK LAYER (The Shield) --- */
#lock-screen {
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: transparent;
    z-index: 10; /* Sits above the video */
    display: none; /* Triggered by JS after 30s */
    cursor: default;
}

/* --- LOCK STATUS NOTIFICATION --- */
#lock-status {
    position: absolute;
    top: 20px;
    right: 20px;
    background: rgba(0, 0, 0, 0.85);
    color: #00ff88;
    padding: 8px 16px;
    border-radius: 30px;
    font-size: 0.85rem;
    font-weight: 600;
    z-index: 11; /* Sits above the shield */
    display: none;
    border: 1px solid rgba(0, 255, 136, 0.3);
    box-shadow: 0 4px 15px rgba(0,0,0,0.5);
    pointer-events: none;
    transition: all 0.3s ease;
}

/* --- TICKER SECTION --- */
.ticker {
    width: 100%;
    max-width: 1100px;
    background: #111;
    color: #ffcc00;
    font-size: 1rem;
    padding: 12px 0;
    overflow: hidden;
    white-space: nowrap;
    border-top: 1px solid #222;
    border-bottom: 1px solid #222;
    margin-bottom: 20px;
}

.ticker span {
    display: inline-block;
    padding-left: 100%;
    animation: scrollTicker 25s linear infinite;
    font-weight: 500;
}

@keyframes scrollTicker {
    from { transform: translateX(0); }
    to { transform: translateX(-100%); }
}

/* --- INSTRUCTIONS & FOOTER --- */
.instructions {
    max-width: 800px;
    text-align: center;
    font-size: 0.9rem;
    color: #666;
    margin: 10px 20px 40px;
    line-height: 1.6;
}
.instructions span {
    color: #ff4d4d;
    font-weight: 700;
}

footer {
    width: 100%;
    text-align: center;
    padding: 30px;
    font-size: 0.85rem;
    color: #444;
    border-top: 1px solid #111;
    margin-top: auto;
}

/* --- MOBILE OPTIMIZATION --- */
@media (max-width: 768px) {
    header h1 { font-size: 2rem; }
    header h2 { font-size: 0.9rem; }
    .player-wrapper { margin: 10px; border-radius: 8px; }
    .ticker { font-size: 0.9rem; padding: 10px 0; }
    #lock-status { top: 10px; right: 10px; font-size: 0.75rem; }
}
</style>

</head>

<body>

<header>
    <h1>Apna TV 24/7</h1>
    <h2>Watch Latest TV Serials, Web Series, Movies</h2>
</header>

<div class="player-wrapper">
    <div id="lock-screen"></div>
    <div id="lock-status">Screen lock is on</div>
    <iframe id="videoPlayer" sandbox="allow-scripts allow-same-origin allow-forms allow-presentation" playsinline></iframe>
</div>

<!-- Ticker directly below player -->
<div class="ticker" id="ticker">
    Loading schedule...
</div>

<div class="instructions">
    <p><span>Note:</span> Do not refresh the webpage unless video does not play.</p>
    <p>If refreshed accidentally, the video may restart from beginning until next program starts.</p>
</div>

<footer id="footer"></footer>
    <footer>
  <p>&copy; 2026 Apna Tv. All Rights Reserved.</p>
</footer>
<script>
const EPG_URL = "epg.json"; 
const ticker = document.getElementById("ticker");
const videoPlayer = document.getElementById("videoPlayer");
const lockScreen = document.getElementById("lock-screen");
const lockStatus = document.getElementById("lock-status");

let lockTimer = null;

// --- LOCK LOGIC ---
function resetLockTimer() {
    if (lockTimer) clearTimeout(lockTimer);
    lockScreen.style.display = "none";
    lockStatus.innerText = "Interaction allowed for 30s";
    lockStatus.style.display = "block";

    lockTimer = setTimeout(() => {
        lockScreen.style.display = "block";
        lockStatus.innerText = "Screen lock";
        setTimeout(() => { lockStatus.style.display = "none"; }, 3000);
    }, 30000); 
}

// --- TIME CALCULATIONS ---
function getSecondsSinceMidnight(input) {
    const d = new Date(input);
    return isNaN(d.getTime()) ? 0 : (d.getUTCHours() * 3600) + (d.getUTCMinutes() * 60) + d.getUTCSeconds();
}

function formatTime(isoStr) {
    if (!isoStr) return "N/A";
    return new Date(isoStr).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
}

async function updatePlayerAndTicker() {
    try {
        const res = await fetch(EPG_URL + "?v=" + Date.now(), { cache: "no-store" });
        const data = await res.json();
        const schedule = data.schedule;

        const nowSec = getSecondsSinceMidnight(new Date());
        let current = null;
        let next = null;

        for (let i = 0; i < schedule.length; i++) {
            const startSec = getSecondsSinceMidnight(schedule[i].start);
            const endSec = getSecondsSinceMidnight(schedule[i].end);
            if (nowSec >= startSec && nowSec < endSec) {
                current = schedule[i];
                next = schedule[i + 1] || schedule;
                break;
            }
        }

        // Continuous Loop Fallback
        if (!current && schedule && schedule.length > 0) {
            current = schedule;
            next = schedule || schedule;
        }

        // --- RENDER LOGIC ---
        if (current && current.url) {
            // Show the iframe if it was hidden
            videoPlayer.style.display = "block";

            // If the URL has changed, update SRC and reset the lock
            if (videoPlayer.src !== current.url) {
                videoPlayer.src = current.url;
                resetLockTimer();
            }

            // Update Ticker
            const tickerText = `
                🔴 Now: ${current.title} (Ends ${formatTime(current.end)})
                &nbsp;&nbsp;&nbsp;➡️ Next: ${next.title} (Starts ${formatTime(next.start)})
            `;
            if (ticker.getAttribute('data-last') !== tickerText) {
                ticker.innerHTML = `<span>${tickerText}</span>`;
                ticker.setAttribute('data-last', tickerText);
            }
        } else {
            // NO PLAYBACK STATE
            videoPlayer.style.display = "none";
            videoPlayer.src = ""; // Clear source
            ticker.innerHTML = "<span>No program currently scheduled.</span>";
            lockScreen.style.display = "none"; // Remove lock so user can see placeholder clearly
            lockStatus.style.display = "none";
        }
    } catch (err) { 
        console.error("Sync Error:", err);
        videoPlayer.style.display = "none"; // Show placeholder on error
    }
}

// Initial Run and 15s Heartbeat
updatePlayerAndTicker();
setInterval(updatePlayerAndTicker, 15000);
</script>
</body>
</html>
