<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<!-- 1. ANTI-CACHE META TAGS: Prevents the browser from caching the HTML page itself -->
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<title>MSNET IPTV Cinema Mode</title>

<title>Apna TV 24/7</title>
<meta name="description" content="Watch latest TV serials, web series, movies and live IPTV channels 24/7. Fast streaming, modern player, no interruptions.">
<meta name="keywords" content="IPTV, Live TV, Indian TV, Web Series, Movies, Free TV Streaming">
<meta name="robots" content="index, follow">

<meta property="og:title" content="Apna TV 24/7">
<meta property="og:description" content="Watch Latest TV Serials, Web Series, Movies & more in one place.">
<meta property="og:type" content="website">

<style>
* { margin:0; padding:0; box-sizing:border-box; }

body {
    font-family: 'Segoe UI', sans-serif;
    background: radial-gradient(circle at top, #111, #000);
    color: #fff;
    min-height: 100vh;
    display:flex;
    flex-direction:column;
    align-items:center;
}

/* --- TITLE --- */
header {
    text-align:center;
    margin: 20px 10px 10px;
}
header h1 {
    font-size: 2.4rem;
    font-weight: 800;
    background: linear-gradient(90deg, #ff2d55, #ff8c00);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    text-shadow: 0 0 20px rgba(255,45,85,0.4);
}
header h2 {
    font-size: 1rem;
    color: #ccc;
    margin-top: 5px;
}

/* --- PLAYER --- */
.player-wrapper {
    width: 100%;
    max-width: 1200px;
    aspect-ratio: 16 / 9;
    background: #000;
    border-radius: 12px;
    overflow: hidden;
    box-shadow: 0 0 40px rgba(255,0,0,0.25);
    margin: 15px;
    position: relative;
}

iframe {
    width: 100%;
    height: 100%;
    border: none;
    display: block;
}
    /* --- LOCK SCREEN & NOTIFICATION --- */
#lock-screen {
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: transparent;
    z-index: 10;
    display: none; /* Initially hidden */
}

#lock-status {
    position: absolute;
    top: 10px;
    right: 10px;
    background: rgba(0, 0, 0, 0.7);
    color: #00ff00;
    padding: 5px 12px;
    border-radius: 4px;
    font-size: 0.8rem;
    z-index: 11;
    display: none;
    border: 1px solid #00ff00;
    pointer-events: none;
}

.player-wrapper { position: relative; }

/* --- TICKER BELOW PLAYER --- */
.ticker {
    width: 100%;
    max-width: 1200px;
    background: #111;
    color: yellow;
    font-size: 0.9rem;
    padding: 8px 0;
    overflow: hidden;
    white-space: nowrap;
    border-top: 1px solid #222;
}

.ticker span {
    display: inline-block;
    padding-left: 100%;
    animation: scrollTicker 20s linear infinite;
}

@keyframes scrollTicker {
    from { transform: translateX(0); }
    to { transform: translateX(-100%); }
}

/* --- INSTRUCTIONS --- */
.instructions {
    max-width: 900px;
    text-align:center;
    font-size: 0.9rem;
    color:#aaa;
    margin: 10px 15px 20px;
    line-height:1.5;
}
.instructions span {
    color:#ff3b3b;
    font-weight:600;
}

/* --- FOOTER --- */
footer {
    width:100%;
    text-align:center;
    padding:15px;
    font-size:0.8rem;
    color:muddy grey;
    border-top:1px solid #222;
}

/* --- MOBILE --- */
@media(max-width:600px){
    header h1 { font-size:1.8rem; }
}
</style>
</head>

<body>

<header>
    <h1>Apna TV 24/7</h1>
    <h2>Watch Latest TV Serials, Web Series, Movies</h2>
</header>

<div class="player-wrapper">
    <div id="lock-screen"></div>
    <div id="lock-status">Screen lock is on</div>
    <iframe id="videoPlayer" sandbox="allow-scripts allow-same-origin allow-forms allow-presentation" playsinline></iframe>
</div>

<!-- Ticker directly below player -->
<div class="ticker" id="ticker">
    Loading schedule...
</div>

<div class="instructions">
    <p><span>Note:</span> Do not refresh the webpage unless video does not play.</p>
    <p>If refreshed accidentally, the video may restart from beginning until next program starts.</p>
</div>

<footer id="footer"></footer>
    <footer>
  <p>&copy; 2026 Apna Tv. All Rights Reserved.</p>
</footer>
<script>
const EPG_URL = "epg.json"; 
const ticker = document.getElementById("ticker");
const videoPlayer = document.getElementById("videoPlayer");
const lockScreen = document.getElementById("lock-screen");
const lockStatus = document.getElementById("lock-status");

let lockTimer = null;

/**
 * Resets the lock: unlocks the screen, shows the message, 
 * and sets a 30s timer to lock it again.
 */
function resetLockTimer() {
    // 1. Clear any existing timer
    if (lockTimer) clearTimeout(lockTimer);

    // 2. Unlock the screen and show status
    lockScreen.style.display = "none";
    lockStatus.innerText = "Apna Tv";
    lockStatus.style.display = "block";

    console.log("New video started. Interaction allowed for 30s.");

    // 3. Set timer to lock after 30s
    lockTimer = setTimeout(() => {
        lockScreen.style.display = "block";
        lockStatus.innerText = "Screen lock";
        
        // Hide the message 3 seconds after lock is engaged to keep screen clean
        setTimeout(() => { lockStatus.style.display = "none"; }, 3000);
        
        console.log("Cinema Mode Active: Interaction Locked");
    }, 30000); 
}

// Time calculation functions
function getSecondsSinceMidnight(input) {
    const d = new Date(input);
    return isNaN(d.getTime()) ? 0 : (d.getUTCHours() * 3600) + (d.getUTCMinutes() * 60) + d.getUTCSeconds();
}

function formatTime(isoStr) {
    if (!isoStr) return "N/A";
    return new Date(isoStr).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
}

async function updatePlayerAndTicker() {
    try {
        const res = await fetch(EPG_URL + "?v=" + Date.now(), { cache: "no-store" });
        const data = await res.json();
        const schedule = data.schedule;

        const nowSec = getSecondsSinceMidnight(new Date());
        let current = null;
        let next = null;

        for (let i = 0; i < schedule.length; i++) {
            const startSec = getSecondsSinceMidnight(schedule[i].start);
            const endSec = getSecondsSinceMidnight(schedule[i].end);
            if (nowSec >= startSec && nowSec < endSec) {
                current = schedule[i];
                next = schedule[i + 1] || schedule;
                break;
            }
        }

        if (!current && schedule.length > 0) {
            current = schedule;
            next = schedule || schedule;
        }

        if (current) {
            // Check if the video has changed
            if (current.url && videoPlayer.src !== current.url) {
                videoPlayer.src = current.url;
                
                // TRIGGER LOCK RESET because a new video started
                resetLockTimer();
            }

            const tickerText = `
                🔴 Now: ${current.title} (Ends ${formatTime(current.end)})
                &nbsp;&nbsp;&nbsp;➡️ Next: ${next.title} (Starts ${formatTime(next.start)})
            `;
            if (ticker.getAttribute('data-last') !== tickerText) {
                ticker.innerHTML = `<span>${tickerText}</span>`;
                ticker.setAttribute('data-last', tickerText);
            }
        }
    } catch (err) { console.error("Sync Error:", err); }
}

// Initial Run
updatePlayerAndTicker();
setInterval(updatePlayerAndTicker, 15000);
</script>
</body>
</html>
