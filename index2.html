<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Apna TV 24/7</title>
<meta name="description" content="Watch latest TV serials, web series, movies and live IPTV channels 24/7. Fast streaming, modern player, no interruptions.">
<meta name="keywords" content="IPTV, Live TV, Indian TV, Web Series, Movies, Free TV Streaming">
<meta name="robots" content="index, follow">

<meta property="og:title" content="Apna TV 24/7">
<meta property="og:description" content="Watch Latest TV Serials, Web Series, Movies & more in one place.">
<meta property="og:type" content="website">

<style>

* { margin:0; padding:0; box-sizing:border-box; }

body {
    font-family: 'Segoe UI', sans-serif;
    background: radial-gradient(circle at top, #111, #000);
    color: #fff;
    min-height: 100vh;
    display:flex;
    flex-direction:column;
    align-items:center;
}

/* --- TITLE --- */
header {
    text-align:center;
    margin: 20px 10px 10px;
}
header h1 {
    font-size: 2.4rem;
    font-weight: 800;
    background: linear-gradient(90deg, #ff2d55, #ff8c00);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    text-shadow: 0 0 20px rgba(255,45,85,0.4);
}
header h2 {
    font-size: 1rem;
    color: #ccc;
    margin-top: 5px;
}

/* --- PLAYER --- */
.player-wrapper {
    width: 100%;
    max-width: 1200px;
    aspect-ratio: 16 / 9;
    background: #000;
    border-radius: 12px;
    overflow: hidden;
    box-shadow: 0 0 40px rgba(255,0,0,0.25);
    margin: 15px;
    position: relative;
}

iframe {
    width: 100%;
    height: 100%;
    border: none;
    display: block;
}

/* --- TICKER BELOW PLAYER --- */
.ticker {
    width: 100%;
    max-width: 1200px;
    background: #111;
    color: #fff;
    font-size: 0.9rem;
    padding: 8px 0;
    overflow: hidden;
    white-space: nowrap;
    border-top: 1px solid #222;
}

.ticker span {
    display: inline-block;
    padding-left: 100%;
    animation: scrollTicker 20s linear infinite;
}

@keyframes scrollTicker {
    from { transform: translateX(0); }
    to { transform: translateX(-100%); }
}

/* --- INSTRUCTIONS --- */
.instructions {
    max-width: 900px;
    text-align:center;
    font-size: 0.9rem;
    color:#aaa;
    margin: 10px 15px 20px;
    line-height:1.5;
}
.instructions span {
    color:#ff3b3b;
    font-weight:600;
}

/* --- FOOTER --- */
footer {
    width:100%;
    text-align:center;
    padding:15px;
    font-size:0.8rem;
    color:#777;
    border-top:1px solid #222;
}

/* --- MOBILE --- */
@media(max-width:600px){
    header h1 { font-size:1.8rem; }
}
</style>
</head>

<body>

<header>
    <h1>Apna TV 24/7</h1>
    <h2>Watch Latest TV Serials, Web Series, Movies Etc.</h2>
</header>

<div class="player-wrapper">
    <iframe 
        id="player" 
        src="https://mstvnetwork.github.io/mstv4/index5.html" 
        allowfullscreen>
    </iframe>
    <div class="ticker" id="ticker">
    Loading schedule...
    </div>
</div>

<div class="instructions">
    <p><span>Note:</span> Do not refresh the webpage unless video does not play.</p>
    <p>If refreshed accidentally, the video may restart from beginning until next program starts.</p>
</div>

<footer id="footer"></footer>

<script>
    const ticker = document.getElementById("ticker");

async function loadEPG() {
    try {
        const res = await fetch("https://yourdomain.com/epg.json?ts=" + Date.now(), {
            cache: "no-store"
        });
        const data = await res.json();

        const now = new Date();

        let current = null;
        let next = null;

        for (let i = 0; i < data.schedule.length; i++) {
            const start = new Date(data.schedule[i].start);
            const end = new Date(data.schedule[i].end);

            if (now >= start && now < end) {
                current = data.schedule[i];
                next = data.schedule[i + 1] || null;
                break;
            }
        }

        if (current) {
            const formatTime = (t) =>
                new Date(t).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });

            const text = `
                🔴 Now: ${current.title} (Ends ${formatTime(current.end)})
                &nbsp;&nbsp;&nbsp;➡️ Next: ${next ? next.title : "N/A"} 
                ${next ? `(Ends ${formatTime(next.end)})` : ""}
            `;

            ticker.innerHTML = `<span>${text}</span>`;
        } else {
            ticker.innerHTML = `<span>No program data available</span>`;
        }

    } catch (err) {
        ticker.innerHTML = `<span>EPG loading error</span>`;
    }
}

// initial load
loadEPG();

// refresh every 30 seconds (real-time feel)
setInterval(loadEPG, 30000);
// SEO FOOTER
document.getElementById("footer").innerHTML =
"Apna TV 24/7 provides free access to live TV serials, movies, and web series. Stream anytime anywhere.";

// SCHEMA
const schema = {
    "@context": "https://schema.org",
    "@type": "WebSite",
    "name": "Apna TV 24/7",
    "url": window.location.href,
    "description": "Watch latest TV serials, movies and web series online 24/7."
};

const script = document.createElement('script');
script.type = "application/ld+json";
script.text = JSON.stringify(schema);
document.head.appendChild(script);
</script>

</body>
</html>
