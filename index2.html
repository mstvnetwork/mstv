<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<!-- 1. ANTI-CACHE META TAGS: Prevents the browser from caching the HTML page itself -->
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<title>MSNET IPTV Cinema Mode</title>

<title>Apna TV 24/7</title>
<meta name="description" content="Watch latest TV serials, web series, movies and live IPTV channels 24/7. Fast streaming, modern player, no interruptions.">
<meta name="keywords" content="IPTV, Live TV, Indian TV, Web Series, Movies, Free TV Streaming">
<meta name="robots" content="index, follow">

<meta property="og:title" content="Apna TV 24/7">
<meta property="og:description" content="Watch Latest TV Serials, Web Series, Movies & more in one place.">
<meta property="og:type" content="website">

<style>
* { margin:0; padding:0; box-sizing:border-box; }

body {
    font-family: 'Segoe UI', sans-serif;
    background: radial-gradient(circle at top, #111, #000);
    color: #fff;
    min-height: 100vh;
    display:flex;
    flex-direction:column;
    align-items:center;
}

/* --- TITLE --- */
header {
    text-align:center;
    margin: 20px 10px 10px;
}
header h1 {
    font-size: 2.4rem;
    font-weight: 800;
    background: linear-gradient(90deg, #ff2d55, #ff8c00);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    text-shadow: 0 0 20px rgba(255,45,85,0.4);
}
header h2 {
    font-size: 1rem;
    color: #ccc;
    margin-top: 5px;
}

/* --- PLAYER --- */
.player-wrapper {
    width: 100%;
    max-width: 1200px;
    aspect-ratio: 16 / 9;
    background: #000;
    border-radius: 12px;
    overflow: hidden;
    box-shadow: 0 0 40px rgba(255,0,0,0.25);
    margin: 15px;
    position: relative;
}

iframe {
    width: 100%;
    height: 100%;
    border: none;
    display: block;
}

/* --- TICKER BELOW PLAYER --- */
.ticker {
    width: 100%;
    max-width: 1200px;
    background: #111;
    color: yellow;
    font-size: 0.9rem;
    padding: 8px 0;
    overflow: hidden;
    white-space: nowrap;
    border-top: 1px solid #222;
}

.ticker span {
    display: inline-block;
    padding-left: 100%;
    animation: scrollTicker 20s linear infinite;
}

@keyframes scrollTicker {
    from { transform: translateX(0); }
    to { transform: translateX(-100%); }
}

/* --- INSTRUCTIONS --- */
.instructions {
    max-width: 900px;
    text-align:center;
    font-size: 0.9rem;
    color:#aaa;
    margin: 10px 15px 20px;
    line-height:1.5;
}
.instructions span {
    color:#ff3b3b;
    font-weight:600;
}

/* --- FOOTER --- */
footer {
    width:100%;
    text-align:center;
    padding:15px;
    font-size:0.8rem;
    color:muddy grey;
    border-top:1px solid #222;
}

/* --- MOBILE --- */
@media(max-width:600px){
    header h1 { font-size:1.8rem; }
}
</style>
</head>

<body>

<header>
    <h1>Apna TV 24/7</h1>
    <h2>Watch Latest TV Serials, Web Series, Movies</h2>
</header>

<div class="player-wrapper">
<iframe id="videoPlayer" sandbox="allow-scripts allow-same-origin allow-forms allow-presentation" playsinline></iframe>
       
</div>

<!-- Ticker directly below player -->
<div class="ticker" id="ticker">
    Loading schedule...
</div>

<div class="instructions">
    <p><span>Note:</span> Do not refresh the webpage unless video does not play.</p>
    <p>If refreshed accidentally, the video may restart from beginning until next program starts.</p>
</div>

<footer id="footer"></footer>
    <footer>
  <p>&copy; 2026 Apna Tv. All Rights Reserved.</p>
</footer>


<script>
// --- CONFIGURATION ---
const EPG_URL = "https://raw.githubusercontent.com/mstvnetwork/mstv/main/epg.json";
const ticker = document.getElementById("ticker");
const videoPlayer = document.getElementById("videoPlayer");

// --- SEO & SCHEMA ---
const schema = {
    "@context": "https://schema.org",
    "@type": "WebSite",
    "name": "Apna TV 24/7",
    "url": window.location.href,
    "description": "Watch latest TV serials, movies and web series online 24/7."
};
const ldJson = document.createElement('script');
ldJson.type = "application/ld+json";
ldJson.text = JSON.stringify(schema);
document.head.appendChild(ldJson);

document.getElementById("footer").innerHTML = 
    "Apna TV 24/7 provides free access to live TV serials, movies, and web series. Stream anytime anywhere.";

// --- CORE LOGIC ---

/**
 * Converts any ISO string or Date object into total seconds since midnight UTC.
 * This allows us to compare "14:00:00" regardless of what day the JSON says.
 */
function getSecondsSinceMidnight(input) {
    const d = new Date(input);
    return (d.getUTCHours() * 3600) + (d.getUTCMinutes() * 60) + d.getUTCSeconds();
}

/**
 * Formats ISO strings into a clean 12-hour or 24-hour time string.
 */
function formatTime(isoStr) {
    if (!isoStr) return "N/A";
    const d = new Date(isoStr);
    return d.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
}

async function updatePlayerAndTicker() {
    // Add timestamp to URL to bypass GitHub/Browser caching
    const freshUrl = `${EPG_URL}?t=${Date.now()}`;

    try {
        const res = await fetch(freshUrl);
        if (!res.ok) throw new Error(`HTTP ${res.status}`);
        
        const data = await res.json();
        const schedule = data.schedule;

        // Get current UTC time in seconds
        const now = new Date();
        const nowSec = getSecondsSinceMidnight(now);

        let current = null;
        let next = null;

        // Find the active program based on time-of-day
        for (let i = 0; i < schedule.length; i++) {
            const startSec = getSecondsSinceMidnight(schedule[i].start);
            const endSec = getSecondsSinceMidnight(schedule[i].end);

            if (nowSec >= startSec && nowSec < endSec) {
                current = schedule[i];
                // Loop back to the first item if we are at the end of the list
                next = schedule[i + 1] || schedule; 
                break;
            }
        }

        // Fallback: If no slot matches (e.g., late night), default to the first show
        if (!current && schedule.length > 0) {
            current = schedule;
            next = schedule || schedule;
        }

        if (current) {
            // 1. Update Video Player URL (Only if it's different to prevent restarting)
            if (current.url && videoPlayer.src !== current.url) {
                console.log("New Program Detected. Changing Stream to:", current.title);
                videoPlayer.src = current.url;
            }

            // 2. Update Ticker Text
            const tickerText = `
                🔴 Now: ${current.title} (Ends ${formatTime(current.end)})
                &nbsp;&nbsp;&nbsp;➡️ Next: ${next.title} (Starts ${formatTime(next.start)})
            `;
            ticker.innerHTML = `<span>${tickerText}</span>`;
        } else {
            ticker.innerHTML = `<span>No program data found in JSON.</span>`;
        }

    } catch (err) {
        console.error("EPG Error:", err);
        ticker.innerHTML = `<span>Error syncing with schedule. Retrying...</span>`;
    }
}

// Initial Run
updatePlayerAndTicker();

// Check for program changes every 30 seconds
setInterval(updatePlayerAndTicker, 30000);
            </script>
</body>
</html>
