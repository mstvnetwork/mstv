<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Free IPTV Portal</title>

<style>
/* --- RESET & BASE --- */
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'Segoe UI', sans-serif; background: #0f0f0f; color: #fff; }
a { text-decoration: none; color: inherit; }

/* --- FULLSCREEN LAYOUT --- */
html, body { height: 100%; display: flex; flex-direction: column; }
main { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: flex-start; padding: 20px; }

/* --- HEADER --- */
header { font-size: 2rem; font-weight: 700; color: #ff3b3b; margin-bottom: 20px; text-align: center; text-shadow: 0 0 10px #ff3b3b; }

/* --- CINEMA PLAYER --- */
.player-wrapper {
    position: relative;
    width: 100%;
    max-width: 1280px;
    aspect-ratio: 16 / 9;
    border-radius: 12px;
    overflow: hidden;
    box-shadow: 0 10px 50px rgba(0,0,0,0.7);
    margin-bottom: 30px;
    background: #000;
}
#videoPlayer {
    width: 100%;
    height: 100%;
    border: none;
}

/* --- CHANNEL GRID --- */
.channel-section { width: 100%; max-width: 1280px; }
.channel-container {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
    gap: 20px;
}
.channel-card {
    background: #1b1b1b;
    border-radius: 12px;
    overflow: hidden;
    cursor: pointer;
    transition: transform 0.2s, box-shadow 0.2s;
    border: 1px solid #333;
}
.channel-card:hover {
    transform: translateY(-5px);
    box-shadow: 0 10px 20px rgba(255,59,59,0.5);
    border-color: #ff3b3b;
}
.channel-logo { width: 100%; height: 90px; object-fit: contain; background: #111; }
.channel-title { padding: 8px; text-align: center; font-weight: 500; font-size: 0.95rem; color: #fff; }

/* --- FOOTER --- */
footer { text-align: center; padding: 15px; font-size: 0.85rem; color: #888; border-top: 1px solid #222; }

/* --- RESPONSIVE --- */
@media(max-width:600px){
    header { font-size: 1.5rem; }
    .channel-logo { height: 70px; }
}
</style>
</head>
<body>

<header>Free IPTV Portal</header>

<main>
    <div class="player-wrapper">
        <iframe id="videoPlayer" sandbox="allow-scripts allow-same-origin allow-forms allow-presentation" playsinline></iframe>
    </div>

    <section class="channel-section">
        <div class="channel-container" id="channelContainer">
            <!-- Channel cards populate here -->
        </div>
    </section>
</main>

<footer>© 2026 Free IPTV. All Rights Reserved.</footer>

<script>
// --- CHANNEL DATA ---
const channels = [
    { 
        title: "MSNET Public Player", 
        logo: "https://via.placeholder.com/160x90?text=MSNET+Player", 
        url: "https://your-public-url.com/?mode=public" 
    },
    { 
        title: "Indian Idol", 
        logo: "https://via.placeholder.com/160x90?text=Indian+Idol", 
        url: "https://vkprime.com/embed-k1ipwza01c0d.html" 
    },
    { 
        title: "MTV", 
        logo: "https://via.placeholder.com/160x90?text=MTV", 
        url: "https://vkprime.com/embed-e6r4icq8gcq1.html" 
    }
    // add more channels as needed
];

// --- POPULATE CHANNEL CARDS ---
const container = document.getElementById('channelContainer');
channels.forEach(ch => {
    const card = document.createElement('div');
    card.className = 'channel-card';
    card.innerHTML = `
        <img src="${ch.logo}" class="channel-logo">
        <div class="channel-title">${ch.title}</div>
    `;
    card.addEventListener('click', () => {
        document.getElementById('videoPlayer').src = ch.url;
    });
    container.appendChild(card);
});

// --- LOAD FIRST CHANNEL BY DEFAULT ---
if(channels.length) document.getElementById('videoPlayer').src = channels[0].url;
</script>

</body>
</html>
