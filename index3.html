<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MSTV Network | Free Live Indian, Pakistani & International TV</title>
<meta name="description" content="Watch MSTV Network for free 24/7 live streaming of Indian, Pakistani, and International TV channels.">

<meta property="og:image:width" content="1200">
<meta property="og:image:height" content="630">

<!-- Twitter -->
<meta name="twitter:card" content="summary_large_image">
<meta name="twitter:title" content="MSTV Network | Free Live Indian & Pakistani TV">
<meta name="twitter:description" content="Watch your favorite International TV channels for free on MSTV Network.">
<meta name="twitter:image" content="https://mstvnet.netlify.app/mstv-thumbnail.png">

<meta name="theme-color" content="#111419">
<meta name="google-site-verification" content="36a9620cce1db39f">
<style>
:root {
  --bg-dark: #0F1115;
  --accent: #90EE90;
  --header-h: 70px;
}

/* 1. STICKY LOGIC: Grouped for stability */
.sticky-container {
  position: sticky;
  top: 0;
  z-index: 2000;
  background: var(--bg-dark);
}

header {
  height: var(--header-h);
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 0 5%;
  background: #111419;
  border-bottom: 1px solid #222;
}

.sticky-player-wrapper {
  background: #E8E4C9;
  padding: 8px 0;
  display: flex;
  flex-direction: column;
  align-items: center;
  border-bottom: 1px solid #ccc;
}

/* 2. PLAYER: Fixed 16:9 regardless of mode */
.player-container {
  position: relative;
  width: 92%;
  max-width: 600px;
  aspect-ratio: 16 / 9; /* Strictly 16:9 */
  background: black;
  border-radius: 12px;
  overflow: hidden;
}

video, iframe {
  position: absolute;
  top: 0; left: 0; width: 100%; height: 100%;
  border: none;
}

/* 3. TICKER & PLAY STORE ICON */
.ticker {
  overflow: hidden;
  width: 92%;
  max-width: 600px;
  background: blue;
  height: 40px;
  display: flex;
  align-items: center;
  margin-top: 8px;
}

.play-store-badge {
  height: 25px; /* Fits inside ticker */
  vertical-align: middle;
  margin: 0 15px;
}

/* 4. LANDSCAPE FIX: Stop cutting off */
@media screen and (orientation: landscape) and (max-height: 550px) {
  :root { --header-h: 50px; } /* Slimmer header */
  
  .player-container {
    /* Auto-scale width based on height to stay 16:9 within viewport */
    height: calc(100vh - 110px); 
    width: auto;
  }
  
  .ticker { height: 30px; margin-top: 4px; }
  .play-store-badge { height: 20px; }
}

/* Loading Icon Overlay */
#loading {
  position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
  z-index: 100; color: var(--accent); font-weight: bold;
}

</style>
</head>

<body>
<!-- Sticky Top Section -->
<div class="sticky-container">
  <header>
    <div class="logo-section">
      <span class="brand-name">YOUR BRAND</span>
      <span class="slogan">LIVE STREAMING 24/7</span>
    </div>
    <div class="search-container">
      <input type="text" placeholder="Search channels...">
    </div>
  </header>

  <div class="sticky-player-wrapper">
    <div class="player-container">
      <div id="live-stamp">LIVE</div>
      <div id="loading">LOADING...</div>
      <div id="placeholder">📺</div>
      
      <!-- Video/Iframe Elements -->
      <video id="main-video" playsinline></video>
      <iframe id="main-iframe" allowfullscreen></iframe>
    </div>

    <!-- Ticker with Google Play Badge -->
    <div class="ticker">
      <div class="ticker-track">
        <div class="ticker-content">
          🚀 Welcome to the Live Stream! 
          <a href="#"><img src="https://upload.wikimedia.org" alt="Google Play" class="play-store-badge"></a>
          Stay tuned for more updates!
        </div>
        <!-- Duplicate for seamless loop -->
        <div class="ticker-content">
          🚀 Welcome to the Live Stream! 
          <a href="#"><img src="https://upload.wikimedia.org" alt="Google Play" class="play-store-badge"></a>
          Stay tuned for more updates!
        </div>
      </div>
    </div>
  </div>
</div>

<!-- Scrollable Content -->
<div class="channel-grid" id="channel-grid">
  <!-- Channel cards go here -->
</div>


<!-- Player Libraries -->
<script defer src="./shaka.js"></script>
<script defer src="./shaka/hls.min.js"></script>

<script>
const el = (id) => document.getElementById(id);
const v = el('video-player'), i = el('iframe-player'), p = el('placeholder'), l = el('loading');
const gridContainer = el('channel-list-container');
const searchInput = el('channel-search');
const JSON_URL = './channels.json';

let channels = [], hls = null, shakaPlayer = null;

async function stopAll() {
  if(l) l.style.display='none';
  
  // 1. Completely destroy HLS instance
  if(hls){ 
    hls.detachMedia();
    hls.destroy(); 
    hls = null; 
  }
  
  // 2. Completely destroy Shaka instance
  if(shakaPlayer){ 
    await shakaPlayer.detach();
    await shakaPlayer.destroy(); 
    shakaPlayer = null; 
  }
  
  // 3. Reset Video Element to stop background buffering
  if(v){ 
    v.pause(); 
    v.removeAttribute('src'); // Remove source attribute
    v.load(); 
    v.style.display='none'; 
  }
  
  // 4. Reset Iframe
  if(i){ 
    i.src = 'about:blank'; 
    i.style.display = 'none'; 
  }
  
  if(p) p.style.display = 'flex';
}

q(idx){
  const ch = channels[idx]; 
  if(!ch) return;

  window.location.hash = encodeURIComponent(ch.name);
  
  // Kill everything first to free up CPU/Network
  await stopAll();
  
  v.scrollIntoView({behavior:'smooth', block:'start'});
  if(l) l.style.display = 'block'; 
  if(p) p.style.display = 'none';

  if(ch.type === 'iframe'){ 
    i.style.display = 'block'; 
    i.src = ch.url; 
    return; 
  }

  v.style.display = 'block';
  const isHls = ch.type === 'hls' || (ch.url && ch.url.includes('.m3u8'));

  if(isHls){
    if(window.Hls && Hls.isSupported()){
      // Configured for fast start and ZERO pre-loading
      hls = new Hls({ 
        autoStartLoad: false, 
        enableWorker: true, 
        lowLatencyMode: true,
        capLevelToPlayerSize: true 
      });
      hls.attachMedia(v);
      hls.on(Hls.Events.MEDIA_ATTACHED, () => {
        hls.loadSource(ch.url);
        hls.startLoad(); // Only start downloading segments NOW
      });
      hls.on(Hls.Events.MANIFEST_PARSED, () => v.play().catch(() => {}));
    } else if(v.canPlayType('application/vnd.apple.mpegurl')){ 
      v.src = ch.url; 
      v.play().catch(() => {}); 
    }
  } else {
    // DASH/Other: Shaka only initializes when this block is hit
    if(window.shaka && shaka.Player.isBrowserSupported()){
      shaka.polyfilled.installAll();
      shakaPlayer = new shaka.Player(v);
      
      // Fast-start config for Shaka
      shakaPlayer.configure({
        streaming: {
          bufferingGoal: 10,
          rebufferingGoal: 2,
          bufferBehind: 0
        }
      });

      try { 
        await shakaPlayer.load(ch.url); 
        v.play().catch(() => {}); 
      } catch(e) { console.error('Shaka fail', e); }
    }
  }
}


function renderUI(data){
  // Ensure we are using the array from your JSON
  channels = Array.isArray(data) ? data : data.channels || [];
  
  if(!gridContainer) return;
  gridContainer.innerHTML = '';

  const createCard = (ch, index) => {
    const priority = index < 8 ? 'fetchpriority="high"' : 'loading="lazy"';
    // Fallback logo logic
    const logo = ch.logo || "https://mstvnet.netlify.app";
    
    return `
      <div class="channel-card" onclick="playChannel(${index})">
        <img src="${logo}" alt="${ch.name}" width="95" height="64" ${priority} 
             onerror="this.src='https://mstvnet.netlify.app';">
        <div class="channel-name">${ch.name}</div>
      </div>`;
  };

  // Render initial cards
  gridContainer.innerHTML = channels.map(createCard).join('');

  // Auto-play from Hash if exists
  const hash = decodeURIComponent(window.location.hash.substring(1)); 
  const startIdx = channels.findIndex(c => c.name === hash); 
  if(startIdx !== -1) playChannel(startIdx);
}

// Search Logic
searchInput.addEventListener('input', e => {
  const term = e.target.value.toLowerCase();
  document.querySelectorAll('.channel-card').forEach(card => {
    card.style.display = card.innerText.toLowerCase().includes(term) ? 'flex' : 'none';
  });
});

// Initialization
(async () => {
  try {
    const res = await fetch(JSON_URL, { cache: 'no-store' }); // Prevent cached JSON issues
    if(res.ok) {
      const data = await res.json();
      renderUI(data);
    }
  } catch(e) { console.log('Init error:', e); }
})();
</script>
  <!-- GoatCounter Analytics -->
<script async data-goatcounter="https://mstv.goatcounter.com/count"
src="https://gc.zgo.at/count.js"></script>

</body>
</html>
