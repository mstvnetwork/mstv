 <style>
:root {
  --bg-dark: #0F1115;
  --accent: #90EE90;
  --header-h: 70px;
  --text-dim: #555;
  /* Mobile-look constraint for desktop */
  --max-content-width: 500px; 
}

/* Base styles */
html { scroll-behavior: smooth; scroll-padding-top: calc(var(--header-h) + 220px); }
body { margin: 0; font-family: Arial, sans-serif; font-display: swap; min-height: 100dvh; overflow-x: hidden; background: #E8E4C9; }

/* Sticky header */
header {
  position: sticky; top: 0; z-index: 1000;
  background: #111419; height: var(--header-h);
  display: flex; align-items: center; justify-content: space-between;
  padding: 0 5%; border-bottom: 1px solid #222;
}

.logo-section { display: flex; flex-direction: column; }
.brand-name {
  font-size: 1.4rem; font-weight: bold;
  background: linear-gradient(90deg, #90EE90, #00FFA3);
  -webkit-background-clip: text; color: transparent; line-height: 1;
}
.slogan { font-size: 0.7rem; color: yellow; margin-top: 4px; }

.search-container { flex-grow: 0.4; max-width: 350px; }
.search-container input {
  width: 100%; padding: 10px 15px; border-radius: 25px; border: 1px solid #333;
  background: #1A1D20; color: white; outline: none;
}

/* Sticky Player wrapper */
.sticky-player-wrapper {
  position: sticky;
  top: var(--header-h);
  z-index: 900;
  background: #E8E4C9;
  width: 100%;
  display: flex; flex-direction: column;
  align-items: center;
  border-bottom: 1px solid #ccc;
  padding: 12px 0;
}

/* Fixed size player to mimic mobile on all devices */
.player-container {
  position: relative;
  width: 92%;
  max-width: var(--max-content-width); 
  aspect-ratio: 16/9;
  background: black;
  border-radius: 12px;
  overflow: hidden;
  box-shadow: 0 10px 30px rgba(0,0,0,0.3);
  margin: 0 auto;
}

video, iframe {
  position: absolute;
  top: 0; left: 0;
  width: 100%;
  height: 100%;
  object-fit: cover;
  border: none;
  display: none;
}

#placeholder {
  height: 100%;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 4rem;
  color: var(--accent);
}

#loading {
  position: absolute;
  top: 50%; left: 50%;
  transform: translate(-50%, -50%);
  z-index: 100;
  background: rgba(0,0,0,0.8);
  padding: 10px;
  border-radius: 50%;
  border: 1px solid var(--accent);
  color: var(--accent);
  display: none;
}

#live-stamp {
  position: absolute;
  top: 10px; left: 10px;
  background: #E50914; color: white;
  padding: 4px 10px; border-radius: 4px;
  font-size: 0.7rem; font-weight: bold;
  z-index: 50;
  display: none;
}

/* Ticker stays aligned with player width */
.ticker {
  overflow: hidden;
  width: 92%;
  max-width: var(--max-content-width);
  background: red;
  color: white;
  height: 34px;
  display: flex;
  align-items: center;
  margin-top: 10px;
  border-radius: 4px;
}

.ticker-track {
  display: flex;
  width: max-content;
  animation: ticker-loop 20s linear infinite;
}
.ticker-content {
  white-space: nowrap;
  padding-right: 60px;
  display: inline-flex;
  align-items: center;
  font-size: 0.85rem;
}
@keyframes ticker-loop { 0% { transform: translateX(0); } 100% { transform: translateX(-50%); } }
.play-icon { height: 16px; margin: 0 6px; }

/* Grid stays centered and constrained like mobile */
/* Channel grid - Larger cards and constrained width */
.channel-grid {
  display: grid;
  /* Increased min-size from 90px to 120px for larger cards */
  grid-template-columns: repeat(auto-fill, minmax(120px, 1fr));
  gap: 15px; /* More space between cards */
  padding: 25px 4%;
  max-width: 900px; /* Keeps the grid from stretching too wide on laptop */
  margin: 0 auto;
}

.channel-card {
  background: #F5F1DC;
  border-radius: 12px;
  /* Removed padding so the image touches the edges */
  padding: 0; 
  text-align: center;
  cursor: pointer;
  border: 1px solid #d6d6d6;
  overflow: hidden; /* Ensures the image doesn't bleed over the rounded corners */
  display: flex;
  flex-direction: column;
  transition: transform 0.2s, box-shadow 0.2s;
}

.channel-card img {
  /* This fills the container and crops the edges to fit perfectly */
  width: 100%;
  height: 100%;
  aspect-ratio: 95/64; /* Keeps your specific ratio */
  object-fit: cover; 
  display: block; /* Removes tiny bottom gap in some browsers */
}

/* Optional: If you have text below the logo, wrap it in a div with padding */
.channel-name {
  padding: 8px 4px;
  font-size: 0.85rem;
  font-weight: bold;
  background: #fff; /* Distinct area for text if needed */
  width: 100%;
}

/* Optional: Make the card text/title larger if you have any */
.channel-card span {
  margin-top: 8px;
  font-weight: bold;
  font-size: 0.95rem;
  color: #333;
}


.site-footer {
  padding: 30px 5%;
  text-align: center;
  font-size: 0.85rem;
  color: #666;
  border-top: 1px solid #ddd;
}

/* Landscape fix for mobile only */
@media (max-width: 900px) and (orientation: landscape) {
  header, .sticky-player-wrapper { position: relative; top: 0; }
  .player-container { width: 80vw; height: auto; }
}
</style>
</head>
<body>

<header>
  <div class="logo-section">
    <div class="brand-name">MSTV NETWORK</div>
    <div class="slogan">LIVE INDIAN PAKISTANI & ENGLISH CHANNELS</div>
  </div>
  <div class="search-container">
    <input type="text" id="channel-search" placeholder="Search channels..." aria-label="Search channels by name">
  </div>
</header>

<div class="sticky-player-wrapper">
  <div class="player-container">
    <div id="loading">🌀 Buffering...</div>
    <div id="live-stamp">MSTV Network</div>
    <div id="placeholder">📺</div>
    <video id="video-player" autoplay playsinline controls preload="metadata"></video>
    <iframe id="iframe-player" sandbox="allow-scripts allow-same-origin allow-presentation" allow="autoplay; encrypted-media"></iframe>
  </div>

  <div class="ticker" aria-label="Scrolling ticker" aria-live="polite">
    <div class="ticker-track">
      <div class="ticker-content">
        No channel play, use free VPN from 
        <img src="/playstore.webp" class="play-icon" width="80" height="16" loading="lazy" alt="Google Play Store">
        & choose Australia or Singapore
      </div>
      <div class="ticker-content">
        No channel play, use free VPN from 
        <img src="/playstore.webp" class="play-icon" width="80" height="16" loading="lazy" alt="Google Play Store">
        & choose Australia or Singapore
      </div>
    </div>
  </div>
</div>

<main>
  <div class="channel-grid" id="channel-grid">
    <div class="channel-virtual-wrapper" id="virtual-wrapper"></div>
  </div>
</main>

<script defer src="./shaka.js"></script>
<script defer src="./shaka/hls.min.js"></script>
<script>
const v=document.getElementById('video-player');
const i=document.getElementById('iframe-player');
const p=document.getElementById('placeholder');
const l=document.getElementById('loading');

let channels=[], hls=null, shakaPlayer=null;

const CARD_WIDTH=120, CARD_HEIGHT=160, GAP=10;
const grid=document.getElementById('channel-grid');
const wrapper=document.getElementById('virtual-wrapper');

async function stopAll(){
  if(l) l.style.display='none';
  if(hls){ hls.destroy(); hls=null; }
  if(shakaPlayer){ shakaPlayer.destroy(); shakaPlayer=null; }
  if(v){ v.pause(); v.src=''; v.style.display='none'; }
  if(i){ i.src='about:blank'; i.style.display='none'; }
  if(p) p.style.display='flex';
}

async function playChannel(idx){
  const ch=channels[idx];
  if(!ch) return;
  await stopAll();
  window.location.hash=encodeURIComponent(ch.name);
  if(l) l.style.display='block'; if(p) p.style.display='none';
  const hideLoader=()=>{if(l) l.style.display='none';};

  if(ch.type==='iframe'){ i.src=ch.url; i.style.display='block'; i.setAttribute('aria-label', `Play ${ch.name}`); i.onload=hideLoader; return; }

  v.style.display='block';
  const isHls=ch.type==='hls'||(ch.url&&ch.url.includes('.m3u8'));
  if(isHls && window.Hls && Hls.isSupported()){
    hls=new Hls({autoStartLoad:false, enableWorker:true, lowLatencyMode:true, capLevelToPlayerSize:true});
    hls.attachMedia(v);
    hls.on(Hls.Events.MEDIA_ATTACHED,()=>{hls.loadSource(ch.url); hls.startLoad();});
    v.addEventListener('playing', hideLoader, {once:true});
  } else if(isHls && v.canPlayType('application/vnd.apple.mpegurl')){
    v.src=ch.url; v.play().catch(()=>{}); v.addEventListener('playing', hideLoader,{once:true});
  } else if(window.shaka && shaka.Player.isBrowserSupported()){
    shaka.polyfilled.installAll(); shakaPlayer=new shaka.Player(v);
    shakaPlayer.configure({streaming:{bufferingGoal:10,rebufferingGoal:2,bufferBehind:0}});
    shakaPlayer.addEventListener('buffering',(e)=>{if(!e.buffering) hideLoader();});
    try{ await shakaPlayer.load(ch.url); v.play().catch(()=>{}); }catch(e){ console.error(e); hideLoader(); }
  }
}

// Virtualized grid
function renderVirtual(){
  const scrollTop=grid.scrollTop, viewHeight=grid.clientHeight;
  const cols=Math.floor(grid.clientWidth/(CARD_WIDTH+GAP));
  const startIdx=Math.floor(scrollTop/(CARD_HEIGHT+GAP))*cols;
  const visibleRows=Math.ceil(viewHeight/(CARD_HEIGHT+GAP));
  const endIdx=Math.min(channels.length,startIdx+visibleRows*cols+cols);
  wrapper.innerHTML='';
  for(let i=startIdx;i<endIdx;i++){
    const ch=channels[i]; const col=i%cols; const row=Math.floor(i/cols);
    const card=document.createElement('div'); card.className='channel-card';
    card.style.top=row*(CARD_HEIGHT+GAP)+'px'; card.style.left=col*(CARD_WIDTH+GAP)+'px';
    card.style.width=CARD_WIDTH+'px'; card.style.height=CARD_HEIGHT+'px';
    card.onclick=()=>playChannel(i);
    card.setAttribute('role','button'); card.setAttribute('aria-label', `Play ${ch.name} channel`);
    const img=document.createElement('img'); img.src=ch.logo||''; img.alt=ch.name; img.loading='lazy'; img.decoding='async';
    const name=document.createElement('div'); name.className='channel-name'; name.textContent=ch.name;
    card.appendChild(img); card.appendChild(name); wrapper.appendChild(card);
  }
  wrapper.style.height=Math.ceil(channels.length/cols)*(CARD_HEIGHT+GAP)+'px';
}

grid.addEventListener('scroll', renderVirtual);

document.getElementById('channel-search').addEventListener('input', e=>{
  const term=e.target.value.toLowerCase();
  channels.forEach((c,i)=>renderVirtual());
});

(async ()=>{
  try{
    const res=await fetch('./channels.json'); 
    if(res.ok){
      const data=await res.json();
      channels = Array.isArray(data)?data:data.channels||[];
      renderVirtual();
      const hash=decodeURIComponent(window.location.hash.substring(1));
      const startIdx=channels.findIndex(c=>c.name===hash);
      if(startIdx!==-1) playChannel(startIdx);
    }
  }catch(e){ console.error(e);}
})();
</script>

</body>
</html>
