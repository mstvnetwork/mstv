       <style>
        :root {
            --bg-dark: #0F1115;
            --accent: #90EE90;
            --header-h: 55px;
            --player-y: 55px;
            --text-dim: #555;
        }

        html { 
            scroll-padding-top: 285px; 
            scroll-behavior: smooth;
        }

        body {
            background-color: #E8E4C9 !important;
            margin: 0; padding: 0;
            font-family: Arial, sans-serif;
        }

        /* 1. STICKY HEADER */
        header {
            position: sticky;
            top: 0;
            z-index: 1000;
            background: #111419;
            height: var(--header-h);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 4%;
            border-bottom: 1px solid #222;
            color: white;
        }

        .brand-name {
            font-size: 1.2rem;
            font-weight: bold;
            background: linear-gradient(90deg, #90EE90, #00FFA3);
            -webkit-background-clip: text;
            color: transparent;
        }

        .slogan { font-size: 0.65rem; color: yellow; margin-top: 2px; }

        .search-container { flex-grow: 0.4; max-width: 350px; }
        .search-container input {
            width: 100%;
            padding: 8px 15px;
            border-radius: 25px;
            border: 1px solid #333;
            background: #1A1D20;
            color: white;
            outline: none;
        }

        /* 2. STICKY PLAYER WITH AUTOMATIC RESIZING */
        .sticky-player-wrapper {
            position: sticky;
            top: var(--player-y);
            z-index: 900;
            background: #E8E4C9;
            padding: 10px 0;
            width: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            border-bottom: 1px solid #ccc;
        }

        .player-container {
            position: relative;
            width: 92%;
            max-width: 600px;
            /* AUTOMATIC RATIO DETECTION */
            aspect-ratio: 16 / 9; 
            background: black;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
        }

        /* ROBOTIC IFRAME & VIDEO FIT */
        video, iframe { 
            position: absolute; 
            top: 0; 
            left: 0; 
            width: 100% !important; 
            height: 100% !important; 
            border: none !important;
            display: block; /* Change to 'none' if your JS handles the toggle */
        }

        #placeholder { 
            height: 100%; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            font-size: 5rem; 
            color: var(--accent); 
        }
        
        #loading {
            position: absolute; top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            z-index: 100;
            background: rgba(0, 0, 0, 0.8);
            padding: 12px 24px;
            border-radius: 30px;
            border: 1px solid var(--accent);
            color: var(--accent);
            font-weight: bold;
            display: none;
        }

        #live-stamp { 
            position: absolute; 
            top: 10px; 
            left: 10px; 
            background: #E50914; 
            color: white; 
            padding: 5px 12px; 
            border-radius: 5px; 
            font-size: 0.75rem; 
            font-weight: bold; 
            z-index: 50; 
        }

        /* 3. CHANNEL GRID */
        .channel-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(90px, 1fr));
            gap: 8px;
            padding: 15px 4%;
        }

        .channel-card {
            background: #fff;
            border-radius: 8px;
            padding: 6px;
            text-align: center;
            border: 1px solid #d6d6d6;
        }
    </style>
</head>
<body>

<header>
    <div class="logo-section">
        <div class="brand-name">MSTV NETWORK</div>
        <div class="slogan">LIVE INDIAN PAKISTANI & ENGLISH CHANNELS</div>
    </div>
    <div class="search-container">
        <input type="text" id="channel-search" placeholder="Search channels...">
    </div>
</header>

<div class="sticky-player-wrapper">
    <div class="player-container">
        <div id="loading">🌀 Buffering...</div>
        <div id="live-stamp">Mstv Network</div>
        <!-- Iframe will now automatically fit the 16:9 box -->
        <iframe 
            id="iframe-player" 
            src="about:blank"
            sandbox="allow-scripts allow-same-origin allow-forms allow-presentation" 
            allow="autoplay; encrypted-media" 
            scrolling="no">
        </iframe>
    </div>
</div>    
    
       <script>
    const jsonUrl = 'channels.json'; // Path to your JSON file
    const channelGrid = document.querySelector('.channel-grid');
    const iframePlayer = document.getElementById('iframe-player');
    const placeholder = document.getElementById('placeholder');
    const loading = document.getElementById('loading');

    // 1. Fetch JSON and Build Grid
    async function loadChannels() {
        try {
            const response = await fetch(jsonUrl);
            const channels = await response.json();
            
            channels.forEach(channel => {
                const card = document.createElement('div');
                card.className = 'channel-card';
                card.innerHTML = `
                    <div class="card-logo"><img src="${channel.logo}" alt="${channel.name}"></div>
                    <div class="channel-name">${channel.name}</div>
                `;
                
                // 2. Click Logic: Auto-update player
                card.onclick = () => {
                    playChannel(channel.url);
                };
                
                channelGrid.appendChild(card);
            });
        } catch (error) {
            console.error('Error loading channels:', error);
        }
    }

    // 3. Player Update Logic
    function playChannel(url) {
        // Show loading, hide placeholder
        loading.style.display = 'block';
        placeholder.style.display = 'none';
        iframePlayer.style.display = 'block';

        // Set the new source - iframe-player automatically 
        // resizes due to the CSS 'aspect-ratio: 16/9' we added.
        iframePlayer.src = url;

        iframePlayer.onload = () => {
            loading.style.display = 'none';
        };
    }

    // Initialize the "robot"
    loadChannels();
</script>
 


</body>
</html>
