<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MSTV Net Player</title>
  <link rel="icon" href="favicon.ico" />
  <style>
    body {
      margin: 0;
      font-family: "Inter", Arial, sans-serif;
      background: #0b0c10;
      color: #fff;
      display: flex;
      flex-direction: column;
      min-height: 100vh;
    }

    header {
      position: sticky;
      top: 0;
      background: rgba(10,10,10,0.9);
      backdrop-filter: blur(10px);
      z-index: 1000;
      padding: 10px 20px;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      border-bottom: 1px solid #1f2833;
    }
    header h1 {
      font-size: 1.2rem;
      margin: 0;
      letter-spacing: 1px;
      color: #66fcf1;
    }

    main {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: stretch;
      overflow-x: hidden;
    }

    #playerContainer {
      position: sticky;
      top: 60px;
      background: #000;
      z-index: 900;
      width: 100%;
      aspect-ratio: 16 / 9;
      max-height: 60vh;
    }

    video, iframe {
      width: 100%;
      height: 100%;
      border: none;
      display: block;
    }

    #channels {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
      gap: 12px;
      padding: 15px;
    }

    .channel-card {
      background: #1f2833;
      border-radius: 10px;
      overflow: hidden;
      cursor: pointer;
      transition: transform 0.2s ease, background 0.3s ease;
      display: flex;
      flex-direction: column;
      align-items: center;
      text-align: center;
    }

    .channel-card:hover {
      background: #45a29e;
      transform: translateY(-2px);
    }

    .channel-logo {
      width: 100%;
      height: 90px;
      object-fit: contain;
      background: #000;
      padding: 5px;
    }

    .channel-title {
      font-size: 0.9rem;
      padding: 8px;
    }

    footer {
      background: #0b0c10;
      color: #c5c6c7;
      text-align: center;
      padding: 15px;
      font-size: 0.8rem;
      border-top: 1px solid #1f2833;
    }

    /* Responsive tweaks */
    @media (orientation: landscape) and (max-device-width: 812px) {
      header {
        position: fixed;
        top: 0;
        height: 40px;
      }
      #playerContainer {
        top: 40px;
        height: calc(100vh - 200px);
      }
      .channel-title {
        font-size: 0.8rem;
      }
    }
  </style>
</head>
<body>
  <header>
    <h1>MSTV Streaming Network</h1>
  </header>

  <main>
    <div id="playerContainer">
      <video id="videoPlayer" controls autoplay></video>
    </div>
    <section id="channels"></section>
  </main>

  <footer>
    © 2024 MSTV Network — Stream Smarter
  </footer>

  <!-- Player Libraries -->
  <script defer src="./shaka.js"></script>
  <script defer src="./shaka/hls.min.js"></script>

  <script>
    const JSON_URL = 'https://mstvnet.netlify.app/channels.json)';
    const video = document.getElementById("videoPlayer");
    const channelGrid = document.getElementById("channels");
    let player;

    async function initPlayer() {
      if (shaka.Player.isBrowserSupported()) {
        player = new shaka.Player(video);
        window.player = player;
      } else {
        console.error("Browser not supported for Shaka Player.");
      }
    }

    async function loadChannels() {
      try {
        const response = await fetch(JSON_URL);
        const channels = await response.json();
        renderChannels(channels);
        if (channels && channels[0]) playChannel(channels[0]);
      } catch (err) {
        console.error("Failed to fetch channels:", err);
      }
    }

    function renderChannels(channels) {
      channelGrid.innerHTML = "";
      channels.forEach((ch) => {
        const card = document.createElement("div");
        card.className = "channel-card";
        card.innerHTML = `
          <img src="${ch.logo}" alt="${ch.name}" class="channel-logo" />
          <div class="channel-title">${ch.name}</div>
        `;
        card.onclick = () => playChannel(ch);
        channelGrid.appendChild(card);
      });
    }

    async function playChannel(channel) {
      console.log("Playing:", channel.name);
      if (channel.embed) {
        video.style.display = "none";
        let iframe = document.querySelector("#playerContainer iframe");
        if (!iframe) {
          iframe = document.createElement("iframe");
          document.getElementById("playerContainer").appendChild(iframe);
        }
        iframe.src = channel.embed;
        iframe.allowFullscreen = true;
        iframe.style.display = "block";
        return;
      }

      // Clean up iframe if switching back to DASH/HLS
      const existingIframe = document.querySelector("#playerContainer iframe");
      if (existingIframe) existingIframe.remove();
      video.style.display = "block";

      try {
        if (channel.dash && player) {
          await player.load(channel.dash);
        } else if (channel.hls) {
          if (Hls.isSupported()) {
            const hls = new Hls();
            hls.loadSource(channel.hls);
            hls.attachMedia(video);
          } else if (video.canPlayType("application/vnd.apple.mpegurl")) {
            video.src = channel.hls;
          }
        } else {
          console.warn("No playable source found for", channel.name);
        }
      } catch (e) {
        console.error("Error playing channel:", e);
      }
    }

    document.addEventListener("DOMContentLoaded", async () => {
      await initPlayer();
      await loadChannels();
    });
  </script>
</body>
</html>
