<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MSTV Network | Live TV</title>

<style>
body { margin:0; font-family:Arial; }

header {
  background:#111;
  color:white;
  padding:10px;
  display:flex;
  justify-content:space-between;
  align-items:center;
}

input {
  padding:8px;
  border-radius:20px;
  border:none;
}

.player-container {
  width:100%;
  max-width:600px;
  margin:auto;
  aspect-ratio:16/9;
  background:black;
  position:relative;
}

video, iframe {
  width:100%;
  height:100%;
  position:absolute;
  top:0; left:0;
  display:none;
}

#placeholder {
  display:flex;
  justify-content:center;
  align-items:center;
  height:100%;
  font-size:40px;
  color:white;
}

.channel-grid {
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(90px,1fr));
  gap:10px;
  padding:10px;
}

.channel-card {
  background:#eee;
  padding:5px;
  text-align:center;
  cursor:pointer;
}

.channel-card img {
  width:100%;
  height:auto;
}
</style>
</head>

<body>

<header>
  <div>MSTV NETWORK</div>
  <input type="text" id="search" placeholder="Search">
</header>

<div class="player-container">
  <div id="placeholder">📺</div>
  <video id="video" controls autoplay playsinline></video>
  <iframe id="iframe"></iframe>
</div>

<div class="channel-grid" id="grid"></div>

<script src="./shaka.js" defer></script>
<script src="./shaka/hls.min.js" defer></script>

<script>
const video = document.getElementById("video");
const iframe = document.getElementById("iframe");
const placeholder = document.getElementById("placeholder");
const grid = document.getElementById("grid");
const search = document.getElementById("search");

const JSON_URL = "./channels.json";

let channels = [];
let hls = null;
let shakaPlayer = null;

/* STOP PLAYER */
async function stopAll(){
  if(hls){ hls.destroy(); hls=null; }
  if(shakaPlayer){ await shakaPlayer.destroy(); shakaPlayer=null; }

  video.pause();
  video.src="";
  video.style.display="none";

  iframe.src="about:blank";
  iframe.style.display="none";

  placeholder.style.display="flex";
}

async function playChannel(index){
  const channel = channels[index];
  if(!channel) return;
  await stopAll();
  if(loader) loader.style.display = 'block';
  placeholder.style.display = 'none';
  liveStamp.style.display = channel.isLive ? 'block' : 'none';

  if(channel.type === 'iframe'){
    iframe.style.display = 'block'; iframe.src = channel.url;
    iframe.onload = () => { if(loader) loader.style.display = 'none'; };
    return;
  }

  video.style.display = 'block';
  const isHls = channel.type === 'hls' || channel.url.includes('.m3u8');
  if(isHls){
    if(window.Hls && Hls.isSupported()){
      hls = new Hls({ enableWorker:true, lowLatencyMode:true });
      hls.loadSource(channel.url); hls.attachMedia(video);
      hls.on(Hls.Events.MANIFEST_PARSED, ()=> video.play());
    } else if(video.canPlayType('application/vnd.apple.mpegurl')){
      video.src = channel.url; video.play();
    }
  } else if(window.shaka && shaka.Player.isBrowserSupported()){
    shaka.polyfill.installAll();
    shakaPlayer = new shaka.Player(video);
    try{ await shakaPlayer.load(channel.url); video.play(); } catch(e){ console.error(e); }
  }
}

video.onplaying = () => { if(loader) loader.style.display = 'none'; };
loadChannels();

/* CREATE CARD */
function createCard(ch){
  return `
  <div class="channel-card" data-name="${ch.name}">
    <img src="${ch.logo}" alt="${ch.name}" loading="lazy">
    <div>${ch.name}</div>
  </div>`;
}

function renderUI(data) {
  channels = data;
  select.innerHTML = '<option value="">📱 Select Channel</option>';
  gridContainer.innerHTML = ''; 

  data.forEach((ch, i) => {
    const opt = document.createElement("option");
    opt.value = i; 
    opt.textContent = ch.name; 
    select.appendChild(opt);

    const card = document.createElement('div');
    card.className = 'channel-card';
    card.setAttribute('data-name', ch.name.toLowerCase());
    
    // Fallback logic: if the image fails, it replaces itself with a 📺 emoji
    const logoHtml = ch.logo 
      ? `<img src="${ch.logo}" alt="${ch.name}" 
          onerror="this.onerror=null; this.parentElement.innerHTML='<span style=\'font-size:1.5rem\'>📺</span>';">` 
      : `<span style="font-size:1.5rem">📺</span>`;

    card.innerHTML = `
      <div class="card-logo">${logoHtml}</div>
      <div class="channel-name">${ch.name}</div>
    `;
    
    card.onclick = () => { 
        playChannel(i); 
        window.scrollTo({top: 0, behavior: 'smooth'}); 
    };
    gridContainer.appendChild(card);
  });
}


/* SEARCH */
search.addEventListener("input", e=>{
  const term = e.target.value.toLowerCase();
  document.querySelectorAll(".channel-card").forEach(card=>{
    card.style.display =
      card.dataset.name.toLowerCase().includes(term) ? "block" : "none";
  });
});

/* INIT */
(async()=>{
  try{
    const res = await fetch(JSON_URL);
    const data = await res.json();
    console.log("Loaded channels:", data.length);
    render(data);
  }catch(err){
    console.error("JSON load failed", err);
  }
})();
</script>

</body>
</html>
