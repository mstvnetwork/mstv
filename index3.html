<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MSTV Network | Live Indian TV</title>
    
    <meta name="description" content="Stream live Indian and Pakistani TV channels free.">
    <meta name="theme-color" content="#111419">
    <link rel="preload" href="channels.json" as="fetch" crossorigin="anonymous">
    <link rel="preconnect" href="https://cdnjs.cloudflare.com" crossorigin>
    <link rel="preconnect" href="https://cdn.jsdelivr.net" crossorigin>

    <style>
        /* 1. CORE RESET */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --bg-dark: #111419;
            --accent: #2ECC71;
            --header-h: 70px;
            --ticker-h: 30px;
            --max-width: 500px; 
            --body-bg: #F8F9FA;
        }

        body, html {
            height: 100%; width: 100vw;
            overflow: hidden; 
            font-family: system-ui, -apple-system, sans-serif;
            background: var(--body-bg);
            color: #212529;
        }
        body {
    font-family: system-ui, -apple-system, sans-serif;
    font-display: swap; /* Add this */
        }

        /* 1. Ensure the app wrapper is a strict flex container */
.app-wrapper { 
    display: flex; 
    flex-direction: column; 
    height: 100vh; 
    width: 100%;
    overflow: hidden; /* Prevents the whole page from scrolling */
}
        header {
            flex-shrink: 0; height: var(--header-h);
            background: var(--bg-dark);
            display: flex; align-items: center; justify-content: space-between;
            padding: 0 15px;
            position: relative;
            z-index: 100; /* Always on top of everything */
        }

        .brand-name { font-size: 1.2rem; font-weight: 800; color: var(--accent); }
        .search-container { flex: 0.6; max-width: 180px; }
        #searchInput {
            width: 100%; padding: 10px 15px; border-radius: 25px;
            border: 2px solid #222; background: #1A1D20; color: #fff; font-size: 14px;
        }

        /* 2. Keep the player area from expanding */
.sticky-player-wrapper {
    flex-shrink: 0; 
    width: 100%;
    background: #000;
    z-index: 90;
    box-shadow: 0 4px 10px rgba(0,0,0,0.3);
    /* Remove 'position: sticky' if it's there, we want 'relative' 
       because the parent is a flexbox */
    position: relative; 
}

        .player-container {
            position: relative; width: 100%;
            max-width: var(--max-width);
            aspect-ratio: 16 / 9; 
            background: #000;
        }

        video, iframe {
            position: absolute; top: 0; left: 0;
            width: 100%; height: 100%;
            border: none; display: none;
        }

        #placeholder { height: 100%; display: flex; align-items: center; justify-content: center; font-size: 3rem; color: #111; }
        #loading { 
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); 
            z-index: 101; color: #fff; background: rgba(0,0,0,0.85); 
            padding: 12px 24px; border-radius: 50px; display: none; 
            font-weight: bold; border: 1px solid var(--accent);
        }

        /* 4. TICKER - LOCKED HEIGHT */
        .ticker {
            overflow: hidden; width: 100%; height: var(--ticker-h);
            background: #D00000; color: #FFFFFF;
            display: flex; align-items: center;
            contain: strict;
        }
        .ticker-track { display: flex; width: max-content; animation: ticker-loop 30s linear infinite; }
        .ticker-content { white-space: nowrap; padding-right: 60px; font-size: 0.8rem; font-weight: 700; line-height: var(--ticker-h); }
        @keyframes ticker-loop { 0% { transform: translateX(0); } 100% { transform: translateX(-50%); } }

        /* 3. THE KEY FIX: The scrollable area needs its own scrollbar */
.main-content { 
    flex-grow: 1; 
    overflow-y: auto; /* This creates the independent scroll for the grid */
    -webkit-overflow-scrolling: touch;
    position: relative;
    z-index: 1;
    background: var(--body-bg);
}
        /* 4. Reserve space for the Title so it's not hidden */
.title-area {
    height: 60px; /* Increased slightly for breathing room */
    display: flex; 
    align-items: center; 
    justify-content: center;
    font-weight: 700; 
    font-size: 1.1rem; 
    color: #212529;
    background: var(--body-bg); /* Match background */
}

.channel-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(105px, 1fr));
    grid-auto-rows: 72px;
    gap: 12px;
    padding: 0 15px 15px 15px;
    /* This tells the browser to reserve space before the items load */
    min-height: 50vh; 
    content-visibility: auto;
}
        .channel-card {
            background: #fff; border: 1px solid #dee2e6; border-radius: 10px;
            height: 72px;
            display: flex; align-items: center; justify-content: center;
            cursor: pointer; transition: transform 0.1s ease;
            box-shadow: 0 2px 5px rgba(0,0,0,0.05); text-align: center; padding: 10px;
        }
        .channel-card:active { transform: scale(0.96); }
        .channel-name { font-size: 0.9rem; font-weight: 700; color: #1a1a1a; pointer-events: none; }

        .site-footer { padding: 40px 20px; text-align: center; font-size: 0.8rem; color: #6c757d; }
    </style>
</head>
<body>

<div class="app-wrapper">
    <header role="banner">
        <div>
            <h1 class="brand-name">MSTV NETWORK</h1>
        </div>
        <div class="search-container">
            <input type="text" id="searchInput" placeholder="Search..." aria-label="Search channels">
        </div>
    </header>

    <div class="sticky-player-wrapper">
        <div class="player-container">
            <div id="loading" role="status">🌀 Loading...</div>
            <div id="placeholder" aria-hidden="true">📺</div>
            <video id="video" autoplay playsinline controls aria-label="Player"></video>
            <iframe id="iframePlayer" title="Stream" sandbox="allow-scripts allow-same-origin allow-presentation allow-forms" allow="autoplay; fullscreen; encrypted-media;"></iframe>
        </div>
        <div class="ticker">
            <div class="ticker-track">
                <div class="ticker-content">MSTV Live • High Performance Streaming • Use VPN if required • Select a channel below to begin.</div>
                <div class="ticker-content">MSTV Live • High Performance Streaming • Use VPN if required • Select a channel below to begin.</div>
            </div>
        </div>
    </div>

    <main class="main-content">
        <div class="title-area"><h2 id="title">Select a Channel</h2></div>
        <div class="channel-grid" id="channelList" role="list"></div>
        <footer class="site-footer">© 2026 MSTV Network. All Rights Reserved.</footer>
    </main>
</div>

<script>
    let allChannels = [];
    let hlsEngine = null;
    let dashEngine = null;
    let scriptsPromise = null;

    const video = document.getElementById('video');
    const iframe = document.getElementById('iframePlayer');
    const list = document.getElementById('channelList');
    const loading = document.getElementById('loading');
    const titleEl = document.getElementById('title');

    function loadScripts() {
        if (scriptsPromise) return scriptsPromise;
        scriptsPromise = new Promise((resolve) => {
            let loaded = 0;
            const check = () => { if (++loaded === 2) resolve(); };
            const s1 = document.createElement('script'); s1.src = "https://cdn.jsdelivr.net/npm/hls.js@1.4.12/dist/hls.min.js"; s1.onload = check;
            const s2 = document.createElement('script'); s2.src = "https://cdnjs.cloudflare.com/ajax/libs/shaka-player/4.3.5/shaka-player.compiled.js"; s2.onload = () => { shaka.polyfill.installAll(); check(); };
            document.head.appendChild(s1); document.head.appendChild(s2);
        });
        return scriptsPromise;
    }

    async function playStream(ch) {
        if (!ch) return;
        loading.style.display = 'block';
        document.getElementById('placeholder').style.display = 'none';
        titleEl.innerText = ch.name;

        video.style.display = 'none'; video.pause(); video.src = "";
        iframe.style.display = 'none'; iframe.src = "about:blank";
        if (hlsEngine) hlsEngine.destroy();
        if (dashEngine) await dashEngine.destroy();

        const isEmbed = ch.type === 'iframe' || (!ch.url.includes('.m3u8') && !ch.url.includes('.mpd'));

        if (isEmbed) {
            iframe.style.display = 'block';
            iframe.src = ch.url;
            iframe.onload = () => loading.style.display = 'none';
        } else {
            try {
                await loadScripts(); 
                video.style.display = 'block';
                if (ch.url.includes('.mpd')) {
                    dashEngine = new shaka.Player(video);
                    await dashEngine.load(ch.url);
                    loading.style.display = 'none';
                } else if (window.Hls && Hls.isSupported()) {
                    hlsEngine = new Hls();
                    hlsEngine.loadSource(ch.url);
                    hlsEngine.attachMedia(video);
                    hlsEngine.on(Hls.Events.MANIFEST_PARSED, () => { video.play().catch(()=>{}); loading.style.display = 'none'; });
                }
            } catch (e) { loading.style.display = 'none'; }
        }
    }

    function renderGrid(data) {
        const frag = document.createDocumentFragment();
        data.forEach(ch => {
            const btn = document.createElement('div');
            btn.className = 'channel-card';
            btn.setAttribute('role', 'listitem');
            btn.setAttribute('tabindex', '0');
            btn.innerHTML = `<span class="channel-name">${ch.name}</span>`;
            btn.onclick = () => { playStream(ch); window.scrollTo({top:0, behavior:'smooth'}); };
            btn.onkeydown = (e) => { if(e.key==='Enter') btn.onclick(); };
            frag.appendChild(btn);
        });
        list.innerHTML = '';
        list.appendChild(frag);
    }

    async function init() {
        try {
            const res = await fetch('channels.json?v=' + Date.now());
            allChannels = await res.json();
            renderGrid(allChannels);
            const slug = new URLSearchParams(window.location.search).get('ch');
            if (slug) {
                const found = allChannels.find(c => c.name.toLowerCase().includes(slug.replace(/-/g,' ')));
                if (found) playStream(found);
            }
        } catch (e) {}
    }

    document.getElementById('searchInput').oninput = (e) => {
        const val = e.target.value.toLowerCase();
        renderGrid(allChannels.filter(c => c.name.toLowerCase().includes(val)));
    };

    window.onload = init;
</script>
</body>
</html>
