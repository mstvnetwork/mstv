<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MSTV Network | Live TV</title>

<style>
body { margin:0; font-family:Arial; }

header {
  background:#111;
  color:white;
  padding:10px;
  display:flex;
  justify-content:space-between;
  align-items:center;
}

input {
  padding:8px;
  border-radius:20px;
  border:none;
}

.player-container {
  width:100%;
  max-width:600px;
  margin:auto;
  aspect-ratio:16/9;
  background:black;
  position:relative;
}

video, iframe {
  width:100%;
  height:100%;
  position:absolute;
  top:0; left:0;
  display:none;
}

#placeholder {
  display:flex;
  justify-content:center;
  align-items:center;
  height:100%;
  font-size:40px;
  color:white;
}

.channel-grid {
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(90px,1fr));
  gap:10px;
  padding:10px;
}

.channel-card {
  background:#eee;
  padding:5px;
  text-align:center;
  cursor:pointer;
}

.channel-card img {
  width:100%;
  height:auto;
}
</style>
</head>

<body>

<header>
  <div>MSTV NETWORK</div>
  <input type="text" id="search" placeholder="Search">
</header>

<div class="player-container">
  <div id="placeholder">📺</div>
  <video id="video" controls autoplay playsinline></video>
  <iframe id="iframe"></iframe>
</div>

<div class="channel-grid" id="grid"></div>

<script src="./shaka.js" defer></script>
<script src="./shaka/hls.min.js" defer></script>

<script>
const video = document.getElementById("video");
const iframe = document.getElementById("iframe");
const placeholder = document.getElementById("placeholder");
const grid = document.getElementById("grid");
const search = document.getElementById("search");

const JSON_URL = "./channels.json";

let channels = [];
let hls = null;
let shakaPlayer = null;

/* STOP PLAYER */
async function stopAll(){
  if(hls){ hls.destroy(); hls=null; }
  if(shakaPlayer){ await shakaPlayer.destroy(); shakaPlayer=null; }

  video.pause();
  video.src="";
  video.style.display="none";

  iframe.src="about:blank";
  iframe.style.display="none";

  placeholder.style.display="flex";
}

/* PLAY CHANNEL */
async function playChannelByName(name){
  const ch = channels.find(c => c.name === name);
  if(!ch) return;

  await stopAll();
  placeholder.style.display="none";

  if(ch.type === "iframe"){
    iframe.style.display="block";
    iframe.src = ch.url;
    return;
  }

  video.style.display="block";

  const isHls = ch.url.includes(".m3u8");

  if(isHls){
    if(window.Hls && Hls.isSupported()){
      hls = new Hls();
      hls.loadSource(ch.url);
      hls.attachMedia(video);
      hls.on(Hls.Events.MANIFEST_PARSED, ()=> video.play());
    } else {
      video.src = ch.url;
      video.play();
    }
  } else {
    if(window.shaka){
      shakaPlayer = new shaka.Player(video);
      await shakaPlayer.load(ch.url);
      video.play();
    }
  }
}

/* CREATE CARD */
function createCard(ch){
  return `
  <div class="channel-card" data-name="${ch.name}">
    <img src="${ch.logo}" alt="${ch.name}" loading="lazy">
    <div>${ch.name}</div>
  </div>`;
}

/* RENDER */
function render(data){
  channels = data;
  grid.innerHTML = data.map(createCard).join("");

  grid.addEventListener("click", e=>{
    const card = e.target.closest(".channel-card");
    if(!card) return;
    playChannelByName(card.dataset.name);
  });

  // deep link
  const hash = decodeURIComponent(location.hash.slice(1));
  if(hash) playChannelByName(hash);
}

/* SEARCH */
search.addEventListener("input", e=>{
  const term = e.target.value.toLowerCase();
  document.querySelectorAll(".channel-card").forEach(card=>{
    card.style.display =
      card.dataset.name.toLowerCase().includes(term) ? "block" : "none";
  });
});

/* INIT */
(async()=>{
  try{
    const res = await fetch(JSON_URL);
    const data = await res.json();
    console.log("Loaded channels:", data.length);
    render(data);
  }catch(err){
    console.error("JSON load failed", err);
  }
})();
</script>

</body>
</html>
