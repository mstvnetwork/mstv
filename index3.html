<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#111419">
    <title>MSTV Network | Free Live TV</title>
    
    <!-- SEO Meta -->
    <meta name="description" content="Watch MSTV Network for free 24/7 live streaming of Indian, Pakistani, and International TV channels.">
    <link rel="canonical" href="https://mstvnet.netlify.app">

    <style>
        :root { --accent: #90EE90; --header-h: 70px; --bg: #E8E4C9; }
        * { box-sizing: border-box; }
        body { background-color: var(--bg); margin: 0; font-family: system-ui, sans-serif; }
        header { position: sticky; top: 0; z-index: 1000; background: #111419; height: var(--header-h); display: flex; align-items: center; justify-content: space-between; padding: 0 5%; }
        .brand-name { font-size: 1.3rem; font-weight: 800; background: linear-gradient(90deg, #90EE90, #00FFA3); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .search-container input { width: 100%; padding: 8px 15px; border-radius: 20px; border: 1px solid #333; background: #1A1D20; color: #fff; outline: none; }
        .sticky-player-wrapper { position: sticky; top: var(--header-h); z-index: 900; background: var(--bg); padding: 10px 0; min-height: 220px; display: flex; justify-content: center; }
        .player-container { position: relative; width: 92%; max-width: 600px; aspect-ratio: 16/9; background: #000; border-radius: 12px; overflow: hidden; }
        video, iframe { width: 100%; height: 100%; border: none; display: none; }
        #placeholder { height: 100%; display: flex; align-items: center; justify-content: center; font-size: 3rem; color: var(--accent); }
        #loading { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); z-index: 10; background: rgba(0,0,0,0.8); padding: 10px 20px; border-radius: 20px; color: var(--accent); display: none; }
        #live-stamp { position: absolute; top: 10px; left: 10px; background: #E50914; color: white; padding: 4px 10px; border-radius: 4px; font-size: 0.7rem; font-weight: bold; z-index: 5; display: none; }
        .channel-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(85px, 1fr)); gap: 8px; padding: 15px; }
        .channel-card { background: #fff; border-radius: 8px; padding: 6px; text-align: center; border: 1px solid #ddd; cursor: pointer; contain: content; }
        .card-logo { width: 100%; aspect-ratio: 3/2; background: #f8f8f8; display: flex; align-items: center; justify-content: center; overflow: hidden; }
        .card-logo img { max-width: 100%; max-height: 100%; object-fit: contain; }
        .channel-name { font-size: 10px; font-weight: 700; margin-top: 5px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        footer { padding: 30px; text-align: center; font-size: 0.8rem; color: #666; }
    </style>
</head>
<body>

<header>
    <div class="logo-section">
        <div class="brand-name">MSTV NETWORK</div>
    </div>
    <div class="search-container">
        <input type="text" id="channel-search" placeholder="Search...">
    </div>
</header>

<main class="sticky-player-wrapper">
    <div class="player-container">
        <div id="loading">🌀 Loading...</div>
        <div id="live-stamp">LIVE</div>
        <div id="placeholder">📺</div>
        <video id="video-player" playsinline controls></video>
        <iframe id="iframe-player" allow="autoplay; encrypted-media; fullscreen"></iframe>
    </div>
</main>

<div class="channel-grid" id="channel-list-container"></div>

<footer>© 2026 MSTV Network. All Rights Reserved.</footer>

<script>
const HLS_JS = "https://cdn.jsdelivr.net";
const SHAKA_JS = "https://cdn.jsdelivr.net";
const JSON_URL = './channels.json';

const elements = {
    video: document.getElementById('video-player'),
    iframe: document.getElementById('iframe-player'),
    placeholder: document.getElementById('placeholder'),
    loader: document.getElementById('loading'),
    live: document.getElementById('live-stamp'),
    grid: document.getElementById('channel-list-container'),
    search: document.getElementById('channel-search')
};

let channels = [];
let hlsInstance = null;
let shakaInstance = null;

function loadLibrary(url, globalVar) {
    return new Promise((resolve) => {
        if (window[globalVar]) return resolve();
        const script = document.createElement('script');
        script.src = url;
        script.async = true;
        script.onload = () => {
            const check = setInterval(() => {
                if (window[globalVar]) { clearInterval(check); resolve(); }
            }, 50);
        };
        document.body.appendChild(script);
    });
}

async function stopAll() {
    // Null checks for all style manipulations to prevent crash
    if(elements.loader) elements.loader.style.display = 'none';
    if(elements.live) elements.live.style.display = 'none';
    if(hlsInstance) { hlsInstance.destroy(); hlsInstance = null; }
    if(shakaInstance) { await shakaInstance.destroy(); shakaInstance = null; }
    
    if(elements.video) {
        elements.video.pause(); elements.video.src = ""; elements.video.load();
        elements.video.style.display = 'none';
    }
    if(elements.iframe) {
        elements.iframe.src = "about:blank";
        elements.iframe.style.display = 'none';
    }
    if(elements.placeholder) elements.placeholder.style.display = 'flex';
}

async function playChannel(index) {
    const ch = channels[index];
    if(!ch) return;
    
    window.location.hash = encodeURIComponent(ch.name);
    await stopAll();
    
    if(elements.loader) elements.loader.style.display = 'block';
    if(elements.placeholder) elements.placeholder.style.display = 'none';

    if(ch.type === 'iframe') {
        elements.iframe.style.display = 'block';
        elements.iframe.src = ch.url;
        return;
    }

    elements.video.style.display = 'block';
    const isM3U8 = ch.url.includes('.m3u8') || ch.type === 'hls';

    if(isM3U8) {
        await loadLibrary(HLS_JS, 'Hls'); 
        if(window.Hls && Hls.isSupported()) {
            hlsInstance = new Hls({
                // Performance & Reliability Fixes
                enableWorker: true,
                lowLatencyMode: true,
                backBufferLength: 90
            });
            
            // RECOMMENDED ORDER: attachMedia -> loadSource
            hlsInstance.attachMedia(elements.video);
            hlsInstance.on(Hls.Events.MEDIA_ATTACHED, function () {
                hlsInstance.loadSource(ch.url);
            });

            hlsInstance.on(Hls.Events.MANIFEST_PARSED, () => {
                elements.video.play().catch(e => console.log("Autoplay blocked:", e));
            });

            // ERROR RECOVERY: If HLS fails, try native playback (Safari/iOS)
            hlsInstance.on(Hls.Events.ERROR, function (event, data) {
                if (data.fatal) {
                    switch (data.type) {
                        case Hls.ErrorTypes.NETWORK_ERROR:
                            hlsInstance.startLoad();
                            break;
                        case Hls.ErrorTypes.MEDIA_ERROR:
                            hlsInstance.recoverMediaError();
                            break;
                        default:
                            stopAll();
                            break;
                    }
                }
            });
        } else if (elements.video.canPlayType('application/vnd.apple.mpegurl')) {
            // NATIVE FALLBACK: Essential for iPhone/Safari
            elements.video.src = ch.url;
            elements.video.addEventListener('loadedmetadata', () => elements.video.play());
        }
    } else {
        // DASH/Shaka logic remains the same
        await loadLibrary(SHAKA_JS, 'shaka');
        shaka.polyfil.installAll();
        shakaInstance = new shaka.Player(elements.video);
        try { await shakaInstance.load(ch.url); elements.video.play(); } catch(e) { console.error(e); }
    }
}


function renderUI(data) {
    channels = data;
    const frag = document.createDocumentFragment();
    data.forEach((ch, i) => {
        const card = document.createElement('div');
        card.className = 'channel-card';
        card.setAttribute('data-name', ch.name.toLowerCase());
        card.innerHTML = `
            <div class="card-logo">
                <img src="${ch.logo || ''}" alt="${ch.name}" width="85" height="56" loading="lazy">
            </div>
            <div class="channel-name">${ch.name}</div>`;
        card.onclick = () => { playChannel(i); window.scrollTo({top: 0, behavior: 'smooth'}); };
        frag.appendChild(card);
    });
    if(elements.grid) {
        elements.grid.innerHTML = '';
        elements.grid.appendChild(frag);
    }

    const hash = decodeURIComponent(window.location.hash.substring(1));
    if (hash) {
        const idx = data.findIndex(c => c.name === hash);
        if (idx !== -1) playChannel(idx);
    }
}

if(elements.search) {
    elements.search.addEventListener('input', (e) => {
        const term = e.target.value.toLowerCase();
        document.querySelectorAll('.channel-card').forEach(card => {
            card.style.display = card.getAttribute('data-name').includes(term) ? 'flex' : 'none';
        });
    });
}

elements.video.onplaying = () => { if(elements.loader) elements.loader.style.display = 'none'; };

fetch(JSON_URL).then(r => r.json()).then(renderUI).catch(e => console.error(e));
</script>
</body>
</html>
