<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MSTV Network | Live Stream</title>
    <meta name="description" content="Watch MSTV Network live streaming channels.">
    
<!-- Player Libraries -->
    <!-- DASH ENGINE (Local) -->
    <link rel="stylesheet" href="shaka-ui.css">
    <script src="shaka-player.ui.min.js"></script>
        
    <style>
        :root { --bg: #0b0d0e; --accent: #00ffa3; --card: #161a1d; --white: #ffffff; }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { background: var(--bg); color: var(--white); font-family: system-ui, sans-serif; }

        /* Player Section */
        .player-container { 
            max-width: 900px; margin: 20px auto; padding: 0 15px; 
        }
        .video-box { 
            width: 100%; aspect-ratio: 16/9; background: #000; 
            border-radius: 12px; overflow: hidden; position: relative;
        }
        video { width: 100%; height: 100%; outline: none; }
        #channel-title { margin-top: 15px; font-size: 1.2rem; font-weight: 700; }

        /* Grid Section - Horizontal Stacking */
        .grid-container { max-width: 900px; margin: 30px auto; padding: 0 15px; }
        .channel-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(90px, 1fr));
            gap: 12px;
        }
        .card {
            background: var(--card); border-radius: 10px; padding: 8px;
            text-align: center; cursor: pointer; border: 1px solid transparent;
            transition: 0.2s; text-decoration: none; color: inherit;
        }
        .card:hover { border-color: var(--accent); transform: translateY(-3px); }
        .card img { 
            width: 100%; aspect-ratio: 1/1; object-fit: contain; 
            background: #fff; border-radius: 6px; margin-bottom: 6px;
        }
        .card span { font-size: 0.7rem; font-weight: 600; display: block; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

        footer { text-align: center; padding: 40px 0; font-size: 0.8rem; opacity: 0.6; }
    </style>
</head>
<body>

    <main>
        <section class="player-container">
            <div class="video-box">
                <video id="main-video" controls autoplay playsinline></video>
            </div>
            <h1 id="channel-title">Select a Channel</h1>
        </section>

        <section class="grid-container">
            <div class="channel-grid" id="grid">
                <!-- Loaded from JSON -->
            </div>
        </section>
    </main>

    <footer>&copy; 2025 MSTV Network</footer>

    <script>
                const video = document.getElementById('main-video');
const title = document.getElementById('channel-title');
const grid = document.getElementById('grid');

let hls = null;
let shakaPlayer = null;

// Initialize Shaka Polyfills
if (window.shaka) {
    shaka.polyfill.installAll();
}

async function clearPlayers() {
    if (hls) {
        hls.destroy();
        hls = null;
    }
    if (shakaPlayer) {
        await shakaPlayer.destroy();
        shakaPlayer = null;
    }
    video.pause();
    video.removeAttribute('src'); 
    video.load();
}

async function playChannel(url, name, isAutoPlay = false) {
    await clearPlayers();
    title.textContent = name;

    // FIX: Mute video for autoplay to work without user interaction error
    if (isAutoPlay) {
        video.muted = true;
    }

    if (url.includes('.mpd')) {
        if (shaka.Player.isBrowserSupported()) {
            shakaPlayer = new shaka.Player(video);
            try {
                await shakaPlayer.load(url);
                // Attempt play; catch error if browser still blocks it
                video.play().catch(e => console.log("Autoplay blocked, waiting for user click."));
            } catch (e) { console.error("Shaka Load Error:", e); }
        }
    } 
    else if (url.includes('.m3u8')) {
        if (Hls.isSupported()) {
            hls = new Hls();
            hls.loadSource(url);
            hls.attachMedia(video);
            hls.on(Hls.Events.MANIFEST_PARSED, () => {
                video.play().catch(e => console.log("Autoplay blocked, waiting for user click."));
            });
        } else if (video.canPlayType('application/vnd.apple.mpegurl')) {
            video.src = url;
            video.play().catch(e => {});
        }
    }
}

async function loadData() {
    try {
        const res = await fetch('https://mstvnet.netlify.app/channels.json');
        const data = await res.json();
        
        grid.innerHTML = data.map(ch => `
            <div class="card" onclick="playChannel('${ch.url}', '${ch.name}', false)" role="button" aria-label="Play ${ch.name}">
                <img src="${ch.logo}" alt="${ch.name}" loading="lazy" width="80" height="80">
                <span>${ch.name}</span>
            </div>
        `).join('');
        
        // Auto-play first channel (Passed 'true' for isAutoPlay)
        if (data.length > 0) {
            playChannel(data[0].url, data[0].name, true);
        }
    } catch (err) {
        grid.innerHTML = "<p>Failed to load channels.</p>";
    }
}

document.addEventListener('DOMContentLoaded', loadData);


    </script>
</body>
</html>
