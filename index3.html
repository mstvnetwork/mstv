<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>MSTV — Live Streaming</title>

<!-- Fonts -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;600&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">

<!-- HLS.js & Shaka Player -->
<script src="https://cdn.jsdelivr.net/npm/hls.js@latest/dist/hls.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/shaka-player/4.7.6/shaka-player.compiled.min.js"></script>

<style>
  :root {
    --bg:       #080a0f;
    --bg2:      #0d1018;
    --bg3:      #131720;
    --surface:  #1a2030;
    --border:   rgba(255,255,255,0.07);
    --accent:   #e63e6d;
    --accent2:  #ff6b35;
    --gold:     #f5c842;
    --text:     #e8ecf4;
    --muted:    #6b7694;
    --live:     #22c55e;
    --radius:   12px;
    --sidebar:  300px;
    --header:   64px;
    --footer:   52px;
    --player-h: clamp(220px, 42vw, 540px);
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  html, body {
    height: 100%; width: 100%; overflow: hidden;
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    -webkit-font-smoothing: antialiased;
  }

  /* ── SCROLLBAR ── */
  ::-webkit-scrollbar { width: 4px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--surface); border-radius: 2px; }

  /* ─────────────── HEADER ─────────────── */
#header {
  position: sticky; /* Changed from fixed */
  top: 0; left: 0; right: 0; z-index: 1000;
  height: var(--header);
  background: rgba(8,10,15,0.92);
  backdrop-filter: blur(18px);
  border-bottom: 1px solid var(--border);
  display: flex; align-items: center;
  padding: 0 20px; gap: 16px;
}
  .logo-mark {
    display: flex; align-items: center; gap: 10px; flex-shrink: 0;
  }
  .logo-icon {
    width: 36px; height: 36px;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    border-radius: 8px;
    display: grid; place-items: center;
    font-size: 18px;
  }
  .logo-text {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 26px; letter-spacing: 2px;
    background: linear-gradient(90deg, var(--accent), var(--accent2));
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    background-clip: text;
  }
  .logo-sub {
    font-family: 'JetBrains Mono', monospace;
    font-size: 9px; color: var(--muted); letter-spacing: 3px;
    text-transform: uppercase; margin-top: -6px;
  }

  /* LIVE INDICATOR */
  .live-badge {
    display: flex; align-items: center; gap: 6px;
    background: rgba(34,197,94,0.12);
    border: 1px solid rgba(34,197,94,0.3);
    border-radius: 20px; padding: 4px 10px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px; font-weight: 600; color: var(--live);
    letter-spacing: 1.5px; flex-shrink: 0;
  }
  .live-dot {
    width: 6px; height: 6px; border-radius: 50%;
    background: var(--live);
    box-shadow: 0 0 6px var(--live);
    animation: pulse-dot 1.4s ease-in-out infinite;
  }
  @keyframes pulse-dot {
    0%,100% { opacity: 1; transform: scale(1); }
    50% { opacity: 0.5; transform: scale(0.7); }
  }

  /* SEARCH */
  .search-wrap {
    flex: 1; max-width: 420px; margin: 0 auto;
    position: relative;
  }
  .search-wrap svg {
    position: absolute; left: 12px; top: 50%; transform: translateY(-50%);
    color: var(--muted); pointer-events: none;
  }
  #searchInput {
    width: 100%; height: 38px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 20px;
    color: var(--text); font-family: 'DM Sans', sans-serif; font-size: 14px;
    padding: 0 16px 0 38px; outline: none;
    transition: border-color .2s, box-shadow .2s;
  }
  #searchInput::placeholder { color: var(--muted); }
  #searchInput:focus {
    border-color: rgba(230,62,109,0.5);
    box-shadow: 0 0 0 3px rgba(230,62,109,0.08);
  }

  /* CHANNEL COUNT */
  #channelCount {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px; color: var(--muted); flex-shrink: 0;
  }

  /* MENU TOGGLE (mobile) */
  #menuToggle {
    display: none; align-items: center; justify-content: center;
    width: 36px; height: 36px;
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 8px; cursor: pointer; flex-shrink: 0;
    color: var(--text);
  }

  /* ─────────────── LAYOUT ─────────────── */
#app {
  position: relative; /* Changed from fixed to allow page scroll */
  display: flex; 
  min-height: 100vh;
}

  /* ─────────────── SIDEBAR ─────────────── */
#sidebar {
  width: var(--sidebar); flex-shrink: 0;
  background: var(--bg2);
  border-right: 1px solid var(--border);
  display: flex; flex-direction: column;
  /* Keep sidebar visible while scrolling main content */
  position: sticky; 
  top: var(--header);
  height: calc(100vh - var(--header));
}

  .sidebar-top {
    padding: 14px 14px 10px;
    border-bottom: 1px solid var(--border);
  }
  .section-label {
    font-family: 'JetBrains Mono', monospace;
    font-size: 9px; letter-spacing: 2.5px;
    color: var(--muted); text-transform: uppercase; margin-bottom: 10px;
    padding-left: 2px;
  }

  /* FILTER CHIPS */
  .filter-chips {
    display: flex; gap: 6px; flex-wrap: wrap;
  }
  .chip {
    font-size: 11px; font-family: 'DM Sans', sans-serif; font-weight: 500;
    padding: 4px 10px; border-radius: 20px; cursor: pointer;
    border: 1px solid var(--border);
    background: transparent; color: var(--muted);
    transition: all .18s;
    white-space: nowrap;
  }
  .chip:hover { color: var(--text); border-color: rgba(255,255,255,0.2); }
  .chip.active {
    background: var(--accent); border-color: var(--accent);
    color: #fff;
  }

  /* CHANNEL LIST */
  #channelList {
    flex: 1; overflow-y: auto; padding: 8px 8px;
  }

  .channel-item {
    display: flex; align-items: center; gap: 10px;
    padding: 9px 10px; border-radius: 10px; cursor: pointer;
    transition: background .15s, transform .1s;
    position: relative;
    border: 1px solid transparent;
  }
  .channel-item:hover {
    background: var(--surface);
  }
  .channel-item.active {
    background: var(--surface);
    border-color: rgba(230,62,109,0.35);
  }
  .channel-item.active::before {
    content: '';
    position: absolute; left: 0; top: 20%; bottom: 20%;
    width: 3px; border-radius: 2px;
    background: linear-gradient(var(--accent), var(--accent2));
  }

  .ch-logo {
    width: 42px; height: 42px; border-radius: 8px;
    object-fit: contain; background: var(--bg3);
    flex-shrink: 0; border: 1px solid var(--border);
  }
  .ch-logo-fallback {
    width: 42px; height: 42px; border-radius: 8px;
    background: var(--bg3); flex-shrink: 0;
    border: 1px solid var(--border);
    display: grid; place-items: center;
    font-size: 16px; color: var(--muted);
  }
  .ch-info { flex: 1; min-width: 0; }
  .ch-name {
    font-size: 13px; font-weight: 500; color: var(--text);
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }
  .ch-type {
    font-family: 'JetBrains Mono', monospace;
    font-size: 9px; color: var(--muted); letter-spacing: 1px;
    text-transform: uppercase; margin-top: 2px;
  }
  .ch-arrow {
    color: var(--muted); transition: color .15s;
    flex-shrink: 0; opacity: 0;
  }
  .channel-item:hover .ch-arrow,
  .channel-item.active .ch-arrow { opacity: 1; color: var(--accent); }

  /* EMPTY STATE */
  .empty-state {
    text-align: center; padding: 40px 20px; color: var(--muted);
  }
  .empty-state svg { margin-bottom: 12px; opacity: .4; }
  .empty-state p { font-size: 13px; }

  /* ─────────────── MAIN CONTENT ─────────────── */
#main {
  flex: 1; 
  display: flex; 
  flex-direction: column; 
  /* Remove overflow:hidden to allow the window to scroll */
  overflow: visible; 
  background: var(--bg);
}

  /* PLAYER AREA */
#playerArea {
  background: #000;
  position: relative;
  width: 100%;
  height: var(--player-h);
  flex-shrink: 0;
  scroll-margin-top: 20px; /* Space above player when centered */
}

  /* Placeholder */
  #playerPlaceholder {
    position: absolute; inset: 0;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center; gap: 14px;
    background: var(--bg2);
    color: var(--muted);
    z-index: 2;
    transition: opacity .3s;
  }
  #playerPlaceholder .big-icon { font-size: 48px; opacity: .25; }
  #playerPlaceholder p { font-size: 14px; }
  #playerPlaceholder.hidden { opacity: 0; pointer-events: none; }

  /* Loading overlay */
  #playerLoader {
    position: absolute; inset: 0; z-index: 5;
    display: grid; place-items: center;
    background: rgba(0,0,0,.8);
    opacity: 0; pointer-events: none;
    transition: opacity .2s;
  }
  #playerLoader.show { opacity: 1; pointer-events: all; }
  .spinner {
    width: 44px; height: 44px;
    border: 3px solid rgba(255,255,255,0.1);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin .7s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* Error overlay */
  #playerError {
    position: absolute; inset: 0; z-index: 6;
    display: none; flex-direction: column; align-items: center; justify-content: center; gap: 12px;
    background: rgba(0,0,0,.88); color: var(--muted);
    font-size: 14px; text-align: center; padding: 24px;
  }
  #playerError.show { display: flex; }
  #playerError .err-icon { font-size: 36px; color: var(--accent); opacity: .7; }

  /* Video / Iframe */
  #videoEl {
    width: 100%; height: 100%; object-fit: contain;
    display: none; position: absolute; inset: 0; z-index: 1;
    background: #000;
  }
  #iframeEl {
    width: 100%; height: 100%;
    border: none; display: none;
    position: absolute; inset: 0; z-index: 1;
    background: #000;
    /* Full pointer-events: viewers can click play/controls inside the iframe.
       External redirect protection is handled solely by the sandbox attribute. */
    pointer-events: auto;
  }

  /* Sandboxed badge — purely informational, no click-blocking */
  #iframeHint {
    display: none;
    position: absolute; bottom: 10px; right: 10px; z-index: 4;
    background: rgba(0,0,0,0.72);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 5px 12px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px; letter-spacing: 1px; color: var(--muted);
    backdrop-filter: blur(6px);
    pointer-events: none;
    animation: fadeSlide .3s ease both;
  }
  #iframeHint.visible { display: flex; align-items: center; gap: 6px; }

  /* NOW PLAYING bar */
  #nowPlayingBar {
    display: none;
    align-items: center; gap: 12px;
    padding: 10px 16px;
    background: var(--bg3);
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
  }
  #nowPlayingBar.visible { display: flex; }
  .np-logo {
    width: 32px; height: 32px; border-radius: 6px;
    object-fit: contain; background: var(--bg2);
    border: 1px solid var(--border);
  }
  .np-logo-fallback {
    width: 32px; height: 32px; border-radius: 6px;
    background: var(--bg2); border: 1px solid var(--border);
    display: grid; place-items: center; font-size: 14px;
  }
  .np-name {
    font-size: 14px; font-weight: 600; color: var(--text);
  }
  .np-type {
    font-family: 'JetBrains Mono', monospace;
    font-size: 9px; letter-spacing: 1.5px; color: var(--muted);
    text-transform: uppercase;
  }
  .np-live {
    margin-left: auto; display: flex; align-items: center; gap: 6px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px; color: var(--live); letter-spacing: 1px;
  }
  .np-live-dot {
    width: 6px; height: 6px; border-radius: 50%;
    background: var(--live); animation: pulse-dot 1.4s infinite;
  }

  /* GRID AREA */
  #gridWrap {
    flex: 1; overflow-y: auto; padding: 16px;
  }

  #gridTitle {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 20px; letter-spacing: 1.5px;
    color: var(--text); margin-bottom: 12px;
    display: flex; align-items: center; gap: 10px;
  }
  #gridTitle span.count {
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px; color: var(--muted);
    font-weight: 400; letter-spacing: 1px;
  }

  #channelGrid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(120px, 1fr));
    gap: 10px;
  }

  .grid-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 12px 8px;
    cursor: pointer; text-align: center;
    transition: all .18s; position: relative; overflow: hidden;
  }
  .grid-card::after {
    content: '';
    position: absolute; inset: 0;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    opacity: 0; transition: opacity .2s;
  }
  .grid-card:hover { border-color: rgba(230,62,109,0.4); transform: translateY(-2px); }
  .grid-card:hover::after { opacity: 0.04; }
  .grid-card.active { border-color: var(--accent); }
  .grid-card.active::after { opacity: 0.08; }

  .grid-logo {
    width: 56px; height: 56px; object-fit: contain;
    border-radius: 8px; margin: 0 auto 8px;
    background: var(--bg3);
    display: block;
  }
  .grid-logo-fallback {
    width: 56px; height: 56px; border-radius: 8px;
    margin: 0 auto 8px; background: var(--bg3);
    display: grid; place-items: center;
    font-size: 22px;
  }
  .grid-name {
    font-size: 11px; font-weight: 500; color: var(--text);
    line-height: 1.3; word-break: break-word;
  }
  .grid-type {
    font-family: 'JetBrains Mono', monospace;
    font-size: 8px; color: var(--muted); letter-spacing: 1px;
    text-transform: uppercase; margin-top: 4px;
  }

  /* ─────────────── FOOTER ─────────────── */
#footer {
  position: relative; /* Changed from fixed so it sits at the bottom of the content */
  margin-top: auto;
  height: var(--footer);
  background: rgba(8,10,15,0.95);
  border-top: 1px solid var(--border);
  display: flex; align-items: center; justify-content: space-between;
  padding: 0 20px;
}
  .footer-left {
    display: flex; align-items: center; gap: 12px;
  }
  .footer-brand {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 16px; letter-spacing: 2px;
    background: linear-gradient(90deg, var(--accent), var(--accent2));
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    background-clip: text;
  }
  .footer-sep { color: var(--border); }
  .footer-copy {
    font-size: 11px; color: var(--muted);
  }
  .footer-right {
    display: flex; align-items: center; gap: 14px;
  }
  .footer-stat {
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px; color: var(--muted);
    display: flex; align-items: center; gap: 5px;
  }
  .footer-stat strong { color: var(--text); }
  #updateStatus {
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px; color: var(--muted);
    display: flex; align-items: center; gap: 5px;
  }
  .update-dot {
    width: 5px; height: 5px; border-radius: 50%;
    background: var(--gold);
    animation: pulse-dot 2s infinite;
  }

  /* ─────────────── SIDEBAR OVERLAY (mobile) ─────────────── */
  #sidebarOverlay {
    display: none; position: fixed;
    inset: var(--header) 0 var(--footer);
    background: rgba(0,0,0,.6);
    z-index: 50; backdrop-filter: blur(2px);
  }

  /* ─────────────── RESPONSIVE ─────────────── */
  @media (max-width: 768px) {
    :root {
      --sidebar: 260px;
      --player-h: 56vw;
    }
    #menuToggle { display: flex; }
    #sidebar {
      position: fixed;
      top: var(--header); bottom: var(--footer); left: 0;
      z-index: 60;
      transform: translateX(-100%);
      box-shadow: 4px 0 24px rgba(0,0,0,.4);
    }
    #sidebar.open { transform: translateX(0); }
    #sidebarOverlay.show { display: block; }
    #channelCount { display: none; }
    .footer-copy { display: none; }
    #channelGrid {
      grid-template-columns: repeat(auto-fill, minmax(90px, 1fr));
    }
  }
  @media (max-width: 480px) {
    :root { --player-h: 56vw; }
    .logo-sub { display: none; }
    #gridWrap { padding: 10px; }
    #channelGrid {
      grid-template-columns: repeat(auto-fill, minmax(76px, 1fr));
      gap: 8px;
    }
    @media (max-height: 500px) and (orientation: landscape) {
  #header { position: absolute; } /* Header stays at very top, disappears immediately on scroll */
  :root { --player-h: 80vh; } /* Make player larger in landscape */
    }
  }

  /* Stagger animation */
  @keyframes fadeSlide {
    from { opacity: 0; transform: translateY(8px); }
    to { opacity: 1; transform: none; }
  }
  .channel-item, .grid-card {
    animation: fadeSlide .25s ease both;
  }
</style>
</head>
<body>

<!-- ── HEADER ── -->
<header id="header">
  <div class="logo-mark">
    <div class="logo-icon">📺</div>
    <div>
      <div class="logo-text">MSTV</div>
      <div class="logo-sub">Live Network</div>
    </div>
  </div>

  <div class="live-badge"><span class="live-dot"></span>LIVE</div>

  <div class="search-wrap">
    <svg width="15" height="15" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
      <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
    </svg>
    <input id="searchInput" type="text" placeholder="Search channels…" autocomplete="off" spellcheck="false">
  </div>

  <span id="channelCount">— channels</span>

  <button id="menuToggle" aria-label="Toggle channels">
    <svg width="18" height="18" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
      <line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/>
    </svg>
  </button>
</header>

<!-- ── SIDEBAR OVERLAY ── -->
<div id="sidebarOverlay"></div>

<!-- ── APP ── -->
<div id="app">

  <!-- SIDEBAR -->
  <aside id="sidebar">
    <div class="sidebar-top">
      <div class="section-label">Filter by type</div>
      <div class="filter-chips">
        <button class="chip active" data-filter="all">All</button>
        <button class="chip" data-filter="hls">HLS</button>
        <button class="chip" data-filter="dash">DASH</button>
        <button class="chip" data-filter="iframe">iFrame</button>
      </div>
    </div>
    <div id="channelList"></div>
  </aside>

  <!-- MAIN -->
  <main id="main">

    <!-- PLAYER -->
    <div id="playerArea">
      <div id="playerPlaceholder">
        <div class="big-icon">📡</div>
        <p>Select a channel to start streaming</p>
      </div>
      <div id="playerLoader"><div class="spinner"></div></div>
      <div id="playerError">
        <div class="err-icon">⚠️</div>
        <p id="playerErrorMsg">Stream could not be loaded.</p>
      </div>
      <video id="videoEl" controls playsinline></video>
      <!-- sandbox: no allow-top-navigation means iframe cannot redirect parent window -->
      <iframe id="iframeEl"
        sandbox="allow-scripts allow-same-origin allow-forms allow-presentation"
        allow="autoplay; fullscreen; encrypted-media; picture-in-picture"
        allowfullscreen></iframe>
      <!-- Protected badge shown on iframe channels -->
      <div id="iframeHint">🔒 Protected Stream</div>
    </div>

    <!-- NOW PLAYING -->
    
  <div id="nowPlayingBar">
  <div id="npLogoWrap"></div>
  <div class="np-live">
    <div class="np-live-dot"></div>
    LIVE
    <!-- Add this button -->
    <button onclick="centerPlayer()" style="margin-left:10px; background:var(--accent); border:none; color:white; border-radius:4px; padding:2px 8px; cursor:pointer; font-size:10px;">FOCUS PLAYER</button>
  </div>
  </div>


      <div>
        <div class="np-name" id="npName">—</div>
        <div class="np-type" id="npType">—</div>
      </div>
      <div class="np-live">
        <span class="np-live-dot"></span>LIVE
      </div>
    </div>

    <!-- GRID -->
    <div id="gridWrap">
      <div id="gridTitle">ALL CHANNELS <span class="count" id="gridCount"></span></div>
      <div id="channelGrid"></div>
    </div>

  </main>
</div>

<!-- ── FOOTER ── -->
<footer id="footer">
  <div class="footer-left">
    <span class="footer-brand">MSTV</span>
    <span class="footer-sep">|</span>
    <span class="footer-copy">© 2025 MSTV Live Network. All rights reserved.</span>
  </div>
  <div class="footer-right">
    <div class="footer-stat">Channels: <strong id="footerCount">—</strong></div>
    <div id="updateStatus">
      <span class="update-dot"></span>
      <span id="updateText">Syncing…</span>
    </div>
  </div>
</footer>

<script>
// ─────────────────────────────────────────────
//  CONFIG
// ─────────────────────────────────────────────
const JSON_URL        = 'channels2.json';
const POLL_INTERVAL   = 8000;   // ms – realtime polling
const LOGO_TIMEOUT    = 3000;

// ─────────────────────────────────────────────
//  STATE
// ─────────────────────────────────────────────
let channels        = [];
let filteredChannels= [];
let currentChannel  = null;
let activeFilter    = 'all';
let searchQuery     = '';
let hlsInstance     = null;
let shakaPlayer     = null;
let pollTimer       = null;
let lastJsonHash    = '';

// ─────────────────────────────────────────────
//  DOM REFS
// ─────────────────────────────────────────────
const $searchInput    = document.getElementById('searchInput');
const $channelList    = document.getElementById('channelList');
const $channelGrid    = document.getElementById('channelGrid');
const $channelCount   = document.getElementById('channelCount');
const $gridCount      = document.getElementById('gridCount');
const $footerCount    = document.getElementById('footerCount');
const $videoEl        = document.getElementById('videoEl');
const $iframeEl       = document.getElementById('iframeEl');
const $iframeHint     = document.getElementById('iframeHint');
const $playerPlaceholder = document.getElementById('playerPlaceholder');
const $playerLoader   = document.getElementById('playerLoader');
const $playerError    = document.getElementById('playerError');
const $playerErrorMsg = document.getElementById('playerErrorMsg');
const $nowPlayingBar  = document.getElementById('nowPlayingBar');
const $npLogoWrap     = document.getElementById('npLogoWrap');
const $npName         = document.getElementById('npName');
const $npType         = document.getElementById('npType');
const $updateText     = document.getElementById('updateText');
const $sidebar        = document.getElementById('sidebar');
const $sidebarOverlay = document.getElementById('sidebarOverlay');
const $menuToggle     = document.getElementById('menuToggle');
const chips           = document.querySelectorAll('.chip');

// ─────────────────────────────────────────────
//  INIT
// ─────────────────────────────────────────────
async function init() {
  shaka.polyfill.installAll();
  shakaPlayer = new shaka.Player();
  shakaPlayer.configure({ streaming: { bufferingGoal: 10, rebufferingGoal: 2 } });

  await loadChannels();
  startPolling();
  bindEvents();
}

// ─────────────────────────────────────────────
//  FETCH & POLL
// ─────────────────────────────────────────────
async function loadChannels(silent = false) {
  try {
    const res  = await fetch(JSON_URL + '?_=' + Date.now());
    if (!res.ok) throw new Error('HTTP ' + res.status);
    const text = await res.text();
    const hash = simpleHash(text);

    if (hash === lastJsonHash) { updateTimestamp(); return; } // no change
    lastJsonHash = hash;

    let data = JSON.parse(text);
    if (!Array.isArray(data)) data = data.channels || Object.values(data);
    channels = data.filter(c => c && c.name && c.url);

    if (!silent) render();
    else renderSilent();

    updateTimestamp();
  } catch (e) {
    $updateText.textContent = 'Error: ' + e.message;
    console.warn('Feed load error:', e);
  }
}

function startPolling() {
  clearInterval(pollTimer);
  pollTimer = setInterval(() => loadChannels(true), POLL_INTERVAL);
}

function updateTimestamp() {
  const now = new Date();
  $updateText.textContent = 'Updated ' + now.toLocaleTimeString([], { hour:'2-digit', minute:'2-digit', second:'2-digit' });
}

function simpleHash(str) {
  let h = 0;
  for (let i = 0; i < str.length; i++) h = (Math.imul(31, h) + str.charCodeAt(i)) | 0;
  return h;
}

// ─────────────────────────────────────────────
//  FILTER & SEARCH
// ─────────────────────────────────────────────
function applyFilters() {
  const q = searchQuery.toLowerCase().trim();
  filteredChannels = channels.filter(c => {
    const typeOk = activeFilter === 'all' || (c.type||'').toLowerCase() === activeFilter;
    const nameOk = !q || c.name.toLowerCase().includes(q);
    return typeOk && nameOk;
  });
}

// ─────────────────────────────────────────────
//  RENDER (full, first load / filter change)
// ─────────────────────────────────────────────
function render() {
  applyFilters();
  renderSidebar();
  renderGrid();
  updateCounts();
}

// ─────────────────────────────────────────────
//  RENDER SILENT (poll, preserve active)
// ─────────────────────────────────────────────
function renderSilent() {
  applyFilters();
  renderSidebar();
  renderGrid();
  updateCounts();
  // If current channel still exists, update its data
  if (currentChannel) {
    const updated = channels.find(c => c.url === currentChannel.url);
    if (updated) currentChannel = updated;
  }
}

// ─────────────────────────────────────────────
//  SIDEBAR
// ─────────────────────────────────────────────
function renderSidebar() {
  if (!filteredChannels.length) {
    $channelList.innerHTML = `
      <div class="empty-state">
        <svg width="32" height="32" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5" color="currentColor">
          <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
        </svg>
        <p>No channels found</p>
      </div>`;
    return;
  }
  $channelList.innerHTML = filteredChannels.map((ch, i) => `
    <div class="channel-item${currentChannel && currentChannel.url === ch.url ? ' active' : ''}"
         data-idx="${i}" style="animation-delay:${Math.min(i*18,300)}ms">
      ${logoOrFallback(ch, 42, 'ch-logo', 'ch-logo-fallback')}
      <div class="ch-info">
        <div class="ch-name" title="${esc(ch.name)}">${esc(ch.name)}</div>
        <div class="ch-type">${esc((ch.type||'stream').toUpperCase())}</div>
      </div>
      <svg class="ch-arrow" width="14" height="14" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5">
        <polyline points="9 18 15 12 9 6"/>
      </svg>
    </div>`).join('');

  $channelList.querySelectorAll('.channel-item').forEach(el =>
    el.addEventListener('click', () => {
      const idx = +el.dataset.idx;
      playChannel(filteredChannels[idx]);
      closeSidebar();
    })
  );
}

// ─────────────────────────────────────────────
//  GRID
// ─────────────────────────────────────────────
function renderGrid() {
  $channelGrid.innerHTML = filteredChannels.map((ch, i) => `
    <div class="grid-card${currentChannel && currentChannel.url === ch.url ? ' active' : ''}"
         data-idx="${i}" style="animation-delay:${Math.min(i*12,400)}ms">
      ${logoOrFallbackGrid(ch)}
      <div class="grid-name">${esc(ch.name)}</div>
      <div class="grid-type">${esc((ch.type||'STREAM').toUpperCase())}</div>
    </div>`).join('');

  $channelGrid.querySelectorAll('.grid-card').forEach(el =>
    el.addEventListener('click', () => playChannel(filteredChannels[+el.dataset.idx]))
  );
}

// ─────────────────────────────────────────────
//  LOGO HELPERS
// ─────────────────────────────────────────────
function logoOrFallback(ch, size, imgClass, fbClass) {
  if (ch.logo) {
    return `<img class="${imgClass}" src="${esc(ch.logo)}" alt="${esc(ch.name)}"
      style="width:${size}px;height:${size}px"
      onerror="this.style.display='none';this.nextElementSibling.style.display='grid'">
      <div class="${fbClass}" style="display:none">📺</div>`;
  }
  return `<div class="${fbClass}">📺</div>`;
}
function logoOrFallbackGrid(ch) {
  if (ch.logo) {
    return `<img class="grid-logo" src="${esc(ch.logo)}" alt="${esc(ch.name)}"
      onerror="this.style.display='none';this.nextElementSibling.style.display='grid'">
      <div class="grid-logo-fallback" style="display:none">📺</div>`;
  }
  return `<div class="grid-logo-fallback">📺</div>`;
}

function updateCounts() {
  const total = filteredChannels.length;
  $channelCount.textContent = total + ' channel' + (total !== 1 ? 's' : '');
  $gridCount.textContent    = '(' + total + ')';
  $footerCount.textContent  = channels.length;
}

// ─────────────────────────────────────────────
//  PLAY
// ─────────────────────────────────────────────
async function playChannel(ch) {
  if (!ch) return;
  currentChannel = ch;

  // Highlight active in both views
  document.querySelectorAll('.channel-item').forEach(el =>
    el.classList.toggle('active', filteredChannels[+el.dataset.idx]?.url === ch.url));
  document.querySelectorAll('.grid-card').forEach(el =>
    el.classList.toggle('active', filteredChannels[+el.dataset.idx]?.url === ch.url));

  // Reset all panels
  $playerPlaceholder.classList.add('hidden');
  $playerError.classList.remove('show');
  showLoader(true);

  // Tear down previous streams
  await teardown();

  const type = (ch.type || '').toLowerCase();

  if (type === 'iframe') {
    $videoEl.style.display    = 'none';
    $iframeEl.style.display   = 'block';
    $iframeEl.src             = ch.url;
    $iframeEl.onload          = () => { showLoader(false); showIframeHint(); };
    $iframeEl.onerror         = () => showError('iFrame could not be loaded.');
  } else if (type === 'hls') {
    $iframeEl.style.display   = 'none';
    $videoEl.style.display    = 'block';
    await playHLS(ch.url);
  } else if (type === 'dash') {
    $iframeEl.style.display   = 'none';
    $videoEl.style.display    = 'block';
    await playDASH(ch.url);
  } else {
    // Auto-detect
    $iframeEl.style.display   = 'none';
    $videoEl.style.display    = 'block';
    if (ch.url.includes('.mpd')) await playDASH(ch.url);
    else await playHLS(ch.url);
  }

  updateNowPlaying(ch);
}

// ─────────────────────────────────────────────
//  IFRAME HINT — show sandboxed badge briefly on load
// ─────────────────────────────────────────────
function showIframeHint() {
  $iframeHint.classList.add('visible');
  setTimeout(() => $iframeHint.classList.remove('visible'), 3500);
}

async function playHLS(url) {
  if (Hls.isSupported()) {
    hlsInstance = new Hls({
      enableWorker: true,
      lowLatencyMode: true,
      backBufferLength: 30,
    });
    hlsInstance.on(Hls.Events.ERROR, (e, data) => {
      if (data.fatal) showError('HLS stream error: ' + data.type);
    });
    hlsInstance.on(Hls.Events.MANIFEST_PARSED, () => {
      showLoader(false);
      $videoEl.play().catch(() => {});
    });
    hlsInstance.loadSource(url);
    hlsInstance.attachMedia($videoEl);
  } else if ($videoEl.canPlayType('application/vnd.apple.mpegurl')) {
    $videoEl.src = url;
    $videoEl.addEventListener('loadedmetadata', () => {
      showLoader(false);
      $videoEl.play().catch(() => {});
    }, { once: true });
    $videoEl.addEventListener('error', () => showError('Stream could not be loaded.'), { once: true });
  } else {
    showError('HLS not supported on this browser.');
  }
}

async function playDASH(url) {
  try {
    await shakaPlayer.attach($videoEl);
    await shakaPlayer.load(url);
    showLoader(false);
    $videoEl.play().catch(() => {});
  } catch (e) {
    showError('DASH error: ' + e.message);
  }
}

async function teardown() {
  // HLS
  if (hlsInstance) { hlsInstance.destroy(); hlsInstance = null; }
  // Shaka
  try { await shakaPlayer.detach(); } catch {}
  // Video
  $videoEl.pause();
  $videoEl.removeAttribute('src');
  $videoEl.load();
  // iFrame — set blank to stop old stream
  $iframeEl.src = 'about:blank';
}

// ─────────────────────────────────────────────
//  TOP-NAVIGATION BLOCKER
//  Belt-and-suspenders: intercept any attempt by
//  an iframe page to navigate the parent window.
// ─────────────────────────────────────────────
(function() {
  // Block window.open calls triggered from within iframes
  const _open = window.open.bind(window);
  window.open = function(url, target, features) {
    // Only allow opens we initiate ourselves (no target = _blank redirect tricks)
    if (target === '_blank' || target === '_top' || target === '_parent') return null;
    return _open(url, target, features);
  };

  // Intercept beforeunload / navigation attempts caused by iframe JS
  window.addEventListener('beforeunload', (e) => {
    // If an iframe channel is active, cancel the navigation
    if (currentChannel && (currentChannel.type || '').toLowerCase() === 'iframe') {
      e.preventDefault();
      e.returnValue = '';
      return '';
    }
  });

  // Catch message events in case iframe tries postMessage-based navigation
  window.addEventListener('message', (e) => {
    // Drop any messages asking to navigate top
    if (e.data && typeof e.data === 'object' &&
        (e.data.type === 'navigate' || e.data.href || e.data.redirect)) {
      e.stopImmediatePropagation();
    }
  }, true);
})();

// ─────────────────────────────────────────────
//  NOW PLAYING
// ─────────────────────────────────────────────
function updateNowPlaying(ch) {
  $nowPlayingBar.classList.add('visible');
  $npName.textContent = ch.name;
  $npType.textContent = (ch.type || 'STREAM').toUpperCase();
  $npLogoWrap.innerHTML = ch.logo
    ? `<img class="np-logo" src="${esc(ch.logo)}" alt="${esc(ch.name)}"
         onerror="this.style.display='none';this.nextElementSibling.style.display='grid'">
       <div class="np-logo-fallback" style="display:none">📺</div>`
    : `<div class="np-logo-fallback">📺</div>`;
}

// ─────────────────────────────────────────────
//  UI HELPERS
// ─────────────────────────────────────────────
function showLoader(show) {
  $playerLoader.classList.toggle('show', show);
}
function showError(msg) {
  showLoader(false);
  $playerErrorMsg.textContent = msg || 'Stream could not be loaded.';
  $playerError.classList.add('show');
}

function esc(str) {
  return String(str || '')
    .replace(/&/g,'&amp;').replace(/</g,'&lt;')
    .replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// ─────────────────────────────────────────────
//  EVENTS
// ─────────────────────────────────────────────
function bindEvents() {
  $searchInput.addEventListener('input', e => {
    searchQuery = e.target.value;
    render();
  });

  chips.forEach(chip => chip.addEventListener('click', () => {
    chips.forEach(c => c.classList.remove('active'));
    chip.classList.add('active');
    activeFilter = chip.dataset.filter;
    render();
  }));

  $menuToggle.addEventListener('click', () => {
    const open = $sidebar.classList.toggle('open');
    $sidebarOverlay.classList.toggle('show', open);
  });
  $sidebarOverlay.addEventListener('click', closeSidebar);
}

function closeSidebar() {
  $sidebar.classList.remove('open');
  $sidebarOverlay.classList.remove('show');
}

// ─────────────────────────────────────────────
//  GO
// ─────────────────────────────────────────────
init();
  function centerPlayer() {
  const player = document.getElementById('playerArea');
  if (player) {
    player.scrollIntoView({
      behavior: 'smooth',
      block: 'center'
    });
  }
}

// Auto-center when a channel is clicked
document.addEventListener('click', function(e) {
  if (e.target.closest('.channel-item') || e.target.closest('.grid-card')) {
    // Small delay to let the UI update first
    setTimeout(centerPlayer, 200);
  }
});

</script>
</body>
</html>
