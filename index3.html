<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MSTV Network | Free Live Indian, Pakistani & International TV</title>
<meta name="description" content="Watch MSTV Network for free 24/7 live streaming of Indian, Pakistani, and International TV channels.">
<meta name="robots" content="index, follow">
<link rel="canonical" href="https://mstvnet.netlify.app">

<!-- Performance: Preconnect to external assets -->
<link rel="preconnect" href="https://upload.wikimedia.org" crossorigin>
<link rel="dns-prefetch" href="https://gc.zgo.at">

<!-- Open Graph & Social -->
<meta property="og:type" content="website">
<meta property="og:url" content="https://mstvnet.netlify.app">
<meta property="og:title" content="MSTV Network | Free Live Indian & Pakistani TV">
<meta property="og:description" content="Stream your favorite International TV channels for free 24/7 on MSTV Network.">
<meta property="og:image" content="https://mstvnet.netlify.app">
<meta name="theme-color" content="#111419">

<style>
:root {
  --bg-dark: #0F1115;
  --accent: #90EE90;
  --header-h: 70px;
  --text-dim: #444; /* High contrast */
  --max-content-width: 500px; 
}

/* Performance: System font stack prevents layout shifts from custom font loading */
html { scroll-behavior: smooth; scroll-padding-top: calc(var(--header-h) + 220px); }
body { 
  margin: 0; 
  font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, 'Open Sans', 'Helvetica Neue', sans-serif; 
  min-height: 100dvh; 
  overflow-x: hidden; 
  background: #E8E4C9; 
}

.sr-only { position: absolute; width: 1px; height: 1px; padding: 0; margin: -1px; overflow: hidden; clip: rect(0, 0, 0, 0); border: 0; }

header {
  position: sticky; top: 0; z-index: 1000;
  background: #111419; height: var(--header-h);
  display: flex; align-items: center; justify-content: space-between;
  padding: 0 5%; border-bottom: 1px solid #222;
}

.brand-name {
  font-size: 1.4rem; font-weight: bold;
  background: linear-gradient(90deg, #90EE90, #00FFA3);
  -webkit-background-clip: text; color: transparent; line-height: 1;
  margin: 0;
}
.slogan { font-size: 0.7rem; color: yellow; margin-top: 4px; }

.search-container { flex-grow: 0.4; max-width: 350px; position: relative; }
.search-container input {
  width: 100%; padding: 10px 15px; border-radius: 25px; border: 1px solid #333;
  background: #1A1D20; color: white; outline: none;
}
.search-container input::placeholder { color: #aaa; }

.sticky-player-wrapper {
  position: sticky; top: var(--header-h); z-index: 900;
  background: #E8E4C9; width: 100%;
  display: flex; flex-direction: column; align-items: center;
  border-bottom: 1px solid #ccc; padding: 12px 0;
}

.player-container {
  position: relative; width: 92%; max-width: var(--max-content-width); 
  aspect-ratio: 16/9; background: black; border-radius: 12px;
  overflow: hidden; box-shadow: 0 10px 30px rgba(0,0,0,0.3); margin: 0 auto;
  /* Optimization: Isolates player rendering from the rest of the page */
  contain: layout paint;
}

video, iframe {
  position: absolute; top: 0; left: 0;
  width: 100%; height: 100%; object-fit: cover; border: none; display: none;
}

#placeholder { height: 100%; display: flex; align-items: center; justify-content: center; font-size: 4rem; color: var(--accent); }
#loading {
  position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); z-index: 100;
  background: rgba(0,0,0,0.8); padding: 10px; border-radius: 50%; border: 1px solid var(--accent); color: var(--accent); display: none;
}

.ticker {
  overflow: hidden; width: 92%; max-width: var(--max-content-width);
  background: red; color: white; height: 34px;
  display: flex; align-items: center; margin-top: 10px; border-radius: 4px;
}
.ticker-track { display: flex; width: max-content; animation: ticker-loop 20s linear infinite; }
.ticker-content { white-space: nowrap; padding-right: 60px; display: inline-flex; align-items: center; font-size: 0.85rem; }
@keyframes ticker-loop { 0% { transform: translateX(0); } 100% { transform: translateX(-50%); } }

.channel-grid {
  display: grid; grid-template-columns: repeat(auto-fill, minmax(120px, 1fr));
  gap: 15px; padding: 25px 4%; max-width: 900px; margin: 0 auto;
  /* Optimization: Browser skips rendering off-screen channels */
  content-visibility: auto; contain-intrinsic-size: 1fr 150px;
}

.channel-card {
  background: #F5F1DC; border-radius: 12px; padding: 0; cursor: pointer; border: 1px solid #d6d6d6;
  overflow: hidden; display: flex; flex-direction: column; transition: transform 0.2s;
  /* Optimization: Localizes repaints to the card itself */
  contain: content;
}
.channel-card:hover { transform: translateY(-2px); box-shadow: 0 4px 8px rgba(0,0,0,0.1); }
.channel-card img { width: 100%; aspect-ratio: 95/64; object-fit: content; display: block; }

.site-footer { padding: 30px 5%; text-align: center; font-size: 0.85rem; color: #444; border-top: 1px solid #ddd; }
</style>
</head>

<body>
<header>
  <div class="logo-section">
    <h1 class="brand-name">MSTV NETWORK</h1>
    <div class="slogan">LIVE INDIAN PAKISTANI & ENGLISH CHANNELS</div>
  </div>
  <div class="search-container">
    <label for="channel-search" class="sr-only">Search channels</label>
    <input type="text" id="channel-search" placeholder="Search channels...">
  </div>
</header>

<div class="sticky-player-wrapper">
  <div class="player-container">
    <div id="loading" role="status">🌀 Buffering...</div>
    <div id="placeholder" aria-label="Select a channel to play">📺</div>
    <video id="video-player" autoplay playsinline controls></video>
    <iframe id="iframe-player" sandbox="allow-scripts allow-same-origin allow-presentation" allow="autoplay; encrypted-media" title="Channel Player"></iframe>
  </div>
  <div class="ticker" aria-label="Scrolling ticker">
    <div class="ticker-track">
      <div class="ticker-content">No channel play? Use free VPN from Australia or Singapore</div>
      <div class="ticker-content">No channel play? Use free VPN from Australia or Singapore</div>
    </div>
  </div>
</div>

<main>
  <div class="channel-grid" id="channel-list-container" role="list"></div>
</main>

<footer class="site-footer">
    <p>© 2026 MSTV Network. All Rights Reserved.</p>
</footer>

<script>
const el = (id) => document.getElementById(id);
const v = el('video-player'), i = el('iframe-player'), p = el('placeholder'), l = el('loading');
const gridContainer = el('channel-list-container');
const searchInput = el('channel-search');
const JSON_URL = './channels.json';
let channels = [], hls = null, shakaPlayer = null;

// JIT Library Loading
function loadScript(url) {
  return new Promise((resolve, reject) => {
    const script = document.createElement('script');
    script.src = url;
    script.async = true;
    script.onload = resolve;
    script.onerror = reject;
    document.head.appendChild(script);
  });
}

async function stopAll() {
  if(l) l.style.display='none';
  if(hls){ hls.detachMedia(); hls.destroy(); hls = null; }
  if(shakaPlayer){ await shakaPlayer.detach(); await shakaPlayer.destroy(); shakaPlayer = null; }
  if(v){ v.pause(); v.removeAttribute('src'); v.load(); v.style.display='none'; }
  if(i){ i.src = 'about:blank'; i.style.display = 'none'; }
  if(p) p.style.display = 'flex';
}

async function playChannel(idx) {
  const ch = channels[idx];
  if (!ch) return;
  window.location.hash = encodeURIComponent(ch.name);
  await stopAll();
  v.scrollIntoView({ behavior: 'smooth', block: 'start' });
  if (l) l.style.display = 'block';
  if (p) p.style.display = 'none';

  const hideLoader = () => { if (l) l.style.display = 'none'; };

  if (ch.type === 'iframe') {
    i.style.display = 'block'; i.src = ch.url; i.onload = hideLoader; return;
  }

  v.style.display = 'block';
  const isHls = ch.type === 'hls' || (ch.url && ch.url.includes('.m3u8'));

  if (isHls) {
    if (!window.Hls) { try { await loadScript('./shaka/hls.min.js'); } catch(e) { return; } }
    if (window.Hls && Hls.isSupported()) {
      hls = new Hls({ enableWorker: true, lowLatencyMode: true });
      hls.attachMedia(v);
      hls.on(Hls.Events.MEDIA_ATTACHED, () => hls.loadSource(ch.url));
      hls.on(Hls.Events.MANIFEST_PARSED, () => v.play().catch(() => {}));
      v.addEventListener('playing', hideLoader, { once: true });
    }
    return;
  }

  if (!window.shaka) { try { await loadScript('./shaka.js'); } catch(e) { return; } }
  if (window.shaka && shaka.Player.isBrowserSupported()) {
    shaka.polyfilled.installAll();
    shakaPlayer = new shaka.Player(v);
    shakaPlayer.addEventListener('buffering', (e) => { if (!e.buffering) hideLoader(); });
    try { await shakaPlayer.load(ch.url); v.play().catch(() => {}); } catch (e) { hideLoader(); }
  }
}

function renderUI(data){
  channels = Array.isArray(data) ? data : data.channels || [];
  const fragment = document.createDocumentFragment();

  channels.forEach((ch, index) => {
    const btn = document.createElement('button');
    btn.className = 'channel-card';
    btn.dataset.index = index;

    const img = document.createElement('img');
    img.src = ch.logo || "";
    img.alt = ch.name;
    img.width = 95; img.height = 64;
    img.decoding = 'async'; // Optimization: Off-main-thread image decoding
    
    if (index < 4) {
        // Optimization: Boosts the download speed for first visible items
        img.setAttribute('fetchpriority', 'high'); 
    } else {
        img.loading = 'lazy';
    }
    
    
  });

  gridContainer.innerHTML = '';
  gridContainer.appendChild(fragment);

  const hash = decodeURIComponent(window.location.hash.substring(1)); 
  const startIdx = channels.findIndex(c => c.name === hash); 
  if(startIdx !== -1) playChannel(startIdx);
}

// Optimization: Passive listeners don't block scrolling
gridContainer.addEventListener('click', (e) => {
  const card = e.target.closest('.channel-card');
  if (card) playChannel(parseInt(card.dataset.index, 10));
}, { passive: true });

searchInput.addEventListener('input', e => {
  const term = e.target.value.toLowerCase();
  document.querySelectorAll('.channel-card').forEach(card => {
    const name = card.querySelector('.channel-name').innerText.toLowerCase();
    card.style.display = name.includes(term) ? 'flex' : 'none';
  });
}, { passive: true });

(async () => {
  try {
    const res = await fetch(JSON_URL); 
    if(res.ok) renderUI(await res.json());
  } catch(e) {}
})();
</script>
</body>
</html>
