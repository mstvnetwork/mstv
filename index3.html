<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>MSTV Network | Free Live Indian, Pakistani & International TV</title>
<meta name="description" content="Watch MSTV Network for free 24/7 live streaming of Indian, Pakistani, and International TV channels.">

<style>
:root {
  --bg-dark: #0F1115;
  --accent: #90EE90;
  --header-h: 70px;
  --player-h: 220px; /* adjust based on your sticky player wrapper height */
  --max-content-width: 500px;
}

/* Base */
html { scroll-behavior: smooth; scroll-padding-top: calc(var(--header-h) + var(--player-h)); }
body { margin:0; font-family:Arial,sans-serif; font-display:swap; background:#E8E4C9; min-height:100vh; overflow-x:hidden; }

/* Sticky Player wrapper */
.sticky-player-wrapper {
  position: sticky;
  top: var(--header-h);
  z-index: 900;
  background: #E8E4C9;
  width: 100%;
  display: flex; flex-direction: column;
  align-items: center;
  border-bottom: 1px solid #ccc;
  padding: 12px 0;
}

/* Fixed size player to mimic mobile on all devices */
.player-container {
  position: relative;
  width: 92%;
  max-width: var(--max-content-width); 
  aspect-ratio: 16/9;
  background: black;
  border-radius: 12px;
  overflow: hidden;
  box-shadow: 0 10px 30px rgba(0,0,0,0.3);
  margin: 0 auto;
}

video, iframe {
  position: absolute;
  top: 0; left: 0;
  width: 100%;
  height: 100%;
  object-fit: cover;
  border: none;
  display: none;
}
#placeholder { height:100%; display:flex; align-items:center; justify-content:center; font-size:4rem; color:var(--accent); }
#loading { position:absolute; inset:0; display:grid; place-items:center; z-index:100; background:rgba(0,0,0,0.7); color:var(--accent); font-size:0.9rem; display:none; }
#live-stamp { position:absolute; top:10px; left:10px; background:#E50914; color:white; padding:4px 10px; border-radius:4px; font-size:0.7rem; font-weight:bold; z-index:50; display:none; }

/* Ticker */
.ticker { overflow:hidden; width:92%; max-width:var(--max-content-width); background:red; color:white; height:34px; display:flex; align-items:center; margin-top:10px; border-radius:4px; }
.ticker-track { display:flex; width:max-content; animation:ticker-loop 20s linear infinite; }
.ticker-content { white-space:nowrap; padding-right:60px; display:inline-flex; align-items:center; font-size:0.85rem; }
@keyframes ticker-loop { 0%{transform:translateX(0);} 100%{transform:translateX(-50%);} }
.play-icon { height:16px; width:80px; object-fit:contain; margin:0 6px; background:#fff; }

/* Channel Grid */
main { padding-top: calc(var(--header-h) + var(--player-h)); }
.channel-grid { display:block; position:relative; width:92%; max-width:900px; margin:0 auto; height:80vh; overflow-y:auto; contain:layout paint size; }
.channel-virtual-wrapper { position:relative; width:100%; }
.channel-card { position:absolute; width:calc(33.333% - 10px); margin:5px; background:#F5F1DC; border-radius:12px; overflow:hidden; border:1px solid #d6d6d6; display:flex; flex-direction:column; cursor:pointer; transition:transform 0.2s, box-shadow 0.2s; justify-content:center; align-items:center; scroll-margin-top: calc(var(--header-h) + var(--player-h)); }
.channel-card img { width:100%; height:100%; aspect-ratio:95/64; object-fit:contain; background:#fff; display:block; content-visibility:auto; }
.channel-name { padding:8px 4px; font-size:0.85rem; font-weight:bold; background:#fff; width:100%; min-height:40px; }
</style>
</head>
<body>

<header>
  <div class="logo-section">
    <div class="brand-name">MSTV NETWORK</div>
    <div class="slogan">LIVE INDIAN PAKISTANI & ENGLISH CHANNELS</div>
  </div>
  <div class="search-container">
    <input type="text" id="channel-search" placeholder="Search channels..." aria-label="Search channels by name">
  </div>
</header>

<div class="sticky-player-wrapper">
  <div class="player-container">
    <div id="loading">🌀 Buffering...</div>
    <div id="live-stamp">MSTV Network</div>
    <div id="placeholder">📺</div>
    <video id="video-player" autoplay playsinline controls preload="metadata"></video>
    <iframe id="iframe-player" sandbox="allow-scripts allow-same-origin allow-presentation" allow="autoplay; encrypted-media"></iframe>
  </div>

  <div class="ticker" aria-label="Scrolling ticker" aria-live="polite">
    <div class="ticker-track">
      <div class="ticker-content">
        No channel play, use free VPN from 
        <img src="/playstore.webp" class="play-icon" width="80" height="16" loading="lazy" alt="Google Play Store">
        & choose Australia or Singapore
      </div>
      <div class="ticker-content">
        No channel play, use free VPN from 
        <img src="/playstore.webp" class="play-icon" width="80" height="16" loading="lazy" alt="Google Play Store">
        & choose Australia or Singapore
      </div>
    </div>
  </div>
</div>

<main>
  <div class="channel-grid" id="channel-grid">
    <div class="channel-virtual-wrapper" id="virtual-wrapper"></div>
  </div>
</main>

<script defer src="./shaka.js"></script>
<script defer src="./shaka/hls.min.js"></script>
<script>
const v=document.getElementById('video-player');
const i=document.getElementById('iframe-player');
const p=document.getElementById('placeholder');
const l=document.getElementById('loading');

let channels=[], hls=null, shakaPlayer=null;

const CARD_WIDTH=120, CARD_HEIGHT=160, GAP=10;
const grid=document.getElementById('channel-grid');
const wrapper=document.getElementById('virtual-wrapper');

async function stopAll(){
  if(l) l.style.display='none';
  if(hls){ hls.destroy(); hls=null; }
  if(shakaPlayer){ shakaPlayer.destroy(); shakaPlayer=null; }
  if(v){ v.pause(); v.src=''; v.style.display='none'; }
  if(i){ i.src='about:blank'; i.style.display='none'; }
  if(p) p.style.display='flex';
}

async function playChannel(idx){
  const ch=channels[idx];
  if(!ch) return;
  await stopAll();
  window.location.hash=encodeURIComponent(ch.name);
  if(l) l.style.display='block'; if(p) p.style.display='none';
  const hideLoader=()=>{if(l) l.style.display='none';};

  if(ch.type==='iframe'){ i.src=ch.url; i.style.display='block'; i.setAttribute('aria-label', `Play ${ch.name}`); i.onload=hideLoader; return; }

  v.style.display='block';
  const isHls=ch.type==='hls'||(ch.url&&ch.url.includes('.m3u8'));
  if(isHls && window.Hls && Hls.isSupported()){
    hls=new Hls({autoStartLoad:false, enableWorker:true, lowLatencyMode:true, capLevelToPlayerSize:true});
    hls.attachMedia(v);
    hls.on(Hls.Events.MEDIA_ATTACHED,()=>{hls.loadSource(ch.url); hls.startLoad();});
    v.addEventListener('playing', hideLoader, {once:true});
  } else if(isHls && v.canPlayType('application/vnd.apple.mpegurl')){
    v.src=ch.url; v.play().catch(()=>{}); v.addEventListener('playing', hideLoader,{once:true});
  } else if(window.shaka && shaka.Player.isBrowserSupported()){
    shaka.polyfilled.installAll(); shakaPlayer=new shaka.Player(v);
    shakaPlayer.configure({streaming:{bufferingGoal:10,rebufferingGoal:2,bufferBehind:0}});
    shakaPlayer.addEventListener('buffering',(e)=>{if(!e.buffering) hideLoader();});
    try{ await shakaPlayer.load(ch.url); v.play().catch(()=>{}); }catch(e){ console.error(e); hideLoader(); }
  }
}

// Virtualized grid
function renderVirtual(){
  const scrollTop=grid.scrollTop, viewHeight=grid.clientHeight;
  const cols=Math.floor(grid.clientWidth/(CARD_WIDTH+GAP));
  const startIdx=Math.floor(scrollTop/(CARD_HEIGHT+GAP))*cols;
  const visibleRows=Math.ceil(viewHeight/(CARD_HEIGHT+GAP));
  const endIdx=Math.min(channels.length,startIdx+visibleRows*cols+cols);
  wrapper.innerHTML='';
  for(let i=startIdx;i<endIdx;i++){
    const ch=channels[i]; const col=i%cols; const row=Math.floor(i/cols);
    const card=document.createElement('div'); card.className='channel-card';
    card.style.top=row*(CARD_HEIGHT+GAP)+'px'; card.style.left=col*(CARD_WIDTH+GAP)+'px';
    card.style.width=CARD_WIDTH+'px'; card.style.height=CARD_HEIGHT+'px';
    card.onclick=()=>playChannel(i);
    card.setAttribute('role','button'); card.setAttribute('aria-label', `Play ${ch.name} channel`);
    const img=document.createElement('img'); img.src=ch.logo||''; img.alt=ch.name; img.loading='lazy'; img.decoding='async';
    const name=document.createElement('div'); name.className='channel-name'; name.textContent=ch.name;
    card.appendChild(img); card.appendChild(name); wrapper.appendChild(card);
  }
  wrapper.style.height=Math.ceil(channels.length/cols)*(CARD_HEIGHT+GAP)+'px';
}

grid.addEventListener('scroll', renderVirtual);

document.getElementById('channel-search').addEventListener('input', e=>{
  const term=e.target.value.toLowerCase();
  channels.forEach((c,i)=>renderVirtual());
});

(async ()=>{
  try{
    const res=await fetch('./channels.json'); 
    if(res.ok){
      const data=await res.json();
      channels = Array.isArray(data)?data:data.channels||[];
      renderVirtual();
      const hash=decodeURIComponent(window.location.hash.substring(1));
      const startIdx=channels.findIndex(c=>c.name===hash);
      if(startIdx!==-1) playChannel(startIdx);
    }
  }catch(e){ console.error(e);}
})();
</script>

</body>
</html>
