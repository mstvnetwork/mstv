<html lang="en">
<head>
    <meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MSTV Network | Free Live Indian, Pakistani & International TV</title>

    <!-- Primary SEO Meta Tags (Optimised to 58 characters) -->

    <meta name="title" content="MSTV Network | Free Live Indian, Pakistani & International TV">
    <meta name="description" content="Watch MSTV Network for free 24/7 live streaming of Indian, Pakistani, and International TV channels. High-quality digital broadcast and news at your fingertips.">
    <meta name="keywords" content="MSTV, MSTV Network, Live TV, Free Indian TV, Pakistani Channels, International TV Streaming, Live News, Digital Broadcast">
    <meta name="robots" content="index, follow">
    <meta name="language" content="English">
    <link rel="canonical" href="https://mstvnet.netlify.app">

    <!-- Open Graph / Facebook (Using absolute URL: https://mstvnet.netlify.app/mstv-thumbnail.png) -->
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://mstvnet.netlify.app">

    <meta property="og:image:width" content="1200">
    <meta property="og:image:height" content="630">

    <!-- Twitter / X -->
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:url" content="https://mstvnet.netlify.app">
    <meta name="twitter:title" content="MSTV Network | Free Live Indian & Pakistani TV">
    <meta name="twitter:description" content="Watch your favorite International TV channels for free on MSTV Network. Live digital broadcasting anywhere.">
    <meta name="twitter:image" content="https://mstvnet.netlify.app/mstv-thumbnail.png">

    <!-- Verification (Using code 36a9620cce1db39f) -->
    <meta name="google-site-verification" content="36a9620cce1db39f">

</head>
       <style>
        :root {
            --bg-dark: #0F1115;
            --accent: #90EE90;
            --header-h: 55px;
            --player-y: 55px;
            --text-dim: #555;
        }

        html { 
            scroll-padding-top: 285px; 
            scroll-behavior: smooth;
        }

        body {
            background-color: #E8E4C9 !important;
            margin: 0; padding: 0;
            font-family: Arial, sans-serif;
        }

        /* 1. STICKY HEADER */
        header {
            position: sticky;
            top: 0;
            z-index: 1000;
            background: #111419;
            height: var(--header-h);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 4%;
            border-bottom: 1px solid #222;
            color: white;
        }

        .brand-name {
            font-size: 1.2rem;
            font-weight: bold;
            background: linear-gradient(90deg, #90EE90, #00FFA3);
            -webkit-background-clip: text;
            color: transparent;
        }

        .slogan { font-size: 0.65rem; color: yellow; margin-top: 2px; }

        .search-container { flex-grow: 0.4; max-width: 350px; }
        .search-container input {
            width: 100%;
            padding: 8px 15px;
            border-radius: 25px;
            border: 1px solid #333;
            background: #1A1D20;
            color: white;
            outline: none;
        }

        /* 2. STICKY PLAYER WITH AUTOMATIC RESIZING */
        .sticky-player-wrapper {
            position: sticky;
            top: var(--player-y);
            z-index: 900;
            background: #E8E4C9;
            padding: 10px 0;
            width: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            border-bottom: 1px solid #ccc;
        }

        .player-container {
            position: relative;
            width: 92%;
            max-width: 600px;
            /* AUTOMATIC RATIO DETECTION */
            aspect-ratio: 16 / 9; 
            background: black;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
        }

        /* ROBOTIC IFRAME & VIDEO FIT */
        video, iframe { 
            position: absolute; 
            top: 0; 
            left: 0; 
            width: 100% !important; 
            height: 100% !important; 
            border: none !important;
            display: block; /* Change to 'none' if your JS handles the toggle */
        }

        #placeholder { 
            height: 100%; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            font-size: 5rem; 
            color: var(--accent); 
        }
        
        #loading {
            position: absolute; top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            z-index: 100;
            background: rgba(0, 0, 0, 0.8);
            padding: 12px 24px;
            border-radius: 30px;
            border: 1px solid var(--accent);
            color: var(--accent);
            font-weight: bold;
            display: none;
        }

        #live-stamp { 
            position: absolute; 
            top: 10px; 
            left: 10px; 
            background: #E50914; 
            color: white; 
            padding: 5px 12px; 
            border-radius: 5px; 
            font-size: 0.75rem; 
            font-weight: bold; 
            z-index: 50; 
        }

        /* 3. CHANNEL GRID */
        .channel-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(90px, 1fr));
            gap: 8px;
            padding: 15px 4%;
        }

        .channel-card {
            background: #fff;
            border-radius: 8px;
            padding: 6px;
            text-align: center;
            border: 1px solid #d6d6d6;
        }
    </style>
</head>
<body>

<header>
    <div class="logo-section">
        <div class="brand-name">MSTV NETWORK</div>
        <div class="slogan">LIVE INDIAN PAKISTANI & ENGLISH CHANNELS</div>
    </div>
    <div class="search-container">
        <input type="text" id="channel-search" placeholder="Search channels...">
    </div>
</header>

<div class="sticky-player-wrapper">
    <div class="player-container">
        <div id="loading">🌀 Buffering...</div>
        <div id="live-stamp">Mstv Network</div>
        <!-- Iframe will now automatically fit the 16:9 box -->
        <iframe 
            id="iframe-player" 
            src="about:blank"
            sandbox="allow-scripts allow-same-origin allow-forms allow-presentation" 
            allow="autoplay; encrypted-media" 
            scrolling="no">
        </iframe>
    </div>
</div>    
    
        

    <script>
const select = document.getElementById('channel-select');
const video = document.getElementById('video-player');
const iframe = document.getElementById('iframe-player');
const placeholder = document.getElementById('placeholder');
const loader = document.getElementById('loading');
const liveStamp = document.getElementById('live-stamp');
const gridContainer = document.getElementById('channel-list-container');
const searchInput = document.getElementById('channel-search');
const JSON_URL = './channels.json';

let channels = [];
let hls = null;
let shakaPlayer = null;

/** Lazy-load Shaka only when needed */
async function loadShaka() {
  if (!window.shaka) {
    const script = document.createElement('script');
    script.src = './shaka.js';
    document.body.appendChild(script);
    await new Promise(res => script.onload = res);
  }
}

/** Update structured data schema for SEO */
function updateLiveSchema(data) {
  const oldSchema = document.getElementById('mstv-dynamic-schema');
  if (oldSchema) oldSchema.remove();

  try {
    const fullSchema = {
      "@context": "https://schema.org",
      "@type": "ItemList",
      "name": "MSTV Network Live Channels",
      "url": "https://mstvnet.netlify.app",
      "description": "Watch live Indian, Pakistani, and International TV channels on MSTV Network.",
      "itemListElement": data.map((ch, i) => ({
        "@type": "ListItem",
        "position": i + 1,
        "item": {
          "@type": "VideoObject",
          "name": ch.name,
          "description": `Watch ${ch.name} live stream on MSTV Network.`,
          "thumbnailUrl": [ch.logo || "https://mstvnet.netlify.app/mstv-thumbnail.png"],
          "uploadDate": "2024-01-01T08:00:00+00:00",
          "embedUrl": `https://mstvnet.netlify.app/${encodeURIComponent(ch.name)}`, 
          "publication": {
            "@type": "BroadcastEvent",
            "isLiveBroadcast": true,
            "startDate": new Date().toISOString()
          }
        }
      }))
    };

    const script = document.createElement('script');
    script.id = 'mstv-dynamic-schema';
    script.type = 'application/ld+json';
    script.text = JSON.stringify(fullSchema);
    document.head.appendChild(script);
  } catch (e) { console.error("Schema update failed", e); }
}

/** Update meta tags dynamically */
function updateMetaTags(channel) {
  const siteTitle = `${channel.name} Live | MSTV Network`;
  const description = `Watch ${channel.name} live stream on MSTV Network. Free 24/7 high-quality Indian and Pakistani TV broadcast.`;
  const image = channel.logo || "https://mstvnet.netlify.app/mstv-thumbnail.png";
  const url = `https://mstvnet.netlify.app/${encodeURIComponent(channel.name)}`;

  document.title = siteTitle;
  document.querySelector('meta[name="description"]')?.setAttribute("content", description);
  document.querySelector('meta[property="og:title"]')?.setAttribute("content", siteTitle);
  document.querySelector('meta[property="og:image"]')?.setAttribute("content", image);
  document.querySelector('link[rel="canonical"]')?.setAttribute("href", url);
}

/** Stop all current players */
async function stopAll() {
  if(loader) loader.style.display = 'none';
  if(liveStamp) liveStamp.style.display = 'none';
  if(hls){ hls.destroy(); hls = null; }
  if(shakaPlayer){ await shakaPlayer.destroy(); shakaPlayer = null; }
  video.pause(); video.removeAttribute('src'); video.load();
  iframe.removeAttribute('src'); iframe.src = 'about:blank';
  video.style.display = 'none'; iframe.style.display = 'none';
  placeholder.style.display = 'flex';
}

/** Render the channel grid and select dropdown */
function renderUI(data) {
  channels = data;
  if(select) select.innerHTML = '<option value="">📱 Select Channel</option>';
  if(gridContainer) gridContainer.innerHTML = ''; 

  updateLiveSchema(data);

  data.forEach((ch, i) => {
    if(select) {
      const opt = document.createElement("option");
      opt.value = i; 
      opt.textContent = ch.name; 
      select.appendChild(opt);
    }

    const card = document.createElement('div');
    card.className = 'channel-card';
    card.setAttribute('data-name', ch.name.toLowerCase());
    
    const logoSrc = ch.logo ? ch.logo.replace(/\.(png|jpg)$/, '.webp') : "https://mstvnet.netlify.app/mstv-thumbnail.png";
    
    card.innerHTML = `
      <div class="card-logo">
        <img 
          src="${logoSrc}" 
          alt="${ch.name}" 
          width="95" 
          height="64" 
          loading="lazy"
          onerror="this.src='https://mstvnet.netlify.app/mstv-thumbnail.png';">
      </div>
      <div class="channel-name">${ch.name}</div>
    `;
    
    card.onclick = () => { 
      playChannel(i); 
      window.scrollTo({top: 0, behavior: 'smooth'}); 
    };
    if(gridContainer) gridContainer.appendChild(card);
  });

  const hash = decodeURIComponent(window.location.hash.substring(1));
  if (hash) {
    const index = data.findIndex(ch => ch.name === hash);
    if (index !== -1) playChannel(index);
  }
}

/** Search filter */
searchInput.addEventListener('input', (e) => {
  const term = e.target.value.toLowerCase();
  const cards = document.querySelectorAll('.channel-card');
  cards.forEach(card => {
    const name = card.getAttribute('data-name');
    card.style.display = name.includes(term) ? 'flex' : 'none';
  });
});

/** Play a channel */
async function playChannel(index){
  const channel = channels[index];
  if(!channel) return;
  updateMetaTags(channel);
  window.location.hash = encodeURIComponent(channel.name);
  await stopAll();
  if(loader) loader.style.display = 'block';
  placeholder.style.display = 'none';
  if(liveStamp) liveStamp.style.display = channel.isLive ? 'block' : 'none';

  if(channel.type === 'iframe'){
    iframe.style.display = 'block'; iframe.src = channel.url;
    return;
  }

  video.style.display = 'block';
  const isHls = channel.type === 'hls' || (channel.url && channel.url.includes('.m3u8'));
  if(isHls){
    if(window.Hls && Hls.isSupported()){
      hls = new Hls({ enableWorker:true, lowLatencyMode:true });
      hls.loadSource(channel.url); hls.attachMedia(video);
      hls.on(Hls.Events.MANIFEST_PARSED, ()=> video.play());
    } else if(video.canPlayType('application/vnd.apple.mpegurl')){
      video.src = channel.url; video.play();
    }
  } else if(channel.type === 'shaka'){
    await loadShaka();
    shakaPlayer = new shaka.Player(video);
    try{ await shakaPlayer.load(channel.url); video.play(); } catch(e){ console.error(e); }
  }
}

/** Hide loader when playback starts */
video.onplaying = () => { if(loader) loader.style.display = 'none'; };
iframe.onload = () => { if(loader) loader.style.display = 'none'; };

/** Load channels from JSON (cached for repeat visits) */
async function loadChannels(){
  try {
    const res = await fetch(JSON_URL); // caching allowed
    const data = await res.json();
    renderUI(data);
  } catch(e){ console.error('Load fail', e); }
}
loadChannels();

/** Deferred GoatCounter analytics */
window.addEventListener('load', () => {
  const s = document.createElement('script');
  s.src = '//gc.zgo.at/count.js';
  s.async = true;
  s.setAttribute('data-goatcounter', 'https://mstv.goatcounter.com/count');
  document.body.appendChild(s);
});
        const iframe = document.getElementById('iframe-player');
    </script>
    <script>
    const jsonUrl = 'channels.json'; // Path to your JSON file
    const channelGrid = document.querySelector('.channel-grid');
    const iframePlayer = document.getElementById('iframe-player');
    const placeholder = document.getElementById('placeholder');
    const loading = document.getElementById('loading');

    // 1. Fetch JSON and Build Grid
    async function loadChannels() {
        try {
            const response = await fetch(jsonUrl);
            const channels = await response.json();
            
            channels.forEach(channel => {
                const card = document.createElement('div');
                card.className = 'channel-card';
                card.innerHTML = `
                    <div class="card-logo"><img src="${channel.logo}" alt="${channel.name}"></div>
                    <div class="channel-name">${channel.name}</div>
                `;
                
                // 2. Click Logic: Auto-update player
                card.onclick = () => {
                    playChannel(channel.url);
                };
                
                channelGrid.appendChild(card);
            });
        } catch (error) {
            console.error('Error loading channels:', error);
        }
    }

    // 3. Player Update Logic
    function playChannel(url) {
        // Show loading, hide placeholder
        loading.style.display = 'block';
        placeholder.style.display = 'none';
        iframePlayer.style.display = 'block';

        // Set the new source - iframe-player automatically 
        // resizes due to the CSS 'aspect-ratio: 16/9' we added.
        iframePlayer.src = url;

        iframePlayer.onload = () => {
            loading.style.display = 'none';
        };
    }

    // Initialize the "robot"
    loadChannels();
</script>
</body>
</html>
