<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MSTV Network | Live Stream</title>
    <meta name="description" content="Watch MSTV Network live streaming channels.">
    

    <style>
        :root { --bg: #0b0d0e; --accent: #00ffa3; --card: #161a1d; --white: #ffffff; }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { background: var(--bg); color: var(--white); font-family: system-ui, sans-serif; }

        /* Player Section */
        .player-container { 
            max-width: 900px; margin: 20px auto; padding: 0 15px; 
        }
        .video-box { 
            width: 100%; aspect-ratio: 16/9; background: #000; 
            border-radius: 12px; overflow: hidden; position: relative;
        }
        video { width: 100%; height: 100%; outline: none; }
        #channel-title { margin-top: 15px; font-size: 1.2rem; font-weight: 700; }

        /* Grid Section - Horizontal Stacking */
        .grid-container { max-width: 900px; margin: 30px auto; padding: 0 15px; }
        .channel-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(90px, 1fr));
            gap: 12px;
        }
        .card {
            background: var(--card); border-radius: 10px; padding: 8px;
            text-align: center; cursor: pointer; border: 1px solid transparent;
            transition: 0.2s; text-decoration: none; color: inherit;
        }
        .card:hover { border-color: var(--accent); transform: translateY(-3px); }
        .card img { 
            width: 100%; aspect-ratio: 1/1; object-fit: contain; 
            background: #fff; border-radius: 6px; margin-bottom: 6px;
        }
        .card span { font-size: 0.7rem; font-weight: 600; display: block; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

        footer { text-align: center; padding: 40px 0; font-size: 0.8rem; opacity: 0.6; }
    </style>
</head>
<body>

    <main>
        <section class="player-container">
            <div class="video-box">
                <video id="main-video" controls autoplay playsinline></video>
            </div>
            <h1 id="channel-title">Select a Channel</h1>
        </section>

        <section class="grid-container">
            <div class="channel-grid" id="grid">
                <!-- Loaded from JSON -->
            </div>
        </section>
    </main>

    <footer>&copy; 2025 MSTV Network</footer>

        <!-- Player Libraries -->
<script defer src="./shaka.js"></script>
<script defer src="./shaka/hls.min.js"></script>

  <script>
// 1. Core Utilities & Element Selectors
const el = (id) => document.getElementById(id);
const v = el('video-player'), i = el('iframe-player'), p = el('placeholder'), l = el('loading');
const gridContainer = el('channel-list-container');
const JSON_URL = './channels.json';

let channels = [], hls = null, shakaPlayer = null;

/**
 * 2. Player Cleanup Logic
 * Essential for switching between HLS and DASH without conflicts.
 */
async function stopAll() {
  if (l) l.style.display = 'none';
  
  if (hls) { 
    hls.detachMedia();
    hls.destroy(); 
    hls = null; 
  }
  
  if (shakaPlayer) { 
    await shakaPlayer.detach();
    await shakaPlayer.destroy(); 
    shakaPlayer = null; 
  }
  
  if (v) { 
    v.pause(); 
    v.removeAttribute('src'); 
    v.load(); 
    v.style.display = 'none'; 
  }
  
  if (i) { 
    i.src = 'about:blank'; 
    i.style.display = 'none'; 
  }
  
  if (p) p.style.display = 'flex';
}

/**
 * 3. Main Playback Logic
 * Detects stream type and initializes the correct local library.
 */
async function playChannel(idx) {
  const ch = channels[idx];
  if (!ch) return;

  window.location.hash = encodeURIComponent(ch.name);
  await stopAll();

  v.scrollIntoView({ behavior: 'smooth', block: 'start' });
  if (l) l.style.display = 'block';
  if (p) p.style.display = 'none';

  const hideLoader = () => { if (l) l.style.display = 'none'; };

  // IFRAME Engine
  if (ch.type === 'iframe') {
    i.style.display = 'block';
    i.src = ch.url;
    i.onload = hideLoader;
    return;
  }

  // VIDEO Element Engines
  v.style.display = 'block';
  const isHls = ch.type === 'hls' || (ch.url && ch.url.includes('.m3u8'));

  // A. HLS.js Engine
  if (isHls) {
    if (window.Hls && Hls.isSupported()) {
      hls = new Hls({ autoStartLoad: true, enableWorker: true });
      hls.attachMedia(v);
      hls.on(Hls.Events.MEDIA_ATTACHED, () => hls.loadSource(ch.url));
      hls.on(Hls.Events.MANIFEST_PARSED, () => v.play().catch(() => {}));
      v.addEventListener('playing', hideLoader, { once: true });
    } else if (v.canPlayType('application/vnd.apple.mpegurl')) {
      v.src = ch.url;
      v.play().catch(() => {});
      v.addEventListener('playing', hideLoader, { once: true });
    }
    return;
  }

  // B. Shaka Player Engine (DASH)
  if (window.shaka && shaka.Player.isBrowserSupported()) {
    shaka.polyfill.installAll(); // Required for DASH stability
    shakaPlayer = new shaka.Player(v);
    
    shakaPlayer.addEventListener('buffering', (e) => { if (!e.buffering) hideLoader(); });

    try {
      await shakaPlayer.load(ch.url);
      v.play().catch(() => {});
    } catch (e) {
      console.error('Shaka Playback Failed', e);
      hideLoader();
    }
  }
}

/**
 * 4. UI Rendering
 */
function renderUI(data) {
  channels = Array.isArray(data) ? data : data.channels || [];
  if (!gridContainer) return;

  gridContainer.innerHTML = channels.map((ch, index) => {
    const priority = index < 8 ? 'fetchpriority="high"' : 'loading="lazy"';
    const logo = ch.logo || "https://mstvnet.netlify.app/channels.json";
    return `
      <div class="channel-card" onclick="playChannel(${index})" role="button">
        <img src="${logo}" alt="${ch.name}" width="95" height="64" ${priority} 
             onerror="this.src='https://mstvnet.netlify.app';">
        <div class="channel-name">${ch.name}</div>
      </div>`;
  }).join('');

  // Handle URL Deep Linking
  const hash = decodeURIComponent(window.location.hash.substring(1)); 
  const startIdx = channels.findIndex(c => c.name === hash); 
  if (startIdx !== -1) playChannel(startIdx);
}

/**
 * 5. Event Listeners & Initialization
 * Wrapped in DOMContentLoaded to fix the 'null' element errors.
 */
document.addEventListener('DOMContentLoaded', () => {
  const searchInput = el('channel-search');

  if (searchInput) {
    searchInput.addEventListener('input', (e) => {
      const term = e.target.value.toLowerCase();
      document.querySelectorAll('.channel-card').forEach(card => {
        const name = card.querySelector('.channel-name').innerText.toLowerCase();
        card.style.display = name.includes(term) ? 'flex' : 'none';
      });
    });
  }

  // Initial Data Fetch
  (async () => {
    try {
      const res = await fetch(JSON_URL, { cache: 'no-store' }); 
      if (res.ok) {
        const data = await res.json();
        renderUI(data);
      }
    } catch(e) { console.log('Init error:', e); }
  })();
});
</script>
</body>
</html>
