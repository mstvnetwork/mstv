<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>High Performance Stream List</title>
    <style>
        body { font-family: sans-serif; background: #121212; color: #eee; padding: 20px; }
        .channel-list { display: grid; gap: 10px; max-width: 500px; }
        .item { 
            padding: 15px; 
            background: #1e1e1e; 
            border-radius: 5px; 
            border: 1px solid #333;
            display: flex;
            justify-content: space-between;
        }
        .type-badge { 
            font-size: 0.7rem; 
            background: #2563eb; 
            padding: 2px 6px; 
            border-radius: 3px; 
            text-transform: uppercase;
        }
    </style>
</head>
<body>

    <h2>Channels</h2>
    <div id="list" class="channel-list"></div>

<script>
    // 1. YOUR HARDCODED JSON (Keep as is)
    const rawJsonData = [
        
    ];

    /**
     * 2. THE "STRIPPER" LOGIC
     * This tells the script: "Take name, url, and type. Throw away everything else (logo)."
     */
    const cleanData = rawJsonData.map(({ name, url, type }) => ({ name, url, type }));

    // 3. RENDER FUNCTION
    function render() {
        const container = document.getElementById('list');
        
        // Use the 'cleanData' which no longer has logo keys
        container.innerHTML = cleanData.map(channel => `
            <div class="item">
                <div>
                    <strong>${channel.name}</strong>
                    <br>
                    <small style="color: #888">${channel.url}</small>
                </div>
                <span class="type-badge">${channel.type}</span>
            </div>
        `).join('');
    }

    render();

    // Check your console (F12) to see that 'logo' is gone!
    console.log("Cleaned Data Sample:", cleanData);
</script>
</body>
</html>
