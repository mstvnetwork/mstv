<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MSTV Network | Live Indian TV & Punjabi Channels</title>

<meta name="description" content="Watch MSTV Network for free live Indian, Punjabi, and religious TV channels.">
<link rel="icon" href="/favicon.ico">
<meta name="theme-color" content="#111419">

<link rel="preload" href="channels2.json" as="fetch" crossorigin="anonymous">
<link rel="dns-prefetch" href="https://cdnjs.cloudflare.com">
<link rel="dns-prefetch" href="https://cdn.jsdelivr.net">

<style>
*{margin:0;padding:0;box-sizing:border-box}

:root{
--bg-dark:#111419;
--accent:#2ECC71;
--header-h:70px;
--ticker-h:30px;
}

body{
font-family:system-ui,-apple-system,sans-serif;
background:#F8F9FA;
color:#212529;
}

header{
height:var(--header-h);
background:var(--bg-dark);
display:flex;
align-items:center;
justify-content:space-between;
padding:0 15px;
position:sticky;
top:0;
z-index:1000;
}

.brand-name{font-weight:800;color:var(--accent)}
#searchInput{
padding:10px;
border-radius:20px;
border:1px solid #444;
background:#1A1D20;
color:#fff;
}

.sticky-player-wrapper{
position:sticky;
top:var(--header-h);
background:#000;
}

.player-container{
width:100%;
aspect-ratio:16/9;
position:relative;
background:#000;
}

#video,#iframePlayer,#placeholder{
position:absolute;
width:100%;
height:100%;
top:0;left:0;
}

#loader{
position:absolute;
width:100%;
height:100%;
display:none;
align-items:center;
justify-content:center;
background:rgba(0,0,0,.6);
z-index:20;
}

.spinner{
width:40px;height:40px;
border:4px solid rgba(255,255,255,.1);
border-top:4px solid #2ECC71;
border-radius:50%;
animation:spin .8s linear infinite;
}
@keyframes spin{to{transform:rotate(360deg)}}

.ticker{
height:var(--ticker-h);
background:#D00000;
color:#fff;
display:flex;
align-items:center;
overflow:hidden;
}

.ticker-track{
display:flex;
white-space:nowrap;
animation:ticker 15s linear infinite;
}
@keyframes ticker{
to{transform:translateX(-50%)}
}

.main-content{max-width:1200px;margin:auto}

.channel-grid{
display:grid;
grid-template-columns:repeat(auto-fill,minmax(130px,1fr));
gap:20px;
padding:20px;
contain:layout paint size;
}

/* CARD */
.channel-card{
background:#fff;
border:1px solid #ccc;
border-radius:12px;
height:90px;
display:flex;
align-items:center;
justify-content:center;
}

/* BUTTON */
.channel-card button{
all:unset;
width:100%;
height:100%;
display:flex;
align-items:center;
justify-content:center;
cursor:pointer;
}

.channel-card button:focus{
outline:3px solid var(--accent);
}

/* TEXT */
.channel-name{
font-weight:700;
color:#1a1a1a;
text-align:center;
}

/* SKELETON */
.skeleton{
background:linear-gradient(90deg,#e5e7eb 25%,#f3f4f6 50%,#e5e7eb 75%);
background-size:200% 100%;
animation:shimmer 1.2s infinite;
}
@keyframes shimmer{
0%{background-position:200% 0}
100%{background-position:-200% 0}
}
</style>
</head>

<body>

<header>
<h1 class="brand-name">MSTV</h1>
<input id="searchInput" placeholder="Search..." aria-label="Search channels">
</header>

<div class="sticky-player-wrapper">
<div class="player-container">

<div id="loader"><div class="spinner"></div></div>

<div id="placeholder">📺</div>

<video id="video" controls playsinline aria-label="Live TV">
<track kind="captions" src="captions.vtt" srclang="en" label="English" default>
</video>

<iframe id="iframePlayer"></iframe>

</div>

<div class="ticker" aria-live="polite">
<div class="ticker-track">
<div>Use VPN if channel blocked • Fast HD Streaming</div>
<div>Use VPN if channel blocked • Fast HD Streaming</div>
</div>
</div>
</div>

<main class="main-content">

<ul class="channel-grid" id="channelList">
<li class="channel-card skeleton"></li>
<li class="channel-card skeleton"></li>
<li class="channel-card skeleton"></li>
<li class="channel-card skeleton"></li>
<li class="channel-card skeleton"></li>
<li class="channel-card skeleton"></li>
</ul>

</main>

<script>
let allCh=[],hlsE=null,scP=null;

const v=document.getElementById('video'),
f=document.getElementById('iframePlayer'),
l=document.getElementById('channelList'),
ld=document.getElementById('loader'),
ph=document.getElementById('placeholder');

function loadS(){
if(scP)return scP;
scP=new Promise(res=>{
let c=0;const d=()=>{if(++c===2)res()};
const s1=document.createElement('script');
s1.src="https://cdn.jsdelivr.net/npm/hls.js@1.4.12/dist/hls.min.js";
s1.onload=d;

const s2=document.createElement('script');
s2.src="https://cdnjs.cloudflare.com/ajax/libs/shaka-player/4.3.5/shaka-player.compiled.js";
s2.onload=d;

document.head.append(s1,s2);
});
return scP;
}

/* preload engines in idle */
if('requestIdleCallback'in window){
requestIdleCallback(loadS);
}else{
setTimeout(loadS,2000);
}

async function play(ch){
ld.style.display='flex';
ph.style.display='none';

if(hlsE){hlsE.destroy();hlsE=null}
v.pause();v.src="";f.src="";

if(ch.url.includes('.m3u8')){
await loadS();
hlsE=new Hls();
hlsE.loadSource(ch.url);
hlsE.attachMedia(v);
v.style.display='block';
}else{
f.style.display='block';
f.src=ch.url;
}

}

function render(data){
const fr=document.createDocumentFragment();

data.forEach(ch=>{
const li=document.createElement('li');
li.className='channel-card';

const btn=document.createElement('button');
btn.setAttribute('aria-label','Play '+ch.name);

const span=document.createElement('span');
span.className='channel-name';
span.textContent=ch.name;

btn.appendChild(span);
btn.onclick=()=>play(ch);

li.appendChild(btn);
fr.appendChild(li);
});

l.innerHTML='';
l.appendChild(fr);
}

fetch('channels2.json')
.then(r=>r.json())
.then(d=>{allCh=d;render(d)});

document.getElementById('searchInput').oninput=e=>{
render(allCh.filter(c=>c.name.toLowerCase().includes(e.target.value.toLowerCase())));
};
</script>

</body>
</html>
