<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MSTV Premium Interface</title>
    <style>
        :root {
            --bg: #0f0f0f;
            --card: #1e1e1e;
            --accent: #ff0055;
            --text: #ffffff;
            --subtext: #aaaaaa;
        }

        body {
            background-color: var(--bg);
            color: var(--text);
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            margin: 0;
            padding: 20px;
        }

        .header {
            text-align: center;
            padding-bottom: 30px;
            border-bottom: 1px solid #333;
            margin-bottom: 30px;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 20px;
            max-width: 1200px;
            margin: 0 auto;
        }

        .channel-card {
            background: var(--card);
            border-radius: 12px;
            padding: 20px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            border: 1px solid #2a2a2a;
            transition: transform 0.2s, border-color 0.2s;
        }

        .channel-card:hover {
            transform: translateY(-5px);
            border-color: var(--accent);
        }

        .channel-name {
            font-size: 1.2rem;
            font-weight: bold;
            margin-bottom: 8px;
            color: var(--text);
        }

        .channel-meta {
            font-size: 0.8rem;
            color: var(--subtext);
            margin-bottom: 15px;
            word-break: break-all;
        }

        .badge {
            display: inline-block;
            padding: 3px 8px;
            border-radius: 4px;
            font-size: 0.7rem;
            text-transform: uppercase;
            font-weight: bold;
            margin-bottom: 10px;
            background: #333;
        }

        .badge.hls { color: #00ffcc; border: 1px solid #00ffcc; }
        .badge.iframe { color: #ffcc00; border: 1px solid #ffcc00; }

        .play-button {
            background: var(--accent);
            color: white;
            border: none;
            padding: 10px;
            border-radius: 6px;
            cursor: pointer;
            font-weight: bold;
            text-align: center;
            text-decoration: none;
            transition: opacity 0.2s;
        }

        .play-button:hover {
            opacity: 0.9;
        }

        #stats {
            text-align: center;
            font-size: 0.8rem;
            color: #555;
            margin-top: 40px;
        }
    </style>
</head>
<body>

    <div class="header">
        <h1>MSTV Network</h1>
        <p style="color: var(--subtext)">Premium Live Streaming</p>
    </div>

    <div id="channel-grid" class="grid">
        </div>

    <div id="stats"></div>

<script>
    // PASTE YOUR FULL JSON ARRAY HERE
    const rawData = [
        {
            "name": "9x Jalwa",
            "url": "https://d14c63magvk61v.cloudfront.net/strm/channels/9xjalwa/master.m3u8",
            "type": "hls",
            "logo": "https://cdn.jsdelivr.net/gh/mstvnetwork/mstv4/assets/9xjalwa.webp"
        },
        {
            "name": "YRF Music",
            "url": "https://cdn-uw2-prod.tsv2.amagi.tv/linear/amg01412-xiaomiasia-yrfmusic-xiaomi/playlist.m3u8",
            "type": "hls",
            "logo": "..."
        },
        {
            "name": "Zoom Hd",
            "url": "https://mstvnet.netlify.app/shaka/index.html/#15",
            "type": "iframe",
            "logo": "..."
        },
        {
            "name": "Sony Pix Hd",
            "url": "https://autumn-shape-b04a.soft-disk-1347.workers.dev/?url=http://maxotts.maxdigitaltv.com/x-media/C42/master.m3u8",
            "type": "hls",
            "logo": "..."
        },
        {
            "name": "Tata IPL 2026",
            "url": "https://streamcrichd.com/update/skys2.php",
            "type": "iframe",
            "logo": "..."
        }
    ];

    /**
     * PERFORMANCE OPTIMIZATION:
     * This line extracts only what we need. 
     * The "logo" field is effectively deleted from the app's working memory here.
     */
    const cleanData = rawData.map(({ name, url, type }) => ({ name, url, type }));

    function initApp() {
        const grid = document.getElementById('channel-grid');
        const stats = document.getElementById('stats');
        
        // Use a DocumentFragment for better Lighthouse "Total Blocking Time" scores
        const fragment = document.createDocumentFragment();

        cleanData.forEach(item => {
            const card = document.createElement('div');
            card.className = 'channel-card';
            
            card.innerHTML = `
                <div>
                    <span class="badge ${item.type}">${item.type}</span>
                    <div class="channel-name">${item.name}</div>
                    <div class="channel-meta">${item.url.substring(0, 50)}...</div>
                </div>
                <button class="play-button" onclick="handlePlay('${item.url}', '${item.type}')">WATCH NOW</button>
            `;
            fragment.appendChild(card);
        });

        grid.appendChild(fragment);
        stats.innerText = `Optimization Active: ${cleanData.length} items parsed. Logos ignored for performance.`;
    }

    function handlePlay(url, type) {
        if (type === 'iframe') {
            window.open(url, '_blank');
        } else {
            // For HLS, you could redirect to your player page
            alert("Opening HLS Stream: " + url);
            // window.location.href = `your-player.html?src=${encodeURIComponent(url)}`;
        }
    }

    // Run on load
    document.addEventListener('DOMContentLoaded', initApp);
</script>
</body>
</html>
