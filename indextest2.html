<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MSTV Network | Live Indian TV & Punjabi Channels</title>
    <meta name="description" content="Watch MSTV Network for free live Indian, Punjabi, and religious TV channels.">
    <link rel="preconnect" href="https://cloudflare.com" crossorigin>
    <link rel="preconnect" href="https://jsdelivr.net" crossorigin>
    <link id="canonical-link" rel="canonical" href="">

    <style>
        /* CRITICAL CSS ONLY - Needed for the first paint of H1 and Player */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root { --bg-dark: #111419; --accent: #2ECC71; --header-h: 70px; }
        body { font-family: system-ui, -apple-system, sans-serif; background: #F8F9FA; color: #212529; overflow-x: hidden; }
        
        header {
            height: var(--header-h); background: var(--bg-dark);
            display: flex; align-items: center; justify-content: space-between;
            padding: 0 15px; position: relative; z-index: 1000;
            contain: layout; /* Eliminates render delay for H1 */
        }
        .brand-name { font-size: 1.25rem; font-weight: 800; color: var(--accent); }
        .search-container { flex: 0.6; max-width: 200px; }
        #searchInput { width: 100%; padding: 10px 15px; border-radius: 20px; border: 1px solid #444; background: #1A1D20; color: #fff; font-size: 16px; }

        .sticky-player-wrapper { background: #000; width: 100%; position: sticky; top: 0; z-index: 900; }
        .player-container { width: 100%; aspect-ratio: 16 / 9; background: #000; position: relative; contain: size layout; }
        #video, #iframePlayer, #placeholder { position: absolute; top: 0; left: 0; width: 100%; height: 100%; object-fit: cover; }
        #placeholder { display: flex; align-items: center; justify-content: center; font-size: 3rem; z-index: 10; background: #000; }
        
        /* Loader Styles */
        #loader { position: absolute; top: 0; left: 0; width: 100%; height: 100%; display: none; flex-direction: column; align-items: center; justify-content: center; z-index: 20; background: rgba(0,0,0,0.6); }
        .spinner { width: 45px; height: 45px; border: 4px solid rgba(255, 255, 255, 0.1); border-top: 4px solid #2ECC71; border-radius: 50%; animation: spin 0.8s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        
        /* Hide ticker initially to prioritize H1 render */
        .ticker { display: none; }
    </style>
</head>

<body>
    <header role="banner">
        <h1 class="brand-name">MSTV NETWORK</h1>
        <div class="search-container">
            <input type="text" id="searchInput" placeholder="Search..." aria-label="Search TV channels">
        </div>
    </header>

    <div class="sticky-player-wrapper">
        <section class="player-container" aria-label="TV Streaming Player">
            <div id="loader"><div class="spinner"></div></div>
            <div id="placeholder" aria-hidden="true">📺</div>
            <video id="video" playsinline controls aria-label="MSTV Live Video">
                <!-- Fix for PageSpeed Track Diagnosis -->
                <track kind="captions" src="data:text/vtt,WEBVTT" srclang="en" label="English" default>
            </video>
            <iframe id="iframePlayer" title="Stream Content" sandbox="allow-scripts allow-same-origin" allow="autoplay; fullscreen;"></iframe>
        </section>
        
        <div class="ticker" id="mainTicker" role="status">
            <div class="ticker-track">
                <div class="ticker-content">Use VPN with Australia server for blocked channels. Optimized for Android/Windows. &nbsp;</div>
                <div class="ticker-content">Use VPN with Australia server for blocked channels. Optimized for Android/Windows. &nbsp;</div>
            </div>
        </div>
    </div>

    <main class="main-content">
        <section class="title-area"><h2 id="current-title" style="padding: 20px; text-align: center;">Select & Play</h2></section>
        <div class="channel-grid" id="channelList" role="list"></div>
        
        <footer class="site-footer">
            <div class="footer-bottom"><p>© 2026 MSTV Network. All Rights Reserved.</p></div>
        </footer>
    </main>

    <!-- NON-CRITICAL STYLES - Moved to bottom to prevent blocking -->
    <style>
        .ticker { height: 30px; background: #D00000; color: #fff; overflow: hidden; font-size: 0.8rem; align-items: center; }
        .ticker-track { display: flex; white-space: nowrap; animation: ticker-loop 15s linear infinite; will-change: transform; }
        @keyframes ticker-loop { 0% { transform: translate3d(0,0,0); } 100% { transform: translate3d(-50%,0,0); } }
        .channel-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(130px, 1fr)); gap: 15px; padding: 20px; }
        .channel-card { background: #fff; border: 1px solid #ddd; border-radius: 12px; height: 90px; display: flex; align-items: center; justify-content: center; padding: 10px; cursor: pointer; }
        .channel-name { font-size: 0.9rem; font-weight: 700; text-align: center; }
        .site-footer { background: #111419; color: #888; padding: 40px 20px; text-align: center; margin-top: 50px; }
    </style>

    <!-- INTEGRATED SCRIPTS -->
    <script>
        let allCh = []; // Your channel data should populate this
        const l = document.getElementById('channelList');

        window.addEventListener('DOMContentLoaded', () => {
            // 1. Set Canonical
            const canonical = document.getElementById('canonical-link');
            if (canonical) {
                canonical.setAttribute('href', window.location.protocol + '//' + window.location.host + window.location.pathname);
            }

            // 2. Yield to Main Thread: Delay heavy elements to let H1 paint
            setTimeout(() => {
                document.getElementById('mainTicker').style.display = 'flex';
                
                // 3. Analytics Script (Delayed 5s as per your original)
                const s = document.createElement('script'); 
                s.async = true; 
                s.src = "https://gc.zgo.at/count.js"; 
                document.head.appendChild(s);
            }, 1000);
        });

        // 4. Render Function (Optimized with DocumentFragment)
        function render(data) {
            const fr = document.createDocumentFragment();
            data.forEach(ch => {
                const b = document.createElement('div'); 
                b.className = 'channel-card';
                b.setAttribute('role', 'listitem');
                b.setAttribute('tabindex', '0');
                b.innerHTML = `<span class="channel-name">${ch.name}</span>`;
                b.onclick = () => play(ch);
                b.onkeydown = (e) => { if(e.key === 'Enter' || e.key === ' ') { e.preventDefault(); play(ch); } };
                fr.appendChild(b);
            });
            l.innerHTML = ''; 
            l.appendChild(fr);
        }

        // 5. Search Function
        document.getElementById('searchInput').oninput = (e) => {
            const term = e.target.value.toLowerCase();
            render(allCh.filter(c => c.name.toLowerCase().includes(term)));
        };

        // Placeholder for your 'play' function
        function play(ch) { console.log("Playing:", ch.name); }
    </script>
</body>
</html>
