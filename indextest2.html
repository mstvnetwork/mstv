
<script>

let allCh = [], hlsE = null, shakaP = null;
let activeCard = null;
let currentChannelId = null;
let lastDataHash = '';
let shakaReady = false;

document.getElementById('shaka-script').addEventListener('load', () => {
    if (window.shaka) shaka.polyfill.installAll();
    shakaReady = true;
});

const v = document.getElementById('video');
const f = document.getElementById('iframePlayer');
const l = document.getElementById('channelList');
const t = document.getElementById('current-title');
const ph = document.getElementById('placeholder');
const ld = document.getElementById('loader');
const cc = document.getElementById('channel-count');

function waitForScripts() {
    if (window.Hls && (window.shaka || shakaReady)) return Promise.resolve();
    return new Promise(resolve => {
        let i = setInterval(() => {
            if (window.Hls && (window.shaka || shakaReady)) {
                clearInterval(i);
                resolve();
            }
        }, 50);
    });
}

let isPlaying = false;

async function play(ch, card) {
    if (!ch.url || isPlaying) return;
    isPlaying = true;

    currentChannelId = ch.name;

    if (activeCard) activeCard.classList.remove('active');
    card.classList.add('active');
    activeCard = card;

    if (hlsE) { hlsE.destroy(); hlsE = null; }
    if (shakaP) { try { await shakaP.detach(); } catch(e){} }

    v.pause(); v.src = ""; v.style.display = 'none';
    f.style.display = 'none'; f.src = "";

    ph.style.display = 'none';
    ld.style.display = 'block';

    t.innerText = ch.name;

    const isIframe = !ch.url.includes('.m3u8') && !ch.url.includes('.mpd');

    if (isIframe) {
        f.onload = () => ld.style.display = 'none';
        f.src = ch.url;
        f.style.display = 'block';
    } else {
        await waitForScripts();

        if (ch.url.includes('.mpd') && window.shaka) {
            v.style.display = 'block';
            v.controls = true;
            shakaP = new shaka.Player(v);
            await shakaP.load(ch.url).catch(()=>{});
            ld.style.display = 'none';
        } else if (window.Hls && Hls.isSupported()) {
            hlsE = new Hls();
            hlsE.loadSource(ch.url);
            hlsE.attachMedia(v);
            hlsE.on(Hls.Events.MANIFEST_PARSED, () => {
                v.style.display = 'block';
                v.controls = true;
                v.play();
                ld.style.display = 'none';
            });
        } else {
            v.src = ch.url;
            v.style.display = 'block';
            v.play();
            ld.style.display = 'none';
        }
    }

    isPlaying = false;
}

function render(data) {
    const fragment = document.createDocumentFragment();

    data.forEach(ch => {
        const card = document.createElement('div');
        card.className = 'channel-card';
        card.textContent = ch.name;

        if (ch.name === currentChannelId) {
            card.classList.add('active');
            activeCard = card;
        }

        card.onclick = () => play(ch, card);
        fragment.appendChild(card);
    });

    l.innerHTML = '';
    l.appendChild(fragment);
}

async function loadChannelsLive() {
    try {
        const res = await fetch('channels2.json?t=' + Date.now());
        const data = await res.json();

        const hash = JSON.stringify(data);

        if (hash !== lastDataHash) {
            lastDataHash = hash;
            allCh = data;
            cc.textContent = data.length + ' channels';
            render(allCh);
            console.log('Live updated');
        }
    } catch (e) {
        console.log('Update failed');
    }
}

document.addEventListener('DOMContentLoaded', () => {
    loadChannelsLive();
    setInterval(loadChannelsLive, 5000);
});

document.getElementById('searchInput').oninput = (e) => {
    const q = e.target.value.toLowerCase();
    const filtered = allCh.filter(c => c.name.toLowerCase().includes(q));
    render(filtered);
};

</script>

</body>
</html>
