<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MSTV Network | Live Indian TV & Punjabi Channels</title>
    
    <meta name="description" content="Watch MSTV Network for free live Indian, Punjabi, and religious TV channels. High-speed HD streaming for cricket and entertainment available on all devices.">
    <meta name="robots" content="index, follow">
    
    <link id="canonical-link" rel="canonical" href="">
    <link rel="icon" href="/favicon.ico">
    <meta name="theme-color" content="#111419">

    <link rel="preload" href="channels2.json" as="fetch" crossorigin="anonymous">
    <link rel="dns-prefetch" href="https://cdnjs.cloudflare.com">
    <link rel="dns-prefetch" href="https://cdn.jsdelivr.net/npm">

    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --bg-dark: #111419;
            --accent: #2ECC71;
            --header-h: 70px;
            --ticker-h: 30px;
        }

        body {
            font-family: system-ui, -apple-system, sans-serif;
            background: #F8F9FA;
            color: #212529;
            line-height: 1.5;
            overflow-x: hidden;
        }

        header {
            height: var(--header-h);
            background: var(--bg-dark);
            display: flex; 
            align-items: center; 
            justify-content: space-between;
            padding: 0 15px;
            position: sticky;
            top: 0;
            z-index: 1000;
        }

        .brand-name { font-size: 1.25rem; font-weight: 800; color: var(--accent); }
        .search-container { flex: 0.6; max-width: 200px; }
        #searchInput {
            width: 100%; padding: 12px 15px; border-radius: 20px;
            border: 1px solid #444; background: #1A1D20; color: #fff; font-size: 16px;
        }

        .sticky-player-wrapper {
            position: sticky;
            top: var(--header-h);
            z-index: 900;
            background: #000;
            width: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .player-container {
            width: 100%;
            aspect-ratio: 16 / 9; 
            background: #000;
            position: relative;
            overflow: hidden;
        }

        #video, #iframePlayer, #placeholder {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
        }

        #placeholder { 
            display: flex; align-items: center; justify-content: center; 
            font-size: 3rem; background: #000; color: #fff;
        }

        .channel-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(130px, 1fr));
            gap: 20px;
            padding: 20px;
            min-height: 400px;
        }

        .channel-card {
            background: #fff; border: 1px solid #ddd; border-radius: 12px;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            padding: 15px; cursor: pointer; transition: 0.2s;
            box-shadow: 0 2px 5px rgba(0,0,0,0.06);
            text-align: center;
        }

        .channel-card:hover, .channel-card:focus { 
            border-color: var(--accent); 
            transform: scale(1.02);
            outline: 3px solid var(--accent);
            outline-offset: 2px;
        }

        .channel-name { font-size: 0.95rem; font-weight: 700; color: #333; }
        
        /* FIXED ACCESSIBILITY CONTRAST */
        .channel-subtext {
            display: block;
            font-size: 0.65rem;
            color: #B32617; /* Darker red for 4.5:1 contrast ratio */
            font-weight: 800;
            text-transform: uppercase;
            margin-top: 4px;
            letter-spacing: 0.5px;
        }

        .site-footer { background: #111419; color: #FFFFFF; padding: 40px 20px; margin-top: 50px; }
    </style>
</head>
<body>

    <header role="banner">
        <h1 class="brand-name">MSTV NETWORK</h1>
        <div class="search-container">
            <input type="text" id="searchInput" placeholder="Search channels..." aria-label="Search TV channels">
        </div>
    </header>

    <div class="sticky-player-wrapper">
        <section class="player-container" aria-label="TV Streaming Player">
            <div id="placeholder">📺</div>
            <video id="video" playsinline controls aria-label="MSTV Live Video">
                <track kind="captions" src="" srclang="en" label="English" default>
            </video>
            <iframe id="iframePlayer" title="Stream Content" sandbox="allow-scripts allow-same-origin" style="display:none;"></iframe>
        </section>
    </div>

    <main class="main-content">
        <section class="title-area" style="padding:20px; text-align:center;">
            <h2 id="current-title">Select & Play</h2>
        </section>
        
        <div class="channel-grid" id="channelList" role="list"></div>

        <footer class="site-footer">
            <p>© 2026 MSTV Network. All Rights Reserved.</p>
        </footer>
    </main>

<script>
    const l = document.getElementById('channelList');
    const v = document.getElementById('video');
    const f = document.getElementById('iframePlayer');
    const t = document.getElementById('current-title');
    const ph = document.getElementById('placeholder');

    function render(data) {
        if (!l) return;
        l.innerHTML = ''; 
        
        data.forEach(ch => {
            const b = document.createElement('div');
            b.className = 'channel-card';
            
            // ACCESSIBILITY FIXES
            b.setAttribute('role', 'listitem');
            b.setAttribute('tabindex', '0');
            b.setAttribute('aria-label', `Play ${ch.name}`);

            const parts = ch.name.split('|');
            const mainTitle = parts.trim();
            const subTitle = parts ? parts.trim() : '';

            let html = `<span class="channel-name">${mainTitle}</span>`;
            if (subTitle) {
                html += `<span class="channel-subtext">${subTitle}</span>`;
            }

            b.innerHTML = html;
            
            const triggerPlay = () => {
                ph.style.display = 'none';
                t.innerText = mainTitle;
                // Basic play logic
                if (ch.url.includes('m3u8')) {
                    f.style.display = 'none';
                    v.style.display = 'block';
                    v.src = ch.url;
                    v.play();
                } else {
                    v.style.display = 'none';
                    f.style.display = 'block';
                    f.src = ch.url;
                }
            };

            b.onclick = triggerPlay;
            b.onkeydown = (e) => { if(e.key === 'Enter') triggerPlay(); };
            
            l.appendChild(b);
        });
    }

    // Load your data
    fetch('channels2.json')
        .then(r => r.json())
        .then(data => render(data))
        .catch(err => console.error("Failed to load channels:", err));

    // Search Filter
    document.getElementById('searchInput').addEventListener('input', (e) => {
        const term = e.target.value.toLowerCase();
        const filtered = allCh.filter(ch => ch.name.toLowerCase().includes(term));
        render(filtered);
    });
</script>
</body>
</html>
