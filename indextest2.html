<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MSTV Network Player</title>
    <style>
        /* This section creates the "Look" of the page */
        body { 
            background: #000000; 
            color: white; 
            font-family: 'Segoe UI', Arial, sans-serif; 
            padding: 20px; 
            margin: 0;
        }
        .container {
            max-width: 1000px;
            margin: 0 auto;
        }
        .header {
            border-bottom: 2px solid #222;
            padding-bottom: 20px;
            margin-bottom: 30px;
            text-align: center;
        }
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
            gap: 20px;
        }
        .card {
            background: #1a1a1a;
            border: 1px solid #333;
            border-radius: 10px;
            padding: 20px;
            text-align: center;
            transition: 0.3s;
        }
        .card:hover {
            border-color: #ff0055;
            background: #222;
        }
        .name {
            font-size: 1.2rem;
            font-weight: bold;
            margin-bottom: 10px;
            display: block;
        }
        .type-tag {
            background: #333;
            padding: 4px 10px;
            border-radius: 5px;
            font-size: 0.7rem;
            text-transform: uppercase;
            color: #aaa;
        }
        .btn {
            display: block;
            margin-top: 15px;
            background: #ff0055;
            color: white;
            text-decoration: none;
            padding: 10px;
            border-radius: 5px;
            font-weight: bold;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <h1>MSTV LIVE</h1>
        <p>Optimized Stream Directory</p>
    </div>

    <div id="main-grid" class="grid">
        </div>
</div>

<script>
    // 1. PASTE YOUR FULL JSON DATA HERE

    function buildInterface() {

        grid.innerHTML = myChannels.map(item => `

    // Run the build

</body>
</html>
