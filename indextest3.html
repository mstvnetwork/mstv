<!DOCTYPE html>
<html>
<head>
    <title>Live TV Player</title>
    <!-- Include hls.js from a CDN -->
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
</head>
<body>
    <video id="video" controls width="100%" style="max-width: 800px;"></video>

    <script>
      var video = document.getElementById('video');
      // Replace this with a link from your Termux script
      var videoSrc = 'https://naariclothing.com?id=3512&token=aa887987f6074174adcdec380af4177c';

      if (Hls.isSupported()) {
        var hls = new Hls();
        hls.loadSource(videoSrc);
        hls.attachMedia(video);
      }
      // For Safari which supports HLS natively
      else if (video.canPlayType('application/vnd.apple.mpegurl')) {
        video.src = videoSrc;
      }
    </script>
</body>
</html>
