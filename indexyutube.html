<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>MSTV NETWORK - Live</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

<!-- Player Libraries -->
<script defer src="./shaka.js"></script>
<script defer src="./shaka/hls.min.js"></script>

<style>
/* 1. RESET & VIEWPORT LOCK */
* { margin: 0; padding: 0; box-sizing: border-box; }

body, html {
  height: 100vh;
  height: 100dvh; /* Dynamic height for mobile */
  width: 100vw;
  overflow: hidden; /* Lock the screen */
  font-family: 'Helvetica Neue', Arial, sans-serif;
  background: #000;
  color: #eee;
}

/* 2. THE STACK (Zero Gaps) */
.app-container {
  display: flex;
  flex-direction: column;
  height: 100%;
  width: 100%;
}

/* 3. HEADER & SEARCH (Fixed heights) */
header {
  flex-shrink: 0;
  background: #111419;
  padding: 10px 15px 5px 15px;
  text-align: center;
  border-bottom: 1px solid #222;
}

.brand-name {
  font-size: 1.1rem; font-weight: bold;
  background: linear-gradient(90deg, #90EE90, #00FFA3);
  -webkit-background-clip: text; color: transparent;
}
.slogan { font-size: 0.6rem; color: #ffd700; margin-bottom: 4px; }

.search-box {
  background: #111419;
  padding-bottom: 10px;
  display: flex;
  justify-content: center;
}

#searchInput {
  width: 90%; max-width: 400px;
  padding: 8px 15px; border-radius: 20px;
  border: none; outline: none; font-size: 14px;
}

/* 4. MAIN VIEWER (The remaining space) */
.viewer-section {
  flex-grow: 1; 
  display: flex;
  flex-direction: column;
  justify-content: flex-start; /* Push player to the top of its area */
  align-items: center;
  background: #000;
  overflow: hidden;
}

.player-box {
  width: 100%;
  max-width: 1000px;
  aspect-ratio: 16 / 9;
  position: relative;
  background: #000;
}

video, iframe {
  position: absolute; top: 0; left: 0;
  width: 100%; height: 100%; border: none;
}

#title {
  padding: 8px 0;
  font-size: 0.9rem;
  color: #fff;
  font-weight: 500;
}

/* 5. CHANNEL LIST (Anchored to bottom) */
.list-section {
  flex-shrink: 0;
  background: #1a1d23;
  padding: 5px 0 10px 0;
  border-top: 1px solid #333;
}

.grid {
  display: flex;
  margin-top: 30px;
  overflow-x: auto;
  gap: 0px;
  padding: 0 15px;
  scrollbar-width: none; /* Hide scrollbar Firefox */
}
.grid::-webkit-scrollbar { display: none; } /* Hide scrollbar Chrome/Safari */

.channel {
  flex: 0 0 90px;
  height: 90px;
  background: #252a33;
  border-radius: 8px;
  position: relative;
  cursor: pointer;
  overflow: hidden;
  transition: transform 0.1s;
}

.channel:active { transform: scale(0.95); }
.channel img { width: 100%; height: 100%; object-fit: cover; }
.channel div {
  position: absolute; bottom: 0; width: 100%;
  background: rgba(0,0,0,0.8); color: #fff;
  font-size: 9px; padding: 4px 2px; text-align: center;
}

/* MOBILE LANDSCAPE TWEAKS */
@media (max-height: 500px) {
  .slogan, #title { display: none; }
  header { padding: 5px; }
  .channel { flex: 0 0 70px; height: 70px; }
}
</style>
</head>

<body>

<div class="app-container">
  <header>
    <div class="brand-name">🎬 MSTV NETWORK</div>
    <div class="slogan">LIVE INDIAN PAKISTANI & ENGLISH CHANNELS</div>
  </header>

  <div class="search-box">
    <input type="text" id="searchInput" placeholder="Search channels...">
  </div>

  <main class="viewer-section">
    <div class="player-box">
      <video id="video" controls autoplay playsinline></video>
      <iframe id="iframePlayer" style="display:none;" allowfullscreen></iframe>
    </div>
    <div id="title">Loading Channel...</div>
  </main>

  <footer class="list-section">
    <div class="grid" id="channelList"></div>
  </footer>
</div>

<script>
const jsonFile = 'channels.json'; 
const video = document.getElementById('video');
const iframe = document.getElementById('iframePlayer');
const list = document.getElementById('channelList');
const searchInput = document.getElementById('searchInput');
const titleEl = document.getElementById('title');

let hls = null;

function playStream(url, type) {
  if(hls) { hls.destroy(); hls = null; }
  video.style.display = 'none';
  iframe.style.display = 'none';
  video.src = ''; iframe.src = '';

  if (type === 'iframe') {
    iframe.style.display = 'block';
    iframe.src = url;
    return;
  }

  video.style.display = 'block';
  if (url.includes('.m3u8')) {
    if (Hls.isSupported()) {
      hls = new Hls();
      hls.loadSource(url);
      hls.attachMedia(video);
      hls.on(Hls.Events.MANIFEST_PARSED, () => video.play().catch(()=>{}));
    } else { video.src = url; }
  } else { video.src = url; }
}

async function init() {
  try {
    const res = await fetch(jsonFile);
    const channels = await res.json();

    function render(data) {
      list.innerHTML = '';
      data.forEach(({ ch, index }) => {
        const div = document.createElement('div');
        div.className = 'channel';
        div.innerHTML = `<img src="${ch.logo}"><div>${ch.name}</div>`;
        div.onclick = () => {
          playStream(ch.url, ch.type);
          titleEl.innerText = ch.name;
          history.replaceState(null, '', '?=' + index);
        };
        list.appendChild(div);
      });
    }

    render(channels.map((ch, i) => ({ ch, index: i })));

    // Handle Deep Linking
    let urlParams = new URLSearchParams(window.location.search);
    let id = 0;
    for (let pair of urlParams.entries()) { id = parseInt(pair[0]); break; } 
    
    if(channels[id]) {
      playStream(channels[id].url, channels[id].type);
      titleEl.innerText = channels[id].name;
    }

    searchInput.oninput = (e) => {
      const val = e.target.value.toLowerCase();
      render(channels.map((ch, i) => ({ ch, index: i })).filter(i => i.ch.name.toLowerCase().includes(val)));
    };
  } catch(e) { console.error("Data error:", e); }
}

init();
</script>
</body>
</html>
