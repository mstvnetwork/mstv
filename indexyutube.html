<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>MSTV NETWORK - Live Stream</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

<!-- Player Libraries -->
<script defer src="https://cdnjs.cloudflare.com"></script>
<script defer src="https://cdn.jsdelivr.net"></script>

<style>
/* 1. RESET & LOCK VIEWPORT */
* { margin: 0; padding: 0; box-sizing: border-box; }

body, html {
  height: 100%; /* Fallback */
  height: 100dvh; /* Dynamic Viewport Height (fixes mobile browser bar) */
  width: 100vw;
  overflow: hidden; /* Prevent body scroll */
  font-family: 'Helvetica Neue', Arial, sans-serif;
  background: #111; /* Dark background for theater feel */
  color: #eee;
}

/* 2. APP STRUCTURE */
.app-container {
  display: flex;
  flex-direction: column;
  height: 100%;
  width: 100%;
}

/* 3. HEADER (Fixed size) */
header {
  flex-shrink: 0;
  background: #1a1d23;
  padding: 10px 15px;
  border-bottom: 1px solid #333;
  text-align: center;
}

.brand-name {
  font-size: 1.3rem; font-weight: bold;
  background: linear-gradient(90deg, #90EE90, #00FFA3);
  -webkit-background-clip: text; color: transparent;
}
.slogan { font-size: 0.65rem; color: #ffd700; margin-bottom: 8px; }

#searchInput {
  width: 100%; max-width: 500px;
  padding: 8px 15px; border-radius: 20px;
  border: none; outline: none; background: #fff; color: #333;
}

/* 4. MAIN VIEWER (Fills remaining space) */
.viewer-section {
  flex-grow: 1; 
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  padding: 10px;
  background: #000;
  overflow: hidden;
}

.player-box {
  width: 100%;
  max-width: 1100px;
  aspect-ratio: 16 / 9; /* Modern CSS aspect ratio */
  position: relative;
  background: #000;
  box-shadow: 0 0 30px rgba(0,0,0,1);
}

video, iframe {
  position: absolute; top: 0; left: 0;
  width: 100%; height: 100%; border: none;
}

#title {
  margin-top: 12px;
  font-size: 1rem;
  font-weight: 500;
  color: #fff;
  text-align: center;
}

/* 5. CHANNEL LIST (Scrollable bottom bar) */
.list-section {
  flex-shrink: 0;
  background: #1a1d23;
  border-top: 1px solid #333;
  padding: 10px 0;
}

.grid {
  display: flex;
  overflow-x: auto;
  gap: 12px;
  padding: 0 15px 10px 15px;
  scrollbar-width: thin;
  scrollbar-color: #444 transparent;
}

/* Hide scrollbar for cleaner mobile look */
.grid::-webkit-scrollbar { height: 4px; }
.grid::-webkit-scrollbar-thumb { background: #444; border-radius: 10px; }

.channel {
  flex: 0 0 100px;
  height: 100px;
  background: #252a33;
  border-radius: 8px;
  position: relative;
  cursor: pointer;
  overflow: hidden;
  transition: transform 0.2s;
}

.channel:hover { transform: scale(1.05); z-index: 2; }
.channel img { width: 100%; height: 100%; object-fit: cover; }
.channel div {
  position: absolute; bottom: 0; width: 100%;
  background: rgba(0,0,0,0.8); color: #fff;
  font-size: 9px; padding: 4px 2px; text-align: center;
}

/* MOBILE OPTIMIZATIONS */
@media (max-height: 550px) {
  header { padding: 5px; }
  .slogan, .brand-name { display: none; }
  .channel { flex: 0 0 80px; height: 80px; }
}
</style>
</head>

<body>

<div class="app-container">
  <header>
    <div class="brand-name">🎬 MSTV NETWORK</div>
    <div class="slogan">LIVE INDIAN PAKISTANI & ENGLISH CHANNELS</div>
    <input type="text" id="searchInput" placeholder="Search channels...">
  </header>

  <main class="viewer-section">
    <div class="player-box">
      <video id="video" controls autoplay></video>
      <iframe id="iframePlayer" allowfullscreen></iframe>
    </div>
    <div id="title">Loading Channel...</div>
  </main>

  <footer class="list-section">
    <div class="grid" id="channelList"></div>
  </footer>
</div>

<script>
const jsonFile = '/channels.json';
const video = document.getElementById('video');
const iframe = document.getElementById('iframePlayer');
const list = document.getElementById('channelList');
const searchInput = document.getElementById('searchInput');
const titleEl = document.getElementById('title');

let hls = null;
let shaka = null;

function playStream(url, type) {
  if(hls) { hls.destroy(); hls = null; }
  video.style.display = 'none';
  iframe.style.display = 'none';
  video.src = '';
  iframe.src = '';

  if (type === 'iframe') {
    iframe.style.display = 'block';
    iframe.src = url;
    return;
  }

  video.style.display = 'block';
  if (url.includes('.m3u8')) {
    if (Hls.isSupported()) {
      hls = new Hls();
      hls.loadSource(url);
      hls.attachMedia(video);
    } else { video.src = url; }
  } else { video.src = url; }
}

async function init() {
  try {
    const res = await fetch(jsonFile);
    const channels = await res.json();

    function render(data) {
      list.innerHTML = '';
      data.forEach(({ ch, index }) => {
        const div = document.createElement('div');
        div.className = 'channel';
        div.innerHTML = `<img src="${ch.logo}"><div>${ch.name}</div>`;
        div.onclick = () => {
          playStream(ch.url, ch.type);
          titleEl.innerText = ch.name;
          history.replaceState(null, '', '?=' + index);
        };
        list.appendChild(div);
      });
    }

    render(channels.map((ch, i) => ({ ch, index: i })));
    
    // Initial Load
    const startIdx = parseInt(window.location.search.split('=')[1]) || 0;
    if(channels[startIdx]) {
      playStream(channels[startIdx].url, channels[startIdx].type);
      titleEl.innerText = channels[startIdx].name;
    }

    searchInput.oninput = (e) => {
      const val = e.target.value.toLowerCase();
      render(channels.map((ch, i) => ({ ch, index: i })).filter(i => i.ch.name.toLowerCase().includes(val)));
    };
  } catch(e) { console.log(e); }
}
init();
</script>
</body>
</html>
