<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Multi-Channel Mobile Stream</title>
    
    <script src="https://unpkg.com"></script>
    <script type="module" src="https://unpkg.com"></script>

    <style>
        :root { --primary: #00ffA0; }
        body, html {
            margin: 0; padding: 0;
            width: 100%; height: 100%;
            background: #000;
            display: flex; flex-direction: column; align-items: center;
            overflow: hidden; font-family: sans-serif;
        }

        /* Channel Navigation */
        .channel-bar {
            width: 100%;
            overflow-x: auto;
            white-space: nowrap;
            background: #111;
            padding: 10px 5px;
            border-bottom: 1px solid #333;
            display: flex; gap: 10px;
        }

        .channel-btn {
            background: #222;
            color: #fff;
            border: 1px solid var(--primary);
            padding: 8px 15px;
            border-radius: 20px;
            cursor: pointer;
            font-size: 14px;
        }

        .channel-btn.active {
            background: var(--primary);
            color: #000;
            font-weight: bold;
        }

        .viewport {
            width: 100vw; max-width: 1000px; aspect-ratio: 16 / 9; 
            overflow: hidden; position: relative;
            border: 2px solid var(--primary);
            background: #000;
            margin-top: 20px;
        }

        #frameMover {
            position: absolute; width: 100%; height: 270%; top: -155px; left: 0%;
        }

        #captureFrame { width: 100%; height: 100%; border: none; }

        #lockLayer {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            z-index: 9999; pointer-events: none;
        }

        #lockLayer.active { pointer-events: all; }

        .click-hint {
            position: absolute; bottom: 10px; left: 10px;
            color: var(--primary); font-size: 10px; opacity: 0.7;
        }
    </style>
</head>
<body>

    <!-- Channel Selector -->
    <div class="channel-bar" id="channelList">
        <!-- Buttons will be injected here -->
    </div>

    <div class="viewport" id="playerWrapper">
        <div id="lockLayer"></div>
        <div id="status" class="click-hint">Initialising...</div>

        <div id="frameMover">
            <iframe id="captureFrame" is="x-frame-bypass" src="" scrolling="no"></iframe>
        </div>
    </div>

<script>
    // 1. ADD YOUR CHANNELS HERE
    const channels = [
        { name: "Sony TV 1", url: "https://mstvnet.netlify.app/shaka/index.html/#13" },
        { name: "Channel 2", url: "https://mstvnet.netlify.app" },
        { name: "Channel 3", url: "https://mstvnet.netlify.app" }
    ];

    const frame = document.getElementById('captureFrame');
    const channelList = document.getElementById('channelList');

    // 2. BUILD CHANNEL BUTTONS
    channels.forEach((ch, index) => {
        const btn = document.createElement('button');
        btn.className = 'channel-btn';
        btn.innerText = ch.name;
        btn.onclick = () => loadChannel(index, btn);
        channelList.appendChild(btn);
        
        // Load first channel by default
        if(index === 0) loadChannel(0, btn);
    });

    function loadChannel(index, btn) {
        // Update UI
        document.querySelectorAll('.channel-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        
        // Update Iframe
        frame.src = channels[index].url;
        document.getElementById('status').innerText = "Playing: " + channels[index].name;
    }

    // Lock Layer Logic
    document.addEventListener("DOMContentLoaded", function() {
        const shield = document.getElementById('lockLayer');
        let clickCount = 0;
        
        document.getElementById('playerWrapper').addEventListener('click', function() {
            clickCount++;
            if (clickCount >= 4) {
                shield.classList.add('active');
                document.getElementById('status').innerText = "CONTROLS LOCKED";
            }
        });
    });
</script>
</body>
</html>
