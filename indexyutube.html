<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>MSTV Network | Indian TV Channels Live</title>
<meta name="description" content="Watch Indian, Punjabi & religious TV channels online free. Live cricket streaming available now.">

<link rel="canonical" href="https://mstvnet.netlify.app/">

<!-- Favicon -->
<link rel="icon" href="/favicon.ico" type="image/x-icon">
</head>
<body>

<header>
  <div class="logo-section">
    <div class="brand-name">MSTV NETWORK</div>
    <div class="slogan">LIVE INDIAN PAKISTANI & ENGLISH CHANNELS</div>
  </div>
  <div class="search-container">
    <input type="text" id="channel-search" placeholder="Search channels...">
  </div>
</header>

<div class="sticky-player-wrapper">
  <div class="player-container">
    <div id="loading">🌀 Buffering...</div>
    <div id="live-stamp">MSTV Network</div>
    <div id="placeholder">📺</div>
    <video id="video-player" autoplay playsinline controls></video>
    <iframe id="iframe-player" sandbox="allow-scripts allow-same-origin allow-presentation" allow="autoplay; encrypted-media"></iframe>
  </div>
</div>

<main>
  <div class="channel-grid" id="channel-list-container"></div>
</main>

<script defer src="./shaka.js"></script>
<script defer src="./shaka/hls.min.js"></script>

<script>
    // URL of your JSON file
    const JSON_URL = "https://mstvnet.netlify.app/channels.json";

    async function initApp() {
        const video = document.getElementById('video');
        
        try {
            // 1. Fetch the channels from the external URL
            const response = await fetch(JSON_URL);
            const streamList = await response.json();

            // 2. Identify the stream based on URL hash
            const hash = window.location.hash.substring(1);
            let index = (parseInt(hash, 10) || 1) - 1;
            const stream = streamList[index] || streamList[0];

            if (!stream) return;

            // --- 3. HLS ENGINE (STRICTLY NON-SHAKA) ---
            if (stream.type === "hls") {
                if (video.canPlayType('application/vnd.apple.mpegurl')) {
                    video.src = stream.url;
                } 
                else if (Hls.isSupported()) {
                    const hls = new Hls();
                    hls.loadSource(stream.url);
                    hls.attachMedia(video);
                } 
                return; 
            }

            // --- 4. DASH ENGINE (STRICTLY SHAKA) ---
            if (stream.type === "dash") {
                if (typeof shaka === 'undefined') return;

                shaka.polyfill.installAll();
                const player = new shaka.Player(video);

                if (stream.drm) {
                    player.configure({ 
                        drm: { clearKeys: stream.drm } 
                    });
                }

                try {
                    await player.load(stream.url);
                } catch (e) {
                    console.error('DASH Load Error', e);
                }
            }
        } catch (error) {
            console.error("Error fetching stream data:", error);
        }
    }

    window.addEventListener('hashchange', () => window.location.reload());
    window.onload = initApp;
</script>

</body>
</html>
