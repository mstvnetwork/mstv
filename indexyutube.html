<html lang="en">
<head>
<meta charset="UTF-8">

<meta property="og:description" content="Stream Indian TV channels free online.">

src="https://gc.zgo.at/count.js"></script>

<!-- Schema -->

{
 "@context":"https://schema.org",
 "@type":"WebSite",
 "name":"MSTV Network",

}

<script type="application/ld+json">
{
 "@context":"https://schema.org",
 "@type":"Organization",
 "name":"MSTV Network",
 "url":"https://mstvnet.netlify.app",
 "logo":"https://mstvnet.netlify.app/mstv-thumbnail.png"
}
</script>
<script>
:root {
  --bg-dark: #0F1115;
  --accent: #90EE90;
  --header-h: 50px; /* reduced from 70px */
  --text-dim: #555;
  --max-content-width: 500px;
}

html, body { 
  scroll-behavior: smooth; 
  scroll-padding-top: calc(var(--header-h)+220px);
  margin:0; 
  font-family:Arial,sans-serif; 
  min-height:100dvh; 
  width:100vw; 
  overflow-x: hidden; 
  background:#E8E4C9; 
  display:flex; 
  flex-direction:column; 
  box-sizing: border-box;
}

/* Header */
header { 
  position:sticky; 
  top:0; 
  z-index:1000; 
  background:#111419; 
  height:var(--header-h); 
  display:flex; 
  align-items:center; 
  justify-content:space-between; 
  padding:0 12px; /* smaller padding */
  border-bottom:1px solid #222; 
}

.logo-section { 
  display:flex; 
  align-items:center; 
  gap:6px; /* compact spacing */
}

.brand-name { 
  font-size:0.75rem; 
  font-weight:bold; 
  background:linear-gradient(90deg,#90EE90,#00FFA3); 
  -webkit-background-clip:text; 
  color:transparent; 
  line-height:1; 
}

.slogan { 
  font-size:0.55rem; 
  color:#FFD700; 
  margin:0; /* remove extra spacing */ 
}

/* Hide slogan on small screens */
@media(max-width:600px){
  .slogan{
    display:none;
  }
}

/* Player */
.sticky-player-wrapper { 
  position:sticky; 
  top:var(--header-h); 
  z-index:900; 
  background:#E8E4C9; 
  width:100%; 
  display:flex; 
  flex-direction:column; 
  align-items:center; 
  border-bottom:1px solid #ccc; 
  padding:12px 0; 
}

.player-container { 
  position:relative; 
  width:92%; 
  max-width:100vw; 
  aspect-ratio:16/9; 
  background:black; 
  border-radius:12px; 
  overflow:hidden; 
  box-shadow:0 10px 30px rgba(0,0,0,0.3); 
  margin:0 auto; 
}

video, iframe { 
  position:absolute; 
  top:0; 
  left:0; 
  width:100%; 
  height:100%; 
  object-fit:cover; 
  display:none; 
}

#placeholder { 
  height:100%; 
  display:flex; 
  align-items:center; 
  justify-content:center; 
  font-size:4rem; 
  color:var(--accent); 
}

#loading { 
  position:absolute; 
  top:50%; 
  left:50%; 
  transform:translate(-50%,-50%); 
  z-index:100; 
  background:rgba(0,0,0,0.8); 
  padding:10px; 
  border-radius:50%; 
  border:1px solid var(--accent); 
  color:var(--accent); 
  display:none; 
}

#live-stamp { 
  position:absolute; 
  top:10px; 
  left:10px; 
  background:#E50914; 
  color:white; 
  padding:4px 10px; 
  border-radius:4px; 
  font-size:0.7rem; 
  font-weight:bold; 
  z-index:50; 
  display:none; 
}

/* Grid */
.channel-grid { 
  display:grid; 
  grid-template-columns:repeat(auto-fill,minmax(120px,1fr)); 
  gap:15px; 
  padding:25px 4%; 
  max-width:100vw; 
  margin:0 auto; 
  box-sizing:border-box; 
}

.channel-card { 
  background:#F5F1DC; 
  border-radius:12px; 
  padding:0; 
  text-align:center; 
  cursor:pointer; 
  border:1px solid #d6d6d6; 
  overflow:hidden; 
  display:flex; 
  flex-direction:column; 
  justify-content:flex-start; 
  transition:transform 0.2s,box-shadow 0.2s; 
}

.channel-card:focus { 
  outline:3px solid var(--accent); 
}

.channel-card img { 
  width:100%; 
  height:100%; 
  aspect-ratio:95/64; 
  object-fit:cover; 
  display:block; 
}

.channel-name { 
  padding:8px 4px; 
  font-size:0.85rem; 
  font-weight:bold; 
  background:#fff; 
  width:100%; 
  text-align:center; 
}

/* Footer */
.site-footer { 
  padding:30px 5%; 
  text-align:center; 
  font-size:0.85rem; 
  color:#666; 
  border-top:1px solid #ddd; 
}

/* Responsive */
@media(max-width:900px){
  header, .sticky-player-wrapper, main, .site-footer { 
    padding-left:5%; 
    padding-right:5%; 
  } 
}
@media(max-width:900px) and (orientation:landscape){ 
  header, .sticky-player-wrapper { 
    position:relative; top:0; 
  } 
  .player-container { 
    width:80vw; 
    height:auto; 
  } 
   }

/* FOOTER */
footer{padding:20px;text-align:center}
</style>
</head>

<body>

<header>
<h1>MSTV Network</h1>
<input id="search" placeholder="Search channels">
</header>

<div class="player-wrap">
  <div class="player">
    <video id="video" controls playsinline></video>
    <iframe id="frame"></iframe>
  </div>
</div>

<div class="grid-wrap">
  <div class="grid" id="grid"></div>
</div>

<footer>
<h2>Watch Live Indian TV Channels Online</h2>
<p>
Stream Indian, Punjabi, religious channels and cricket matches online for free.
Works on mobile, tablet and desktop.
</p>
</footer>

<script>
const JSON_URL="./channels.json";

let channels=[];
let scrollPos=0;

const grid=document.getElementById('grid');
const video=document.getElementById('video');
const frame=document.getElementById('frame');

/* slug generator */
function slugify(name){
 return name.toLowerCase().replace(/[^a-z0-9]+/g,'-').replace(/(^-|-$)/g,'');
}

/* stop player */
function stop(){
 video.pause();
 video.src="";
 video.style.display="none";

 frame.src="";
 frame.style.display="none";
}

/* play channel */
function play(index){
 const ch=channels[index];
 if(!ch) return;

 scrollPos=document.querySelector('.grid-wrap').scrollTop;

 stop();

 const slug=slugify(ch.name);

/* SEO URL */
 history.replaceState(null,null,"/watch/"+slug);

/* Canonical update */
 const canon=document.querySelector("link[rel='canonical']");
 if(canon){
  canon.href="https://mstvnet.netlify.app/watch/"+slug;
 }

/* Dynamic SEO */
 document.title=ch.name+" Live | MSTV Network";

 document.querySelector('meta[name="description"]').setAttribute(
  "content","Watch "+ch.name+" live streaming online for free on MSTV Network."
 );

/* highlight */
 document.querySelectorAll('.card').forEach(c=>c.classList.remove('active'));
 document.querySelector(`[data-i="${index}"]`).classList.add('active');

/* play */
 if(ch.type==="iframe"){
  frame.style.display="block";
  frame.src=ch.url;
 }else{
  video.style.display="block";
  video.src=ch.url;
  video.play().catch(()=>{});
 }

/* restore scroll */
 requestAnimationFrame(()=>{
  document.querySelector('.grid-wrap').scrollTop=scrollPos;
 });
}

/* render channels */
function render(data){
 channels=Array.isArray(data)?data:data.channels;

 grid.innerHTML=channels.map((ch,i)=>`
  <div class="card" data-i="${i}">
    <img src="${ch.logo}" loading="lazy" decoding="async">
    <div style="padding:6px;text-align:center;font-size:0.85rem">${ch.name}</div>
  </div>
 `).join("");

 document.querySelectorAll('.card').forEach(card=>{
  card.onclick=()=>play(card.dataset.i);
 });

/* load from URL */
 const path=location.pathname.split("/watch/")[1]||"";
 if(path){
  const idx=channels.findIndex(c=>slugify(c.name)===path);
  if(idx>-1) play(idx);
 }
}

/* search */
document.getElementById('search').oninput=e=>{
 const t=e.target.value.toLowerCase();
 document.querySelectorAll('.card').forEach((c,i)=>{
  c.style.display=channels[i].name.toLowerCase().includes(t)?"block":"none";
 });
};

/* load JSON */
fetch(JSON_URL)
.then(r=>r.json())
.then(render)
.catch(()=>console.log("channels load error"));
</script>

</body>
</html>
