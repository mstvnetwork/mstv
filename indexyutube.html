<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <style>
        /* This container acts as a 'window' that crops the YouTube UI */
        .clean-player-container {
            position: relative;
            width: 100%;
            max-width: 800px; /* Adjust size as needed */
            margin: 0 auto;
            overflow: hidden;
            aspect-ratio: 16 / 9;
            background: #000;
        }

        .clean-player-container iframe {
            position: absolute;
            /* Scale up and shift to hide the Title (top) and Logo (bottom) */
            top: -12%; 
            left: -5%;
            width: 110%;
            height: 124%;
            border: 0;
            /* Optional: uncomment below to disable all clicks/hovers on the video */
            /* pointer-events: none; */
        }
    </style>
</head>
<body>

    <div class="clean-player-container">
        <iframe 
            src="https://www.youtube.com/embed/e1FIApIafWE?si=Y3hIBurw5RwIU1qj" 
            allow="autoplay; encrypted-media" 
            allowfullscreen>
        </iframe>
    </div>

</body>
</html>
