<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>MSTV Network | Watch Indian TV Channels Live</title>
<meta name="description" content="Watch Indian, Punjabi, religious TV channels and live cricket streaming online for free.">
<meta name="robots" content="index, follow, max-image-preview:large">

<!-- Optional: Google Verification -->
<meta name="google-site-verification" content="YOUR_GOOGLE_VERIFICATION_CODE">

<!-- Canonical -->
<link rel="canonical" href="https://mstvnet.netlify.app/">

<!-- Open Graph -->
<meta property="og:title" content="MSTV Network Live TV">
<meta property="og:description" content="Stream Indian TV channels free online.">
<meta property="og:image" content="https://mstvnet.netlify.app/mstv-thumbnail.png">
<meta property="og:url" content="https://mstvnet.netlify.app/">
<meta property="og:type" content="website">

<!-- Performance -->
<link rel="preconnect" href="https://mstvnet.netlify.app">
<link rel="preconnect" href="https://cdn.jsdelivr.net">

<!-- GoatCounter Analytics -->
<script async data-goatcounter="https://mstv.goatcounter.com/count" src="https://gc.zgo.at/count.js"></script>

<!-- Structured Data -->
<script type="application/ld+json">
{
 "@context":"https://schema.org",
 "@type":"WebSite",
 "name":"MSTV Network",
 "url":"https://mstvnet.netlify.app"
}
</script>

<script type="application/ld+json">
{
 "@context":"https://schema.org",
 "@type":"Organization",
 "name":"MSTV Network",
 "url":"https://mstvnet.netlify.app",
 "logo":"https://mstvnet.netlify.app/mstv-thumbnail.png"
}
</script>

<style>
:root {
  --bg-dark: #0F1115;
  --accent: #90EE90;
  --header-h: 48px;
  --text-dim: #555;
  --max-content-width: 500px;
}

html, body { 
  scroll-behavior: smooth; 
  scroll-padding-top: calc(var(--header-h)+220px);
  margin:0; 
  font-family:Arial,sans-serif; 
  min-height:100dvh; 
  width:100vw; 
  overflow-x: hidden; 
  background:#E8E4C9; 
  display:flex; 
  flex-direction:column; 
  box-sizing: border-box;
}

/* HEADER */
header { 
  position: sticky; 
  top: 0; 
  z-index: 1000; 
  background:#111419; 
  height: var(--header-h); 
  padding: 2px 12px; 
  display:flex; 
  align-items:center; 
  justify-content:space-between; 
  border-bottom:1px solid #222; 
}

.logo-section { 
  display:flex; 
  align-items:center; 
  gap:8px; 
}

.brand-name { 
  font-size:0.85rem; 
  font-weight:bold; 
  line-height:1; 
  background: linear-gradient(90deg,#90EE90,#00FFA3); 
  -webkit-background-clip:text; 
  color:transparent; 
}

.slogan { 
  font-size:0.65rem; 
  color:#FFD700; 
  white-space: nowrap; 
}

@media(max-width:600px){
  .slogan{ display:none; }
}

/* PLAYER */
.sticky-player-wrapper { 
  position:sticky; 
  top:var(--header-h); 
  z-index:900; 
  background:#E8E4C9; 
  width:100%; 
  display:flex; 
  flex-direction:column; 
  align-items:center; 
  border-bottom:1px solid #ccc; 
  padding:12px 0; 
}

.player-container { 
  position:relative; 
  width:92%; 
  max-width:100vw; 
  aspect-ratio:16/9; 
  background:black; 
  border-radius:12px; 
  overflow:hidden; 
  box-shadow:0 10px 30px rgba(0,0,0,0.3); 
  margin:0 auto; 
}

video, iframe { 
  position:absolute; 
  top:0; 
  left:0; 
  width:100%; 
  height:100%; 
  object-fit:cover; 
  display:none; 
}

#placeholder { 
  height:100%; 
  display:flex; 
  align-items:center; 
  justify-content:center; 
  font-size:4rem; 
  color:var(--accent); 
}

#loading { 
  position:absolute; 
  top:50%; 
  left:50%; 
  transform:translate(-50%,-50%); 
  z-index:100; 
  background:rgba(0,0,0,0.8); 
  padding:10px; 
  border-radius:50%; 
  border:1px solid var(--accent); 
  color:var(--accent); 
  display:none; 
}

#live-stamp { 
  position:absolute; 
  top:10px; 
  left:10px; 
  background:#E50914; 
  color:white; 
  padding:4px 10px; 
  border-radius:4px; 
  font-size:0.7rem; 
  font-weight:bold; 
  z-index:50; 
  display:none; 
}

/* Grid */
.channel-grid { 
  display:grid; 
  grid-template-columns:repeat(auto-fill,minmax(120px,1fr)); 
  gap:15px; 
  padding:25px 4%; 
  max-width:100vw; 
  margin:0 auto; 
  box-sizing:border-box; 
}

.channel-card { 
  background:#F5F1DC; 
  border-radius:12px; 
  padding:0; 
  text-align:center; 
  cursor:pointer; 
  border:1px solid #d6d6d6; 
  overflow:hidden; 
  display:flex; 
  flex-direction:column; 
  justify-content:flex-start; 
  transition:transform 0.2s,box-shadow 0.2s; 
}

.channel-card:focus { 
  outline:3px solid var(--accent); 
}

.channel-card img { 
  width:100%; 
  height:100%; 
  aspect-ratio:95/64; 
  object-fit:cover; 
  display:block; 
}

.channel-name { 
  padding:8px 4px; 
  font-size:0.85rem; 
  font-weight:bold; 
  background:#fff; 
  width:100%; 
  text-align:center; 
}

/* Footer */
.site-footer { 
  padding:30px 5%; 
  text-align:center; 
  font-size:0.85rem; 
  color:#666; 
  border-top:1px solid #ddd; 
}

/* Responsive */
@media(max-width:900px){
  header, .sticky-player-wrapper, main, .site-footer { 
    padding-left:5%; 
    padding-right:5%; 
  } 
}
@media(max-width:900px) and (orientation:landscape){ 
  header, .sticky-player-wrapper { 
    position:relative; top:0; 
  } 
  .player-container { 
    width:80vw; 
    height:auto; 
  } 
}
</style>
</head>

<body>
<header>
  <div class="logo-section">
    <h1 class="brand-name">MSTV NETWORK</h1>
    <div class="slogan">LIVE INDIAN, PAKISTANI & ENGLISH CHANNELS</div>
  </div>
  <div class="search-container">
    <input type="text" id="channel-search" placeholder="Search channels..." aria-label="Search channels">
  </div>
</header>

<section class="sticky-player-wrapper" aria-label="Video player">
  <div class="player-container">
    <div id="loading" aria-live="assertive">Loading stream...</div>
    <div id="placeholder" aria-hidden="true">📺</div>
    <div id="live-stamp" aria-live="polite"></div>
    <video id="video-player" controls playsinline></video>
    <iframe id="iframe-player" title="Live TV Player" sandbox="allow-scripts allow-same-origin allow-presentation" allow="autoplay"></iframe>
  </div>
</section>

<main id="main">
  <section>
    <h2>Available Channels</h2>
    <div class="channel-grid" id="channel-list-container"></div>
  </section>
</main>

<footer class="site-footer">
  © 2026 MSTV Network. All Rights Reserved.
</footer>

<script>
const JSON_URL="./channels.json";
const DEFAULT_LOGO="https://mstvnet.netlify.app/mstv-thumbnail.png";
const grid=document.getElementById('channel-list-container');
const v=document.getElementById('video-player');
const i=document.getElementById('iframe-player');
const placeholder=document.getElementById('placeholder');
const loading=document.getElementById('loading');
const liveStamp=document.getElementById('live-stamp');
const search=document.getElementById('channel-search');
let channels=[],scrollPos=0;

function slugify(name){return name.toLowerCase().replace(/[^a-z0-9]+/g,'-').replace(/(^-|-$)/g,'');}

async function stopAll(){ 
 if(loading) loading.style.display='none';
 if(placeholder) placeholder.style.display='flex';
 if(liveStamp) liveStamp.style.display='none';
 if(v){ v.pause(); v.src=''; v.style.display='none'; }
 if(i){ i.src='about:blank'; i.style.display='none'; }
}

async function playChannel(idx){
 const ch=channels[idx]; if(!ch) return;
 scrollPos=document.querySelector('.channel-grid').scrollTop;
 await stopAll();
 if(loading) loading.style.display='block';
 if(placeholder) placeholder.style.display='none';
 if(liveStamp){ liveStamp.style.display='block'; liveStamp.textContent=`Now Playing: ${ch.name}`; }

 const slug=slugify(ch.name);
 history.replaceState(null,null,"/watch/"+slug);

 const canon=document.querySelector("link[rel='canonical']");
 if(canon){ canon.href="https://mstvnet.netlify.app/watch/"+slug; }

 document.title=ch.name+" Live | MSTV Network";
 document.querySelector('meta[name="description"]').setAttribute(
   "content","Watch "+ch.name+" live streaming online for free on MSTV Network."
 );

 document.querySelectorAll('.channel-card').forEach(c=>c.classList.remove('active'));
 document.querySelector(`[data-i="${idx}"]`)?.classList.add('active');

 if(ch.type==='iframe'){ i.style.display='block'; v.style.display='none'; i.src=ch.url; i.onload=()=>{if(loading)loading.style.display='none';} }
 else { v.style.display='block'; v.src=ch.url; v.play().catch(()=>{}); }

 requestAnimationFrame(()=>{ document.querySelector('.channel-grid').scrollTop=scrollPos; });
}

function renderUI(data){
 channels=Array.isArray(data)?data:data.channels||[];
 grid.innerHTML=channels.map((ch,i)=>`
   <div class="channel-card" data-i="${i}" role="button" tabindex="0">
     <img src="${ch.logo||DEFAULT_LOGO}" alt="${ch.name} channel logo" loading="lazy">
     <div class="channel-name">${ch.name}</div>
   </div>
 `).join('');
 document.querySelectorAll('.channel-card').forEach(card=>{
   card.onclick=()=>playChannel(card.dataset.i);
   card.onkeypress=e=>{if(e.key==='Enter')playChannel(card.dataset.i);}
 });

 const path=location.pathname.split("/watch/")[1]||"";
 if(path){
   const idx=channels.findIndex(c=>slugify(c.name)===path);
   if(idx!==-1) playChannel(idx);
 }
}

search.addEventListener('input', e=>{
 const term=e.target.value.toLowerCase();
 document.querySelectorAll(".channel-card").forEach((card, idx)=>{
   card.style.display=channels[idx].name.toLowerCase().includes(term)?"flex":"none";
 });
});

(async()=>{
 try{
   const res=await fetch(JSON_URL,{cache:'no-store'});
   if(res.ok){ const data=await res.json(); renderUI(data); }
 }catch(e){ console.error('JSON load error:',e); }
})();
</script>
</body>
</html>
