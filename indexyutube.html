<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stream Hub</title>


    <style>
        body { font-family: sans-serif; background: #121212; color: #fff; margin: 0; padding: 20px; display: flex; flex-direction: column; align-items: center; }
        #video-container { width: 100%; max-width: 900px; aspect-ratio: 16/9; background: #000; position: relative; border-radius: 8px; overflow: hidden; }
        video, iframe { width: 100%; height: 100%; border: none; }
        #channel-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 15px; width: 100%; max-width: 900px; margin-top: 25px; }
        .card { background: #222; padding: 10px; border-radius: 8px; text-align: center; cursor: pointer; border: 2px solid transparent; }
        .card:hover { border-color: #007bff; }
        .card img { width: 60px; height: 60px; object-fit: contain; }
        
        /* Embed View (?id=1&embed) */
        body.is-embed { padding: 0; overflow: hidden; background: transparent; }
        body.is-embed #video-container { max-width: 100%; border-radius: 0; height: 100vh; }
        body.is-embed h1, body.is-embed #channel-grid { display: none; }
    </style>
</head>
<body>

    <h1>Channel Hub</h1>
    <div id="video-container"></div>
    <div id="channel-grid"></div>
    <!-- Player Libraries -->
<script defer src="./shaka.js"></script>
<script defer src="./shaka/hls.min.js"></script>

    <script>
        let shakaPlayer = null;
        let hlsInstance = null;

        async function init() {
            const response = await fetch('channels2.json');
            const channels = await response.json();
            
            const params = new URLSearchParams(window.location.search);
            const channelId = params.get('id');
            if (params.has('embed')) document.body.classList.add('is-embed');

            // Build UI
            channels.forEach(ch => {
                const div = document.createElement('div');
                div.className = 'card';
                div.innerHTML = `<img src="${ch.logo}"><p>${ch.name}</p>`;
                div.onclick = () => loadChannel(ch);
                document.getElementById('channel-grid').appendChild(div);
            });

            // Auto-play if ID in URL
            if (channelId) {
                const active = channels.find(c => c.id == channelId);
                if (active) loadChannel(active);
            }
        }

        async function loadChannel(channel) {
            const container = document.getElementById('video-container');
            
            // Clean up existing players
            if (shakaPlayer) await shakaPlayer.destroy();
            if (hlsInstance) hlsInstance.destroy();
            container.innerHTML = '';

            if (channel.type === 'iframe') {
                container.innerHTML = `<iframe src="${channel.url}" allowfullscreen allow="autoplay"></iframe>`;
            } else {
                const video = document.createElement('video');
                video.controls = true;
                video.autoplay = true;
                container.appendChild(video);

                if (channel.type === 'dash') {
                    shakaPlayer = new shaka.Player(video);
                    await shakaPlayer.load(channel.url);
                } else if (channel.type === 'hls') {
                    if (Hls.isSupported()) {
                        hlsInstance = new Hls();
                        hlsInstance.loadSource(channel.url);
                        hlsInstance.attachMedia(video);
                    } else if (video.canPlayType('application/vnd.apple.mpegurl')) {
                        video.src = channel.url;
                    }
                }
            }

            // Update URL without refresh
            const newUrl = new URL(window.location);
            newUrl.searchParams.set('id', channel.id);
            window.history.pushState({}, '', newUrl);
        }

        shaka.polyfill.installAll();
        init();
    </script>
</body>
</html>
