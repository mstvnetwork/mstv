<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>MSTV Network | Indian TV Channels Live</title>
<meta name="description" content="Watch Indian, Punjabi & religious TV channels online free. Live cricket streaming available now.">

<link rel="canonical" href="https://mstvnet.netlify.app/">

<!-- Favicon -->
<link rel="icon" href="/favicon.ico" type="image/x-icon">
</head>
<body>

<header>
  <div class="logo-section">
    <div class="brand-name">MSTV NETWORK</div>
    <div class="slogan">LIVE INDIAN PAKISTANI & ENGLISH CHANNELS</div>
  </div>
  <div class="search-container">
    <input type="text" id="channel-search" placeholder="Search channels...">
  </div>
</header>

<div class="sticky-player-wrapper">
  <div class="player-container">
    <div id="loading">🌀 Buffering...</div>
    <div id="live-stamp">MSTV Network</div>
    <div id="placeholder">📺</div>
    <video id="video-player" autoplay playsinline controls></video>
    <iframe id="iframe-player" sandbox="allow-scripts allow-same-origin allow-presentation" allow="autoplay; encrypted-media"></iframe>
  </div>
</div>

<main>
  <div class="channel-grid" id="channel-list-container"></div>
</main>

<script defer src="./shaka.js"></script>
<script defer src="./shaka/hls.min.js"></script>
<script>
const el = id => document.getElementById(id);
const v = el('video-player'), i = el('iframe-player'), p = el('placeholder'), l = el('loading');
const gridContainer = el('channel-list-container');
const searchInput = el('channel-search');
const JSON_URL = './channels.json';

let channels = [], hls=null, shakaPlayer=null;

// Generate slug
function generateSlug(name){
  return name.toLowerCase().replace(/[^\w\s-]/g,'').trim().replace(/\s+/g,'-');
}

// Get slug from path
function getSlugFromPath(){
  return window.location.pathname.replace("/","");
}

// Stop all playback
async function stopAll(){
  if(l) l.style.display='none';
  if(hls){ hls.detachMedia(); hls.destroy(); hls=null; }
  if(shakaPlayer){ await shakaPlayer.detach(); await shakaPlayer.destroy(); shakaPlayer=null; }
  if(v){ v.pause(); v.removeAttribute('src'); v.load(); v.style.display='none'; }
  if(i){ i.src='about:blank'; i.style.display='none'; }
  if(p) p.style.display='flex';
}

// Play a channel
async function playChannel(idx){
  const ch = channels[idx]; if(!ch) return;

  history.replaceState(null,"","/"+ch.slug);

  await stopAll();
  v.scrollIntoView({behavior:'smooth', block:'start'});
  if(l) l.style.display='block';
  if(p) p.style.display='none';
  const hideLoader = ()=>{if(l) l.style.display='none';};

  if(ch.type==='iframe'){ 
    i.style.display='block'; 
    i.src=ch.url; 
    i.onload=hideLoader; 
    return; 
  }

  v.style.display='block';
  const isHls = ch.type==='hls' || (ch.url && ch.url.includes('.m3u8'));

  if(isHls){
    if(window.Hls && Hls.isSupported()){
      hls=new Hls({autoStartLoad:false,enableWorker:true,lowLatencyMode:true,capLevelToPlayerSize:true});
      hls.attachMedia(v);
      hls.on(Hls.Events.MEDIA_ATTACHED,()=>{ hls.loadSource(ch.url); hls.startLoad(); });
      hls.on(Hls.Events.MANIFEST_PARSED,()=>{ v.play().catch(()=>{}); });
      v.addEventListener('playing', hideLoader, {once:true});
    } else if(v.canPlayType('application/vnd.apple.mpegurl')){
      v.src=ch.url; 
      v.play().catch(()=>{}); 
      v.addEventListener('playing', hideLoader, {once:true});
    }
    return;
  }

  if(window.shaka && shaka.Player.isBrowserSupported()){
    shaka.polyfilled.installAll();
    shakaPlayer=new shaka.Player(v);
    shakaPlayer.configure({streaming:{bufferingGoal:10,rebufferingGoal:2,bufferBehind:0}});
    shakaPlayer.addEventListener('buffering', e=>{if(!e.buffering) hideLoader();});
    try{ await shakaPlayer.load(ch.url); v.play().catch(()=>{}); } catch(e){ console.error(e); hideLoader(); }
  }
}

// Render UI
function renderUI(data){
  channels = (Array.isArray(data)?data:data.channels||[]).map(ch=>({...ch,slug:generateSlug(ch.name)}));
  if(!gridContainer) return;
  gridContainer.innerHTML = channels.map((ch,i)=>`
    <div class="channel-card" onclick="playChannel(${i})">
      <img src="${ch.logo}" alt="${ch.name}" width="95" height="64" ${i<8?'fetchpriority="high"':'loading="lazy"'} onerror="this.src='https://mstvnet.netlify.app';">
      <div class="channel-name">${ch.name}</div>
    </div>`).join('');

  // Play channel if slug exists in path
  const slug = getSlugFromPath();
  const startIdx = channels.findIndex(c=>c.slug===slug);
  if(startIdx!==-1) playChannel(startIdx);
}

// Search
searchInput.addEventListener('input', e=>{
  const term = e.target.value.toLowerCase();
  document.querySelectorAll('.channel-card').forEach(card=>{
    card.style.display = card.innerText.toLowerCase().includes(term)?'flex':'none';
  });
});

// Handle back/forward
window.addEventListener('popstate', ()=>{
  const slug = getSlugFromPath();
  const idx = channels.findIndex(c=>c.slug===slug);
  if(idx!==-1) playChannel(idx);
});

// Init
(async()=>{
  try{
    const res = await fetch(JSON_URL,{cache:'no-store'});
    if(res.ok){ const data = await res.json(); renderUI(data); }
  } catch(e){ console.log('Init error:',e); }
})();
</script>
</body>
</html>
