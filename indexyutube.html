<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Live TV Streaming</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<!-- Player Libraries -->
<script defer src="/shaka.js"></script>
<script defer src="/shaka/hls.min.js"></script>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: #0b0b0b;
  color: #fff;
}

/* HEADER */
header {
  padding: 15px 20px;
  background: #111;
  border-bottom: 1px solid #222;
  font-size: 20px;
  font-weight: bold;
}

/* MAIN CONTAINER */
.container {
  max-width: 1200px;
  margin: auto;
  padding: 20px;
}

/* PLAYER */
.player-box {
  background: #000;
  border-radius: 10px;
  overflow: hidden;
}

video, iframe {
  width: 100%;
  height: 60vh;
  border: none;
}

/* TITLE */
.channel-title {
  font-size: 18px;
  padding: 10px 0;
}

/* EMBED BOX */
textarea {
  width: 100%;
  height: 80px;
  background: #111;
  color: #0f0;
  border: 1px solid #333;
  margin-top: 10px;
  padding: 10px;
  font-size: 12px;
}

/* GRID */
.grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
  gap: 12px;
  margin-top: 20px;
}

/* CHANNEL CARD */
.channel {
  background: #111;
  padding: 10px;
  border-radius: 8px;
  text-align: center;
  cursor: pointer;
  transition: 0.2s;
}

.channel:hover {
  background: #1a1a1a;
}

.channel img {
  width: 100%;
  height: 60px;
  object-fit: contain;
  margin-bottom: 5px;
}

/* FOOTER */
footer {
  margin-top: 30px;
  padding: 20px;
  text-align: center;
  font-size: 12px;
  color: #888;
  border-top: 1px solid #222;
}
</style>
</head>

<body>

<header>
  📺 Live TV Streaming
</header>

<div class="container">

  <!-- PLAYER -->
  <div class="player-box">
    <video id="video" controls></video>
    <iframe id="iframePlayer" allowfullscreen></iframe>
  </div>

  <div class="channel-title" id="title">Loading...</div>

  <!-- EMBED -->
  <textarea id="embedCode" readonly></textarea>

  <!-- CHANNEL GRID -->
  <div class="grid" id="channelList"></div>

</div>

<footer>
  © 2026 Live Streaming • All rights reserved
</footer>

<script>
const jsonFile = '/channels.json';

let video = document.getElementById('video');
let iframe = document.getElementById('iframePlayer');
let embedBox = document.getElementById('embedCode');
let titleBox = document.getElementById('title');

let hlsInstance = null;
let shakaPlayer = null;

// URL PARAM FIX
function getChannelIndex() {
  const match = window.location.search.match(/=(\d+)/);
  return match ? parseInt(match[1]) : 0;
}

function destroyPlayers() {
  if (hlsInstance) {
    hlsInstance.destroy();
    hlsInstance = null;
  }
  if (shakaPlayer) {
    shakaPlayer.destroy();
    shakaPlayer = null;
  }
}

function playStream(url, type) {
  destroyPlayers();

  video.style.display = 'none';
  iframe.style.display = 'none';

  if (type === 'iframe') {
    iframe.style.display = 'block';
    iframe.src = url;
    return;
  }

  video.style.display = 'block';

  if (url.includes('.m3u8')) {
    if (window.Hls && Hls.isSupported()) {
      hlsInstance = new Hls();
      hlsInstance.loadSource(url);
      hlsInstance.attachMedia(video);
    } else {
      video.src = url;
    }
  } else if (url.includes('.mpd')) {
    shakaPlayer = new shaka.Player(video);
    shakaPlayer.load(url);
  } else {
    video.src = url;
  }
}

async function init() {
  const res = await fetch(jsonFile, { cache: 'no-store' });
  const channels = await res.json();

  let id = getChannelIndex();

  const list = document.getElementById('channelList');

  function play(index) {
    if (!channels[index]) index = 0;

    const ch = channels[index];

    playStream(ch.url, ch.type || 'auto');

    // Update UI
    titleBox.innerText = ch.name + ' Live Stream';
    document.title = ch.name + ' Live Stream';

    // Update URL
    history.replaceState(null, '', '?=' + index);

    // Embed code
    const embedURL = window.location.origin + window.location.pathname + '?=' + index;

    embedBox.value =
      `<iframe src="${embedURL}" width="100%" height="600" frameborder="0" allowfullscreen></iframe>`;
  }

  play(id);

  channels.forEach((ch, i) => {
    const div = document.createElement('div');
    div.className = 'channel';
    div.innerHTML = `
      <img src="${ch.logo}">
      <div>${ch.name}</div>
    `;
    div.onclick = () => play(i);
    list.appendChild(div);
  });
}

init();
</script>

</body>
</html>
