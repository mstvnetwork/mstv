<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">

<title>MSTV Network | Watch Indian TV Channels Live</title>
<meta name="description" content="Watch Indian, Punjabi, religious TV channels and live cricket streaming online for free.">
<meta name="robots" content="index, follow, max-image-preview:large">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<!-- OPTIONAL: replace -->
<meta name="google-site-verification" content="YOUR_GOOGLE_VERIFICATION_CODE">

<link rel="canonical" href="https://mstvnet.netlify.app/">

<!-- Open Graph -->
<meta property="og:title" content="MSTV Network Live TV">
<meta property="og:description" content="Stream Indian TV channels free online.">
<meta property="og:image" content="https://mstvnet.netlify.app/mstv-thumbnail.png">
<meta property="og:url" content="https://mstvnet.netlify.app/">
<meta property="og:type" content="website">

<!-- Performance -->
<link rel="preconnect" href="https://mstvnet.netlify.app">
<link rel="preconnect" href="https://cdn.jsdelivr.net">

<!-- GoatCounter -->
<script async data-goatcounter="https://mstv.goatcounter.com/count"
src="https://gc.zgo.at/count.js"></script>

<!-- Schema -->
<script type="application/ld+json">
{
 "@context":"https://schema.org",
 "@type":"WebSite",
 "name":"MSTV Network",
 "url":"https://mstvnet.netlify.app"
}
</script>

<script type="application/ld+json">
{
 "@context":"https://schema.org",
 "@type":"Organization",
 "name":"MSTV Network",
 "url":"https://mstvnet.netlify.app",
 "logo":"https://mstvnet.netlify.app/mstv-thumbnail.png"
}
</script>

<style>
body{margin:0;font-family:Arial;background:#E8E4C9}

/* HEADER */
header{
 position:sticky;top:0;z-index:1000;
 background:#111;color:#fff;
 padding:10px;
 display:flex;justify-content:space-between;align-items:center;
}

/* PLAYER */
.player-wrap{
 position:sticky;top:60px;
 background:#E8E4C9;
 padding:10px;
 display:flex;justify-content:center;
}
.player{
 width:100%;max-width:800px;
 aspect-ratio:16/9;
 background:#000;
 position:relative;
}
.player video,.player iframe{
 position:absolute;width:100%;height:100%;display:none;
}

/* GRID */
.grid-wrap{
 height:calc(100vh - 140px);
 overflow-y:auto;
}
.grid{
 display:grid;
 grid-template-columns:repeat(auto-fill,minmax(120px,1fr));
 gap:10px;padding:15px;
}
.card{
 background:#fff;border-radius:8px;
 cursor:pointer;overflow:hidden;
}
.card img{
 width:100%;aspect-ratio:16/10;
 object-fit:cover;
}
.card.active{border:2px solid #4CAF50}

/* FOOTER */
footer{padding:20px;text-align:center}
</style>
</head>

<body>

<header>
<h1>MSTV Network</h1>
<input id="search" placeholder="Search channels">
</header>

<div class="player-wrap">
  <div class="player">
    <video id="video" controls playsinline></video>
    <iframe id="frame"></iframe>
  </div>
</div>

<div class="grid-wrap">
  <div class="grid" id="grid"></div>
</div>

<footer>
<h2>Watch Live Indian TV Channels Online</h2>
<p>
Stream Indian, Punjabi, religious channels and cricket matches online for free.
Works on mobile, tablet and desktop.
</p>
</footer>

<script>
const JSON_URL="./channels.json";

let channels=[];
let scrollPos=0;

const grid=document.getElementById('grid');
const video=document.getElementById('video');
const frame=document.getElementById('frame');

/* slug generator */
function slugify(name){
 return name.toLowerCase().replace(/[^a-z0-9]+/g,'-').replace(/(^-|-$)/g,'');
}

/* stop player */
function stop(){
 video.pause();
 video.src="";
 video.style.display="none";

 frame.src="";
 frame.style.display="none";
}

/* play channel */
function play(index){
 const ch=channels[index];
 if(!ch) return;

 scrollPos=document.querySelector('.grid-wrap').scrollTop;

 stop();

 const slug=slugify(ch.name);

/* SEO URL */
 history.replaceState(null,null,"/watch/"+slug);

/* Canonical update */
 const canon=document.querySelector("link[rel='canonical']");
 if(canon){
  canon.href="https://mstvnet.netlify.app/watch/"+slug;
 }

/* Dynamic SEO */
 document.title=ch.name+" Live | MSTV Network";

 document.querySelector('meta[name="description"]').setAttribute(
  "content","Watch "+ch.name+" live streaming online for free on MSTV Network."
 );

/* highlight */
 document.querySelectorAll('.card').forEach(c=>c.classList.remove('active'));
 document.querySelector(`[data-i="${index}"]`).classList.add('active');

/* play */
 if(ch.type==="iframe"){
  frame.style.display="block";
  frame.src=ch.url;
 }else{
  video.style.display="block";
  video.src=ch.url;
  video.play().catch(()=>{});
 }

/* restore scroll */
 requestAnimationFrame(()=>{
  document.querySelector('.grid-wrap').scrollTop=scrollPos;
 });
}

/* render channels */
function render(data){
 channels=Array.isArray(data)?data:data.channels;

 grid.innerHTML=channels.map((ch,i)=>`
  <div class="card" data-i="${i}">
    <img src="${ch.logo}" loading="lazy" decoding="async">
    <div style="padding:6px;text-align:center;font-size:0.85rem">${ch.name}</div>
  </div>
 `).join("");

 document.querySelectorAll('.card').forEach(card=>{
  card.onclick=()=>play(card.dataset.i);
 });

/* load from URL */
 const path=location.pathname.split("/watch/")[1]||"";
 if(path){
  const idx=channels.findIndex(c=>slugify(c.name)===path);
  if(idx>-1) play(idx);
 }
}

/* search */
document.getElementById('search').oninput=e=>{
 const t=e.target.value.toLowerCase();
 document.querySelectorAll('.card').forEach((c,i)=>{
  c.style.display=channels[i].name.toLowerCase().includes(t)?"block":"none";
 });
};

/* load JSON */
fetch(JSON_URL)
.then(r=>r.json())
.then(render)
.catch(()=>console.log("channels load error"));
</script>

</body>
</html>
