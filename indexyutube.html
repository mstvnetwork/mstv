<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>MSTV NETWORK - Optimized</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<script defer src="https://cdn.jsdelivr.net"></script>

<style>
/* 1. RESET & VIEWPORT LOCK */
* { margin: 0; padding: 0; box-sizing: border-box; }
body, html {
  height: 100dvh; width: 100vw; overflow: hidden;
  font-family: 'Helvetica Neue', Arial, sans-serif;
  background: #000; color: #eee;
}

/* 2. THE APP CONTAINER */
.app-container {
  display: flex; flex-direction: column; height: 100%;
}

/* 3. UPDATED HORIZONTAL HEADER */
header {
  flex-shrink: 0;
  background: #111419;
  padding: 10px 15px;
  display: flex;
  align-items: center; /* Vertically centers everything */
  justify-content: space-between; /* Logo on left, Search on right */
  gap: 15px;
  border-bottom: 1px solid #222;
}

.brand-section {
  display: flex;
  flex-direction: column;
  text-align: left; /* Aligns text to the left corner */
  min-width: fit-content;
}

.brand-name {
  font-size: 1.1rem; font-weight: bold;
  background: linear-gradient(90deg, #90EE90, #00FFA3);
  -webkit-background-clip: text; color: transparent;
  white-space: nowrap;
}

.slogan { font-size: 0.6rem; color: #ffd700; }

.search-container {
  flex-grow: 1; /* Allows search bar to take available space */
  display: flex;
  justify-content: flex-end;
}

#searchInput {
  width: 100%; max-width: 400px;
  padding: 8px 15px; border-radius: 20px;
  border: none; outline: none; font-size: 14px;
}

/* 4. MAIN VIEWER (No Gaps) */
.viewer-section {
  flex-grow: 0; /* Tighten player area */
  display: flex; flex-direction: column;
  align-items: center; background: #000;
}

.player-box {
  width: 100%; max-width: 1000px;
  aspect-ratio: 16 / 9; position: relative;
}

video, iframe {
  position: absolute; top: 0; left: 0;
  width: 100%; height: 100%; border: none;
}

#title { padding: 5px 0; font-size: 0.9rem; color: #fff; }

/* 5. CHANNEL LIST (Pushed up) */
.list-section {
  flex-grow: 1; /* Pulls the grid area up to fill space */
  background: #1a1d23;
  padding: 5px 0;
  overflow: hidden;
}

.grid {
  display: flex; overflow-x: auto; gap: 10px; padding: 0 15px;
}
.grid::-webkit-scrollbar { display: none; }

.channel {
  flex: 0 0 90px; height: 90px;
  background: #252a33; border-radius: 8px;
  position: relative; cursor: pointer; overflow: hidden;
}
.channel img { width: 100%; height: 100%; object-fit: cover; }
.channel div {
  position: absolute; bottom: 0; width: 100%;
  background: rgba(0,0,0,0.8); color: #fff;
  font-size: 9px; padding: 3px 2px; text-align: center;
}

/* MOBILE RESPONSIVE */
@media (max-width: 600px) {
  header { padding: 8px 10px; gap: 10px; }
  .brand-name { font-size: 0.9rem; }
  .slogan { display: none; } /* Hide slogan to save space on small screens */
  #searchInput { padding: 6px 12px; }
}
</style>
</head>

<body>
<div class="app-container">
  <header>
    <div class="brand-section">
      <div class="brand-name">🎬 MSTV NETWORK</div>
      <div class="slogan">LIVE INDIAN & PAKISTANI CHANNELS</div>
    </div>
    <div class="search-container">
      <input type="text" id="searchInput" placeholder="Search channels...">
    </div>
  </header>

  <main class="viewer-section">
    <div class="player-box">
      <video id="video" controls autoplay playsinline></video>
      <iframe id="iframePlayer" style="display:none;" allowfullscreen></iframe>
    </div>
    <div id="title">Loading Channel...</div>
  </main>

  <footer class="list-section">
    <div class="grid" id="channelList"></div>
  </footer>
</div>

<script>
const jsonFile = 'channels.json'; 
const video = document.getElementById('video');
const iframe = document.getElementById('iframePlayer');
const list = document.getElementById('channelList');
const searchInput = document.getElementById('searchInput');
const titleEl = document.getElementById('title');

let hls = null;

function playStream(url, type) {
  if(hls) { hls.destroy(); hls = null; }
  video.style.display = 'none'; iframe.style.display = 'none';
  video.src = ''; iframe.src = '';

  if (type === 'iframe') {
    iframe.style.display = 'block'; iframe.src = url;
    return;
  }

  video.style.display = 'block';
  if (url.includes('.m3u8')) {
    if (window.Hls && Hls.isSupported()) {
      hls = new Hls(); hls.loadSource(url); hls.attachMedia(video);
    } else { video.src = url; }
  } else { video.src = url; }
}

async function init() {
  try {
    const res = await fetch(jsonFile);
    const channels = await res.json();
    function render(data) {
      list.innerHTML = '';
      data.forEach(({ ch, index }) => {
        const div = document.createElement('div');
        div.className = 'channel';
        div.innerHTML = `<img src="${ch.logo}"><div>${ch.name}</div>`;
        div.onclick = () => {
          playStream(ch.url, ch.type);
          titleEl.innerText = ch.name;
          history.replaceState(null, '', '?=' + index);
        };
        list.appendChild(div);
      });
    }
    render(channels.map((ch, i) => ({ ch, index: i })));
    let id = parseInt(window.location.search.replace('?=', '')) || 0;
    if(channels[id]) {
      playStream(channels[id].url, channels[id].type);
      titleEl.innerText = channels[id].name;
    }
    searchInput.oninput = (e) => {
      const val = e.target.value.toLowerCase();
      render(channels.map((ch, i) => ({ ch, index: i })).filter(i => i.ch.name.toLowerCase().includes(val)));
    };
  } catch(e) { console.error(e); }
}
init();
</script>
</body>
</html>
