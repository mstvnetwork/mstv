<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Live TV Streaming</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<!-- Player Libraries -->
<script defer src="/shaka.js"></script>
<script defer src="/shaka/hls.min.js"></script>

<style>
/* ===== BODY ===== */
body {
  margin: 0;
  font-family: 'Helvetica Neue', Arial, sans-serif;
  background: #f0f0e6; /* Muddy white */
  color: #111;
}

/* ===== HEADER ===== */
header {
  display: flex;
  align-items: center;
  padding: 15px 30px;
  background: #e2e0d9;
  border-bottom: 1px solid #ccc;
  font-size: 24px;
  font-weight: bold;
  letter-spacing: 1px;
  position: sticky;
  top: 0;
  z-index: 1000;
}

/* ===== CONTAINER ===== */
.container {
  max-width: 1300px;
  margin: auto;
  padding: 20px;
}

/* ===== STICKY PLAYER ===== */
.player-box {
  background: #000;
  border-radius: 12px;
  overflow: hidden;
  position: sticky;
  top: 70px; /* below header */
  z-index: 999;
  width: 100%;
}

/* 16:9 RESPONSIVE PLAYER */
.player-box::before {
  content: "";
  display: block;
  padding-top: 56.25%; /* 16:9 aspect ratio */
}

video, iframe {
  position: absolute;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  border: none;
}

/* ===== CHANNEL TITLE ===== */
.channel-title {
  margin: 15px 0;
  font-size: 20px;
  font-weight: 600;
  text-align: center;
}



/* ===== HORIZONTAL CHANNEL GRID ===== */
.grid {
  display: flex;
  overflow-x: auto;
  padding: 15px 0;
  gap: 12px;
}

.grid::-webkit-scrollbar {
  height: 8px;
}

.grid::-webkit-scrollbar-thumb {
  background-color: #aaa;
  border-radius: 4px;
}

.channel {
  flex: 0 0 160px; /* fixed width cards */
  background: #e2e0d9;
  padding: 10px;
  border-radius: 10px;
  text-align: center;
  cursor: pointer;
  transition: transform 0.2s, background 0.2s;
}

.channel:hover {
  background: #d6d4c8;
  transform: scale(1.05);
}

.channel img {
  width: 100%;
  height: 90px;
  object-fit: contain;
  border-radius: 6px;
  margin-bottom: 8px;
}

/* ===== FOOTER ===== */
footer {
  margin-top: 40px;
  padding: 20px;
  text-align: center;
  font-size: 13px;
  color: #555;
  border-top: 1px solid #ccc;
}
</style>
</head>

<body>

<header>
  🎬 Live OTT TV
</header>

<div class="container">

  <!-- FEATURED PLAYER -->
  <div class="player-box">
    <video id="video" controls></video>
    <iframe id="iframePlayer" allowfullscreen></iframe>
  </div>

  <div class="channel-title" id="title">Loading Channel...</div>

  
  <!-- HORIZONTAL CHANNEL GRID -->
  <div class="grid" id="channelList"></div>

</div>

<footer>
  © 2026 Live Streaming OTT • All rights reserved
</footer>

<script>
// ===== CONFIG =====
const jsonFile = '/channels.json';

// ===== SAFE ELEMENT GETTER =====
function getOrCreate(id, tag, parent = document.body) {
  let el = document.getElementById(id);
  if (!el) {
    el = document.createElement(tag);
    el.id = id;
    parent.appendChild(el);
  }
  return el;
}

// ===== ELEMENTS =====
const video = getOrCreate('video', 'video');
const iframe = getOrCreate('iframePlayer', 'iframe');
const embedBox = getOrCreate('embedCode', 'textarea');
const list = getOrCreate('channelList', 'div');

video.controls = true;
iframe.allowFullscreen = true;

// ===== PLAYER LOGIC =====
let hlsInstance = null;
let shakaPlayer = null;

function getChannelIndex() {
  const match = window.location.search.match(/=(\d+)/);
  return match ? parseInt(match[1]) : 0;
}

function destroyPlayers() {
  if (hlsInstance) { hlsInstance.destroy(); hlsInstance = null; }
  if (shakaPlayer) { shakaPlayer.destroy(); shakaPlayer = null; }
}

function playStream(url, type) {
  destroyPlayers();
  if (video) video.style.display = 'none';
  if (iframe) iframe.style.display = 'none';

  if (type === 'iframe') {
    if (iframe) { iframe.style.display = 'block'; iframe.src = url; }
    return;
  }

  if (video) video.style.display = 'block';

  if (url.includes('.m3u8')) {
    if (window.Hls && Hls.isSupported()) {
      hlsInstance = new Hls();
      hlsInstance.loadSource(url);
      hlsInstance.attachMedia(video);
    } else {
      video.src = url;
    }
  } else if (url.includes('.mpd')) {
    shakaPlayer = new shaka.Player(video);
    shakaPlayer.load(url);
  } else {
    video.src = url;
  }
}

// ===== INIT =====
async function init() {
  const res = await fetch(jsonFile, { cache: 'no-store' });
  const channels = await res.json();

  let id = getChannelIndex();

  function play(index) {
    if (!channels[index]) index = 0;

    const ch = channels[index];

    playStream(ch.url, ch.type || 'auto');

    document.title = ch.name + ' Live Stream';
    if (document.getElementById('title')) document.getElementById('title').innerText = ch.name + ' Live Stream';

    history.replaceState(null, '', '?=' + index);

    const embedURL = window.location.origin + window.location.pathname + '?=' + index;

    embedBox.value = `<iframe src="${embedURL}" width="100%" height="600" frameborder="0" allowfullscreen></iframe>`;
  }

  play(id);

  channels.forEach((ch, i) => {
    const div = document.createElement('div');
    div.className = 'channel';
    div.innerHTML = `
      <img src="${ch.logo}" alt="${ch.name}">
      <div>${ch.name}</div>
    `;
    div.onclick = () => play(i);
    list.appendChild(div);
  });
}

init();
</script>

</body>
</html>
