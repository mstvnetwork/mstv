<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Live TV Player</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<!-- Player Libraries -->
<script defer src="./shaka.js"></script>
<script defer src="./shaka/hls.min.js"></script>

<style>
body { margin:0; background:#111; color:#fff; font-family:Arial }
#video, #iframePlayer { width:100%; height:60vh; background:#000 }
.channels { display:grid; grid-template-columns:repeat(auto-fill,minmax(120px,1fr)); gap:10px; padding:10px }
.channel { background:#1c1c1c; padding:10px; text-align:center; border-radius:10px; cursor:pointer }
.channel img { width:60px; height:60px; object-fit:contain }
.embedBox { padding:10px; background:#000 }
textarea { width:100%; height:60px }
</style>
</head>

<body>

<video id="video" controls autoplay muted playsinline></video>
<iframe id="iframePlayer" style="display:none;border:none;" allowfullscreen></iframe>

<div class="embedBox">
<strong>Embed Code:</strong>
<textarea id="embedCode" readonly></textarea>
</div>

<div class="channels" id="channelList"></div>

<script>
const jsonFile = 'channels2.json';

let video = document.getElementById('video');
let iframe = document.getElementById('iframePlayer');
let embedBox = document.getElementById('embedCode');

let hlsInstance = null;
let shakaPlayer = null;

// ✅ Robust URL parser (FIXED)
function getChannelIndex() {
  const search = window.location.search;

  const match = search.match(/=(\d+)/);

  if (match && match[1]) {
    return parseInt(match[1]);
  }

  return 0;
}

function destroyPlayers() {
  if (hlsInstance) {
    hlsInstance.destroy();
    hlsInstance = null;
  }
  if (shakaPlayer) {
    shakaPlayer.destroy();
    shakaPlayer = null;
  }
}

function playStream(url, type) {
  destroyPlayers();

  video.style.display = 'none';
  iframe.style.display = 'none';

  // IFRAME
  if (type === 'iframe') {
    iframe.style.display = 'block';
    iframe.src = url;
    return;
  }

  video.style.display = 'block';

  // HLS
  if (url.includes('.m3u8')) {
    if (window.Hls && Hls.isSupported()) {
      hlsInstance = new Hls();
      hlsInstance.loadSource(url);
      hlsInstance.attachMedia(video);
    } else {
      video.src = url;
    }
  }

  // DASH
  else if (url.includes('.mpd')) {
    shakaPlayer = new shaka.Player(video);
    shakaPlayer.load(url);
  }

  // Normal MP4
  else {
    video.src = url;
  }
}

async function init() {
  const res = await fetch(jsonFile, { cache: 'no-store' });
  const channels = await res.json();

  let id = getChannelIndex();

  const list = document.getElementById('channelList');

  function play(index) {
    if (!channels[index]) index = 0;

    const ch = channels[index];

    playStream(ch.url, ch.type || 'auto');

    // Update URL
    history.replaceState(null, '', '?=' + index);

    // Update title (SEO)
    document.title = ch.name + ' Live Stream';

    // Generate embed (FULL UI)
    const embedURL = window.location.origin + window.location.pathname + '?=' + index;

    embedBox.value = `<iframe src="${embedURL}" width="100%" height="600" frameborder="0" allowfullscreen></iframe>`;
  }

  // Load initial channel
  play(id);

  // Build channel list
  channels.forEach((ch, i) => {
    const div = document.createElement('div');
    div.className = 'channel';
    div.innerHTML = `
      <img src="${ch.logo}">
      <div>${ch.name}</div>
    `;
    div.onclick = () => play(i);
    list.appendChild(div);
  });
}

init();
</script>


</body>
</html>
