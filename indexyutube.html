<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Free Live TV Streaming Online | MSTV Network</title>

<style>
:root {
  --header-h: 70px;
  --player-h: auto;
}

/* Base */
html, body {
  margin:0;
  font-family:Arial,sans-serif;
  background:#E8E4C9;
  overflow-x:hidden;
}

/* Layout wrapper (fixes centering globally) */
.page-wrapper{
  max-width:900px;
  margin:0 auto;
  width:100%;
}

/* Header */
header {
  position:sticky;
  top:0;
  z-index:1000;
  background:#111419;
  height:var(--header-h);
  display:flex;
  align-items:center;
  justify-content:space-between;
  padding:0 16px;
  color:#fff;
}

/* Player sticky */
.sticky-player-wrapper {
  position:sticky;
  top:var(--header-h);
  z-index:900;
  background:#E8E4C9;
  padding:12px 0;
  display:flex;
  justify-content:center;
}

/* Proper centered player */
.player-container {
  width:100%;
  max-width:800px;
  aspect-ratio:16/9;
  background:#000;
  border-radius:12px;
  overflow:hidden;
  position:relative;
}

/* Player elements */
video, iframe {
  position:absolute;
  width:100%;
  height:100%;
  display:none;
}

#placeholder {
  display:flex;
  align-items:center;
  justify-content:center;
  height:100%;
  font-size:3rem;
}

/* Scrollable grid container */
.grid-wrapper{
  height:calc(100vh - 140px);
  overflow-y:auto;
}

/* Channel grid */
.channel-grid {
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(120px,1fr));
  gap:15px;
  padding:20px;
}

.channel-card {
  background:#F5F1DC;
  border-radius:10px;
  overflow:hidden;
  cursor:pointer;
}

.channel-card img {
  width:100%;
  aspect-ratio:16/10;
  object-fit:cover;
}

.channel-name {
  padding:6px;
  text-align:center;
  font-size:0.85rem;
}
</style>
</head>

<body>

<div class="page-wrapper">

<header>
  <div>MSTV NETWORK</div>
  <input id="channel-search" placeholder="Search..." />
</header>

<section class="sticky-player-wrapper">
  <div class="player-container">
    <div id="placeholder">📺</div>
    <video id="video-player" controls></video>
    <iframe id="iframe-player"></iframe>
  </div>
</section>

<main class="grid-wrapper">
  <div class="channel-grid" id="channel-list-container"></div>
</main>

</div>

<script>
const JSON_URL = "https://mstvnet.netlify.app/channels.json";

const grid = document.getElementById('channel-list-container');
const v = document.getElementById('video-player');
const i = document.getElementById('iframe-player');
const placeholder = document.getElementById('placeholder');
const search = document.getElementById('channel-search');

let channels=[];
let scrollPosition = 0;

/* STOP PLAYER */
function stopAll(){
  v.pause();
  v.src="";
  v.style.display="none";
  i.src="about:blank";
  i.style.display="none";
  placeholder.style.display="flex";
}

/* PLAY CHANNEL (NO SCROLL JUMP) */
function playChannel(index){
  const ch = channels[index];
  if(!ch) return;

  /* SAVE scroll before anything changes */
  scrollPosition = document.querySelector('.grid-wrapper').scrollTop;

  stopAll();

  placeholder.style.display="none";

  if(ch.type==="iframe"){
    i.style.display="block";
    i.src = ch.url;
  } else {
    v.style.display="block";
    v.src = ch.url;
    v.play().catch(()=>{});
  }

  /* RESTORE scroll instantly */
  requestAnimationFrame(()=>{
    document.querySelector('.grid-wrapper').scrollTop = scrollPosition;
  });
}

/* RENDER CHANNELS */
function renderUI(data){
  channels = Array.isArray(data) ? data : data.channels;

  grid.innerHTML = channels.map((ch, i)=>`
    <div class="channel-card" data-index="${i}">
      <img src="${ch.logo}">
      <div class="channel-name">${ch.name}</div>
    </div>
  `).join("");

  document.querySelectorAll('.channel-card').forEach(card=>{
    card.onclick = ()=> playChannel(card.dataset.index);
  });
}

/* SEARCH */
search.addEventListener('input', e=>{
  const term = e.target.value.toLowerCase();
  document.querySelectorAll('.channel-card').forEach((card,i)=>{
    card.style.display = channels[i].name.toLowerCase().includes(term) ? "block" : "none";
  });
});

/* LOAD */
(async()=>{
  const res = await fetch(JSON_URL);
  const data = await res.json();
  renderUI(data);
})();
</script>

</body>
</html>
