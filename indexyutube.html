<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Live TV Streaming</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

<!-- Player Libraries -->
<script defer src="/shaka.js"></script>
<script defer src="/shaka/hls.min.js"></script>

<style>
/* ===== 1. CORE LAYOUT: NO SCROLLING ===== */
* { margin: 0; padding: 0; box-sizing: border-box; }

body, html {
  height: 100%;
  width: 100%;
  overflow: hidden; /* Prevents the whole page from scrolling */
  font-family: 'Helvetica Neue', Arial, sans-serif;
  background: #f0f0e6;
  color: #111;
}

/* Flex Container for the entire app */
.app-wrapper {
  display: flex;
  flex-direction: column;
  height: 100vh;
  width: 100vw;
}

/* ===== 2. HEADER (Fixed height) ===== */
header {
  flex-shrink: 0;
  background: #111419;
  padding: 10px 15px;
  border-bottom: 1px solid #222;
  display: flex;
  flex-direction: column;
  align-items: center;
}

.brand-name {
  font-size: 1.2rem; font-weight: bold;
  background: linear-gradient(90deg, #90EE90, #00FFA3);
  -webkit-background-clip: text; color: transparent;
}
.slogan { font-size: 0.65rem; color: yellow; margin-bottom: 5px; }

.search-box { width: 100%; max-width: 400px; }
#searchInput {
  width: 100%; padding: 8px 15px;
  border-radius: 20px; border: none; outline: none;
  font-size: 14px; background: #fff;
}

/* ===== 3. PLAYER AREA (Flexible center) ===== */
.main-viewer {
  flex-grow: 1; /* Takes all remaining vertical space */
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  padding: 10px;
  background: #000; /* Theater background */
  overflow: hidden;
}

.player-box {
  width: 100%;
  max-width: 1000px; /* Adjust based on preference */
  aspect-ratio: 16 / 9;
  position: relative;
  border-radius: 8px;
  overflow: hidden;
  box-shadow: 0 5px 25px rgba(0,0,0,0.5);
}

video, iframe {
  position: absolute; top: 0; left: 0;
  width: 100%; height: 100%; border: none;
}

.channel-title {
  color: #fff;
  margin-top: 10px;
  font-size: 16px;
  font-weight: 500;
}

/* ===== 4. CHANNEL LIST (Bottom horizontal scroll) ===== */
.grid-wrapper {
  flex-shrink: 0;
  background: #f0f0e6;
  padding: 10px 0;
  border-top: 1px solid #ccc;
}

.grid {
  display: flex;
  flex-direction: row;
  overflow-x: auto;
  overflow-y: hidden;
  gap: 12px;
  padding: 0 15px 10px 15px;
  -webkit-overflow-scrolling: touch;
}

/* Hide horizontal scrollbar for clean look */
.grid::-webkit-scrollbar { display: none; }
.grid { -ms-overflow-style: none; scrollbar-width: none; }

.channel {
  flex: 0 0 110px;
  height: 110px;
  background: #fff;
  border-radius: 10px;
  position: relative;
  cursor: pointer;
  overflow: hidden;
  box-shadow: 0 2px 8px rgba(0,0,0,0.1);
  transition: transform 0.2s;
}

.channel:active { transform: scale(0.95); }

.channel img { width: 100%; height: 100%; object-fit: cover; }
.channel div {
  position: absolute; bottom: 0; width: 100%;
  background: rgba(0,0,0,0.7); color: #fff;
  font-size: 10px; padding: 4px 0; text-align: center;
}

/* Footer hidden for app-mode (Optional) */
.site-footer { display: none; }

/* Responsive tweaks for mobile landscape or small heights */
@media (max-height: 500px) {
  .brand-name, .slogan { display: none; }
  .channel { flex: 0 0 80px; height: 80px; }
}
</style>
</head>

<body>

<div class="app-wrapper">
  <header>
    <div class="brand-name">🎬 MSTV NETWORK</div>
    <div class="slogan">LIVE INDIAN PAKISTANI & ENGLISH CHANNELS</div>
    <div class="search-box">
      <input type="text" id="searchInput" placeholder="Search channels...">
    </div>
  </header>

  <div class="main-viewer">
    <div class="player-box">
      <video id="video" controls></video>
      <iframe id="iframePlayer" allowfullscreen sandbox="allow-scripts allow-same-origin"></iframe>
    </div>
    <div class="channel-title" id="title">Loading...</div>
  </div>

  <div class="grid-wrapper">
    <div class="grid" id="channelList"></div>
  </div>
</div>

<script>
const jsonFile = '/channels.json';
const video = document.getElementById('video');
const iframe = document.getElementById('iframePlayer');
const list = document.getElementById('channelList');
const searchInput = document.getElementById('searchInput');
const titleDisplay = document.getElementById('title');

let hlsInstance = null;
let shakaPlayer = null;

function getChannelIndex() {
  const match = window.location.search.match(/=(\d+)/);
  return match ? parseInt(match[1]) : 0;
}

function destroyPlayers() {
  if (hlsInstance) { hlsInstance.destroy(); hlsInstance = null; }
  if (shakaPlayer) { shakaPlayer.destroy(); shakaPlayer = null; }
}

function playStream(url, type) {
  destroyPlayers();
  video.style.display = 'none';
  iframe.style.display = 'none';
  video.src = '';
  iframe.src = '';

  if (type === 'iframe') {
    iframe.style.display = 'block';
    iframe.src = url;
    return;
  }

  video.style.display = 'block';
  if (url.includes('.m3u8')) {
    if (window.Hls && Hls.isSupported()) {
      hlsInstance = new Hls();
      hlsInstance.loadSource(url);
      hlsInstance.attachMedia(video);
      hlsInstance.on(Hls.Events.MANIFEST_PARSED, () => video.play().catch(()=>{}));
    } else {
      video.src = url;
    }
  } else if (url.includes('.mpd')) {
    shakaPlayer = new shaka.Player(video);
    shakaPlayer.load(url).catch(console.error);
  } else {
    video.src = url;
  }
}

async function init() {
  try {
    const res = await fetch(jsonFile, { cache: 'no-store' });
    const channels = await res.json();

    function play(index) {
      const ch = channels[index];
      if (!ch) return;
      playStream(ch.url, ch.type || 'auto');
      document.title = ch.name + ' Live';
      titleDisplay.innerText = ch.name + ' Live Stream';
      history.replaceState(null, '', '?=' + index);
    }

    function renderChannels(filtered) {
      list.innerHTML = '';
      filtered.forEach(({ ch, index }) => {
        const div = document.createElement('div');
        div.className = 'channel';
        div.innerHTML = `<img src="${ch.logo}"><div>${ch.name}</div>`;
        div.onclick = () => play(index);
        list.appendChild(div);
      });
    }

    renderChannels(channels.map((ch, i) => ({ ch, index: i })));
    play(getChannelIndex());

    searchInput.addEventListener('input', (e) => {
      const val = e.target.value.toLowerCase();
      const filtered = channels
        .map((ch, i) => ({ ch, index: i }))
        .filter(item => item.ch.name.toLowerCase().includes(val));
      renderChannels(filtered);
    });

  } catch (e) {
    console.error("Initialization failed", e);
  }
}

init();
</script>
</body>
</html>
