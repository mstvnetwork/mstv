<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Simple HLS Player</title>
  <!-- Load HLS.js library for Chrome, Edge, and Firefox support -->
  <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
  <style>
    body { margin: 0; background: #000; display: flex; justify-content: center; align-items: center; height: 100vh; }
    video { width: 100%; height: 100%; max-height: 100vh; object-fit: contain; }
  </style>
</head>
<body>

  <!-- Controls are visible, muted and playsinline are mandatory for autoplay -->
  <video id="video" controls autoplay muted playsinline></video>

  <script>
    const video = document.getElementById('video');
    
    // 🛠️ PASTE YOUR M3U8 URL HERE
    const streamUrl = 'https://zggg98sgwbg1gh.bitchute.com/0VVyOZY9dPcp/Vhk2ncpoTQed.mp4'; 

    if (Hls.isSupported()) {
      const hls = new Hls();
      hls.loadSource(streamUrl);
      hls.attachMedia(video);
    } 
    // Native support for Safari (Mac/iOS)
    else if (video.canPlayType('application/vnd.apple.mpegurl')) {
      video.src = streamUrl;
    }
  </script>

</body>
</html>
