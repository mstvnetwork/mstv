async function initPlayer() {
            const video = document.getElementById('video');
            const ui = video['ui'];
            const player = ui.getControls().getPlayer();

            // Get ID from the URL (e.g., ?1)
            const channelId = window.location.search.substring(1);
            const selected = CHANNELS[channelId];

            if (selected) {
                // DRM Configuration
                const servers = {};
                if (selected.widevine) servers['com.widevine.alpha'] = selected.widevine;
                if (selected.playready) servers['com.microsoft.playready'] = selected.playready;

                if (Object.keys(servers).length > 0) {
                    player.configure({ drm: { servers: servers } });
                }

                try {
                    await player.load(selected.url);
                } catch (e) {
                    console.error('Playback Error', e);
                }
            }
        }

        document.addEventListener('shaka-ui-loaded', initPlayer);
