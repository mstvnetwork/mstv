<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MSTV Player Pro</title>
    
    <!-- 1. Mux.js: Required for HLS (Channel 5) support in Shaka -->
    <script src="https://cdnjs.cloudflare.com"></script>
    
    <!-- 2. Shaka Player: Using CDN to avoid 404 Not Found errors on Netlify -->
    <script src="https://cdnjs.cloudflare.com"></script>
    
    <style>
        body, html { margin: 0; padding: 0; background: #000; height: 100%; width: 100%; overflow: hidden; display: flex; align-items: center; justify-content: center; }
        #video { width: 100%; height: 100%; background: #000; outline: none; }
        #status-overlay { 
            position: absolute; top: 15px; left: 15px; 
            color: #00ffA0; font-family: sans-serif; font-size: 16px; 
            z-index: 10; text-shadow: 2px 2px 4px #000;
            pointer-events: none;
        }
    </style>
</head>
<body>

    <div id="status-overlay">MSTV | Initializing...</div>
    <!-- crossorigin="anonymous" is critical for fixing 7002 CORS errors -->
    <video id="video" autoplay controls crossorigin="anonymous"></video>

    <script>
        const channels = {
    "1": {
        name: "Zee TV",
        url: "https://d1g8wgjurz8via.cloudfront.net/bpk-tv/Zeetv/default/main.mpd",
        type: "shaka",
        drm: { 'ed068cf84f0640ccbc7c0e395c0a272e': 'bb722190f2bb446391020411a7d0828b' }
    },
    "2": {
        name: "Willow Cricket 2",
        url: "https://restream-live.realiptv.to/live/ALEX/sg5ng25ikf/3973.m3u8",
        type: "hls"
    },
    "3": {
        name: "Deewana HD",
        
        url: "https://live20.bozztv.com/giatvplayout7/giatv-209592/index.m3u8",
        type: "hls",
    },
    "4": {
        name: "Sky Sports",
        
        url: "https://nl1.rocketdns.info:25463/live/ALEX/sg5ng25ikf/2192.m3u8?token=HkNcWEBYFAkUUgsCA1UFVgFeUlYHAFEHWlFRUwpRVwIGWFUOUlVVAQUSH0ZAFRFRUwtoXlQaXgFTWAEdERBBVhc+XV0RChQABAgAVgJDTxZGD1pSEgJUH0ARWlURXxAGUFkNDAESGhFTSEcBQQ8CWG0CUkFZWwERWA9GXV9JEFwLPlBcXlFYVxQKEVQRTUFdQRYVDV5NCF9OQ1FYRxdTRwBDDhsEAQ8AFBwRB1wUDUBAHxUNEnkxEU5DVklHAFxADA5aGwkSWwBDCBFIEQgQa0ADRENCXQVeBxMRCxFVEB9HDFVBbFNZXVhVUBBaDg1HEFwVBAAIRh9ADFxfWhFdQToRXV0RChQEDgcCVwZDHg==",
        type: "shaka",
    },
     "5": {
        name: "Star Gold ",
        url: "https://anywhere.pwisetthon.com/http://tvn2.chowdhury-shaheb.com/stargold/tracks-v1a1/mono.m3u8",
        type: "hls",
    },
    
    "6": {
        name: "Zindgi Tv (Pak)",
        url: "https://5ad386ff92705.streamlock.net/live_transcoder/ngrp:zindagitv.stream_all/chunklist.m3u8",
        type: "hls"
    }
};

        let player;

        async function initApp() {
            if (typeof shaka === 'undefined') {
                document.getElementById('status-overlay').innerText = "Error: Library not loaded!";
                return;
            }

            shaka.polyfill.installAll();
            const video = document.getElementById('video');
            
            // Fix 7002: Ensure player is attached to video tag immediately
            player = new shaka.Player(video);

            // Conditional Header: Only for Zee TV Cloudfront links
            player.getNetworkingEngine().registerRequestFilter((type, request) => {
                if (request.uris.some(u => u.includes('cloudfront.net'))) {
                    request.headers['Origin'] = 'https://www.zee5.com';
                    request.headers['Referer'] = 'https://www.zee5.com';
                }
            });

            player.addEventListener('error', (e) => {
                console.error('Shaka Error:', e.detail.code);
                document.getElementById('status-overlay').innerText = "Error: " + e.detail.code;
            });

            const query = window.location.search.substring(1);
            const chId = query || "1"; 
            loadChannel(chId);
        }

        async function loadChannel(id) {
            const ch = channels[id];
            const status = document.getElementById('status-overlay');

            if (!ch) {
                status.innerText = "Channel Not Found";
                return;
            }

            status.innerText = "MSTV | " + ch.name;

            try {
                // Completely clear previous session before loading
                await player.unload();
                
                player.resetConfiguration();
                if (ch.drm) {
                    player.configure({ drm: { clearKeys: ch.drm } });
                }

                await player.load(ch.url);
                console.log("MSTV: Successfully loaded " + ch.name);
            } catch (e) {
                status.innerText = "Load Failed: " + e.code;
                console.error("Load Error:", e);
            }
        }

        document.addEventListener('DOMContentLoaded', initApp);
    </script>
</body>
</html>
