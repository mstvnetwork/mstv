<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MSTV Player - Shaka</title>
    
    <!-- 1. Mux.js: Required to play HLS (.m3u8) on browsers like Chrome -->
    <script src="https://cdnjs.cloudflare.com"></script>
    
    <!-- 2. Your local Shaka library renamed to shaka.js -->
    <script src="shaka.js"></script>
    
    <style>
        body, html { margin: 0; padding: 0; background: #000; height: 100%; width: 100%; overflow: hidden; display: flex; align-items: center; justify-content: center; }
        #video { width: 100%; height: 100%; background: #000; }
        #status-overlay { 
            position: absolute; top: 15px; left: 15px; 
            color: #00ffA0; font-family: sans-serif; font-size: 16px; 
            z-index: 10; text-shadow: 2px 2px 4px #000;
        }
    </style>
</head>
<body>

    <div id="status-overlay">MSTV | Initializing...</div>
    <video id="video" autoplay controls crossorigin="anonymous"></video>

    <script>
        const channels = {
            "1": {
                name: "Zee TV",
                url: "https://d1g8wgjurz8via.cloudfront.net/bpk-tv/Zeetv/default/main.mpd?",
                drm: { 'ed068cf84f0640ccbc7c0e395c0a272e': 'bb722190f2bb446391020411a7d0828b' }
            },
            "2": {
                name: "Willow Cricket 2",
                url: "https://restream-live.realiptv.to"
            },
            "3": {
                name: "Deewana HD",
                url: "https://live20.bozztv.com"
            },
            "4": {
                name: "Sky Sports",
                url: "https://nl1.rocketdns.info"
            },
            "5": {
                name: "Star Gold",
                url: "https://anywhere.pwisetthon.com"
            },
            "6": {
                name: "Zindgi Tv (Pak)",
                url: "https://5ad386ff92705.streamlock.net"
            }
        };

        let player;

        async function initApp() {
            // Check if shaka.js is correctly linked
            if (typeof shaka === 'undefined') {
                document.getElementById('status-overlay').innerText = "Error: shaka.js not found!";
                return;
            }

            shaka.polyfill.installAll();
            if (!shaka.Player.isBrowserSupported()) {
                alert("This browser is not supported!");
                return;
            }

            const video = document.getElementById('video');
            player = new shaka.Player(video);

            // CONDITIONAL HEADERS: Only attaches Zee5 headers to Zee5 cloudfront links
            player.getNetworkingEngine().registerRequestFilter((type, request) => {
                if (request.uris.some(u => u.includes('cloudfront.net'))) {
                    request.headers['Origin'] = 'https://www.zee5.com';
                    request.headers['Referer'] = 'https://www.zee5.com';
                }
            });

            // Parse URL for channel ID (e.g., ?5)
            const query = window.location.search.substring(1);
            const chId = query || "1"; 
            loadChannel(chId);
        }

        async function loadChannel(id) {
            const ch = channels[id];
            const status = document.getElementById('status-overlay');

            if (!ch) {
                status.innerText = "Error: Channel " + id + " not found.";
                return;
            }

            status.innerText = "MSTV | " + ch.name;

            // Reset and configure DRM if necessary
            player.resetConfiguration();
            if (ch.drm) {
                player.configure({ drm: { clearKeys: ch.drm } });
            }

            try {
                // Unload previous content before loading new one
                await player.unload();
                await player.load(ch.url);
                console.log("Channel loaded successfully!");
            } catch (e) {
                status.innerText = "Playback Error: " + e.code;
                console.error("Shaka Load Error:", e);
            }
        }

        document.addEventListener('DOMContentLoaded', initApp);
    </script>
</body>
</html>
