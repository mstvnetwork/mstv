[build]
  command = "node generate-sitemap.js"
  publish = "."

[[headers]]
  for = "/sitemap.xml"
  [headers.values]
    Content-Type = "application/xml"
    X-Content-Type-Options = "nosniff"

[[headers]]
  for = "/*"
  [headers.values]
    # Fixed: Added 'unsafe-inline' for styles and scripts to stop the "Violation" errors
    Content-Security-Policy = "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; object-src 'none'; upgrade-insecure-requests;"
    Cross-Origin-Opener-Policy = "same-origin"
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "same-origin"
    Strict-Transport-Security = "max-age=31536000; includeSubDomains; preload"

[[redirects]]
  from = "/channels_pages/*"
  to = "/channels_pages/:splat"
  status = 200

[[redirects]]
  from = "/channel/:slug"
  to = "/index.html?ch=:slug"
  status = 200

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
