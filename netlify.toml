[[headers]]
  for = "/*"
  [headers.values]
    Content-Security-Policy = "script-src 'strict-dynamic' 'sha256-v6yrXMlmYqqfbvA3PAUeDj+DqUK1Q2msHP9jkPaYJUg='; object-src 'none'; base-uri 'none'; require-trusted-types-for 'script';"
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "camera=(), microphone=(), geolocation=()"

[[headers]]
  for = "/channels2.json"
  [headers.values]
    Cache-Control = "public, max-age=300"

[[headers]]
  for = "/*.webp"
  [headers.values]
    Cache-Control = "public, max-age=86400"
