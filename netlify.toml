# --- 1. PROXY REDIRECT (Fixes Chrome/CORS/Astro playback) ---
[[redirects]]
  from = "/proxy/*"
  to = "https://:splat"
  status = 200
  force = true
  [redirects.headers]
    User-Agent = "Mozilla/5.0 (iPhone; CPU iPhone OS 17_0 like Mac OS X) AppleWebKit/605.1.15 (KHTML, like Gecko) Version/17.0 Mobile/15E148 Safari/604.1"
    Referer = "https://criccoder.pages.dev"
    Access-Control-Allow-Origin = "*"

# --- 2. YOUR EXISTING REDIRECTS (From your _redirects file) ---
[[redirects]]
  from = "/channels.json"
  to = "/channels.json"
  status = 200

[[redirects]]
  from = "/*.m3u8"
  to = "/:splat"
  status = 200

[[redirects]]
  from = "/shaka/*"
  to = "/shaka/indexstargold.html"
  status = 200

# --- 3. HEADERS (Sitemap & Security) ---
[[headers]]
  for = "/sitemap.xml"
  [headers.values]
    Content-Type = "application/xml"
    X-Content-Type-Options = "nosniff"

# --- 4. CATCH-ALL (SPA Routing) ---
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
