[build]
  command = "node generate-sitemap.js"
  publish = "."

[[headers]]
  for = "/sitemap.xml"
  [headers.values]
    Content-Type = "application/xml"
    X-Content-Type-Options = "nosniff"

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "SAMEORIGIN"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "camera=(), microphone=(), geolocation=()"
    Content-Security-Policy = "default-src 'self'; script-src 'self' 'unsafe-inline' https://cdn.jsdelivr.net https://cdnjs.cloudflare.com https://gc.zgo.at; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src https://fonts.gstatic.com; img-src 'self' data: https://cdn.jsdelivr.net https://mstvnet.netlify.app; media-src 'self' https: blob:; frame-src https:; connect-src 'self' https:; worker-src blob:;"

# 1. Direct access to your SEO pages for Google
[[redirects]]
  from = "/channels_pages/*"
  to = "/channels_pages/:splat"
  status = 200

# 2. Clean URLs (e.g., /channel/9x-jalwa -> player)
[[redirects]]
  from = "/channel/:slug"
  to = "/index.html?ch=:slug"
  status = 200

# 3. Catch-all for your Single Page App (Moved to bottom)
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
