<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <!-- CRITICAL: Prevents the browser from scaling out on rotation -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0">
    <style>
        :root { --live-red: #ff0033; }
        
        /* LOCKS THE BACKGROUND: Prevents showing anything outside the player */
        html, body { 
            margin: 0; padding: 0; 
            width: 100%; height: 100%; 
            background: #000; 
            overflow: hidden; /* Disables page scrolling */
            position: fixed; /* Freezes the background layer */
        }

        /* FULL SCREEN VIEWPORT */
        .viewport {
            position: fixed; /* Stays locked to the screen corners */
            top: 0; left: 0; 
            width: 100vw; height: 100vh;
            background: #000;
            display: flex; align-items: center; justify-content: center;
            z-index: 9999;
        }

        /* IFRAME CROPPING: Tuned for 16:9 while hiding edges */
        #captureFrame {
            position: absolute;
            width: 130%; height: 130%; /* Oversize to hide source UI */
            border: none;
            opacity: 0;
            transition: opacity 1s ease;
        }

        /* SLEEK OVERLAY */
        #masterOverlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            z-index: 100; cursor: pointer;
            background: rgba(0, 0, 0, 0.5); /* Slight dim to show video is loaded */
            display: flex; flex-direction: column;
            transition: opacity 0.5s ease;
        }

        .ticker-wrap {
            width: 100%; background: rgba(10, 10, 10, 0.9);
            backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px);
            color: #fff; white-space: nowrap; overflow: hidden;
            padding: 15px 0; border-bottom: 2px solid var(--live-red);
        }

        .ticker-text {
            display: inline-block; padding-left: 100%;
            animation: marquee 20s linear infinite;
            font-family: sans-serif; font-size: 18px;
        }

        @keyframes marquee { 0% { transform: translateX(0); } 100% { transform: translateX(-100%); } }
        .hidden { display: none !important; }
    </style>
</head>
<body>

    <div class="viewport">
        <div id="masterOverlay" onclick="removeOverlay()">
            <div class="ticker-wrap">
                <div class="ticker-text">
                    🔴 COLORS TV HD: CLICK ANYWHERE TO START WATCHING NOW — कलर्स टीवी एचडी: देखने के लिए कहीं भी क्लिक करें 🔴
                </div>
            </div>
        </div>

        <iframe id="captureFrame" 
                src="https://tulnit.com/live/bollywood-colors/" 
                scrolling="no" 
                sandbox="allow-forms allow-scripts allow-same-origin">
        </iframe>
    </div>

    <script>
        const iframe = document.getElementById('captureFrame');
        const overlay = document.getElementById('masterOverlay');

        // Reveal everything only when the content is ready
        iframe.addEventListener('load', function() {
            iframe.style.opacity = "1";
        });

        function removeOverlay() {
            overlay.classList.add('hidden');
            // This ensures the first click passes through instantly
            overlay.style.pointerEvents = 'none';
        }

        // AUTO-CORRECT ROTATION: Forces the browser to refocus on the player if rotated
        window.addEventListener("orientationchange", function() {
            window.scrollTo(0, 0);
        });
    </script>

</body>
</html>
