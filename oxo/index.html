<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0">
    <style>
        :root { --live-red: #ff0033; }
        
        html, body { 
            margin: 0; padding: 0; width: 100%; height: 100%; 
            background: #000; overflow: hidden; position: fixed; 
        }

        .viewport {
            position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
            background: #000; display: flex; align-items: center; justify-content: center;
            z-index: 10;
        }

        #captureFrame {
            position: absolute; width: 130%; height: 130%; border: none;
            opacity: 0; transition: opacity 1s ease; z-index: 1;
        }

        /* INITIAL TICKER OVERLAY */
        #masterOverlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            z-index: 500; cursor: pointer; background: rgba(0, 0, 0, 0.4); 
            display: flex; flex-direction: column; transition: opacity 0.5s ease;
        }

        .ticker-wrap {
            width: 100%; background: rgba(10, 10, 10, 0.9);
            backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px);
            color: #fff; white-space: nowrap; overflow: hidden;
            padding: 15px 0; border-bottom: 2px solid var(--live-red);
        }

        .ticker-text {
            display: inline-block; padding-left: 100%;
            animation: marquee 20s linear infinite;
            font-family: sans-serif; font-size: 18px;
        }

        @keyframes marquee { 0% { transform: translateX(0); } 100% { transform: translateX(-100%); } }
        .hidden { display: none !important; }

        /* THE HARD LOCK (SESSION EXPIRED) */
        #safetyLock {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.95); /* Nearly black to hide video */
            backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
            z-index: 999999; /* HIGHEST PRIORITY */
            display: none; flex-direction: column;
            align-items: center; justify-content: center;
            color: white; font-family: sans-serif; text-align: center;
            pointer-events: all !important; /* BLOCKS VIDEO INTERACTION */
        }

        .is-locked { display: flex !important; }

        .refresh-btn {
            margin-top: 25px; padding: 15px 40px;
            background: var(--live-red); color: white;
            border: 2px solid white; border-radius: 50px;
            font-weight: bold; cursor: pointer; text-transform: uppercase;
            box-shadow: 0 0 20px rgba(255, 0, 51, 0.5);
        }
    </style>
</head>
<body>

    <div class="viewport">
        <!-- 1. Initial Ticker -->
        <div id="masterOverlay" onclick="removeOverlay()">
            <div class="ticker-wrap">
                <div class="ticker-text">
                    🔴 COLORS TV HD: CLICK ANYWHERE TO WATCH — कलर्स टीवी एचडी: देखने के लिए कहीं भी क्लिक करें 🔴
                </div>
            </div>
        </div>

        <!-- 2. Video Player -->
        <iframe id="captureFrame" src="https://tulnit.com/live/bollywood-colors/" scrolling="no" sandbox="allow-forms allow-scripts allow-same-origin"></iframe>

        <!-- 3. Safety Lock (Visible after 120s) -->
        <div id="safetyLock">
            <h2 style="color: #ff0033; font-size: 28px; margin: 0;">⚠️ SESSION EXPIRED</h2>
            <p style="margin: 10px 0;">Security lock active. Please refresh the stream.</p>
            <p style="font-size: 14px; opacity: 0.7;">सुरक्षा के लिए प्लेयर को रीफ़्रेश करें।</p>
            <button class="refresh-btn" onclick="window.location.reload();">Refresh Now / अभी रीफ़्रेश करें</button>
        </div>
    </div>

    <script>
        const iframe = document.getElementById('captureFrame');
        const overlay = document.getElementById('masterOverlay');
        const safetyLock = document.getElementById('safetyLock');

        // Reveal video when loaded
        iframe.addEventListener('load', () => { iframe.style.opacity = "1"; });

        // Remove initial ticker
        function removeOverlay() {
            overlay.style.pointerEvents = 'none';
            overlay.classList.add('hidden');
        }

        // 120-Second Lock Logic (120000 ms)
        function activateSafetyLock() {
            console.log("Session Expired: Locking Player.");
            safetyLock.classList.add('is-locked');
        }
        
        // Start Timer
        setTimeout(activateSafetyLock, 120000);

        // Rotation Fix
        window.addEventListener("orientationchange", () => { window.scrollTo(0, 0); });
    </script>

</body>
</html>
