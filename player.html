<!DOCTYPE html>
<html lang="en">
<head>
    <style>
        /* 1. The Container (Strict 16:9 Window) */
        .mstv-player-box {
            position: relative;
            width: 100%;
            max-width: 850px;
            aspect-ratio: 16 / 9; 
            overflow: hidden;
            background: #000;
            border: 2px solid #333;
            border-radius: 12px;
            margin: 20px auto;
            font-family: sans-serif;
        }

        /* 2. The Scaling Engine */
        .mstv-player-box iframe {
            position: absolute;
            width: 133.33%;  
            height: 1200px; 
            top: -170px;    
            left: 0;
            border: none;
            transform: scale(0.75); 
            transform-origin: 0 0;  
            z-index: 1;
        }
        #resetBtn {
            position: fixed; bottom: 12px; right: 12px;
            padding: 8px 15px;
            background: rgba(0, 255, 160, 0.15);
            color: #00ffa0;
            border: 1px solid rgba(0, 255, 160, 0.6);
            border-radius: 30px;
            font-family: sans-serif;
            font-size: 14px;
            backdrop-filter: blur(10px);
            cursor: pointer;
            z-index: 10002;
        }

        #ticker {
            position: absolute; top: 0px; left: 0;
            width: 100%; background: transparent;
            overflow: hidden; white-space: nowrap;
            z-index: 10000; padding: 11px 0;
        }

        #ticker span {
            display: inline-block; padding-left: 100%;
            animation: scroll 15s linear infinite;
            color: #ff3b3b; font-family: sans-serif; font-size: 14px;
        }

        @keyframes scroll {
            0% { transform: translateX(0); }
            100% { transform: translateX(-100%); }
        }

        @media (max-width: 600px) {
            .mstv-player-box iframe { top: -150px; }
        }
    </style>
</head>
<body>

    <div class="mstv-player-box">
        <!-- Ticker -->
        <div class="mstv-ticker">
            <span id="ticker-text">Welcome to the Stream! Loading content...</span>
        </div>

        <!-- The Player -->
        <iframe id="player-iframe" src="" scrolling="no" allowfullscreen></iframe>

        <!-- Refresh Button -->
        <button class="mstv-refresh-btn" onclick="refreshPlayer()">Refresh</button>
    </div>

    <script>
        // LIST YOUR CHANNELS HERE
        const channelList = {
            "1": "https://tulnit.com/live/runn-action/",
            "2": "https://tulnit.com/live/sony-max-1/",
            "3": "https://tulnit.com/live/sony-max-2/"
        };

        function initPlayer() {
            const iframe = document.getElementById('player-iframe');
            const ticker = document.getElementById('ticker-text');
            
            // Get the "ch" value from the URL (e.g., ?ch=2)
            const urlParams = new URLSearchParams(window.location.search);
            const chID = urlParams.get('ch') || "1"; // Default to "1" if empty

            if (channelList[chID]) {
                iframe.src = channelList[chID];
                ticker.innerText = "NOW STREAMING CHANNEL " + chID + " — ENJOY THE SHOW!";
            } else {
                ticker.innerText = "ERROR: CHANNEL " + chID + " NOT FOUND.";
            }
        }

        function refreshPlayer() {
            const iframe = document.getElementById('player-iframe');
            iframe.src = iframe.src;
        }

        // Run on load
        window.onload = initPlayer;
    </script>

</body>
</html>
