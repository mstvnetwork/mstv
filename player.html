<!DOCTYPE html>
<html lang="en">
<head>
    <style>
        /* 1. The Container (Strict 16:9 Window) */
        .mstv-player-box {
            position: relative;
            width: 100%;
            max-width: 850px;
            aspect-ratio: 16 / 9; 
            overflow: hidden;
            background: #000;
            border: 2px solid #333;
            border-radius: 12px;
            margin: 20px auto;
            font-family: sans-serif;
        }

        /* 2. The Scaling Engine */
        .mstv-player-box iframe {
            position: absolute;
            width: 133.33%;  
            height: 1200px; 
            top: -170px;    
            left: 0;
            border: none;
            transform: scale(0.75); 
            transform-origin: 0 0;  
            z-index: 1;
        }

        /* 3. Scrolling Ticker Text */
        .mstv-ticker {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            background: rgba(0, 0, 0, 0.7);
            color: #fff;
            padding: 5px 0;
            z-index: 10;
            font-size: 14px;
            white-space: nowrap;
            overflow: hidden;
        }

        .mstv-ticker span {
            display: inline-block;
            padding-left: 100%;
            animation: ticker 15s linear infinite;
        }

        @keyframes ticker {
            0% { transform: translate(0, 0); }
            100% { transform: translate(-100%, 0); }
        }

        /* 4. Refresh Button */
        .mstv-refresh-btn {
            position: absolute;
            bottom: 10px;
            left: 10px;
            z-index: 10;
            background: #e74c3c;
            color: white;
            border: none;
            padding: 8px 12px;
            border-radius: 5px;
            cursor: pointer;
            font-size: 12px;
            font-weight: bold;
            opacity: 0.6;
            transition: opacity 0.3s;
        }

        .mstv-refresh-btn:hover { opacity: 1; }

        @media (max-width: 600px) {
            .mstv-player-box iframe { top: -150px; }
        }
    </style>
</head>
<body>

    <div class="mstv-player-box">
        <!-- Ticker -->
        <div class="mstv-ticker">
            <span id="ticker-text">Welcome to the Stream! Loading content...</span>
        </div>

        <!-- The Player -->
        <iframe id="player-iframe" src="" scrolling="no" allowfullscreen></iframe>

        <!-- Refresh Button -->
        <button class="mstv-refresh-btn" onclick="refreshPlayer()">Refresh</button>
    </div>

    <script>
        // LIST YOUR CHANNELS HERE
        const channelList = {
            "1": "https://tulnit.com/live/runn-action/",
            "2": "https://tulnit.com/live/sony-max-1/",
            "3": "https://tulnit.com/live/sony-max-2/"
        };

        function initPlayer() {
            const iframe = document.getElementById('player-iframe');
            const ticker = document.getElementById('ticker-text');
            
            // Get the "ch" value from the URL (e.g., ?ch=2)
            const urlParams = new URLSearchParams(window.location.search);
            const chID = urlParams.get('ch') || "1"; // Default to "1" if empty

            if (channelList[chID]) {
                iframe.src = channelList[chID];
                ticker.innerText = "NOW STREAMING CHANNEL " + chID + " — ENJOY THE SHOW!";
            } else {
                ticker.innerText = "ERROR: CHANNEL " + chID + " NOT FOUND.";
            }
        }

        function refreshPlayer() {
            const iframe = document.getElementById('player-iframe');
            iframe.src = iframe.src;
        }

        // Run on load
        window.onload = initPlayer;
    </script>

</body>
</html>
