<!DOCTYPE html>
<html lang="en">
<head>
    <style>
        /* 1. The Container (The 16:9 Window) */
        .mstv-player-box {
            position: relative;
            width: 100%;
            max-width: 850px;
            aspect-ratio: 16 / 9; /* Strict 16:9 Ratio */
            overflow: hidden; /* No scrollbars */
            background: #000;
            border: 2px solid #333;
            border-radius: 12px;
            margin: 20px auto;
        }

        /* 2. The Scaling Engine */
        .mstv-player-box iframe {
            position: absolute;
            width: 133.33%;  
            height: 1200px; 
            top: -170px;    
            left: 0;
            border: none;
            transform: scale(0.75); 
            transform-origin: 0 0;  
            z-index: 1;
        }

        /* 3. Scrolling Ticker Text */
        .mstv-ticker {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            background: rgba(0, 0, 0, 0.7);
            color: #fff;
            padding: 5px 0;
            z-index: 10;
            font-family: sans-serif;
            font-size: 14px;
            white-space: nowrap;
            overflow: hidden;
        }

        .mstv-ticker span {
            display: inline-block;
            padding-left: 100%;
            animation: ticker 15s linear infinite;
        }

        @keyframes ticker {
            0% { transform: translate(0, 0); }
            100% { transform: translate(-100%, 0); }
        }

        /* 4. Refresh Button */
        .mstv-refresh-btn {
            position: absolute;
            bottom: 10px;
            left: 10px;
            z-index: 10;
            background: #e74c3c;
            color: white;
            border: none;
            padding: 8px 12px;
            border-radius: 5px;
            cursor: pointer;
            font-size: 12px;
            font-weight: bold;
            text-transform: uppercase;
            transition: background 0.3s;
        }

        .mstv-refresh-btn:hover {
            background: #c0392b;
        }

        /* Mobile Adjustment */
        @media (max-width: 600px) {
            .mstv-player-box iframe {
                top: -150px; 
            }
        }
    </style>
</head>
<body>

    <div class="mstv-player-box">
        <!-- Ticker -->
        <div class="mstv-ticker">
            <span>BREAKING NEWS: Your scrolling text message goes here... Enjoy the stream!</span>
        </div>

        <!-- The Player -->
        <iframe 
            id="player-iframe"
            src="https://tulnit.com/live/runn-action/" 
            scrolling="no"
            allowfullscreen>
        </iframe>

        <!-- Refresh Button -->
        <button class="mstv-refresh-btn" onclick="refreshPlayer()">Refresh Stream</button>
    </div>

    <script>
        function refreshPlayer() {
            const iframe = document.getElementById('player-iframe');
            iframe.src = iframe.src; // Reloads the iframe content
        }
    </script>

</body>
</html>
