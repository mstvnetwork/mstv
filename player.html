<!DOCTYPE html>
<html lang="en">
<head>
    <style>
        /* 1. The Container (Strict 16:9 Window) */
        .mstv-player-box {
            position: relative;
            width: 100%;
            max-width: 850px;
            aspect-ratio: 16 / 9; 
            overflow: hidden;
            background: #000;
            border: 1px solid #222;
            border-radius: 12px;
            margin: 20px auto;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        /* 2. The Scaling Engine */
        .mstv-player-box iframe {
            position: absolute;
            width: 133.33%;  
            height: 1200px; 
            top: -170px;    
            left: 0;
            border: none;
            transform: scale(0.75); 
            transform-origin: 0 0;  
            z-index: 1;
        }

        /* 3. Scrolling Ticker Text */
        .mstv-ticker {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            background: rgba(0, 0, 0, 0.5); /* Semi-transparent */
            color: #fff;
            padding: 6px 0;
            z-index: 10;
            font-size: 13px;
            font-weight: 500;
            white-space: nowrap;
            overflow: hidden;
            pointer-events: none; /* Allows clicks to pass through to player if needed */
        }

        .mstv-ticker span {
            display: inline-block;
            padding-left: 100%;
            animation: ticker-scroll 20s linear infinite;
        }

        @keyframes ticker-scroll {
            0% { transform: translateX(0); }
            100% { transform: translateX(-100%); }
        }

        /* 4. Transparent Refresh Button (Bottom Right) */
        .mstv-refresh-btn {
            position: absolute;
            bottom: 15px;
            right: 15px; /* Moved to Right */
            z-index: 10;
            background: rgba(255, 255, 255, 0.1); /* Transparent Background */
            color: rgba(255, 255, 255, 0.6); /* Faded Text */
            border: 1px solid rgba(255, 255, 255, 0.3); /* Thin Border */
            padding: 6px 12px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 1px;
            transition: all 0.3s ease;
            backdrop-filter: blur(3px); /* Glass effect */
        }

        .mstv-refresh-btn:hover {
            background: rgba(255, 255, 255, 0.2);
            color: #fff;
            border-color: #fff;
        }

        @media (max-width: 600px) {
            .mstv-player-box iframe { top: -150px; }
        }
    </style>
</head>
<body>

    <div class="mstv-player-box">
        <!-- Ticker -->
        <div class="mstv-ticker">
            <span id="ticker-text">Loading Stream... Welcome to the channel!</span>
        </div>

        <!-- The Player -->
        <iframe id="player-iframe" src="" scrolling="no" allowfullscreen></iframe>

        <!-- Refresh Button -->
        <button class="mstv-refresh-btn" onclick="refreshPlayer()">Refresh</button>
    </div>

    <script>
     // LIST YOUR CHANNELS HERE
        const channelList = {
            "1": "https://tulnit.com/live/runn-action/",
            "2": "https://tulnit.com/live/sony-max-1/",
            "3": "https://tulnit.com/live/sony-max-2/"
        };

        function initPlayer() {
            const iframe = document.getElementById('player-iframe');
            const ticker = document.getElementById('ticker-text');
            
            const urlParams = new URLSearchParams(window.location.search);
            const chID = urlParams.get('ch') || "1"; 

            if (channelList[chID]) {
                iframe.src = channelList[chID];
                ticker.innerText = "YOU ARE WATCHING CHANNEL " + chID + " • ENJOY THE HIGH QUALITY STREAM • REFRESH IF THE VIDEO FREEZES";
            } else {
                ticker.innerText = "ERROR: CHANNEL NOT FOUND.";
            }
        }

        function refreshPlayer() {
            const iframe = document.getElementById('player-iframe');
            const currentSrc = iframe.src;
            iframe.src = ''; // Clear source
            iframe.src = currentSrc; // Reset source to force reload
        }

        window.onload = initPlayer;
    </script>

</body>
</html>
