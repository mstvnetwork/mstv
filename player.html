<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>MSTV Player</title>
    <!-- Reliable JSDelivr CDN for Hls.js -->
    <script src="https://cdn.jsdelivr.net"></script>
    <style>
        body { margin: 0; background: #000; color: #fff; font-family: sans-serif; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; overflow: hidden; }
        #v-container { width: 95%; max-width: 900px; aspect-ratio: 16/9; background: #111; border: 2px solid #90EE90; border-radius: 8px; }
        video { width: 100%; height: 100%; }
        .info { padding: 15px; text-align: center; }
        .btn { color: #90EE90; text-decoration: none; border: 1px solid #90EE90; padding: 8px 20px; border-radius: 20px; margin-top: 15px; display: inline-block; font-size: 14px; }
    </style>
</head>
<body>
    <div class="info">
        <h2 id="ch-name">Loading...</h2>
    </div>

    <div id="v-container">
        <video id="player" controls autoplay playsinline></video>
    </div>

    <a href="https://mstvnet.netlify.app" class="btn">← Back to Home</a>

    <script>
        function startPlayback() {
            const params = new URLSearchParams(window.location.search);
            const source = params.get('source');
            const name = params.get('name');
            const video = document.getElementById('player');

            if (name) document.getElementById('ch-name').innerText = name;

            // CHECK: Is the Hls library ready?
            if (typeof Hls !== 'undefined') {
                if (Hls.isSupported()) {
                    const hls = new Hls();
                    hls.loadSource(source);
                    hls.attachMedia(video);
                    hls.on(Hls.Events.MANIFEST_PARSED, () => video.play());
                } else if (video.canPlayType('application/vnd.apple.mpegurl')) {
                    video.src = source;
                    video.play();
                }
            } else {
                // If not ready, wait 500ms and try again
                console.log("HLS library not ready, retrying...");
                setTimeout(startPlayback, 500);
            }
        }

        // Run when page is ready
        window.addEventListener('DOMContentLoaded', startPlayback);
    </script>
</body>
</html>
