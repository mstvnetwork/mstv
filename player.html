<!DOCTYPE html>
<html>
<head>
    <title>Embedded Player</title>
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
    <style>body { margin: 0; background: #000; overflow: hidden; } video { width: 100%; height: 100vh; }</style>
</head>
<body>
    <video id="video" controls></video>
    <script>
        var video = document.getElementById('video');
        var videoSrc = 'https://d35j504z0x2vu2.cloudfront.net/v1/manifest/0bc8e8376bd8417a1b6761138aa41c26c7309312/shemaroo-filmigaane/858da5ef-30bb-4d41-aa86-1211551a4891/0.m3u8';
        if (Hls.isSupported()) {
            var hls = new Hls();
            hls.loadSource(videoSrc);
            hls.attachMedia(video);
        } else if (video.canPlayType('application/vnd.apple.mpegurl')) {
            video.src = videoSrc;
        }
    </script>
</body>
</html>
