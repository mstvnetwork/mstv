<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background: #000; overflow: hidden; }
        video { width: 100%; height: 100%; object-fit: contain; }
    </style>
</head>
<body>
    <video id="v" playsinline controls autoplay></video>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/shaka-player/4.3.5/shaka-player.compiled.js"></script>
    <script>
        async function init() {
            const url = new URLSearchParams(window.location.search).get('url');
            const v = document.getElementById('v');
            if (!url) return;

            shaka.polyfill.installAll();
            if (shaka.Player.isBrowserSupported()) {
                const p = new shaka.Player(v);
                
                p.configure({
                    streaming: {
                        bufferingGoal: 2,           // 2 seconds is the "sweet spot" for 3G
                        rebufferingGoal: 1,
                        lowLatencyMode: true,       // CRITICAL: Reduces delay for DASH
                        jumpLargeGaps: true         // Skip gaps instead of spinning
                    },
                    manifest: {
                        retryParameters: {
                            maxAttempts: 4,         // Be persistent on 3G
                            baseDelay: 1000
                        }
                    },
                    abr: {
                        enabled: true,
                        initialBitrate: 75000       // Start even lower (75kbps) for instant-on
                    }
                });

                try { 
                    await p.load(url); 
                } catch (e) { 
                    console.error("Load failed", e); 
                }
            } else if (v.canPlayType('application/vnd.apple.mpegurl')) {
                v.src = url; // Safari native
            }
        }
        init();
    </script>
</body>
</html>
