<!DOCTYPE html>
<html lang="en">
<head>
    <style>
        .viewport {
            width: 100vw; max-width: 1000px; aspect-ratio: 16 / 9; 
            overflow: hidden; position: relative;
            border: 4px solid var(--primary); border-radius: 12px;
            background: #000;
        }
        /* 2. The Scaling Engine */
        .mstv-player-box iframe {
            position: absolute;
            width: 133.33%;  
            height: 1200px; 
            top: -170px;    
            left: 0;
            border: none;
            transform: scale(0.75); 
            transform-origin: 0 0;  
            z-index: 1;
        }

        /* 3. Scrolling Ticker Text */
        .mstv-ticker {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            background: rgba(0, 0, 0, 0.5); /* Semi-transparent */
            color: red;
            padding: 6px 0;
            z-index: 10;
            font-size: 13px;
            font-weight: 500;
            white-space: nowrap;
            overflow: hidden;
            pointer-events: none; /* Allows clicks to pass through to player if needed */
        }

        .mstv-ticker span {
            display: inline-block;
            padding-left: 100%;
            animation: ticker-scroll 20s linear infinite;
        }

        @keyframes ticker-scroll {
            0% { transform: translateX(0); }
            100% { transform: translateX(-100%); }
        }

        /* 4. Refresh Button (Custom Red & Yellow) */
.mstv-refresh-btn {
    position: absolute;
    bottom: 15px;      /* Distance from bottom */
    left: 15px;        /* Distance from left */
    right: auto;       /* Ensures it doesn't stretch or stick to the right */
    
    z-index: 99;       /* Higher layer to stay above the iframe */
    background: red;   /* Your chosen color */
    color: yellow;     /* Your chosen text color */
    
    border: 1px solid rgba(255, 255, 255, 0.4);
    padding: 6px 12px;
    border-radius: 4px;
    cursor: pointer;
    font-size: 10px;   /* Your chosen size */
    font-weight: bold;
    text-transform: uppercase;
    letter-spacing: 1px;
    transition: all 0.3s ease;
    backdrop-filter: blur(3px);
}

.mstv-refresh-btn:hover {
    background: #cc0000; /* Slightly darker red on hover */
    color: #fffdec;     /* Slightly brighter yellow/white */
    border-color: yellow;
    transform: scale(1.05); /* Subtle pop effect */
}


        @media (max-width: 600px) {
            .mstv-player-box iframe { top: -150px; }
        }
    </style>
</head>
<body>

    <div class="mstv-player-box">
        <!-- Ticker -->
        <div class="mstv-ticker">
            <span id="ticker-text">Loading Stream... Welcome to the channel!</span>
        </div>

        <!-- The Player -->
        <iframe id="player-iframe" src="" scrolling="no" allowfullscreen></iframe>

        <!-- Refresh Button -->
        <button class="mstv-refresh-btn" onclick="refreshPlayer()">Refresh</button>
    </div>

    <script>
     // LIST YOUR CHANNELS HERE
        const channelList = {
            "1": "https://tulnit.com/live/runn-action/",
            "2": "https://tulnit.com/live/sony-max-1/",
            "3": "https://tulnit.com/live/sony-max-2/"
        };

        function initPlayer() {
            const iframe = document.getElementById('player-iframe');
            const ticker = document.getElementById('ticker-text');
            
            const urlParams = new URLSearchParams(window.location.search);
            const chID = urlParams.get('ch') || "1"; 

            if (channelList[chID]) {
                iframe.src = channelList[chID];
                ticker.innerText = "YOU ARE WATCHING CHANNEL " + chID + " • ENJOY THE HIGH QUALITY STREAM • REFRESH IF THE VIDEO FREEZES";
            } else {
                ticker.innerText = "ERROR: CHANNEL NOT FOUND.";
            }
        }

        function refreshPlayer() {
            const iframe = document.getElementById('player-iframe');
            const currentSrc = iframe.src;
            iframe.src = ''; // Clear source
            iframe.src = currentSrc; // Reset source to force reload
        }

        window.onload = initPlayer;
    </script>

</body>
</html>
