<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>MSTV External Player</title>
    <!-- Use the latest Hls.js CDN for better compatibility -->
    <script src="https://cdn.jsdelivr.net"></script>
    <style>
        body { margin: 0; background: #000; color: #fff; font-family: sans-serif; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; overflow: hidden; }
        #video-container { width: 95%; max-width: 900px; aspect-ratio: 16/9; background: #111; border: 2px solid #90EE90; border-radius: 8px; }
        video { width: 100%; height: 100%; }
        .info { padding: 15px; text-align: center; }
        .btn { color: #90EE90; text-decoration: none; border: 1px solid #90EE90; padding: 8px 20px; border-radius: 20px; margin-top: 15px; display: inline-block; }
    </style>
</head>
<body>
    <div class="info">
        <h2 id="ch-name">Connecting to Stream...</h2>
    </div>

    <div id="video-container">
        <!-- Ensure ID is exactly 'player' to match the script -->
        <video id="player" controls autoplay playsinline></video>
    </div>

    <a href="https://mstvnet.netlify.app" class="btn">← Back to MSTV Home</a>

    <script>
        // Use DOMContentLoaded to ensure the <video id="player"> exists before running
        document.addEventListener('DOMContentLoaded', () => {
            const params = new URLSearchParams(window.location.search);
            const source = params.get('source');
            const name = params.get('name');
            
            if (name) document.getElementById('ch-name').innerText = name;

            const video = document.getElementById('player');
            
            if (source && video) {
                if (Hls.isSupported()) {
                    const hls = new Hls({
                        xhrSetup: function(xhr) {
                            // Netlify handles the proxy, so we just set standard credentials
                            xhr.withCredentials = false;
                        }
                    });
                    hls.loadSource(source);
                    hls.attachMedia(video);
                    hls.on(Hls.Events.MANIFEST_PARSED, () => video.play());
                } else if (video.canPlayType('application/vnd.apple.mpegurl')) {
                    video.src = source;
                    video.play();
                }
            } else {
                console.error("Video element or source URL not found.");
            }
        });
    </script>
</body>
</html>
