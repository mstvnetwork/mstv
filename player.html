<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background: #000; overflow: hidden; }
        video { width: 100%; height: 100%; object-fit: contain; }
    </style>
</head>
<body>
    <video id="v" playsinline controls autoplay></video>
    <script>
        const url = new URLSearchParams(window.location.search).get('url');
        const video = document.getElementById('v');
        
        // Proxy to bypass CORS blocks that cause pop-outs
        const proxiedUrl = "https://corsproxy.io/?url=" + encodeURIComponent(url);

        if (Hls.isSupported()) {
            const hls = new Hls({
                capLevelToPlayerSize: true,
                startLevel: 0, // Force lowest quality first for 3G speed
                backBufferLength: 60
            });
            hls.loadSource(proxiedUrl);
            hls.attachMedia(video);
        } else if (video.canPlayType('application/vnd.apple.mpegurl')) {
            // For Safari on iPhone
            video.src = proxiedUrl;
        }
    </script>
</body>
</html>
