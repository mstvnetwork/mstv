<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>MSTV Player | Bridge</title>
    <!-- Primary CDN -->
    <script id="hls-script" src="https://cdn.jsdelivr.net"></script>
    <style>
        body { margin: 0; background: #000; color: #fff; font-family: sans-serif; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; overflow: hidden; }
        #v-container { width: 95%; max-width: 900px; aspect-ratio: 16/9; background: #111; border: 2px solid #90EE90; border-radius: 8px; }
        video { width: 100%; height: 100%; }
        .info { padding: 15px; text-align: center; }
        .btn { color: #90EE90; text-decoration: none; border: 1px solid #90EE90; padding: 8px 20px; border-radius: 20px; margin-top: 15px; display: inline-block; font-size: 14px; }
    </style>
</head>
<body>
    <div class="info">
        <h2 id="ch-name">Preparing Player...</h2>
    </div>

    <div id="v-container">
        <video id="player" controls autoplay playsinline></video>
    </div>

    <a href="https://mstvnet.netlify.app" class="btn">← Back to Home</a>

    <script>
        const fallbacks = [
            "https://cdnjs.cloudflare.com",
            "https://unpkg.com"
        ];
        let currentFallback = 0;

        function loadFallbackLibrary() {
            if (currentFallback < fallbacks.length) {
                console.warn("Primary CDN blocked. Trying fallback:", fallbacks[currentFallback]);
                const newScript = document.createElement('script');
                newScript.src = fallbacks[currentFallback];
                newScript.onload = startPlayback;
                document.head.appendChild(newScript);
                currentFallback++;
            }
        }

        function startPlayback() {
            const params = new URLSearchParams(window.location.search);
            const source = params.get('source');
            const name = params.get('name');
            const video = document.getElementById('player');

            if (name) document.getElementById('ch-name').innerText = name;

            if (typeof Hls !== 'undefined') {
                if (Hls.isSupported()) {
                    const hls = new Hls({ xhrSetup: (xhr) => { xhr.withCredentials = false; } });
                    hls.loadSource(source);
                    hls.attachMedia(video);
                    hls.on(Hls.Events.MANIFEST_PARSED, () => video.play());
                } else if (video.canPlayType('application/vnd.apple.mpegurl')) {
                    video.src = source;
                    video.play();
                }
            } else {
                loadFallbackLibrary();
                // If we've tried all fallbacks and still nothing, try native as a last resort
                if (currentFallback >= fallbacks.length) {
                    console.error("All HLS libraries failed to load. Trying native playback.");
                    video.src = source;
                    video.play();
                }
            }
        }

        window.addEventListener('load', startPlayback);
    </script>
</body>
</html>
