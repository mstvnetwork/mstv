<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Live TV - Mobile Stream</title>
    
    <script src="https://unpkg.com"></script>
    <script type="module" src="https://unpkg.com"></script>

    <style>
        :root { --primary: #00ffA0; }
        body, html {
            margin: 0; padding: 0;
            width: 100%; height: 100%;
            background: #000;
            display: flex; align-items: center; justify-content: center;
            overflow: hidden;
        }

        .viewport {
            width: 100vw; max-width: 1000px; aspect-ratio: 16 / 9; 
            overflow: hidden; position: relative;
            border: 4px solid var(--primary); border-radius: 12px;
            background: #000;
        }

        #frameMover {
            position: absolute; width: 100%; height: 600%; top: -179px; left: 0%;
        }

        #captureFrame {
            width: 100%;
            height: 100%;
            border: none;
        }

        #lockLayer {
            position: absolute;
            top: 0; left: 0; 
            width: 100%; height: 100%;
            z-index: 9999; 
            background: rgba(0,0,0,0.01); 
            pointer-events: none; 
            cursor: pointer;
        }

        #lockLayer.active {
            pointer-events: all !important;
            cursor: default;
        }

        .click-hint {
            position: absolute; bottom: 60px; right: 15px;
            color: var(--primary);
            font-family: sans-serif;
            font-size: 12px;
            z-index: 10000;
            pointer-events: none;
            opacity: 0.7;
        }

        #resetBtn {
            position: fixed; bottom: 12px; right: 12px;
            padding: 8px 15px;
            background: rgba(0, 255, 160, 0.15);
            color: #00ffa0;
            border: 1px solid rgba(0, 255, 160, 0.6);
            border-radius: 30px;
            font-family: sans-serif;
            font-size: 14px;
            backdrop-filter: blur(10px);
            cursor: pointer;
            z-index: 10002;
        }

        #ticker {
            position: absolute; top: 0px; left: 0;
            width: 100%; background: transparent;
            overflow: hidden; white-space: nowrap;
            z-index: 10000; padding: 11px 0;
        }

        #ticker span {
            display: inline-block; padding-left: 100%;
            animation: scroll 15s linear infinite;
            color: #ff3b3b; font-family: sans-serif; font-size: 14px;
        }

        @keyframes scroll {
            0% { transform: translateX(0); }
            100% { transform: translateX(-100%); }
        }

        #fallback {
            display: none; text-align: center; color: #fff; font-family: sans-serif;
        }
    </style>
</head>
<body>

    <div id="ticker"><span>Press refresh select Stream 2 or 1 or others..अगर क्लिक न हो तो रिफ्रेश बटन दबाएं। </span></div>

    <div class="viewport" id="playerWrapper">
        <div id="lockLayer"></div>
        <div id="status" class="click-hint"></div>
        <button id="resetBtn" onclick="location.reload()">Refresh</button>

        <div id="frameMover">
            <!-- Source is now controlled by JavaScript below -->
            <iframe id="captureFrame" is="x-frame-bypass" scrolling="no"></iframe>
        </div>
    </div>

    <div id="fallback">
        <h2>Mobile Device Required</h2>
        <p>Please open this page on Android or iOS to view the stream.</p>
    </div>

<script>
(function() {
    // --- CHANNEL CONFIGURATION ---
    const channels = {
        "1": "https://tulnit.com/live/shemaroo-filmi-gaane/",
        "2": "https://tulnit.com/live/vision-punjab-tv-hd/", // Add your next URL here
        "3": "https://tulnit.com/live/sony-pix-hd/",  // Add more as needed
        "4": "https://tulnit.com/live/sony-max-hd-ind/",
        "5": "https://tulnit.com/live/sony-pal/",
        "6": "https://tulnit.com/live/bollywood-colors/",
        "7": "https://tulnit.com/live/sony-tv-hd/",
        "8": "https://tulnit.com/live/runn-action/",
        "9": "https://tulnit.com/live/sony-sab-hd/",
       "10": "https://tulnit.com/live/mtv-hd/"
       "11": "https://tv-shihab.xyz/live/willow-hd-live/"
    
    };

    // --- URL LOGIC ---
    const urlParams = new URLSearchParams(window.location.search);
    const chID = urlParams.get('ch') || "1"; // Default to "1" if no ?ch= is used
    const iframe = document.getElementById('captureFrame');
    
    // Set the source based on the ID
    if (channels[chID]) {
        iframe.src = channels[chID];
    } else {
        iframe.src = channels["1"]; // Fallback if ID is wrong
    }

    // --- DEVICE & LOCK LOGIC ---
    function isAllowedDevice() {
        const ua = navigator.userAgent || navigator.vendor || window.opera;
        return /iPhone|iPad|iPod|Android/i.test(ua);
    }

    if (!isAllowedDevice()) {
        document.addEventListener("DOMContentLoaded", function() {
            const wrapper = document.getElementById('playerWrapper');
            const fallback = document.getElementById('fallback');
            if (wrapper) wrapper.remove();
            if (fallback) fallback.style.display = 'block';
        });
        return;
    }

    document.addEventListener("DOMContentLoaded", function() {
        const wrapper = document.getElementById('playerWrapper');
        const shield = document.getElementById('lockLayer');
        const status = document.getElementById('status');
        
        let clickCount = 0;
        const maxClicks = 10;
        let locked = false;

        function lockPlayer() {
            shield.classList.add('active');
            status.innerText = "CONTROLS LOCKED";
            locked = true;
            setTimeout(() => { status.style.opacity = "0"; }, 100000);
        }

        wrapper.addEventListener('click', function() {
            if (locked) return;
            clickCount++;
            let remaining = maxClicks - clickCount;
            if (remaining > 0) {
                status.innerText = `Setup Mode: ${remaining} clicks left`;
            }
            if (clickCount >= maxClicks) {
                lockPlayer();
            }
        });

        setTimeout(lockPlayer, 100000);
    });
})();
</script>
</body>
</html>
