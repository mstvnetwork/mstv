<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Live Stream</title>

    <script src="https://unpkg.com/x-frame-bypass"></script>
    <script type="module" src="https://unpkg.com/x-frame-bypass"></script>

    <style>
        :root { --primary: #00ffA0; }
        body, html {
            margin: 0; padding: 0;
            width: 100%; height: 100%;
            background: #000;
            display: flex; align-items: center; justify-content: center;
            overflow: hidden;
        }

        .viewport {
            width: 100vw; max-width: 1000px; aspect-ratio: 16 / 9;
            overflow: hidden; position: relative;
            border: 4px solid var(--primary); border-radius: 12px;
            background: #000;
        }

        #frameMover {
            position: absolute; width: 100%; height: 270%; left: 0;
            top: -160px; /* default fallback — overridden by saved value */
        }

        #captureFrame {
            width: 100%; height: 100%; border: none;
        }

        /* ── Drag handle — shown only in adjust mode ── */
        #dragHandle {
            display: none;
            position: absolute;
            left: 0; right: 0;
            height: 44px;
            background: rgba(0,255,160,0.18);
            border-top: 2px solid #00ffa0;
            border-bottom: 2px solid #00ffa0;
            cursor: ns-resize;
            z-index: 10005;
            align-items: center;
            justify-content: center;
            color: #00ffa0;
            font-family: sans-serif;
            font-size: 13px;
            letter-spacing: 1px;
            user-select: none;
            touch-action: none;
        }

        #dragHandle.visible { display: flex; }

        /* ── Adjust mode toolbar ── */
        #adjustBar {
            display: none;
            position: fixed;
            bottom: 0; left: 0; right: 0;
            background: rgba(0,0,0,0.88);
            border-top: 1px solid rgba(0,255,160,0.3);
            padding: 10px 12px;
            z-index: 10010;
            gap: 8px;
            align-items: center;
            justify-content: space-between;
            font-family: sans-serif;
        }

        #adjustBar.visible { display: flex; }

        #offsetLabel {
            color: #00ffa0;
            font-size: 13px;
            min-width: 80px;
        }

        .adj-btn {
            padding: 7px 16px;
            background: rgba(0,255,160,0.12);
            color: #00ffa0;
            border: 1px solid rgba(0,255,160,0.5);
            border-radius: 20px;
            font-size: 13px;
            cursor: pointer;
            font-family: sans-serif;
        }

        .adj-btn.save {
            background: rgba(0,255,160,0.28);
            font-weight: bold;
        }

        /* ── Normal UI ── */
        #lockLayer {
            position: absolute; top: 0; left: 0;
            width: 100%; height: 100%;
            z-index: 9999;
            background: rgba(0,0,0,0.01);
            pointer-events: none;
        }

        #lockLayer.active { pointer-events: all !important; }

        .click-hint {
            position: absolute; bottom: 60px; right: 15px;
            color: var(--primary); font-family: sans-serif; font-size: 12px;
            z-index: 10000; pointer-events: none; opacity: 0.7;
        }

        #resetBtn {
            position: fixed; bottom: 12px; right: 12px;
            padding: 8px 15px;
            background: rgba(0,255,160,0.15); color: #00ffa0;
            border: 1px solid rgba(0,255,160,0.6); border-radius: 30px;
            font-family: sans-serif; font-size: 14px;
            backdrop-filter: blur(10px); cursor: pointer; z-index: 10002;
        }

        /* Long-press hint bubble */
        #adjustHint {
            position: fixed; bottom: 55px; left: 12px;
            color: rgba(0,255,160,0.5);
            font-family: sans-serif; font-size: 11px;
            z-index: 10001; pointer-events: none;
        }

        #ticker {
            position: absolute; top: 0; left: 0;
            width: 100%; background: transparent;
            overflow: hidden; white-space: nowrap;
            z-index: 10000; padding: 11px 0;
        }

        #ticker span {
            display: inline-block; padding-left: 100%;
            animation: scroll 15s linear infinite;
            color: #ff3b3b; font-family: sans-serif; font-size: 14px;
        }

        @keyframes scroll {
            0% { transform: translateX(0); }
            100% { transform: translateX(-100%); }
        }

        #errorScreen {
            display: none;
            position: absolute; inset: 0;
            background: #000; color: var(--primary);
            font-family: sans-serif; font-size: 15px;
            align-items: center; justify-content: center;
            text-align: center; padding: 20px; z-index: 20000;
            flex-direction: column; gap: 10px;
        }

        #fallback {
            display: none; text-align: center;
            color: #fff; font-family: sans-serif;
        }
    </style>
</head>
<body>

<div class="viewport" id="playerWrapper">
    <div id="lockLayer"></div>

    <div id="ticker"><span>Press refresh and click play button 3-4 times · अगर क्लिक न हो तो रिफ्रेश बटन दबाएं।</span></div>
    <div class="click-hint" id="status"></div>

    <button id="resetBtn" onclick="location.reload()">⟳ Refresh</button>
    <div id="adjustHint">Hold to align</div>

    <div id="errorScreen">
        ⚠️ Invalid or missing channel.<br>
        Add <code style="color:#fff">?ch=0</code> for channel 1,<br>
        <code style="color:#fff">?ch=1</code> for channel 2, etc.
    </div>

    <!-- Drag handle sits inside viewport, above the iframe -->
    <div id="dragHandle">⠿ DRAG TO ALIGN ⠿</div>

    <div id="frameMover">
        <iframe id="captureFrame" is="x-frame-bypass" scrolling="no"></iframe>
    </div>
</div>

<!-- Adjust toolbar (outside viewport so it's always reachable) -->
<div id="adjustBar">
    <span id="offsetLabel">top: 0px</span>
    <button class="adj-btn" id="btnUp">▲ Up</button>
    <button class="adj-btn" id="btnDown">▼ Down</button>
    <button class="adj-btn save" id="btnSave">✓ Save</button>
    <button class="adj-btn" id="btnCancel">✕</button>
</div>

<div id="fallback">
    <h2>Mobile Device Required</h2>
    <p>Open on Android or iOS to view the stream.</p>
</div>

<script>
// ═══════════════════════════════════════════════════════════════════
//  CHANNEL LIST
//  Each channel gets its own embed URL:
//    stream-player.html?ch=0  →  CHANNELS[0]
//    stream-player.html?ch=1  →  CHANNELS[1]  … etc.
//
//  DEFAULT_TOP_PX — starting crop offset (negative = shift iframe up).
//  Set this to whatever looks closest on most browsers. Users can then
//  fine-tune per-browser using the long-press align tool, and it saves.
// ═══════════════════════════════════════════════════════════════════
const CHANNELS = [
{
        name: "Vision Punjab",
        url:  "https://tulnit.com/live/vision-punjab-tv-hd/"
    },
    {
        name: "Sony Tv Hd",
        url:  "https://tulnit.com/live/sony-tv-hd/"
    },
    {
        name: "Sony Sab Hd",
        url:  "https://tulnit.com/live/sony-sab-hd/"
    },
    {
        name: "Sony Max",
        url:  "https://tulnit.com/live/sony-max-hd-ind/"
    },
    {
        name: "Colors Hd",
        url:  "https://tulnit.com/live/bollywood-colors/"
    }
    // Add more like: { name: "Channel Name", url: "https://your-stream-url" }
];

const DEFAULT_TOP_PX = -160; // adjust this as your global starting point
// ═══════════════════════════════════════════════════════════════════

(function () {

    // --- NEW BROWSER DETECTION LOGIC ---
    function isChrome() {
        const ua = navigator.userAgent;
        const vendor = navigator.vendor;
        
        // Checks if it's Chrome and NOT Opera or Edge (which also use the Chrome engine)
        const isChromium = ua.includes("Chrome");
        const isGoogle = vendor === "Google Inc.";
        const isEdge = ua.includes("Edg");
        const isOpera = ua.includes("OPR");

        return isChromium && isGoogle && !isEdge && !isOpera;
    }

    document.addEventListener("DOMContentLoaded", function () {
        const playerWrapper = document.getElementById('playerWrapper');
        const fallback = document.getElementById('fallback');

        // Check if browser is NOT Chrome
        if (!isChrome()) {
            playerWrapper.style.display = 'none';
            fallback.innerHTML = `
                <div style="padding: 40px; border: 2px solid #00ffa0; border-radius: 15px; background: #111;">
                    <h2 style="color: #00ffa0;">Browser Not Supported</h2>
                    <p>To watch this live stream, please use <b>Google Chrome</b>.</p>
                    <a href="https://www.google.com/chrome/" target="_blank" 
                       style="display:inline-block; margin-top:15px; padding:10px 20px; background:#00ffa0; color:#000; text-decoration:none; border-radius:5px; font-weight:bold;">
                       Download Chrome
                    </a>
                </div>
            `;
            fallback.style.display = 'block';
            return; // Stop execution here
        }

        // --- REST OF YOUR ORIGINAL LOGIC FOR CHROME USERS ---
        const params      = new URLSearchParams(window.location.search);
        const chIndex     = parseInt(params.get('ch'), 10);
        const channel     = CHANNELS[chIndex];

        const iframe      = document.getElementById('captureFrame');
        const errorScreen = document.getElementById('errorScreen');
        const wrapper     = document.getElementById('playerWrapper');
        const shield      = document.getElementById('lockLayer');
        const status      = document.getElementById('status');

        if (isNaN(chIndex) || !channel) {
            errorScreen.style.display = 'flex';
            document.getElementById('frameMover').style.display = 'none';
            return;
        }

        document.title = channel.name;
        iframe.src = channel.url;

        var frameMover = document.getElementById('frameMover');

        function autoCenter() {
            var viewportH   = wrapper.offsetHeight;
            var moverH      = frameMover.offsetHeight;
            var rawOffset   = (moverH - viewportH) / 2;
            var nudge       = moverH * 0.07;
            var finalOffset = -(rawOffset + nudge);
            frameMover.style.top = finalOffset + 'px';
        }

        autoCenter();
        window.addEventListener('resize', autoCenter);
        iframe.addEventListener('load', function () {
            setTimeout(autoCenter, 300);
        });

        let clickCount = 0;
        const maxClicks = 4;
        let locked = false;

        function lockPlayer() {
            shield.classList.add('active');
            status.innerText = 'CONTROLS LOCKED';
            locked = true;
        }

        wrapper.addEventListener('click', function () {
            if (locked) return;
            clickCount++;
            const remaining = maxClicks - clickCount;
            if (remaining > 0) {
                status.innerText = 'Setup Mode: ' + remaining + ' clicks left';
            }
            if (clickCount >= maxClicks) { lockPlayer(); }
        });
    });

})();
</script>
</body>
</html>
