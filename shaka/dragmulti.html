<!DOCTYPE html>
<html>
<head>
    <style>
        /* Container for the player */
        .player-wrapper {
            position: relative;
            width: 100%;
            max-width: 800px;
            height: 450px;
            background: #000;
        }

        /* The Shield: Absorbs the first aggressive ad-click */
        #ad-shield {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 10;
            background: rgba(0,0,0,0.01); /* Invisible */
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-family: sans-serif;
            font-weight: bold;
        }

        /* The Jailed Iframe */
        iframe {
            width: 100%;
            height: 100%;
            border: none;
        }
    </style>
</head>
<body>

<div class="player-wrapper">
    <!-- Click this once to remove the shield and access the stream -->
    <div id="ad-shield" onclick="this.style.display='none'">
        CLICK ONCE TO START STREAM
    </div>

    <!-- The 'Strict' Sandbox: Specifically omits allow-popups -->
    <iframe 
        src="https://tv-shihab.xyz/live/sony-ten-1/" 
        sandbox="allow-scripts allow-same-origin allow-forms allow-presentation"
        allow="autoplay; fullscreen; encrypted-media">
    </iframe>
</div>

<p><em>Note: If the ad triggers a "Redirect Blocked" message, the sandbox is working.</em></p>

</body>
</html>
