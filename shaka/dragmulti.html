<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Live Stream</title>

    <script src="https://unpkg.com/x-frame-bypass"></script>
    <script type="module" src="https://unpkg.com/x-frame-bypass"></script>

    <style>
        :root { --primary: #00ffA0; }
        body, html {
            margin: 0; padding: 0;
            width: 100%; height: 100%;
            background: #000;
            display: flex; align-items: center; justify-content: center;
            overflow: hidden;
            font-family: sans-serif;
        }

        /* The player is HIDDEN by default */
        .viewport {
            width: 100vw; max-width: 1000px; aspect-ratio: 16 / 9;
            overflow: hidden; position: relative;
            border: 4px solid var(--primary); border-radius: 12px;
            background: #000;
            display: none; 
        }

        #frameMover {
            position: absolute; width: 100%; height: 270%; top: 0; left: 0;
        }

        #captureFrame {
            width: 100%; height: 100%; border: none;
        }

        #lockLayer {
            position: absolute; top: 0; left: 0;
            width: 100%; height: 100%;
            z-index: 9999;
            background: rgba(0,0,0,0.01);
            pointer-events: none;
            cursor: pointer;
        }

        #lockLayer.active {
            pointer-events: all !important;
            cursor: default;
        }

        .click-hint {
            position: absolute; bottom: 60px; right: 15px;
            color: var(--primary); font-size: 12px;
            z-index: 10000; pointer-events: none; opacity: 0.7;
        }

        #resetBtn {
            position: fixed; bottom: 12px; right: 12px;
            padding: 8px 15px;
            background: rgba(0,255,160,0.15); color: #00ffa0;
            border: 1px solid rgba(0,255,160,0.6); border-radius: 30px;
            font-size: 14px; backdrop-filter: blur(10px); cursor: pointer; z-index: 10002;
        }

        #ticker {
            position: absolute; top: 0; left: 0;
            width: 100%; background: transparent;
            overflow: hidden; white-space: nowrap;
            z-index: 10000; padding: 11px 0;
        }

        #ticker span {
            display: inline-block; padding-left: 100%;
            animation: scroll 15s linear infinite;
            color: #ff3b3b; font-size: 14px;
        }

        @keyframes scroll {
            0% { transform: translateX(0); }
            100% { transform: translateX(-100%); }
        }

        #fallback {
            display: none; /* Shown only if NOT Chrome */
            text-align: center;
            color: #fff;
            padding: 30px;
            max-width: 400px;
        }

        .chrome-btn {
            display: inline-block;
            margin-top: 20px;
            padding: 12px 25px;
            background: var(--primary);
            color: #000;
            text-decoration: none;
            border-radius: 50px;
            font-weight: bold;
        }
    </style>
</head>
<body>

<div class="viewport" id="playerWrapper">
    <div id="lockLayer"></div>
    <div id="ticker"><span>Press refresh and click play button 3-4 times · अगर क्लिक न हो तो रिफ्रेश बटन दबाएं।</span></div>
    <div class="click-hint" id="status"></div>
    <button id="resetBtn" onclick="location.reload()">⟳ Refresh</button>
    <div id="frameMover">
        <iframe id="captureFrame" is="x-frame-bypass" scrolling="no"></iframe>
    </div>
</div>

<div id="fallback">
    <h1 style="color: var(--primary); font-size: 40px; margin-bottom: 10px;">Oops!</h1>
    <p>This live stream is only available on <b>Google Chrome</b>.</p>
    <p style="font-size: 0.9em; color: #888;">Other browsers (Edge, Safari, Firefox) are not supported.</p>
    <a href="https://www.google.com/chrome/" class="chrome-btn">Download Chrome</a>
</div>

<script>
// --- Channel Config ---
const CHANNELS = [
    { name: "Vision Punjab", url: "https://tulnit.com/live/vision-punjab-tv-hd/" },
    { name: "Sony Tv Hd", url: "https://tulnit.com/live/sony-tv-hd/" },
    { name: "Sony Sab Hd", url: "https://tulnit.com/live/sony-sab-hd/" },
    { name: "Sony Max", url: "https://tulnit.com/live/sony-max-hd-ind/" },
    { name: "Colors Hd", url: "https://tulnit.com/live/bollywood-colors/" }
];

(function () {
    /**
     * Strict Chrome Detection
     */
    function isStrictChrome() {
        const ua = navigator.userAgent;
        const vendor = navigator.vendor;
        
        // 1. Must be Google Inc vendor
        const isGoogle = vendor === "Google Inc.";
        // 2. Must contain Chrome in UA
        const hasChrome = ua.includes("Chrome");
        // 3. Must NOT contain Edge (Edg) or Opera (OPR)
        const isEdge = ua.includes("Edg") || ua.includes("Edge");
        const isOpera = ua.includes("OPR") || ua.includes("Opera");
        
        return isGoogle && hasChrome && !isEdge && !isOpera;
    }

    document.addEventListener("DOMContentLoaded", function () {
        const playerWrapper = document.getElementById('playerWrapper');
        const fallback = document.getElementById('fallback');
        const iframe = document.getElementById('captureFrame');
        const status = document.getElementById('status');
        const frameMover = document.getElementById('frameMover');

        // Check browser
        if (!isStrictChrome()) {
            playerWrapper.remove(); // Delete player from DOM entirely
            fallback.style.display = 'block';
            return;
        }

        // If Chrome, show player
        playerWrapper.style.display = 'block';

        // Get Channel
        const params = new URLSearchParams(window.location.search);
        const chIndex = parseInt(params.get('ch'), 10);
        const channel = CHANNELS[chIndex];

        if (isNaN(chIndex) || !channel) {
            playerWrapper.innerHTML = "<h2 style='color:white;text-align:center'>Invalid Channel ID</h2>";
            return;
        }

        document.title = channel.name;
        iframe.src = channel.url;

        // Positioning Logic
        function autoCenter() {
            var viewportH = playerWrapper.offsetHeight;
            var moverH = frameMover.offsetHeight;
            var rawOffset = (moverH - viewportH) / 2;
            var nudge = moverH * 0.07;
            var finalOffset = -(rawOffset + nudge);
            frameMover.style.top = finalOffset + 'px';
        }

        autoCenter();
        window.addEventListener('resize', autoCenter);
        iframe.addEventListener('load', () => setTimeout(autoCenter, 300));

        // Click-to-lock Logic
        let clickCount = 0;
        const maxClicks = 4;
        let locked = false;

        playerWrapper.addEventListener('click', function () {
            if (locked) return;
            clickCount++;
            const remaining = maxClicks - clickCount;
            if (remaining > 0) {
                status.innerText = 'Setup Mode: ' + remaining + ' clicks left';
            }
            if (clickCount >= maxClicks) {
                document.getElementById('lockLayer').classList.add('active');
                status.innerText = 'CONTROLS LOCKED';
                locked = true;
            }
        });
    });
})();
</script>
</body>
</html>
