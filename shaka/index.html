<!DOCTYPE html>

    <!-- 2. Shaka Player via CDN (Reliable) -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net">

    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background: #000; overflow: hidden; font-family: sans-serif; color: white; }
        #stage { width: 100vw; height: 100vh; display: flex; justify-content: center; align-items: center; }
        video { width: 100%; height: 100%; background: #000; }
        #status { position: absolute; top: 15px; left: 15px; background: rgba(0,0,0,0.7); padding: 8px 15px; border-radius: 4px; font-size: 14px; z-index: 100; border-left: 4px solid #007bff; }
        #unmute-btn { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); background: #007bff; color: white; padding: 15px 30px; border-radius: 50px; font-weight: bold; cursor: pointer; z-index: 200; box-shadow: 0 0 20px rgba(0,123,255,0.5); border: none; }
    </style>
</head>
<body>

    <div id="stage" data-shaka-player-container>
        <div id="status">MSTV | Loading...</div>
        <button id="unmute-btn">🔊 CLICK FOR SOUND</button>

        async function initPlayer() {
            const video = document.getElementById('video');
            const ui = video['ui'];
            const player = ui.getControls().getPlayer();
            const status = document.getElementById('status');
            const unmuteBtn = document.getElementById('unmute-btn');

            // --- Unmute Logic ---
            unmuteBtn.addEventListener('click', () => {
                video.muted = false;
                video.volume = 1.0;
                unmuteBtn.style.display = 'none';
            });

            // --- URL Logic ---
            const chId = window.location.search.substring(1) || "1";
            const ch = channels[chId];

            if (ch) {
                status.innerText = "MSTV | Playing: " + ch.name;
                if (ch.drm) {
                    player.configure({ drm: { clearKeys: ch.drm } });
                }
                try {
                    await player.load(ch.url);
                } catch (e) {
                    status.innerText = "Error: " + e.code;
                }
            }
        }

        // Wait for Shaka UI to be ready
        document.addEventListener('shaka-ui-loaded', initPlayer);
        // Backup if the event fires too fast
        document.addEventListener('DOMContentLoaded', () => { if (window.shaka) initPlayer(); });
    </script>
