        async function initPlayer() {
            // Safety check: ensure Shaka is loaded
            if (typeof shaka === 'undefined') {
                console.error("Shaka library not loaded yet. Retrying...");
                setTimeout(initPlayer, 500);
                return;
            }

            const video = document.getElementById('video');
            const ui = video['ui'];
            const controls = ui.getControls();
            const player = controls.getPlayer();

            // Get ID (e.g. ?1)
            const channelId = window.location.search.substring(1);
            const selected = channels[channelId];

            if (selected) {
                // Configure ClearKey DRM for Channel 1
                if (selected.drm) {
                    player.configure({
                        drm: { clearKeys: selected.drm }
                    });
                }

                try {
                    await player.load(selected.url);
                    console.log("Playing: " + selected.name);
                } catch (e) {
                    console.error("Error loading stream:", e.code, e);
                }
            }
        }

        // Listen for Shaka UI to be ready
        document.addEventListener('shaka-ui-loaded', initPlayer);
        // Fallback for some browsers
        document.addEventListener('DOMContentLoaded', () => {
            if (window.shaka) initPlayer();
        });
