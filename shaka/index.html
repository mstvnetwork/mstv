<!DOCTYPE html>
<html lang="en">
<head>
    <meta name="referrer" content="no-referrer">
    <meta charset="UTF-8">
    <title>MSTV Network | Unified Player</title>
    <!-- Mux.js is REQUIRED for HLS channels (2, 5) to play in Shaka -->
    <script src="https://cdnjs.cloudflare.com"></script>
    <script src="shaka.js"></script>
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background: #000; overflow: hidden; font-family: sans-serif; color: white; }
        #stage { width: 100vw; height: 100vh; position: relative; display: flex; justify-content: center; align-items: center; }
        video, iframe { width: 100%; height: 100%; border: none; display: none; }
        #status-overlay { position: absolute; top: 15px; left: 15px; background: rgba(0,0,0,0.6); padding: 5px 12px; border-radius: 4px; font-size: 12px; z-index: 100; border-left: 3px solid #007bff; }
    </style>
</head>
<body>

    <div id="stage">
        <div id="status-overlay">MSTV | Initializing...</div>
        <!-- Note: Added 'muted' to ensure Autoplay works on all browsers -->
        <video id="video" controls autoplay muted playsinline crossorigin="anonymous"></video>
        <iframe id="external-frame" allow="autoplay; encrypted-media; fullscreen" allowfullscreen></iframe>
    </div>

    <script>
const channels = {
    "1": {
        name: "Zee TV",
        url: "https://d1g8wgjurz8via.cloudfront.net/bpk-tv/Zeetv/default/main.mpd",
        type: "shaka",
        drm: { 'ed068cf84f0640ccbc7c0e395c0a272e': 'bb722190f2bb446391020411a7d0828b' }
    },
    "2": {
        name: "Willow Cricket 2",
        url: "https://restream-live.realiptv.to/live/ALEX/sg5ng25ikf/3973.m3u8",
        type: "shaka"
    },
    "3": {
        name: "Deewana HD",
        url: "https://live20.bozztv.com/giatvplayout7/giatv-209592/index.m3u8",
        type: "shaka"
    },
    "4": {
        name: "Star Gold",
        url: "https://anywhere.pwisetthon.com/http://tvn2.chowdhury-shaheb.com/stargold/tracks-v1a1/mono.m3u8",
        type: "shaka"
    },
    "5": {
        name: "Zindgi Tv (Pak)",
        url: "https://5ad386ff92705.streamlock.net/live_transcoder/ngrp:zindagitv.stream_all/chunklist.m3u8",
        type: "shaka"
    }
};

let player;

async function initApp() {
    if (typeof shaka === 'undefined') {
        document.getElementById('status-overlay').innerText = "shaka.js not found!";
        return;
    }

    shaka.polyfill.installAll();
    const video = document.getElementById('video');
    player = new shaka.Player(video);

    // Fixed the broken logic here:
    const query = window.location.search.substring(1);
    const chId = query || "1"; 
    
    loadChannel(chId);
}

async function loadChannel(id) {
    const ch = channels[id];
    const status = document.getElementById('status-overlay');
    const video = document.getElementById('video');
    const iframe = document.getElementById('external-frame');

    if (!ch) {
        status.innerText = "Error: Channel " + id + " not found.";
        return;
    }

    status.innerText = "MSTV | " + ch.name;

    if (ch.type === "shaka") {
        iframe.style.display = "none";
        iframe.src = "";
        video.style.display = "block";
        
        // Reset config and apply ClearKey DRM if available
        player.configure({ drm: { clearKeys: ch.drm || {} } });

        try {
            await player.load(ch.url);
            console.log("Success loading: " + ch.name);
        } catch (e) { 
            status.innerText = "Playback Error: " + e.code; 
            console.error("Shaka Error:", e);
        }
    } else {
        // Iframe Fallback
        video.style.display = "none";
        player.unload(); 
        iframe.style.display = "block";
        iframe.setAttribute('sandbox', 'allow-forms allow-scripts allow-same-origin allow-presentation');
        iframe.src = ch.url;
    }
}

document.addEventListener('DOMContentLoaded', initApp);
    </script>
</body>
</html>
