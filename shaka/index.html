<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="referrer" content="no-referrer">
    <title>MSTV Unified Player</title>
    
    <!-- Shaka Player UI & Engine -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com">
    <script src="https://cdnjs.cloudflare.com"></script>
    
    <!-- Mux.js (Required for HLS/m3u8 playback) -->
    <script src="https://cdnjs.cloudflare.com"></script>

    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background: #000; overflow: hidden; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; color: white; }
        #stage { position: relative; width: 100vw; height: 100vh; display: flex; justify-content: center; align-items: center; }
        video { width: 100%; height: 100%; }
        
        /* Enhanced Status Label */
        #status { position: absolute; top: 15px; left: 15px; background: rgba(0,0,0,0.85); padding: 10px 18px; border-radius: 6px; font-size: 13px; z-index: 1000; border-left: 5px solid #007bff; max-width: 80%; line-height: 1.4; pointer-events: none; }
        .error-text { color: #ff4d4d; font-weight: bold; }
        
        #unmute-btn { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); background: #007bff; color: white; padding: 15px 35px; border-radius: 50px; font-weight: bold; cursor: pointer; z-index: 2000; box-shadow: 0 0 30px rgba(0,123,255,0.6); border: none; font-size: 16px; }
    </style>
</head>
<body>

    <div id="stage" data-shaka-player-container>
        <div id="status">MSTV | Initializing...</div>
        <button id="unmute-btn">🔊 ENABLE SOUND & PLAY</button>
        <video id="video" data-shaka-player autoplay muted playsinline></video>
    </div>

    <script>
        const channels = {
            "1": { name: "Zee TV", url: "https://d1g8wgjurz8via.cloudfront.net", drm: { 'ed068cf84f0640ccbc7c0e395c0a272e': 'bb722190f2bb446391020411a7d0828b' } },
            "2": { name: "Willow Cricket 2", url: "https://restream-live.realiptv.to" },
            "3": { name: "Deewana HD", url: "https://live20.bozztv.com" },
            "4": { name: "Sky Sports", url: "https://nl1.rocketdns.info" },
            "5": { name: "Star Gold", url: "https://anywhere.pwisetthon.com" },
            "6": { name: "Zindgi Tv (Pak)", url: "https://5ad386ff92705.streamlock.net" }
        };

        const statusEl = document.getElementById('status');

        function updateStatus(msg, isError = false) {
            statusEl.innerHTML = isError ? `<span class="error-text">ERROR: ${msg}</span>` : `MSTV | ${msg}`;
            console.log(`[MSTV] ${msg}`);
        }

        async function initPlayer() {
            const video = document.getElementById('video');
            const ui = video['ui'];
            const controls = ui.getControls();
            const player = controls.getPlayer();
            const unmuteBtn = document.getElementById('unmute-btn');

            // --- Unmute & Force Play ---
            unmuteBtn.addEventListener('click', () => {
                video.muted = false;
                video.play().then(() => {
                    unmuteBtn.style.display = 'none';
                    updateStatus("Audio Enabled");
                }).catch(e => updateStatus("Click Play again", true));
            });

            // --- Shaka Configuration ---
            player.configure({
                streaming: {
                    forceTransmuxTS: true, // Crucial for .m3u8 TS streams
                    jumpLargeGaps: true
                }
            });

            // --- Error Reporting Logic ---
            player.addEventListener('error', (event) => {
                const error = event.detail;
                // Map common Shaka errors to readable text
                let friendlyMsg = error.code;
                if (error.code === 1002) friendlyMsg = "CORS/Network Block (1002)";
                if (error.code === 3016) friendlyMsg = "Format Unsupported (3016)";
                if (error.code === 4032) friendlyMsg = "DRM Key Mismatch (4032)";
                
                updateStatus(friendlyMsg, true);
            });

            const chId = window.location.search.substring(1) || "1";
            const ch = channels[chId];

            if (ch) {
                updateStatus(`Loading ${ch.name}...`);
                if (ch.drm) player.configure({ drm: { clearKeys: ch.drm } });

                try {
                    await player.load(ch.url);
                    updateStatus(`Playing: ${ch.name}`);
                } catch (e) {
                    // This catches initial load errors
                    updateStatus(`Load Failed (${e.code})`, true);
                }
            } else {
                updateStatus("Channel ID not found in URL", true);
            }
        }

        document.addEventListener('shaka-ui-loaded', initPlayer);
        // Fallback for non-UI builds
        document.addEventListener('DOMContentLoaded', () => { 
            if (window.shaka && !document.getElementById('video')['ui']) {
                updateStatus("UI Library failed to load. Check CDN links.", true);
            }
        });
    </script>
</body>
</html>
