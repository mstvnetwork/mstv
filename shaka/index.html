<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>MSTV Player</title>
    <!-- Using official Shaka Player CDN -->
    <script src="shaka.js"></script>
    <style>
        /* Optimized for Iframe: Removes all margins and scrollbars */
        body, html { 
            margin: 0; 
            padding: 0; 
            background: #000; 
            overflow: hidden; 
            width: 100%; 
            height: 100%; 
        }
        .container { 
            display: flex; 
            width: 100vw; 
            height: 100vh; 
            align-items: center; 
            justify-content: center; 
        }
        video { 
            width: 100%; 
            height: 100%; 
            background: #000; 
            object-fit: contain; /* Maintains aspect ratio without stretching */
        }
    </style>
</head>
<body>
    <div class="container">
        <video id="video" controls autoplay crossorigin="anonymous"></video>
    </div>

    <script>
        const streamList = [
    {
        name: "Zee TV (DASH ClearKey)",
        type: "dash",
        url: "https://d1g8wgjurz8via.cloudfront.net/bpk-tv/Zeetv/default/main.mpd",
        drm: {
            clearKeys: {
                "ed068cf84f0640ccbc7c0e395c0a272e": "bb722190f2bb446391020411a7d0828b"
            }
        }
    },
    {
        name: "Zee Anmol (DASH ClearKey)",
        type: "dash",
        url: "https://d1g8wgjurz8via.cloudfront.net/bpk-tv/Zeeanmol/default/main.mpd",
        drm: {
            clearKeys: {
                "4023613457774cbeb71a62c339970e63": "1c3e9fce5f014542be9cd1f749181204"
            }
        }
    },
    {
        name: "And Tv",
        type: "hls",
        url: "https://amg01117-amg01117c1-amgplt0029.playout.now3.amagi.tv/ts-eu-w1-n2/playlist/amg01117-amg01117c1-amgplt0029/ddb9c46c-1491-11f1-96a5-c209a4167668/36/1280x720_2657600/index.m3u8"
    },
    {
        name: "Real IPTV",
        type: "hls",
        url: "https://restream-live.realiptv.to/live/ALEX/sg5ng25ikf/3973.m3u8"
    },
    {
        name: "BozzTV",
        type: "hls",
        url: "https://live20.bozztv.com/giatvplayout7/giatv-209592/index.m3u8"
    },
    {
        name: "Star Gold Proxy",
        type: "hls",
        url: "https://anywhere.pwisetthon.com/http://tvn2.chowdhury-shaheb.com/stargold/tracks-v1a1/mono.m3u8"
    },
    {
        name: "And Pictures (DASH ClearKey)",
        type: "dash",
        url: "https://d1g8wgjurz8via.cloudfront.net/bpk-tv/Andpictures/default/main.mpd",
        drm: {
            clearKeys: {
                "8dea532cabfe471ba20f623107949": "7a214a974e4f4d1d9bb65364d5f0cb92"
            }
        }
    },
    {
        name: "Zee Cinema Hd",
        type: "hls",
        url: "https://stream.ads.ottera.tv/cl/260228d6hhkdt2na01o4h0q9p0/1280x720_2300000_0_f.m3u8?i=475_6640"
    }
];
        async function initPlayer() {
            const hash = window.location.hash.substring(1);
            let index = parseInt(hash, 10) - 1;
            if (isNaN(index) || index < 0 || index >= streamList.length) index = 0;

            const stream = streamList[index];
            const video = document.getElementById('video');
            shaka.polyfill.installAll();

            if (!shaka.Player.isBrowserSupported()) {
                alert("Browser not supported.");
                return;
            }

            const player = new shaka.Player(video);
            player.addEventListener('error', (e) => console.error("Shaka Error:", e.detail));

            try {
                if (stream.type === "dash" && stream.drm) {
                    player.configure({ drm: stream.drm });
                }
                await player.load(stream.url);
            } catch (error) {
                console.error("Loading failed:", error);
            }
        }

        window.addEventListener('hashchange', () => window.location.reload());
        document.addEventListener('DOMContentLoaded', initPlayer);
    </script>
</body>
</html>
