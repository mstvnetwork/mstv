<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MSTV Player</title>
    <!-- DASH ENGINE (Local) -->
    <link rel="stylesheet" href="shaka-ui.css">
    <script src="shaka-player.ui.min.js"></script>

    <!-- HLS ENGINE (CDN Fallback) -->
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>

 <style>
        body, html { margin: 0; padding: 0; background: #000; overflow: hidden; width: 100%; height: 100%; }
        .container { display: flex; width: 100vw; height: 100vh; background: #000; align-items: center; justify-content: center; }
        video { width: 100%; height: 100%; object-fit: contain; }
    </style>
</head>
<body>

    <div class="container">
        <video id="video" controls autoplay crossorigin="anonymous"></video>
    </div>
         <script>
    const activeWorker = "https://zee5.mchoudhry482.workers.dev/?url=";

    async function initApp() {
        const video = document.getElementById('video');
        const streamList = [
            { name: "Sony Pal", type: "hls", url: "http://maxotts.maxdigitaltv.com/x-media/C106/master.m3u8" },
            { name: "Zee TV", type: "dash", url: "https://d1g8wgjurz8via.cloudfront.net/bpk-tv/Zeetv/default/main.mpd", 
              drm: { "ed068cf84f0640ccbc7c0e395c0a272e": "bb722190f2bb446391020411a7d0828b" } }
        ];

        const hash = window.location.hash.substring(1);
        let index = (parseInt(hash, 10) || 1) - 1;
        const stream = streamList[index] || streamList;

        // --- DASH (SHAKA) ---
        if (stream.type === "dash") {
            shaka.polyfill.installAll();
            const player = new shaka.Player(video);

            // This tells Shaka to wrap every internal URL in your proxy
            player.getNetworkingEngine().registerRequestFilter((type, request) => {
                const uri = request.uris;
                if (!uri.startsWith(activeWorker) && !uri.startsWith('data:')) {
                    request.uris = activeWorker + encodeURIComponent(uri);
                }
            });

            if (stream.drm) player.configure({ drm: { clearKeys: stream.drm } });

            try {
                await player.load(stream.url);
            } catch (e) { console.error("DASH Error", e); }
        }

        // --- HLS (HLS.JS) ---
        if (stream.type === "hls") {
            if (Hls.isSupported()) {
                const hls = new Hls();
                hls.loadSource(activeWorker + encodeURIComponent(stream.url));
                hls.attachMedia(video);
            }
        }
    }

    window.onload = initApp;
    window.onhashchange = () => window.location.reload();
                                        </script>
</body>
</html>
