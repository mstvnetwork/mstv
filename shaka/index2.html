<!DOCTYPE html>
<html>
<head>
    <title>Bare Bones Test</title>
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
    <style>
        body { background: #000; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        video { width: 80%; border: 2px solid white; }
    </style>
</head>
<body>

    <video id="video" controls autoplay></video>

    <script>
        const video = document.getElementById('video');
        
        // YOUR WORKER URL
        const workerPrefix = "https://zee5.mchoudhry482.workers.dev/?url=";
        
        // THE TEST CHANNEL (Sony Pal)
        const streamUrl = "http://maxotts.maxdigitaltv.com/x-media/C106/master.m3u8";

        if (Hls.isSupported()) {
            const hls = new Hls();
            
            // This combines your worker + the channel
            const finalUrl = workerPrefix + encodeURIComponent(streamUrl);
            console.log("Loading:", finalUrl);

            hls.loadSource(finalUrl);
            hls.attachMedia(video);

            hls.on(Hls.Events.MANIFEST_PARSED, () => {
                console.log("Success! Manifest loaded.");
                video.play();
            });

            hls.on(Hls.Events.ERROR, (event, data) => {
                console.error("HLS Error:", data);
            });
        }
    </script>
</body>
</html>
