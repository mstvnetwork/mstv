<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>DASH Fix Final</title>
    <!-- FIXED: Correct direct link to mux.js file -->
    <script src="https://cdn.jsdelivr.net"></script>
    <script src="shaka.js"></script>
    <style>
        body { margin: 0; background: #000; display: flex; justify-content: center; align-items: center; height: 100vh; }
        #video-container { width: 100%; max-width: 800px; }
        video { width: 100%; display: block; }
    </style>
</head>
<body>
    <div id="video-container">
        <video id="video" controls autoplay crossorigin="anonymous"></video>
    </div>

<script>
const streamUrl = "https://d1g8wgjurz8via.cloudfront.net/bpk-tv/Andtv/default/main.mpd";

async function initPlayer() {
    const video = document.getElementById('video');
    shaka.polyfill.installAll();

    const player = new shaka.Player();
    await player.attach(video);

    player.configure({
        drm: {
            clearKeys: {
                'ed068cf84f0640ccbc7c0e395c0a272e': 'bb722190f2bb446391020411a7d0828b'
            }
        },
        manifest: {
            dash: { ignoreMinBufferTime: true }
        }
    });

    // Fixes 4012 by stripping hardware DRM tags before Shaka sees them
    player.getNetworkingEngine().registerResponseFilter((type, response) => {
        if (type === shaka.net.NetworkingEngine.RequestType.MANIFEST) {
            const data = response.data;
            let str = new TextDecoder().decode(data);
            
            // Remove Widevine blocks that force hardware security
            str = str.replace(/<ContentProtection [^>]*?schemeIdUri="urn:uuid:edef8ba9-79d6-4ace-a3c8-27dcd51d21ed"[\s\S]*?<\/ContentProtection>/g, '');
            
            response.data = new TextEncoder().encode(str);
        }
    });

    player.addEventListener('error', (e) => {
        console.error('Shaka Error:', e.detail.code, e.detail);
    });

    try {
        await player.load(streamUrl);
        console.log("Success! Playback starting.");
    } catch (e) {
        console.error('Final Load Error:', e.code);
    }
}

document.addEventListener('DOMContentLoaded', initPlayer);
</script>
</body>
</html>
