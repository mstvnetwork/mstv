<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MSTV Player</title>
    <!-- DASH ENGINE (Local) -->
    <link rel="stylesheet" href="shaka-ui.css">
    <script src="shaka-player.ui.min.js"></script>

    <!-- HLS ENGINE (CDN Fallback) -->
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>

 <style>
        body, html { margin: 0; padding: 0; background: #000; overflow: hidden; width: 100%; height: 100%; }
        .container { display: flex; width: 100vw; height: 100vh; background: #000; align-items: center; justify-content: center; }
        video { width: 100%; height: 100%; object-fit: contain; }
    </style>
</head>
<body>

    <div class="container">
        <video id="video" controls autoplay crossorigin="anonymous"></video>
    </div>
<script>
    // --- 1. CONFIGURATION ---
    const activeWorker = "https://zee5.mchoudhry482.workers.dev/?url=";

    const streamList = [
        {
            name: "Sony Pal",
            type: "hls",
            url: "http://maxotts.maxdigitaltv.com/x-media/C106/master.m3u8"
        },
        {
            name: "Zee TV (DASH ClearKey)",
            type: "dash",
            url: "https://d1g8wgjurz8via.cloudfront.net/bpk-tv/Zeetv/default/main.mpd",
            drm: { "ed068cf84f0640ccbc7c0e395c0a272e": "bb722190f2bb446391020411a7d0828b" }
        }
    ];

    async function initApp() {
        const video = document.getElementById('video');
        const hash = window.location.hash.substring(1);
        let index = (parseInt(hash, 10) || 1) - 1;
        const stream = streamList[index];

        if (!stream) return;

        video.style.objectFit = 'fill';
        const proxiedUrl = activeWorker + encodeURIComponent(stream.url);

        // --- 2. HLS ENGINE SETUP ---
        if (stream.type === "hls") {
            if (Hls.isSupported()) {
                const hls = new Hls({
                    xhrSetup: function(xhr) {
                        xhr.setRequestHeader('User-Agent', 'Mozilla/5.0 (iPhone; CPU iPhone OS 17_0 like Mac OS X) AppleWebKit/605.1.15 (KHTML, like Gecko) Version/17.0 Mobile/15E148 Safari/604.1');
                    }
                });

                hls.loadSource(proxiedUrl);
                hls.attachMedia(video);

                // ERROR RECOVERY: If Worker is blocked (521), try Direct Link
                hls.on(Hls.Events.ERROR, function (event, data) {
                    if (data.fatal) {
                        if (data.response?.code === 521 || data.response?.code === 503) {
                            console.warn("Worker blocked. Trying Direct Playback...");
                            hls.loadSource(stream.url); // Try raw URL
                        } else {
                            hls.recoverMediaError();
                        }
                    }
                });
            } 
            else if (video.canPlayType('application/vnd.apple.mpegurl')) {
                video.src = proxiedUrl;
            }
        }

        // --- 3. DASH ENGINE SETUP ---
        if (stream.type === "dash") {
            if (typeof shaka === 'undefined') return;
            shaka.polyfill.installAll();
            const player = new shaka.Player(video);

            player.configure({
                streaming: { bufferingGoal: 8, rebufferingGoal: 1, bufferBehind: 5 }
            });

            if (stream.drm) {
                player.configure({ drm: { clearKeys: stream.drm } });
            }

            player.getNetworkingEngine().registerRequestFilter((type, request) => {
                request.headers['User-Agent'] = 'Mozilla/5.0 (iPhone; CPU iPhone OS 17_0 like Mac OS X) AppleWebKit/605.1.15 (KHTML, like Gecko) Version/17.0 Mobile/15E148 Safari/604.1';
            });

            try {
                await player.load(proxiedUrl);
            } catch (e) {
                console.error("DASH Load Failed. Retrying direct...", e);
                await player.load(stream.url); // Direct fallback
            }
        }

        // --- 4. STALL PROTECTION ---
        video.addEventListener('waiting', () => {
            const stallCheck = setTimeout(() => {
                if (video.paused === false && video.readyState < 3) {
                    console.log("Stall detected, refreshing...");
                    window.location.reload();
                }
            }, 6000);
            video.addEventListener('playing', () => clearTimeout(stallCheck), { once: true });
        });
    }

    window.addEventListener('hashchange', () => window.location.reload());
    window.onload = initApp;
</script>
</body>
</html>
