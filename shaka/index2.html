<!DOCTYPE html>
<html>
<head>
    <title>Bare Bones Test</title>
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
    <style>
        body { background: #111; color: white; font-family: sans-serif; text-align: center; padding-top: 50px; }
        /* Professional touch: Rounded corners and shadow */
        video { width: 80%; max-width: 800px; border: 1px solid #444; background: #000; border-radius: 8px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
    </style>
</head>
<body>

    <video id="video" controls muted playsinline></video>

    <script>
        const video = document.getElementById('video');
        const workerPrefix = "https://zee5.mchoudhry482.workers.dev/?url=";
        const streamUrl = "http://maxotts.maxdigitaltv.com/x-media/C106/master.m3u8";
        const finalUrl = workerPrefix + encodeURIComponent(streamUrl);

        function startStream() {
            if (Hls.isSupported()) {
                const hls = new Hls();
                hls.loadSource(finalUrl);
                hls.attachMedia(video);
                
                hls.on(Hls.Events.MANIFEST_PARSED, () => {
                    // Attempt to autoplay
                    video.play().catch(e => {
                        console.log("Autoplay blocked by browser. User interaction may be required.");
                    });
                });

                hls.on(Hls.Events.ERROR, (event, data) => {
                    if (data.fatal) {
                        console.error("Fatal HLS error:", data.details);
                    }
                });
            } 
            // Support for Safari/iOS native HLS
            else if (video.canPlayType('application/vnd.apple.mpegurl')) {
                video.src = finalUrl;
                video.addEventListener('loadedmetadata', () => {
                    video.play();
                });
            }
        }

        // Run the function as soon as the page loads
        window.addEventListener('DOMContentLoaded', startStream);
    </script>
</body>
</html>
