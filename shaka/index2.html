<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>DASH ClearKey Fix</title>
    <script src="https://cdn.jsdelivr.net"></script>
    <script src="shaka.js"></script>
    <style>
        body { margin: 0; background: #000; display: flex; justify-content: center; align-items: center; height: 100vh; }
        #video-container { position: relative; width: 100%; max-width: 800px; }
        video { width: 100%; background: #111; display: block; }
    </style>
</head>
<body>
    <div id="video-container">
        <video id="video" controls autoplay crossorigin="anonymous"></video>
    </div>

<script>
const streamUrl = "https://d1g8wgjurz8via.cloudfront.net/bpk-tv/Andtv/default/main.mpd";

async function initPlayer() {
    const video = document.getElementById('video');
    shaka.polyfill.installAll();

    const player = new shaka.Player();
    await player.attach(video);

    player.configure({
        drm: {
            clearKeys: {
                'ed068cf84f0640ccbc7c0e395c0a272e': 'bb722190f2bb446391020411a7d0828b'
            },
            // Avoid 4012 by ignoring some hardware restrictions
            advanced: {
                'org.w3.clearkey': {
                    'videoRobustness': '',
                    'audioRobustness': ''
                }
            }
        }
    });

    player.addEventListener('error', (e) => {
        console.error('Error Code:', e.detail.code, 'Category:', e.detail.category);
        if (e.detail.code === 4012) {
            console.warn("Restriction error: Check if your browser supports this codec/DRM.");
        }
    });

    try {
        await player.load(streamUrl);
        console.log("Success! Playback started.");
    } catch (e) {
        console.error('Load Error:', e.code, e);
    }
}

document.addEventListener('DOMContentLoaded', initPlayer);
</script>
</body>
</html>
