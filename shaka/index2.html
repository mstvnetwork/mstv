<!DOCTYPE html>
<html>
<head>
    <title>Bare Bones Test</title>
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
    <style>
        body { background: #111; color: white; font-family: sans-serif; text-align: center; padding-top: 50px; }
        video { width: 80%; max-width: 800px; border: 3px solid #333; background: #000; }
        button { padding: 15px 30px; font-size: 18px; cursor: pointer; background: #22c55e; color: white; border: none; border-radius: 5px; margin-bottom: 20px; }
    </style>
</head>
<body>

    <button id="playBtn">CLICK TO START SONY PAL</button><br>
    <video id="video" controls muted></video>

    <script>
        const video = document.getElementById('video');
        const playBtn = document.getElementById('playBtn');
        const workerPrefix = "https://zee5.mchoudhry482.workers.dev/?url=";
        const streamUrl = "http://maxotts.maxdigitaltv.com/x-media/C106/master.m3u8";

        playBtn.addEventListener('click', () => {
            if (Hls.isSupported()) {
                const hls = new Hls();
                const finalUrl = workerPrefix + encodeURIComponent(streamUrl);
                
                hls.loadSource(finalUrl);
                hls.attachMedia(video);
                
                hls.on(Hls.Events.MANIFEST_PARSED, () => {
                    video.play();
                    playBtn.innerText = "STREAMING...";
                    playBtn.style.background = "#3b82f6";
                });

                hls.on(Hls.Events.ERROR, (event, data) => {
                    console.log("HLS Status:", data.details);
                });
            }
        });
    </script>
</body>
</html>
