<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MSTV Player</title>
    <!-- DASH ENGINE (Local) -->
    <link rel="stylesheet" href="shaka-ui.css">
    <script src="shaka-player.ui.min.js"></script>

    <!-- HLS ENGINE (CDN Fallback) -->
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>

 <style>
        body, html { margin: 0; padding: 0; background: #000; overflow: hidden; width: 100%; height: 100%; }
        .container { display: flex; width: 100vw; height: 100vh; background: #000; align-items: center; justify-content: center; }
        video { width: 100%; height: 100%; object-fit: contain; }
    </style>
</head>
<body>

    <div class="container">
        <video id="video" controls autoplay crossorigin="anonymous"></video>
    </div>
         <script>
    const activeWorker = "https://zee5.mchoudhry482.workers.dev/?url=";

    const streamList = [
        {
            name: "Sony Pal",
            type: "hls",
            url: "http://maxotts.maxdigitaltv.com/x-media/C106/master.m3u8"
        },
        {
            name: "Zee TV (DASH)",
            type: "dash",
            url: "https://d1g8wgjurz8via.cloudfront.net/bpk-tv/Zeetv/default/main.mpd",
            drm: { "ed068cf84f0640ccbc7c0e395c0a272e": "bb722190f2bb446391020411a7d0828b" }
        }
    ];

    async function initApp() {
        const video = document.getElementById('video');
        const hash = window.location.hash.substring(1);
        let index = (parseInt(hash, 10) || 1) - 1;
        const stream = streamList[index] || streamList;

        // --- HLS ENGINE ---
        if (stream.type === "hls") {
            if (Hls.isSupported()) {
                const hls = new Hls();
                // We proxy the main manifest, the worker handles the rest
                hls.loadSource(activeWorker + encodeURIComponent(stream.url));
                hls.attachMedia(video);
            }
        }

        // --- DASH ENGINE ---
        if (stream.type === "dash") {
            shaka.polyfill.installAll();
            const player = new shaka.Player(video);

            // KEY FIX: This forces EVERY request (segments, manifest) to use your proxy
            player.getNetworkingEngine().registerRequestFilter((type, request) => {
                if (!request.uris.includes(activeWorker)) {
                    request.uris = activeWorker + encodeURIComponent(request.uris);
                }
            });

            if (stream.drm) player.configure({ drm: { clearKeys: stream.drm } });
            
            try {
                await player.load(stream.url); // Use raw URL, filter adds proxy
            } catch (e) {
                console.error("DASH Error", e);
            }
        }
    }

    window.onload = initApp;
    window.onhashchange = () => window.location.reload();
            </script>
</body>
</html>
