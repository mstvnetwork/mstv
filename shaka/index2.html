<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Universal Player Pro</title>
    <!-- Shaka Player for DASH & ClearKey -->
    <script src="https://cloudflare.com"></script>
    <link rel="stylesheet" href="https://cloudflare.com">
    <!-- Hls.js for optimized HLS -->
    <script src="https://jsdelivr.net"></script>

    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background: #000; }
        #container { width: 100%; height: 100%; position: relative; }
        video, iframe { width: 100%; height: 100%; border: none; display: none; position: absolute; top: 0; left: 0; }
        .active { display: block !important; }
    </style>
</head>
<body>

<div id="container" data-shaka-player-container>
    <video id="video-player" data-shaka-player autoplay controls></video>
    <iframe id="iframe-embed" allowfullscreen></iframe>
</div>

<script>
    // --- 1. CONFIGURATION ---
    // Change this to your actual worker endpoint
    const WORKER_URL = "https://workers.dev";

    const channels = [
        { 
            name: "Channel 1 (HLS)", 
            url: "http://maxotts.maxdigitaltv.com/x-media/C106/master.m3u8",
            proxy:true
        },
        {
                name: "Zee TV (DASH ClearKey)",
                type: "dash",
                url: "https://zee5.mchoudhry482.workers.dev/?url=https://d1g8wgjurz8via.cloudfront.net/bpk-tv/Zeetv/default/main.mpd",
                proxy: false,
                drm: { "ed068cf84f0640ccbc7c0e395c0a272e": "bb722190f2bb446391020411a7d0828b" }
            }
        
    ];

    // --- 2. ENGINE SETUP ---
    const video = document.getElementById('video-player');
    const iframe = document.getElementById('iframe-embed');
    let hls = null;
    let shakaPlayer = null;
    let currentChannel = null;
    let isRetrying = false;

    async function initEngines() {
        shaka.polyfill.installAll();
        shakaPlayer = new shaka.Player(video);
        
        // Auto-Fallback if Shaka fails
        shakaPlayer.addEventListener('error', (event) => {
            if (!isRetrying && currentChannel && !currentChannel.proxy) {
                console.warn("Direct DASH failed. Falling back to Worker...");
                handleFallback();
            }
        });
    }

    async function playSource(channel, useProxy = false) {
        currentChannel = channel;
        // Construct final URL based on proxy status
        let finalUrl = useProxy ? WORKER_URL + encodeURIComponent(channel.url) : channel.url;

        // Reset players
        if (hls) { hls.destroy(); hls = null; }
        if (shakaPlayer) await shakaPlayer.unload();
        iframe.src = "";
        iframe.classList.remove('active');
        video.classList.remove('active');

        if (finalUrl.includes('.m3u8')) {
            video.classList.add('active');
            if (Hls.isSupported()) {
                hls = new Hls();
                hls.loadSource(finalUrl);
                hls.attachMedia(video);
                hls.on(Hls.Events.ERROR, (event, data) => {
                    if (data.fatal && !isRetrying && !channel.proxy) handleFallback();
                });
            } else { video.src = finalUrl; }
        } 
        else if (finalUrl.includes('.mpd')) {
            video.classList.add('active');
            shakaPlayer.configure({ drm: { clearKeys: channel.keys || {} } });
            try { 
                await shakaPlayer.load(finalUrl); 
                isRetrying = false; 
            } catch (e) { 
                if (!isRetrying && !channel.proxy) handleFallback();
            }
        } 
        else {
            iframe.classList.add('active');
            iframe.src = finalUrl;
        }
    }

    function handleFallback() {
        isRetrying = true;
        playSource(currentChannel, true);
    }

    // --- 3. COMMUNICATION & NAVIGATION ---
    // Seamlessly handles messages from your worker/main script
    window.addEventListener('message', (event) => {
        if (event.data.type === 'CHANGE_CHANNEL') {
            isRetrying = false;
            const target = channels[event.data.index];
            if (target) playSource(target, target.proxy);
        }
    });

    // Hash navigation (index2.html#1)
    function loadFromHash() {
        isRetrying = false;
        const idx = window.location.hash ? parseInt(window.location.hash.replace('#', '')) - 1 : 0;
        if (channels[idx]) playSource(channels[idx], channels[idx].proxy);
    }

    window.addEventListener('hashchange', loadFromHash);
    initEngines().then(loadFromHash);
</script>
</body>
</html>
