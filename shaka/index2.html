<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>DASH Final Bypass</title>
    <script src="https://cdn.jsdelivr.net"></script>
    <script src="shaka.js"></script>
    <style>
        body { margin: 0; background: #000; display: flex; justify-content: center; align-items: center; height: 100vh; }
        #video-container { width: 100%; max-width: 800px; }
        video { width: 100%; display: block; }
    </style>
</head>
<body>
    <div id="video-container">
        <video id="video" controls autoplay crossorigin="anonymous"></video>
    </div>

<script>
const streamUrl = "https://d1g8wgjurz8via.cloudfront.net/bpk-tv/Zeetv/default/main.mpd" ;

async function initPlayer() {
    const video = document.getElementById('video');
    shaka.polyfill.installAll();

    const player = new shaka.Player();
    await player.attach(video);

    player.configure({
        drm: {
            clearKeys: {
                'ed068cf84f0640ccbc7c0e395c0a272e': 'bb722190f2bb446391020411a7d0828b'
            },
            // Force browser to ignore hardware security level
            advanced: {
                'org.w3.clearkey': {
                    'videoRobustness': [],
                    'audioRobustness': []
                }
            }
        }
    });

    // DEEP SCRUB FILTER: Removes ALL Widevine and PlayReady tags 
    // that trigger the 4012 hardware restriction error.
    player.getNetworkingEngine().registerResponseFilter((type, response) => {
        if (type === shaka.net.NetworkingEngine.RequestType.MANIFEST) {
            let str = new TextDecoder().decode(response.data);
            
            // Remove ANY ContentProtection block that isn't ClearKey
            // (Widevine: edef8ba9..., PlayReady: 9a04f079...)
            str = str.replace(/<ContentProtection[^>]*?schemeIdUri="urn:uuid:(?!e2719d58-b985-45e9-a471-88028010a6d7)[^]*?<\/ContentProtection>/gi, '');
            
            response.data = new TextEncoder().encode(str);
        }
    });

    player.addEventListener('error', (e) => {
        console.error('Shaka Error:', e.detail.code, e.detail);
    });

    try {
        await player.load(streamUrl);
        console.log("Success! Playback starting.");
    } catch (e) {
        console.error('Load Error:', e.code);
    }
}

document.addEventListener('DOMContentLoaded', initPlayer);
</script>
</body>
</html>
