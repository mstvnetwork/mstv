<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>DASH ClearKey Fix</title>
    <script src="https://cdn.jsdelivr.net"></script>
    <script src="shaka.js"></script>
    <style>
        body { margin: 0; background: #000; display: flex; justify-content: center; align-items: center; height: 100vh; color: white; font-family: sans-serif; }
        #video-container { position: relative; width: 100%; max-width: 800px; }
        video { width: 100%; background: #111; display: block; }
    </style>
</head>
<body>
    <div id="video-container">
        <video id="video" controls autoplay crossorigin="anonymous"></video>
    </div>

<script>
const streamUrl = "https://d1g8wgjurz8via.cloudfront.net/bpk-tv/Andtv/default/main.mpd";

async function initPlayer() {
    const video = document.getElementById('video');
    shaka.polyfill.installAll();

    if (!shaka.Player.isBrowserSupported()) {
        alert("Browser not supported!");
        return;
    }

    const player = new shaka.Player();
    await player.attach(video);

    player.configure({
        drm: {
            clearKeys: {
                'ed068cf84f0640ccbc7c0e395c0a272e': 'bb722190f2bb446391020411a7d0828b'
            },
            // CRITICAL: Forces software-level decryption to bypass 4012 errors
            advanced: {
                'org.w3.clearkey': {
                    'videoRobustness': [], // Using empty array for lowest security
                    'audioRobustness': [],
                    'distinctiveIdentifierRequired': false,
                    'persistentStateRequired': false
                }
            }
        },
        manifest: {
            dash: { ignoreMinBufferTime: true }
        }
    });

    // Fixes 1003 (Network Aborted) by ensuring proper request headers
    player.getNetworkingEngine().registerRequestFilter((type, request) => {
        if (type === shaka.net.NetworkingEngine.RequestType.SEGMENT) {
            request.allowCrossSiteCredentials = true;
        }
    });

    player.addEventListener('error', (e) => {
        console.error('Shaka Error Code:', e.detail.code, 'Details:', e.detail);
    });

    try {
        await player.load(streamUrl);
        console.log("Success! Stream loaded.");
    } catch (e) {
        console.error('Load Error:', e.code, e);
    }
}

document.addEventListener('DOMContentLoaded', initPlayer);
</script>
</body>
</html>
