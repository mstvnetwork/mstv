<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Live Stream Test Page</title>
    <style>
        body {
            font-family: sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            background-color: #f4f4f9;
            margin: 0;
        }
        .container {
            background: white;
            padding: 2rem;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            text-align: center;
        }
        .btn {
            display: inline-block;
            margin: 10px;
            padding: 12px 24px;
            font-size: 16px;
            font-weight: bold;
            text-decoration: none;
            color: white;
            border-radius: 5px;
            cursor: pointer;
            border: none;
            transition: opacity 0.2s;
        }
        .btn-tab { background-color: #007bff; }
        .btn-popup { background-color: #28a745; }
        .btn:hover { opacity: 0.8; }
        p { color: #666; font-size: 14px; max-width: 400px; }
    </style>
</head>
<body>

    <div class="container">
        <h1>Live Stream Test</h1>
        <p>Browsers block HTTP streams inside HTTPS pages. Use one of the buttons below to open the stream in a separate window.</p>

        <!-- Method 1: Standard Link (New Tab) -->
        <a href="http://maxotts.maxdigitaltv.com/x-media/C106/master.m3u8" 
           target="_blank" 
           rel="noopener noreferrer" 
           class="btn btn-tab">
           Open in New Tab
        </a>

        <!-- Method 2: JavaScript Popup (Player Window) -->
        <button onclick="openStreamPopup('http://YOUR_STREAM_URL_HERE')" 
                class="btn btn-btn-popup">
            Open in Popup Player
        </button>
    </div>

    <script>
        function openStreamPopup(url) {
            // Configures a 800x600 window without toolbars for a "player" feel
            const windowFeatures = "width=800,height=600,menubar=no,toolbar=no,location=no,status=no,resizable=yes,scrollbars=no";
            window.open(url, "StreamPlayer", windowFeatures);
        }
    </script>

</body>
</html>
