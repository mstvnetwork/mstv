<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MSTV | QUANTUM HYBRID CORE</title>
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
    <script src="https://cdn.jsdelivr.net/npm/shaka-player@latest/dist/shaka-player.compiled.js"></script>
    
    <style>
        :root { --accent: #38bdf8; }
        body { margin: 0; padding: 0; background: #000; overflow: hidden; display: flex; align-items: center; justify-content: center; height: 100vh; }
        video { width: 100%; height: 100%; background: #000; outline: none; transition: opacity 0.3s; }
        
        #loader {
            position: absolute; z-index: 100; display: flex; flex-direction: column; align-items: center; pointer-events: none;
        }
        .spinner {
            width: 45px; height: 45px; border: 3px solid rgba(56, 189, 248, 0.1);
            border-top: 3px solid var(--accent); border-radius: 50%; animation: spin 0.7s linear infinite;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .loading-text { margin-top: 12px; font-size: 10px; letter-spacing: 2px; color: var(--accent); font-weight: 800; text-transform: uppercase; font-family: sans-serif; }
        .hidden { display: none !important; opacity: 0; }
    </style>
</head>
<body>

    <div id="loader">
        <div class="spinner"></div>
        <div class="loading-text">Quantum Handshake...</div>
    </div>

    <video id="video" controls autoplay muted playsinline preload="auto"></video>

<script>
    const video = document.getElementById('video');
    const loader = document.getElementById('loader');
    const workerPrefix = "https://zee5.mchoudhry482.workers.dev/?url="; 

    /* [CHANNEL ARRAY] 
       - No need for 'useWorker: false' anymore. 
       - Add 'useWorker: true' ONLY when needed.
       - Add 'keys: { "ID": "KEY" }' for Encrypted DASH.
    */
    const STREAMS = [
        { id: 1, name: "Star Plus", url: "https://warm-caverns-48629-92fab798385f.herokuapp.com/http://103.175.242.10:8080/starplus/index.m3u8" },
        { id: 2, name: "Sony Pal", url: "http://maxotts.maxdigitaltv.com/x-media/C106/master.m3u8" },
        { id: 3, name: "Premium Dash", url: "https://example.com/stream.mpd", useWorker: true, keys: {"7692c8d119424e5d833989938e05953c": "94916a0459c909673892850989098993"} }
    ];

    let hlsInstance = null;
    let shakaInstance = null;

    // --- 1. THE "KILL-SWITCH" (Prevents Engine Conflicts) ---
    async function purgeEngines() {
        if (hlsInstance) { hlsInstance.destroy(); hlsInstance = null; }
        if (shakaInstance) { await shakaInstance.destroy(); shakaInstance = null; }
        video.pause();
        video.src = "";
        video.load();
    }

    // --- 2. THE BRAIN (Automation & Detection) ---
    async function activateStream(id) {
        const stream = STREAMS.find(s => s.id == id) || STREAMS;
        loader.classList.remove('hidden');
        
        await purgeEngines();

        // Automated Worker Logic: Defaults to false if undefined
        const finalUrl = stream.useWorker === true 
            ? workerPrefix + encodeURIComponent(stream.url) 
            : stream.url;

        const isDash = finalUrl.includes('.mpd');
        const isHls = finalUrl.includes('.m3u8');

        if (isDash) {
            initShaka(finalUrl, stream.keys);
        } else if (isHls) {
            initHls(finalUrl);
        } else {
            video.src = finalUrl;
            video.play().catch(() => loader.classList.add('hidden'));
        }
    }

    // --- 3. HLS ENGINE (m3u8) ---
    function initHls(url) {
        if (Hls.isSupported()) {
            hlsInstance = new Hls({ lowLatencyMode: true, capLevelToPlayerSize: true });
            hlsInstance.loadSource(url);
            hlsInstance.attachMedia(video);
            hlsInstance.on(Hls.Events.MANIFEST_PARSED, () => video.play());
        } else if (video.canPlayType('application/vnd.apple.mpegurl')) {
            video.src = url;
            video.play();
        }
    }

    // --- 4. SHAKA ENGINE (mpd + ClearKeys) ---
    async function initShaka(url, keys) {
        shaka.polyfill.installAll();
        if (shaka.Player.isBrowserSupported()) {
            shakaInstance = new shaka.Player(video);
            
            // Inject Keys if present
            if (keys) {
                shakaInstance.configure({
                    drm: { clearKeys: keys }
                });
            }

            shakaInstance.configure({
                streaming: { lowLatencyMode: true, bufferingGoal: 8 }
            });

            try {
                await shakaInstance.load(url);
                video.play();
            } catch (e) { console.error("Shaka Error:", e); }
        }
    }

    // --- LOGIC LISTENERS ---
    video.addEventListener('playing', () => loader.classList.add('hidden'));
    video.addEventListener('waiting', () => loader.classList.remove('hidden'));

    function handleNavigation() {
        const hash = window.location.hash.replace('#', '');
        activateStream(hash || 1);
    }

    window.addEventListener('hashchange', handleNavigation);
    window.addEventListener('load', handleNavigation);
</script>
</body>
</html>
