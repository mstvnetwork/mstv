<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Live Sports Blog</title>
    <style>
        body { background: #0b0b0b; color: #fff; font-family: 'Segoe UI', sans-serif; padding: 20px; margin: 0; }
        h1 { text-align: center; color: #ff3e3e; margin-bottom: 40px; text-transform: uppercase; letter-spacing: 2px; }
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 25px; max-width: 1200px; margin: 0 auto; }
        .card { background: #181818; border-radius: 15px; overflow: hidden; cursor: pointer; transition: 0.3s; border: 1px solid #282828; text-align: center; padding-bottom: 15px; }
        .card:hover { transform: translateY(-10px); border-color: #ff3e3e; box-shadow: 0 10px 20px rgba(255, 62, 62, 0.2); }
        .card img { width: 100%; height: 160px; object-fit: contain; background: #000; padding: 10px; box-sizing: border-box; }
        .card h3 { margin: 15px 0 5px; font-size: 1.2rem; }
        .card p { color: #777; font-size: 0.9rem; margin: 0; }
    </style>
</head>
<body>

    <h1>Live Sports Blog</h1>

    <div class="grid">
        <!-- Sony Ten Cricket -->
        <div class="card" onclick="openPlayer('https://edge2.roarzone.info:8447/roarzone/edge3/sony-ten-cricket/tracks-v1a1/mono.m3u8')">
            <img src="https://abusaeeidx.github.io" alt="Sony Ten">
            <h3>Sony Ten Cricket</h3>
            <p>Live HD Sports</p>
        </div>

        <!-- Star Sports 1 -->
        <div class="card" onclick="openPlayer('https://103.175.73.12:8080/live/12/12_0.m3u8')">
            <img src="https://abusaeeidx.github.io" alt="Star Sports 1">
            <h3>Star Sports 1</h3>
            <p>Direct Network Stream</p>
        </div>

        <!-- Star Gold -->
        <div class="card" onclick="openPlayer('https://103.99.249.139/stargold/tracks-v1a1/mono.m3u8')">
            <img src="https://abusaeeidx.github.io" alt="Star Gold">
            <h3>Star Gold</h3>
            <p>Movies & More</p>
        </div>
    </div>

    <script>
        function openPlayer(rawUrl) {
            // Encode the URL to pass it safely as a parameter
            const destination = `player.html?url=${encodeURIComponent(rawUrl)}`;
            window.open(destination, '_blank', 'width=1000,height=620');
        }
    </script>
</body>
</html>
