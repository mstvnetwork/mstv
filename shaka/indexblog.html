<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sports Blog TV</title>
    <style>
        body { background: #0f0f0f; color: white; font-family: 'Segoe UI', sans-serif; margin: 0; padding: 20px; }
        h1 { border-bottom: 2px solid #333; padding-bottom: 10px; margin-bottom: 30px; }
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 20px; max-width: 1200px; margin: 0 auto; }
        .card { background: #1a1a1a; border-radius: 12px; padding: 15px; cursor: pointer; transition: 0.3s; border: 1px solid #333; text-align: center; }
        .card:hover { transform: translateY(-8px); border-color: #ff3e3e; background: #222; }
        .card img { width: 100%; height: 140px; object-fit: contain; border-radius: 8px; background: #000; margin-bottom: 15px; }
        .card h3 { margin: 10px 0; font-size: 1.1rem; }
        .card p { color: #888; font-size: 0.9rem; }
    </style>
</head>
<body>

    <h1>Live Channels</h1>

    <div class="grid">
        <!-- Channel 1 -->
        <div class="card" onclick="openPlayer('https://edge2.roarzone.info:8447/roarzone/edge3/sony-ten-cricket/tracks-v1a1/mono.m3u8')">
            <img src="https://abusaeeidx.github.io" alt="Sony Ten">
            <h3>Sony Ten Cricket</h3>
            <p>Live Sports HD</p>
        </div>

        <!-- Channel 2 -->
        <div class="card" onclick="openPlayer('https://103.175.73.12:8080/live/12/12_0.m3u8')">
            <img src="https://abusaeeidx.github.io" alt="Star Sports">
            <h3>Star Sports 1</h3>
            <p>Direct IP Stream</p>
        </div>

        <!-- Channel 3 -->
        <div class="card" onclick="openPlayer('https://103.99.249.139/stargold/tracks-v1a1/mono.m3u8')">
            <img src="https://abusaeeidx.github.io" alt="Star Gold">
            <h3>Star Gold</h3>
            <p>Movies & Sports</p>
        </div>
    </div>

    <script>
        function openPlayer(streamUrl) {
            // This encodes the URL so it can be passed safely to the next page
            const playerPage = `player.html?url=${encodeURIComponent(streamUrl)}`;
            // Opens in a new window/tab
            window.open(playerPage, '_blank', 'width=1000,height=600');
        }
    </script>
</body>
</html>
