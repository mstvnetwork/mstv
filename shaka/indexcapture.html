
<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Content-Security-Policy" content="upgrade-insecure-requests">
    <meta http-equiv="Content-Security-Policy" content="upgrade-insecure-requests">

    <title>Mobile Only Stream</title>
    <style>
        :root { --primary: #00ffA0; }
        body, html {
            margin: 0; padding: 0;
            width: 100%; height: 100%;
            background: #000;
            display: flex; align-items: center; justify-content: center;
            overflow: hidden;
        }

        .viewport {
            width: 100vw; max-width: 1000px; aspect-ratio: 16 / 9; 
            overflow: hidden; position: relative;
            border: 4px solid var(--primary); border-radius: 12px;
            background: #000;
        }

        #captureFrame {
            position: absolute;
            width: 100%; height: 170%; 
            top: -57px; left: 0%; 
            border: none;
            pointer-events: auto; 
            z-index: 1;
        }

        #lockLayer {
            position: absolute;
            top: 0; left: 0; 
            width: 100%; height: 100%;
            z-index: 9999; 
            background: rgba(0,0,0,0.01); 
            pointer-events: none; 
            cursor: pointer;
        }

        #lockLayer.active {
            pointer-events: all !important;
            cursor: default;
        }

        .click-hint {
            position: absolute; bottom: 60px; right: 15px;
            color: var(--primary);
            font-family: sans-serif;
            font-size: 12px;
            z-index: 10000;
            pointer-events: none;
            opacity: 0.7;
        }

#resetBtn {
    position: fixed;
    bottom: 0px;
    right: 12px;

    padding: 5px 5px;

    background: rgba(0, 255, 160, 0.12);
    color: #00ffa0;

    border: 1px solid rgba(0, 255, 160, 0.6);
    border-radius: 30px;

    font-family: -apple-system, BlinkMacSystemFont, sans-serif;
    font-size: 14px;
    font-weight: 600;
    letter-spacing: 0.4px;

    backdrop-filter: blur(10px);
    -webkit-backdrop-filter: blur(10px);

    box-shadow: 0 8px 25px rgba(0, 255, 160, 0.15);

    cursor: pointer;
    z-index: 10002;

    transition: all 0.2s ease;
}
        #resetBtn:hover {
    background: rgba(0, 255, 160, 0.2);
    box-shadow: 0 10px 30px rgba(0, 255, 160, 0.25);
    transform: translateY(-2px);
}

#resetBtn:active {
    transform: scale(0.96);
}
        /* Scrolling Ticker at bottom with semi-transparent background */
        #ticker {
            position: absolute;
            bottom: 0px;
            left: 0;
            width: 100%;
            white-space: nowrap;
            overflow: hidden;
            z-index: 10000;
            background: blue;
            padding: 11px 0;
            border-radius: 6px;
        }

       #ticker {
    background: transparent; /* Forces transparency */
    overflow: hidden;        /* Keeps the text inside the container */
    white-space: nowrap;     /* Prevents text from wrapping */
    width: 100%;             /* Ensures it spans the full width */
}

#ticker span {
    display: inline-block;
    padding-left: 100%;
    animation: scroll 15s linear infinite;
    color: red;
    font-family: sans-serif;
    font-size: 14px;
}

@keyframes scroll {
    0% { transform: translateX(0); }
    100% { transform: translateX(-100%); }
}


        /* Fallback for non-mobile devices */
        #fallback {
            display: none;
            text-align: center;
            color: #fff;
            font-family: sans-serif;
        }

        #fallback img {
            max-width: 50%;
            border: 4px solid var(--primary);
            border-radius: 12px;
            margin-bottom: 20px;
        }
    </style>
</head>
<body>

    <!-- Mobile Viewer -->
    <div class="viewport" id="playerWrapper">
        <div id="lockLayer"></div>

        <!-- Ticker -->
        <div id="ticker"><span>Press refresh and click in screen channel button..अगर क्लिक न हो तो रिफ्रेश बटन दबाएं। </span></div>

        <div id="status" class="click-hint"></div>
        <button id="resetBtn">Refresh</button>

        <iframe id="captureFrame" 
                src="https://mstvnetwork.github.io/mstv4/index5.html?mode=public"  
                scrolling="no" 
                sandbox="allow-forms allow-scripts allow-same-origin">
        </iframe>
    </div>

    <!-- Non-Mobile Fallback -->
    <div id="fallback">
        <img src="https://via.placeholder.com/400x225?text=Mobile+Only" alt="Mobile Only">
        <h2>This content is only available on Android and iOS devices.</h2>
        <p>Please open this page on a mobile device to view the stream.</p>
    </div>

 <script>
(function() {

    function isAllowedDevice() {
        const ua = navigator.userAgent || navigator.vendor || window.opera;

        const isiPhone = /iPhone/i.test(ua);
        const isAndroidPhone = /Android/i.test(ua) && /Mobile/i.test(ua);

        return isiPhone || isAndroidPhone;
    }

    // If not allowed, stop everything immediately
    if (!isAllowedDevice()) {

        document.addEventListener("DOMContentLoaded", function() {
            const wrapper  = document.getElementById('playerWrapper');
            const fallback = document.getElementById('fallback');

            if (wrapper) wrapper.remove();   // completely remove player
            if (fallback) {
                fallback.style.display = 'flex';
                fallback.style.flexDirection = 'column';
                fallback.style.alignItems = 'center';
                fallback.style.justifyContent = 'center';
            }
        });

        return; // Stop further script execution
    }

    // ===== Allowed Devices Only Below This Line =====

    document.addEventListener("DOMContentLoaded", function() {

        const wrapper   = document.getElementById('playerWrapper');
        const shield    = document.getElementById('lockLayer');
        const status    = document.getElementById('status');
        const resetBtn  = document.getElementById('resetBtn');
        const ticker    = document.getElementById('ticker');

        let clickCount = 0;
        const maxClicks = 4;
        let locked = false;

        let resetUsed = sessionStorage.getItem("resetUsed");

        function lockPlayer() {
            shield.classList.add('active');
            status.innerText = "CONTROLS LOCKED";
            ticker.style.display = 'none';
            locked = true;

            if (!resetUsed) {
                resetBtn.style.display = 'block';
            }

            setTimeout(() => { status.style.opacity = "0"; }, 3000);
        }

        function resetPlayer() {
            clickCount = 0;
            locked = false;

            shield.classList.remove('active');
            status.innerText = "▶️ Click on Sony tv stream, if no click happen change channel and come back";
            status.style.opacity = "0.7";

            

            sessionStorage.setItem("resetUsed", "true");
            resetUsed = true;

            clearTimeout(lockTimeout);
            lockTimeout = setTimeout(lockPlayer, 40000);
        }

        

        wrapper.addEventListener('click', function() {
            if (locked) return;

            clickCount++;
            let remaining = maxClicks - clickCount;

            if (remaining > 0) {
                status.innerText = `Setup Mode: ${remaining} clicks left`;
            }

            if (clickCount >= maxClicks) {
                lockPlayer();
            }
        });

        resetBtn.addEventListener('click', resetPlayer);

        let lockTimeout = setTimeout(lockPlayer, 40000);
    });

})();
</script>
</body>
</html>
