<style>
  /* 1. Outer Container to hold the 16:9 shape */
  .player-wrapper {
    position: relative;
    width: 100%;
    padding-bottom: 56.25%; /* Fixed 16:9 Ratio */
    overflow: hidden;       /* This hides anything outside the 16:9 box */
    background: #000;
  }

  /* 2. Inner Iframe: Made larger than the container to 'crop' headers */
  .player-wrapper iframe {
    position: absolute;
    /* We make the iframe 115% tall to push the footer out of view */
    width: 100%;
    height: 115%; 
    
    /* We pull the iframe UP to hide the header (the lzw.me header) */
    top: -45px; 
    left: 0;
    border: 0;
  }
</style>

<div class="player-wrapper">
