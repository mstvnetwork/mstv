<!DOCTYPE html>
<html>
  <head>
     <!-- DASH ENGINE (Local) -->
    <link rel="stylesheet" href="shaka-ui.css">
    <script src="shaka-player.ui.min.js"></script>
  </head>
  <body style="margin:0;background:#000;">

    <div data-shaka-player-container style="max-width:800px; margin:20px auto;">
      <video autoplay id="video" style="width:100%;height:100%"></video>
    </div>

    <script>
<script>
  const manifestUri = 'https://n3.sanwalyaarpya.com';

  async function initPlayer() {
    // 1. Get the container and video elements
    const video = document.getElementById('video');
    const container = video.parentElement;

    // 2. Initialize the Player
    const player = new shaka.Player(video);

    // 3. Initialize the UI
    const ui = new shaka.ui.Overlay(player, container, video);
    const controls = ui.getControls();

    // 4. Add your custom headers (Referer/Origin)
    player.getNetworkingEngine().registerRequestFilter((type, request) => {
      if (type === shaka.net.NetworkingEngine.RequestType.MANIFEST || 
          type === shaka.net.NetworkingEngine.RequestType.SEGMENT) {
        request.headers['Referer'] = 'https://profamouslife.com';
        request.headers['Origin'] = 'https://profamouslife.com';
      }
    });

    // 5. Load the stream
    try {
      await player.load(manifestUri);
      console.log('The video has now been loaded!');
    } catch (e) {
      console.error('Error code', e.code, 'object', e);
    }
  }

  // Use DOMContentLoaded to make sure the elements exist in the DOM first
  document.addEventListener('DOMContentLoaded', initPlayer);
</script>

  </body>
</html>
