<!DOCTYPE html>
<html>
  <head>
     <!-- DASH ENGINE (Local) -->
    <link rel="stylesheet" href="shaka-ui.css">
    <script src="shaka-player.ui.min.js"></script>
  </head>
  <body style="margin:0;background:#000;">

    <div data-shaka-player-container style="max-width:800px; margin:20px auto;">
      <video autoplay id="video" style="width:100%;height:100%"></video>
    </div>

    <script>
      const manifestUri = 'https://n3.sanwalyaarpya.com:1686/hls/star1in.m3u8?md5=Em5Gw5L3ziMUKLNyvpSbxw&expires=1773479470';

      async function initPlayer() {
        const video = document.getElementById('video');
        const ui = video['ui'];
        const controls = ui.getControls();
        const player = controls.getPlayer();

        // CRITICAL: This part adds the Referer and Origin required by your links
        player.getNetworkingEngine().registerRequestFilter((type, request) => {
          if (type === shaka.net.NetworkingEngine.RequestType.MANIFEST || 
              type === shaka.net.NetworkingEngine.RequestType.SEGMENT) {
            request.headers['Referer'] = 'https://profamouslife.com/';
            request.headers['Origin'] = 'https://profamouslife.com';
          }
        });

        try {
          await player.load(manifestUri);
          console.log('The video has now been loaded!');
        } catch (e) {
          console.error('Error code', e.code, 'object', e);
        }
      }

      document.addEventListener('shaka-ui-loaded', initPlayer);
    </script>
  </body>
</html>
