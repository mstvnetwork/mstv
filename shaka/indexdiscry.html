<!DOCTYPE html>
<html>
<head>
    <!-- Your Local Files -->
    <link rel="stylesheet" href="shaka-ui.css">
    <script src="shaka-player.ui.min.js"></script>
    <style>
        #status-label {
            background: rgba(0, 0, 0, 0.7);
            color: #ff3e3e;
            padding: 10px;
            font-family: sans-serif;
            text-align: center;
            border-bottom: 2px solid #ff3e3e;
        }
    </style>
</head>
<body style="margin:0;background:#111;">

    <div id="status-label">Status: Initializing...</div>

    <div data-shaka-player-container style="max-width:800px; margin:20px auto; background:#000;">
        <video autoplay id="video" style="width:100%; height:100%;"></video>
    </div>

    <script>
        const status = document.getElementById('status-label');
        const manifestUri = 'https://edge2.roarzone.info:8447/roarzone/edge3/sony-ten-cricket/tracks-v1a1/mono.m3u8';

        async function initApp() {
            const video = document.getElementById('video');
            const container = video.parentElement;
            
            const player = new shaka.Player(video);
            const ui = new shaka.ui.Overlay(player, container, video);

            // ERROR LISTENER
            player.addEventListener('error', (event) => {
                const error = event.detail;
                status.innerText = `Error ${error.code}: ${error.message || 'Check Console (F12)'}`;
                status.style.color = "#ff3e3e";
            });

            // HEADER INJECTION (Referer requirement)
            player.getNetworkingEngine().registerRequestFilter((type, request) => {
                request.headers['Referer'] = 'https://profamouslife.com';
                request.headers['Origin'] = 'https://profamouslife.com';
            });

            try {
                await player.load(manifestUri);
                status.innerText = "Status: Playing Live Stream";
                status.style.color = "#44ff44";
            } catch (e) {
                // This catches initial load errors
                status.innerText = `Load Error ${e.code}: Token probably expired.`;
            }
        }

        document.addEventListener('shaka-ui-loaded', initApp);
    </script>
</body>
</html>
