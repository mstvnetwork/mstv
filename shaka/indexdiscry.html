<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Manual Hash Player</title>
    <link rel="stylesheet" href="shaka-ui.css">
    <script src="shaka-player.ui.min.js"></script>
    <style>
        body { margin: 0; background: #000; font-family: sans-serif; color: white; text-align: center; }
        #status { padding: 15px; background: #1a1a1a; border-bottom: 2px solid #333; font-weight: bold; }
        .player-box { max-width: 900px; margin: 40px auto; background: #111; border: 1px solid #444; }
        .tip { color: #888; font-size: 13px; margin-top: 20px; }
    </style>
</head>
<body>

    <div id="status">Status: Initializing...</div>

    <div class="player-box" data-shaka-player-container>
        <video autoplay id="video" style="width:100%; height:100%;"></video>
    </div>

    <p class="tip">Type <b>#1</b>, <b>#2</b>, or <b>#3</b> at the end of your browser URL and press Enter to switch.</p>

    <script>
        // 1. UPDATE WITH YOUR CURRENT WORKING URLS
        const channels = {
            "#1": "https://go.webcric.com/frame4.htm",
            "#2": "https://103.175.73.12:8080/live/12/12_0.m3u8",
            "#3": "https://103.99.249.139/stargold/tracks-v1a1/mono.m3u8"
        };

        let player;

        async function switchChannel() {
            const hash = window.location.hash || "#1"; // Default to #1 if URL has no hash
            const streamUrl = channels[hash];
            const statusLabel = document.getElementById('status');

            if (!streamUrl) {
                statusLabel.innerText = "Error: No URL found for " + hash;
                statusLabel.style.color = "#ff3e3e";
                return;
            }

            try {
                statusLabel.innerText = "Loading Channel: " + hash;
                statusLabel.style.color = "white";
                
                await player.load(streamUrl);
                
                statusLabel.innerText = "Status: Playing " + hash;
                statusLabel.style.color = "#44ff44";
            } catch (e) {
                statusLabel.innerText = "Error " + e.code + ": Link expired or CORS blocked.";
                statusLabel.style.color = "#ff3e3e";
            }
        }

        async function initPlayer() {
            const video = document.getElementById('video');
            player = new shaka.Player(video);
            
            // Setup Shaka UI
            const ui = new shaka.ui.Overlay(player, video.parentElement, video);

            // This detects whenever you manually change the # in the address bar
            window.addEventListener('hashchange', switchChannel);

            // Start the first load
            switchChannel();
        }

        document.addEventListener('shaka-ui-loaded', initPlayer);
    </script>
</body>
</html>
