<!DOCTYPE html>
<html lang="en">
<head>
    <style>
        .player-container {
            position: relative;
            width: 640px;
            height: 320px;
            background: #000;
        }

        /* The "Lock" Overlay: Sits on top of the iframe */
        #iframe-lock {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 10;
            background: rgba(0,0,0,0); /* Transparent */
            cursor: pointer;
            pointer-events: auto; /* Active by default */
        }

        iframe {
            border: none;
        }
    </style>
</head>
<body>

<div id="player-wrapper" style="position: relative; width: 640px; height: 320px;">
    <!-- The Lock Overlay -->
    <div id="click-shield" style="position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 999; cursor: pointer; background: rgba(0,0,0,0);"></div>
    
    <!-- Visual Status Bar (Optional) -->
    <div id="lock-status" style="position: absolute; bottom: 0; left: 0; height: 4px; width: 0%; background: #ff0000; z-index: 1000; transition: width 5s linear;"></div>

    <iframe id="gd-iframe" src="https://gdplayer.to/x/?aTVSb2t2Qi96d25Gc3hyK0RlbTNMbTFNcllLcEk3bFI0amZRYVI0UnlJSU1xemM5YVp0K1huNDJYbDI2aTRURGVMcmZ6dXVaSnBnSlpiQXZrblpJaVZBcUhiSHc4RldtbmRMM3VDZEhtaE50Rlh3NmFqNlNxaWNuM2xpYXRBdzN1MVpxU1crbG02eE1wOFRRdGdVRHJWd3BYcjdCWlNERUx5OGVqVVgzdEhFPQ,," width="640" height="320" allow="fullscreen; autoplay; encrypted-media;"></iframe>
</div>

<script>
    const shield = document.getElementById('click-shield');
    const statusBar = document.getElementById('lock-status');
    let isLocked = false;

    // 1. Safety net for forced redirects
    window.onbeforeunload = () => "Redirect blocked. Stay here?";

    shield.addEventListener('click', () => {
        if (isLocked) return;

        // Unlock the iframe for 5 seconds
        shield.style.pointerEvents = 'none';
        statusBar.style.width = '100%'; 
        console.log("Iframe Unlocked: Adjust volume/quality now...");

        // Re-lock after 5 seconds (Adjust this number as needed)
        setTimeout(() => {
            shield.style.pointerEvents = 'auto';
            statusBar.style.background = '#00ff00'; // Green = Protected
            isLocked = true;
            console.log("Iframe Locked: Clicks blocked to prevent redirects.");
        }, 5000); 
    });
</script>


</body>
</html>
