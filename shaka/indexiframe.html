<!DOCTYPE html>
<html lang="en">
<head>
    <style>
        .player-container {
            position: relative;
            width: 640px;
            height: 320px;
            background: #000;
        }

        /* The "Lock" Overlay: Sits on top of the iframe */
        #iframe-lock {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 10;
            background: rgba(0,0,0,0); /* Transparent */
            cursor: pointer;
            pointer-events: auto; /* Active by default */
        }

        iframe {
            border: none;
        }
    </style>
</head>
<body>

<div class="player-container">
    <!-- The Lock Layer -->
    <div id="iframe-lock" title="Click once to Play"></div>
    
    <!-- Your GDPlayer Iframe -->
    <iframe id="gd-player"
            src="https://gdplayer.to/x/?aTVSb2t2Qi96d25Gc3hyK0RlbTNMbTFNcllLcEk3bFI0amZRYVI0UnlJSU1xemM5YVp0K1huNDJYbDI2aTRURGVMcmZ6dXVaSnBnSlpiQXZrblpJaVZBcUhiSHc4RldtbmRMM3VDZEhtaE50Rlh3NmFqNlNxaWNuM2xpYXRBdzN1MVpxU1crbG02eE1wOFRRdGdVRHJWd3BYcjdCWlNERUx5OGVqVVgzdEhFPQ,," 
            width="640" 
            height="320" 
            loading="lazy" 
            allow="fullscreen; accelerometer; autoplay; encrypted-media; gyroscope; picture-in-picture; geolocation; web-share; screen-wake-lock; idle-detection">
    </iframe>
</div>

<script>
    const lock = document.getElementById('iframe-lock');

    // 1. Intercept top-level redirect attempts
    window.onbeforeunload = function() {
        return "Redirect attempt blocked. Stay on this page to continue watching?";
    };

    // 2. Click-to-Play and Re-lock Logic
    lock.addEventListener('click', function() {
        // Briefly disable the lock to let the click reach the Play button
        lock.style.pointerEvents = 'none';

        // Re-enable the lock after 400ms to block all future ad clicks
        setTimeout(() => {
            lock.style.pointerEvents = 'auto';
            console.log("Iframe interaction locked. Redirects blocked.");
        }, 900);
    });
</script>

</body>
</html>
