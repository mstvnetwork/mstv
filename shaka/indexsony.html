<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mobile Only Stream</title>
    <style>
        :root { --primary: #00ffA0; }
        body, html {
            margin: 0; padding: 0;
            width: 100%; height: 100%;
            background: #000;
            display: flex; align-items: center; justify-content: center;
            overflow: hidden;
        }

        .viewport {
            width: 100vw; max-width: 1000px; aspect-ratio: 16 / 9; 
            overflow: hidden; position: relative;
            border: 4px solid var(--primary); border-radius: 12px;
            background: #000;
        }

        #captureFrame {
            position: absolute;
            width: 100%; height: 170%; 
            top: -57px; left: 0%; 
            border: none;
            pointer-events: auto; 
            z-index: 1;
        }

        #lockLayer {
            position: absolute;
            top: 0; left: 0; 
            width: 100%; height: 100%;
            z-index: 9999; 
            background: rgba(0,0,0,0.01); 
            pointer-events: none; 
            cursor: pointer;
        }

        #lockLayer.active {
            pointer-events: all !important;
            cursor: default;
        }

        .click-hint {
            position: absolute; bottom: 60px; right: 15px;
            color: var(--primary);
            font-family: sans-serif;
            font-size: 12px;
            z-index: 10000;
            pointer-events: none;
            opacity: 0.7;
        }

        #resetBtn {
            position: absolute; bottom: 10px; right: 15px;
            padding: 6px 12px;
            font-family: sans-serif;
            background: var(--primary);
            border: none;
            border-radius: 6px;
            cursor: pointer;
            color: #000;
            z-index: 10001;
            display: none;
        }

        /* Scrolling Ticker at bottom with semi-transparent background */
        #ticker {
            position: absolute;
            bottom: 0px;
            left: 0;
            width: 100%;
            white-space: nowrap;
            overflow: hidden;
            z-index: 10000;
            background: blue;
            padding: 11px 0;
            border-radius: 6px;
        }

        #ticker span {
            display: inline-block;
            padding-left: 100%;
            animation: scroll 15s linear infinite;
            color: var(--primary);
            font-family: sans-serif;
            font-size: 14px;
        }

        @keyframes scroll {
            0% { transform: translateX(0); }
            100% { transform: translateX(-100%); }
        }

        /* Fallback for non-mobile devices */
        #fallback {
            display: none;
            text-align: center;
            color: #fff;
            font-family: sans-serif;
        }

        #fallback img {
            max-width: 50%;
            border: 4px solid var(--primary);
            border-radius: 12px;
            margin-bottom: 20px;
        }
    </style>
</head>
<body>

    <!-- Mobile Viewer -->
    <div class="viewport" id="playerWrapper">
        <div id="lockLayer"></div>

        <!-- Ticker -->
        <div id="ticker"><span>▶️ Click on Sony channel name on screen. Make sure to click quickly before screen locks!</span></div>

        <div id="status" class="click-hint"></div>
        <button id="resetBtn">Reset</button>

        <iframe id="captureFrame" 
                src="https://tulnit.com/live/bollywood-colors/" 
                scrolling="no" 
                sandbox="allow-forms allow-scripts allow-same-origin">
        </iframe>
    </div>

    <!-- Non-Mobile Fallback -->
    <div id="fallback">
        <img src="https://via.placeholder.com/400x225?text=Mobile+Only" alt="Mobile Only">
        <h2>This content is only available on Android and iOS devices.</h2>
        <p>Please open this page on a mobile device to view the stream.</p>
    </div>

 <script>
(function() {

    function isAllowedDevice() {
        const ua = navigator.userAgent || navigator.vendor || window.opera;

        const isiPhone = /iPhone/i.test(ua);
        const isAndroidPhone = /Android/i.test(ua) && /Mobile/i.test(ua);

        return isiPhone || isAndroidPhone;
    }

    // If not allowed, stop everything immediately
    if (!isAllowedDevice()) {

        document.addEventListener("DOMContentLoaded", function() {
            const wrapper  = document.getElementById('playerWrapper');
            const fallback = document.getElementById('fallback');

            if (wrapper) wrapper.remove();   // completely remove player
            if (fallback) {
                fallback.style.display = 'flex';
                fallback.style.flexDirection = 'column';
                fallback.style.alignItems = 'center';
                fallback.style.justifyContent = 'center';
            }
        });

        return; // Stop further script execution
    }

    // ===== Allowed Devices Only Below This Line =====

    document.addEventListener("DOMContentLoaded", function() {

        const wrapper   = document.getElementById('playerWrapper');
        const shield    = document.getElementById('lockLayer');
        const status    = document.getElementById('status');
        const resetBtn  = document.getElementById('resetBtn');
        const ticker    = document.getElementById('ticker');

        let clickCount = 0;
        const maxClicks = 4;
        let locked = false;

        let resetUsed = sessionStorage.getItem("resetUsed");

        function lockPlayer() {
            shield.classList.add('active');
            status.innerText = "CONTROLS LOCKED";
            ticker.style.display = 'none';
            locked = true;

            if (!resetUsed) {
                resetBtn.style.display = 'block';
            }

            setTimeout(() => { status.style.opacity = "0"; }, 3000);
        }

        function resetPlayer() {
            clickCount = 0;
            locked = false;

            shield.classList.remove('active');
            status.innerText = "▶️ Click on Sony tv stream, if no click happen change channel and come back";
            status.style.opacity = "0.7";

            resetBtn.style.display = 'none';

            sessionStorage.setItem("resetUsed", "true");
            resetUsed = true;

            clearTimeout(lockTimeout);
            lockTimeout = setTimeout(lockPlayer, 28000);
        }

        if (resetUsed) {
            ticker.style.display = "none";
        }

        wrapper.addEventListener('click', function() {
            if (locked) return;

            clickCount++;
            let remaining = maxClicks - clickCount;

            if (remaining > 0) {
                status.innerText = `Setup Mode: ${remaining} clicks left`;
            }

            if (clickCount >= maxClicks) {
                lockPlayer();
            }
        });

        resetBtn.addEventListener('click', resetPlayer);

        let lockTimeout = setTimeout(lockPlayer, 28000);
    });

})();
</script>
</body>
</html>
