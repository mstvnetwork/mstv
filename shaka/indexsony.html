<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mobile Only Stream</title>

<style>
:root { --primary: #00ffA0; }

body, html {
    margin: 0;
    padding: 0;
    width: 100%;
    height: 100%;
    background: #000;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
}

.viewport {
    width: 100vw;
    max-width: 1000px;
    aspect-ratio: 16 / 9;
    overflow: hidden;
    position: relative;
    border: 4px solid var(--primary);
    border-radius: 12px;
    background: #000;
}

#captureFrame {
    position: absolute;
    width: 100%;
    height: 170%;
    top: -57px;
    left: 0;
    border: none;
    pointer-events: auto;
    z-index: 1;
}

#ticker {
    position: absolute;
    bottom: 0;
    left: 0;
    width: 100%;
    white-space: nowrap;
    overflow: hidden;
    z-index: 10000;
    background: blue;
    padding: 11px 0;
    border-radius: 6px;
}

#ticker span {
    display: inline-block;
    padding-left: 100%;
    animation: scroll 15s linear infinite;
    color: var(--primary);
    font-family: sans-serif;
    font-size: 14px;
}

@keyframes scroll {
    0% { transform: translateX(0); }
    100% { transform: translateX(-100%); }
}

#fallback {
    display: none;
    text-align: center;
    color: #fff;
    font-family: sans-serif;
}

#fallback img {
    max-width: 50%;
    border: 4px solid var(--primary);
    border-radius: 12px;
    margin-bottom: 20px;
}
</style>
</head>

<body>

<div class="viewport" id="playerWrapper">

    <div id="ticker">
        <span>▶️ Click on Sony channel name on screen.</span>
    </div>

    <iframe 
        id="captureFrame"
        src="https://tulnit.com/live/sony-tv-hd/"
        scrolling="no"
        sandbox="allow-forms allow-scripts allow-same-origin">
    </iframe>

</div>

<div id="fallback">
    <img src="https://via.placeholder.com/400x225?text=Mobile+Only" alt="Mobile Only">
    <h2>This content is only available on Android and iOS devices.</h2>
    <p>Please open this page on a mobile device to view the stream.</p>
</div>

<script>
(function() {

    function isAllowedDevice() {
        const ua = navigator.userAgent || navigator.vendor || window.opera;
        const isiPhone = /iPhone/i.test(ua);
        const isAndroidPhone = /Android/i.test(ua) && /Mobile/i.test(ua);
        return isiPhone || isAndroidPhone;
    }

    if (!isAllowedDevice()) {
        document.addEventListener("DOMContentLoaded", function() {
            const wrapper  = document.getElementById('playerWrapper');
            const fallback = document.getElementById('fallback');

            if (wrapper) wrapper.remove();

            if (fallback) {
                fallback.style.display = 'flex';
                fallback.style.flexDirection = 'column';
                fallback.style.alignItems = 'center';
                fallback.style.justifyContent = 'center';
            }
        });

        return;
    }

})();
</script>

</body>
</html>
