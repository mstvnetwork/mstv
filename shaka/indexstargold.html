<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>MSTV Player</title>

<script src="shaka.js"></script>

<style>
body {
    margin: 0;
    background: #000;
    color: #fff;
    font-family: sans-serif;
    text-align: center;
}

video {
    width: 100%;
    max-width: 800px;
    background: #111;
    margin-top: 20px;
}

#log {
    color: #00ffa0;
    margin-top: 10px;
    font-size: 14px;
}

#spinner {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    font-size: 18px;
    color: #fff;
}

#player-wrapper {
    position: relative;
    display: inline-block;
}
</style>
</head>

<body>

<h2 id="channel-title">Loading Channel...</h2>

<div id="player-wrapper">
    <video id="video" controls autoplay crossorigin="anonymous"></video>
    <div id="spinner">Loading stream...</div>
</div>

<div id="log">Initializing Player...</div>

<script>

// ========================
// CHANNEL LIST
// ========================
const channels = {
    1: {
        name: "Zee TV",
        url: "https://d1g8wgjurz8via.cloudfront.net/bpk-tv/Zeetv/default/main.mpd",
        type: "shaka",
        drm: { 'ed068cf84f0640ccbc7c0e395c0a272e': 'bb722190f2bb446391020411a7d0828b' }
    },
    2: {
        name: "Willow Cricket 2",
        url: "https://restream-live.realiptv.to/live/ALEX/sg5ng25ikf/3973.m3u8",
        type: "hls"
    },
    3: {
        name: "Deewana HD",
        
        url: "https://live20.bozztv.com/giatvplayout7/giatv-209592/index.m3u8",
        type: "hls",
    },
    
     4: {
        name: "Star Gold ",
        url: "https://anywhere.pwisetthon.com/http://tvn2.chowdhury-shaheb.com/stargold/tracks-v1a1/mono.m3u8",
        type: "hls",
    },
    
    5: {
        name: "Zindgi Tv (Pak)",
        url: "https://5ad386ff92705.streamlock.net/live_transcoder/ngrp:zindagitv.stream_all/chunklist.m3u8",
        type: "hls"
    }
};


// ========================
// GET CHANNEL FROM URL
// Example:
// index.html?channel=1
// ========================
function getChannelFromUrl() {
    const params = new URLSearchParams(window.location.search);
    return params.get("channel") || 1;
}

async function startPlayer() {

    const log = document.getElementById("log");
    const video = document.getElementById("video");
    const spinner = document.getElementById("spinner");
    const title = document.getElementById("channel-title");

    if (typeof shaka === "undefined") {
        log.innerText = "ERROR: shaka.js not found!";
        return;
    }

    shaka.polyfill.installAll();
    const player = new shaka.Player(video);

    // Show spinner when buffering
    player.addEventListener("buffering", (event) => {
        spinner.style.display = event.buffering ? "block" : "none";
    });

    // Hide spinner when video can play
    video.addEventListener("canplay", () => {
        spinner.style.display = "none";
    });

    // Error handling
    player.addEventListener("error", (event) => {
        log.innerText = "Playback Error: " + event.detail.code;
        console.error(event.detail);
    });

    // Load selected channel
    const channelId = getChannelFromUrl();
    const selectedChannel = channels[channelId] || channels[1];

    title.innerText = selectedChannel.name;
    spinner.style.display = "block";
    log.innerText = "Loading: " + selectedChannel.name;

    try {
        await player.load(selectedChannel.url);
        log.innerText = "Stream loaded successfully";
    } catch (e) {
        log.innerText = "Load failed: " + e.code;
        console.error(e);
    }
}

document.addEventListener("DOMContentLoaded", startPlayer);

</script>

</body>
</html>
