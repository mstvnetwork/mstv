<!DOCTYPE html>
<html>
<head>
    <style>
        body { background: #111; color: #eee; font-family: 'Segoe UI', sans-serif; display: flex; flex-direction: column; align-items: center; padding: 20px; }
        .master-wrapper { width: 100%; max-width: 600px; display: flex; flex-direction: column; gap: 5px; }

        /* TOP CONTAINER: The "Skyline" (Non-interactive) */
        .top-overflow { 
            width: 100%; height: 120px; position: relative; 
            background: #000; border: 2px solid #333; border-radius: 8px 8px 0 0; 
            overflow: hidden; opacity: 0.8; 
        }

        /* BOTTOM CONTAINER: The 16:9 Master View */
        .bottom-master { 
            width: 100%; position: relative; padding-top: 56.25%; 
            background: #000; border: 2px solid #444; border-radius: 0 0 8px 8px; 
            overflow: hidden; z-index: 10;
        }

        iframe { position: absolute; top: 0; left: 0; width: 1920px; height: 1080px; border: none; transform-origin: 0 0; }
        
        #placeholder { 
            position: absolute; top: 0; left: 0; width: 100%; height: 100%; 
            background: #222; z-index: 20; display: flex; align-items: center; 
            justify-content: center; font-weight: bold; pointer-events: none; transition: 0.3s;
        }

        /* Controls */
        .controls { background: #222; padding: 20px; border-radius: 8px; margin-top: 20px; width: 100%; max-width: 560px; display: flex; flex-direction: column; gap: 15px; }
        .slider-group { display: flex; flex-direction: column; gap: 5px; }
        .slider-group label { font-size: 11px; color: #888; display: flex; justify-content: space-between; }
        
        input[type="range"] { -webkit-appearance: none; width: 100%; height: 4px; background: #444; outline: none; }
        input[type="range"]::-webkit-slider-thumb { -webkit-appearance: none; width: 16px; height: 16px; background: #007bff; border-radius: 50%; cursor: pointer; }
        
        button { padding: 10px; cursor: pointer; background: #28a745; color: white; border: none; border-radius: 4px; font-weight: bold; }
        textarea { height: 120px; background: #000; color: #0f0; padding: 10px; font-family: monospace; font-size: 10px; display: none; margin-top: 10px; }
    </style>
</head>
<body>

<div class="master-wrapper">
    <!-- Part 1: Reverse Waterfall (Top) -->
    <div class="top-overflow">
        <iframe id="iframe-skyline" src="https://tulnit.com/live/sony-sab-hd/"></iframe>
    </div>

    <!-- Part 2: Main 16:9 View (Bottom) -->
    <div class="bottom-master">
        <div id="placeholder">MOVE SLIDERS TO SYNC</div>
        <iframe id="iframe-main" src="https://tulnit.com/live/sony-sab-hd/"></iframe>
    </div>
</div>

<div class="controls">
    <div class="slider-group">
        <label>Master Zoom <span id="z-val">0.60</span></label>
        <input type="range" id="zoom" min="0.1" max="2" step="0.01" value="0.60" oninput="sync()">
    </div>
    <div class="slider-group">
        <label>Sync X-Axis <span id="x-val">-261px</span></label>
        <input type="range" id="posX" min="-1500" max="1500" value="-261" oninput="sync()">
    </div>
    <div class="slider-group">
        <label>Main Y-Axis <span id="y-val">-100px</span></label>
        <input type="range" id="posY" min="-1500" max="1500" value="-100" oninput="sync()">
    </div>
    
    <button onclick="generate()">🔒 GENERATE REVERSE WATERFALL CODE</button>
    <textarea id="output" readonly></textarea>
</div>

<script>
    const iMain = document.getElementById('iframe-main');
    const iSky = document.getElementById('iframe-skyline');
    const placeholder = document.getElementById('placeholder');

    function sync() {
        const z = parseFloat(document.getElementById('zoom').value);
        const x = parseFloat(document.getElementById('posX').value);
        const y = parseFloat(document.getElementById('posY').value);

        // Update Labels
        document.getElementById('z-val').innerText = z.toFixed(2);
        document.getElementById('x-val').innerText = x + 'px';
        document.getElementById('y-val').innerText = y + 'px';

        // Apply to Main
        iMain.style.transform = `scale(${z}) translate(${x}px, ${y}px)`;

        // REVERSE WATERFALL LOGIC:
        // The top iframe needs to show content that is exactly '120px' (height of top container) 
        // worth of content ABOVE the current Y position.
        const skyY = y + (120 / z); 
        iSky.style.transform = `scale(${z}) translate(${x}px, ${skyY}px)`;

        if (placeholder.style.display !== 'none') {
            placeholder.style.opacity = '0';
            setTimeout(() => placeholder.style.display = 'none', 300);
        }
    }

    function generate() {
        const z = document.getElementById('zoom').value;
        const x = document.getElementById('posX').value;
        const y = document.getElementById('posY').value;
        const skyY = (parseFloat(y) + (120 / z)).toFixed(0);
        const out = document.getElementById('output');
        
        out.value = `
<div style="width:100%; max-width:600px; display:flex; flex-direction:column; background:#000;">
  <div style="width:100%; height:120px; position:relative; overflow:hidden; border:1px solid #333; border-radius:8px 8px 0 0;">
    <iframe src="https://tulnit.com" style="position:absolute; top:0; left:0; width:1920px; height:1080px; border:none; transform-origin:0 0; transform:scale(${z}) translate(${x}px, ${skyY}px);"></iframe>
  </div>
  <div style="width:100%; position:relative; padding-top:56.25%; overflow:hidden; border:1px solid #444; border-top:none; border-radius:0 0 8px 8px;">
    <iframe src="https://tulnit.com" style="position:absolute; top:0; left:0; width:1920px; height:1080px; border:none; transform-origin:0 0; transform:scale(${z}) translate(${x}px, ${y}px);"></iframe>
  </div>
</div>`.trim();
        out.style.display = 'block';
    }
    sync();
</script>
</body>
</html>
