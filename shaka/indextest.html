<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Embed Player</title>
    <!-- CSS is mandatory for the UI to look correct -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com">
    <!-- Using the UI-enabled version of Shaka -->
    <script src="shaka.js"></script>
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background: #000; }
        .shaka-container { width: 100%; height: 100%; }
        video { width: 100%; height: 100%; }
        /* Professional green accent for the seeker bar */
        .shaka-range-container input[type=range]::-webkit-slider-runnable-track { background: #00ffA0 !important; }
    </style>
</head>
<body>

    <div data-shaka-player-container class="shaka-container">
        <video autoplay id="video" crossorigin="anonymous"></video>
    </div>

    <script>
        const manifestUri = "https://anywhere.pwisetthon.com";

        async function init() {
            const video = document.getElementById('video');
            const container = document.querySelector('.shaka-container');

            // Initialize Player
            const player = new shaka.Player(video);
            
            // Initialize UI
            const ui = new shaka.ui.Overlay(player, container, video);
            const config = {
                'controlPanelElements': ['play_pause', 'time_and_duration', 'spacer', 'quality', 'volume', 'fullscreen']
            };
            ui.configure(config);

            shaka.polyfill.installAll();

            player.addEventListener('error', (e) => console.error('Player Error:', e.detail));

            try {
                await player.load(manifestUri);
            } catch (e) {
                console.error('Load Error:', e);
            }
        }

        // The UI library triggers this event when the DOM is ready
        document.addEventListener('shaka-ui-loaded', init);
        // Backup: if the event already fired
        if (document.readyState === 'complete' && window.shaka) init();
    </script>
</body>
</html>
