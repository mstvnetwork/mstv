<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdnjs.cloudflare.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com">
    <script src="shaka.js"></script> 
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background: #000; }
        .shaka-container { width: 100%; height: 100%; }
        video { width: 100%; height: 100%; display: block; }
    </style>
</head>
<body>
    <div data-shaka-player-container class="shaka-container">
        <video autoplay id="video" crossorigin="anonymous"></video>
    </div>

    <script>
        const testUrl = "https://anywhere.pwisetthon.com";

        async function init() {
            const video = document.getElementById('video');
            const container = document.querySelector('.shaka-container');
            shaka.polyfill.installAll();
            
            const player = new shaka.Player(video);
            const ui = new shaka.ui.Overlay(player, container, video);

            // FIX for Error 4000: Force HLS interpretation
            player.configure({
                manifest: {
                    hls: {
                        defaultType: 'application/x-mpegurl' 
                    }
                }
            });

            try {
                // Manually tell Shaka this is HLS to bypass the "text/plain" error
                await player.load(testUrl, null, 'application/x-mpegurl');
            } catch (e) {
                console.error("Playback Error:", e);
            }
        }

        document.addEventListener('shaka-ui-loaded', init);
    </script>
</body>
</html>
