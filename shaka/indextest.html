<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- Mux.js is mandatory to fix the "numerical signs" (TS segments) -->
    
    
    <script src="shaka.js"></script> 
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background: #000; }
        .shaka-container { width: 100%; height: 100%; }
        video { width: 100%; height: 100%; display: block; }
    </style>
</head>
<body>
    <div data-shaka-player-container class="shaka-container">
        <video autoplay id="video" crossorigin="anonymous"></video>
    </div>

    <script>
        const testUrl = "https://anywhere.pwisetthon.com";

        async function init() {
            shaka.polyfill.installAll();
            
            const video = document.getElementById('video');
            const container = document.querySelector('.shaka-container');
            const player = new shaka.Player(video);
            const ui = new shaka.ui.Overlay(player, container, video);

            // --- THE FIX FOR ERROR 4015 ---
            // This forces Shaka to treat the Proxy response as HLS
            player.getNetworkingEngine().registerResponseFilter((type, response) => {
                if (response.uri.includes('anywhere.pwisetthon.com')) {
                    response.headers['content-type'] = 'application/x-mpegurl';
                }
            });

            try {
                // We pass 'application/x-mpegurl' as the 3rd argument to force HLS
                await player.load(testUrl, null, 'application/x-mpegurl');
                console.log("Success: HLS Forced Load via Filter");
            } catch (e) {
                console.error("Playback Error:", e);
                // If it still fails, it might be a CORS issue from the proxy itself
            }
        }

        document.addEventListener('shaka-ui-loaded', init);
    </script>
</body>
</html>
