<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- Required Dependencies -->
    <script src="https://cdnjs.cloudflare.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com">
    <!-- Using your identified UI library -->
    <script src="shaka.js"></script> 

    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background: #000; }
        /* Player fills the entire iframe/window */
        .shaka-container { width: 100%; height: 100%; }
        video { width: 100%; height: 100%; display: block; }
        /* Accent color for seeker bar */
        .shaka-range-container input[type=range]::-webkit-slider-runnable-track { background: #00ffA0 !important; }
    </style>
</head>
<body>

    <div data-shaka-player-container class="shaka-container">
        <video autoplay id="video" crossorigin="anonymous"></video>
    </div>

    <script>
        const testUrl = "https://anywhere.pwisetthon.com/http://tvn2.chowdhury-shaheb.com/stargold/tracks-v1a1/mono.m3u8";

        async function initPlayer() {
            const video = document.getElementById('video');
            const container = document.querySelector('.shaka-container');

            // Initialize Player and UI Overlay
            const player = new shaka.Player(video);
            const ui = new shaka.ui.Overlay(player, container, video);
            
            ui.configure({
                'controlPanelElements': ['play_pause', 'time_and_duration', 'spacer', 'quality', 'volume', 'fullscreen']
            });

            shaka.polyfill.installAll();

            try {
                await player.load(testUrl);
            } catch (e) {
                console.error("Playback failed", e);
            }
        }

        // Initialize when the UI library is ready
        document.addEventListener('shaka-ui-loaded', initPlayer);
        // Fallback for direct loading
        document.addEventListener('DOMContentLoaded', () => {
            if (window.shaka && !window.shaka.ui) initPlayer();
        });
    </script>
</body>
</html>
