<!DOCTYPE html>
<html>
<head>
    <style>
        body { background: #1a1a1a; color: #ddd; font-family: 'Segoe UI', sans-serif; display: flex; flex-direction: column; align-items: center; padding: 20px; }
        
        /* SINGLE 16:9 CONTAINER */
        .wrapper { 
            width: 100%; 
            max-width: 600px; 
            position: relative; 
            background: #000; 
            border: 2px solid #444; 
            border-radius: 8px; 
            overflow: hidden;
        }
        
        /* Maintains 16:9 Ratio */
        .viewport { 
            position: relative; 
            width: 100%; 
            padding-top: 56.25%; /* 16:9 Aspect Ratio */
        }
        
        #top-placeholder { 
            position: absolute; top: 0; left: 0; width: 100%; height: 100%; 
            background: #222; z-index: 10; display: flex; align-items: center; 
            justify-content: center; font-weight: bold; transition: opacity 0.3s; 
            pointer-events: none; 
        }

        #main-iframe { 
            position: absolute; top: 0; left: 0; width: 1920px; height: 1080px; 
            border: none; transform-origin: 0 0; 
        }

        /* Controls */
        .controls { background: #222; padding: 20px; border-radius: 8px; margin-top: 15px; width: 100%; max-width: 560px; display: flex; flex-direction: column; gap: 15px; }
        .slider-group { display: flex; flex-direction: column; gap: 5px; }
        .slider-group label { font-size: 11px; font-weight: bold; color: #888; display: flex; justify-content: space-between; }
        
        input[type="range"] { -webkit-appearance: none; width: 100%; height: 6px; background: #444; border-radius: 5px; outline: none; }
        input[type="range"]::-webkit-slider-thumb { -webkit-appearance: none; width: 18px; height: 18px; background: #007bff; border-radius: 50%; cursor: pointer; border: 2px solid #fff; }
        
        button { padding: 10px; cursor: pointer; background: #28a745; color: white; border: none; border-radius: 4px; font-weight: bold; }
        textarea { height: 100px; background: #000; color: #0f0; padding: 10px; font-family: monospace; font-size: 11px; display: none; margin-top: 10px; }
    </style>
</head>
<body>

<div class="wrapper" onclick="hidePlaceholder()">
    <div class="viewport">
        <div id="top-placeholder">INTERACT OR SLIDE TO VIEW</div>
        <iframe id="main-iframe" src="https://tulnit.com/live/sony-sab-hd/"></iframe>
    </div>
</div>

<div class="controls">
    <div class="slider-group">
        <label>Zoom <span id="z-val">0.60</span></label>
        <input type="range" id="zoom" min="0.1" max="2" step="0.01" value="0.60" oninput="sync()">
    </div>
    <div class="slider-group">
        <label>X-Axis <span id="x-val">-261px</span></label>
        <input type="range" id="posX" min="-1500" max="1500" step="1" value="-261" oninput="sync()">
    </div>
    <div class="slider-group">
        <label>Y-Axis <span id="y-val">-100px</span></label>
        <input type="range" id="posY" min="-1500" max="1500" step="1" value="-100" oninput="sync()">
    </div>
    
    <button onclick="generate()">🔒 GENERATE 16:9 CODE</button>
    <textarea id="output" readonly></textarea>
</div>

<script>
    const iframe = document.getElementById('main-iframe');
    const placeholder = document.getElementById('top-placeholder');

    function sync() {
        const z = document.getElementById('zoom').value;
        const x = document.getElementById('posX').value;
        const y = document.getElementById('posY').value;

        document.getElementById('z-val').innerText = z;
        document.getElementById('x-val').innerText = x + 'px';
        document.getElementById('y-val').innerText = y + 'px';

        iframe.style.transform = `scale(${z}) translate(${x}px, ${y}px)`;
        hidePlaceholder();
    }

    function hidePlaceholder() {
        if (placeholder.style.display !== 'none') {
            placeholder.style.opacity = '0';
            setTimeout(() => placeholder.style.display = 'none', 300);
        }
    }

    function generate() {
        const z = document.getElementById('zoom').value;
        const x = document.getElementById('posX').value;
        const y = document.getElementById('posY').value;
        const out = document.getElementById('output');
        
        out.value = `<div style="width:100%; max-width:600px; position:relative; overflow:hidden; background:#000; border:1px solid #444; border-radius:8px;">\n  <div style="padding-top:56.25%;"></div>\n  <iframe src="https://tulnit.com" style="position:absolute; top:0; left:0; width:1920px; height:1080px; border:none; transform-origin:0 0; transform:scale(${z}) translate(${x}px, ${y}px);"></iframe>\n</div>`;
        out.style.display = 'block';
    }
    
    sync();
</script>
</body>
</html>
