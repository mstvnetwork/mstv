<!DOCTYPE html>
<html>
  <head>
    <!-- Shaka Player compiled library and default UI styles -->
    <script src="https://ajax.googleapis.com"></script>
    <link rel="stylesheet" href="https://ajax.googleapis.com">
  </head>
  <body>
    <div data-shaka-player-container style="max-width:800px">
      <video autoplay id="video" style="width:100%;height:100%"></video>
    </div>

    <script>
      const manifestUri = 'https://anywhere.pwisetthon.com/http://tvn2.chowdhury-shaheb.com/stargold/index.m3u8';

      async function initApp() {
        // Install built-in polyfills to patch browser incompatibilities
        shaka.polyfill.installAll();

        // Check if the browser supports the basic APIs Shaka needs
        if (shaka.Player.isBrowserSupported()) {
          initPlayer();
        } else {
          console.error('Browser not supported!');
        }
      }

      async function initPlayer() {
        const video = document.getElementById('video');
        const player = new shaka.Player(video);

        // Attach player to window for console debugging
        window.player = player;

        // Listen for error events
        player.addEventListener('error', (event) => {
          console.error('Error code', event.detail.code, 'object', event.detail);
        });

        try {
          // Load the HLS manifest
          await player.load(manifestUri);
          console.log('The video has now been loaded!');
        } catch (e) {
          console.error('Error loading manifest', e);
        }
      }

      document.addEventListener('DOMContentLoaded', initApp);
    </script>
  </body>
</html>
