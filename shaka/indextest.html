<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdnjs.cloudflare.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com">
    <script src="shaka.js"></script> 
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background: #000; }
        .shaka-container { width: 100%; height: 100%; }
        video { width: 100%; height: 100%; display: block; }
    </style>
</head>
<body>
    <div data-shaka-player-container class="shaka-container">
        <video autoplay id="video" crossorigin="anonymous"></video>
    </div>

    <script>
        const testUrl = "https://anywhere.pwisetthon.com";

        async function init() {
            const video = document.getElementById('video');
            const container = document.querySelector('.shaka-container');
            
            shaka.polyfill.installAll();
            
            const player = new shaka.Player(video);
            const ui = new shaka.ui.Overlay(player, container, video);

            player.addEventListener('error', (e) => console.error('Shaka Error:', e.detail));

            try {
                // FORCE SHAKA TO TREAT AS HLS (This bypasses the 'text/plain' error 4015)
                // Third argument 'application/x-mpegurl' is the secret here
                await player.load(testUrl, null, 'application/x-mpegurl');
                console.log("Success: HLS Forced Load");
            } catch (e) {
                console.error("Playback Error:", e);
            }
        }

        document.addEventListener('shaka-ui-loaded', init);
    </script>
</body>
</html>
