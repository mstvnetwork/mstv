<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Shaka UI Player</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/shaka-player/4.7.6/shaka-player.ui.min.js"></script>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/shaka-player/4.7.6/controls.min.css">

<style>
    body {
        margin: 0;
        background: #000;
    }

    #video-container {
        width: 100%;
        max-width: 900px;
        margin: 0 auto;
    }

    video {
        width: 100%;
        display: block;
    }
</style>
</head>

<body>

<div id="video-container" data-shaka-player-container>
    <video id="video"
           data-shaka-player
           autoplay
           playsinline>
    </video>
</div>

<script>
document.addEventListener('DOMContentLoaded', async () => {

    shaka.polyfill.installAll();

    if (!shaka.Player.isBrowserSupported()) {
        console.error("Browser not supported");
        return;
    }

    const video = document.getElementById('video');
    const container = document.getElementById('video-container');

    // Create Player
    const player = new shaka.Player(video);

    // Create UI Overlay
    const ui = new shaka.ui.Overlay(player, container, video);

    // Configure UI controls
    ui.configure({
        controlPanelElements: [
            'play_pause',
            'time_and_duration',
            'spacer',
            'mute',
            'volume',
            'quality',
            'captions',
            'fullscreen',
            'overflow_menu'
        ]
    });

    // Error handling
    player.addEventListener('error', event => {
        console.error('Shaka Error', event.detail);
    });

    try {
        await player.load("https://storage.googleapis.com/shaka-demo-assets/angel-one-hls/hls.m3u8");
        video.play();
    } catch (error) {
        console.error('Load failed', error);
    }

    console.log(player.getVariantTracks());

});
</script>

</body>
</html>
