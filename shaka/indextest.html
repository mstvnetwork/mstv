<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Player</title>

<script src="shaka.js"></script>

<style>
    body {
        margin: 0;
        background: #000;
    }

    #video-container {
        position: relative;
        width: 100%;
        max-width: 800px;
        margin: 0 auto;
    }

    video {
        width: 100%;
        background: #111;
        display: block;
    }

    #spinner {
        position: absolute;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        border: 6px solid #f3f3f3;
        border-top: 6px solid #00ffA0;
        border-radius: 50%;
        width: 50px;
        height: 50px;
        animation: spin 1s linear infinite;
        z-index: 10;
    }

    @keyframes spin {
        0% { transform: translate(-50%, -50%) rotate(0deg); }
        100% { transform: translate(-50%, -50%) rotate(360deg); }
    }
</style>
</head>

<body>

<div id="video-container">
    <video id="video" controls autoplay crossorigin="anonymous"></video>
    <div id="spinner"></div>
</div>

<script>
const streamUrl = "https://anywhere.pwisetthon.com/http://tvn2.chowdhury-shaheb.com/stargold/tracks-v1a1/mono.m3u8";

document.addEventListener('DOMContentLoaded', async () => {
    const video = document.getElementById('video');
    const spinner = document.getElementById('spinner');

    if (typeof shaka === 'undefined') {
        spinner.style.display = 'none';
        return;
    }

    shaka.polyfill.installAll();
    const player = new shaka.Player(video);

    player.addEventListener('error', () => {
        spinner.style.display = 'none';
    });

    video.addEventListener('playing', () => {
        spinner.style.display = 'none';
    });

    try {
        await player.load(streamUrl);
    } catch (e) {
        spinner.style.display = 'none';
    }
});
</script>

</body>
</html>
