<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Scroll Split Player</title>

<style>
:root { --primary: #00ffa0; }

body {
    margin: 0;
    background: #000;
    font-family: sans-serif;
    height: 200vh;
}

/* Shared wrapper */
.player-wrapper {
    position: relative;
    width: 100%;
    max-width: 1000px;
    margin: 20px auto;
}

/* Top viewport */
.main-player {
    position: relative;
    aspect-ratio: 16/9;
    overflow: hidden;
    border: 4px solid var(--primary);
    border-radius: 14px;
}

/* Bottom tube */
.tube-player {
    position: fixed;
    bottom: 20px;
    left: 50%;
    transform: translateX(-50%);
    width: 90%;
    max-width: 1000px;
    height: 80px;
    overflow: hidden;
    border-radius: 50px;
    border: 3px solid var(--primary);
    background: #111;
}

/* Single iframe */
#sharedFrame {
    position: absolute;
    width: 100%;
    height: 170%;
    border: none;
}
</style>
</head>

<body>

<div class="player-wrapper">
    <div class="main-player">
        <iframe id="sharedFrame"
            src="https://tulnit.com/live/bollywood-colors/"
            sandbox="allow-forms allow-scripts allow-same-origin">
        </iframe>
    </div>
</div>

<div class="tube-player" id="tubeMask"></div>

<script>
const params = new URLSearchParams(window.location.search);
const isPublic = params.get("view") === "public";

const frame = document.getElementById("sharedFrame");
const tube = document.getElementById("tubeMask");

/* PUBLIC MODE */
if (isPublic) {
    tube.remove();
    document.body.style.height = "auto";
}

/* PRIVATE MODE */
if (!isPublic) {

    const tubeFrame = frame.cloneNode(true);
    tube.appendChild(tubeFrame);

    window.addEventListener("scroll", () => {
        const scrollY = window.scrollY;
        frame.style.transform = `translateY(-${scrollY}px)`;
        tubeFrame.style.transform = `translateY(-${scrollY + 
            document.querySelector(".main-player").offsetHeight - 80}px)`;
    });
}
</script>

</body>
</html>
