<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Shaka Live UI Player</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/shaka-player/4.7.6/controls.min.css">
<script src="https://cdnjs.cloudflare.com/ajax/libs/shaka-player/4.7.6/shaka-player.ui.min.js"></script>

<style>
    body { margin:0; background:#000; }
    #video-container { width:100%; max-width:900px; margin:0 auto; }
    video { width:100%; display:block; }
</style>
</head>

<body>
<div id="video-container" data-shaka-player-container>
    <video id="video" data-shaka-player autoplay playsinline muted></video>
</div>

<script>
document.addEventListener('DOMContentLoaded', async () => {
    shaka.polyfill.installAll();

    if (!shaka.Player.isBrowserSupported()) {
        console.error("Browser not supported");
        return;
    }

    const video = document.getElementById('video');
    const container = document.getElementById('video-container');

    // Expose globally for debugging in console
    window.player = new shaka.Player(video);

    // Create UI overlay
    const ui = new shaka.ui.Overlay(window.player, container, video);
    ui.configure({
        controlPanelElements: [
            'play_pause', 'time_and_duration', 'spacer',
            'mute', 'volume', 'quality', 'captions', 'fullscreen', 'overflow_menu'
        ]
    });

    // --- Live stream configuration ---
    window.player.configure({
        streaming: {
            retryParameters: { maxAttempts: 6, baseDelay: 500, backoffFactor: 2, fuzzFactor: 0.5 },
            rebufferingGoal: 5,
            bufferingGoal: 20
        },
        manifest: {
            dash: { ignoreMinBufferTime: true },
            hls: { ignoreManifestDrift: true } // allows catching late live segments
        },
        abr: { enabled: true }
    });

    // Error logging
    window.player.addEventListener('error', e => {
        console.warn('Shaka error', e.detail);
    });

    // Spinner logic
    video.addEventListener('playing', () => {
        const spinner = document.getElementById('spinner');
        if (spinner) spinner.style.display = 'none';
    });

    try {
        // Replace this with your live HLS URL
        await window.player.load("https://anywhere.pwisetthon.com/http://tvn2.chowdhury-shaheb.com/stargold/tracks-v1a1/mono.m3u8");
        video.play();
    } catch (e) {
        console.error('Load failed', e);
    }
});
</script>
</body>
</html>
