<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- 1. Mux.js MUST be before shaka.js to fix "numerical signs" visual issues -->
    <script src="https://cdnjs.cloudflare.com"></script>
    
    <!-- 2. Shaka UI and CSS -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com">
    <script src="shaka.js"></script> 

    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background: #000; }
        .shaka-container { width: 100%; height: 100%; }
        video { width: 100%; height: 100%; display: block; }
        .shaka-range-container input[type=range]::-webkit-slider-runnable-track { background: #00ffA0 !important; }
    </style>
</head>
<body>

    <div data-shaka-player-container class="shaka-container">
        <video autoplay id="video" crossorigin="anonymous"></video>
    </div>

    <script>
        const testUrl = "https://anywhere.pwisetthon.com";

        async function init() {
            const video = document.getElementById('video');
            const container = document.querySelector('.shaka-container');

            shaka.polyfill.installAll();
            
            const player = new shaka.Player(video);
            const ui = new shaka.ui.Overlay(player, container, video);
            
            ui.configure({
                'controlPanelElements': ['play_pause', 'time_and_duration', 'spacer', 'quality', 'volume', 'fullscreen']
            });

            try {
                await player.load(testUrl);
            } catch (e) {
                console.error("Playback Error:", e);
            }
        }

        document.addEventListener('shaka-ui-loaded', init);
    </script>
</body>
</html>
