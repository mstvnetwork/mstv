<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Scroll Split Player</title>

<style>
:root { --primary: #00ffa0; }

body {
    margin: 0;
    background: #000;
    font-family: sans-serif;
    height: 200vh; /* enough scroll */
}

/* Shared wrapper */
.player-wrapper {
    position: relative;
    width: 100%;
    max-width: 1000px;
    margin: 20px auto;
}

/* Top viewport */
.main-player {
    position: relative;
    aspect-ratio: 16/9;
    overflow: hidden;
    border: 4px solid var(--primary);
    border-radius: 14px;
}

/* Bottom tube */
.tube-player {
    position: fixed;
    bottom: 20px;
    left: 50%;
    transform: translateX(-50%);
    width: 90%;
    max-width: 1000px;
    height: 80px;
    overflow: hidden;
    border-radius: 50px;
    border: 3px solid var(--primary);
    background: #111;
    pointer-events: none; /* important */
}

/* Single iframe */
#sharedFrame {
    position: absolute;
    width: 100%;
    height: 170%;
    border: none;
}
</style>
</head>

<body>

<div class="player-wrapper">

    <div class="main-player" id="mainMask">
        <iframe id="sharedFrame"
            src="https://tulnit.com/live/bollywood-colors/"
            sandbox="allow-forms allow-scripts allow-same-origin">
        </iframe>
    </div>

</div>

<div class="tube-player" id="tubeMask"></div>

<script>
const frame = document.getElementById("sharedFrame");
const tube = document.getElementById("tubeMask");

function syncScroll() {
    const scrollY = window.scrollY;

    /* Move iframe upward as page scrolls */
    frame.style.transform = `translateY(-${scrollY}px)`;

    /* Show bottom portion inside tube */
    tube.innerHTML = "";
    tube.appendChild(frame.cloneNode(true));
}

/* Instead of cloning each time (bad), do this instead: */

const tubeFrame = frame.cloneNode(true);
tube.appendChild(tubeFrame);

/* Disable pointer events on tube so clicks go through illusion */
tube.style.pointerEvents = "none";

window.addEventListener("scroll", () => {
    const scrollY = window.scrollY;

    frame.style.transform = `translateY(-${scrollY}px)`;
    tubeFrame.style.transform = `translateY(-${scrollY + 
        document.querySelector(".main-player").offsetHeight - 80}px)`;
});
</script>

</body>
</html>
