<!DOCTYPE html>
<html>
<head>
    <style>
        body { background: #1a1a1a; color: #eee; font-family: sans-serif; display: flex; flex-direction: column; align-items: center; padding: 20px; }
        
        /* THE SINGLE VIEWPORT */
        .viewport { 
            width: 100%; max-width: 600px; 
            height: 480px; /* Combined height of Top (120px) + Gap (20px) + Bottom (340px) */
            position: relative; overflow: hidden; 
            background: #000; border: 2px solid #444; border-radius: 12px;
        }

        /* THE GAP: A "Visual Divider" that hides the middle content */
        .middle-divider {
            position: absolute; 
            top: 120px; left: 0; width: 100%; height: 20px;
            background: #1a1a1a; z-index: 5; /* Matches body background */
            border-top: 1px solid #444; border-bottom: 1px solid #444;
        }

        /* THE SINGLE IFRAME */
        #main-iframe { position: absolute; top: 0; left: 0; width: 1920px; height: 1080px; border: none; transform-origin: 0 0; }

        /* CONTROLS */
        .controls { background: #222; padding: 20px; border-radius: 8px; margin-top: 15px; width: 100%; max-width: 560px; display: flex; flex-direction: column; gap: 15px; }
        .slider-group { display: flex; flex-direction: column; gap: 5px; font-size: 11px; }
        input[type="range"] { width: 100%; cursor: pointer; }
        button { padding: 10px; background: #28a745; color: white; border: none; border-radius: 4px; cursor: pointer; font-weight: bold; }
        textarea { height: 100px; background: #000; color: #0f0; font-family: monospace; font-size: 10px; margin-top: 10px; display: none; }
    </style>
</head>
<body>

<div class="viewport">
    <!-- The "Divider" makes one iframe look like two separate boxes -->
    <div class="middle-divider"></div>
    <iframe id="main-iframe" src="https://tulnit.com/live/sony-sab-hd/"></iframe>
</div>

<div class="controls">
    <div class="slider-group">
        <label>Master Zoom: <span id="z-val">0.60</span></label>
        <input type="range" id="zoom" min="0.1" max="1.5" step="0.01" value="0.60" oninput="sync()">
    </div>
    <div class="slider-group">
        <label>Vertical Position (Y): <span id="y-val">-100px</span></label>
        <input type="range" id="posY" min="-1500" max="1500" value="-100" oninput="sync()">
    </div>
    <div class="slider-group">
        <label>Horizontal Position (X): <span id="x-val">-282px</span></label>
        <input type="range" id="posX" min="-1500" max="1500" value="-282" oninput="sync()">
    </div>
    
    <button onclick="generate()">🔒 GENERATE UNIFIED SYNC CODE</button>
    <textarea id="output" readonly></textarea>
</div>

<script>
    const iframe = document.getElementById('main-iframe');

    function sync() {
        const z = parseFloat(document.getElementById('zoom').value);
        const x = parseFloat(document.getElementById('posX').value);
        const y = parseFloat(document.getElementById('posY').value);

        document.getElementById('z-val').innerText = z.toFixed(2);
        document.getElementById('x-val').innerText = x + 'px';
        document.getElementById('y-val').innerText = y + 'px';

        // Shift the iframe so the "skyline" starts at top:0 
        // and the "main player" starts after the 120px divider
        iframe.style.transform = `scale(${z}) translate(${x}px, ${y}px)`;
    }

    function generate() {
        const z = document.getElementById('zoom').value;
        const x = document.getElementById('posX').value;
        const y = document.getElementById('posY').value;
        const out = document.getElementById('output');
        
        out.value = `<div style="width:100%; max-width:600px; height:480px; position:relative; overflow:hidden; background:#000; border:2px solid #444; border-radius:12px;">\n  <div style="position:absolute; top:120px; left:0; width:100%; height:20px; background:#1a1a1a; z-index:5; border-top:1px solid #444; border-bottom:1px solid #444;"></div>\n  <iframe src="https://tulnit.com" style="position:absolute; top:0; left:0; width:1920px; height:1080px; border:none; transform-origin:0 0; transform:scale(${z}) translate(${x}px, ${y}px);"></iframe>\n</div>`;
        out.style.display = 'block';
    }
    sync();
</script>

</body>
</html>
