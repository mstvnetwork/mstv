<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- 1. Mux.js: REQUIRED for HLS playback in Shaka -->
    <script src="https://cdnjs.cloudflare.com"></script>
    
    <!-- 2. Shaka UI & CSS -->
    <link rel="stylesheet" href="https://ajax.googleapis.com">
    <script src="https://ajax.googleapis.com"></script>

    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background: #000; }
        .shaka-container { width: 100%; height: 100%; }
        video { width: 100%; height: 100%; display: block; }
        /* Theme color for seeker bar */
        .shaka-range-container input[type=range]::-webkit-slider-runnable-track { background: #00ffA0 !important; }
    </style>
</head>
<body>

    <div data-shaka-player-container class="shaka-container">
        <video autoplay id="video" crossorigin="anonymous"></video>
    </div>

    <script>
        // Your specific stream URL
        const manifestUri = "https://anywhere.pwisetthon.com";

        async function init() {
            const video = document.getElementById('video');
            const container = document.querySelector('.shaka-container');

            // Initialize Player and UI
            const player = new shaka.Player(video);
            const ui = new shaka.ui.Overlay(player, container, video);
            
            ui.configure({
                'controlPanelElements': ['play_pause', 'time_and_duration', 'spacer', 'quality', 'volume', 'fullscreen']
            });

            shaka.polyfill.installAll();

            // Handle errors
            player.addEventListener('error', (e) => {
                console.error('Shaka Error:', e.detail.code, e.detail);
                if (e.detail.code === 1001) alert("CORS Error: The server is blocking this player.");
            });

            try {
                await player.load(manifestUri);
                console.log("Success: Stream loaded.");
            } catch (e) {
                console.error("Load failed:", e);
            }
        }

        document.addEventListener('shaka-ui-loaded', init);
        if (document.readyState === 'complete' && window.shaka) init();
    </script>
</body>
</html>
