<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>MSTV Player</title>
    <!-- Using official Shaka Player CDN -->
    <script src="shaka.js"></script>
    <style>
        /* Optimized for Iframe: Removes all margins and scrollbars */
        body, html { 
            margin: 0; 
            padding: 0; 
            background: #000; 
            overflow: hidden; 
            width: 100%; 
            height: 100%; 
        }
        .container { 
            display: flex; 
            width: 100vw; 
            height: 100vh; 
            align-items: center; 
            justify-content: center; 
        }
        video { 
            width: 100%; 
            height: 100%; 
            background: #000; 
            object-fit: contain; /* Maintains aspect ratio without stretching */
        }
    </style>
</head>
<body>
    <div class="container">
        <video id="video" controls autoplay crossorigin="anonymous"></video>
    </div>

    <script>
        const streamList = [
    {
        name: "Zee TV (DASH ClearKey)",
        type: "dash",
        url: "https://d1g8wgjurz8via.cloudfront.net/bpk-tv/Zeebollywood/default/manifest.mpd",
        drm: {
            clearKeys: {
                "e61523260c614746b25b9a5523fe9a39": "72ddbf37f76f49acbb8e140e7279e7a1"
            }
        }
    }
    ];
        async function initPlayer() {
            const hash = window.location.hash.substring(1);
            let index = parseInt(hash, 10) - 1;
            if (isNaN(index) || index < 0 || index >= streamList.length) index = 0;

            const stream = streamList[index];
            const video = document.getElementById('video');
            shaka.polyfill.installAll();

            if (!shaka.Player.isBrowserSupported()) {
                alert("Browser not supported.");
                return;
            }

            const player = new shaka.Player(video);
            player.addEventListener('error', (e) => console.error("Shaka Error:", e.detail));

            try {
                if (stream.type === "dash" && stream.drm) {
                    player.configure({ drm: stream.drm });
                }
                await player.load(stream.url);
            } catch (error) {
                console.error("Loading failed:", error);
            }
        }

        window.addEventListener('hashchange', () => window.location.reload());
        document.addEventListener('DOMContentLoaded', initPlayer);
    </script>
</body>
</html>
