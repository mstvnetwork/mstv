<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sony TV HD - Mobile Stream</title>
    
    <script src="https://unpkg.com"></script>
    <script type="module" src="https://unpkg.com"></script>

    <style>
        :root { --primary: #00ffA0; }
        body, html {
            margin: 0; padding: 0;
            width: 100%; height: 100%;
            background: #000;
            display: flex; align-items: center; justify-content: center;
            overflow: hidden;
        }

        .viewport {
            width: 100vw; max-width: 1000px; aspect-ratio: 16 / 9; 
            overflow: hidden; position: relative;
            border: 4px solid var(--primary); border-radius: 12px;
            background: #000;
        }

        #frameMover {
            position: absolute; 
            width: 100%; 
            height: 270%; 
            top: -230px; 
            left: 0%;
            z-index: 1;
        }

        #captureFrame {
            width: 100%;
            height: 100%;
            border: none;
        }

        #ticker {
            position: absolute; top: 0px; left: 0;
            width: 100%; background: rgba(0,0,0,0.4);
            overflow: hidden; white-space: nowrap;
            z-index: 2; padding: 10px 0;
            pointer-events: none;
        }

        #ticker span {
            display: inline-block; padding-left: 100%;
            animation: scroll 15s linear infinite;
            color: #ff3b3b; font-family: sans-serif; font-size: 14px;
            font-weight: bold;
        }

        @keyframes scroll {
            0% { transform: translateX(0); }
            100% { transform: translateX(-100%); }
        }

        #countdown {
            position: absolute;
            bottom: 20px;
            right: 20px;
            z-index: 3;
            background: rgba(0, 0, 0, 0.7);
            border: 2px solid #ff3b3b;
            border-radius: 10px;
            padding: 10px 18px;
            color: #fff;
            font-family: sans-serif;
            font-size: 15px;
            text-align: center;
            pointer-events: none;
        }

        #countdown .label {
            font-size: 11px;
            color: #ff3b3b;
            font-weight: bold;
            letter-spacing: 1px;
            text-transform: uppercase;
            margin-bottom: 4px;
        }

        #countdown .timer {
            font-size: 28px;
            font-weight: bold;
            color: #fff;
            line-height: 1;
        }

        #countdown.done {
            border-color: #00ffA0;
        }

        #countdown.done .label {
            color: #00ffA0;
        }

        #countdown.done .timer {
            font-size: 14px;
            color: #00ffA0;
        }
    </style>
</head>
<body>

    <div class="viewport">
        <div id="ticker"><span> Wait for ad to disappear. </span></div>

        <div id="frameMover">
            <iframe id="captureFrame" 
                    is="x-frame-bypass"
                    src="https://tulnit.com/live/sony-tv-hd/" 
                    scrolling="no"
                    allowfullscreen>
            </iframe>
        </div>

        <div id="countdown">
            <div class="label">Ad ends in</div>
            <div class="timer" id="timerDisplay">24</div>
        </div>
    </div>

    <script>
        let seconds = 35;
        const display = document.getElementById('timerDisplay');
        const box = document.getElementById('countdown');
        const label = box.querySelector('.label');

        const interval = setInterval(() => {
            seconds--;
            if (seconds <= 0) {
                clearInterval(interval);
                display.textContent = '▶ Enjoy!';
                label.textContent = 'Stream ready';
                box.classList.add('done');
            } else {
                display.textContent = seconds;
            }
        }, 1000);
    </script>

</body>
</html>
