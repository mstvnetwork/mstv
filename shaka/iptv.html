<!DOCTYPE html>
<html>
<head>
    <style>
        body { background: #1a1a1a; color: white; font-family: sans-serif; text-align: center; }

        /* General style for the windowed containers */
        .crop-container {
            overflow: hidden;
            position: relative;
            margin: 20px auto;
            border: 2px solid #444;
            background: #000;
        }

        /* 1. BUTTON WINDOW: Only shows the trigger button */
        #button-window {
            width: 200px;  /* Width of the button area */
            height: 80px;  /* Height of the button area */
        }

        /* 2. PLAYER WINDOW: Only shows the video player */
        #player-window {
            width: 800px;  /* Width of the player area */
            height: 450px; /* Height of the player area */
            display: block;
        }

        /* The actual embedded frames */
        .target-frame {
            position: absolute;
            width: 1920px;  /* Match total width of the source site */
            height: 5000px; /* Match total height of the source site */
            border: none;
        }

        /* COORDINATES: Adjust these using your measurements */
        #frame-button { top: -200px; left: -400px; } /* Coordinates for button */
        #frame-player { top: -850px; left: -150px; } /* Coordinates for player */

        h3 { color: #888; margin-top: 50px; }
    </style>
</head>
<body>

    <h3>Step 1: Click the Button Below</h3>
    <div id="button-window" class="crop-container" onclick="scrollToPlayer()">
        <iframe src="https://tulnit.com/live/sony-tv-hd/" class="target-frame" id="frame-button" scrolling="no"></iframe>
        <!-- Invisible overlay to make the whole 'window' clickable for scrolling -->
        <div style="position:absolute; top:0; left:0; width:100%; height:100%; cursor:pointer;"></div>
    </div>

    <div style="height: 600px;"> <!-- Space between elements --> </div>

    <h3 id="player-label">Step 2: Watch the Player Here</h3>
    <div id="player-window" class="crop-container">
        <iframe src="URL_HERE" class="target-frame" id="frame-player" scrolling="no"></iframe>
    </div>

    <script>
        function scrollToPlayer() {
            const playerArea = document.getElementById('player-window');
            playerArea.scrollIntoView({ 
                behavior: 'smooth', 
                block: 'center' // This ensures the player is centered in the screen
            });
        }
    </script>

</body>
</html>
