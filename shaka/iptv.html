<!DOCTYPE html>
<html>
<head>
    <style>
        #view-window {
            width: 800px;
            height: 450px;
            overflow: hidden;
            position: relative;
            border: 2px solid #333;
            margin: 20px auto;
            background: #000;
        }

        #target-site {
            position: absolute;
            width: 1920px; /* Original width of source site */
            height: 5000px;
            border: none;
            transition: all 0.5s ease;
            
            /* REDUCE ZOOM */
            transform: scale(0.65); /* Reduced zoom even more to help centering */
            transform-origin: 0 0; /* Keeps coordinates starting from top-left */
        }

        .controls { text-align: center; margin-bottom: 10px; }
        button { padding: 10px 20px; cursor: pointer; }
    </style>
</head>
<body>

    <div class="controls">
        <button onclick="showPlayer()">Show Player Area</button>
        <button onclick="showButton()">Back to Button Area</button>
    </div>

    <div id="view-window">
        <iframe src="YOUR_URL_HERE" id="target-site" scrolling="no"></iframe>
    </div>

    <script>
        const frame = document.getElementById('target-site');

        function showPlayer() {
            // REDUCED NEGATIVE VALUES:
            // To move player RIGHT: Increase this number (make it closer to 0)
            // To move player UP: Increase this number (make it closer to 0)
            frame.style.top = '-450px';  /* Pushed up further */
            frame.style.left = '-100px'; /* Adjusted to stop the cut-off on the left */
        }

        function showButton() {
            frame.style.top = '-100px';
            frame.style.left = '-250px';
        }
    </script>

</body>
</html>
