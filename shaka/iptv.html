<!DOCTYPE html>
<html>
<head>
    <style>
        #view-window {
            width: 800px; 
            height: 450px;
            overflow: hidden;
            position: relative;
            border: 5px solid #333;
            margin: 20px auto;
        }

        #target-site {
            position: absolute;
            width: 1920px; 
            height: 3000px;
            border: none;
            /* Transition disabled during calibration for better precision */
            transition: top 0.2s, left 0.2s; 
            top: -200px;
            left: -400px;
        }

        .controls { text-align: center; font-family: sans-serif; margin-bottom: 10px; }
        .hint { font-size: 12px; color: #666; margin-top: 5px; }
        button { padding: 10px 20px; cursor: pointer; font-weight: bold; }
    </style>
</head>
<body>

    <div class="controls">
        <button onclick="showPlayer()">Show Player Area</button>
        <button onclick="showButton()">Back to Button Area</button>
        <div class="hint">
            <strong>Calibration Mode:</strong> Use <b>Arrow Keys</b> to align. <br>
            Press <b>"S"</b> to save/get coordinates.
        </div>
    </div>

    <div id="view-window">
        <iframe src="https://tulnit.com/live/sony-tv-hd/" id="target-site" scrolling="no"></iframe>
    </div>

    <script>
        const frame = document.getElementById('target-site');
        let step = 10; // Pixels per arrow press

        // 1. Navigation Functions
        function showPlayer() {
            frame.style.top = '-800px'; 
            frame.style.left = '-200px';
        }

        function showButton() {
            frame.style.top = '-200px';
            frame.style.left = '-400px';
        }

        // 2. Alignment Script (The "Nudge" Tool)
        window.addEventListener('keydown', (e) => {
            let top = parseInt(window.getComputedStyle(frame).top);
            let left = parseInt(window.getComputedStyle(frame).left);

            if (e.key === 'ArrowUp')    frame.style.top = (top - step) + 'px';
            if (e.key === 'ArrowDown')  frame.style.top = (top + step) + 'px';
            if (e.key === 'ArrowLeft')  frame.style.left = (left - step) + 'px';
            if (e.key === 'ArrowRight') frame.style.left = (left + step) + 'px';

            // 3. Configuration Grabber
            if (e.key.toLowerCase() === 's') {
                const config = `Current Position:\ntop: '${frame.style.top}';\nleft: '${frame.style.left}';`;
                alert(config);
                console.log(config);
            }
        });
    </script>

</body>
</html>
