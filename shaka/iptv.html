<!DOCTYPE html>
<html>
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #111;
      font-family: sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 10px;
    }

    #view-window {
      width: 100%;
      max-width: 800px;
      aspect-ratio: 16/9;
      overflow: hidden;
      position: relative;
      background: #000;
      border: 2px solid #444;
    }

    #target-site {
      position: absolute;
      width: 1280px;
      height: 2000px;
      border: none;
      transition: all 0.4s ease;
      transform-origin: top left;
      /* Tuned values: pushes past navbar, centres on player, hides sidebar */
      top: -130px;
      left: -10px;
      transform: scale(0.55);
    }

    #channel-bar {
      width: 100%;
      max-width: 800px;
      background: #1a1a1a;
      border: 2px solid #444;
      border-top: none;
      padding: 10px 12px;
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      align-items: center;
    }

    #channel-bar span {
      color: #888;
      font-size: 12px;
      margin-right: 2px;
    }

    .ch-btn {
      background: #2a2a2a;
      color: #ccc;
      border: 1px solid #444;
      padding: 6px 14px;
      border-radius: 4px;
      cursor: pointer;
      font-size: 12px;
      display: flex;
      align-items: center;
      gap: 5px;
      transition: background 0.2s, border-color 0.2s, color 0.2s;
    }

    .ch-btn:hover { background: #3a3a3a; border-color: #666; color: #fff; }
    .ch-btn.active { background: #c0392b; border-color: #e74c3c; color: #fff; }

    .ch-btn img {
      width: 16px;
      height: 11px;
      object-fit: cover;
      border-radius: 1px;
    }

    #loading-overlay {
      position: absolute;
      inset: 0;
      background: rgba(0,0,0,0.65);
      display: flex;
      align-items: center;
      justify-content: center;
      color: #fff;
      font-size: 14px;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.3s;
      z-index: 10;
    }

    #loading-overlay.show { opacity: 1; pointer-events: all; }
  </style>
</head>
<body>

  <div id="view-window">
    <div id="loading-overlay">Loading stream...</div>
    <iframe
      src="https://tulnit.com/live/sony-tv-hd/"
      id="target-site"
      scrolling="no"
      allowfullscreen>
    </iframe>
  </div>

  <div id="channel-bar">
    <span>Streams:</span>

    <button class="ch-btn active"
            data-url="https://tulnit.com/live/sony-tv-hd/"
            onclick="switchChannel(this)">
      <img src="https://tulnit.com/wp-content/themes/dooplay/assets/img/flags/in.png" alt="">
      Sony TV HD
    </button>

    <button class="ch-btn"
            data-url="https://tulnit.com/live/zee-tv-hd/"
            onclick="switchChannel(this)">
      <img src="https://tulnit.com/wp-content/themes/dooplay/assets/img/flags/in.png" alt="">
      Zee TV HD
    </button>

    <button class="ch-btn"
            data-url="https://tulnit.com/live/star-plus-hd/"
            onclick="switchChannel(this)">
      <img src="https://tulnit.com/wp-content/themes/dooplay/assets/img/flags/in.png" alt="">
      Star Plus HD
    </button>

    <button class="ch-btn"
            data-url="https://tulnit.com/live/colors-hd/"
            onclick="switchChannel(this)">
      <img src="https://tulnit.com/wp-content/themes/dooplay/assets/img/flags/in.png" alt="">
      Colors HD
    </button>

  </div>

  <script>
    const frame = document.getElementById('target-site');
    const overlay = document.getElementById('loading-overlay');

    // Recalculate scale and offsets based on actual window width
    function applyScale() {
      const win = document.getElementById('view-window');
      const winW = win.offsetWidth;
      const scale = winW / 1280;
      frame.style.transform = `scale(${scale})`;
      // Keep top/left tuned for player position
      frame.style.top  = '-130px';
      frame.style.left = '-10px';
    }

    function switchChannel(btn) {
      document.querySelectorAll('.ch-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      overlay.classList.add('show');
      frame.src = btn.getAttribute('data-url');
      frame.onload = () => {
        applyScale();
        overlay.classList.remove('show');
      };
    }

    // Init scale on load and resize
    window.addEventListener('load', applyScale);
    window.addEventListener('resize', applyScale);
  </script>

</body>
</html>
