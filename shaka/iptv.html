<!DOCTYPE html>
<html>
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #111;
      font-family: sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 10px;
    }

    #view-window {
      width: 100%;
      max-width: 800px;
      aspect-ratio: 16/9;
      overflow: hidden;
      position: relative;
      background: #000;
      border: 2px solid #444;
    }

    #target-site {
      position: absolute;
      width: 1280px;
      height: 2000px;
      border: none;
      transition: all 0.4s ease;
      transform-origin: top left;
      top: -230px;
      left: -70px;
    }

    #channel-bar {
      width: 100%;
      max-width: 800px;
      background: #1a1a1a;
      border: 2px solid #444;
      border-top: none;
      padding: 10px 12px;
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      align-items: center;
    }

    #channel-bar span {
      color: #888;
      font-size: 12px;
      margin-right: 2px;
    }

    .ch-btn {
      background: #2a2a2a;
      color: #ccc;
      border: 1px solid #444;
      padding: 6px 14px;
      border-radius: 4px;
      cursor: pointer;
      font-size: 12px;
      display: flex;
      align-items: center;
      gap: 5px;
      transition: background 0.2s, border-color 0.2s, color 0.2s;
    }

    .ch-btn:hover { background: #3a3a3a; border-color: #666; color: #fff; }
    .ch-btn.active { background: #c0392b; border-color: #e74c3c; color: #fff; }

    .ch-btn img {
      width: 16px;
      height: 11px;
      object-fit: cover;
      border-radius: 1px;
    }

    #loading-overlay {
      position: absolute;
      inset: 0;
      background: rgba(0,0,0,0.65);
      display: flex;
      align-items: center;
      justify-content: center;
      color: #fff;
      font-size: 14px;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.3s;
      z-index: 10;
    }

    #loading-overlay.show { opacity: 1; pointer-events: all; }

    /* Debug grid overlay — remove after tuning */
    #debug {
      position: absolute;
      inset: 0;
      pointer-events: none;
      z-index: 20;
    }
  </style>
</head>
<body>

  <div id="view-window">
    <div id="loading-overlay">Loading stream...</div>
    <iframe
      src="https://tulnit.com/live/sony-tv-hd/"
      id="target-site"
      scrolling="no"
      allowfullscreen>
    </iframe>
  </div>

  <div id="channel-bar">
    <span>Streams:</span>

    <button class="ch-btn active"
            data-url="https://tulnit.com/live/sony-tv-hd/"
            onclick="switchChannel(this)">
      <img src="https://tulnit.com/wp-content/themes/dooplay/assets/img/flags/in.png" alt="">
      Sony TV HD
    </button>

    <button class="ch-btn"
            data-url="https://tulnit.com/live/zee-tv-hd/"
            onclick="switchChannel(this)">
      <img src="https://tulnit.com/wp-content/themes/dooplay/assets/img/flags/in.png" alt="">
      Zee TV HD
    </button>

    <button class="ch-btn"
            data-url="https://tulnit.com/live/star-plus-hd/"
            onclick="switchChannel(this)">
      <img src="https://tulnit.com/wp-content/themes/dooplay/assets/img/flags/in.png" alt="">
      Star Plus HD
    </button>

    <button class="ch-btn"
            data-url="https://tulnit.com/live/colors-hd/"
            onclick="switchChannel(this)">
      <img src="https://tulnit.com/wp-content/themes/dooplay/assets/img/flags/in.png" alt="">
      Colors HD
    </button>

  </div>

  <!-- Fine-tune sliders — REMOVE THIS BLOCK once aligned -->
  <div style="background:#1a1a1a; border:1px solid #444; padding:12px; margin-top:10px; width:100%; max-width:800px; color:#ccc; font-size:12px;">
    <b style="color:#fff;">🔧 Alignment Tuner — remove once done</b>
    <div style="margin-top:10px; display:flex; flex-direction:column; gap:8px;">
      <label>Move Right (left offset): <span id="lv">-70</span>px
        <input type="range" min="-600" max="0" value="-70" step="5"
               oninput="document.getElementById('lv').textContent=this.value; frame.style.left=this.value+'px'">
      </label>
      <label>Move Down (top offset): <span id="tv">-230</span>px
        <input type="range" min="-800" max="0" value="-230" step="5"
               oninput="document.getElementById('tv').textContent=this.value; frame.style.top=this.value+'px'">
      </label>
      <label>Zoom (scale): <span id="sv">0.55</span>
        <input type="range" min="0.2" max="1.0" value="0.55" step="0.01"
               oninput="document.getElementById('sv').textContent=parseFloat(this.value).toFixed(2); frame.style.transform='scale('+this.value+')'">
      </label>
      <p style="color:#aaa; margin-top:4px;">Once aligned, note the 3 values above and tell Claude — I'll give you the final clean code.</p>
    </div>
  </div>

  <script>
    const frame = document.getElementById('target-site');
    const overlay = document.getElementById('loading-overlay');

    function applyScale() {
      const win = document.getElementById('view-window');
      const scale = win.offsetWidth / 1280;
      frame.style.transform = `scale(${scale})`;
    }

    function switchChannel(btn) {
      document.querySelectorAll('.ch-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      overlay.classList.add('show');
      frame.src = btn.getAttribute('data-url');
      frame.onload = () => {
        applyScale();
        overlay.classList.remove('show');
      };
    }

    window.addEventListener('load', applyScale);
    window.addEventListener('resize', applyScale);
  </script>

</body>
</html>
