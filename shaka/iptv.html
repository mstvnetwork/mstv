<!DOCTYPE html>
<html>
<head>
    <style>
        /* Container that acts as the 'window' */
        #view-window {
            width: 800px;  /* Width of the section you want to show */
            height: 450px; /* Height of the section you want to show */
            overflow: hidden;
            position: relative;
            border: 2px solid #333;
            margin: 20px auto;
        }

        /* The actual embedded page */
        #target-site {
            position: absolute;
            width: 1920px;  /* Total width of the target site */
            height: 3000px; /* Total height of the target site */
            border: none;
            transition: all 0.5s ease; /* Smooth transition when switching */
            
            /* INITIAL POSITION: Focus on the 'Button Area' */
            top: -200px;   /* Vertical distance to the button */
            left: -400px;  /* Horizontal distance to the button */
        }

        .controls { text-align: center; }
        button { padding: 10px 20px; cursor: pointer; }
    </style>
</head>
<body>

    <div class="controls">
        <button onclick="showPlayer()">Show Player Area</button>
        <button onclick="showButton()">Back to Button Area</button>
    </div>

    <div id="view-window">
        <!-- Replace 'URL_HERE' with your actual target webpage -->
        <iframe src="https://tulnit.com/live/sony-tv-hd/" id="target-site" scrolling="no"></iframe>
    </div>

    <script>
        const frame = document.getElementById('target-site');

        function showPlayer() {
            // These numbers should be the coordinates of the player
            frame.style.top = '-400px'; 
            frame.style.left = '-200px';
        }

        function showButton() {
            // These numbers should be the coordinates of the button
            frame.style.top = '-800px';
            frame.style.left = '-300px';
        }
    </script>

</body>
</html>
