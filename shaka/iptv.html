<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body { font-family: sans-serif; text-align: center; background: #f0f0f0; margin: 0; padding: 10px; }
        
        #view-window {
            width: 90vw; height: 50vh; /* Responsive for mobile */
            max-width: 800px; max-height: 450px;
            overflow: hidden; position: relative;
            border: 3px solid #333; margin: 10px auto; background: white;
        }

        #target-site {
            position: absolute;
            width: 1920px; height: 3000px;
            border: none;
            top: -200px; left: -400px;
        }

        /* Mobile Calibration Controls */
        .nudge-pad { 
            display: grid; 
            grid-template-columns: repeat(3, 60px); 
            gap: 10px; justify-content: center; margin-top: 15px; 
        }
        .nudge-btn { 
            width: 60px; height: 60px; font-size: 20px; font-weight: bold;
            background: #eee; border: 1px solid #ccc; border-radius: 8px; 
        }
        .config-btn { 
            margin-top: 15px; padding: 12px; background: #007bff; 
            color: white; border: none; border-radius: 5px; width: 100%; max-width: 200px;
        }
        .step-toggle { margin: 10px 0; }
    </style>
</head>
<body>

    <div id="view-window">
        <iframe src="https://tulnit.com/live/sony-tv-hd/" id="target-site" scrolling="no"></iframe>
    </div>

    <!-- Mobile Alignment Tool -->
    <div class="step-toggle">
        Step: <select id="stepSize"><option value="1">1px</option><option value="10" selected>10px</option></select>
    </div>

    <div class="nudge-pad">
        <div></div>
        <button class="nudge-btn" onclick="nudge('up')">↑</button>
        <div></div>
        <button class="nudge-btn" onclick="nudge('left')">←</button>
        <button class="nudge-btn" onclick="nudge('down')">↓</button>
        <button class="nudge-btn" onclick="nudge('right')">→</button>
    </div>

    <button class="config-btn" onclick="getConfig()">GET CONFIG</button>

    <script>
        const frame = document.getElementById('target-site');

        function nudge(direction) {
            const step = parseInt(document.getElementById('stepSize').value);
            let top = parseInt(window.getComputedStyle(frame).top);
            let left = parseInt(window.getComputedStyle(frame).left);

            if (direction === 'up')    frame.style.top = (top - step) + 'px';
            if (direction === 'down')  frame.style.top = (top + step) + 'px';
            if (direction === 'left')  frame.style.left = (left - step) + 'px';
            if (direction === 'right') frame.style.left = (left + step) + 'px';
        }

        function getConfig() {
            const result = `COPY THESE VALUES:\n\ntop: '${frame.style.top}';\nleft: '${frame.style.left}';`;
            alert(result);
        }
    </script>
</body>
</html>
