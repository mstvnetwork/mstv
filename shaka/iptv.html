<!DOCTYPE html>
<html>
<head>
    <style>
        #view-window {
            width: 90vw;
            height: 80vh;
            overflow: hidden;
            position: relative;
            margin: 20px auto;
            border: 3px solid #333;
            background: #000;
        }

        #target-site {
            position: absolute;
            /* 1. INCREASE SIZE TO PREVENT CLIPPING AT LOW ZOOM */
            width: 2500px; 
            height: 6000px;
            border: none;
            transition: all 0.6s cubic-bezier(0.25, 1, 0.5, 1);
            
            /* 2. REDUCE ZOOM (0.8 = 80%, 0.5 = 50%) */
            transform: scale(0.75); 
            transform-origin: 0 0; /* Keeps the scaling anchored to the top-left */
        }

        .controls { text-align: center; padding: 10px; }
        button { padding: 10px 20px; cursor: pointer; margin: 0 5px; }
    </style>
</head>
<body>

    <div class="controls">
        <!-- Adjust the first number (Top) to push the view up or down -->
        <button onclick="focusArea(150, 400)">Show Button Area</button>
        <button onclick="focusArea(600, 150)">Show Player (Pushed Up)</button>
    </div>

    <div id="view-window">
        <iframe src="https://tulnit.com/live/sony-tv-hd/" id="target-site" scrolling="no"></iframe>
    </div>

    <script>
        const frame = document.getElementById('target-site');
        const container = document.getElementById('view-window');
        const zoomLevel = 0.75; // Must match the 'scale' in CSS

        function focusArea(targetTop, targetLeft) {
            const winWidth = container.offsetWidth;
            const winHeight = container.offsetHeight;

            // We multiply the target coordinates by zoomLevel 
            // so the centering math stays accurate at lower zooms
            const centerX = (winWidth / 2) - (targetLeft * zoomLevel);
            const centerY = (winHeight / 2) - (targetTop * zoomLevel);

            frame.style.left = centerX + 'px';
            frame.style.top = centerY + 'px';
        }
    </script>

</body>
</html>
