<!DOCTYPE html>
<html>
<head>
    <style>
        #view-window {
            width: 800px;
            height: 450px;
            overflow: hidden;
            position: relative;
            border: 2px solid #333;
            margin: 20px auto;
            background: #000;
        }

        #target-site {
            position: absolute;
            width: 1920px; 
            height: 5000px;
            border: none;
            transition: all 0.5s ease;
            
            /* REDUCE ZOOM HERE (0.75 = 75% zoom) */
            transform: scale(0.75); 
            transform-origin: 0 0; 
            
            /* Initial position (Button) */
            top: -150px; 
            left: -300px;
        }

        .controls { text-align: center; margin-bottom: 10px; }
        button { padding: 10px 20px; cursor: pointer; }
    </style>
</head>
<body>

    <div class="controls">
        <button onclick="showPlayer()">Show Player Area</button>
        <button onclick="showButton()">Back to Button Area</button>
    </div>

    <div id="view-window">
        <iframe src="https://tulnit.com/live/sony-tv-hd/" id="target-site" scrolling="no"></iframe>
    </div>

    <script>
        const frame = document.getElementById('target-site');

        function showPlayer() {
            // To push the player UP, make this number less negative (e.g., -600 instead of -800)
            // To center it LEFT/RIGHT, adjust the second number
            frame.style.top = '-600px'; 
            frame.style.left = '-100px';
        }

        function showButton() {
            frame.style.top = '-150px';
            frame.style.left = '-300px';
        }
    </script>

</body>
</html>
