<!DOCTYPE html>
<html>
<head>
   <style>
        #view-window {
            width: 800px;
            height: 450px;
            overflow: hidden;
            position: relative;
            border: 2px solid #333;
            margin: 20px auto;
        }

        #target-site {
            position: absolute;
            width: 1920px;
            height: 3000px;
            border: none;
            transition: all 0.5s ease;
            top: -200px;
            left: -400px;
            transform: scale(0.55);
            transform-origin: top left;
        }

        .controls { text-align: center; margin-bottom: 8px; }
        button { padding: 10px 20px; cursor: pointer; margin: 4px; }
   </style>
</head>
<body>

    <div class="controls">
        <button onclick="showPlayer()">Show Player Area</button>
        <button onclick="showButton()">Back to Button Area</button>
    </div>

    <div id="view-window">
        <iframe src="https://tulnit.com/live/sony-tv-hd/" id="target-site" scrolling="no"></iframe>
    </div>

    <script>
        const frame = document.getElementById('target-site');

        function showPlayer() {
            frame.style.top = '-350px';
            frame.style.left = '-350px';
            frame.style.transform = 'scale(0.55)';
        }

        function showButton() {
            frame.style.top = '-200px';
            frame.style.left = '-400px';
            frame.style.transform = 'scale(0.55)';
        }
    </script>

</body>
</html>
