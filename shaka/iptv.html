<!DOCTYPE html>
<html>
<head>
    <style>
        #view-window {
            width: 90vw;   /* Responsive width (90% of screen) */
            height: 80vh;  /* Responsive height (80% of screen) */
            overflow: hidden;
            position: relative;
            margin: 10px auto;
            border: 3px solid #444;
            background: #000;
        }

        #target-site {
            position: absolute;
            width: 1920px;  /* Set to the target site's standard desktop width */
            height: 5000px; /* Tall enough to cover the site's length */
            border: none;
            transition: all 0.6s cubic-bezier(0.25, 1, 0.5, 1); /* Smooth 'snap' effect */
        }

        .btn-container { text-align: center; padding: 10px; }
        button { padding: 12px 24px; font-size: 16px; cursor: pointer; border-radius: 5px; }
    </style>
</head>
<body>

    <div class="btn-container">
        <!-- Input your coordinates found in the previous step here -->
        <button onclick="focusArea(200, 400)">Focus Button</button>
        <button onclick="focusArea(850, 150)">Focus Player</button>
    </div>

    <div id="view-window">
        <iframe src="https://tulnit.com/live/sony-tv-hd/" id="target-site" scrolling="no"></iframe>
    </div>

    <script>
        const frame = document.getElementById('target-site');
        const container = document.getElementById('view-window');

        function focusArea(targetTop, targetLeft) {
            // 1. Get the current size of the user's view window
            const winWidth = container.offsetWidth;
            const winHeight = container.offsetHeight;

            // 2. Calculate the offset to put the target in the center
            // We subtract the target coordinate from half the window size
            const centerX = (winWidth / 2) - targetLeft;
            const centerY = (winHeight / 2) - targetTop;

            // 3. Apply the movement
            frame.style.left = centerX + 'px';
            frame.style.top = centerY + 'px';
        }
    </script>
</body>
</html>
