 <!DOCTYPE html>
<html>
<head>
    <style>
    #view-window {
        width: 800px;
        height: 450px;
        overflow: hidden;
        position: relative;
        border: 2px solid #333;
        margin: 20px auto;
        background: #000; /* Dark background if frame doesn't fill */
    }

    #target-site {
        position: absolute;
        /* Increase dimensions so content isn't cut off when scaled */
        width: 2400px; 
        height: 3500px;
        border: none;
        transition: all 0.5s ease;

        /* REDUCE ZOOM: 0.7 is 70% size. Adjust as needed */
        transform: scale(0.7);
        transform-origin: top left;

        /* ADJUST POSITION: 
           Increase 'top' (e.g., -800 to -600) to move the player DOWN. 
           (In negative coordinates, a smaller negative number is "lower") */
        top: -600px;  
        left: -350px;
    }
</style>

<script>
    const frame = document.getElementById('target-site');

    function showPlayer() {
        // Move down by making 'top' less negative
        frame.style.top = '-600px'; 
        frame.style.left = '-350px';
        frame.style.transform = 'scale(0.7)'; // Keep zoom consistent
    }

    function showButton() {
        frame.style.top = '-200px';
        frame.style.left = '-400px';
        frame.style.transform = 'scale(0.7)';
    }
</script>

</head>
<body>

    <div class="controls">
        <button onclick="showPlayer()">Show Player Area</button>
        <button onclick="showButton()">Back to Button Area</button>
    </div>

    <div id="view-window">
        <!-- Replace 'URL_HERE' with your actual target webpage -->
        <iframe src="https://tulnit.com/live/sony-tv-hd/" id="target-site" scrolling="no"></iframe>
    </div>

    <script>
        const frame = document.getElementById('target-site');

        function showPlayer() {
            // These numbers should be the coordinates of the player
            frame.style.top = '-800px'; 
            frame.style.left = '-400px';
        }

        function showButton() {
            // These numbers should be the coordinates of the button
            frame.style.top = '-800px';
            frame.style.left = '-400px';
        }
    </script>

</body>
</html>
