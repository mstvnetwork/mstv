<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Split Player Bridge</title>
    <style>
        body, html { margin: 0; padding: 0; height: 100%; overflow: hidden; background: #000; font-family: sans-serif; }
        .container { display: flex; flex-direction: column; height: 100vh; }

        /* Top 16:9 Player */
        .top-section {
            position: relative;
            width: 100%;
            padding-top: 56.25%; /* 16:9 ratio */
            background: #111;
        }
        .top-section iframe {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%; border: none;
        }

        /* Bottom Tube Section */
        .bottom-section {
            flex-grow: 1;
            display: flex; justify-content: center; align-items: center;
            background: #1a1a1a; position: relative;
        }
        .tube-square {
            width: 300px; height: 300px;
            border-radius: 40px; border: 4px solid #444;
            overflow: hidden; position: relative;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }
        .tube-square iframe {
            width: 100vw; height: 200vh;
            position: absolute;
            top: -56.25vw; /* Aligns content to "continue" from top player */
            left: 50%; transform: translateX(-50%);
            border: none; pointer-events: none; /* Prevents clicking inside the bottom frame */
        }

        /* The Click Trigger Overlay */
        .click-bridge {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            cursor: pointer;
            z-index: 10;
            background: rgba(255,255,255,0); /* Invisible but clickable */
        }
        .click-bridge:hover { background: rgba(255,255,255,0.05); }
        
        .label { color: white; position: absolute; bottom: 10px; font-size: 12px; opacity: 0.5; }
    </style>
</head>
<body>

<div class="container">
    <!-- Top Player -->
    <div class="top-section">
        <iframe id="topPlayer" src="https://tulnit.com/live/sony-tv-hd/"></iframe>
    </div>

    <!-- Bottom Tube with Click Bridge -->
    <div class="bottom-section">
        <div class="tube-square">
            <iframe src="https://tulnit.com/live/sony-tv-hd/"></iframe>
            <div class="click-bridge" onclick="triggerTopPlay()" title="Click to Play Top"></div>
        </div>
        <div class="label">Click tube to trigger top player</div>
    </div>
</div>

<script>
    function triggerTopPlay() {
        const topIframe = document.getElementById('topPlayer');
        // This adds autoplay to the URL to force the top player to start
        let currentSrc = topIframe.src;
        if (!currentSrc.includes('autoplay=1')) {
            topIframe.src = currentSrc + (currentSrc.includes('?') ? '&' : '?') + 'autoplay=1';
        }
        console.log("Top player triggered!");
    }
</script>

</body>
</html>
