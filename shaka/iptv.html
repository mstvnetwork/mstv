<!DOCTYPE html>
<html>
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #111;
      display: flex;
      justify-content: center;
      padding: 10px;
    }

    #view-window {
      width: 100%;
      max-width: 800px;
      aspect-ratio: 16/9;
      overflow: hidden;
      position: relative;
      background: #000;
    }

    #target-site {
      position: absolute;
      width: 1280px;
      height: 2000px;
      border: none;
      transform-origin: top left;
      top: -45px;
      left: 0px;
      transform: scale(0.25);
    }
  </style>
</head>
<body>

  <div id="view-window">
    <iframe
      src="https://tulnit.com/live/sony-tv-hd/"
      id="target-site"
      scrolling="no"
      allowfullscreen>
    </iframe>
  </div>

</body>
</html>
