<!DOCTYPE html>
<html>
<head>
    <title>My Custom Player</title>
    <!-- Plyr CSS -->
    <link rel="stylesheet" href="https://plyr.io" />
    <!-- HLS.js Library -->
    <script src="https://jsdelivr.net"></script>
</head>
<body>
    <div class="container">
        <video id="player" controls crossorigin playsinline poster="YOUR_POSTER_IMAGE.jpg"></video>
    </div>

    <script src="https://plyr.io"></script>
    <script>
        const video = document.querySelector('#player');
        const source = 'https://s2.videoapne.to/hls/bdohw76l7bboxuzvta2p4cyp36s22nkfkzfj2td7rcuiygxleqtbgfn35mwq/index-v1-a1.m3u8';

        // Initialize Plyr
        const player = new Plyr(video, {
            controls: ['play-large', 'play', 'progress', 'current-time', 'mute', 'volume', 'captions', 'settings', 'pip', 'airplay', 'fullscreen'],
            settings: ['quality', 'speed', 'loop']
        });

        if (!Hls.isSupported()) {
            video.src = source;
        } else {
            const hls = new Hls();
            hls.loadSource(source);
            hls.attachMedia(video);
            window.hls = hls;
        }
    </script>
</body>
</html>
