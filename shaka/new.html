<!DOCTYPE html>
<html>
<head>
    <title>HLS Video Player</title>
    <!-- Include HLS.js from a CDN -->
    <script src="https://jsdelivr.net"></script>
    <style>
        body { display: flex; justify-content: center; background: #000; }
        video { width: 80%; max-width: 800px; margin-top: 50px; }
    </style>
</head>
<body>
    <video id="video" controls></video>

    <script>
        var video = document.getElementById('video');
        var videoSrc = 'https://s2.videoapne.to/hls/bdohw76l7bboxuzvta2p4cyp36s22nkfkzfj2td7rcuiygxleqtbgfn35mwq/index-v1-a1.m3u8';

        if (Hls.isSupported()) {
            var hls = new Hls();
            hls.loadSource(videoSrc);
            hls.attachMedia(video);
        }
        // Native support for Safari
        else if (video.canPlayType('application/vnd.apple.mpegurl')) {
            video.src = videoSrc;
        }
    </script>
</body>
</html>
