<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <!-- Updated CSP to match your error log's allowed list exactly -->
    <meta http-equiv="Content-Security-Policy" content="script-src 'self' 'unsafe-inline' 'unsafe-eval' https://cdn.jsdelivr.net https://cdnjs.cloudflare.com; connect-src 'self' https://toffeelive.com https://cdn.jsdelivr.net;">
    
    <title>TOFFEE Player</title>
    
    <!-- Changed to match the allowed 'cdn.jsdelivr.net' domain -->
    <script src="https://jsdelivr.net"></script>
    
    <style>
        body { background: #121212; color: white; font-family: sans-serif; margin: 0; display: flex; height: 100vh; }
        #sidebar { width: 250px; background: #1e1e1e; border-right: 1px solid #333; overflow-y: auto; }
        #player { flex-grow: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        video { width: 90%; background: #000; border-radius: 8px; }
        .channel-item { padding: 15px; border-bottom: 1px solid #333; cursor: pointer; }
        .active { background: #333; border-left: 4px solid #00ff00; }
    </style>
</head>
<body>

<div id="sidebar">
    <div id="playlist"></div>
</div>

<div id="player">
    <video id="video" controls></video>
    <h3 id="status">Initializing...</h3>
</div>

<script>
    const channels = [{
        name: "TOFFEE Sports VIP",
        link: "https://toffeelive.com/cdn/live/sports_highlights/playlist.m3u8",
        cookie: "Edge-Cache-Cookie=URLPrefix=aHR0cHM6Ly9ibGRjbXByb2QtY2RuLnRvZmZlZWxpdmUuY29t:Expires=1775818837:KeyName=prod_linear:Signature=GjlF_itApgqpIoIuiai2a8zGYx2HWPJxe7JXOwEgroVLxkSCCtmJW8fLFWMhT-0jA2cyyYXqYY8Navlu07JoDg"
    }];

    const video = document.getElementById('video');
    const status = document.getElementById('status');
    let hls = null;

    function playChannel(index) {
        const item = channels[index];
        status.innerText = "Playing: " + item.name;

        // Check if Hls was actually loaded
        if (typeof Hls === 'undefined') {
            status.innerText = "Error: Hls.js library blocked by browser.";
            return;
        }

        if (hls) { hls.destroy(); }

        hls = new Hls({
            xhrSetup: function(xhr) {
                xhr.withCredentials = true;
                xhr.setRequestHeader('Cookie', item.cookie);
            }
        });

        hls.loadSource(item.link);
        hls.attachMedia(video);
        hls.on(Hls.Events.MANIFEST_PARSED, () => video.play());
    }

    // Generate Playlist
    const playlistDiv = document.getElementById('playlist');
    channels.forEach((ch, i) => {
        const div = document.createElement('div');
        div.className = 'channel-item';
        div.innerText = ch.name;
        div.onclick = () => playChannel(i);
        playlistDiv.appendChild(div);
    });

    // Start first channel
    playChannel(0);
</script>
</body>
</html>
