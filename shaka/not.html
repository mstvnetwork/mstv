<!DOCTYPE html>
<html lang="en">
<head>
    <style>
        /* 1. The Container (The 16:9 Window) */
        .mstv-player-box {
            position: relative;
            width: 100%;
            max-width: 850px;
            aspect-ratio: 16 / 9; /* Strict 16:9 Ratio */
            overflow: hidden;
            background: #000;
            border: 2px solid #333;
            border-radius: 12px;
            margin: 20px auto;
        }

        /* 2. The Scaling Engine */
        .mstv-player-box iframe {
            position: absolute;
            
            /* ADJUSTING THE VIEW: 
               Shifted from -90px to -110px to move the page UP */
            width: 133.33%;  
            height: 1200px; 
            
            top: -165px;    /* Pulls the page 20px further up */
            left: 0;
            
            border: none;
            transform: scale(0.75); 
            transform-origin: 0 0;  
        }

        /* Mobile Adjustment */
        @media (max-width: 600px) {
            .mstv-player-box iframe {
                top: -130px; /* Shifted from -60px to stay consistent */
            }
        }
    </style>
</head>
<body>

    <div class="mstv-player-box">
        <iframe 
            src="https://tulnit.com/live/runn-action/" 
            scrolling="no"
            allowfullscreen>
        </iframe>
    </div>

</body>
</html>
