<!DOCTYPE html>
<html lang="en">
<head>
    <style>
        /* 1. The Container (The 16:9 Window) */
        .mstv-player-box {
            position: relative;
            width: 100%;
            max-width: 850px;
            aspect-ratio: 16 / 9; /* Strict 16:9 Ratio */
            overflow: hidden;
            background: #000;
            border: 2px solid #333;
            border-radius: 12px;
            margin: 20px auto;
        }

        /* 2. The Scaling Engine */
        .mstv-player-box iframe {
            position: absolute;
            
            /* ADJUSTING THE VIEW: 
               We shrink the page to 75% so buttons + player fit in 16:9 */
            width: 120.33%;  /* (100 / 0.75) to fill width while scaled */
            height: 1000px; /* Extra height to ensure buttons aren't cut */
            
            top: -90px;    /* Pulls the page up to hide the top header */
            left: 0;
            
            border: none;
            transform: scale(0.75); /* SHRINKS the whole page */
            transform-origin: 0 0;  /* Keeps the scale aligned to top-left */
        }

        /* Mobile Adjustment */
        @media (max-width: 600px) {
            .mstv-player-box iframe {
                top: -60px; /* Adjust for mobile headers if needed */
            }
        }
    </style>
</head>
<body>

    <div class="mstv-player-box">
        <iframe 
            src="https://tulnit.com/live/sony-tv-hd/" 
            scrolling="no"
            allowfullscreen>
        </iframe>
    </div>

</body>
</html>
