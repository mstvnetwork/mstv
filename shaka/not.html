<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MSTV Stream Test</title>
    <style>
        body {
            background-color: #0C0E14; /* Matches your theme */
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            font-family: sans-serif;
        }

        /* 1. THE 16:9 CONTAINER */
        .video-container {
            position: relative;
            width: 90%;
            max-width: 800px;
            aspect-ratio: 16 / 9; /* Forces 16:9 ratio */
            overflow: hidden; /* Hides everything outside this box */
            border: 3px solid #ff0000; /* Red border to see the "crop" area */
            border-radius: 10px;
            background: #000;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        /* 2. THE IFRAME "LOCK" */
        /* We make the iframe taller and wider than the box, 
           then move it (top/left) to center the player. */
        .video-container iframe {
            position: absolute;
            
            /* ADJUST THESE VALUES TO CENTER THE PLAYER */
            top: -180px;    /* Pulls the page UP to hide their header */
            left: -10px;    /* Adjusts side-to-side */
            
            width: 105%;    /* Slightly wider to hide sidebars */
            height: 1200px; /* Much taller so their footer is far below */
            
            border: none;
            pointer-events: auto;
        }

        .label {
            position: absolute;
            bottom: 10px;
            left: 10px;
            color: white;
            background: rgba(0,0,0,0.7);
            padding: 5px 10px;
            font-size: 12px;
            border-radius: 4px;
            z-index: 10;
        }
    </style>
</head>
<body>

    <div class="video-container">
        <div class="label">MSTV Live Engine: Sony TV HD</div>
        
        <!-- The source website loaded inside your 'locked' window -->
        <iframe 
            src="https://tulnit.com/live/sony-tv-hd/" 
            scrolling="no" 
            allowfullscreen 
            allow="autoplay; encrypted-media">
        </iframe>
    </div>

</body>
</html>
