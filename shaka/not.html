<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MSTV Dual Stream Test</title>
    <style>
        body {
            background-color: #0C0E14;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .video-box {
            position: relative;
            width: 95%;
            max-width: 850px;
            height: 550px;
            overflow: hidden;
            border: 2px solid #333;
            border-radius: 12px;
            background: #000;
        }
        .video-box iframe {
            position: absolute;
            top: -100px;
            left: -5%;
            width: 110%;
            height: 1000px;
            border: none;
        }
        .status-bar {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            background: rgba(0,0,0,0.8);
            color: #fff;
            padding: 8px 15px;
            font-size: 14px;
            z-index: 10;
            border-bottom: 1px solid #444;
        }
    </style>
</head>
<body>
    <div class="video-box">
        <div class="status-bar">
            <strong>MSTV Live:</strong> Sony TV HD (Select Source Below)
        </div>
        <iframe 
            src="https://tulnit.com/live/sony-tv-hd/" 
            scrolling="no" 
            allowfullscreen 
            allow="autoplay; encrypted-media">
        </iframe>
    </div>
</body>
</html>
