<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        /* 1. THE OUTER WRAPPER (Controls the width on your page) */
        .mstv-container {
            width: 100%;
            max-width: 900px; /* Adjust this to change player size */
            margin: 20px auto;
            background: #000;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            border: 1px solid #333;
        }

        /* 2. THE 16:9 ASPECT RATIO LOCK */
        .mstv-ratio-box {
            position: relative;
            width: 100%;
            padding-top: 56.25%; /* This is the mathematical 16:9 ratio */
            background: #000;
            overflow: hidden;
        }

        /* 3. THE IFRAME ENGINE & ALIGNMENT */
        .mstv-ratio-box iframe {
            position: absolute;
            
            /* ADJUSTING THE OFFSET: Hide header and center buttons */
            top: 30px;  /* Moves the source page UP to hide their logo */
            left: 0;
            
            /* SCALING: We make the iframe larger than the box, then shrink it back 
               to fit both the player and the Stream 1/2 buttons in view */
            width: 125%;     /* 100 / 0.8 scale */
            height: 1000px;  /* Tall enough to ensure no bottom cut-off */
            
            border: none;
            transform: scale(0.8); /* Shrinks the source page to 80% */
            transform-origin: top left;
            pointer-events: auto;
        }

        /* Mobile specific tweak to keep it centered on small screens */
        @media (max-width: 600px) {
            .mstv-ratio-box iframe {
                top: -85px; 
            }
        }
    </style>
</head>
<body>

    <div class="mstv-container">
        <div class="mstv-ratio-box">
            <!-- The Source Engine -->
            <iframe 
                src="https://tulnit.com/live/sony-tv-hd/" 
                scrolling="no" 
                allowfullscreen 
                allow="autoplay; encrypted-media">
            </iframe>
        </div>
    </div>

</body>
</html>
