<!DOCTYPE html>
<html>
<head>
    <title>Live Playback</title>
    <link rel="stylesheet" href="shaka-ui.css">
    <script src="shaka-player.ui.min.js"></script>
    <style>body { margin: 0; background: #000; overflow: hidden; }</style>
</head>
<body>

    <div data-shaka-player-container style="width:100vw; height:100vh;">
        <video autoplay id="video" style="width:100%; height:100%;"></video>
    </div>

    <script>
        async function init() {
            // Get URL from the address bar
            const params = new URLSearchParams(window.location.search);
            const streamUrl = params.get('url');

            if (!streamUrl) {
                alert("No Stream URL provided!");
                return;
            }

            const video = document.getElementById('video');
            const player = new shaka.Player(video);
            const ui = new shaka.ui.Overlay(player, video.parentElement, video);

            try {
                await player.load(streamUrl);
            } catch (e) {
                console.error("Error Code:", e.code);
                // If it fails, it is usually because of CORS or Mixed Content
                alert("Error " + e.code + ": This stream is blocked by the browser. Try using a CORS extension.");
            }
        }
        document.addEventListener('shaka-ui-loaded', init);
    </script>
</body>
</html>
