<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>MSTV BROADCASTER</title>
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background: #000; overflow: hidden; }
        video { width: 100%; height: 100%; object-fit: contain; background: #000; }
    </style>
</head>
<body>
    <video id="video" controls autoplay muted playsinline></video>

<script>
    const video = document.getElementById('video');
    // HARDCODED ARRAY (Your Source of Truth)
    const STREAMS = [
        { "name": "Star Plus", "url": "https://warm-caverns-48629-92fab798385f.herokuapp.com/http://103.175.242.10:8080/starplus/index.m3u8" },
        { "name": "9x Jalwa", "url": "https://d14c63magvk61v.cloudfront.net/strm/channels/9xjalwa/master.m3u8" },
        { "name": "Star Movies", "url": "https://warm-caverns-48629-92fab798385f.herokuapp.com/http://103.175.242.10:8080/starmovies/tracks-v1a1/mono.m3u8" },
        { "name": "Sony Pal", "url": "http://maxotts.maxdigitaltv.com/x-media/C106/master.m3u8" }
    ];

    let hls = null;

    function play() {
        const id = parseInt(window.location.hash.replace('#', '')) - 1;
        const stream = STREAMS[id] || STREAMS;

        if (hls) { hls.destroy(); }

        if (Hls.isSupported()) {
            hls = new Hls({ manifestLoadingMaxRetry: 10 });
            hls.loadSource(stream.url);
            hls.attachMedia(video);
            hls.on(Hls.Events.MANIFEST_PARSED, () => video.play());
        } else {
            video.src = stream.url;
            video.play();
        }
    }

    window.onhashchange = play;
    window.onload = play;
</script>
</body>
</html>
