<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Live Player Window</title>
    <!-- Pointing to your local library files -->
    <link rel="stylesheet" href="shaka-ui.css">
    <script src="shaka-player.ui.min.js"></script>
    <style>
        body { margin: 0; background: #000; overflow: hidden; display: flex; align-items: center; justify-content: center; height: 100vh; }
        #loading-text { color: white; font-family: sans-serif; position: absolute; z-index: 1; }
    </style>
</head>
<body>

    <div id="loading-text">Connecting to stream...</div>

    <div data-shaka-player-container style="width:100vw; height:100vh;">
        <video autoplay id="video" style="width:100%; height:100%;"></video>
    </div>

    <script>
        async function initApp() {
    const params = new URLSearchParams(window.location.search);
    const rawUrl = params.get('url');
    if (!rawUrl) return;

    // TRYING A DIFFERENT PROXY: AllOrigins
    const proxyUrl = `https://api.allorigins.win{encodeURIComponent(rawUrl)}`;

    const video = document.getElementById('video');
    const player = new shaka.Player(video);
    const ui = new shaka.ui.Overlay(player, video.parentElement, video);

    player.getNetworkingEngine().registerRequestFilter((type, request) => {
        // These headers are mandatory for Roarzone and CricHD streams
        request.headers['Referer'] = 'https://profamouslife.com';
        request.headers['Origin'] = 'https://profamouslife.com';
    });

    try {
        await player.load(proxyUrl);
        document.getElementById('loading-text').style.display = 'none';
    } catch (e) {
        console.error("Shaka Error:", e.code);
        // If 1001/403 persists, the server has blocked the public proxy IP.
        document.getElementById('loading-text').innerText = "Error 403: Stream Protected. Use a CORS Browser Extension.";
        document.getElementById('loading-text').style.color = "#ff3e3e";
    }
}
document.addEventListener('shaka-ui-loaded', initApp);


        
    </script>
</body>
</html>
