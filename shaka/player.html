<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Neural Player Engine</title>
    <script src="https://cdn.jsdelivr.net/npm/hls.js@1.4.12/dist/hls.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/shaka-player/4.3.5/shaka-player.compiled.js"></script>

    <style>
        :root { --accent: #22c55e; }
        body { margin: 0; padding: 0; background: #000; overflow: hidden; height: 100vh; width: 100vw; font-family: sans-serif; }
        
        #player-container { 
            width: 100%; height: 100%; position: relative; background: #000; 
            display: flex; align-items: center; justify-content: center;
        }
        
        /* Video hidden by default to prevent glitchy frames */
        video { 
            width: 100%; height: 100%; position: absolute; top: 0; left: 0; 
            background: #000; display: none; z-index: 10; opacity: 0;
            transition: opacity 0.3s ease;
        }
        
        iframe { 
            width: 100%; height: 100%; position: absolute; top: 0; left: 0; 
            border: none; display: none; background: #000; z-index: 20; 
        }
        
        /* High-priority Loader */
        #loader { 
            position: absolute; z-index: 100; 
            display: flex; flex-direction: column; align-items: center; 
            top: 50%; left: 50%; transform: translate(-50%, -50%); 
            pointer-events: none;
        }

        .spinner { 
            width: 45px; height: 45px; border: 3px solid rgba(34, 197, 94, 0.1); 
            border-top: 3px solid var(--accent); border-radius: 50%; 
            animation: spin 0.8s linear infinite; 
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        
        .loading-text { color: var(--accent); margin-top: 10px; font-size: 11px; font-weight: bold; letter-spacing: 1px; }

        /* Invisible Interaction Layer to wake up blocked video */
        #interaction-layer {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            z-index: 150; display: none; cursor: pointer; background: rgba(0,0,0,0.01);
        }

        /* Video visibility trigger */
        video.playing { display: block !important; opacity: 1 !important; z-index: 110 !important; }
    </style>
</head>
<body>

<div id="player-container">
    <div id="loader">
        <div class="spinner"></div>
        <div class="loading-text">AI OPTIMIZING...</div>
    </div>
    
    <div id="interaction-layer"></div>

    <video id="video" playsinline controls></video>
    <iframe id="iframe-player" allow="autoplay; fullscreen"></iframe>
</div>

<script>
    const video = document.getElementById('video');
    const iframe = document.getElementById('iframe-player');
    const loader = document.getElementById('loader');
    const interLayer = document.getElementById('interaction-layer');

    // --- CHANNEL DATA SOURCE ---
    const STREAMS = [
        { name: "Sample HLS", url: "https://example.com/stream.m3u8", type: "hls" },
        { name: "Sample DASH", url: "https://example.com/stream.mpd", type: "dash", drm: {"keyid":"key"} }
        // PASTE YOUR FULL ARRAY HERE
    ];

    let hls = null;
    let shakaInst = null;
    const ORIGIN = window.location.origin;

    // AI Communication Bridge
    window.addEventListener('message', async (event) => {
        if (event.origin !== ORIGIN) return;
        const { type, data } = event.data;

        if (type === 'GET_CHANNELS') {
            window.parent.postMessage({ type: 'CHANNELS_DATA', data: STREAMS }, ORIGIN);
        }
        if (type === 'START_STREAM') {
            bootStream(data);
        }
    });

    async function resetAll() {
        loader.style.display = 'flex';
        interLayer.style.display = 'none';
        video.classList.remove('playing');
        
        if (hls) { hls.destroy(); hls = null; }
        if (shakaInst) { try { await shakaInst.destroy(); } catch(e) {} shakaInst = null; }
        
        video.pause();
        video.muted = true; // Essential for bypass
        video.src = "";
        video.removeAttribute("src");
        video.load();
        
        iframe.style.display = 'none';
        iframe.src = "about:blank";
    }

    async function bootStream(stream) {
        if (!stream || !stream.url) return;
        await resetAll();

        if (stream.type === 'iframe') {
            iframe.style.display = 'block';
            iframe.src = stream.url;
            iframe.onload = () => loader.style.display = 'none';
        } else {
            video.style.display = 'block';
            if (stream.url.includes('.mpd')) {
                initShaka(stream.url, stream.drm); 
            } else {
                initHls(stream.url);
            }
        }
    }

    function initHls(url) {
        if (Hls.isSupported()) {
            hls = new Hls({ enableWorker: true, lowLatencyMode: true });
            hls.loadSource(url);
            hls.attachMedia(video);
            hls.on(Hls.Events.MANIFEST_PARSED, () => {
                video.play().catch(() => {
                    interLayer.style.display = 'block';
                });
            });
        }
    }

    async function initShaka(url, drmKeys) {
        shaka.polyfill.installAll();
        shakaInst = new shaka.Player(video);
        if (drmKeys) { shakaInst.configure({ drm: { clearKeys: drmKeys } }); }
        try { 
            await shakaInst.load(url); 
            video.play().catch(() => {
                interLayer.style.display = 'block';
            });
        } catch (e) { loader.style.display = 'none'; }
    }

    // THE SYNC FIX: Trigger when pixels move
    video.onplaying = () => {
        video.classList.add('playing');
        loader.style.display = 'none';
        interLayer.style.display = 'none';
    };

    // User Gesture Handler (Bypasses Autoplay Blocks)
    interLayer.onclick = () => {
        video.muted = false;
        video.play();
        interLayer.style.display = 'none';
    };

    // Notify parent ready
    window.onload = () => {
        window.parent.postMessage({ type: 'PLAYER_READY' }, ORIGIN);
    };
</script>
</body>
</html>
