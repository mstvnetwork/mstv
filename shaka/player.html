<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MSTV | V27 DRM STABLE</title>
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
    <script src="https://cdn.jsdelivr.net/npm/shaka-player@latest/dist/shaka-player.compiled.js"></script>
    <style>
        :root { --accent: #22c55e; }
        body { margin: 0; padding: 0; background: #000; overflow: hidden; height: 100vh; width: 100vw; display: flex; align-items: center; justify-content: center; font-family: sans-serif; }
        
        #player-container { width: 100%; height: 100%; position: relative; background: #000; min-height: 100vh; }
        
        video { width: 100%; height: 100%; position: absolute; top: 0; left: 0; background: #000; opacity: 0; transition: opacity 0.3s; z-index: 10; }
        iframe { width: 100%; height: 100%; position: absolute; top: 0; left: 0; border: none; display: none; background: #000; z-index: 20; }
        
        #loader { position: absolute; z-index: 100; display: flex; flex-direction: column; align-items: center; top: 50%; left: 50%; transform: translate(-50%, -50%); }
        .spinner { width: 45px; height: 45px; border: 3px solid rgba(34, 197, 94, 0.1); border-top: 3px solid var(--accent); border-radius: 50%; animation: spin 0.8s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        
        .visible { opacity: 1 !important; display: block !important; }
        .hidden { display: none !important; }
    </style>
</head>
<body>

    <div id="player-container">
        <div id="loader"><div class="spinner"></div></div>
        <video id="video" controls autoplay muted playsinline preload="auto"></video>
        <iframe id="iframe-player" allow="autoplay; fullscreen" sandbox="allow-scripts allow-same-origin allow-forms"></iframe>
    </div>

<script>
    const video = document.getElementById('video');
    const iframe = document.getElementById('iframe-player');
    const loader = document.getElementById('loader');

    // CONFIGURATION: Add your ClearKeys here inside the "drm" object
    const STREAMS = [
        { 
            "name": "Zee TV (DASH ClearKey)", 
            "url": "https://d1g8wgjurz8via.cloudfront.net/bpk-tv/Zeetv/default/main.mpd",
            "drm": { "ed068cf84f0640ccbc7c0e395c0a272e": "bb722190f2bb446391020411a7d0828b" }
        },
        { 
            "name": "Star Plus", 
            "url": "https://warm-caverns-48629-92fab798385f.herokuapp.com/http://103.175.242.10:8080/starplus/index.m3u8" 
        },
        { 
            "name": "Sky Sports", 
            "url": "https://go.webcric.com/worldcup1.htm", 
            "type": "iframe" 
        }
    ];

    let hls = null;
    let shakaInst = null;

    async function resetAll() {
        loader.classList.remove('hidden');
        if (hls) { hls.destroy(); hls = null; }
        if (shakaInst) { await shakaInst.destroy(); shakaInst = null; }
        video.classList.remove('visible');
        video.pause(); video.src = "";
        iframe.classList.remove('visible');
        iframe.src = "about:blank";
    }

    async function bootStream(index) {
        const stream = STREAMS[index] || STREAMS;
        
        if (window.location.protocol === 'https:' && stream.url.startsWith('http:')) {
            window.open(stream.url, '_blank');
            loader.classList.add('hidden');
            return;
        }

        await resetAll();

        if (stream.type === 'iframe') {
            iframe.classList.add('visible');
            iframe.src = stream.url;
            setTimeout(() => loader.classList.add('hidden'), 2000);
        } else if (stream.url.includes('.mpd')) {
            // Pass both URL and the DRM object to Shaka
            initShaka(stream.url, stream.drm); 
        } else {
            initHls(stream.url);
        }
    }

    function initHls(url) {
        if (Hls.isSupported()) {
            hls = new Hls({ enableWorker: true, lowLatencyMode: false });
            hls.loadSource(url);
            hls.attachMedia(video);
            hls.on(Hls.Events.MANIFEST_PARSED, () => video.play().catch(() => {}));
        } else if (video.canPlayType('application/vnd.apple.mpegurl')) {
            video.src = url;
        }
    }

    async function initShaka(url, drmKeys) {
        shaka.polyfill.installAll();
        shakaInst = new shaka.Player(video);

        // Dynamic DRM configuration
        if (drmKeys) {
            shakaInst.configure({
                drm: {
                    clearKeys: drmKeys
                }
            });
        }

        try { 
            await shakaInst.load(url); 
            video.play(); 
        } catch (e) { 
            console.error("DRM Load Error:", e); 
            loader.classList.add('hidden');
        }
    }

    video.onplaying = () => {
        video.classList.add('visible');
        loader.classList.add('hidden');
    };

    function route() {
        const idx = parseInt(window.location.hash.replace('#', '')) - 1;
        bootStream(idx >= 0 ? idx : 0);
    }
    window.onhashchange = route;
    window.onload = route;
</script>
</body>
</html>
