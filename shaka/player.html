<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MSTV | V25 NEBULA SPEED</title>
    
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
    <script src="https://cdn.jsdelivr.net/npm/shaka-player@latest/dist/shaka-player.compiled.js"></script>

    <style>
        :root { --accent: #22c55e; --bg: #000; }
        body { margin: 0; padding: 0; background: var(--bg); overflow: hidden; height: 100vh; width: 100vw; display: flex; align-items: center; justify-content: center; }
        
        #player-container { width: 100%; height: 100%; position: relative; background: #000; contain: strict; }
        
        /* GPU-Accelerated Layers */
        video { width: 100%; height: 100%; position: absolute; top: 0; left: 0; background: #000; opacity: 0; transition: opacity 0.2s ease-in; z-index: 10; transform: translateZ(0); }
        iframe { width: 100%; height: 100%; position: absolute; top: 0; left: 0; border: none; display: none; background: #000; z-index: 20; }
        
        #loader { position: absolute; z-index: 100; display: flex; flex-direction: column; align-items: center; top: 50%; left: 50%; transform: translate(-50%, -50%); pointer-events: none; }
        .spinner { width: 40px; height: 40px; border: 3px solid rgba(34, 197, 94, 0.05); border-top: 3px solid var(--accent); border-radius: 50%; animation: spin 0.5s cubic-bezier(0.4, 0, 0.2, 1) infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        
        .visible { opacity: 1 !important; display: block !important; }
    </style>
</head>
<body>

    <div id="player-container">
        <div id="loader">
            <div class="spinner"></div>
        </div>
        <video id="video" controls autoplay muted playsinline preload="auto"></video>
        <iframe id="iframe-player" allow="autoplay; fullscreen" sandbox="allow-scripts allow-same-origin allow-forms allow-presentation"></iframe>
    </div>

<script>
    const video = document.getElementById('video');
    const iframe = document.getElementById('iframe-player');
    const loader = document.getElementById('loader');

    const STREAMS = [
        { "name": "Star Plus", "url": "https://warm-caverns-48629-92fab798385f.herokuapp.com/http://103.175.242.10:8080/starplus/index.m3u8" },
        { "name": "WWE Network", "url": "https://autumn-shape-b04a.soft-disk-1347.workers.dev/?url=http://maxotts.maxdigitaltv.com/x-media/C490/master.m3u8" },
        { "name": "Star Movies", "url": "https://warm-caverns-48629-92fab798385f.herokuapp.com/http://103.175.242.10:8080/starmovies/tracks-v1a1/mono.m3u8" },
        { "name": "Sony Pal", "url": "http://maxotts.maxdigitaltv.com/x-media/C106/master.m3u8" }
    ];

    let hls = null;
    let shakaInst = null;

    // --- NEBULA TECH 1: INSTANT PURGE ---
    async function nebulaPurge() {
        loader.classList.remove('hidden');
        if (hls) { hls.destroy(); hls = null; }
        if (shakaInst) { await shakaInst.destroy(); shakaInst = null; }
        video.classList.remove('visible');
        video.src = "";
        iframe.classList.remove('visible');
        iframe.src = "about:blank";
    }

    // --- NEBULA TECH 2: PREDICATIVE EXECUTION ---
    async function nebulaIgnite(index) {
        const stream = STREAMS[index] || STREAMS;
        
        // Protocol Security Bypass
        if (window.location.protocol === 'https:' && stream.url.startsWith('http:')) {
            window.open(stream.url, '_blank');
            return;
        }

        await nebulaPurge();

        if (stream.type === 'iframe') {
            iframe.classList.add('visible');
            iframe.src = stream.url;
            setTimeout(() => loader.classList.add('hidden'), 1000);
        } else if (stream.url.includes('.mpd')) {
            initShaka(stream.url);
        } else {
            initHls(stream.url);
        }
    }

    // --- NEBULA TECH 3: ZERO-DELAY HLS ---
    function initHls(url) {
        if (Hls.isSupported()) {
            hls = new Hls({ 
                enableWorker: true, // Offloads processing to background thread
                lowLatencyMode: true,
                startLevel: -1, // Auto-start at best speed
                manifestLoadingMaxRetry: 15, 
                // Speed-of-light buffer config
                maxBufferLength: 10,
                maxMaxBufferLength: 20,
                liveSyncDuration: 0.5, 
                liveMaxLatencyDuration: 1.5
            });
            hls.loadSource(url);
            hls.attachMedia(video);
            hls.on(Hls.Events.MANIFEST_PARSED, () => video.play());
        }
    }

    // --- NEBULA TECH 4: ULTRA-FAST SHAKA ---
    async function initShaka(url) {
        shaka.polyfill.installAll();
        shakaInst = new shaka.Player(video);
        shakaInst.configure({
            streaming: {
                bufferingGoal: 2, // Minimal data needed to start
                rebufferingGoal: 1,
                lowLatencyMode: true
            }
        });
        await shakaInst.load(url);
        video.play();
    }

    // EVENT HANDLERS
    video.onplaying = () => {
        video.classList.add('visible');
        loader.classList.add('hidden');
    };

    function sync() {
        const idx = parseInt(window.location.hash.replace('#', '')) - 1;
        nebulaIgnite(idx >= 0 ? idx : 0);
    }

    window.onhashchange = sync;
    window.onload = sync;
</script>
</body>
</html>
