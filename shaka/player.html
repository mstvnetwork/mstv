<head>

    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
    <script src="https://cdn.jsdelivr.net/npm/shaka-player@latest/dist/shaka-player.compiled.js"></script>
    <style>
        :root { --accent: #22c55e; }
        body { margin: 0; padding: 0; background: #000; overflow: hidden; display: flex; align-items: center; justify-content: center; height: 100vh; width: 100vw; }
        #player-container { width: 100%; height: 100%; position: relative; background: #000; }
        
        /* Fixed: Use Opacity for Video to keep the engine 'attached' */
        video { width: 100%; height: 100%; position: absolute; top: 0; left: 0; background: #000; opacity: 0; transition: opacity 0.4s; z-index: 10; }
        iframe { width: 100%; height: 100%; position: absolute; top: 0; left: 0; border: none; display: none; background: #000; z-index: 20; }
        
        #loader { position: absolute; z-index: 100; display: flex; flex-direction: column; align-items: center; top: 50%; left: 50%; transform: translate(-50%, -50%); }
        .spinner { width: 45px; height: 45px; border: 3px solid rgba(34, 197, 94, 0.1); border-top: 3px solid var(--accent); border-radius: 50%; animation: spin 0.7s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .loading-text { margin-top: 12px; font-size: 10px; letter-spacing: 2px; color: var(--accent); font-weight: 800; text-transform: uppercase; font-family: sans-serif; }
        
        .hidden { display: none !important; }
        .visible { opacity: 1 !important; display: block !important; }
    </style>
</head>
<body>

    <div id="player-container">
        <div id="loader">
            <div class="spinner"></div>
            <div class="loading-text">Quantum Handshake...</div>
        </div>
        <video id="video" controls autoplay muted playsinline preload="auto"></video>
        <iframe id="iframe-player" allow="autoplay; fullscreen; encrypted-media" sandbox="allow-scripts allow-same-origin allow-forms allow-presentation"></iframe>
    </div>

<script>
    const video = document.getElementById('video');
    const iframe = document.getElementById('iframe-player');
    const loader = document.getElementById('loader');

    /* [OFFICIAL CHANNEL ARRAY - V24] */
    const STREAMS = [
        { 
            "name": "Star Plus", 
            "url": "https://warm-caverns-48629-92fab798385f.herokuapp.com/http://103.175.242.10:8080/starplus/index.m3u8" 
        },
        { 
            "name": "WWE Network", 
            "url": "https://autumn-shape-b04a.soft-disk-1347.workers.dev/?url=http://maxotts.maxdigitaltv.com/x-media/C490/master.m3u8" 
        },
        { 
            "name": "Star Movies", 
            "url": "https://warm-caverns-48629-92fab798385f.herokuapp.com/http://103.175.242.10:8080/starmovies/tracks-v1a1/mono.m3u8" 
        },
        { 
            "name": "Sony Pal (External)", 
            "url": "http://maxotts.maxdigitaltv.com/x-media/C106/master.m3u8" 
        }
    ];

    let hlsInstance = null;
    let shakaInstance = null;

    async function purgeAll() {
        loader.classList.remove('hidden');
        if (hlsInstance) { hlsInstance.destroy(); hlsInstance = null; }
        if (shakaInstance) { await shakaInstance.destroy(); shakaInstance = null; }
        
        video.classList.remove('visible');
        video.pause(); video.src = ""; video.load();
        
        iframe.classList.remove('visible');
        iframe.src = "about:blank";
    }

    async function activateStream(index) {
        const stream = STREAMS[index] || STREAMS;
        
        // RULE: HTTP EXTERNAL BYPASS
        // Automatically opens a new window if the URL is insecure (http) on a secure (https) site
        if (window.location.protocol === 'https:' && stream.url.startsWith('http:')) {
            loader.classList.add('hidden');
            window.open(stream.url, '_blank');
            return;
        }

        await purgeAll();

        if (stream.type === 'iframe') {
            initIframe(stream.url);
        } else if (stream.url.includes('.mpd')) {
            initShaka(stream.url, stream.keys);
        } else {
            initHls(stream.url);
        }
    }

    function initIframe(url) {
        iframe.classList.add('visible');
        iframe.src = url;
        setTimeout(() => loader.classList.add('hidden'), 2000);
    }

    function initHls(url) {
        if (Hls.isSupported()) {
            hlsInstance = new Hls({ 
                lowLatencyMode: true,
                backBufferLength: 60,
                manifestLoadingMaxRetry: 10, // Aggressive retry for Star Plus proxy
                manifestLoadingRetryDelay: 1000
            });
            hlsInstance.loadSource(url);
            hlsInstance.attachMedia(video);
            hlsInstance.on(Hls.Events.MANIFEST_PARSED, () => {
                video.play().catch(() => {});
            });
            hlsInstance.on(Hls.Events.ERROR, (e, data) => {
                if (data.fatal && data.type === Hls.ErrorTypes.NETWORK_ERROR) hlsInstance.startLoad();
            });
        } else {
            video.src = url; video.play();
        }
    }

    async function initShaka(url, keys) {
        shaka.polyfill.installAll();
        if (shaka.Player.isBrowserSupported()) {
            shakaInstance = new shaka.Player(video);
            if (keys) shakaInstance.configure({ drm: { clearKeys: keys } });
            try { await shakaInstance.load(url); video.play(); } catch (e) { console.error(e); }
        }
    }

    // High-IQ Trigger: Only reveal video and hide loader when frames actually arrive
    video.onplaying = () => {
        video.classList.add('visible');
        loader.classList.add('hidden');
    };

    function handleNavigation() {
        const hash = window.location.hash.replace('#', '');
        const targetIndex = parseInt(hash) - 1;
        activateStream(targetIndex >= 0 ? targetIndex : 0);
    }

    window.addEventListener('hashchange', handleNavigation);
    window.addEventListener('load', handleNavigation);
</script>
</body>
</html>
