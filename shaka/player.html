<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MSTV | V22 OMNI-ENGINE</title>
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
    <script src="https://cdn.jsdelivr.net/npm/shaka-player@latest/dist/shaka-player.compiled.js"></script>
    <style>
        :root { --accent: #38bdf8; }
        body { margin: 0; padding: 0; background: #000; overflow: hidden; display: flex; align-items: center; justify-content: center; height: 100vh; width: 100vw; }
        #player-container { width: 100%; height: 100%; position: relative; background: #000; }
        video, iframe { width: 100%; height: 100%; position: absolute; top: 0; left: 0; border: none; background: #000; display: none; }
        #loader { position: absolute; z-index: 100; display: flex; flex-direction: column; align-items: center; pointer-events: none; top: 50%; left: 50%; transform: translate(-50%, -50%); }
        .spinner { width: 45px; height: 45px; border: 3px solid rgba(56, 189, 248, 0.1); border-top: 3px solid var(--accent); border-radius: 50%; animation: spin 0.7s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .loading-text { margin-top: 12px; font-size: 10px; letter-spacing: 2px; color: var(--accent); font-weight: 800; text-transform: uppercase; font-family: sans-serif; }
        .hidden { display: none !important; }
    </style>
</head>
<body>

    <div id="player-container">
        <div id="loader">
            <div class="spinner"></div>
            <div class="loading-text">Quantum Handshake...</div>
        </div>
        <video id="video" controls autoplay muted playsinline preload="auto"></video>
        <iframe id="iframe-player" allow="autoplay; encrypted-media; fullscreen" allowfullscreen sandbox="allow-scripts allow-same-origin allow-forms allow-presentation"></iframe>
    </div>

<script>
    const video = document.getElementById('video');
    const iframe = document.getElementById('iframe-player');
    const loader = document.getElementById('loader');
    const workerPrefix = "https://zee5.mchoudhry482.workers.dev/?url="; 

    /* [CHANNEL ARRAY] */
    const STREAMS = 

    let hlsInstance = null;
    let shakaInstance = null;

    async function purgeAll() {
        loader.classList.remove('hidden');
        if (hlsInstance) { hlsInstance.destroy(); hlsInstance = null; }
        if (shakaInstance) { await shakaInstance.destroy(); shakaInstance = null; }
        video.style.display = "none"; video.pause(); video.src = ""; video.load();
        iframe.style.display = "none"; iframe.src = "about:blank";
    }

    async function activateStream(index) {
        const stream = STREAMS[index] || STREAMS;
        
        // RULE: EXTERNAL REDIRECT BYPASS
        // If type is 'external' OR it's a raw http link on an https site
        if (stream.type === 'external' || (window.location.protocol === 'https:' && stream.url.startsWith('http:'))) {
            loader.classList.add('hidden');
            window.open(stream.url, '_blank');
            return; // Stop the brain from loading the internal player
        }

        await purgeAll();
        const finalUrl = stream.useWorker === true ? workerPrefix + encodeURIComponent(stream.url) : stream.url;

        if (stream.type === 'iframe') {
            initIframe(finalUrl);
        } else if (finalUrl.includes('.mpd')) {
            initShaka(finalUrl, stream.keys);
        } else {
            initHls(finalUrl);
        }
    }

    function initIframe(url) {
        iframe.style.display = "block";
        iframe.src = url;
        setTimeout(() => loader.classList.add('hidden'), 1500);
    }

    function initHls(url) {
        video.style.display = "block";
        if (Hls.isSupported()) {
            hlsInstance = new Hls({ 
                lowLatencyMode: true,
                xhrSetup: (xhr) => { xhr.withCredentials = false; },
                manifestLoadingMaxRetry: 6,
                levelLoadingMaxRetry: 6
            });
            hlsInstance.loadSource(url);
            hlsInstance.attachMedia(video);
            hlsInstance.on(Hls.Events.MANIFEST_PARSED, () => video.play().catch(() => loader.classList.add('hidden')));
            hlsInstance.on(Hls.Events.ERROR, (e, data) => {
                if (data.fatal) {
                    if (data.type === Hls.ErrorTypes.NETWORK_ERROR) hlsInstance.startLoad();
                    else if (data.type === Hls.ErrorTypes.MEDIA_ERROR) hlsInstance.recoverMediaError();
                }
            });
        } else {
            video.src = url; video.play();
        }
    }

    async function initShaka(url, keys) {
        video.style.display = "block";
        shaka.polyfill.installAll();
        if (shaka.Player.isBrowserSupported()) {
            shakaInstance = new shaka.Player(video);
            if (keys) shakaInstance.configure({ drm: { clearKeys: keys } });
            shakaInstance.configure({ streaming: { lowLatencyMode: true, bufferingGoal: 10 } });
            try { await shakaInstance.load(url); video.play(); } catch (e) { console.error(e); }
        }
    }

    video.addEventListener('playing', () => loader.classList.add('hidden'));

    function handleNavigation() {
        const hash = window.location.hash.replace('#', '');
        const targetIndex = parseInt(hash) - 1;
        activateStream(targetIndex >= 0 ? targetIndex : 0);
    }

    window.addEventListener('hashchange', handleNavigation);
    window.addEventListener('load', handleNavigation);
</script>
</body>
</html>
