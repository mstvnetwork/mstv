<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background: #000; overflow: hidden; }
        video { width: 100%; height: 100%; object-fit: contain; }
        #loader { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); color: #22c55e; font-family: sans-serif; font-size: 12px; letter-spacing: 2px; }
        .hidden { display: none; }
    </style>
</head>
<body>
    <div id="loader">LOADING...</div>
    <video id="video" controls autoplay muted playsinline></video>

<script>
    // THE BRAIN'S DATA SOURCE (Matches your index.html order)
    async function getStreams() {
        const res = await fetch('channels2.json');
        return await res.json();
    }

    const video = document.getElementById('video');
    const loader = document.getElementById('loader');
    let hls = null;

    async function playChannel() {
        const STREAMS = await getStreams();
        const id = parseInt(window.location.hash.replace('#', '')) - 1;
        const stream = STREAMS[id] || STREAMS;

        if (hls) { hls.destroy(); }
        loader.classList.remove('hidden');

        if (Hls.isSupported()) {
            hls = new Hls();
            hls.loadSource(stream.url);
            hls.attachMedia(video);
            hls.on(Hls.Events.MANIFEST_PARSED, () => {
                video.play();
                loader.classList.add('hidden');
            });
        }
    }

    window.onhashchange = playChannel;
    window.onload = playChannel;
</script>
</body>
</html>
