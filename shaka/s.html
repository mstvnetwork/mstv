<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Multi-Channel Pro Player</title>
    
    <script src="https://unpkg.com"></script>
    <script type="module" src="https://unpkg.com"></script>

  <style>
    /* ... existing styles ... */

    #ticker {
        position: absolute; top: 0; left: 0;
        width: 100%; background: rgba(0,0,0,0.5); /* darkened for better visibility */
        overflow: hidden; 
        z-index: 10000; padding: 11px 0;
        /* CRITICAL: Ensure text stays on one line */
        white-space: nowrap; 
    }

    #ticker span {
        display: inline-block;
        padding-left: 100%;
        /* Use 'linear' for smooth ticker speed */
        animation: scroll-left 15s linear infinite;
        color: #ff3b3b; font-family: sans-serif; font-size: 14px;
        font-weight: bold;
    }

    /* Standard Horizontal Animation */
    @keyframes scroll-left {
        0%   { transform: translateX(0); }
        100% { transform: translateX(-100%); }
    }
</style>
</head>
<body>

    <div class="viewport" id="playerWrapper">
        <div id="lockLayer"></div>
        <div id="ticker"><span> Click play button 3-4 times. Refresh if it fails. </span></div>
        <div id="status" class="click-hint"></div>
        <button id="resetBtn" onclick="location.reload()">Refresh</button>

        <div id="frameMover">
            <iframe id="captureFrame" is="x-frame-bypass" src="" scrolling="no"></iframe>
        </div>
    </div>

    <div id="fallback">
        <h2>Mobile Device Required</h2>
        <p>Please open this page on Android or iOS to view the stream.</p>
    </div>

<script>
(function() {
    // --- 1. CONFIGURATION (Edit this) ---
    const channels = {
        "1": {
            url: "https://tv-shihab.xyz/live/sony-ten-1/",
            top: "-183px",   // Moves the site UP to hide the header
            height: "270%"   // Makes the iframe taller to fit the player
        },
        "2": {
            url: "https://tv-shihab.xyz",
            top: "-150px",   // Example adjustment
            height: "250%"
        },
        "3": {
            url: "https://tv-shihab.xyz",
            top: "-200px",
            height: "300%"
        }
    };

    // --- 2. LOGIC ---
    const urlParams = new URLSearchParams(window.location.search);
    const ch = urlParams.get('ch') || "1";
    const config = channels[ch] || channels["1"];

    // Apply URL
    const iframe = document.getElementById('captureFrame');
    iframe.src = config.url;

    // Apply Custom Positioning for this channel
    const mover = document.getElementById('frameMover');
    mover.style.top = config.top;
    mover.style.height = config.height;

    // --- 3. MOBILE & LOCK LOGIC ---
    function isAllowedDevice() {
        return /iPhone|iPad|iPod|Android/i.test(navigator.userAgent);
    }

    if (!isAllowedDevice()) {
        document.getElementById('playerWrapper').remove();
        document.getElementById('fallback').style.display = 'block';
        return;
    }

    document.addEventListener("DOMContentLoaded", function() {
        const wrapper = document.getElementById('playerWrapper');
        const shield = document.getElementById('lockLayer');
        const status = document.getElementById('status');
        let clickCount = 0;
        const maxClicks = 4;

        wrapper.addEventListener('click', function() {
            clickCount++;
            let remaining = maxClicks - clickCount;
            if (remaining > 0) status.innerText = `Setup: ${remaining} clicks left`;
            if (clickCount >= maxClicks) {
                shield.classList.add('active');
                status.innerText = "LOCKED";
            }
        });
    });
})();
</script>
</body>
</html>
