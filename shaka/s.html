<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Multi-Channel Mobile Stream</title>
    
    <!-- Required Libraries for Iframe Bypass -->
    <script src="https://unpkg.com/@ungap/custom-elements-builtin"></script>
    <script type="module" src="https://unpkg.com/x-frame-bypass"></script>

    <style>
        :root { --primary: #00ffA0; }
        body, html {
            margin: 0; padding: 0;
            width: 100%; height: 100%;
            background: #000;
            display: flex; align-items: center; justify-content: center;
            overflow: hidden;
        }

        /* 16:9 Viewport Container */
        .viewport {
            width: 100vw; max-width: 1000px; aspect-ratio: 16 / 9; 
            overflow: hidden; position: relative;
            border: 4px solid var(--primary); border-radius: 12px;
            background: #000;
        }

        /* Frame Mover: controlled by JavaScript for each channel */
        #frameMover {
            position: absolute; width: 100%; left: 0;
        }

        #captureFrame {
            width: 100%; height: 100%; border: none;
        }

        /* Click Layer to bypass popup ads */
        #lockLayer {
            position: absolute; top: 0; left: 0; 
            width: 100%; height: 100%;
            z-index: 9999; background: rgba(0,0,0,0.01); 
            pointer-events: none; cursor: pointer;
        }

        #lockLayer.active { pointer-events: all !important; cursor: default; }

        .click-hint {
            position: absolute; bottom: 60px; right: 15px;
            color: var(--primary); font-family: sans-serif; font-size: 12px;
            z-index: 10000; pointer-events: none; opacity: 0.7;
        }

        #resetBtn {
            position: fixed; bottom: 12px; right: 12px;
            padding: 8px 15px; background: rgba(0, 255, 160, 0.15);
            color: #00ffa0; border: 1px solid rgba(0, 255, 160, 0.6);
            border-radius: 30px; font-family: sans-serif; font-size: 14px;
            backdrop-filter: blur(10px); cursor: pointer; z-index: 10002;
        }

        /* Corrected Horizontal Ticker */
        #ticker {
            position: absolute; top: 0; left: 0;
            width: 100%; background: rgba(0,0,0,0.4);
            z-index: 10000; padding: 10px 0;
            overflow: hidden; white-space: nowrap; /* Prevents vertical wrapping */
        }

        #ticker span {
            display: inline-block;
            padding-left: 100%;
            animation: ticker-scroll 15s linear infinite;
            color: #ff3b3b; font-family: sans-serif; font-size: 14px;
            font-weight: bold;
        }

        @keyframes ticker-scroll {
            0%   { transform: translateX(0); }
            100% { transform: translateX(-100%); }
        }

        #fallback { display: none; text-align: center; color: #fff; font-family: sans-serif; }
    </style>
</head>
<body>

    <div class="viewport" id="playerWrapper">
        <!-- Ticker -->
        <div id="ticker">
            <span>Refresh & select Stream 2,1 or any other. अगर क्लिक न हो तो रिफ्रेश बटन दबाएं।</span>
        </div>

        <div id="lockLayer"></div>
        <div id="status" class="click-hint"></div>
        <button id="resetBtn" onclick="location.reload()">Refresh</button>

        <div id="frameMover">
            <iframe id="captureFrame" is="x-frame-bypass" src="" scrolling="no"></iframe>
        </div>
    </div>

    <div id="fallback">
        <h2>Mobile Device Required</h2>
        <p>Please open this page on Android or iOS to view the stream.</p>
    </div>

<script>
(function() {
    // --- 1. CHANNEL CONFIGURATION ---
    const channels = {
        "1": {
            url: "https://tulnit.com/live/mtv-hd/",
            top: "-280px",   // Adjust these for every new URL
            height: "270%"
        },
        "2": {
            url:"https://tulnit.com/live/sony-max-hd-ind/",
            top: "-280px",
            height: "270%"
        },
        "3": {
            url:"https://tulnit.com/live/sony-pal/",
            top: "-280px",
            height: "270%"
        },
        
        "4": {
            url:"https://tulnit.com/live/vision-punjab-tv-hd/",
            top: "-280px",
            height: "270%"
        },

        
        "5": {
            url:"https://tulnit.com/live/runn-action/",
            top: "-280px",
            height: "270%"
        },

        "6": {
            url:"https://tulnit.com/live/sony-pix-hd/",
            top: "-280px",
            height: "270%"
        },
                "7": {
            url:"https://apnetv.xyz/Hindi-Serial/show/281240/Bigg-Boss-Marathi-6",
            top: "-600px",
            height: "270%"
        }


        
    };

    // --- 2. URL PARAMETER LOGIC ---
    const urlParams = new URLSearchParams(window.location.search);
    const ch = urlParams.get('ch') || "1";
    const config = channels[ch] || channels["1"];
    
    // Apply URL and Positioning
    const iframe = document.getElementById('captureFrame');
    const mover = document.getElementById('frameMover');
    
    iframe.src = config.url;
    mover.style.top = config.top;
    mover.style.height = config.height;

    // --- 3. MOBILE DEVICE CHECK ---
    function isAllowedDevice() {
        return /iPhone|iPad|iPod|Android/i.test(navigator.userAgent);
    }

    if (!isAllowedDevice()) {
        document.getElementById('playerWrapper').remove();
        document.getElementById('fallback').style.display = 'block';
        return;
    }

    // --- 4. CLICK-TO-LOCK LOGIC ---
    document.addEventListener("DOMContentLoaded", function() {
        const wrapper = document.getElementById('playerWrapper');
        const shield = document.getElementById('lockLayer');
        const status = document.getElementById('status');
        
        let clickCount = 0;
        const maxClicks = 20;

        wrapper.addEventListener('click', function() {
            clickCount++;
            let remaining = maxClicks - clickCount;
            if (remaining > 0) {
                status.innerText = `Setup: ${remaining} clicks left`;
            }
            if (clickCount >= maxClicks) {
                shield.classList.add('active');
                status.innerText = "CONTROLS LOCKED";
            }
        });

        // Fail-safe auto lock after 45 seconds
        setTimeout(() => {
            shield.classList.add('active');
            status.innerText = "LOCKED";
        }, 500000);
    });
})();
</script>
</body>
</html>
