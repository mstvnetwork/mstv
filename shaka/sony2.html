<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stream Player</title>
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
    <script src="https://unpkg.com/x-frame-bypass"></script>
    <style>
        *, *::before, *::after { box-sizing: border-box; }

        body, html {
            margin: 0; padding: 0;
            width: 100%; height: 100%;
            background: #000;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        .viewport {
            width: 100vw;
            max-width: 1000px;
            aspect-ratio: 16 / 9;
            position: relative;
            background: #000;
            overflow: hidden;
        }

        #frameMover {
            display: none;
            position: absolute;
            width: 100%; height: 270%;
            top: -97px; left: 0;
        }

        #captureFrame {
            width: 100%; height: 100%;
            border: none;
            pointer-events: none;
        }

        #videoEl {
            display: none;
            position: absolute;
            inset: 0;
            width: 100%; height: 100%;
            object-fit: contain;
            background: #000;
            z-index: 5;
        }

        #videoEl::-webkit-media-controls,
        #videoEl::-webkit-media-controls-enclosure,
        #videoEl::-webkit-media-controls-panel { display: none !important; }

        /* Slot transition */
        #slotOverlay {
            display: none;
            position: absolute;
            inset: 0;
            background: #000;
            z-index: 8000;
            align-items: center;
            justify-content: center;
            flex-direction: column;
            gap: 8px;
        }
        #slotOverlay.show { display: flex; }
        #slotLabel {
            color: #fff; font-family: sans-serif;
            font-size: 14px; opacity: 0.65; letter-spacing: 0.5px;
        }
        #slotCountdown {
            color: #fff; font-family: monospace;
            font-size: 11px; opacity: 0.3;
        }

        /* Spinner */
        #spinner {
            display: none;
            position: absolute;
            inset: 0; z-index: 100;
            align-items: center;
            justify-content: center;
            background: #000;
        }
        #spinner.show { display: flex; }
        #spinner::after {
            content: "";
            width: 36px; height: 36px;
            border: 3px solid rgba(255,255,255,0.1);
            border-top-color: rgba(255,255,255,0.5);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        /* Error */
        #errorMsg {
            display: none;
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            color: rgba(255,80,80,0.9);
            font-family: sans-serif; font-size: 13px;
            text-align: center; z-index: 200;
            padding: 10px 18px;
            background: rgba(0,0,0,0.75);
            border-radius: 6px;
        }

        /* Full-cover shield — blocks all taps reaching the video */
        #shield {
            position: absolute;
            inset: 0; z-index: 9999;
            background: transparent;
        }

        #fallback {
            display: none; color: #fff;
            font-family: sans-serif;
            text-align: center; padding: 20px;
        }
    </style>
</head>
<body>

<div class="viewport" id="playerWrapper">
    <div id="shield"></div>
    <div id="spinner"></div>
    <div id="errorMsg"></div>

    <div id="slotOverlay">
        <div id="slotLabel"></div>
        <div id="slotCountdown"></div>
    </div>

    <!-- No `controls` attribute — seek bar completely absent -->
    <video id="videoEl" autoplay playsinline muted></video>

    <div id="frameMover">
        <iframe id="captureFrame" is="x-frame-bypass" src="" scrolling="no"></iframe>
    </div>
</div>

<div id="fallback">
    <p>Please open on a mobile device to view the stream.</p>
</div>

<script>
// ═══════════════════════════════════════════════════════════════════════
//  ★  PLAYLIST  ★
//
//  url      : .m3u8 / .mp4 / .webm / iframe embed page
//  start    : "HH:MM"  UTC — when this slot starts in the day
//  end      : "HH:MM"  UTC — when this slot ends
//  duration : REQUIRED for mp4/webm — total length of the file in
//             seconds. The player uses this to loop correctly and to
//             calculate the exact frame every viewer should see.
//             (Leave out or set 0 for HLS / iframe slots.)
//  label    : optional — shown during slot switch animation
//
//  HOW MP4 SYNC WORKS
//  ──────────────────
//  UTC seconds elapsed since slot start  →  seek position
//  e.g. slot starts 05:00 UTC, file is 3600s long.
//       A viewer joins at 06:23 UTC  →  offset = 83 min = 4980s
//       4980 mod 3600 = 1380s  →  video seeks to 23:00 into the file.
//  Everyone on earth sees the same frame.
// ═══════════════════════════════════════════════════════════════════════

const PLAYLIST = [
    {
        label    : "Morning Show",
        url      : "https://test-streams.mux.dev/x36xhzz/x36xhzz.m3u8",
        start    : "15:48",
        end      : "15:58",
        duration : 634      // 4 hours = 14400s  ← set your actual file length
    },
    {
        label    : "Midday Block",
        url      : "https://example.com/midday/clip.mp4",
        start    : "05:00",
        end      : "09:00",
        duration : 7200         // 2 hours
    },
    {
        label    : "Afternoon Live",
        url      : "https://example.com/embed/afternoon",
        start    : "09:00",
        end      : "15:00",
        duration : 0            // iframe — no duration needed
    },
    {
        label    : "Night Stream",
        url      : "https://example.com/night/stream.m3u8",
        start    : "15:00",
        end      : "20:00",
        duration : 0            // HLS — always live edge
    },
    // Catch-all fallback
    {
        label    : "Default",
        url      : "https://example.com/default/stream.m3u8",
        start    : "20:00",
        end      : "01:00",
        duration : 0
    }
];

const CHECK_INTERVAL  = 15_000;   // slot-change poll (ms)
const DRIFT_TOLERANCE = 1.5;      // seconds before hard re-seek (mp4)
const SYNC_INTERVAL   = 2_000;    // drift check frequency (ms)

// ═══════════════════════════════════════════════════════════════════════

(function () {

    function isMobile() {
        return /iPhone|iPad|iPod|Android/i.test(navigator.userAgent || navigator.vendor || window.opera);
    }

    if (!isMobile()) {
        document.addEventListener("DOMContentLoaded", () => {
            document.getElementById('playerWrapper').remove();
            document.getElementById('fallback').style.display = 'block';
        });
        return;
    }

    /* ─── Time helpers (all UTC) ─────────────────────────────────── */

    function utcNowSecs() {
        const d = new Date();
        return d.getUTCHours() * 3600 + d.getUTCMinutes() * 60 + d.getUTCSeconds()
             + d.getUTCMilliseconds() / 1000;
    }

    function utcNowMins() {
        const d = new Date();
        return d.getUTCHours() * 60 + d.getUTCMinutes();
    }

    function toSecs(hhmm) {
        const [h, m] = hhmm.split(":").map(Number);
        return h * 3600 + m * 60;
    }

    function toMins(hhmm) {
        const [h, m] = hhmm.split(":").map(Number);
        return h * 60 + m;
    }

    // Seconds elapsed since slot start (handles overnight wrap, loops via duration)
    function slotOffset(slot) {
        const nowS   = utcNowSecs();
        const startS = toSecs(slot.start);
        let elapsed  = nowS - startS;
        if (elapsed < 0) elapsed += 86400;           // overnight wrap

        if (slot.duration && slot.duration > 0) {
            elapsed = elapsed % slot.duration;        // loop the file
        }
        return elapsed;
    }

    function currentSlot() {
        const now = utcNowMins();
        for (const slot of PLAYLIST) {
            const s = toMins(slot.start), e = toMins(slot.end);
            const match = s <= e ? (now >= s && now < e) : (now >= s || now < e);
            if (match) return slot;
        }
        return PLAYLIST[PLAYLIST.length - 1];
    }

    function detectType(url) {
        if (!url) return "none";
        const c = url.split("?")[0].toLowerCase();
        if (c.endsWith(".m3u8")) return "hls";
        if (c.endsWith(".mp4") || c.endsWith(".webm") || c.endsWith(".ogg")) return "mp4";
        return "iframe";
    }

    /* ─── State ──────────────────────────────────────────────────── */

    let hlsInstance = null;
    let syncTimer   = null;
    let activeUrl   = null;
    let activeSlot  = null;

    /* ─── DOM refs (set after DOMContentLoaded) ───────────────────── */

    let vid, frameMover, iframe, overlay, slotLabelEl, slotCdEl,
        errEl, spinner, shield;

    /* ─── Helpers ─────────────────────────────────────────────────── */

    function showErr(msg) { errEl.textContent = msg; errEl.style.display = "block"; }
    function clearErr()   { errEl.textContent = "";  errEl.style.display = "none"; }
    function showSpin()   { spinner.classList.add('show'); }
    function hideSpin()   { spinner.classList.remove('show'); }

    function clearSync() {
        if (syncTimer) { clearInterval(syncTimer); syncTimer = null; }
    }

    function tearDown() {
        clearSync();
        if (hlsInstance) { hlsInstance.destroy(); hlsInstance = null; }
        vid.pause();
        vid.removeAttribute('src');
        vid.load();                        // abort any pending fetch
        vid.style.display  = "none";
        frameMover.style.display = "none";
        iframe.src = "about:blank";
        clearErr();
    }

    /* ─── Seek & play helper — waits for seekable then starts ─────── */

    function seekAndPlay(targetSecs) {
        // Clamp to duration if known
        const dur = isFinite(vid.duration) ? vid.duration : Infinity;
        const t   = Math.min(targetSecs, dur - 0.5);

        return new Promise(resolve => {
            const doSeek = () => {
                vid.currentTime = t;
                // Some browsers fire 'seeked', others just update immediately
                const onSeeked = () => {
                    vid.removeEventListener('seeked', onSeeked);
                    resolve();
                };
                vid.addEventListener('seeked', onSeeked);
                // Fallback — resolve after 300ms even if seeked never fires
                setTimeout(() => { vid.removeEventListener('seeked', onSeeked); resolve(); }, 300);
            };

            if (vid.readyState >= 1) {          // HAVE_METADATA or better
                doSeek();
            } else {
                vid.addEventListener('loadedmetadata', doSeek, { once: true });
            }
        });
    }

    /* ─── MP4 pseudo-live loader ──────────────────────────────────── */

    async function loadMP4(slot) {
        showSpin();
        vid.style.display = "block";
        vid.src  = slot.url;
        vid.load();

        // Wait for metadata so we know duration
        await new Promise(resolve => {
            if (vid.readyState >= 1) { resolve(); return; }
            vid.addEventListener('loadedmetadata', resolve, { once: true });
            vid.addEventListener('error', resolve, { once: true });  // don't hang
        });

        if (vid.error) { showErr("Video failed to load."); hideSpin(); return; }

        // Calculate exact position right now
        const target = slotOffset(slot);
        await seekAndPlay(target);

        vid.muted = false;
        vid.volume = 1;
        vid.play().catch(() => {});
        hideSpin();

        // Continuous drift correction — re-sync every SYNC_INTERVAL ms
        syncTimer = setInterval(() => {
            if (!activeSlot || detectType(activeSlot.url) !== "mp4") return;
            const expected = slotOffset(activeSlot);
            const drift    = Math.abs(vid.currentTime - expected);
            if (drift > DRIFT_TOLERANCE) {
                vid.currentTime = expected;
            }
        }, SYNC_INTERVAL);
    }

    /* ─── HLS loader (always live edge) ──────────────────────────── */

    function loadHLS(url) {
        showSpin();
        vid.style.display = "block";

        const onReady = () => {
            // Snap to live edge
            try {
                if (isFinite(vid.duration)) vid.currentTime = vid.duration;
            } catch (_) {}
            vid.muted  = false;
            vid.volume = 1;
            vid.play().catch(() => {});
            hideSpin();
        };

        if (Hls.isSupported()) {
            hlsInstance = new Hls({
                enableWorker             : true,
                liveSyncDurationCount    : 1,
                liveMaxLatencyDurationCount: 2,
                maxBufferLength          : 10
            });
            hlsInstance.loadSource(url);
            hlsInstance.attachMedia(vid);
            hlsInstance.on(Hls.Events.MANIFEST_PARSED, onReady);
            hlsInstance.on(Hls.Events.ERROR, (_, d) => {
                if (d.fatal) showErr("Stream error: " + d.type);
            });
        } else if (vid.canPlayType('application/vnd.apple.mpegurl')) {
            vid.src = url;
            vid.addEventListener('loadedmetadata', onReady, { once: true });
        } else {
            showErr("HLS not supported on this browser.");
        }
    }

    /* ─── Activate slot ───────────────────────────────────────────── */

    function activateSlot(slot) {
        tearDown();
        activeSlot = slot;
        const type = detectType(slot.url);

        if (type === "hls") {
            loadHLS(slot.url);
        } else if (type === "mp4") {
            loadMP4(slot);
        } else if (type === "iframe") {
            frameMover.style.display = "block";
            iframe.src = slot.url;
        } else {
            showErr("No valid URL for this time slot.");
        }
    }

    /* ─── Load slot with optional 3-s countdown overlay ──────────── */

    function loadSlot(slot, animate) {
        if (slot.url === activeUrl) return;
        activeUrl = slot.url;

        if (!animate) { activateSlot(slot); return; }

        overlay.classList.add('show');
        slotLabelEl.textContent = slot.label || "Switching…";
        let secs = 3;
        slotCdEl.textContent = secs + "s";

        const cd = setInterval(() => {
            secs--;
            if (secs > 0) {
                slotCdEl.textContent = secs + "s";
            } else {
                clearInterval(cd);
                activateSlot(slot);
                setTimeout(() => overlay.classList.remove('show'), 400);
            }
        }, 1000);
    }

    /* ─── Boot ────────────────────────────────────────────────────── */

    document.addEventListener("DOMContentLoaded", () => {
        vid         = document.getElementById('videoEl');
        frameMover  = document.getElementById('frameMover');
        iframe      = document.getElementById('captureFrame');
        overlay     = document.getElementById('slotOverlay');
        slotLabelEl = document.getElementById('slotLabel');
        slotCdEl    = document.getElementById('slotCountdown');
        errEl       = document.getElementById('errorMsg');
        spinner     = document.getElementById('spinner');
        shield      = document.getElementById('shield');

        // Load current slot immediately — no animation on first load
        loadSlot(currentSlot(), false);

        // Poll for slot changes
        setInterval(() => {
            const s = currentSlot();
            if (s.url !== activeUrl) loadSlot(s, true);
        }, CHECK_INTERVAL);

        // Shield absorbs all taps — video never receives pointer events
        shield.addEventListener('pointerdown', e => e.preventDefault());
        shield.addEventListener('click', e => e.preventDefault());

        // First tap → unmute (browser autoplay policy workaround)
        shield.addEventListener('click', () => {
            if (vid.muted) { vid.muted = false; vid.volume = 1; }
        }, { once: true });

        // If browser pauses the video for any reason, restart it
        vid.addEventListener('pause', () => {
            if (!vid.ended && activeSlot && detectType(activeSlot.url) !== "iframe") {
                vid.play().catch(() => {});
            }
        });

        // Re-sync after coming back from background / tab switch
        document.addEventListener('visibilitychange', () => {
            if (document.visibilityState === 'visible' && activeSlot) {
                const type = detectType(activeSlot.url);
                if (type === "mp4") {
                    const target = slotOffset(activeSlot);
                    vid.currentTime = target;
                    vid.play().catch(() => {});
                } else if (type === "hls") {
                    try { if (isFinite(vid.duration)) vid.currentTime = vid.duration; } catch (_) {}
                    vid.play().catch(() => {});
                }
            }
        });
    });

})();
</script>
</body>
</html>
