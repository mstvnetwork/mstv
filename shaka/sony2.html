<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sony TV HD - Mobile Stream</title>

    <!-- HLS.js for m3u8 playback -->
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>

    <!-- x-frame-bypass for iframe capture -->
    <script src="https://unpkg.com/x-frame-bypass"></script>

    <style>
        :root { --primary: #00ffA0; }
        body, html {
            margin: 0; padding: 0;
            width: 100%; height: 100%;
            background: #000;
            display: flex; align-items: center; justify-content: center;
            overflow: hidden;
        }

        .viewport {
            width: 100vw; max-width: 1000px; aspect-ratio: 16 / 9;
            overflow: hidden; position: relative;
            border: 4px solid var(--primary); border-radius: 12px;
            background: #000;
        }

        /* Iframe mode wrapper */
        #frameMover {
            position: absolute; width: 100%; height: 270%; top: -97px; left: 0%;
            display: none;
        }

        #captureFrame {
            width: 100%;
            height: 100%;
            border: none;
        }

        /* Native video player (mp4 / m3u8) */
        #nativePlayer {
            display: none;
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: #000;
            z-index: 5;
        }

        #nativePlayer video {
            width: 100%;
            height: 100%;
            object-fit: contain;
            outline: none;
        }

        /* Error message */
        #errorMsg {
            display: none;
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            color: #ff4444;
            font-family: sans-serif;
            font-size: 14px;
            text-align: center;
            z-index: 20;
            padding: 12px 20px;
            background: rgba(0,0,0,0.7);
            border-radius: 8px;
            border: 1px solid #ff4444;
        }

        #lockLayer {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            z-index: 9999;
            background: rgba(0,0,0,0.01);
            pointer-events: none;
            cursor: pointer;
        }

        #lockLayer.active {
            pointer-events: all !important;
            cursor: default;
        }

        .click-hint {
            position: absolute; bottom: 60px; right: 15px;
            color: var(--primary);
            font-family: sans-serif;
            font-size: 12px;
            z-index: 10000;
            pointer-events: none;
            opacity: 0.7;
        }

        #resetBtn {
            position: fixed; bottom: 12px; right: 12px;
            padding: 8px 15px;
            background: rgba(0, 255, 160, 0.15);
            color: #00ffa0;
            border: 1px solid rgba(0, 255, 160, 0.6);
            border-radius: 30px;
            font-family: sans-serif;
            font-size: 14px;
            backdrop-filter: blur(10px);
            cursor: pointer;
            z-index: 10002;
        }

        #ticker {
            position: absolute; top: 0px; left: 0;
            width: 100%; background: transparent;
            overflow: hidden; white-space: nowrap;
            z-index: 10000; padding: 11px 0;
        }

        #ticker span {
            display: inline-block; padding-left: 100%;
            animation: scroll 15s linear infinite;
            color: #ff3b3b; font-family: sans-serif; font-size: 14px;
        }

        @keyframes scroll {
            0% { transform: translateX(0); }
            100% { transform: translateX(-100%); }
        }

        #fallback {
            display: none; text-align: center; color: #fff; font-family: sans-serif;
        }

        /* Slot transition overlay */
        #slotOverlay {
            display: none;
            position: absolute;
            inset: 0;
            background: #000;
            z-index: 8000;
            align-items: center;
            justify-content: center;
            flex-direction: column;
            gap: 10px;
        }

        #slotOverlay.show {
            display: flex;
        }

        #slotLabel {
            color: var(--primary);
            font-family: sans-serif;
            font-size: 15px;
            letter-spacing: 1px;
            opacity: 0.85;
        }

        #slotCountdown {
            color: #fff;
            font-family: monospace;
            font-size: 12px;
            opacity: 0.5;
        }
    </style>
</head>
<body>

<!-- Mobile Viewer -->
<div class="viewport" id="playerWrapper">
    <div id="lockLayer"></div>

    <!-- Ticker -->
    <div id="ticker"><span> Click play button 3-4 times.  अगर क्लिक न हो तो रिफ्रेश बटन दबाएं। </span></div>

    <div id="status" class="click-hint"></div>
    <button id="resetBtn" onclick="location.reload()">Refresh</button>

    <!-- Error display -->
    <div id="errorMsg"></div>

    <!-- Slot transition overlay -->
    <div id="slotOverlay">
        <div id="slotLabel">Loading next stream…</div>
        <div id="slotCountdown"></div>
    </div>

    <!-- Native Video Player (mp4 / m3u8) -->
    <div id="nativePlayer">
        <video id="videoEl" controls autoplay playsinline></video>
    </div>

    <!-- Iframe Player -->
    <div id="frameMover">
        <iframe id="captureFrame"
                is="x-frame-bypass"
                src=""
                scrolling="no">
        </iframe>
    </div>
</div>

<!-- Non-Mobile Fallback -->
<div id="fallback">
    <h2>Mobile Device Required</h2>
    <p>Please open this page on Android or iOS to view the stream.</p>
</div>

<script>
// ═══════════════════════════════════════════════════════════════════════
//  ★  PLAYLIST  —  Add / edit your scheduled streams here  ★
//
//  Each entry:
//    label  : Name shown briefly when switching (optional but helpful)
//    url    : Stream URL — supports .m3u8 (HLS), .mp4/.webm, or any
//             embed/iframe page URL. Mix types freely.
//    start  : "HH:MM"  24-hour local time this slot begins
//    end    : "HH:MM"  24-hour local time this slot ends
//
//  Rules:
//   • Times are the viewer's LOCAL device time.
//   • Slots must NOT overlap.
//   • If the current time matches no slot, the LAST entry is used
//     as a fallback — make it a wide catch-all (e.g. 00:00–23:59).
//   • You can have as many slots as you like.
// ═══════════════════════════════════════════════════════════════════════

const PLAYLIST = [
    {
        label : "WWE Raw",
        url   : "https://streaming.disk.yandex.net/hls/U2FsdGVkX1_pHguN95e-sI9peZygUm0w0wR1QKqB2ftJn58_27x2AzW8RzFZKu-qASep5HGrwYxV6u_jzPsjOft9FleSZhlis-P9P4LX86DDYNdD4Cbid6jyoDAvvEiEH1eFvev1k6sJZGF0ytehlajorg2TuBDX20o7iaAX5Q52I8loVjQyvZdPwzGzXm2c8zNkMdlzxlTbBnGfDhX7tnBBS6hRxw713ytZGUQEwjPfjzOVbtG2oEAREvTqPV4g2zqEDfkdcxKNS5XB1zNGKbLcdO3uFVBqsSnGEc1Kx3BNLxiEgZoQrhOOE_zewhQj4PH04CUu93R5XNHZk9PBGWPTiNTn_Y6BD4FaSt8OKSQ/650fd6df17a90/87fbf8aea7b478c5b43fd48d149aecc3584a783a71353407a1dc4b9374dadeaa/master-playlist.m3u8",
        start : "23:00",
        end   : "04:00"
    },
    {
        label : "Midday Block",
        url   : "https://example.com/midday/clip.mp4",
        start : "10:00",
        end   : "14:00"
    },
    {
        label : "Afternoon Live",
        url   : "https://example.com/embed/afternoon-player",
        start : "14:00",
        end   : "20:00"
    },
    {
        label : "Night Stream",
        url   : "https://example.com/night/stream.m3u8",
        start : "20:00",
        end   : "23:59"
    },
    // ── Catch-all fallback (covers any time not matched above) ──
    {
        label : "Default Stream",
        url   : "https://example.com/default/stream.m3u8",
        start : "00:00",
        end   : "06:00"
    }
];

// How often to check if the slot should change (milliseconds)
const CHECK_INTERVAL = 30_000; // 30 seconds

// ═══════════════════════════════════════════════════════════════════════

(function () {

    /* ── Device guard ── */
    function isAllowedDevice() {
        const ua = navigator.userAgent || navigator.vendor || window.opera;
        return /iPhone|iPad|iPod|Android/i.test(ua);
    }

    if (!isAllowedDevice()) {
        document.addEventListener("DOMContentLoaded", function () {
            const wrapper = document.getElementById('playerWrapper');
            const fallback = document.getElementById('fallback');
            if (wrapper) wrapper.remove();
            if (fallback) fallback.style.display = 'block';
        });
        return;
    }

    /* ── Utilities ── */
    function detectType(url) {
        if (!url || url.trim() === "") return "none";
        const clean = url.split("?")[0].toLowerCase();
        if (clean.endsWith(".m3u8")) return "hls";
        if (clean.endsWith(".mp4") || clean.endsWith(".webm") || clean.endsWith(".ogg")) return "mp4";
        return "iframe";
    }

    function toMinutes(hhmm) {
        const [h, m] = hhmm.split(":").map(Number);
        return h * 60 + m;
    }

    function nowMinutes() {
        const d = new Date();
        return d.getHours() * 60 + d.getMinutes();
    }

    function currentSlot() {
        const now = nowMinutes();
        for (const slot of PLAYLIST) {
            const s = toMinutes(slot.start);
            const e = toMinutes(slot.end);
            // Normal same-day range
            if (s <= e) {
                if (now >= s && now < e) return slot;
            } else {
                // Overnight wrap e.g. 22:00–02:00
                if (now >= s || now < e) return slot;
            }
        }
        // Fallback: last entry
        return PLAYLIST[PLAYLIST.length - 1];
    }

    /* ── HLS ── */
    let hlsInstance = null;

    function loadHLS(url, videoEl, errorEl) {
        if (hlsInstance) { hlsInstance.destroy(); hlsInstance = null; }
        if (Hls.isSupported()) {
            hlsInstance = new Hls({ enableWorker: true });
            hlsInstance.loadSource(url);
            hlsInstance.attachMedia(videoEl);
            hlsInstance.on(Hls.Events.MANIFEST_PARSED, () => videoEl.play().catch(() => {}));
            hlsInstance.on(Hls.Events.ERROR, (_, data) => {
                if (data.fatal) showError(errorEl, "HLS error: " + data.details);
            });
        } else if (videoEl.canPlayType('application/vnd.apple.mpegurl')) {
            videoEl.src = url;
            videoEl.play().catch(() => {});
        } else {
            showError(errorEl, "HLS not supported on this browser.");
        }
    }

    function loadMP4(url, videoEl, errorEl) {
        videoEl.src = url;
        videoEl.play().catch(() => {});
        videoEl.onerror = () => showError(errorEl, "Video failed to load. Check the URL.");
    }

    function showError(el, msg) { el.textContent = msg; el.style.display = "block"; }
    function clearError(el)     { el.textContent = "";  el.style.display = "none"; }

    /* ── Main ── */
    document.addEventListener("DOMContentLoaded", function () {
        const wrapper      = document.getElementById('playerWrapper');
        const shield       = document.getElementById('lockLayer');
        const status       = document.getElementById('status');
        const errorEl      = document.getElementById('errorMsg');
        const nativeWrap   = document.getElementById('nativePlayer');
        const videoEl      = document.getElementById('videoEl');
        const frameMover   = document.getElementById('frameMover');
        const iframe       = document.getElementById('captureFrame');
        const overlay      = document.getElementById('slotOverlay');
        const slotLabelEl  = document.getElementById('slotLabel');
        const slotCdEl     = document.getElementById('slotCountdown');

        let activeUrl = null;

        /* ── Activate a slot immediately ── */
        function activateSlot(slot) {
            const type = detectType(slot.url);
            clearError(errorEl);

            // Tear down previous players
            nativeWrap.style.display = "none";
            frameMover.style.display = "none";
            if (hlsInstance) { hlsInstance.destroy(); hlsInstance = null; }
            videoEl.pause();
            videoEl.removeAttribute('src');
            iframe.src = "";

            if (type === "hls") {
                nativeWrap.style.display = "block";
                loadHLS(slot.url, videoEl, errorEl);
            } else if (type === "mp4") {
                nativeWrap.style.display = "block";
                loadMP4(slot.url, videoEl, errorEl);
            } else if (type === "iframe") {
                frameMover.style.display = "block";
                iframe.src = slot.url;
            } else {
                showError(errorEl, "No valid URL configured for this time slot.");
            }
        }

        /* ── Load slot, with optional 3-second countdown overlay ── */
        function loadSlot(slot, animate) {
            if (slot.url === activeUrl) return;
            activeUrl = slot.url;

            if (!animate) {
                activateSlot(slot);
                return;
            }

            // Show transition overlay with countdown
            overlay.classList.add('show');
            slotLabelEl.textContent = slot.label ? "▶  " + slot.label : "Switching stream…";

            let secs = 3;
            slotCdEl.textContent = "Starting in " + secs + "s";

            const cd = setInterval(() => {
                secs--;
                if (secs > 0) {
                    slotCdEl.textContent = "Starting in " + secs + "s";
                } else {
                    clearInterval(cd);
                    activateSlot(slot);
                    setTimeout(() => overlay.classList.remove('show'), 600);
                }
            }, 1000);
        }

        // Boot: load current slot immediately (no animation)
        loadSlot(currentSlot(), false);

        // Poll for slot changes
        setInterval(() => {
            const slot = currentSlot();
            if (slot.url !== activeUrl) loadSlot(slot, true);
        }, CHECK_INTERVAL);

        /* ── Click-to-lock (iframe mode only) ── */
        let clickCount = 0;
        const maxClicks = 4;
        let locked = false;

        function lockPlayer() {
            shield.classList.add('active');
            status.innerText = "CONTROLS LOCKED";
            locked = true;
            setTimeout(() => { status.style.opacity = "0"; }, 3000);
        }

        wrapper.addEventListener('click', function () {
            if (locked) return;
            if (detectType(activeUrl) !== "iframe") return;
            clickCount++;
            const remaining = maxClicks - clickCount;
            if (remaining > 0) status.innerText = `Setup Mode: ${remaining} clicks left`;
            if (clickCount >= maxClicks) lockPlayer();
        });

        setTimeout(() => {
            if (!locked && detectType(activeUrl) === "iframe") lockPlayer();
        }, 500000);
    });

})();
</script>
</body>
</html>
