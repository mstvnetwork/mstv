
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Video Test Player</title>
    <style>
        body {
            background-color: #121212;
            color: white;
            font-family: sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
        }
        .player-container {
            width: 90%;
            max-width: 800px;
            background: #000;
            border-radius: 8px;
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            /* Standard 16:9 Aspect Ratio */
            position: relative;
            padding-bottom: 56.25%; 
            height: 0;
        }
        iframe {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border: none;
        }
        .info {
            margin-top: 20px;
            text-align: center;
        }
    </style>
</head>
<body>

    <div class="player-container">
        <!-- The Player URL you extracted from the console -->
        <iframe 
            src="https://mediagraming.com" 
            allowfullscreen 
            scrolling="no">
        </iframe>
    </div>

    <div class="info">
        <h3>Embedded Spark/Hola Player</h3>
        <p>Testing direct playback via mediagraming.com wrapper.</p>
    </div>

</body>
</html>
