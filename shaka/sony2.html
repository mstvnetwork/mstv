<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stream Player</title>
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
    <script src="https://unpkg.com/x-frame-bypass"></script>
    <style>
        *, *::before, *::after { box-sizing: border-box; }

        body, html {
            margin: 0; padding: 0;
            width: 100%; height: 100%;
            background: #000;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        .viewport {
            width: 100vw;
            max-width: 1000px;
            aspect-ratio: 16 / 9;
            position: relative;
            background: #000;
            overflow: hidden;
        }

        #frameMover {
            display: none;
            position: absolute;
            width: 100%; height: 270%;
            top: -97px; left: 0;
        }

        #captureFrame {
            width: 100%; height: 100%;
            border: none;
            pointer-events: none;
        }

        #videoEl {
            display: none;
            position: absolute;
            inset: 0;
            width: 100%; height: 100%;
            object-fit: contain;
            background: #000;
            z-index: 5;
        }

        #videoEl::-webkit-media-controls,
        #videoEl::-webkit-media-controls-enclosure,
        #videoEl::-webkit-media-controls-panel { display: none !important; }

        /* Slot transition */
        #slotOverlay {
            display: none;
            position: absolute;
            inset: 0;
            background: #000;
            z-index: 8000;
            align-items: center;
            justify-content: center;
            flex-direction: column;
            gap: 8px;
        }
        #slotOverlay.show { display: flex; }
        #slotLabel {
            color: #fff; font-family: sans-serif;
            font-size: 14px; opacity: 0.65; letter-spacing: 0.5px;
        }
        #slotCountdown {
            color: #fff; font-family: monospace;
            font-size: 11px; opacity: 0.3;
        }

        /* Spinner */
        #spinner {
            display: none;
            position: absolute;
            inset: 0; z-index: 100;
            align-items: center;
            justify-content: center;
            background: #000;
        }
        #spinner.show { display: flex; }
        #spinner::after {
            content: "";
            width: 36px; height: 36px;
            border: 3px solid rgba(255,255,255,0.1);
            border-top-color: rgba(255,255,255,0.5);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        /* Error */
        #errorMsg {
            display: none;
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            color: rgba(255,80,80,0.9);
            font-family: sans-serif; font-size: 13px;
            text-align: center; z-index: 200;
            padding: 10px 18px;
            background: rgba(0,0,0,0.75);
            border-radius: 6px;
        }

        /* Shield — blocks taps reaching the video */
        #shield {
            position: absolute;
            inset: 0; z-index: 9999;
            background: transparent;
        }
    </style>
</head>
<body>

<div class="viewport" id="playerWrapper">
    <div id="shield"></div>
    <div id="spinner"></div>
    <div id="errorMsg"></div>

    <div id="slotOverlay">
        <div id="slotLabel"></div>
        <div id="slotCountdown"></div>
    </div>

    <video id="videoEl" autoplay playsinline></video>

    <div id="frameMover">
        <iframe id="captureFrame" is="x-frame-bypass" src="" scrolling="no"></iframe>
    </div>
</div>

<script>
// ═══════════════════════════════════════════════════════════════════════
//  ★  PLAYLIST  ★
//
//  url      : .m3u8 / .mp4 / .webm / iframe embed page URL
//  start    : "HH:MM"  UTC time this slot begins
//  end      : "HH:MM"  UTC time this slot ends
//  duration : seconds — REQUIRED for mp4/webm so the player knows
//             where in the file every viewer should be right now.
//             Set 0 or omit for HLS/iframe slots.
//  label    : shown during slot-switch animation (optional)
// ═══════════════════════════════════════════════════════════════════════

const PLAYLIST = [
    {
        label    : "Morning Show",
        url      : "https://tmstr1.neonhorizonworkshops.com/pl/H4sIAAAAAAAAAwXB7XqCIBgA0FsiwMr9Ww38aOEMXkz_hdhTKtmHm8bV7xy7XJnliuClDexq0axPNKhrisyZBsaEBn9kuh9r96I7simF18ygZNaQ_oCzD9FykiPmpe._mi4sVTRvm9ZOEGlsGJsUSkfh0nsOAcmAUdGKMYv3k2g1SMWHvNB9VgRx5btJ3j6RwWIyPGUluc_G8au5CW5RMMubXtTbEe379FkSS2005rLLfQa9rDjzh_hyMu_wtzpy0QDCgEXRcP3IoPOK90RCcAV9eVQ4zSRGc4nS4XRkzyZKqPRclO_1BJ0eoE3.lN5cZZs8FbJdHQ.zimv6Te7v3NmdKcY9uENrty9vnFaVR.E_gXGs_0EBAAA-/master.m3u8",
        start    : "16:00",
        end      : "21:50",
        duration : 20000
    },
    // Add more slots here…
    // {
    //     label    : "Afternoon Block",
    //     url      : "https://example.com/video.mp4",
    //     start    : "15:58",
    //     end      : "20:00",
    //     duration : 7200
    // },
];

const CHECK_INTERVAL  = 15_000;  // how often to check for slot change (ms)
const DRIFT_TOLERANCE = 1.5;     // seconds of allowed drift before re-seek (mp4)
const SYNC_INTERVAL   = 2_000;   // drift-check frequency (ms)

// ═══════════════════════════════════════════════════════════════════════

(function () {

    /* ─── UTC time helpers ──────────────────────────────────────────── */

    function utcNowSecs() {
        const d = new Date();
        return d.getUTCHours() * 3600
             + d.getUTCMinutes() * 60
             + d.getUTCSeconds()
             + d.getUTCMilliseconds() / 1000;
    }

    function utcNowMins() {
        const d = new Date();
        return d.getUTCHours() * 60 + d.getUTCMinutes();
    }

    function toSecs(hhmm) {
        const [h, m] = hhmm.split(":").map(Number);
        return h * 3600 + m * 60;
    }

    function toMins(hhmm) {
        const [h, m] = hhmm.split(":").map(Number);
        return h * 60 + m;
    }

    // How many seconds into the slot file should we be right now?
    function slotOffset(slot) {
        let elapsed = utcNowSecs() - toSecs(slot.start);
        if (elapsed < 0) elapsed += 86400;                  // overnight wrap
        if (slot.duration > 0) elapsed = elapsed % slot.duration; // loop
        return elapsed;
    }

    function currentSlot() {
        const now = utcNowMins();
        for (const slot of PLAYLIST) {
            const s = toMins(slot.start), e = toMins(slot.end);
            const match = s <= e
                ? (now >= s && now < e)
                : (now >= s || now < e);                    // overnight wrap
            if (match) return slot;
        }
        return PLAYLIST[PLAYLIST.length - 1];               // fallback
    }

    function detectType(url) {
        if (!url) return "none";
        const c = url.split("?")[0].toLowerCase();
        if (c.endsWith(".m3u8")) return "hls";
        if (c.endsWith(".mp4") || c.endsWith(".webm") || c.endsWith(".ogg")) return "mp4";
        return "iframe";
    }

    /* ─── DOM refs ──────────────────────────────────────────────────── */

    let vid, frameMover, iframe, overlay, slotLabelEl, slotCdEl,
        errEl, spinner, shield;

    let hlsInstance = null;
    let syncTimer   = null;
    let activeUrl   = null;
    let activeSlot  = null;

    /* ─── Helpers ───────────────────────────────────────────────────── */

    const showErr  = msg => { errEl.textContent = msg; errEl.style.display = "block"; };
    const clearErr = ()  => { errEl.textContent = "";  errEl.style.display = "none"; };
    const showSpin = ()  => spinner.classList.add('show');
    const hideSpin = ()  => spinner.classList.remove('show');

    function clearSync() {
        if (syncTimer) { clearInterval(syncTimer); syncTimer = null; }
    }

    function tearDown() {
        clearSync();
        if (hlsInstance) { hlsInstance.destroy(); hlsInstance = null; }
        vid.pause();
        vid.removeAttribute('src');
        vid.load();
        vid.style.display        = "none";
        frameMover.style.display = "none";
        iframe.src               = "about:blank";
        clearErr();
        hideSpin();
    }

    /* ─── HLS: load and snap to live edge ──────────────────────────── */

    function loadHLS(url) {
        showSpin();
        vid.style.display = "block";

        const onReady = () => {
            hideSpin();
            // Jump to live edge
            if (isFinite(vid.duration) && vid.duration > 0) {
                vid.currentTime = vid.duration;
            }
            vid.play().catch(e => console.warn("play()", e));
        };

        if (Hls.isSupported()) {
            hlsInstance = new Hls({
                enableWorker                : true,
                liveSyncDurationCount       : 1,
                liveMaxLatencyDurationCount : 3,
                maxBufferLength             : 10,
            });
            hlsInstance.loadSource(url);
            hlsInstance.attachMedia(vid);
            hlsInstance.on(Hls.Events.MANIFEST_PARSED, onReady);
            hlsInstance.on(Hls.Events.ERROR, (_, d) => {
                if (d.fatal) {
                    showErr("Stream error — " + d.details);
                    console.error("HLS fatal", d);
                }
            });
        } else if (vid.canPlayType('application/vnd.apple.mpegurl')) {
            // Native HLS (Safari / iOS)
            vid.src = url;
            vid.addEventListener('loadedmetadata', onReady, { once: true });
        } else {
            showErr("HLS is not supported in this browser.");
        }
    }

    /* ─── MP4: seek to broadcast position before playing ───────────── */

    function loadMP4(slot) {
        showSpin();
        vid.style.display = "block";
        vid.src  = slot.url;
        vid.load();

        const onMeta = () => {
            hideSpin();
            const target = Math.min(slotOffset(slot), vid.duration - 0.5);
            vid.currentTime = target;

            const doPlay = () => {
                vid.play().catch(e => console.warn("play()", e));

                // Drift correction loop
                clearSync();
                syncTimer = setInterval(() => {
                    if (!activeSlot || detectType(activeSlot.url) !== "mp4") return;
                    const expected = Math.min(slotOffset(activeSlot), vid.duration - 0.5);
                    if (Math.abs(vid.currentTime - expected) > DRIFT_TOLERANCE) {
                        vid.currentTime = expected;
                    }
                }, SYNC_INTERVAL);
            };

            // Wait for seek to settle before playing
            vid.addEventListener('seeked', doPlay, { once: true });
            // Safety fallback if seeked never fires
            setTimeout(doPlay, 500);
        };

        vid.addEventListener('loadedmetadata', onMeta, { once: true });
        vid.addEventListener('error', () => {
            hideSpin();
            showErr("Video failed to load — check the URL.");
        }, { once: true });
    }

    /* ─── Activate slot ─────────────────────────────────────────────── */

    function activateSlot(slot) {
        tearDown();
        activeSlot = slot;
        const type = detectType(slot.url);

        if      (type === "hls")    loadHLS(slot.url);
        else if (type === "mp4")    loadMP4(slot);
        else if (type === "iframe") {
            frameMover.style.display = "block";
            iframe.src = slot.url;
        }
        else showErr("No valid URL for this time slot.");
    }

    /* ─── Load slot (with optional countdown overlay) ───────────────── */

    function loadSlot(slot, animate) {
        if (slot.url === activeUrl) return;
        activeUrl = slot.url;

        if (!animate) { activateSlot(slot); return; }

        overlay.classList.add('show');
        slotLabelEl.textContent = slot.label || "Switching…";
        let secs = 3;
        slotCdEl.textContent = secs + "s";

        const cd = setInterval(() => {
            secs--;
            if (secs > 0) {
                slotCdEl.textContent = secs + "s";
            } else {
                clearInterval(cd);
                activateSlot(slot);
                setTimeout(() => overlay.classList.remove('show'), 400);
            }
        }, 1000);
    }

    /* ─── Boot ──────────────────────────────────────────────────────── */

    document.addEventListener("DOMContentLoaded", () => {
        vid         = document.getElementById('videoEl');
        frameMover  = document.getElementById('frameMover');
        iframe      = document.getElementById('captureFrame');
        overlay     = document.getElementById('slotOverlay');
        slotLabelEl = document.getElementById('slotLabel');
        slotCdEl    = document.getElementById('slotCountdown');
        errEl       = document.getElementById('errorMsg');
        spinner     = document.getElementById('spinner');
        shield      = document.getElementById('shield');

        // Initial load — no animation
        loadSlot(currentSlot(), false);

        // Poll for slot changes
        setInterval(() => {
            const s = currentSlot();
            if (s.url !== activeUrl) loadSlot(s, true);
        }, CHECK_INTERVAL);

        // Shield absorbs taps so video can't be paused by touch
        shield.addEventListener('pointerdown', e => e.preventDefault());

        // Re-sync on tab focus (user backgrounded the tab)
        document.addEventListener('visibilitychange', () => {
            if (document.visibilityState !== 'visible' || !activeSlot) return;
            const type = detectType(activeSlot.url);
            if (type === "mp4") {
                vid.currentTime = Math.min(slotOffset(activeSlot), vid.duration - 0.5);
                vid.play().catch(() => {});
            } else if (type === "hls") {
                if (isFinite(vid.duration)) vid.currentTime = vid.duration;
                vid.play().catch(() => {});
            }
        });

        // If video pauses for any reason, restart it
        vid.addEventListener('pause', () => {
            if (!vid.ended && activeSlot && detectType(activeSlot.url) !== "iframe") {
                setTimeout(() => vid.play().catch(() => {}), 200);
            }
        });
    });

})();
</script>
</body>
</html>
