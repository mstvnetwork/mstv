<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sony TV HD - Mobile Stream</title>

    <!-- HLS.js for m3u8 playback -->
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>

    <!-- x-frame-bypass for iframe capture -->
    <script src="https://unpkg.com/x-frame-bypass"></script>

    <style>
        :root { --primary: #00ffA0; }
        body, html {
            margin: 0; padding: 0;
            width: 100%; height: 100%;
            background: #000;
            display: flex; align-items: center; justify-content: center;
            overflow: hidden;
        }

        .viewport {
            width: 100vw; max-width: 1000px; aspect-ratio: 16 / 9;
            overflow: hidden; position: relative;
            border: 4px solid var(--primary); border-radius: 12px;
            background: #000;
        }

        /* Iframe mode wrapper */
        #frameMover {
            position: absolute; width: 100%; height: 270%; top: -97px; left: 0%;
            display: none;
        }

        #captureFrame {
            width: 100%;
            height: 100%;
            border: none;
        }

        /* Native video player (mp4 / m3u8) */
        #nativePlayer {
            display: none;
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: #000;
            z-index: 5;
        }

        #nativePlayer video {
            width: 100%;
            height: 100%;
            object-fit: contain;
            outline: none;
        }

        /* Error message */
        #errorMsg {
            display: none;
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            color: #ff4444;
            font-family: sans-serif;
            font-size: 14px;
            text-align: center;
            z-index: 20;
            padding: 12px 20px;
            background: rgba(0,0,0,0.7);
            border-radius: 8px;
            border: 1px solid #ff4444;
        }

        #lockLayer {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            z-index: 9999;
            background: rgba(0,0,0,0.01);
            pointer-events: none;
            cursor: pointer;
        }

        #lockLayer.active {
            pointer-events: all !important;
            cursor: default;
        }

        .click-hint {
            position: absolute; bottom: 60px; right: 15px;
            color: var(--primary);
            font-family: sans-serif;
            font-size: 12px;
            z-index: 10000;
            pointer-events: none;
            opacity: 0.7;
        }

        #resetBtn {
            position: fixed; bottom: 12px; right: 12px;
            padding: 8px 15px;
            background: rgba(0, 255, 160, 0.15);
            color: #00ffa0;
            border: 1px solid rgba(0, 255, 160, 0.6);
            border-radius: 30px;
            font-family: sans-serif;
            font-size: 14px;
            backdrop-filter: blur(10px);
            cursor: pointer;
            z-index: 10002;
        }

        #ticker {
            position: absolute; top: 0px; left: 0;
            width: 100%; background: transparent;
            overflow: hidden; white-space: nowrap;
            z-index: 10000; padding: 11px 0;
        }

        #ticker span {
            display: inline-block; padding-left: 100%;
            animation: scroll 15s linear infinite;
            color: #ff3b3b; font-family: sans-serif; font-size: 14px;
        }

        @keyframes scroll {
            0% { transform: translateX(0); }
            100% { transform: translateX(-100%); }
        }

        #fallback {
            display: none; text-align: center; color: #fff; font-family: sans-serif;
        }

        /* Stream type badge */
        #typeBadge {
            position: absolute; top: 40px; left: 10px;
            color: var(--primary);
            font-family: monospace;
            font-size: 11px;
            z-index: 10001;
            opacity: 0.6;
            letter-spacing: 1px;
            pointer-events: none;
        }
    </style>
</head>
<body>

    <!-- Mobile Viewer -->
    <div class="viewport" id="playerWrapper">
        <div id="lockLayer"></div>

        <!-- Ticker -->
        <div id="ticker"><span> Click play button 3-4 times.  अगर क्लिक न हो तो रिफ्रेश बटन दबाएं। </span></div>

        <div id="status" class="click-hint"></div>
        <div id="typeBadge"></div>
        <button id="resetBtn" onclick="location.reload()">Refresh</button>

        <!-- Error display -->
        <div id="errorMsg"></div>

        <!-- Native Video Player (mp4 / m3u8) -->
        <div id="nativePlayer">
            <video id="videoEl" controls autoplay playsinline></video>
        </div>

        <!-- Iframe Player -->
        <div id="frameMover">
            <iframe id="captureFrame"
                    is="x-frame-bypass"
                    src=""
                    scrolling="no">
            </iframe>
        </div>
    </div>

    <!-- Non-Mobile Fallback -->
    <div id="fallback">
        <h2>Mobile Device Required</h2>
        <p>Please open this page on Android or iOS to view the stream.</p>
    </div>

<script>
// ─────────────────────────────────────────────
//  ★  SET YOUR STREAM URL HERE  ★
// ─────────────────────────────────────────────
const STREAM_URL = "https://streaming.disk.yandex.net/hls/U2FsdGVkX1_pHguN95e-sI9peZygUm0w0wR1QKqB2ftJn58_27x2AzW8RzFZKu-qASep5HGrwYxV6u_jzPsjOft9FleSZhlis-P9P4LX86DDYNdD4Cbid6jyoDAvvEiEH1eFvev1k6sJZGF0ytehlajorg2TuBDX20o7iaAX5Q52I8loVjQyvZdPwzGzXm2c8zNkMdlzxlTbBnGfDhX7tnBBS6hRxw713ytZGUQEwjPfjzOVbtG2oEAREvTqPV4g2zqEDfkdcxKNS5XB1zNGKbLcdO3uFVBqsSnGEc1Kx3BNLxiEgZoQrhOOE_zewhQj4PH04CUu93R5XNHZk9PBGWPTiNTn_Y6BD4FaSt8OKSQ/650fd6df17a90/87fbf8aea7b478c5b43fd48d149aecc3584a783a71353407a1dc4b9374dadeaa/master-playlist.m3u8";
// Examples:
//   m3u8 : "https://example.com/live/stream.m3u8"
//   mp4  : "https://example.com/video/clip.mp4"
//   page : "https://example.com/embed/player"
// ─────────────────────────────────────────────

(function () {

    /* ── Device guard ── */
    function isAllowedDevice() {
        const ua = navigator.userAgent || navigator.vendor || window.opera;
        return /iPhone|iPad|iPod|Android/i.test(ua);
    }

    if (!isAllowedDevice()) {
        document.addEventListener("DOMContentLoaded", function () {
            const wrapper = document.getElementById('playerWrapper');
            const fallback = document.getElementById('fallback');
            if (wrapper) wrapper.remove();
            if (fallback) fallback.style.display = 'block';
        });
        return;
    }

    /* ── URL type detection ── */
    function detectType(url) {
        if (!url || url.trim() === "") return "none";
        const clean = url.split("?")[0].toLowerCase();
        if (clean.endsWith(".m3u8")) return "hls";
        if (clean.endsWith(".mp4") || clean.endsWith(".webm") || clean.endsWith(".ogg")) return "mp4";
        return "iframe";
    }

    /* ── HLS loader ── */
    function loadHLS(url, videoEl, errorEl) {
        if (Hls.isSupported()) {
            const hls = new Hls({ enableWorker: true });
            hls.loadSource(url);
            hls.attachMedia(videoEl);
            hls.on(Hls.Events.MANIFEST_PARSED, () => videoEl.play().catch(() => {}));
            hls.on(Hls.Events.ERROR, (event, data) => {
                if (data.fatal) {
                    showError(errorEl, "HLS stream error: " + data.details);
                }
            });
        } else if (videoEl.canPlayType('application/vnd.apple.mpegurl')) {
            // Native HLS (Safari / iOS)
            videoEl.src = url;
            videoEl.play().catch(() => {});
        } else {
            showError(errorEl, "HLS not supported on this browser.");
        }
    }

    /* ── MP4 loader ── */
    function loadMP4(url, videoEl) {
        videoEl.src = url;
        videoEl.play().catch(() => {});
    }

    /* ── Error helper ── */
    function showError(el, msg) {
        el.textContent = msg;
        el.style.display = "block";
    }

    /* ── Main init ── */
    document.addEventListener("DOMContentLoaded", function () {
        const wrapper    = document.getElementById('playerWrapper');
        const shield     = document.getElementById('lockLayer');
        const status     = document.getElementById('status');
        const badge      = document.getElementById('typeBadge');
        const errorEl    = document.getElementById('errorMsg');
        const nativeWrap = document.getElementById('nativePlayer');
        const videoEl    = document.getElementById('videoEl');
        const frameMover = document.getElementById('frameMover');
        const iframe     = document.getElementById('captureFrame');

        const type = detectType(STREAM_URL);
        badge.textContent = type.toUpperCase();

        if (type === "hls") {
            nativeWrap.style.display = "block";
            loadHLS(STREAM_URL, videoEl, errorEl);

        } else if (type === "mp4") {
            nativeWrap.style.display = "block";
            loadMP4(STREAM_URL, videoEl);
            videoEl.addEventListener('error', () => showError(errorEl, "Video failed to load. Check the URL."));

        } else if (type === "iframe") {
            frameMover.style.display = "block";
            iframe.src = STREAM_URL;

        } else {
            showError(errorEl, "No stream URL configured. Set STREAM_URL in the script.");
        }

        /* ── Click-to-lock logic ── */
        let clickCount = 0;
        const maxClicks = 4;
        let locked = false;

        function lockPlayer() {
            shield.classList.add('active');
            status.innerText = "CONTROLS LOCKED";
            locked = true;
            setTimeout(() => { status.style.opacity = "0"; }, 3000);
        }

        // For native video: clicks shouldn't count toward the lock
        // Only apply click counting for iframe mode
        if (type === "iframe") {
            wrapper.addEventListener('click', function () {
                if (locked) return;
                clickCount++;
                let remaining = maxClicks - clickCount;
                if (remaining > 0) {
                    status.innerText = `Setup Mode: ${remaining} clicks left`;
                }
                if (clickCount >= maxClicks) lockPlayer();
            });
            setTimeout(lockPlayer, 500000);
        }
    });

})();
</script>
</body>
</html>
