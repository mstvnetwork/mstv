<!DOCTYPE html>
<html>
<head>
    <title>HLS Player</title>
</head>
<body>
    <video id="video" controls style="width: 100%; max-width: 800px;"></video>

    <!-- Load Hls.js from a CDN -->
    <script src="https://jsdelivr.net"></script>
    
    <script>
        var video = document.getElementById('video');
        var videoSrc = 'https://95.214.53.33/hls/,bdohxppu7bboxuzvta2p4cqxtz7tv2ibv5y7onvr7ebxxyd2dx6uaaob2nfa,.urlset/master.m3u8?__cpo=aHR0cHM6Ly9zMi52aWRlb2FwbmUudG8';

        if (Hls.isSupported()) {
            var hls = new Hls();
            hls.loadSource(videoSrc);
            hls.attachMedia(video);
        }
        // For browsers with native HLS support (like Safari)
        else if (video.canPlayType('application/vnd.apple.mpegurl')) {
            video.src = videoSrc;
        }
    </script>
</body>
</html>
