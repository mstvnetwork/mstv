<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stream Player</title>
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
    <script src="https://unpkg.com/x-frame-bypass"></script>
    <style>
        *, *::before, *::after { box-sizing: border-box; }

        body, html {
            margin: 0; padding: 0;
            width: 100%; height: 100%;
            background: #000;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        .viewport {
            width: 100vw;
            max-width: 1000px;
            aspect-ratio: 16 / 9;
            position: relative;
            background: #000;
            overflow: hidden;
        }

        /* ── Iframe player ── */
        #frameMover {
            display: none;
            position: absolute;
            width: 100%; height: 270%;
            top: -97px; left: 0;
            pointer-events: none; /* block interaction — live TV, no controls */
        }

        #captureFrame {
            width: 100%; height: 100%;
            border: none;
            pointer-events: none;
        }

        /* ── Native video — no controls, full coverage ── */
        #videoEl {
            display: none;
            position: absolute;
            inset: 0;
            width: 100%; height: 100%;
            object-fit: contain;
            background: #000;
            z-index: 5;
            /* Hide every browser's native control bar */
            -webkit-media-controls: none;
        }

        /* Extra rule to nuke controls on WebKit/Blink */
        #videoEl::-webkit-media-controls { display: none !important; }
        #videoEl::-webkit-media-controls-enclosure { display: none !important; }

        /* ── Slot transition overlay ── */
        #slotOverlay {
            display: none;
            position: absolute;
            inset: 0;
            background: #000;
            z-index: 8000;
            align-items: center;
            justify-content: center;
            flex-direction: column;
            gap: 8px;
        }

        #slotOverlay.show { display: flex; }

        #slotLabel {
            color: #fff;
            font-family: sans-serif;
            font-size: 14px;
            opacity: 0.65;
            letter-spacing: 0.5px;
        }

        #slotCountdown {
            color: #fff;
            font-family: monospace;
            font-size: 11px;
            opacity: 0.3;
        }

        /* ── Buffering spinner ── */
        #spinner {
            display: none;
            position: absolute;
            inset: 0;
            z-index: 100;
            align-items: center;
            justify-content: center;
            background: #000;
        }

        #spinner.show { display: flex; }

        #spinner::after {
            content: "";
            width: 36px; height: 36px;
            border: 3px solid rgba(255,255,255,0.1);
            border-top-color: rgba(255,255,255,0.55);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin { to { transform: rotate(360deg); } }

        /* ── Error ── */
        #errorMsg {
            display: none;
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            color: rgba(255,80,80,0.85);
            font-family: sans-serif;
            font-size: 13px;
            text-align: center;
            z-index: 200;
            padding: 10px 18px;
            background: rgba(0,0,0,0.75);
            border-radius: 6px;
        }

        /* ── Invisible interaction shield (prevents pause on tap) ── */
        #shield {
            position: absolute;
            inset: 0;
            z-index: 9999;
            background: transparent;
        }

        /* ── Fallback (non-mobile) ── */
        #fallback {
            display: none;
            color: #fff;
            font-family: sans-serif;
            text-align: center;
            padding: 20px;
        }
    </style>
</head>
<body>

<div class="viewport" id="playerWrapper">
    <div id="shield"></div>
    <div id="spinner"></div>
    <div id="errorMsg"></div>

    <div id="slotOverlay">
        <div id="slotLabel"></div>
        <div id="slotCountdown"></div>
    </div>

    <!-- Native video (HLS / MP4) — no controls attribute -->
    <video id="videoEl" autoplay playsinline muted></video>

    <!-- Iframe embed -->
    <div id="frameMover">
        <iframe id="captureFrame" is="x-frame-bypass" src="" scrolling="no"></iframe>
    </div>
</div>

<div id="fallback">
    <p>Please open on a mobile device to view the stream.</p>
</div>

<script>
// ═══════════════════════════════════════════════════════════════════════
//  ★  PLAYLIST  —  Scheduled broadcast schedule  ★
//
//  label    : shown briefly on slot switch (optional)
//  url      : .m3u8  /  .mp4 / .webm  /  embed iframe page URL
//  start    : "HH:MM"  UTC time this slot begins  ← uses UTC so ALL
//  end      : "HH:MM"  UTC time this slot ends       viewers are in sync
//
//  For MP4 slots the player calculates exactly how many seconds into
//  the file the current UTC time is, and seeks there — so late-joiners
//  see the same frame as everyone else, just like a TV broadcast.
//
//  • Slots must not overlap.
//  • The LAST entry is used as fallback if no slot matches.
// ═══════════════════════════════════════════════════════════════════════

const PLAYLIST = [
    {
        label    : "Morning Show",
        url      : "https://streaming.disk.yandex.net/hls/U2FsdGVkX1_pHguN95e-sI9peZygUm0w0wR1QKqB2ftJn58_27x2AzW8RzFZKu-qASep5HGrwYxV6u_jzPsjOft9FleSZhlis-P9P4LX86DDYNdD4Cbid6jyoDAvvEiEH1eFvev1k6sJZGF0ytehlajorg2TuBDX20o7iaAX5Q52I8loVjQyvZdPwzGzXm2c8zNkMdlzxlTbBnGfDhX7tnBBS6hRxw713ytZGUQEwjPfjzOVbtG2oEAREvTqPV4g2zqEDfkdcxKNS5XB1zNGKbLcdO3uFVBqsSnGEc1Kx3BNLxiEgZoQrhOOE_zewhQj4PH04CUu93R5XNHZk9PBGWPTiNTn_Y6BD4FaSt8OKSQ/650fd6df17a90/87fbf8aea7b478c5b43fd48d149aecc3584a783a71353407a1dc4b9374dadeaa/master-playlist.m3u8",
        start    : "15:00",   // UTC
        end      : "17:00"
    },
    {
        label    : "Midday Block",
        url      : "https://example.com/midday/clip.mp4",
        start    : "05:00",
        end      : "09:00"
    },
    {
        label    : "Afternoon Live",
        url      : "https://example.com/embed/afternoon-player",
        start    : "09:00",
        end      : "15:00"
    },
    {
        label    : "Night Stream",
        url      : "https://example.com/night/stream.m3u8",
        start    : "15:00",
        end      : "20:00"
    },
    // Catch-all fallback
    {
        label    : "Default Stream",
        url      : "https://example.com/default/stream.m3u8",
        start    : "20:00",
        end      : "01:00"
    }
];

// How often to check for slot change (ms)
const CHECK_INTERVAL = 20_000;

// Drift-correction: how often to re-sync MP4 position (ms)
// If viewer's currentTime drifts >DRIFT_TOLERANCE seconds, hard-seek back.
const SYNC_INTERVAL   = 5_000;
const DRIFT_TOLERANCE = 3; // seconds

// ═══════════════════════════════════════════════════════════════════════

(function () {

    /* ── Device guard ── */
    function isMobile() {
        return /iPhone|iPad|iPod|Android/i.test(navigator.userAgent || navigator.vendor || window.opera);
    }

    if (!isMobile()) {
        document.addEventListener("DOMContentLoaded", () => {
            document.getElementById('playerWrapper').remove();
            document.getElementById('fallback').style.display = 'block';
        });
        return;
    }

    /* ── Helpers ── */
    function detectType(url) {
        if (!url) return "none";
        const c = url.split("?")[0].toLowerCase();
        if (c.endsWith(".m3u8")) return "hls";
        if (c.endsWith(".mp4") || c.endsWith(".webm") || c.endsWith(".ogg")) return "mp4";
        return "iframe";
    }

    // UTC minutes since midnight
    function utcMins() {
        const d = new Date();
        return d.getUTCHours() * 60 + d.getUTCMinutes();
    }

    // UTC seconds since midnight
    function utcSecs() {
        const d = new Date();
        return d.getUTCHours() * 3600 + d.getUTCMinutes() * 60 + d.getUTCSeconds();
    }

    function toMins(hhmm) {
        const [h, m] = hhmm.split(":").map(Number);
        return h * 60 + m;
    }

    function toSecs(hhmm) {
        return toMins(hhmm) * 60;
    }

    function currentSlot() {
        const now = utcMins();
        for (const slot of PLAYLIST) {
            const s = toMins(slot.start), e = toMins(slot.end);
            if (s <= e ? (now >= s && now < e) : (now >= s || now < e)) return slot;
        }
        return PLAYLIST[PLAYLIST.length - 1];
    }

    // How many seconds into the current MP4 slot should we be right now?
    function slotOffsetSecs(slot) {
        const nowS  = utcSecs();
        const startS = toSecs(slot.start);
        let diff = nowS - startS;
        if (diff < 0) diff += 86400; // overnight wrap
        return diff;
    }

    function showErr(el, msg) { el.textContent = msg; el.style.display = "block"; }
    function clearErr(el)     { el.textContent = "";  el.style.display = "none"; }

    function showSpinner(el)  { el.classList.add('show'); }
    function hideSpinner(el)  { el.classList.remove('show'); }

    /* ── HLS loader ── */
    let hlsInstance  = null;
    let syncTimer    = null;

    function clearSyncTimer() {
        if (syncTimer) { clearInterval(syncTimer); syncTimer = null; }
    }

    function loadHLS(url, vid, spinner, errEl) {
        showSpinner(spinner);
        if (hlsInstance) { hlsInstance.destroy(); hlsInstance = null; }

        const startLive = () => {
            // For HLS: jump to live edge
            if (vid.duration && isFinite(vid.duration)) {
                vid.currentTime = vid.duration;
            }
            vid.play().catch(() => {});
            hideSpinner(spinner);
        };

        if (Hls.isSupported()) {
            hlsInstance = new Hls({
                enableWorker  : true,
                liveSyncDurationCount: 1,   // stay at live edge
                liveMaxLatencyDurationCount: 3
            });
            hlsInstance.loadSource(url);
            hlsInstance.attachMedia(vid);
            hlsInstance.on(Hls.Events.MANIFEST_PARSED, startLive);
            hlsInstance.on(Hls.Events.ERROR, (_, d) => {
                if (d.fatal) showErr(errEl, "Stream error: " + d.details);
            });
        } else if (vid.canPlayType('application/vnd.apple.mpegurl')) {
            // Native HLS (Safari / iOS)
            vid.src = url;
            vid.addEventListener('loadedmetadata', startLive, { once: true });
        } else {
            showErr(errEl, "HLS not supported on this browser.");
        }
    }

    // Load MP4 and seek to the correct broadcast position based on UTC clock
    function loadMP4(slot, vid, spinner, errEl) {
        showSpinner(spinner);
        clearSyncTimer();

        vid.src = slot.url;
        vid.load();

        vid.addEventListener('loadedmetadata', () => {
            const offset = slotOffsetSecs(slot);
            // Clamp to video duration
            const target = Math.min(offset, vid.duration - 1);
            vid.currentTime = target;
            vid.play().catch(() => {});
            hideSpinner(spinner);

            // Periodic drift correction
            syncTimer = setInterval(() => {
                const expected = slotOffsetSecs(slot);
                const actual   = vid.currentTime;
                const drift    = Math.abs(expected - actual);
                if (drift > DRIFT_TOLERANCE) {
                    vid.currentTime = Math.min(expected, vid.duration - 1);
                }
            }, SYNC_INTERVAL);

        }, { once: true });

        vid.onerror = () => showErr(errEl, "Video failed to load.");
    }

    /* ── Main ── */
    document.addEventListener("DOMContentLoaded", () => {
        const vid         = document.getElementById('videoEl');
        const frameMover  = document.getElementById('frameMover');
        const iframe      = document.getElementById('captureFrame');
        const overlay     = document.getElementById('slotOverlay');
        const slotLabelEl = document.getElementById('slotLabel');
        const slotCdEl    = document.getElementById('slotCountdown');
        const errEl       = document.getElementById('errorMsg');
        const spinner     = document.getElementById('spinner');

        let activeUrl = null;
        let activeSlot = null;

        /* ── Tear down current players ── */
        function tearDown() {
            clearSyncTimer();
            if (hlsInstance) { hlsInstance.destroy(); hlsInstance = null; }
            vid.pause();
            vid.removeAttribute('src');
            vid.style.display = "none";
            iframe.src = "";
            frameMover.style.display = "none";
            clearErr(errEl);
        }

        /* ── Activate a slot ── */
        function activateSlot(slot) {
            tearDown();
            activeSlot = slot;
            const type = detectType(slot.url);

            if (type === "hls") {
                vid.style.display = "block";
                loadHLS(slot.url, vid, spinner, errEl);

            } else if (type === "mp4") {
                vid.style.display = "block";
                loadMP4(slot, vid, spinner, errEl);

            } else if (type === "iframe") {
                frameMover.style.display = "block";
                iframe.src = slot.url;

            } else {
                showErr(errEl, "No valid URL for this time slot.");
            }
        }

        /* ── Load slot with optional animated transition ── */
        function loadSlot(slot, animate) {
            if (slot.url === activeUrl) return;
            activeUrl = slot.url;

            if (!animate) { activateSlot(slot); return; }

            overlay.classList.add('show');
            slotLabelEl.textContent = slot.label || "Switching…";
            let secs = 3;
            slotCdEl.textContent = secs + "s";

            const cd = setInterval(() => {
                secs--;
                if (secs > 0) {
                    slotCdEl.textContent = secs + "s";
                } else {
                    clearInterval(cd);
                    activateSlot(slot);
                    setTimeout(() => overlay.classList.remove('show'), 400);
                }
            }, 1000);
        }

        // Boot — load current slot immediately
        loadSlot(currentSlot(), false);

        // Poll for slot changes
        setInterval(() => {
            const s = currentSlot();
            if (s.url !== activeUrl) loadSlot(s, true);
        }, CHECK_INTERVAL);

        // Prevent any tap from pausing the video
        document.getElementById('shield').addEventListener('click', e => e.preventDefault());

        // Auto-unmute on first user interaction (browser autoplay policy)
        document.getElementById('shield').addEventListener('click', () => {
            if (vid.muted) {
                vid.muted = false;
                vid.volume = 1;
            }
        }, { once: true });

        // Prevent video from pausing if user somehow interacts
        vid.addEventListener('pause', () => {
            if (!vid.ended) vid.play().catch(() => {});
        });
    });

})();
</script>
</body>
</html>
