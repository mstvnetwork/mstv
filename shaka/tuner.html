<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Advanced Stream Aligner</title>
    
    <script src="https://unpkg.com"></script>
    <script type="module" src="https://unpkg.com"></script>

    <style>
        :root { --primary: #00ffA0; }
        body, html {
            margin: 0; padding: 0;
            width: 100%; height: 100%;
            background: #000;
            display: flex; align-items: center; justify-content: center;
            overflow: hidden;
        }

        .viewport {
            width: 100vw; max-width: 1000px; aspect-ratio: 16 / 9; 
            overflow: hidden; position: relative;
            border: 4px solid var(--primary); border-radius: 12px;
            background: #000;
        }

        /* The container we move and scale */
        #frameMover {
            position: absolute; 
            width: 100%; 
            height: 600%; 
            top: -179px; 
            left: 0%;
            transform-origin: top left; /* Ensures zoom happens from the corner */
            transform: scale(1);
        }

        #captureFrame { width: 100%; height: 100%; border: none; }

        /* --- ADVANCED TUNER BOX --- */
        #tunerBox {
            position: fixed; bottom: 60px; left: 12px;
            background: rgba(0, 0, 0, 0.9);
            border: 1px solid var(--primary);
            padding: 15px; border-radius: 12px;
            z-index: 10005; font-family: sans-serif;
            color: white; display: flex; flex-direction: column; gap: 12px;
            backdrop-filter: blur(8px);
            transition: opacity 0.5s ease;
        }
        .control-group { display: flex; flex-direction: column; gap: 4px; }
        .control-group label { font-size: 11px; color: var(--primary); text-transform: uppercase; letter-spacing: 1px; }
        #tunerBox input { width: 180px; accent-color: var(--primary); }

        #lockLayer {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            z-index: 9999; background: rgba(0,0,0,0.01); 
            pointer-events: none;
        }
        #lockLayer.active { pointer-events: all !important; }

        .click-hint {
            position: absolute; bottom: 60px; right: 15px;
            color: var(--primary); font-family: sans-serif; font-size: 11px;
            z-index: 10000;
        }

        #resetBtn {
            position: fixed; bottom: 12px; right: 12px;
            padding: 8px 15px; background: rgba(0, 255, 160, 0.15);
            color: #00ffa0; border: 1px solid rgba(0, 255, 160, 0.6);
            border-radius: 30px; font-family: sans-serif; font-size: 14px;
            z-index: 10002; cursor: pointer;
        }

        #ticker {
            position: absolute; top: 0px; left: 0; width: 100%; z-index: 10000; padding: 11px 0;
            overflow: hidden; white-space: nowrap;
        }
        #ticker span {
            display: inline-block; padding-left: 100%;
            animation: scroll 15s linear infinite;
            color: #ff3b3b; font-family: sans-serif; font-size: 14px;
        }
        @keyframes scroll { 0% { transform: translateX(0); } 100% { transform: translateX(-100%); } }
    </style>
</head>
<body>

    <div id="ticker"><span>Adjust Top, Left, and Zoom. Controls hide automatically when locked.</span></div>

    <!-- Advanced Multi-Tuner -->
    <div id="tunerBox">
        <div class="control-group">
            <label id="lblTop">Top: -179px</label>
            <input type="range" id="topSlider" min="-500" max="0" value="-179">
        </div>
        
        <div class="control-group">
            <label id="lblLeft">Left: 0px</label>
            <input type="range" id="leftSlider" min="-200" max="200" value="0">
        </div>

        <div class="control-group">
            <label id="lblZoom">Zoom: 100%</label>
            <input type="range" id="zoomSlider" min="50" max="200" value="100">
        </div>
    </div>

    <div class="viewport" id="playerWrapper">
        <div id="lockLayer"></div>
        <div id="status" class="click-hint"></div>
        <button id="resetBtn" onclick="location.reload()">Refresh</button>

        <div id="frameMover">
            <iframe id="captureFrame" is="x-frame-bypass" scrolling="no"></iframe>
        </div>
    </div>

<script>
(function() {
    const channelList = {
        "1": "https://tulnit.com/live/shemaroo-filmi-gaane/",
        "2": "https://tulnit.com/live/vision-punjab-tv-hd/", // Add your next URL here
        "3": "https://tulnit.com/live/sony-pix-hd/",  // Add more as needed
        "4": "https://tulnit.com/live/sony-max-hd-ind/",
        "5": "https://tulnit.com/live/sony-pal/",
        "6": "https://tulnit.com/live/bollywood-colors/",
        "7": "https://tulnit.com/live/sony-tv-hd/",
        "8": "https://tulnit.com/live/runn-action/",
        "9": "https://tulnit.com/live/sony-sab-hd/"
    
    
    };

    const params = new URLSearchParams(window.location.search);
    const selectedID = params.get('ch') || "1"; 
    
    const iframe = document.getElementById('captureFrame');
    const mover = document.getElementById('frameMover');
    
    // Selectors for sliders
    const topS = document.getElementById('topSlider');
    const leftS = document.getElementById('leftSlider');
    const zoomS = document.getElementById('zoomSlider');
    
    // Selectors for labels
    const lblTop = document.getElementById('lblTop');
    const lblLeft = document.getElementById('lblLeft');
    const lblZoom = document.getElementById('lblZoom');

    const tuner = document.getElementById('tunerBox');
    const shield = document.getElementById('lockLayer');
    const status = document.getElementById('status');
    const wrapper = document.getElementById('playerWrapper');

    iframe.src = channelList[selectedID] || channelList["1"];

    // Update Function
    function updateLayout() {
        mover.style.top = topS.value + "px";
        mover.style.left = leftS.value + "px";
        mover.style.transform = `scale(${zoomS.value / 100})`;
        
        lblTop.innerText = `Top: ${topS.value}px`;
        lblLeft.innerText = `Left: ${leftS.value}px`;
        lblZoom.innerText = `Zoom: ${zoomS.value}%`;
    }

    // Listeners
    topS.addEventListener('input', updateLayout);
    leftS.addEventListener('input', updateLayout);
    zoomS.addEventListener('input', updateLayout);

    // Lock Logic
    let clickCount = 0;
    const maxClicks = 10;
    let locked = false;

    function lockPlayer() {
        if (locked) return;
        locked = true;
        shield.classList.add('active');
        status.innerText = "LOCKED";
        tuner.style.opacity = "0";
        setTimeout(() => { tuner.style.display = "none"; }, 500);
    }

    wrapper.addEventListener('click', function() {
        if (locked) return;
        clickCount++;
        let remaining = maxClicks - clickCount;
        if (remaining > 0) status.innerText = `Setup: ${remaining} clicks left`;
        if (clickCount >= maxClicks) lockPlayer();
    });

    setTimeout(lockPlayer, 60000);
})();
</script>
</body>
</html>
