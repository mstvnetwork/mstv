<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stream Embed - Auto Align</title>
    
    <script src="https://unpkg.com"></script>
    <script type="module" src="https://unpkg.com"></script>

    <style>
        :root { --primary: #00ffA0; }
        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            background: #000; display: flex; align-items: center; justify-content: center;
            overflow: hidden;
        }

        .viewport {
            width: 100vw; max-width: 1000px; aspect-ratio: 16 / 9; 
            overflow: hidden; position: relative;
            border: 4px solid var(--primary); border-radius: 12px;
            background: #000;
        }

        #frameMover {
            position: absolute; width: 100%; height: 600%; 
            transform-origin: top left;
        }

        #captureFrame { width: 100%; height: 100%; border: none; }

        /* Tuner Box - Hidden by default if 'lock' is in URL */
        #tunerBox {
            position: fixed; bottom: 60px; left: 12px;
            background: rgba(0, 0, 0, 0.9); border: 1px solid var(--primary);
            padding: 15px; border-radius: 12px; z-index: 10005;
            font-family: sans-serif; color: white; display: flex; flex-direction: column; gap: 10px;
        }
        #tunerBox input { width: 180px; accent-color: var(--primary); }
        #tunerBox button { padding: 8px; background: var(--primary); border: none; font-weight: bold; cursor: pointer; border-radius: 5px; }

        #lockLayer { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 9999; pointer-events: none; }
        #lockLayer.active { pointer-events: all !important; }

        #resetBtn {
            position: fixed; bottom: 12px; right: 12px;
            padding: 8px 15px; background: rgba(0, 255, 160, 0.15);
            color: #00ffa0; border: 1px solid rgba(0, 255, 160, 0.6);
            border-radius: 30px; font-size: 14px; z-index: 10002; cursor: pointer;
        }

        #ticker {
            position: absolute; top: 0px; left: 0; width: 100%; z-index: 10000; padding: 11px 0;
            overflow: hidden; white-space: nowrap;
        }
        #ticker span { display: inline-block; padding-left: 100%; animation: scroll 15s linear infinite; color: #ff3b3b; font-family: sans-serif; font-size: 14px; }
        @keyframes scroll { 0% { transform: translateX(0); } 100% { transform: translateX(-100%); } }
    </style>
</head>
<body>

    <div id="ticker"><span>Settings locked via URL parameters. Click Refresh to reload.</span></div>

    <div id="tunerBox">
        <label id="lblTop">Top: -179px</label>
        <input type="range" id="topSlider" min="-600" max="0" value="-179">
        <label id="lblLeft">Left: 0px</label>
        <input type="range" id="leftSlider" min="-300" max="300" value="0">
        <label id="lblZoom">Zoom: 100%</label>
        <input type="range" id="zoomSlider" min="50" max="250" value="100">
        <button onclick="generateUrl()">GENERATE EMBED LINK</button>
    </div>

    <div class="viewport" id="playerWrapper">
        <div id="lockLayer"></div>
        <button id="resetBtn" onclick="location.reload()">Refresh</button>
        <div id="frameMover">
            <iframe id="captureFrame" is="x-frame-bypass" scrolling="no"></iframe>
        </div>
    </div>

<script>
(function() {
    const channelList = {
        
    };

    const params = new URLSearchParams(window.location.search);
    
    // 1. Get Values from URL (This is what viewers will see)
    const ch = params.get('ch') || "1";
    const t = params.get('t') || "-179";
    const l = params.get('l') || "0";
    const z = params.get('z') || "100";
    const isLocked = params.get('lock') === "true";

    const mover = document.getElementById('frameMover');
    const iframe = document.getElementById('captureFrame');
    const tuner = document.getElementById('tunerBox');
    const shield = document.getElementById('lockLayer');

    // 2. Apply the values
    iframe.src = channelList[ch] || channelList["1"];
    mover.style.top = t + "px";
    mover.style.left = l + "px";
    mover.style.transform = `scale(${z / 100})`;

    // 3. If "lock=true" is in URL, hide sliders immediately
    if (isLocked) {
        tuner.style.display = 'none';
        shield.classList.add('active');
    }

    // Slider Listeners (For you to find the values)
    const topS = document.getElementById('topSlider');
    const leftS = document.getElementById('leftSlider');
    const zoomS = document.getElementById('zoomSlider');

    function update() {
        mover.style.top = topS.value + "px";
        mover.style.left = leftS.value + "px";
        mover.style.transform = `scale(${zoomS.value / 100})`;
        document.getElementById('lblTop').innerText = `Top: ${topS.value}px`;
        document.getElementById('lblLeft').innerText = `Left: ${leftS.value}px`;
        document.getElementById('lblZoom').innerText = `Zoom: ${zoomS.value}%`;
    }
    [topS, leftS, zoomS].forEach(s => s.addEventListener('input', update));

    // 4. Generate URL function
    window.generateUrl = function() {
        const newUrl = `${window.location.origin}${window.location.pathname}?ch=${ch}&t=${topS.value}&l=${leftS.value}&z=${zoomS.value}&lock=true`;
        prompt("Copy this URL for your iframe embed:", newUrl);
    };

})();
</script>
</body>
</html>
