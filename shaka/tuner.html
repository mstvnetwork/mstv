<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stream Player - Fine Tune</title>
    
    <script src="https://unpkg.com"></script>
    <script type="module" src="https://unpkg.com"></script>

    <style>
        :root { --primary: #00ffA0; }
        body, html {
            margin: 0; padding: 0;
            width: 100%; height: 100%;
            background: #000;
            display: flex; align-items: center; justify-content: center;
            overflow: hidden;
        }

        .viewport {
            width: 100vw; max-width: 1000px; aspect-ratio: 16 / 9; 
            overflow: hidden; position: relative;
            border: 4px solid var(--primary); border-radius: 12px;
            background: #000;
        }

        #frameMover {
            position: absolute; 
            width: 100%; 
            height: 600%; 
            top: -179px; /* Default starting point */
            left: 0%;
        }

        #captureFrame { width: 100%; height: 100%; border: none; }

        /* --- FINE TUNE TOOL STYLING --- */
        #tunerBox {
            position: fixed; bottom: 12px; left: 12px;
            background: rgba(0, 0, 0, 0.8);
            border: 1px solid var(--primary);
            padding: 10px; border-radius: 10px;
            z-index: 10005; font-family: sans-serif;
            color: white; display: flex; flex-direction: column; gap: 5px;
        }
        #tunerBox input { width: 150px; cursor: pointer; }
        #tunerBox label { font-size: 11px; color: var(--primary); }

        #lockLayer {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            z-index: 9999; background: rgba(0,0,0,0.01); 
            pointer-events: none; cursor: pointer;
        }
        #lockLayer.active { pointer-events: all !important; cursor: default; }

        #resetBtn {
            position: fixed; bottom: 12px; right: 12px;
            padding: 8px 15px; background: rgba(0, 255, 160, 0.15);
            color: #00ffa0; border: 1px solid rgba(0, 255, 160, 0.6);
            border-radius: 30px; font-family: sans-serif; font-size: 14px;
            z-index: 10002;
        }

        #ticker {
            position: absolute; top: 0px; left: 0;
            width: 100%; z-index: 10000; padding: 11px 0;
            overflow: hidden; white-space: nowrap;
        }
        #ticker span {
            display: inline-block; padding-left: 100%;
            animation: scroll 15s linear infinite;
            color: #ff3b3b; font-family: sans-serif; font-size: 14px;
        }
        @keyframes scroll { 0% { transform: translateX(0); } 100% { transform: translateX(-100%); } }
    </style>
</head>
<body>

    <div id="ticker"><span>Use the slider to align the player. Once aligned, note the number!</span></div>

    <!-- The Fine-Tune Tool -->
    <div id="tunerBox">
        <label id="valDisplay">Current Top: -179px</label>
        <input type="range" id="topSlider" min="-300" max="0" value="-179">
    </div>

    <div class="viewport" id="playerWrapper">
        <div id="lockLayer"></div>
        <button id="resetBtn" onclick="location.reload()">Refresh</button>

        <div id="frameMover">
            <iframe id="captureFrame" is="x-frame-bypass" scrolling="no"></iframe>
        </div>
    </div>

<script>
(function() {
    // 1. Channel List
    const channelList = {
        "1": "https://tulnit.com",
        "2": "https://tulnit.com"
    };

    const params = new URLSearchParams(window.location.search);
    const selectedID = params.get('ch') || "1"; 
    const iframe = document.getElementById('captureFrame');
    const mover = document.getElementById('frameMover');
    const slider = document.getElementById('topSlider');
    const display = document.getElementById('valDisplay');

    // Load URL
    iframe.src = channelList[selectedID] || channelList["1"];

    // 2. Fine-Tune Slider Logic
    slider.addEventListener('input', function() {
        const newVal = this.value + "px";
        mover.style.top = newVal;
        display.innerText = "Current Top: " + newVal;
    });

    // Device and Lock Logic (standard)
    document.addEventListener("DOMContentLoaded", function() {
        const shield = document.getElementById('lockLayer');
        setTimeout(() => { 
            shield.classList.add('active'); 
            // Optional: Hide tuner after it auto-locks
            // document.getElementById('tunerBox').style.display = 'none';
        }, 60000);
    });
})();
</script>
</body>
</html>
