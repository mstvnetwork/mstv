<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stream Player - Auto Hide Tuner</title>
    
    <script src="https://unpkg.com"></script>
    <script type="module" src="https://unpkg.com"></script>

    <style>
        :root { --primary: #00ffA0; }
        body, html {
            margin: 0; padding: 0;
            width: 100%; height: 100%;
            background: #000;
            display: flex; align-items: center; justify-content: center;
            overflow: hidden;
        }

        .viewport {
            width: 100vw; max-width: 1000px; aspect-ratio: 16 / 9; 
            overflow: hidden; position: relative;
            border: 4px solid var(--primary); border-radius: 12px;
            background: #000;
        }

        #frameMover {
            position: absolute; width: 100%; height: 600%; top: -179px; left: 0%;
        }

        #captureFrame { width: 100%; height: 100%; border: none; }

        /* Fine-Tune Tool Styling */
        #tunerBox {
            position: fixed; bottom: 60px; left: 12px;
            background: rgba(0, 0, 0, 0.85);
            border: 1px solid var(--primary);
            padding: 12px; border-radius: 12px;
            z-index: 10005; font-family: sans-serif;
            color: white; display: flex; flex-direction: column; gap: 8px;
            backdrop-filter: blur(5px);
            transition: opacity 0.5s ease;
        }
        #tunerBox label { font-size: 12px; color: var(--primary); font-weight: bold; }
        #tunerBox input { width: 160px; accent-color: var(--primary); }

        #lockLayer {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            z-index: 9999; background: rgba(0,0,0,0.01); 
            pointer-events: none; cursor: pointer;
        }
        #lockLayer.active { pointer-events: all !important; }

        .click-hint {
            position: absolute; bottom: 60px; right: 15px;
            color: var(--primary); font-family: sans-serif; font-size: 11px;
            z-index: 10000; pointer-events: none;
        }

        #resetBtn {
            position: fixed; bottom: 12px; right: 12px;
            padding: 8px 15px; background: rgba(0, 255, 160, 0.15);
            color: #00ffa0; border: 1px solid rgba(0, 255, 160, 0.6);
            border-radius: 30px; font-family: sans-serif; font-size: 14px;
            z-index: 10002; cursor: pointer;
        }

        #ticker {
            position: absolute; top: 0px; left: 0; width: 100%; z-index: 10000; padding: 11px 0;
            overflow: hidden; white-space: nowrap;
        }
        #ticker span {
            display: inline-block; padding-left: 100%;
            animation: scroll 15s linear infinite;
            color: #ff3b3b; font-family: sans-serif; font-size: 14px;
        }
        @keyframes scroll { 0% { transform: translateX(0); } 100% { transform: translateX(-100%); } }
    </style>
</head>
<body>

    <div id="ticker"><span>Use slider to align. Number will hide when locked.</span></div>

    <div id="tunerBox">
        <label id="valDisplay">Top: -179px</label>
        <input type="range" id="topSlider" min="-400" max="0" value="-179">
    </div>

    <div class="viewport" id="playerWrapper">
        <div id="lockLayer"></div>
        <div id="status" class="click-hint"></div>
        <button id="resetBtn" onclick="location.reload()">Refresh</button>

        <div id="frameMover">
            <iframe id="captureFrame" is="x-frame-bypass" scrolling="no"></iframe>
        </div>
    </div>

<script>
(function() {
    const channelList = {
        
    };

    const params = new URLSearchParams(window.location.search);
    const selectedID = params.get('ch') || "1"; 
    
    const iframe = document.getElementById('captureFrame');
    const mover = document.getElementById('frameMover');
    const slider = document.getElementById('topSlider');
    const display = document.getElementById('valDisplay');
    const tuner = document.getElementById('tunerBox');
    const shield = document.getElementById('lockLayer');
    const status = document.getElementById('status');
    const wrapper = document.getElementById('playerWrapper');

    iframe.src = channelList[selectedID] || channelList["1"];

    // Slider Logic
    slider.addEventListener('input', function() {
        const newVal = this.value + "px";
        mover.style.top = newVal;
        display.innerText = "Top: " + newVal;
    });

    // Lock Logic
    let clickCount = 0;
    const maxClicks = 10;
    let locked = false;

    function lockPlayer() {
        if (locked) return;
        locked = true;
        shield.classList.add('active');
        status.innerText = "LOCKED";
        tuner.style.opacity = "0"; // Fade out
        setTimeout(() => { tuner.style.display = "none"; }, 500); // Remove from view
    }

    wrapper.addEventListener('click', function() {
        if (locked) return;
        clickCount++;
        let remaining = maxClicks - clickCount;
        if (remaining > 0) status.innerText = `Setup: ${remaining} clicks left`;
        if (clickCount >= maxClicks) lockPlayer();
    });

    // Auto-lock after 60 seconds
    setTimeout(lockPlayer, 60000);

})();
</script>
</body>
</html>
