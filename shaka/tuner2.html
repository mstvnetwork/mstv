<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stream Embed</title>

    <!-- HLS.js for m3u8 playback -->
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest/dist/hls.min.js"></script>

    <!-- x-frame-bypass for iframe streams -->
    <script src="https://unpkg.com/x-frame-bypass"></script>
    <script type="module" src="https://unpkg.com/x-frame-bypass"></script>

    <style>
        :root { --primary: #00ffA0; }
        *, *::before, *::after { box-sizing: border-box; }

        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            background: #000; display: flex; align-items: center; justify-content: center;
            overflow: hidden;
        }

        /* ── Viewport ── */
        .viewport {
            width: 100vw; max-width: 1000px; aspect-ratio: 16 / 9;
            overflow: hidden; position: relative;
            border: 4px solid var(--primary); border-radius: 12px;
            background: #000;
        }
        body.public-mode .viewport {
            border: none; border-radius: 0; max-width: 100vw;
        }

        /* ── iframe mode ── */
        #frameMover {
            position: absolute; width: 100%; height: 600%;
            transform-origin: top left;
            display: none;
        }
        #captureFrame {
            width: 100%; height: 100%; border: none;
            overflow: hidden;
        }

        /* ── Native video player mode (mp4 / m3u8) ── */
        #nativePlayer {
            display: none;
            position: absolute; inset: 0;
            width: 100%; height: 100%;
            background: #000;
            /* Completely hide scrollbar & overflow */
            overflow: hidden;
        }
        #nativeVideo {
            width: 100%; height: 100%;
            object-fit: contain;
            display: block;
            /* No controls bar that allows seeking */
            outline: none;
            /* Hide scrollbar just in case */
            overflow: hidden;
        }

        /* Transparent seek-blocker overlay — sits over video, passes play/pause click through */
        #seekBlocker {
            display: none;
            position: absolute; inset: 0;
            z-index: 500;
            /* Transparent but catches seek-bar drag; allows normal click */
            background: transparent;
            cursor: default;
        }

        /* Sync notification */
        #syncNotice {
            display: none;
            position: absolute; top: 10px; left: 50%; transform: translateX(-50%);
            background: rgba(255,60,60,0.9); color: #fff;
            font-family: sans-serif; font-size: 12px; font-weight: bold;
            padding: 5px 14px; border-radius: 20px; z-index: 600;
            pointer-events: none; white-space: nowrap;
        }

        /* ── Tuner Box ── */
        #tunerBox {
            position: fixed; left: 20px; top: 50%;
            transform: translateY(-50%);
            background: rgba(0,0,0,0.92);
            border: 1px solid var(--primary);
            border-radius: 10px; z-index: 10005;
            font-family: sans-serif; color: white;
            display: flex; flex-direction: column; gap: 0;
            min-width: 220px;
            box-shadow: 0 0 20px rgba(0,255,160,0.15);
            user-select: none;
        }

        #tunerHeader {
            display: flex; align-items: center; justify-content: space-between;
            background: rgba(0,255,160,0.1);
            border-bottom: 1px solid rgba(0,255,160,0.25);
            border-radius: 9px 9px 0 0;
            padding: 8px 10px; cursor: grab;
        }
        #tunerHeader:active { cursor: grabbing; }
        #tunerHeader .title {
            font-size: 11px; font-weight: bold; letter-spacing: 1px;
            color: var(--primary); display: flex; align-items: center; gap: 6px;
        }
        #collapseBtn {
            background: none; border: none; color: var(--primary);
            font-size: 16px; cursor: pointer; padding: 0 2px; line-height: 1;
            opacity: 0.8;
        }
        #collapseBtn:hover { opacity: 1; }

        #tunerBody {
            padding: 0 14px 14px;
            display: flex; flex-direction: column; gap: 9px;
            overflow: hidden;
            transition: max-height 0.25s ease, opacity 0.2s ease, padding 0.25s ease;
            max-height: 600px; opacity: 1;
        }
        #tunerBody.collapsed { max-height: 0; opacity: 0; padding-bottom: 0; }

        #tunerBody label { font-size: 11px; color: #aaa; margin-bottom: -4px; }
        #tunerBody input[type=range] { width: 100%; accent-color: var(--primary); margin: 0; }
        #tunerBody select, #tunerBody input[type=text] {
            background: #111; color: white; border: 1px solid var(--primary);
            border-radius: 5px; padding: 5px 8px; font-size: 12px; width: 100%;
        }
        #tunerBody select { cursor: pointer; }
        #tunerBody input[type=text]::placeholder { color: #555; }

        /* Alignment sliders — hidden for native video channels */
        #alignSection { display: flex; flex-direction: column; gap: 9px; }

        .tuner-btn {
            padding: 7px 8px; border: none; font-weight: bold;
            cursor: pointer; border-radius: 5px; font-size: 12px; text-align: center;
        }
        #btnGenerate { background: var(--primary); color: #000; }
        #btnSaved    { background: #1a3a2a; color: var(--primary); border: 1px solid var(--primary); }

        #savedStatus { font-size: 10px; text-align: center; color: #00ffa0; min-height: 13px; }

        #savedPanel {
            display: none; flex-direction: column; gap: 4px;
            border-top: 1px solid #333; padding-top: 8px;
            max-height: 180px; overflow-y: auto;
        }
        #savedPanel .saved-item {
            display: flex; justify-content: space-between; align-items: center;
            font-size: 10px; padding: 4px 5px; border-radius: 4px;
            background: #111; border: 1px solid #222;
        }
        #savedPanel .saved-item strong { color: #00ffa0; }
        #savedPanel .saved-item span   { color: #777; }
        #savedPanel .item-btns { display: flex; gap: 3px; margin-left: 5px; }
        #savedPanel .item-btns button { font-size: 9px; padding: 2px 5px; border-radius: 3px; cursor: pointer; }
        #savedPanel .copy-btn { background: #122; color: #0fa; border: 1px solid #0fa; }
        #savedPanel .del-btn  { background: #200; color: #f55; border: 1px solid #f55; }

        /* Mode badge */
        #modeBadge {
            position: fixed; top: 10px; right: 10px;
            padding: 4px 10px; border-radius: 20px;
            font-family: sans-serif; font-size: 11px; font-weight: bold;
            letter-spacing: 1px; z-index: 10010; border: 1px solid;
        }
        #modeBadge.private { background: rgba(255,200,0,0.15); color: #ffcc00; border-color: rgba(255,200,0,0.5); }
        #modeBadge.public  { background: rgba(0,255,160,0.1);  color: #00ffa0;  border-color: rgba(0,255,160,0.3); }

        #lockLayer { position: absolute; inset: 0; z-index: 9999; pointer-events: none; }
        #lockLayer.active { pointer-events: all !important; }

        #resetBtn {
            position: fixed; bottom: 10px; right: 10px;
            padding: 7px 14px; background: rgba(0,255,160,0.12);
            color: #00ffa0; border: 1px solid rgba(0,255,160,0.5);
            border-radius: 30px; font-size: 13px; z-index: 10002; cursor: pointer;
        }

        body.public-mode #resetBtn  { display: none; }
        body.public-mode #modeBadge { display: none; }
        body.public-mode #tunerBox  { display: none; }

        /* Type pill shown in tuner for native channels */
        .type-pill {
            display: inline-block; font-size: 9px; font-weight: bold;
            padding: 1px 6px; border-radius: 10px; margin-left: 4px;
            vertical-align: middle;
        }
        .type-pill.mp4  { background: #1a2a4a; color: #5af; border: 1px solid #5af; }
        .type-pill.m3u8 { background: #2a1a3a; color: #c8f; border: 1px solid #c8f; }
        .type-pill.web  { background: #1a3a2a; color: #0fa; border: 1px solid #0fa; }
    </style>
</head>
<body>

<span id="modeBadge"></span>

<!-- ── Tuner (private only) ── -->
<div id="tunerBox">
    <div id="tunerHeader">
        <div class="title">
            <svg width="12" height="12" viewBox="0 0 12 12" fill="currentColor">
                <rect y="1" width="12" height="1.5" rx="1"/>
                <rect y="5" width="12" height="1.5" rx="1"/>
                <rect y="9" width="12" height="1.5" rx="1"/>
            </svg>
            ⚙ TUNER
        </div>
        <button id="collapseBtn" onclick="toggleCollapse()" title="Collapse">−</button>
    </div>

    <div id="tunerBody">
        <label>Channel</label>
        <select id="chSelect"></select>

        <div id="alignSection">
            <label id="lblTop">Top: -179px</label>
            <input type="range" id="topSlider" min="-600" max="0" value="-179">
            <label id="lblLeft">Left: 0px</label>
            <input type="range" id="leftSlider" min="-300" max="300" value="0">
            <label id="lblZoom">Zoom: 100%</label>
            <input type="range" id="zoomSlider" min="50" max="250" value="100">
        </div>

        <button id="btnGenerate" class="tuner-btn" onclick="generateUrl()">⚡ GENERATE PUBLIC LINK</button>
        <button id="btnSaved"    class="tuner-btn" onclick="toggleSavedPanel()">📋 Saved Alignments</button>
        <div id="savedStatus"></div>
        <div id="savedPanel"></div>
    </div>
</div>

<!-- ── Player viewport ── -->
<div class="viewport" id="playerWrapper">
    <div id="lockLayer"></div>
    <button id="resetBtn" onclick="location.reload()">Refresh</button>

    <!-- Sync notice (native player) -->
    <div id="syncNotice">⟳ Syncing back…</div>

    <!-- Seek blocker overlay (native player) -->
    <div id="seekBlocker"></div>

    <!-- Native video player (mp4 / m3u8) -->
    <div id="nativePlayer">
        <video id="nativeVideo" playsinline></video>
    </div>

    <!-- iframe player (web channel) -->
    <div id="frameMover">
        <iframe id="captureFrame" is="x-frame-bypass" scrolling="no"></iframe>
    </div>
</div>

<script>
(function() {
    'use strict';

    // ════════════════════════════════════════════════════════════════
    //  CHANNEL LIST
    //  type: 'web'  → iframe embed  (alignment tuner applies)
    //  type: 'mp4'  → native <video> direct mp4
    //  type: 'm3u8' → native <video> via HLS.js
    // ════════════════════════════════════════════════════════════════
    const channelList = {
        "1":  { name: "Sony Ten 1",       type: "web",  url: "https://tv-shihab.xyz/live/sony-ten-1/" },
        "2":  { name: "Vision Punjab HD",  type: "web",  url: "https://tulnit.com/live/vision-punjab-tv-hd/" },
        "3":  { name: "Sony Pix HD",       type: "web",  url: "https://tulnit.com/live/sony-pix-hd/" },
        "4":  { name: "Sony Max HD",       type: "web",  url: "https://tulnit.com/live/sony-max-hd-ind/" },
        "5":  { name: "Sony Pal",          type: "web",  url: "https://tulnit.com/live/sony-pal/" },
        "6":  { name: "Colors Bollywood",  type: "web",  url: "https://tulnit.com/live/bollywood-colors/" },
        "7":  { name: "Sony TV HD",        type: "web",  url: "https://tulnit.com/live/sony-tv-hd/" },
        "8":  { name: "Runn Action",       type: "web",  url: "https://tulnit.com/live/runn-action/" },
        "9":  { name: "Sony SAB HD",       type: "web",  url: "https://tulnit.com/live/sony-sab-hd/" },
        "10": { name: "Anupama Ep.1993",   type: "web",  url: "https://anupamadesiserial.su/anupama-25th-april-2026-full-episode-1993/" }
        // Examples of how to add mp4/m3u8 channels:
        // "11": { name: "Sample MP4",   type: "mp4",  url: "https://sto.vkcdn5.com/olaxkuzhx3uiolyobgk2hxzrng4uknkkvp2kweer4odxkcq46c6lythqvutq/v.mp4" },
        // "12": { name: "Live HLS",     type: "m3u8", url: "https://mumt01.tangotv.in/MHONEDILSE/index.m3u8" },
    };

    // ── Helpers ──────────────────────────────────────────────────────
    function urlType(url) {
        if (!url) return 'web';
        const u = url.toLowerCase().split('?')[0];
        if (u.endsWith('.mp4') || u.endsWith('.webm') || u.endsWith('.ogg')) return 'mp4';
        if (u.endsWith('.m3u8') || u.endsWith('.m3u')) return 'm3u8';
        return 'web';
    }

    const STORE_KEY = 'stream_alignments_v1';
    function loadAll()           { try { return JSON.parse(localStorage.getItem(STORE_KEY)) || {}; } catch(e) { return {}; } }
    function getAlign(ch)        { return loadAll()[ch] || null; }
    function saveAlign(ch,t,l,z) { const a=loadAll(); a[ch]={t,l,z,ts:Date.now()}; localStorage.setItem(STORE_KEY,JSON.stringify(a)); }
    function delAlign(ch)        { const a=loadAll(); delete a[ch]; localStorage.setItem(STORE_KEY,JSON.stringify(a)); }

    // ── DOM refs ─────────────────────────────────────────────────────
    const params       = new URLSearchParams(window.location.search);
    const isPublic     = params.get('mode') === 'public' || params.get('lock') === 'true';
    let   ch           = params.get('ch') || "1";

    const mover        = document.getElementById('frameMover');
    const iframe       = document.getElementById('captureFrame');
    const nativePlayer = document.getElementById('nativePlayer');
    const nativeVideo  = document.getElementById('nativeVideo');
    const seekBlocker  = document.getElementById('seekBlocker');
    const syncNotice   = document.getElementById('syncNotice');
    const tuner        = document.getElementById('tunerBox');
    const shield       = document.getElementById('lockLayer');
    const badge        = document.getElementById('modeBadge');
    const topS         = document.getElementById('topSlider');
    const leftS        = document.getElementById('leftSlider');
    const zoomS        = document.getElementById('zoomSlider');
    const status       = document.getElementById('savedStatus');
    const alignSection = document.getElementById('alignSection');

    // ── HLS instance tracker ─────────────────────────────────────────
    let hlsInstance = null;

    // ════════════════════════════════════════════════════════════════
    //  NATIVE VIDEO PLAYER  (mp4 / m3u8)
    // ════════════════════════════════════════════════════════════════

    // Reference time anchor: wall-clock ms when video started + video startTime
    let refWallTime   = null;  // Date.now() at play start
    let refVideoTime  = null;  // video.currentTime at play start
    let isLiveStream  = false; // true for m3u8 live
    let syncWatchdog  = null;
    let userSeeked    = false; // flag set when we detect a jump we didn't cause
    let programmaticSeek = false; // flag so our own seeks don't trigger watchdog

    function showSyncNotice(show) {
        syncNotice.style.display = show ? 'block' : 'none';
    }

    function getExpectedTime() {
        if (refWallTime === null || refVideoTime === null) return null;
        const elapsed = (Date.now() - refWallTime) / 1000;
        return refVideoTime + elapsed;
    }

    function syncBack() {
        const expected = getExpectedTime();
        if (expected === null) return;
        programmaticSeek = true;
        nativeVideo.currentTime = expected;
        showSyncNotice(true);
        setTimeout(() => { showSyncNotice(false); programmaticSeek = false; }, 1500);
    }

    // Called whenever video actually starts playing (including after buffer stalls)
    function anchorTime() {
        refWallTime  = Date.now();
        refVideoTime = nativeVideo.currentTime;
    }

    function setupSyncWatchdog() {
        // Poll every 800ms — detect if currentTime deviates more than 3s from expected
        if (syncWatchdog) clearInterval(syncWatchdog);
        syncWatchdog = setInterval(() => {
            if (nativeVideo.paused || nativeVideo.ended) return;
            if (programmaticSeek) return;
            const expected = getExpectedTime();
            if (expected === null) return;
            const drift = Math.abs(nativeVideo.currentTime - expected);
            if (drift > 3) {
                console.warn(`[SyncGuard] Drift detected: ${drift.toFixed(1)}s — resyncing`);
                syncBack();
                // Re-anchor after sync
                setTimeout(anchorTime, 200);
            }
        }, 800);
    }

    function loadNative(url, type) {
        // Clean up previous HLS
        if (hlsInstance) { hlsInstance.destroy(); hlsInstance = null; }
        if (syncWatchdog) { clearInterval(syncWatchdog); syncWatchdog = null; }

        refWallTime = null; refVideoTime = null;
        isLiveStream = (type === 'm3u8');

        nativeVideo.removeAttribute('src');
        nativeVideo.load();

        // Remove all native controls so there's no seek bar at all
        nativeVideo.removeAttribute('controls');
        // Also block right-click context menu on video
        nativeVideo.oncontextmenu = e => e.preventDefault();

        // Show seek blocker overlay
        seekBlocker.style.display = 'block';

        // Block keyboard shortcuts that allow seeking (arrow keys, space → fine)
        // We intercept seekable keyboard events on the video element
        nativeVideo.addEventListener('keydown', e => {
            // Arrow left/right seek — block
            if (['ArrowLeft','ArrowRight'].includes(e.key)) e.preventDefault();
        }, true);

        if (type === 'm3u8') {
            if (Hls.isSupported()) {
                hlsInstance = new Hls({ enableWorker: true, lowLatencyMode: true });
                hlsInstance.loadSource(url);
                hlsInstance.attachMedia(nativeVideo);
                hlsInstance.on(Hls.Events.MANIFEST_PARSED, () => {
                    nativeVideo.play().catch(() => {});
                });
            } else if (nativeVideo.canPlayType('application/vnd.apple.mpegurl')) {
                // Safari native HLS
                nativeVideo.src = url;
                nativeVideo.play().catch(() => {});
            }
        } else {
            // mp4 / webm
            nativeVideo.src = url;
            nativeVideo.play().catch(() => {});
        }

        // Anchor time on first play
        nativeVideo.addEventListener('playing', () => {
            anchorTime();
            setupSyncWatchdog();
        }, { once: false });

        // Detect seeking events we didn't cause
        nativeVideo.addEventListener('seeking', () => {
            if (programmaticSeek) return;
            // User tried to seek — snap back
            const expected = getExpectedTime();
            if (expected !== null) {
                programmaticSeek = true;
                nativeVideo.currentTime = expected;
                showSyncNotice(true);
                setTimeout(() => { showSyncNotice(false); programmaticSeek = false; }, 1500);
            }
        });

        // Re-anchor after any buffering resume
        nativeVideo.addEventListener('playing', anchorTime);
    }

    // ════════════════════════════════════════════════════════════════
    //  SWITCH PLAYER MODE
    // ════════════════════════════════════════════════════════════════
    function showNativePlayer(show) {
        nativePlayer.style.display = show ? 'block' : 'none';
        mover.style.display        = show ? 'none'  : 'block';
        seekBlocker.style.display  = show ? 'block' : 'none';
        // Alignment sliders only make sense for iframe/web channels
        alignSection.style.display = show ? 'none'  : 'flex';
    }

    // ════════════════════════════════════════════════════════════════
    //  PUBLIC MODE
    // ════════════════════════════════════════════════════════════════
    if (isPublic) {
        const t    = params.get('t') || "-179";
        const l    = params.get('l') || "0";
        const z    = params.get('z') || "100";
        const ch_  = channelList[ch] || channelList["1"];
        const type = ch_.type || urlType(ch_.url);

        tuner.style.display  = 'none';
        shield.style.display = 'none';
        document.body.classList.add('public-mode');
        badge.textContent = '● PUBLIC';
        badge.className   = 'public';

        if (type === 'mp4' || type === 'm3u8') {
            showNativePlayer(true);
            loadNative(ch_.url, type);
        } else {
            showNativePlayer(false);
            iframe.src            = ch_.url;
            mover.style.top       = t + "px";
            mover.style.left      = l + "px";
            mover.style.transform = `scale(${z / 100})`;
        }
        return;
    }

    // ════════════════════════════════════════════════════════════════
    //  PRIVATE MODE
    // ════════════════════════════════════════════════════════════════
    badge.textContent = '● PRIVATE';
    badge.className   = 'private';

    // ── Draggable tuner ──────────────────────────────────────────────
    (function makeDraggable() {
        const handle = document.getElementById('tunerHeader');
        let dragging = false, ox = 0, oy = 0;
        const rect = tuner.getBoundingClientRect();
        tuner.style.transform = 'none';
        tuner.style.left = rect.left + 'px';
        tuner.style.top  = rect.top  + 'px';

        function startDrag(cx, cy) {
            dragging = true;
            const r = tuner.getBoundingClientRect();
            ox = cx - r.left; oy = cy - r.top;
            tuner.style.transition = 'none';
        }
        function moveDrag(cx, cy) {
            if (!dragging) return;
            const maxX = window.innerWidth  - tuner.offsetWidth;
            const maxY = window.innerHeight - tuner.offsetHeight;
            tuner.style.left = Math.max(0, Math.min(cx - ox, maxX)) + 'px';
            tuner.style.top  = Math.max(0, Math.min(cy - oy, maxY)) + 'px';
        }

        handle.addEventListener('mousedown', e => { if (e.target.id !== 'collapseBtn') { startDrag(e.clientX, e.clientY); e.preventDefault(); } });
        handle.addEventListener('touchstart', e => { if (e.target.id !== 'collapseBtn') { startDrag(e.touches[0].clientX, e.touches[0].clientY); e.preventDefault(); } }, { passive: false });
        document.addEventListener('mousemove', e => moveDrag(e.clientX, e.clientY));
        document.addEventListener('touchmove', e => { moveDrag(e.touches[0].clientX, e.touches[0].clientY); e.preventDefault(); }, { passive: false });
        document.addEventListener('mouseup',  () => { dragging = false; });
        document.addEventListener('touchend', () => { dragging = false; });
    })();

    // ── Collapse ─────────────────────────────────────────────────────
    let collapsed = false;
    window.toggleCollapse = function() {
        collapsed = !collapsed;
        document.getElementById('tunerBody').classList.toggle('collapsed', collapsed);
        document.getElementById('collapseBtn').textContent = collapsed ? '+' : '−';
    };

    // ── Build channel dropdown ───────────────────────────────────────
    const chSelect = document.getElementById('chSelect');
    Object.entries(channelList).forEach(([id, c]) => {
        const opt  = document.createElement('option');
        const type = c.type || urlType(c.url);
        opt.value       = id;
        opt.textContent = `Ch ${id}: ${c.name} [${type.toUpperCase()}]`;
        chSelect.appendChild(opt);
    });
    chSelect.value = ch;

    // ── Apply iframe alignment ───────────────────────────────────────
    function applyAlign(t, l, z) {
        topS.value = t; leftS.value = l; zoomS.value = z;
        mover.style.top       = t + "px";
        mover.style.left      = l + "px";
        mover.style.transform = `scale(${z / 100})`;
        document.getElementById('lblTop').innerText  = `Top: ${t}px`;
        document.getElementById('lblLeft').innerText = `Left: ${l}px`;
        document.getElementById('lblZoom').innerText = `Zoom: ${z}%`;
    }

    // ── Load channel ─────────────────────────────────────────────────
    function loadChannel(chId) {
        ch = chId;
        const c    = channelList[chId] || channelList["1"];
        const type = c.type || urlType(c.url);

        if (type === 'mp4' || type === 'm3u8') {
            showNativePlayer(true);
            loadNative(c.url, type);
            status.textContent = `▶ Playing ${type.toUpperCase()} — no alignment needed`;
        } else {
            showNativePlayer(false);
            iframe.src = c.url;
            const saved = getAlign(chId);
            if (saved) {
                applyAlign(saved.t, saved.l, saved.z);
                status.textContent = `✔ Alignment loaded (${new Date(saved.ts).toLocaleString()})`;
            } else {
                applyAlign("-179", "0", "100");
                status.textContent = '';
            }
        }
    }

    loadChannel(ch);
    chSelect.addEventListener('change', () => loadChannel(chSelect.value));

    // ── Slider live update ───────────────────────────────────────────
    function update() {
        mover.style.top       = topS.value + "px";
        mover.style.left      = leftS.value + "px";
        mover.style.transform = `scale(${zoomS.value / 100})`;
        document.getElementById('lblTop').innerText  = `Top: ${topS.value}px`;
        document.getElementById('lblLeft').innerText = `Left: ${leftS.value}px`;
        document.getElementById('lblZoom').innerText = `Zoom: ${zoomS.value}%`;
    }
    [topS, leftS, zoomS].forEach(s => s.addEventListener('input', update));

    // ── Generate public link ─────────────────────────────────────────
    window.generateUrl = function() {
        const c    = channelList[ch] || channelList["1"];
        const type = c.type || urlType(c.url);
        const t = topS.value, l = leftS.value, z = zoomS.value;

        if (type === 'web') saveAlign(ch, t, l, z);

        const publicUrl =
            `${window.location.origin}${window.location.pathname}` +
            `?ch=${ch}&t=${t}&l=${l}&z=${z}&mode=public`;

        status.textContent = `✔ Locked Ch ${ch} — ${c.name}`;
        renderSavedPanel();
        prompt(`PUBLIC LINK — Ch ${ch} (${c.name}) [${type.toUpperCase()}]:`, publicUrl);
    };

    // ── Saved alignments panel ───────────────────────────────────────
    function renderSavedPanel() {
        const panel = document.getElementById('savedPanel');
        const all   = loadAll();
        const ids   = Object.keys(all);
        panel.innerHTML = '';
        if (ids.length === 0) {
            panel.innerHTML = '<span style="font-size:10px;color:#555">No alignments saved yet.</span>';
            return;
        }
        ids.forEach(id => {
            const a    = all[id];
            const name = channelList[id]?.name || `Ch ${id}`;
            const date = new Date(a.ts).toLocaleString();
            const link =
                `${window.location.origin}${window.location.pathname}` +
                `?ch=${id}&t=${a.t}&l=${a.l}&z=${a.z}&mode=public`;
            const row = document.createElement('div');
            row.className = 'saved-item';
            row.innerHTML = `
                <div style="flex:1;min-width:0">
                    <strong>Ch ${id}</strong> <span>${name}</span><br>
                    <span style="font-size:9px;color:#444">${date}</span>
                </div>
                <div class="item-btns">
                    <button class="copy-btn" onclick="copyLink('${link}')">📋</button>
                    <button class="del-btn"  onclick="removeSaved('${id}')">✕</button>
                </div>`;
            panel.appendChild(row);
        });
    }

    window.toggleSavedPanel = function() {
        const panel = document.getElementById('savedPanel');
        const open  = panel.style.display === 'flex';
        panel.style.display       = open ? 'none' : 'flex';
        panel.style.flexDirection = 'column';
        if (!open) renderSavedPanel();
    };

    window.copyLink = function(url) {
        navigator.clipboard.writeText(url).then(() => {
            status.textContent = '✔ Copied to clipboard!';
            setTimeout(() => { status.textContent = ''; }, 2500);
        });
    };

    window.removeSaved = function(chId) {
        delAlign(chId);
        renderSavedPanel();
        if (chId === ch) status.textContent = '';
    };

})();
</script>
</body>
</html>
