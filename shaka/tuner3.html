<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Live Stream Player</title>
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background: #0a0a0c; position: relative; }
        
        /* Center the 16:9 container perfectly on the screen */
        body {
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* 16:9 Responsive Player Container */
        #player-target {
            width: 100%;
            max-width: 100vw;
            max-height: 100vh;
            aspect-ratio: 16 / 9;
            box-shadow: 0 20px 25px -5px rgb(0 0 0 / 0.5);
        }

        /* Iframe inherits container dimensions */
        iframe { width: 100%; height: 100%; border: none; opacity: 0; transition: opacity 0.5s cubic-bezier(0.4, 0, 0.2, 1); }
        
        /* Sleek Modern Loading Screen */
        #loader {
            position: absolute;
            inset: 0;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background: #09090b;
            z-index: 10;
            transition: opacity 0.4s ease, visibility 0.4s ease;
            gap: 16px;
        }
        
        /* Modern Text Styling with Gradient Colour */
        .loading-text {
            color: #f4f4f5;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            font-size: 16px;
            font-weight: 500;
            letter-spacing: 0.05em;
            /* Sleek text gradient */
            background: linear-gradient(135deg, #ffffff 30%, #a1a1aa 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        /* Minimal Tech Pulsing Ring */
        .pulse-ring {
            width: 32px;
            height: 32px;
            border: 2px solid rgba(255, 255, 255, 0.05);
            border-top: 2px solid #3b82f6; /* Modern electric blue accent */
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        
        /* Clean transitions */
        .loaded #loader { opacity: 0; visibility: hidden; }
        .loaded iframe { opacity: 1; }
    </style>
</head>
<body>

    <!-- Modern Loader Design -->
    <div id="loader">
        <div class="pulse-ring"></div>
        <div class="loading-text">Please wait loading...</div>
    </div>
    
    <!-- Inline styles removed here to use the new CSS stylesheet configuration -->
    <div id="player-target"></div>

    <script>
        // 1. Add all your streaming URLs here. Match the index numbers carefully.
        const channels = {
            "1": "https://stb-air.wasmer.app//play.php?id=LIVETV_LIVETVCHANNEL_STAR_PLUS_HD&uid=999&pass=999",
            "2": "https://stb-air.wasmer.app//play.php?id=LIVETV_LIVETVCHANNEL_STAR_SPORTS_1_HD&uid=999&pass=999",
            "3": "https://alymize.com/dd/wanda.php?token=JITENDRA_KUMAR&id=279&jane_foster=https://jiotvbpkmob.cdn.jio.com/bpk-tv/ColorsRishtey_MOB/Fallback/&thor=5831396f5a47356c5956396650584e30505445334e7a67354d546b774f44522b5a586877505445334e7a6b774d4455304f44522b59574e735053396963477374644859765132397362334a7a556d6c7a6148526c6556394e54304976526d467362474a68593273764b6e356f6257466a5057566c5a574a6d4e446b784d7a566b593245304d6a68685954526a4d5468694e446c685957497a595463344e6d497a595751324d4445334d6d497a4d7a55354e325577597a4a6b5957566b4e54686b5a5749304e47513d&pkey=https://tv.media.jio.com/fallback/bpk-tv/ColorsRishtey_MOB/Fallback/hls/aes128.key-b2007bf7a1405843bfad4fb88428f7a0-1778889600.pkey",
            "4": "https://example.com"
        };

        const urlParams = new URLSearchParams(window.location.search);
        const channelId = urlParams.get('ch');
        const targetDiv = document.getElementById('player-target');

        if (channelId && channels[channelId]) {
            const rawUrl = channels[channelId];
            const separator = rawUrl.includes('?') ? '&' : '?';
            const finalSrc = `${rawUrl}${separator}autoplay=1&mute=1`;

            const iframe = document.createElement('iframe');
            iframe.src = finalSrc;
            iframe.setAttribute('allow', 'autoplay; encrypted-media; picture-in-picture');
            iframe.setAttribute('allowfullscreen', 'true');
            iframe.setAttribute('scrolling', 'no');
            
            iframe.onload = function() {
                document.body.classList.add('loaded');
            };
            
            targetDiv.appendChild(iframe);
        } else {
            document.getElementById('loader').innerHTML = "<div class='loading-text' style='background:none;-webkit-text-fill-color:initial;color:#ef4444;'>Channel not found</div>";
        }
    </script>
</body>
</html>
